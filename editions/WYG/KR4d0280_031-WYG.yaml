body:
  text: 江湖長翁集巻三十一宋陳造撰題䟦題釣遊圖風煙萬頃生涯一蓑修魚食以垂絲亂鷗羣而分波吏曹縳虎如此樂何把玩是圖恍若鏡清深躡陂陁也題石蘭圖羌楚佩之可紉眇鄭夢之安取政使媚九畹之秋孰若得一拳之友䟦郭元邁北中詩巻後郭公忠烈士也方國歩之艱請于朝使不測之敵畢命絶漠羝未乳鴈不度隻影自顧與漢節偶政復鐵心石膓恐不可一朝居而形于詩筆語工律嚴蕭散之趣邁往之氣不可湮沒公忠烈士也所飬又如此夫詩之道深矣士以之傃患難甘憂虞盖有助焉三百篇所載多賤臣羇客幽憂無聊之辭而遭讒畏禍者之作皆悲不失正怨不至怒刺譏其時而非誹也盖其得於詩也深故能安於無可柰何而為致命遂志之君子亦豈苟然郭公之於詩盖當求之古題月谿辭後梅花賦似非廣平語九辯招䰟峻潔厲嚴宋玉之文盖不愧其師至賦神女則妍嫮妖蠱之態儼在人目士遊戲翰墨情寓於辭不主故常乃妙爾吾宗夢錫公養髙行意傲睨人士若不可挹而扳之其文髙古簡淡稱其所為見于長短句則婉麗豐媺音諧字帖使人誦詠吟玩若交五陵佳公子相與坐錦帳目蕙蘭而耳笙簫狎興自生幽憂不留予然後知二宋公之隨作而工異乎長彼短此者禮譏張而不弛而善戲謔兮詩人不去予於月谿語亦云䟦龔判院罷邑質錢二帖士有得於中其於應世桔橰仰俯虚舟泛浮我無心焉然其氷蘗厲操一介不取自守嚴甚此數紙元亮歸去來草魯公乞米帖也龔氏寳藏之䟦龔刋院詩集龔養正幼則能詩文造物者困躓之詩文闕徤渾厚而鬢亦霜身且衰矣此集其先大夫判院闕所著清峭奇麗句工字穏而老徤渾厚信得之深且久者以是知吾養正之學有自判院公之多奇名位不醻士不滿于此而養正五十未祿謂治世果無遺才矣豈其然書某氏辨誣録後理然而人不然之之謂誣即然不然而曉之之謂辨謂夷惠汙謂仲尼佞是誣已若昔孟子著書而楊墨熄孔道明辨之之力也至然其然不然其不然則固不可謂之誣然乎不然而彊為之辨則欺矣某之在本朝窮凶極惡流毒天下載之公論有不容掩後之言奸邪必稽焉是固可謂之誣也乎非誣也而猥曰誣從而辨焉孝子順孫之心其亦出於愛矣乎夫愛祖禰則有恩而是非曲直則有義以私恩而撓公義其可疾也而出於愛祖禰之心其亦可憐也夫聖賢君子不幸而祖禰如某有之矣愛之固有道也舜之瞽禹之鯀舜禹豈不愛其父然不聞果於辨以自餙欺人而廢公義也周公告蔡仲以盖前人之愆曰惟忠惟孝邁迹自身蔡叔之惡極矣聖人猶以為可盖者繫仲也盖之之説捨忠孝無他術而蔡之綿祀始終春秋則仲之盖前人至矣非自身耶沈充之附王厚罪浮於哀章王偉勁也耻之雖耻之未聞譊譊焉以不誣為誣也卒之甘死國難死于難其足以贖乃祖之惡矣冀缺耨妻敬之甚晉用之而功夫非芮宗耶士不幸為某之子孫者吾謂事上則如仲之邁迹忠孝臨難當如勁之處死不避置未用如缺之不忘敬孰曰不可夫何暇煩於言昔者敬宗之有逺也武之有儒衡也義甫懷光之有湛與璀也皆凶人之後無惡也贅而辨則惡矣且某亦可悲也已甘取凶忍悖戾之名不暇辭汲汲為富貴計為子孫地富貴則醻其欲而其子孫至於含耻彊顔費辭犯嚴而萬一其言之售是何工於為身而拙於謀子孫歟取快一已而貽禍無窮不仁孰甚焉心之不自抑以計後世也而其為後世累乃爾不智孰甚焉仁且智曾於某而責諸吾以諗仕而計子孫者䟦郭太尉書李衛公問對晝破堅陣夜接辭人上馬擊賊下馬草檄男子事業富貴所自出者晉命帥必詩書禮樂之士元元本本夫豈偶然予謁帥相郭公于揚州公一見延以代舍時接譚辯凡古今治亂盛衰賢否去取盖梃楹分一二數衮衮不竭其名章俊語驚盪耳目猶置不論然則雍容而宗祏安譚笑而勳庸隆進退出處世無間然有本者盖如是觀先太尉此帖其源流所自當求之摧鋒䧟堅汗馬執鋭之表也家世之蟬聫忠孝之傳承功名之烜赫也宜哉鼎彛竹帛夫已累代寧復公慙卿卿慙長耶西平有子聽復繼愬比郭氏尤貶况其餘䟦蔡武伯家藏尹和靖所書孝經士何以探道曰尊經何以抗志曰慕古不經則他不古則汙和靖尹公一代名士其尊經探道今者所宗孝經十八章盖其手書想平生六經之學箸之心筆之紙不一日廢不一二傳惜不盡見之是書流落而武伯能有之時玩誦不忘武伯經術士孟子曰是以論其世是尚友也武伯慕古之心世所謂則而象之者非耶䟦知安老人詩士有傲世不仕胸次所有足以細物自重世不知而不悔知安老人是也公四明人於書無所不讀緒餘詩章猶頡頑名軰上讀此數紙蕭然塵外之姿在吾目中某未識公而得公為人其子夢錫予畏友也故得盥手細讀于吴門芹宫幸矣繼此拜床下獲聆其謦欬又幸也題筆工俞生所藏書法俞處士造筆精緻甲吴中俞頗能書理則然然餬口不餘見古碑法書捐衣食求之不論價此亦奇嗜癖好未可以常情計所蓄多善本此軸真蹟可寳士大夫願得之者俞能有之予敢以市工例視之耶題某人論史讀經如拱侍夫子讀史如生乎其時目其治亂而與之辨論者乃為善學閲此論千載向背是非瞭然心目間學史者之法也某玩史有得甚多每為諸生講説漸成編帙不得是正夫子臨帋愀然書徐晉寧傳後靖康之變終天之痛也向来釀毒挺燄之人漂忽穢腐使人言之而唾而劉鞈李若水郭永之徒凛凛不死晉寧於三子盖伯仲間讀此傳如挹雄姿聽憂國料敵之譚思九原之可作夫惡得而死之閲古今而論定君子小人邪正之間天之予奪孰為優劣方公未被圍糾集民丁十五萬為勤王之行議者講遽已使吾悟其譎公得逞未可量也敵之謀我也一皆侯景故智景之舉逆順衆寡不侔諸侯勤王則緩以講既罷則復進罷而起我良難景易之梁憚戰倖休彼洞測之平侮之卒得逞凡敵所以欺吾與吾所以受欺臺城之禍無少異而徐公之徒抱恨地下無終窮時端在此故吾併書之以諗謀國者庚申閏二月五日書于武林逆旅晉寧諱徽言題王勉夫雜說吾友王勉夫經傳記注辨析凡三十巻其議論之純正稽考之精確鉤摘之博洽信可以不朽盥讀再過還之手抄家藏請俟異日䟦趙子野詩巻予好詩世之詩人多與遊閲之多故人不與其能或與其知晚乃得趙子野詩讀之予敬且服焉清峻而豐腴麗雅而精粹其調度功力排奡頓挫沈著恢托詩所應有盡有之盖未易措評裁也歐公謂老泉吾賢孫石之文今於子意乃足予於子野亦云子野所學其源則三百篇其支流𣲖引不杜子美不留眄也而其春秋甚富往往以李長吉為比長吉之作工矣然在子美一體爾子野将兼之不難昔人曰不恨臣無二王法恨二王無臣法猶有為若言盍以是復之䟦簡齋帖某從寺丞公逰獲觀簡齋先生進御三帖亦既䟦以短語而此帖盖其與夫人書仲尼所謂如見大賔者邪衛常精識吾猶得而間然冀缺敬心古不容於專美徒勞稽首已後執鞭䟦沈子宿瀟湘連璧詩荆公集他人句為詩工矣至丹陽葛先生又能為唐律詩體尤工然未有專以坡谷二氏語兼舉互足而成成無齟齬如沈君者千里厯塊孰若回䇿如縈者之為至也余不識沈君意必清臞骨立如古辟穀混世仙子鶉衣壁立無求於世者耶昔人謂詩窮人或且曰詩能逹人是一為簡齋發此語耳逹一二窮乃十百千萬也沈君於二老詩嫓取工甚妙於詩不疑予固敬服而又憂其窮未艾也世之軒輊士者能憂予所憂則窮達特未定南卿兄姑待之䟦趙路分書予處病說後予多病顧難死處之不悖也一貴人病予書所以處之之說諗之後三日問之未過目也退自咎豈其言之繆悠文之荒陋故爾見棄耶趙侯夷仲来髙郵偶見之自書以歸筆勢遒媚無率遽態予年七十一矣食眠猶佳何以致此夷仲六十三其膚貌充腴目光射人譚辯傾注儀矩漂蕭如五十許人而所謂貴人者氣且奄奄即之可憐則其於吾文去取輕重之間盖不徒然也䟦趙路分書予詩文巻後予為文寫意而已初不自是間示人亦有予之者然不自是之心未泯也趙侯夷仲江南之宗英妙於文者定交于淮南之髙郵得予西遊藁取其詩賦雜說凡十四篇手寫而藏之噫猗和弗睨决非至寳良樂回眄未為下乘吾於是頗得自慰題吕居仁詩東莱吕居仁詩言從字順而其格律邁遠嚴宻學者師法也始余貧甚僅得建本熟讀心終不愜丙午主吴門教印得此本尋舊書闕三之一以是知貧而學政自不易力能得書不應遽忘云題變離騷歸来子之於楚騷古今源流正變之意備且盡矣山谷曰設欲作錦當作錦機君子之於學取法以類如此是書也盖機之良取法者之不可一日缺然也然歸来子泛然取必叙述所以作與所以取之意其又典重深粹求之西漢司馬長卿劉子政其軰流歟王襃谷永之徒猶當辟舍歸来子蘇門髙第是書又學力既定之後耶故予深所珍祕以此題荀子理以文為顯晦而其渾厚之氣嚴宻之法至西漢始衰西漢似未衰也校之先秦書有間矣雖謂之衰可也書出乎秦之前六經之外惟孟荀理之寓乎文渾厚嚴密與經表裏其他書言非不工然不自儒出故舛駮雜亂過目之具爾習之則疵吾學荀子之書違道百一孟氏之流歟楊雄固多愧況王通氏乎予窮經攻文也久知玩是書而此本字大少差甚快老境姑齊其句讀藏示子孫有未善未能以意斷者甚多此則有待焉題長慶集樂天人中龍其學粹詣其操守卓偉盡愛君憂人之心而不害為放達超勝讀其遺文如挹清揚而親譚麈也此板在平江公庫嵗乆漫滅予以意補葺之遂為嘉本時與䝉荘宣公之書表裏誦之莫知其孰為優劣也題六君子古文後古不以文名而其文垂後邈不可及人非學而能何道使然哉後之人有志於古必力學僅自立學雖力而不至焉者皆是也古文衰于東京至唐韓栁則盛未幾復衰至本朝歐公復盛起衰為盛非學力深至不能予是焉學乆未有愜于心乃取六君子文類而讀之如昌黎之粹而古栁州之辨而古六一之渾厚而古河南之簡切而古南豐之密而古后山之奇而古是皆可仰可師集而參之肆吾力焉庶以逞吾志如諸公之墓誌表尤奇筆然不勝其多又不容率意去取姑置之云題東堂詞集毛澤民集合文詩尺牘樂府為十五巻刋于嘉禾郡庫予校文秋闈得是藏于家細觀静閲其眎蘇氏之門秦黄晁張陳李軰未遽輩行要為當時文士伯樂肯顧寧復凡骨士之從事斯道當貴重之題陸宣公集孔孟栖栖旅人萬世師之屈于一時信于無窮聖賢往往一揆陸宣公一代人傑其模畫經濟伐謀切機制物務而洞人情王佐才也而文采論辨雄放不窮異世之賈誼劉向歟徳宗不得已而用棄若斷梗一時共事姦憸如盧杞裴延齡之儔睨之埶仇然不逐之殺之不快也可謂不遇至本朝眉山公剡章上其奏議推尊之甚至我夀皇聖帝又命邇寮分日進讀今日之幸視昔之不幸不啻酬之蓋道不同肝膽椘越心契而道一越宇宙殊古今猶同堂共處也夀皇後世虞舜而眉山公孤忠奥學輩公無忝者使兩公同立乾道淳熙之間都俞拱揖足以挽回泰和之治不待推挽之勞謀斷之須乃濟也予前後訪求公書皆不得善本淳熈己酉考嘉禾試竣事郡侯以是賮行紙薄厚得中而細𦂳潔白字端謹遒楷遂三讀而藏題范蜀公奏議蜀公景仁東坡之所敬畏迂叟歎慕以為不及者其愛君憂國之心立朝經務之節槩見于此予校嘉禾秋闈試得此書惜其多有漫滅妨讀誦俟求善本改正而藏之題東堂集問牀頭之易了其非癡補射朋之缺驚其所能非定從楚庭毛遂下客爾士不外示其抱負何如也毛澤民仕臨安其守東坡坡士麟鳯也晚乃受知予讀東堂集玩繹諷味其文之瓌艷充托其韻語之精深婉雅視秦黄晁張盖不多愧比文宗學師不彼即而彼即之其賢於世幾等此集嘉禾有板予己酉嵗攷是郡秋試郡将趙侯送似遂得寳藏之題活人書予為舉子時朱肱傷寒活人書愛而讀之百問十一巻略能上口或曰治傷寒祖仲景是何為者予惑之後問友人侯元英是書多稱仲景能無遺説乎曰是不惟於仲景無遺説曲通傍暢凡傷寒書幾盡矣元英良醫人所服予所敬者然後知説者之妄愈益愛其書得是善本表裏六經課誦之并識之以詒子孫題養老書予㓜則多病阽危屢矣自以為必天死無生望今老矣多病自若然必死之念十减八九盖不善用壮而善病也使推用病之見於用壮時康寧上夀有不足道諸子求得此書以吾老且病其為用益宏矣然其術中國所傳彼固言之矣藥食好凉中土則宜用之東南當即此語審處之題本草單方一則專多則雜事物皆爾況藥之用於病乎予㓜多疾好窮藥性嘗用香附子用木賊用露蜂房皆一再騐其法盡載本草書人顧不熟讀之爾思欲會蕞擷攬以應須者未暇也不意此惠術有先之者是書板在四明予宰定海首得之列為三十五巻始于服餌終于婦人小兒雜療法亦備矣然條分類别一閲可見益知異人世不乏才賢有識所在有之装校藏秘不惟自衛旁濟醻其夙心而不假編集之勞晏享此利紹熙辛亥十一月朔書書之何志喜也題程氏易傳程氏之學與蘇氏角立通儒碩士不可偏廢予得蘇氏易傳又得是書繙繹閲誦多相發明予所謂不可偏廢者非然歟規得善本正其漫滅訛舛而藏之題隋書隋文乘時僥倖据有全周之業陳氏失徳天復假手斃之奄覆六合志得意滿以為萬世金城之固而無得於君道不學而自任莫足固締天下之心借不哲婦訌内孽子蠱後詒燕維持之計索如也何能長有天下且若是再傳而滅誠非不幸然其一代興置廢革與夫忠臣義士謀謨著述之徒儒者不可不精攷以為法戒是書八十五巻舊十七冊本在紹興予介察推汪公印得之併為十一冊題春秋名臣傳春秋人才尚餘三代氣質然非左氏之文雄古嚴密亦孰能敷叙發揚如此其言與事隨編年而書君子欲其迹之本末可攷辭之連屬畢見或類而為之傳往往失之漏畧此書成於賢良王當不惟該備無遺而復引史記國語等書補苴彌縫之而終之以贊多出新見學者與經傳參讀既足以見當時人才出處語黙之大槩抑於著述體制所得将不貲予宰明之定海尚書羅公寄惠此本字真紙佳真吾家之至寳也題長慶集樂天一代鉅儒讀天下書無遺而發諸其用其道自事君行身即功揚名有餘裕矣會粹此書淑諸人法後世偉哉可師仰也此本板在四明予印得之暇輙課數紙振發舊聞之遺忘者其益不貲其間差誤亦改定一二紙𦂳好夀百年未艾也子孫其寳之題沈氏易小傳諸家詁註易多矣有得必有失觀之者集取其徳無惡也然未有得春秋衆賢用易者惟丞相沈公黙探鈎取而發千八百餘年之遺意筆為小傳皆以春秋君子用易之説充而周之沿而求之源而流之邃哉妙矣是書也可不心醉焉蔡墨言龍而曰在乾之姤曰潜龍勿用初九變則姤也同人曰見龍在田九二變則同人大有曰飛龍在天九五變則大有坤曰見羣龍無首變而盡則坤坤之剥曰龍戰于野坤上六之變也丞相之學其本如此然其間猶不能無餘意遺義取之未盡求之小差者叉嘗潜心焉因而穿鑿其說則過矣亡友周令譽卿授予一紙書乃春秋時戰法其法純用易而盡屏卜筮家神将時日諸説周云上庠一士人出意用之占事如神乃知讀古書可得古法思與不思爾沈公深得之者予又知夫讀書不惟徒役心目而已題孔叢子吾夫子五經論語孟軻氏七篇與四時俱運日月儷明可學不可議可窺不可窮其餘家語戴氏記禮雜以漢儒之言非孔孟比學者精擇審取之其悖鮮矣孔叢子又次二書然持論正守道嚴孔氏家法儼然在是自孔氏者不可無此書是本字大而楷少差誤可寳藏者盖傳之於四明公庫云題孫先生春秋解春秋經社吾鄉故中丞孫先生莘老與為之晚又為之解其於經窮盡該備幾無遺意遍訪親舊客有以遺贈者遂為全書豈天為斯文地有物呵護歟何乆暌而忽合也稍正其傳寫之誤而藏于家俾子孫知其不苟全得而易之昊天不宜題孫公談圃吾鄉當祖宗時名士輩出坐權臣訌䆒罹釁避禍多寂不聞世孫公一代偉人後無傳焉談圃所記無非植名義資見聞為益不貲如為言官時論張問吕公績事其危言谹論此類必不一無從考其詳矣其詩法清麗嚴宻唐元白流亞亦不得全編讀之為吾輩師法公之不幸如此然非劉公延世紀其緒餘以示久逺遂湮滅不聞耶今檇李張公守吾鄉仰公風節持論大書鋟木博其所傳以淑多士其道因二公粗見猶為幸可以慰公九京矣題南華真經是書一已足今乃三因自笑其廉於世利而貪於書題百一方予少多病刻意方書且博求於人得於方書之外往往取効如意嵗丁巳之官京西正月十有八日謁漢陽使君王公璆公一見如舊知問為政不吾靳因惠百一選方一部四袠予向之求而得用而效者盡在焉乃嘆得書與識公皆不早也公云吾裒集十九年乃成書其勤如是我輩顧安享用之士君子以仁存心凢其濟世利人不能行慊如也公之此書足以醻滿所志而況政術父母斯民有不可掩者在予皆不可忘故識之題國語左丘明傳紀諸國事既備矣復為國語二書之事大同小異者多或疑之盖傳在先秦古書六經之亞也紀史以釋經文婉而麗國語要是傳體而其文壮其辭奇畢萃于此學者表表讀之乃可吾家藏是書乃監本也句而音之是書字尤大紙不惡尤可寶惜而制置袁公自成都致房州見贈焉驀山絶壑凢四千里噫公之意厚所遺物在此不在彼吾敢忘諸題方舟集蜀之文風自文翁始本朝東坡先生起于峨眉文章節氣照映今古坡其文翁後身耶蜀人社稷文翁而天下師尊東坡盖無時而已也南度之後二李先生以奥學奇文名天下予来房州制置袁公以方舟集見寄始得盥誦熟閲之如拱侍文翁而承坡仙謦欬而瞠乎揮掃時偉矣盛哉坡仙一代名師而當路欲殺之方舟亦起輒顛頓不大施以死天之於二公徒予之名徳而靳諸榮利何歟豈斯文與富貴同意未易彼此輕重而不可兼取之乎二公同時之人熏灼目前而寂寥身後或者羞道之則天之意重此輕彼决也儒者觀吾言可無沈嘆題石次仲燒尾集予昔官當塗讀石刻慊然也文乃宗教石次仲聞譽之者不敢信盖二十年矣次仲已死官房州制置常伯袁公寄次仲此集并漢君臣歌細讀之與昔所閲若出兩手何歟豈次仲得於文不若詩歟抑偶不工将既病乃作之歟此集實有可觀然文終不優於詩决矣題邵太史西山集邵公濟博康節孫子文之子溥弟也其文章贍縟峻整傑出南渡後晁以道嘗曰恨六一東坡不見子以道名重一時非多可者設二文忠果見之其必置之蘇子美毛法曹之間乎其於熙豐元祐用事臣涇渭去取正色書之曾無依違使人増氣盛徳後所立偉然天報之也此書板在蜀予丞房陵制置常伯袁公惠五書此其一公知我有好書癖致之不憚逺負以馬盖綱卒也其勤叵忘况吾之能好常伯之肯致子孫繼吾業歟皆宜念且寶之題家語孔氏家法盡具論語矣家語雖雜以漢儒傅㑹悖理法者少自孔氏惡可闕此蜀本紙佳字大盖制置袁公所賜去眼四十有八年迺今得而有之何念之深類酆城之訪劍不索則獲幾象罔之得珠書以志喜云爾題韻類坡詩東坡仙伯之文韓歐伯仲其於詩邁往勁直之氣溢于言外而其嚴宻腴麗清而不浮工而不露學者與子美表裏可也予㓜則誦之上口者千餘篇中間局于科舉置不暇及盖數年壯則仕仕不達連厄窮鄉官事小間得尋舊學創以韻類其詩為五䇿凢一千三百九十一首於食飽散屐㣲吟長歌曵杖捫腹不惟玩繹磨礪其規律而窮塗鼔吹盖無以加此題韻類詩史學詩三百篇其祖也次楚辭是二經不于其辭于其意意無有不道也杜子美古律詩實與之表裏予讀子美詩能上口来房州多暇創以韻類之庶便歌誦成書矣編之多舛不倫以予疾意草草亦吏筆繆亂再整之善是則子孫責予老且倦矣安知絶無如予者抑安知無㢏予者昔龎祐甫問詩法於東莱東莱問之曰子讀子美詩乎能暗誦矣乎未也授以善本予方他之反将語子請誦此既還復問則皆上口東莱遣之曰子自有師矣龎自是以詩名孫仲益稱李師武誦子美古律詩十巻不遺一字前輩尊信如此悠悠視之何也本朝東坡黄陳其正𣲖予亦韻類坡詩干三百篇幷黄陳詩皆能暗誦然詩學終愧古人又何也題大易粹言予學易始得東坡傳後有沈丞相小傳幾足矣今復得粹言其間載諸公所得深者叅舉而互備此板在舒州已就漫漶又遲之将不可讀予修之兩月餘為佳本是三書日在案樂則鼔吹富則封君又師其嚴且温也其思嗣吾志哉題七書長孫㦿得官右列勢須習七書乃仕求于金州大将李公珪惠以此字楷紙厚可愛玩付㦿讀之予亦揩摩老眼時誦一再過或命㦿誦臥聽之爾索之武略予求之文法此書言從字順未易專以武事待之老泉先生以孫吳簡切與遷固併論之亦是意已題夏文荘夏文荘公辭藻絢麗自其始學即含臺閣風骨老尤雄健不衰當聖君貪才天下右文之時是不容不富貴者而其所以富貴則不能不使予悲唶荘子以義命為大戒士當後窮達先所守予求是書于鄂守鄭㮚得以藏于家使子孫寶之而又知予意故云題孟浩然集後孟浩然襄陽賢士當世名公猶欽慕之髙懷清致使不能詩亦時楷式而是集所載謹格律於閑淡隠嚴密於紆餘不深於詩未必知之當時里人作浩然亭後更為孟亭謂賢人不可名按本傳孟浩然字浩然猶郭子儀字子儀彼恐人拘此故以名為字耶目以浩然亭無惡也祇示思賢之心易見爾而顧更之何歟慶元己未孟秋九日鄂進士張君該惠此集舟中細閲因識之題四時纂要書不正而富苟焉而貧君子不予用是書未必遽富按圖從事十舉三四其不貧必矣不貧而義毋惡也然必以甲乙占驗冠于月始亦六經史漢備天人意耶於此而拘則害乃事讀之者謹之題太倉稊米集嵗丙申予尉太平之繁昌客臧仲文自當塗訪予臧能為詩而未已者頗尊信周少隠詩録示數十篇要為得詩之法恨未盡讀也来襄陽帥許公以其全集贈行舟中無事藉以遮眼珍投也然詳讀其詩了知其楚人此固細事無之則尤佳爾題䇿府元龜博極羣書文史足用記亡書三篋寫五行志誰不樂此然人才不齊有不容彊士耻一事不知則類書未可忽也䇿府元龜一千巻章聖皇帝命為之以恵學者類書莫詳焉自命下至大中祥符六年凡厯數載自王欽若而下大小臣編摩校勘凡二十九人吾為儒思有之凡四十餘年乃醻其志是書都大王公賜也自成都之襄陽走三千里夫其成之久求之不易致之甚難束閣不觀委之蠧魚䑕矢此非吾佳子孫也書以諗之題衛生家寶方予㓜多病老且衰偶未死然亦以收方書故延視息至今諸子以是為憂故凡方書聞見必求之必得之乃已衛生一書尤為該偹精宻房之醫者李生有之遂傳其本一再用良驗其版乃南康軍何人家或曰遺火灰已久矣是寧可不傳尤不可不寶藏也題宋百家詩唐百家詩類以事此詩類以人比唐尤詳博人有能不能詩有工拙似不可以人彊取之曽公所編不必皆以詩名予猶惜之至金絲宫羽之雜奏金翠朱碧之相暉鏗鎗煥昈略無間斷噫富矣是書二十一册六十一巻蜀本也魏提幹南伯見惠江湖長翁集巻三十一
