body:
  text: 江湖長翁集巻之三十二宋陳造撰論姚宋上明皇在蜀論肅宗用房琯知非破賊才姚崇在賊不足㓕至宋璟則曰賣直取名爾人各有見自其見持而有為而治亂盛衰形焉明皇之言平昔之見在是宜其致天寳之亂也陳子曰精于治者無善治之功精于醫者無善醫之名無功無名非果無之也銷患於無形故無功除病於未兆故無名而功名者次之功立于有事名著于有病天下孰不功名者之貴而精于治與醫者不然古之聖君賢臣講磨治道圖回天下其詳載於六經六經之書明並日月功配造化然大抵皆保治之術所以維持締結使天下無事禍患無得而作是六經之㫖也其大意必曰正心曰脩身曰納諫曰畏天心通下情勤政去佞如是數端而巳未嘗曰兵何為則敵摧刑何為則人畏智詐勇力何為而用之凡二帝三代所以持守天下求諸此足矣若曰鄰國見侵非孫吳之智不可以取勝疆事見告非韓彭之勇不足以得志是後世之君臣淺之為治治不能安天下於無事幸則揭丹青以自夸大不幸則委蒼生於虎狼之口者也非六經之所貴也和扁之醫觀色察脉必告曰勿為是勿嗜是而疾自銷於㝠㝠矣推床撼屋噏噏求死焉治而藥之曰吾之功起死或者甚其疾以自大其功功則功矣非和扁之所貴也姚崇才有餘而工於順適者也宋璟才不逮其節而以直弼正其君者也委二子於干戈繁興事變搶攘之地姚固有餘宋果有不能辦者然朝夕納君於正率臣下以無枉使天下之事變無自而萌則固屬之璟矣天下之理順適者可憙而守正者似乎矯拂振辦者類才而靜重者似乎迂濶有可喜之功者必售無媚上之具者易厭自古皆然况乎明皇以英睿通逹之資適久安無事之時志意得而侈心萌其視迎刃破竹適巳便勢如崇者安之久矣璟乃一切矯而正之然猶相之數年者無乃迫於公議姑惟留之其心固巳氷炭惟恐其不去也其真情非在蜀則至死不露向之君相之情特矯而忍之以相彌縫爾主人有直其突者又積薪焉客勸以曲突徙薪不聼也一旦火其室鄰里救之而止牛酒勞之曲突徙薪無恩澤焦頭爛額為上客或者得以譏之宋璟之正曲突徙薪者也姚崇之才焦頭爛額者邪使三代之君得二子任之輕重固有主矣惜乎明皇不足以知此也姚宋下或曰明皇之相姚宋首稱予謂天寶之亂姚優為之顧乃優宋何歟然則排難解紛之才無貴於世乎曰非然也世所謂才者非獨後世貴之先王亦貴之矣才貴乎用尤貴乎有才而不用才者有事而後見於用者也儲其才而無事焉才惡乎用是最先王之所貴也先王之世凡智可以立事勇可以摧敵拓弛不羈之士莫不兼收而不遺以備吾不測之用然卒不用之者正以有深謀逺慮正已率物之士相與周旋朝夕有一善推而廣之有一不韙矯而正之天下之心素服而禍亂不得而芽蘖智者無自而施其謀勇者無自而效其力矣猶之善攝生者天雄烏啄莫不儲峙以待一旦之急而卒於有而不用也平居無事薄滋味時起居血氣内和外邪無間則天雄烏啄之屬可用而不用毒藥之用身之不幸也才者之用國之不幸也姚崇之才天雄袪寒烏啄療風才則才矣抑節宣導養使身無恙患天雄烏喙置之不用璟尤賢哉古之賢相不獨於天下之才藏於不用而於一已之才當其用也猶不既其用其意深矣禹之征苖三旬逆命乃班師以苗之逆禹之盛徳豈不能一戰脱與之戰豈不必其勝邪周公征三監居東二年罪人斯得兵聞拙速以三監之悖周公之聖乗之如拉藁爾又何待二年之久聖人之意必曰戰而速勝故吾之功而置吾民於死傷國必不堪而吾深不忍也故寧不戰而去與徐而待其斃毋寧為是角一旦之命使吾民肝腦塗地也而禹方且諫舜以惟徳動天周公作詩貽王言王業之艱難凡其嗇於用才而必於納諫當有事之時猶然况時無事也乎臣而有愛君之心寧數諫以保其無事毋寧幸有事而露吾之才可也武帝之時不能安於無事以守文景之業汲黯獨憂之而天下號為有才者莫不幸之挑四夷則黯不如衛霍深刑戮則黯不如張杜掊財利則黯不如𢎞羊孔僅辨論蠭發移人主心黯又不如終軍壽王之徒至淮南萌姦乃獨憚黯曰好守節直諫自俗儒論之黯幾無用之才孰知規君以正保天下於無事在此而不在彼耶姚宋之議灼然可見矣嗚呼璟與黯其所以息未然之禍皆本於諫而二君所以不安二子正以其敢諫一以為戅一以為賣直納忠於君顧不難哉三代之君臣專美於前有以也夫辨異聖賢之為學務窮天下之理而不盡必天下之理天下之理有可必者有不可必者可必者必之聖賢所與天下守是學而共之者也不可必焉必求必之則吾之説窮而吾之學始為異端勝異端之勝吾學自夫趨吾學者之不專而若疑若信於異端者之衆也今夫孝也親必悦忠也君必與謹懼無禍患勤儉無空匱是可必者聖賢必之以教天下天下諭之不勞也四海之大九州表裏耳目之所不際智識之所不慮吾必以有無必之則其説必窮昔吾夫子古今推之為大聖其智博矣而弟子載其行事則曰不語怪子之不語其意蓋深矣一語於口則是形為有無之説且以為有耶人愈惑且以為無也而一或有焉則吾言誣矣孰若不以為言不以為言則不必其有無而人皆返而求吾可必者竊嘗怪傅奕韓愈之徒忿佛老之為害而力排之深擠痛抵曾犬彘鬼蜮之不若其於衛吾道意則信篤矣惜其一必之於無有故不能挽回天下之心天下之心既巳受彼之欺其㴠浸巳久其服從巳深彼二氏之教亦異域之一術其偽言佞説亦深有以鼓天下之俗而刼其心者亦孰能的然必其無也吾必其無是理無是法無是事無是用不幸而有其一而吾之説則敗矣吾之説敗而彼之説則愈熾矣孰若專持吾學置二氏於不言之表示人以邪正而不必之於有無彼或未能去二氏之滛説吾若不聞焉如春風之花自開自落春木之鳥自鳴自止我軰何有一君子守之衆君子繼之吾所守之卓彼無得指其有以質其無人亦徐而悟其謬悠趍吾者愈衆而專矣此不亦吾夫子之意與昔阮瞻惡言鬼著無鬼論一旦鬼至其前瞻懼而病病而斃使人言鬼而瞻不言不害為無一以無必之乃敗於或有佛老之説鬼之或有者也其無以有無必之哉或問佛於王通曰西方之聖人也欲推其教於世則不與彼盖知佛之為教可施於西方服教之人以之中國是中國而西方也通之意未嘗以其教為無有似矣吾夫子之不語怪然謂之聖人則失之太甚未有謂之聖人而吾徒無取焉者若佛者吾何取乎彼傳韓必佛老於無而人不從王通以佛為聖人而人益惑相去一間皆未若夫子之不語為後世之慮深而衛吾道之心宻也秦秦以夷立國以屠驅民以盗取諸侯無足道者然究觀其始末良有可惜者矣夫人惟知道而又能逹天命也則動可以至於無窮逹天命而又有道焉則不怵於外矣秦之於道何如哉其於天命何如哉道無所乎知天命無所乎逹而苟以就天下未有能得天下者也幸得之旋失之則亦無得巳矣昔三代之有天下惟深知天命而不以天下為巳私而專以道守之故聖人之興也能以道授之子孫而不必其子孫之有天下非深知天命乎商之在夏周之在商其祖皆嘗臣堯舜者其子孫皆夏商之大邦元侯也所謂五侯九伯汝實征之者其勢偪矣夏商不忌之其心盖欲子孫之有所顧忌而無失乎道也云耳秦之於周亦周之於商而商之於夏也周之子孫曰淪於弱吾意不獨周之心屬乎秦天下之心不之秦而之他者盖無幾也人心者天命之所係也晉之裂而三也是天命之之秦也始也晉不裂則秦無能為雖有所為晉能制之晉裂矣天下不之秦而何之也楚之君無美質無歲不亂齊自小白其君亦無美質無世不亂能為天下之軒輕而周之所倚者晉也今且屢亂而遂亡為韓為魏為趙之三國向也三為一秦猶與之更勝迭負今也一為三彼於秦何有而秦之君徃徃務本而勤政好賢而用謀使其旁選天下得一二淳厚逹理之士輔之破功利之淺説變戰國之餘習率天下而宗周而治其不然内則尚徳教厚風俗聚天下之賢士以圖久逺之計不心乎取天下則天下之人有所赴愬焉捨秦而之他乎秦之君臣不足知此汲汲乎常恐天下軋巳若不能一朝居者故凡可以就之者雖穿窬負販苟賤之行靡所不為吾亦良為秦惜也雖其弊有端非功利敗之也乎功利之説自管晏則倡之其後遂不可遏流而為縱横變詐長短捭闔之術狙詐者逞而儒先束喙不談先王之脉絕矣秦承用其術遂挈天下而屠之而亦自屠焉理勢固然無足怪者吾特痛其始有商周之勢而不善用之不得不為一言秦二秦恃其強以刼六國而亦據其勢以愚六國刼之無以愚之則六國或悟其情其從必合秦慮及此故時以愚之秦之取天下雖專於力勝詐取然亦不可謂不巧也吾嘗怪六國之君以五倍之地十倍之兵合從以支函谷從人又惎之以秦併天下之勢六國自救之説其君亦或鞠􅎽太息請計受事然皆驟合而俄散暫從而倐横終不免中秦之禍何也則是秦以計愚而欺之也秦之取諸侯也不專取之也取之而時以與之故亦不專為戰而時與為講不專示其必勝可畏之形而時亦示其懾怯不自必之勢使六國譁駭失據若講若戰謀皆不能專而秦以得其志矣其攻韓也今年取我宜陽明年與我武遂今年與我河外武遂未㡬而敗我伊闕其攻魏也今年取我汾隂皮氏明年歸我焦曲沃攻楚無虛日而或厚賂之至與之上庸之地釋趙而遣質講楚而結婚使車縱横於諸侯之境亦皆重其幣佞其言秦取之而亦時以予之攻之而又釋者是其愚諸侯而侮之也諸侯之心雖知虎狼之秦摶取怒噬以窺天下見其方操之又縱之方見攻又復講焉故狐疑隕濩謀不自必而苟且之心生矣謀不自必則無堅久之慮心乎苟且則其勢可以刼而取甚矣夫秦之愚諸侯如戲嬰兒於掌股之上而諸侯見愚而不悟亦深可笑矣哉秦之取者七八而予者二三取者尾閭予者畎澮受甘言之佞苟目前之安明日之患不暇計六國尚為有人乎不獨是也欲攻安邑委宋於齊尋以破宋罪齊欲攻魏則以南陽委楚未幾以塞鄳阨罪楚張儀商於之事商鞅公子卬之約藐焉無人視敵而諸侯亦卒無以郤其戲侮之者吁可嘆哉使六國有賢王焉輔之以智謀之士明言秦之情而告之以其必至之患親仁善鄰為不可侮之備則秦将終身没世不能自說其不信之罪諸侯不出此而秦由此乎終如其志亦諸侯可以愚而侮之而後秦侮之歟古所謂知彼巳者秦幾矣秦三秦既巳一天下隳名城銷鋒鏑殺豪傑欲以傳之無窮二世而亡之或者罪秦以不明取守之道怪其不以仁義守之是以速亡愚獨以為不然秦之為秦也有六國則可以持秦六國不存則不可以持秦况天下乎秦之先起於西戎之僻漸進而與中國齒其始也雖無以大過諸侯而未得罪於天下也自六國忌其彊欲擯弗與通則於是慨然發憤求自彊之術世之媒富貴之士不皆原始要終為後日無窮之計者鼓其說而作其氣惟富彊是務而求勝六國切切乎志於彊而心乎勝不暇問其他張儀以口舌進疢巳兆矣商鞅以其慘刻不仁之術用而厚其毒秦之俗如狂陽内盛之夫脆之骨豐之革跳梁摶撃而其脉寖㣲人遇之非不徤勇可畏而盧扁巳借憂久矣秦民之耳目心志習尚惟得是計惟詐是為處彊而置人於弱惟是為務蠢然趯然不能自巳六國未斃而與人抗衡則固君民之間併力一意不敢少懈以蘄遂乎進取之計有秦而無六國則非特君不能安其俗而民亦不自安之也民不自安其俗未有能帖然而無事者而其粗可以僥倖覬無事必其國無隙而後可而國不能必其無隙也如國何如天下何故曰秦有六國則可以持秦六國不存則不可以持秦况天下乎朱温唐開平中朱全忠令蒋元暉殺昭宗自立為帝國號梁陳子曰吾讀春秋而得仲尼之心仲尼之心其為萬世慮者甚深春秋一經為周作也其所以憂後世亂臣賊子盖切也惟憂之故防之防之且通之防之使有所不敢為而通之使有以自慰而死其滔天無藝之心是意也盖熟讀而精思乃得之夫周自平王之東盖日以就衰㡬不復振矣而大國虎視其地十于周而其民百者有若齊晉秦楚小國諸侯不惟奔走奉承之不暇而見侵見襲且㓕其國俘其君無歳無之而駸駸乎改物之舉矣至孔子而彌甚意曰後之視今焉知不如今視昔耶於是筆削春秋以示萬世二百四十二年之間齊威晉文莫彊焉仲尼筆之于經貶之不恕也而終予之觀聖人貶二君之意所以嚴君臣之分貶之而復褒之所以通予奪之法威文之在當時其競莫禦甚偪矣一於貶歟後世有競彊逼近之臣如威文者必曰賢如威文宗周如威文經終不貸矣吾何賴是絶其自愛之心而趣之為無君者也故必正色予之而後後世之臣往往以威文藉口以服天下而天下察其威文如也而予之聖人之於威文其曲致其防而通為之法者凡皆為後世計也而後世亂臣賊子瞢不知聖經意而其臣亦非有得於春秋者往往以改物為快而斷焉莫遏其無君之心如温者神器則巳移而無君之心巳酬矣而亦終自擠於赤族之禍太史公曰為人臣子不通於春秋之義者必䧟簒殺誅死之罪其實皆以善為之而不知其義被之空言不敢辭夫不通禮義之指至於臣不臣向使温少得於經而其臣有讀春秋之士終身甘為威文于唐挾天子以令諸侯假仁義以號召天下天下英雄孰能與之抗唐亦周而巳緜緜延延擁虛器於上而糾合一正定襄王郤彊楚之功拱挹而有之而尊富壽考子孫燕樂盖孰得而睥睨也哉釋此不為必欲化唐為梁温向之以雄彊稱而羣雄莫敢議亦以戴唐爾一旦受不義簒弑之名以立于天下天下之心孰肯畏無唐之朱温耶温之赤族不在亞㳄入汴之日而在元暉剚刃之時决也然猶跳梁躑躅數年再傳而後亡以地則大以兵則彊而其狙詐雄暴獨優於人而羣雄皆齷齪不見天下之勢其交不合其志不果故必待亞次而後假手焉噫忠孝之道人心所固有雖唐末大亂之世而是心曷嘗一日泯想温之業既成之後天下之腹非隂議日鰓鰓焉有待乎英雄起而亡之楊師厚其臣也方温之肉尚暖而巳豚犬視孺子矣即師厚據有魏博之心窺之及温之生也力能斃之其起而乗之何後之有昔者侯景逞于梁一旦廢簡文郭元建景之腹心且謀主也其言曰挾天子令諸侯猶懼不濟今乃爾是自危也設簡文在景奉之猶足以刼制江表簡文見廢則景乃負乘之小人懐璧之匹夫其誰畏無君之侯景耶古今君臣之分其幾如此皆不逃吾夫子所慮項羽弑義帝高祖為縞素或勸曹操自立曰是兒著吾爐炭上古之英雄其知之審矣其亦偶有合吾聖經耶蕭望之望之堂堂折而不悦剛風勁氣在漢鮮儷然卒為㳟顯所殺班固以為近古社稷臣陳子曰古之所謂社稷臣以死許國而不可要以必死事君而易於死非徒無補於輔導適足以肆小人之惡而使國無所頼耳范蠡深謀二十二年然後能報越以刷㑹稽之耻則曰主辱臣死所以不死為此事也崔杼弑君或者疑晏子以必死晏子曰君為社稷死則死之非其親嫟誰敢任死衛獻公之復也由子鮮寗喜倚之右宰糓曰子鮮多而能亡於我何為及獻公殺寗喜與榖子鮮果無所為而亡之晉然則事君者不惟社稷之計倖倖焉以死狥國否則去之此尤為姦人所料而墮其術故子鮮不免於去而恭顯置望之於獄而望之仰藥死望之死而更生堪猛或誅或逐元帝無復有治平之期社稷之臣果如是乎使望之居羣邪之間堅忍徐伺無輕所發以待帝之覺寤去數小子不難矣此予所以為望之恨而嘆范蠡晏子之風鮮能追之者僖負羇晉文過曹曹不之禮僖負羇妻曰公子必得志盍早自貳於是饋飱置璧文公果伯而厚為之報人皆賢其事之先見而是負羇之從善然居其國而外交以邀後福君子所為固若是乎既而文公入曹亦以不用負羇責之而報其施魏犨顛頡怒而爇之陳子曰負羇過也公亦何為喜於此而遽賢之耶衛綰不見太子而景帝悦文公之喜負羇一巳之私耳亦非賢君之度也負羇圖報而得禍文公喜而厚之適以禍之魏犨幸免而顛頡被誅一舉而起三惡婦言之不可聼其效如此哉主父偃執仇許客者必窶人子而援溺之惠不可望於千金之家人惟不甚自惜而後蹈危以有為有所惜則有所畏所惜者愈大所畏者愈重此人臣之節所以競挺於下僚而銷耎於高位也主父偃自布衣上書諫伐匃奴而武帝悦既而勸築朔方以為㓕敵之本偃之前書何芻狗之遽也當是時帝以爵禄籠天下士而尤鋭意武功偃官尊位寵惟恐一日失帝意以失所有也顧可以中其欲者無出武功耳士以患失為心鮮不䘮所有而敗人事哉劉栖楚諫君額叩龍墀及入李逢吉黨遂為小人之雄人以栖楚為偽於初非也其初未有所顧惜故視名節為重而顧進退為輕及夫權臣誘之利禄媒之昔之競挺敢為之氣轉而為憸佞用矣寗荘子古人言天求其理之不可以為偽之者言之也而或者竊之以濟其私又或竊之以欺人而君子未嘗不窺其情僖十八年邢與狄圍衛衛與邢同姓也邢刼狄以伐之罪不可逃孔子人之既誅之矣衛欲雪此耻而國方大旱寗荘子曰昔周饑克商而年豐今邢無道天欲衛討邢也於是㓕邢二十五年書衛侯燬㓕邢名之者貶之甚之也邢人而衛名惡浮於邢矣寗子竊天之言以逞衛侯之忿以斷國人之疑可矣不知當是時諸侯雖無伯校徳量力衛與邢未能相絶也其可為伯之事乎其謀之也禮至以昆弟仕而譎之伯討類是耶禮至之惡與寗子均丘明惡禮至而不及寗子丘明亦受其欺耶不然誅賞不公矣江湖長翁集巻三十二
