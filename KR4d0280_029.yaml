body:
  text: 江湖長翁集卷二十九宋陳造撰傳蘄處士傳蘄處士其始祖蓋大橈之别𣲖母初娠乞名於橈橈曰是將得吾之數而先乎人者故以先名之及長器局方正好潔而便靜喜縱橫泛交多可自王公庶人有好之無不往往輒從容竟日至於間逸奇窶之人掘穴嵌巖棲遲之士尤與之昵往往定忘年之交先以有行自矜其實挾數以遊世機變警敏無與敵與之偶者莫不過為之防勞役其思慮若疏而忽輒有所失坐是亦有厭而逺之者其厚者弗悔也時黃帝經理天人披山通道功未竟而蚩尤氏旅拒於是有涿鹿之役號為多事萬機之暇時亦命先先進侍率漏下十餘刻未休左右媢其款狎以為言上曰為天下誠不可近小人如先何議且非是何以怡神而休其暇日眷遇不替然命之則往弗常進也帝之仙也先不之知自斃以徇偕弓劍葬橋山子孫甚夥而秋獨能世其家從而學必待其專心致志乃既其術秋之苖裔散在夷夏皆以處士名秦漢而下俗愈不淳處士之術愈售至於博塞泉賄必見命景帝時七國反吳濞為戎首或曰前此其太子留長安死非命濞藴忿久矣處士有力焉孫氏吳時士大夫多從之遊韋洪嗣者深疾之正衙彈之曰蘄氏弊族也任數以肆欺好勝而喜殺欲贏而置人於貧苟生而不恤人之死迷而不反不惟氓𨽻而已士大夫亦為所惑臣不曉其故今魏蜀未滅正䇿士效謀雄武用力之秋而一近蘄氏則置不動慮玩嵗愒日士氣益􅒒願陛下奮發睿斷屏之逺方不齒于中國而後二方可臣海內可一矣上是其言下詔禁諭而不能絶是後人主亦或好之宋孝明尤甚自以為莫逆於心者其實不然近臣之推避蓋面諛也處士之自出河間象氏沙苑馬氏因處士而進皆得幸然不若處士之嬖云贊曰孟氏有言君子之澤五世而斬議者以是論世蘄氏之先不聞其有大功德若舜禹羲稷者子孫何其盛耶其交若無遻與人方圓以是有聲而韋洪嗣疾視之詆之不遺力豈亦古所謂鄉原者乎佛老二氏至漢乃有之今乃蔓延浸漸與吾道為盛衰雖以傅奕韓愈辨之力拒之果欲絶之而反熾况先委質黃帝而以其身徇為中國著姓逺矣吾宣聖又嘗舉之以誨羣居不知義者彼且藉口洪嗣之言矻矻乎難入宜哉無長叟傳無長叟其先占籍解梁以郡為氏有名丹書改其姓虺氏因亡澤國子孫散處汙耶之鄉或曰有餘以不足名長以短而形是子風韻丰美無所短何長之足言故以無長目之叟始生也毋卜之得坤之剝卜者曰是蓋坌於地而剛外黃中而剝膚捐軀以徇人其墨者之徒歟為人郭索媻姍健武好勇介而戈若可畏然人得近之無患也性喜霜而惡霧不隨俗為生常假穴以居如上古時越子方懷報吳徉下之日進種蠡問計䇿意殊不酬叟因饔人進見王薪臥膽茹纍然也因問王曰王富貴玉食無欲矣而臞瘁乃爾非以吳怨未報耶今所咨非蠡則種二子外無得也豈捨是絶無可使者二子身則越而遙計吳能使越治而不能使吳不彊臣之族大半居吳願為內間濳耗其國待其民貧食艱王起而乘之庶有功王曰善既吳稻告成叟之族一昔戕之剪焉無闕為病越子乘之吳大敗後果滅吳叟之力居多越子既并吳甚重叟叟亦不以功自多國中自王而下小夫庶賤凡生齒之類咸供其求有味其風度而饜飫其道交口稱之曰自叟之來吾食必飽飲必醉叟固無不可蕭然傾坐正復藉糟含飴時爾尤得幸於王雖尚食或觴羣臣若內與后妃燕未始不侍左右近幸尚醫之徒勸王疏之未能也思有以傾其愛乃進東海薄氏虞句章江氏瑤石氏首王接之果大愛幸叟為性躁擾不能無望一日揖三子曰當越尚弱吳主盟中夏舉宗為死間衡行莫禦使吳民無秋而越終以伯在子乎在我乎三子曰唯子不觀天道乎四時迭更功成者退掉臂赴市者匪莫而朝過是不留盼也何也盛必有衰顯必有晦使子䇿勳之後悠然長往隨波江湖蹈滄海而深濳五鼎厚味不足以浼子身名俱全不其賢哉且夫三犧五牲牽以適廟被以綺繡薦以雕俎孰若徜徉於曠莽之野今子貪附一寸之明而不思砧几之可畏怙虎怒之氣而忘烏喙之不可保也亦愚矣種留而誅蠡去而夀近事之驗也子其何擇叟於是口呿味湧不復措辭然終不能去而死今其子孫必以秋冬為出處之候三子惎之亦懲其祖之失云贊曰吳起自伐其功屈於田文蔡澤關應侯之口而代之相位蓋長於此者或短於彼瞢進退盛衰之機者曉之以理未有不幡然悔也叟之於三子始焉憤如俄焉昭如抑亦物情然爾聞之長老有乞郡江淮間者首問監郡無有又聞叟之所居也欣然戒塗其籍甚衆口如此而竟不得保其天年昔人甘五鼎烹豈叟之謂歟贊傳神自贊酸寒之骨骯髒之面兹可以齊夀夭冥貴賤以我為我是謂知止足以病處病是謂去健羡求窮我者又將誰怨三睡圖贊良苦良苦放顛放癡多言多語謾殺鄮山尊宿掃殘國清塵土相逢共作一覺睡却是惺惺超佛祖黃元亮畫像贊粹而溫真而醇有邉幅無緇磷世目以靜者古所謂逸民九原不可作矣氷峙鵠立翛然眼中孰知有庾公之塵徐子畫像意必接辭而通道或交臂而孚我得之子其諸異乎了然於寫影之間況乎桐君之傳兔頴之餘是其器度之漂蕭襟抱之恢疏必能眇睨乎紈袴子而亦不屑山澤之􅋯者歟貓相乳贊并序吾友龔養正家二貓産七子同一棲一出則一留留者均乳之非其子則怒視或噬之貓之常也亦或噬其子焉今若是吾求所以致是者為之贊曰貍其質人其識匪貍之識繄人其德二貍七雛彼出此居居則乳之其七一如惟子龔子賢譽所萃和氣有格爰及殊類人苟友悌犬可致書家或仁孝鵲馴于除彼乃謂小人絶望君子而獷戾不可以為遜順即今推之吾敢信耶銘蟄室銘自物觀物蟄則屈即道自觀蟄則安安為動機屈信之基尺蠖應龍彼亦一時席户甕牖劣可容膝如君魁磊而蟄此室其詩之昌其操之剛松柏雨霜蚌胎含光孰晤而語蝸緣蟲弔兒輩須之霆驚電曜頥齊銘豐之文彊之質中不餒外不怵臞而腴虗以實超世表寓此室繄其適匪以物有餘於不足之間是謂正吉顔樂堂銘為友人胡良卿作寧為集枯舒舒愈愈無寧金朱睢睢盱盱徇外者不足自反者有餘志士抗志睎顔與徒惟子胡子翛然一堂左圖右書有琴可絃有酒可壺浩歌長吟不知蟬冕之為王公簟瓢之為臞儒有立者卓越宇宙而與之俱也晦室銘為嚴文炳作物之相形蓋以其對惟其有明是以有晦此韜其光彼耀其芒瓦釡崇鼎自渠所命無中而表暴之皎皎達人過目眇乎其小遺外而內養我昧昧𤣥鑰所觸浩乎其沛子寓此室辱以名之揭日月者倚墻則麾世莫領此宜莫省子誰印是心參寥疑始鏡庵銘為明波主人仙師作有鏡易塵有明易昏不器之器輝華日新仙師所寶非無非有明何從生塵何從受宴坐一庵照映今古玉盤珠瑩霜空月午形泄而光不如匣藏彼過用之洞察毫芒大圜若缺大明若昧曰儒與釋異乎不異吾言贅矣師一笑領豈惟為師亦以自警尊已齊銘眇乎吾身中全其天乃德乃藝可聖可賢彼愒于日或昏于利惰焉凡庸肆焉悖戾隋和之寶藉而櫝諸康瓠瓦缶掊棄若無世怵乎人吾反吾身苟其已尊寧惟已珍敬夫可願毋受所賤嚴其不為毋納所卑可無亹亹而戒悠悠子如尊之毋取外求王勉夫齊銘逐物者悶然於巨細反已者安否之是計我求其本彼役諸外一室尋咫天地之間盤薄容與如棲睫端王子視之萬間不殊碭而迷則鱣鯨橫海祇以自困得所棲則蚊蚋一睫晏然有餘軒裳典墳鼎珍菽水言銘厥齊諗夸毗子針進學針勤則不匱廢以自逸而況吾儒顧乃愒日雄也競辰侃也惜陰夫豈不懷汲之彌深羣書之傳所以為子政韋編之絶所以為孔聖或苟且餒聖賢猶病惟古巍巍勉將與同云胡弗思委身凡庸盍圓其枕起雞未晨盍火其膏息須夜分資則敏鋭毋恃所恃文則炳縟無足所足細而富貴大而事業悠悠而圖北轅望越酬應棼絲嵗月崩湍我作此針用諗燕安偈神居實師退院作偈留之瞿曇住西域說法度羣生羣生所依怙目以不動尊惟其不動故羣動皆攝受是時波旬種百千萬眷屬排拫摧毀辱蜂發雨矢集瞿曇如須彌蜉蠓如豫何亦如太虛空雲翳自變滅砥柱中驚波古今無少損不動而坐勝妙力固如是子道已末法衲子沈世紛競為住院計匪利即趨名就常不待招逐有棧豆戀實師住神居四衆所歸向云何得歸向以師清修故雖為衆歸向不作患失想翩然挈瓶錫去若釋嶠雲亦如箭辭弦勢若不可挽自師掃積弊羣魔尚遺種瞿曇昔去世政以波旬故師行不回首彼魔所願欲雖無末法病或昧不動意請答四衆心請為神居地柅車折蜚錫山立鎮故棲須彌自無恙太虛自空曠衝波沄沄去砥柱屹不知羣魔今末勢殘雪行見晛我心寂不動是瞿曇智力是子大法權我不為子道子道可槩舉庸酌四衆心為子說此偈瞿曇設住世與子同首肯雜說斃蜂說蜂善螫人被螫痛終日不解稚孺遇之幾悶絶畏尤甚然逢之不皆被螫觸之則螫近其居則螫有入于窗陽迷其穴穴以出之不充遂斃之斃之釋然而當蓋是非室間物不得不畏稚孺尤所畏吾不斃彼則彼將吾螫袪之不能則斃之不顧以汝有斃之道焉小人銜鋒搖毒性善螫與蜂同士君子畏而防之甚於畏蜂彼或肆焉君子仆焉而吾民滋不堪世不無小人人亦不皆被螫交而犯之則螫臨利害亦螫猶之觸蜂而與蜂居毒寖延吾民猶之稚孺遇之必悶絶而大不堪而使之躡要塗睨髙位駸駸制人甚於蜂之窗間與人居辨訂掊擊逐而斃之不遺力可也彼非吾仇也而必逐之必斃之蜂然者吾不斃汝將為汝螫非直自為計亦為稚孺計舜不去四凶孔不誅少正卯復辟而留三思何異仁於蜂必不仁於人仆栁說庭栁二幹相若一扶疏一蔚然甚茂人必譽茂者豫亦愛之一日大風茂者仆焉扶疏者乃無患木之生以枝葉枝葉以幹幹以根枝葉盛矣而幹不勝仆之道也猶之人德行根也才幹也技藝威儀文辭進趨凡外之接物應俗間而婉者皆枝葉也德行先而才後技藝威儀文辭進趨又其後焉是不可無要不可勝諸本後者之浮先者之枵然平安無事或可欺人使之譽已投之倥偬顛沛敗矣是不猶栁之蔚然仆是風耶吾識之以自警處病說治病有術處病有術治病屬之醫處病責諸巳處病之術所忌有三一曰諱治身猶國古者之為國諱亂乃亂諱亡乃亡身猶是也吾已病顧乃畏人之知其病意人之幸吾病祕不語人至於一旦不可為矣是謂諱二曰忽羣蟻可以潰隄一爝可以燎原病之生未有不自微而著既病矣猥曰是何足慮食啖嗜欲自若也或且曰吾有命凡可以已吾病皆置不省病安得而不劇是謂忽三曰疑人亦有過於畏而煩於慮者病未為害惴惴栗栗不可朝夕亦或可以甚其病故曰疑豫閲病者坐疑而重其輕有矣未若困於諱且忽者之多也不幸而病首去是三者而又必禁聲色省思慮絶悲忿驚憂以葆其和而需病之衰其次邀功於藥必也淡食禮曰甘受和白受采此與醫經不相關而其理可以推知也味勝則藥力薄淡茹則藏氣平藏氣既平砭劑乃功豫能淡食家人見謂難能每不難之蓋揆之以理爾當進食惟古顔子之簟瓢曾子之併日食原子之藜羮彼之巍巍萬古師仰顧乃爾今之奇傑邁往之士槁處埃􅝙枵腹傲世者不一而足而吾必極口腹羶薌而後慊耶且淡食而病已枯槁之日甚短而備味之日甚長小不能忍至於大不容不忍耶豫臨食心此二者故常甘半菽而忘八珍雖然是處已病之說爾世固有無地受病之道惜豫知之晚也岐伯曰聖人治未亂不治已亂治未病不治已病古之志士凡其薄滋味謹起居鴆視嗜欲冦防風邪皆所以治未病素問難經詳言之矣論語一書吾宣聖為未病之防甚至而人往往不能遵而守之也故病其曰君子蕩蕩曰何憂何懼曰智者不惑夫如是心之戰掉恂栗氣之拂結鬱堙無有也病奚由致人或病無乃反是歟至於日用易守者亦有愧焉者矣不為酒困酒無量不及亂人多違之豫亦不能敬遵之宜其病魚餒肉敗不時失飪皆不食也肉不勝食氣人多違之豫亦或不能敬遵之宜其病居以聖訓矜言之而此皆違之病將誰咎昔枚乘作七發讀之未始不興岌岌殆哉之歎曰出輿入輦蹶痿之幾洞房清宫寒熱之媒甘脆醇醲腐腸之藥蛾眉嬋娟伐性之斧謂之腐謂之伐蓋信乎其腐而伐之也曰幾曰媒則亦甚微而不可不過為之防也意禹之菲飲食侃之酒不越限君子進御有所和之議四姬無節皆所以為腐之伐之者之防他流水户樞之譬五禽之戲皆所以反清宫輿輦之惰也歟盍亦則象孔聖枚乘之言寶以為鑑用智於未病無或踰此矣東坡論養生引昔人之言五行顛倒術龍從火裏出五行不順行虎向水邉生且曰順者死之道逆者生之道也此仙者超舉之術豫推之而得衛生之理今是耳目鼻口與夫內而五藏人知順之而巳故易死否且病衛生者務逆之如腎好鹹吾過於鹹腎則適矣吾形性何所益肺好辛吾過於辛肺則適矣吾形性久則憊肝心脾亦然目欲色見美女子狎之之心油然于中人之情也而志士君子泯是念非矯也設婉麗橫陳也抑而逺之者為是乎即而從之者為益乎外而形內而藏貴逆而不欲順逆之至仙者不逺降此猶可以康寧永年知逆之貴則淡食可安也嗜欲可禁也思慮可捐也悲忿驚憂可泯也何病之虞豫幼多病晚乃粗知之噫求之桑榆者巳較之置不求不猶優乎私優之樂以告人也故為之書辨俗見世俗遇冬而暖曰此冬行夏令春而凉曰行秋令其陋可笑士大夫或為此言所謂行令如正月布德和令二月修闔扇四月始絺九月大飲蒸之類是巳春大飲蒸則行秋令矣夏而伐木取竹箭則行冬令矣此雖不足辨恐吾子孫亦瞢此聊書之文以變為法作文之法備于六經學者矻矻他求何哉經於句法字律春秋嚴矣一字之變褒貶各有在如詩之每章互變而後體備而法嚴法嚴而後意足豫讀東門之枌三章皆述陳之民化其上而遊蕩至中章則曰穀旦于差南方之原不績其麻市也婆娑與始末二章自同而異特為奇偉詩人所謂泣鬼神者邪月令世傳吕不韋所作每月始末立例為言不得不同其中未嘗不變其法至食麥食稻穀事大同小異五月則曰農乃登黍是月也天子乃以雛嘗黍羞以含桃先薦寢廟森嚴奇譎如此屈子曰吉日兮辰良此其法也退之碑羅池廟曰春與猿鳴兮秋鶴與飛此老多得先秦文法六一翁疑之非是文法古人妙於文惟妙故健文有順而健有逆置而彌健遷固多得此法必我也為漢患者必湯也令天下重足而立側目而視必我也必湯也置之于上其語彌健而法作文至此妙矣吳芮贊曰庶有以夫著于甲令而稱忠也亦此法后山用之於詩獨無樽酒為君夀政使秋花未肯黃八卦由數起律厯志自伏羲畫八卦由數起師古曰言萬物之數因八卦而起陳子曰非也此數謂揲蓍算法爾易雖至妙其起也則由數有數然後象而至理可索也象一象兩七八九六之類是也子穀秬黍度所以度長短也本起黃鍾之長以子穀秬黍中者孟康注子北方北方黑謂黑黍師古曰非也子穀猶言穀子爾陳子曰二說皆未為得子穀謂種而可子之穀穀之可子者不贏縮可以定長短多寡不腐敗可以等輕重故度量之起皆以子穀而權稱亦用千二百黍子穀之說蓋在於此三屬之甲魏氏武卒衣三屬之甲師古音之欲蘇林曰兜牟也盆領也髀裩也如淳曰上身一髀褌一脛繳一凡三屬師古是如說陳子曰屬當音之樹周禮函人為甲犀甲七屬兕甲六屬合甲五屬鄭注謂上旅下旅扎續之數今云三屬取其輕便可出奇取勝故曰日中而趨百里今被重甲猶謂之全裝其斫營襲敵亦用輕兵亦屬之七六五三謂歟牛車為櫓巫蠱事戾太子誅江充武帝賜丞相璽書曰捕斬反者自有賞罰以牛車為櫓師古曰櫓楯也逺與敵戰故以車為楯用自蔽也一說櫓望敵之樓陳子曰不然牛車以當衝突為櫓猶言安櫓也置楯車上禦矢也江湖長翁集卷二十九
