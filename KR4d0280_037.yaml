body:
  text: 江湖長翁集巻三十七宋陳造撰啓答胡同年啓宸廷唱第竊幸聫名仙里效官庶將賴庇雖服勤於半載猶相望於兩州蝶夢空勞未遂朋簪之盍鵲音送喜遽承札翰之投玩文彩之燦然荷推褒之過甚不敏之責有靦其顔某官蓄徳宏剛秉心純懿粹學根於性而副以淵源之師友軼才畀於天而發為黼黻之文章髙視儒先擅斗南之譽望增光我輩推天下之中庸白璧當價必也連城紫鸞過都迅於厯塊揮談間之珠玉已俛取於巍科展胷次之經綸宜優躋於膴仕夫何簿書勾稽之事可淹廊廟獻替之才盖聖代取賢用望亦兼於用資而君子事上在朝或先於在外佇被日邉之詔檢歸聫雲際之仙曹尚其拔茅及此斷木某淮鄉冷族儒館孤生書傳囁嚅姑息肩於耕牧光隂蹭蹬敢妄意於事功殿名偶厠於羣英得飽遂霑於寸禄困而學又其次也尚餘任重致逺之心率以驥不亦可乎此實事賢友仁之志孤陋坐糜於日月光儀徒避於参辰捧雲翰以細披覺茅心之驟豁慰人甚矣渴徳尚然承聞俶官期之装不無叙鄊里之別便郵屬我于以展此生金蘭之情下澤過君或可為數日文字之飲惟是禮容之簡後更希徳量之含洪答從遊三公啓頭顱引鏡自歎衰遲朋舊盍簪過䝉咨逮容投名於書社仍拜賜於雲章陳義甚髙揆才非稱三賢者性資頴悟術業粹醇鄉閭傑出之英庠序後來之秀見所未見吞萬巻而有餘能問不能視寸長而必取辱當此禮有泚其顔使自任為師是犯俗間之所忌若羣居講學兹誠儒者之當然諸公姑此為功名之階此老亦與有文字之樂寄柴教授啓楓陛臚傳竊有聫名之喜芹宫教事偶叨交印之榮在齊年事契之最深乃今日從游之云始况心期之不淺知天幸之居多差肩同采藻之儒屈指計及𤓰之日某官器凝塵表價擅斗南粹然氷玉之天資副以淵源之家學胷中河漢蟠五千巻而有餘筆底煙雲眇二百年而無此家誦太冲之賦人知白傅之名小淹簿領之司旋試師儒之職惟此邦蕞爾之甚陋而名士向來之獨多自旄頭彗紫微而爼豆不修則學舎鞠園蔬而衣冠㡬盡有識増歎後生疇依迨二聖創述四紀之餘宜多士教養一新其舊所惜文風之愧古政須師席之得人元侯髙耿賈之才猶俯為於文學退之收籍湜之輩豈止業於辭章為學者司南其塗待先生日東其首某詩書冷族塲屋腐儒苦節半生妄作功名之計晚塗一第僅償燈火之勞官同元結之漫為禄悼曾参之弗洎頭顱若是豈足為縉紳之重輕門戸謂何未免計衣鉢之傳授陶家男徒黎栗之索景升兒貽豚犬之嗤端由一暴而十寒所以寸進而尺退論資刻日謂不待拜於紫芝遣子執經乃猶及親於絳帳想維賢者兼容之量重以契家相與之情必賜提撕曲加䥴琢儻賸殘膏馥豹一斑之許窺則振拔汙塗驥千里而可附公來後矣予日望之小俟仲秋治牒而南尚得半嵗聚首於此與此老為東道之主滿慰交情俾諸雛祝南豐之香長稱法嗣復王尉啓代庖無取暫尸采藻之宫仰斗為勞久計及𤓰之問占鵲音之破夢喜魚素之到門眼為之明驚朶雲之蒨絢世所共棄辱華衮之褒嘉輙攄至陋之辭少答不貲之惠某官性資敏邵人品髙華破萬巻書孰測筆端之神物流三峽水莫窮胷次之詞源豈特維揚之雋人是盖天下之竒士夫何從仕猶在中年盖難售則其價可知而晚成者為器必大花封暫駐少須下鸂䳵於前灘芝檢飛來行即簉鵷鸞於中禁盡紓逺業用福斯民某筆硯寒生枌榆後進操觚試藝周旋嘗覘於風儀捧檄效官鄉遡但勤於夢寐偶郡庠虛席之次應賢守設醴之招幸何如之喜有過此即今盥手披鴈足之赤書繼此班荆叙門間之半面尚容老退時並英游下里門而敬鄉人深所望者寫我心而見君子不亦說乎答喬秀才啓髙盖迂臨已慰傾詹之素長牋見屬復増衰朽之光爛然綵綷之文申以師資之請揆才非稱撫巳為慙某人淮左勝流斗南竒士元祐名徳今見遺風臨川故家非謂喬木才跨鴈行之表人期虎榜之登夫何建功立名之秋猶復含酸茹苦之訴士當尚志人定勝天惟精於勤成於思持誠不苟雖困於心衡於慮傾否有期獨惜禮意之甚隆不知老衰之無取遽欲北面而受業豈所敢當譬如南斾而之燕未見其可若曰多暇來而羣居愛子以誠寧復有絲毫之隠起予之益當得諸磨切之間交代啓芹泮効官忝與士鄉之教𤓰期問戍獲承君子之規平時馳仰斗之心指日快披雲之願望川塗而繫夢憑竿牘以貢誠某官名世真才幹邦碩德全閩多士雋游咸出於後塵當代數人我輩不勞於俯視人誦凌雲之賦胷蟠插架之書如金華老仙揭示江西之句法雖東京名士孰如叔度之量陂尚遲三字之聫榮俯為諸儒而小駐進賢輔世已聞鶚牘之馳華國須人行拜鸞坡之命盡紓逺業用福斯民如某學舎陳人淮鄉冷族半生苦志艱難險阻之備嘗一第代耕勃窣媻珊而不進念吴門士氣之大振乃今日浙郡之所推擇地而求輕六年之逺次攜雛以徃冀羣彦之與遊想多聞直諒不無若人况老成典刑併遺成法撫初心而竊抃臨晚節以增輝坐廣文之氊等作諸侯之客告令尹之政佇觀賢者之風答吉解元啓得禄士鄉不廢詩書之樂依風儁軌正資道義之交未修執鴈之恭首拜朶雲之賜某人天資粹頴術業深醇青銅懐萬選之錢緑耳躓中塗之足成風妙斵賸傳絶俗之文造物小兒寧復憐才之意小耐詩人之吃蹇率多痿者之起行平心以須何恙不已如末章之示諭荷厚意之眷存不鄙廣文之無氊擬作監河之貸粟諾敢輕於季路飽恐誤於陶翁盖欠餘未及於究知則取予固難於縣定儻其優裕敢後周旋答曹秀才啓佳客踵門喜清譚之滿聴新篇落手覺病眼之增明髙山醻景仰之懐明月重暗投之悔某人際天卓識倒海宏才雖﨑嶇白眼之前終軒豁紅塵之表貴洛中之紙爭傳刻鳳之章摘頷底之髭行有化龍之便至於長城五字金薤千篇作者未見輩流詩人乃其餘事較之今昔平處猶可奴𨽻騷捐其緒餘惠然亦復膏馥我試効捧心之態少希過目之榮顧此平凡尚其䥴誨答平江職事啓老去作諸侯之客少慰塗窮朅來從賢者之游庸非天幸喜披霧之伊邇忽朶雲之墮前文辭爛然推予過甚某人東南之秀雋偉不羣意其已上於霄霏夫何猶滯於場屋天文可考尚魁宿之躔吴人望攸歸佇漢庭之䇿董某之疎謬意實傾輸論情道義之交言從此日屬饜文字之樂更判留年迎提刑趙殿撰啓奉詔檢於中宸庀臬司於近甸慈祥之譽久巳簡於帝心察舉之權兹用煩於國老望軺車於一水傾喜氣於八州先聲所臨有識相慶恭惟某官才宏而量偉識周而氣充學必探原人仰河間之大雅言惟憂國上知子政之多聞中外踐更聲華藹著省蘭卿月能稱屢徹於九重使節郡符課最特優於諸彦竹有迎刃目無全牛恢磊特達今劉苧山精明不苛古于定國自廣陵委靡之厯載得賢帥指麾而一新黠吏履氷無復簿書之縁絶流錢在目未妨閭里之詠歌信大手之所為非常才之跂及惟全吴號浩穰之極在今日為嚚訟之雄帝眷承流之宗英命宣止辟之睿化激揚清濁肯専柱後之文獻納論思行副朝端之寄盡攄逺業用福斯民某受廛淮鄉苟禄聖世尚載籍之友未云滿其志趣事大夫之賢庶以博其見聞心則拳然人誰領此頃懐漫刺獲窺彦輔之天今坐冷官復邇晉卿之日此意所甚切者一旦不啻醻之盖將静觀設施追吏師之規模抑以進聆謦欬求時平之典故窮塗至願老境幸逢凛繡斧之生風即有趨承之便上星辰而聴履得無攀附之縁答潘解元啓潘石湖甥滿聴粲花之論徐披振綺之文種種擅長無忌固知似舅諄諄見屬栁子豈堪為師雅意莫酬厚顔可諱某人儒林挺秀學海窮源犀一角以標竒龜五摠而擅富外家書傳向來親得於傳衣平世功名政恐不容於袖手况石湖老仙之重望廼香山居士之後身語黙繫夷夏之觀瞻欬唾為天人之珍祕子是之學歸有餘師豈期謙虚俯逮衰朽所况愈下過採南箕北斗之名用心雖勞寧免野鶩家鷄之誚予所望者君其圗之儻略去師弟子之稱得研窮古聖人之趣共儒宫之長日䇿經笥之竒勲豈敢終辭有足為樂若曰為處士而下榻未後衆人脫或問先生而摳衣其避三舎答沈學諭啓寂寞之濵來游巳幸清新之作見屬為榮誦之俄至於再三佳處僅知其萬一推褒過矣環省缺如某人襞積詩囊深沉經笥固巳略月露風雲之態豈止深喉襟管轄之書踐履邱軻所謂聞而知者陵跨鮑謝固將俯而視之正自家傳得諸心悟玉屑棄而猶寳驥子墮而追風向窺短詠之舂容復讀長牋之典雅冷官增重遽延重席之儒老眼為明快覩奪袍之手顧如衰朽忽辱題評文不逮人學終愧古念知者去仁者逺即我夫復何求若今與居古與稽於兄豈其得計而諄複之辭真若有得景仰之素巳不啻醻繼今講肄之餘綽有遊從之樂佇觀多士羣經收是正之功抑俾老夫一字得敲推之證久稽作答尤劇懐慙答嚴上舎啓希代至珍時許拜故人賜冷官樂事顧敢令児輩知已鬱薦賢之懐聊謀承教之便髙文嗣至厚意莫酬夫士取其賢而不計窮通然學裕乎中則見於辭采有能去彼而取此加以彪外而弸中若公議未隳必褰裳而爭取如造物不予或按劔於暗投在今日而論才得夫君之畏友受八面之敵遊刃有餘看一錢之囊炊煙不起詩解頥而紙欲貴衿見肘而琴常鳴冥搜笑東野之寒處約有孟賁之勇誰遣兩窮之相值共嗟五技之何為請姑就廣文之氊儻其得飽容徐貸監河之粟㑹有知音跂以俟公幸母鄙我答髙解元啓疲神鉛槧自憐獨冷之官照眼珠璣忽拜不貲之惠情隨辭至愧與感并道路風埃雖易動鄉闗之思山川竒勝兹可發氣宇之豪有底悲愁尚形覼縷歸裝分槖定多諸侯之賜金坐客無氊請視廣文之官舎答張尉啓一面相親遂有為寮之樂雙緘俯逮得無過分之慙退避以辭勤誠不懈回軒左顧有光獨冷之門闌銜袖見投獲拜向來之珠玉榮生望表感與愧并某官襟懐坦夷器質渾厚破杜陵之萬巻浩乎填胷雖魯國之多儒誰非避舎巳摘髭於科第旋䇿足於仕塗綵棒成名煩申令之一布赤圎舊習挹先聲而四奔佇奏異稱亟膺迅召道山延閣政爾須材貂蟬兜鍪不應異轍某依仁滋久聫事云初氣已蘇君子前滿酬心素禮非為我輩設終荷謙撝借餘論之過優溢衰顔之有靦語離作惡念折栁之可堪為思苦遲顧報桃之已後答陳解元啓名魁薦牘喜屬宗盟贄謁冷官凛觀名義委驪珠而燭蔀覺氷屋之回春玩味以還兢慙未沫某人心期千古筆力萬鈞造詣析微得前輩淵源之正精深行逺小後生雕篆之工倉公倒囊皆已試之方養氏引弦無不中之的果錦標之再奪佇雲路之髙飛文價不羣久擅孫丁之譽臚傳第一定聫黄衛之芳未貢賀緘遽貽妙製探懐而贈白璧深愧暗投赤手而博於菟若為効報答定海交代啓製錦効官幸相先後朶雲拜賜備寫恩勤和氣春風温乎襲人玉案英瓊若為論報敬憑尺楮少叙寸誠某官仙木蟠根天潢分𣲖深探向歆之經術師表諸儒發為賀白之辭華膾炙萬口蚤蜚聲於仕路即闊步於英躔割鷄益沸於絃歌解牛何有於肯綮御屏簡注髙軼漢唐循吏之稱鼎足延登行掩峴石相業之盛庶窮塗之一老竊巨庇於萬間某書社鯫生淮鄉冷族甲乙科僅收於壯嵗十五年坐困於選曹家食之日居多官簿之卑可笑時賢回眄信有酸鹹嗜好之殊班綴殿名遂叨民社撫字之寄念設施掣肘縣尹之公患而疎魯師心淮人之常情不容已而為之初未見其可者逮好音之至止歘疑慮之釋然盖政綱整振則繼之易功而賢者謦欬則賴以發藥而况民方偃草熈熈有春登之臺吏不到門寂寂無夜吠之犬即此遵奉足容老衰諗及𤓰之期似㡬已早委投李之惠益認不遺敬當尅日以趨庶便朝天之計繼今提耳䇿敢謂於平平謹用服膺教仰承於一一答定海學職啓舟凌驚浪肯輕一舎之遥䄂出長牋有過萬金之貺禮寧素望言悉過情縣令竊師帥之名本非麄使鄉校乃善否所定當有良規愧擁篲之未遑顧揚颿之先辱永以為好櫝藏璀璨之文其自於今日冀䥴磨之誨答定海豐直學啓荷民社之任方愧才疎從庠序之英庶資誨益執鴈未脩於三揖剖魚忽拜於雙封盥手誦之慰人甚矣某人士鄉偉器學舎竒材衣沾月桂之香即觀騰趠書映市槐之緑姑少遲回繼此鄙夫簿書之間當分賢者文字之樂寄張丞啓湖上定交恍追昨夢海瀕聫事殊副此心滿同到罷之期未沬從遊之樂兹憑尺楮少叙寸誠某官士價萬金賢闗一儁文章輩古揚黄鐘大吕之和術業逸羣兼龍泉椎成之用盍徑躋册府之步尚屑為海山之逰才正繫於時須職豈容於丞負徒勞靡憚未妨對鴈鶩之行見晚興嗟倚俟簉鴛鸞之序某詩書廢忘齒髮摧頺寸禄東西分甘吏隠諸公薦拔誤綴朝班勉焉戴巫馬之星終慮傷尹何之錦豈期寮契廼得石交人謂斯何方自省濶疎之病吾知免矣將日聞規誨之言即遂参承敢兹傾倒答王秀才啓銅章在腰遽成俗吏繡叚落手良惬初心第襃拂之過優撫頑疎而甚愧辭所詳及理之固然盖育才先刈楚之圗而自古有積薪之歎振夫學政首岐涇渭之濁清揆以道心猶是雞蟲之得失丐少安此容徐計之答李秀才啓披雲之願滿副此心振綺之文猥承佳惠荷衮襃之甚寵揆樗散以非宜把玩之餘兢慙未沫答任秀才啓某人學富齒尊鄉邦歸重實浮報嗇士論稱寃緘盛製以來臨即卑官而見愬既形訟牒復繫州符上所行下不遵行詎非悖戾此有說彼豈無說將起紛争當少姑須試容調䕶若夫拜珠玉之賜敢不謹扄鐍之藏答陳秀才啓講惠莊之友義眷予不遺叙孔李之世家葩華有作炷爐熏而莊誦覺神觀之復還想雖海縣之多材咸遜辭壇之巨擘喜識度外之士為是超然之文而勇若犯敵場之嚴眇乎計學職之末如鄉里閒居之老固合尊崇然府公試可之人不容擬議至四子之引去尚旬日之為期今焉雖欲徇人外此真自無說不意厲賢之地動為聚訟之區老夫閱世之多觸處猶吾為嘆若兄處利害之表自可旁觀委身當愛憎之鋒遂成辭費敢貢芸人之誡覬肩種學之心儻翰墨之䇿勲庶功名之拾芥書生少年之氣常任已以直前吾宗古人之風必聞言而樂取答為夀諸公啓投老無成感桑蓬之初載拜嘉甚寵駭珠璧之揚輝諷玩以還珍藏敢後念向來鼎彞之志慙負可量彼所謂椿槿之年短長孰計兹勤祝頌良辱知憐又數攝提孟陬之貞倐逢元命拜夜光眀月之賜大慰窮塗凡再被於光華宜倍増於感戢聽化兒之見處暇計風花載家集以珍藏用傳孫子又肇楚客之庚寅徒紉蘭蕙數絳人之甲子莫振泥塗敢謂記存過形祝頌直斗牛箕之宿可見數竒聆樊遏渠之音祗令聴眩又正孟陬而以降連蹇何稱讀蓼莪而增悲劬勞是念豈謂掛弧之日有貽振綺之文襃拂過優凌兢罔措連城增價粲珠玉之晶熒十襲珍藏為子孫之矜式謝吴使君為夀啓共承嘉問俯記始生貞孟陬而永懐小戊子之何取味蓼莪之佳什答報謂何誦子墨之温言凌兢罔措夫何訾省猥逮衰遲念功名四方之心老懐易感拜牲齊多品之賜席戸有光聊攄不腆之辭庸謝彌隆之施答馮祕校啓變生肘腋幸惡子之就擒契重金蘭屈髙情而見諗葩華耀目䥴誨如丹某人士價嫓照乗之珍義風凛刜鐘之刃赴友人之急怒髮指冠拾縣尹之遺長牋銜袖彼狂小子肆毒齋生事有司存固君章愛而不手理無衡決况陽膚喜已得情雖投畀之有餘豈簡孚之容苟敢蹈失刑之悔仰孤疾惡之心答定海胡解元啓偕郡侯之計充賦漢庭刷邑令之羞頼君楚産仍迂髙盖肯貺新篇細披四六之工奚翅倍蓰之益某人才猷一敵人品萬金儲為學以造微發諸文而行逺廣揚較藝駭妙斵之成風餘子汗顔歛罷軍而亂轍寧止主司之得雋抑知里社之有人居近鵾池舊占羣仙之籍行升鴈塔髙題千佛之名儻小児遂攀附之私則此老拜稠重之賜答葉秀才啓揖宣州之客深信人賢聆正始之音追還古意駭玩珠璣之光采頓忘簿領之塵埃盥手以還捫心知幸某人器資直天下士辭語非今之儒奄鮑昭三百年爭傳新作奏曼倩三千牘盍赴昌期胡尚擔虞卿之簦曽未前宣室之席風煙嘯傲碭遊漲海之窮鄉膏馥賸殘分惠飲氷之老令雖曰尋幽而選勝不㡬捨苑而集枯奪目耀芒過領南金之贈汗顔修報滿懐鄭璞之羞答趙縣丞啓蜚聲直上正切時須舒嘯東來未辭丞負鬱賢者大有為之志遂鄙夫願承教之心緘疊紙之瑰竒為暮塗之寵賁某官價優國鎮𣲖自天潢玉潤淵渟儲間平之偉望錦心繡口占游夏之賢科雖簡念於楓宸聊疇庸於花縣㧞薤得鋤姦之意先彼羣憸追風信取道之遥忽兹一蹶小勒螭頭之步來為松下之哦豈造物者巧於乗陽回陽春於飛雪抑聖天子老其才氣蘄竹帛於東隅姑委身鴈鶩之前佇拭目鵾鵬之化某代耕俗吏識字老農冒難事而為邦推舊聞而撫俗書陽城之考兩閱嵗時賦柴桑之歸一勞魂夢事莫難於末勢慶孰大於得朋政有頼於師資分豈惟於寮契自今以始無小大而從公夫必不然謂老耄而捨我與黄運使啓出綸中禁揭表外臺星省雖虚朝靡惜賢之歎日畿借重人瞻抗節之華不寧辦集於輸將亟且開明於曖昧凡今賀幅詎尚虚文敢因竿牘之誠敬効涓塵之益某官譽傾羣雋代不數人地負海涵抱孟韓之正學日光玉潔燦賈馬之雄文寖厯仕塗蔚隆朝望曲臺中祕再與承華軺駕左符一皆上最民庸國論無不優者弊源害本洞然究之遲唐殿之覆甌士方傾聴首漢京而抗斧人益聳瞻小待興除即諧調爕夫古今之理施澤難乎逮下而賢哲之誡行道恐其後時俾天下無窮人吾公有以自任為聖朝除弊事清時何憚不為遽有冒聞誠㡬晉躐伏念某材無所取志不自量幸脫迹於耕鉏繼坐曹於簿領荷銅墨之畀付歘二載餘為里閭而憤悁積滿胷次甚欲伸吭一鳴於當路不覺引紙連日而成編念敷政詎容不平而賦民乃有偏重下情壅塞盖率常呌天莫聞時傑奮亨多不待報政而去王京尹之剛明有立事可披肝朱制帥之舊故見存理無掣肘慨操觚之甫竟遽上印以他遷苟尚安愒日之心亦恐重後機之悔人方失所惟伊傅有納隍之慙世或抱痾非岐盧無肉骨之効今且旅賀燕而交進敢爾挈積蠧而畢陳細字疎行人講時流之苛禮救焚拯溺我知君子之本心揆造次以自疑念参差於既徃俾嗸嗸數千戸均樂其生則耄耄六十翁畢無餘願𤓰時而代尚為七月之留葵葉所傾正竊二天之覆答李秀才啓鴈鶩簉行悵防閑之易失脊令背影紛諜訴以互興起釁有由抱慙無巳棣華暉映鄉里共推宰木在亡仁人深惻助公家者過雖近厚感先隴者情或難堪縁小史岐肝膽厚薄之殊致華宗有参商闘䦧之間幸今二難之既翕肯為一夫而凶終不得平而則鳴原情有在小有言而終吉於義何傷中然謙虚忽此臨辱委驪珠之照夜無乃暗投顧窮谷之回春良多慶喜答林判院謝和詩并惠啓狂言巵出方此内慙妙製鼎來森然魄動向知九守之特勝倐復一鳴而驚人某官前輩典刑盛時才傑插架三萬軸囊括前修付子二百年氣吞我輩而能密韜鋒頴恬養胚渾眼白對囁嚅翁心期友無言子惟不戰而善屈是謂神兵至深藏而若虚决非市賈茹伯倫之一頌笑子貢之多言偶露一斑遽瘖萬馬論交已久居聞典魏舒之籌陳義甚髙豈止見鬷蔑之面逮兹呈拙悔不慎辭使猶惜折楊之歌何以挹破竹之句僭題石鼎固宜招𤓰芋之嘲謬薦豚蹄豈謂詫篝車之滿喜歸裝之甚富仰友義之叵忘投老山林敢使緘縢之闕追蹤步武永貽孫子之傳答王祕校啓湖南客好肯為邉郡之留冀北羣空歘話詞壇之別軒回小隠袖出長牋顧慙襃拂之過情驚見葩華之奪目某人探源學海挺秀儒林襞積古今蟠胷中之萬巻琢雕造化紓筆底之九文前修直與之周旋我輩不難於陵駕唱集英之第猶是通家追正始之音恣容窺管顧乃不自為足借聴於聾在君子鳴謙心毎虚而能受然小人揣巳顙有泚而謂何囊錦南旋帆舟西笑江山如舊載新吟詠之工魚鴈可憑倚俟歸來之訊正切塵譚之發藥母令詩社之寒盟江湖長翁集巻三十七
