body:
  text: 江湖長翁集卷八宋陳造撰七言古詩贈鹽城諸友鹽城逼海不可井飲城西有池甚近人狃習俗置不省祛蔽起俗非當官君子不可且舟致之易足意為此必有道不然無為貴政術矣長句呈二三友或可以告為邑者也泉脉不通海濵土人家轆轤上鹹鹵新粳本自玉為粒薦熟便如猩血煮初嘗已歎失香味久食更憂戕肺腑城西禆海百頃寬紺碧瀰瀰含霧雨我昔艤柂酌清泠潔比盤氷味牛乳得非天意補此乏跬步可㪺殊不苦但令十舟𤣥津致坐遣千室皆甘茹迄今俗習不自拔如食置傍飢不取銅章師帥盡時賢盍有教條祛惰窳君不見樂天六管挽西湖惠利可容今愧古歸自淮南雪行呈張鹽袁憲歲星逼歲回躔吳吳兒不用憂旱枯社鬼雨師當率職雪龍已復隨指呼百年眷屬無寧居崩騰膠葛周太虛翻雲挾雨動十日灑潤及物無遺餘帝意默與皇心符屢豐政欲􅑱鰥蘇鳳麟告瑞底用此粟麥充腹可使無節物破臘催謝徂挽回和氣浮洪爐熏煙已告佛供罷夀斝想見皇情娛漂然一舸將腐儒風前壞席爭長塗乘凌繽紛入縹眇俯仰色界行畫圗平生壯觀老不孤今假造物真娛豫擬從玉妃助剪水徐與帝子看積蘇天仙著我白玉壺應笑袖手毫不濡歸從繡衣兩詩伯照夜更掇驪龍珠時兩公有雪詩故云龍泉神龍媚此清淺居歘然騰陵行太虛越民倚賴龍沾濡頻年歲事勝三吳至仁一視無戚疏置彼此及心缺如嗟龍自伐端欺豫淮南之民如渴烏是年淮南旱登龍泉山越山東來萬煙鬟餘姚為邑山四環客車細穿市井間邑屋更繞龍泉山佛閣翬飛最髙處逺近嵐霏隨指顧小留開船有新句君知可是囚山賦丈亭小江隨山巧回互轉首碧流分兩股丈亭繫纜待潮生徙倚才容一炊許潮信曾何差頃刻固應作意憐行客為誰東去為誰西酌酒殷勤酬河伯癸丑勸耕淨居十五里近車不驅淨居之役良舒徐愁霖鼓寒妬春事倐喜淡日行雲衢涉患知樂聞自古積忙得間聊慰豫崇堂修廡盤礴久龎眉鮐背紛前趨為催酒䏑勞苦罷細問里閭愁歎無怡然離席手加額共說溫飽沾妻孥頻年豐登豈偶爾聖恩及物天地俱卑官政拙民未厭輦輸肩負憐朱愚餅果在袖笑在頰闖門稚子爭攜扶我亦僧飯對兩雛未妨清坐留斯須爐香翻頻茗事竟殿影已曀東廊隅復撚吟髭度盤紆人聲鳥語樂有餘贈妙勝主人勸農正覺風寒甚明日歸晴色可喜迂路訪妙勝主人因贈以詩具道塗中所見輿臺却略車不前寒風皴肌氷在袖還家大勝去家時景物頓回春氣候宿雲壞裂無幾留滿放羲輪碾晴晝卧石犖確猶潤濕短籬檀欒挺疏瘦是處麥畦間青壤誰家栁隂圍碧溜前山競獻曉髻濃後海全收紋縠皺妖桃艷杏各趺蕚近樹遙林錯文繡池魚酣暖泳清淺山鳥何知語幽茂搜詩忽忘路逺邇啅鵲不離車前後間身勝踐多齟齬緩駕幽尋容宿留轉從淨宇寄倦憩得訪老禪間話舊拂除塵壁詩刻在俯仰歲華春事又開單一飯吾易飽袖手千偈渠無陋戴星摩撫防務廢挽袂留連慚意厚出處殊科要酬應氣味相投真邂逅吾歸自竟武城歌放師道價諸山右贈趙排岸兼簡汪尉奉化二竒士得之聞見趙君過我得而友之昻藏蕭散真晉宋間豪邁士作别未幾書來訴窮狀因急筆作古風寄之汪君輕財好施惜未識也詩兼簡君二年俯眉簿書俗分無足音到空谷趙侯縹眇塵外人肯艤歸舟問幽獨氷壺炯炯當九秋巖電熠熠懸雙目小家樽爼解咄嗟卷褥或能營酒肉從容不待投轄留坐來屢跋銅盤燭酒酣辭鋒不受觸脫手詩成驚破竹雄才偉論兩超絶磊嵬大稱此腰腹定多咳唾到銀筆自可風標藏畫軸别去日月詎幾餘豐悴真成手翻覆慈烏絶哺心糜碎脊令斷行淚陸續化兒與人底異情念君胡寧耐荼毒詩腸秖作飢雷吼談舌未免窮塗哭肉割鷺股竟何補書憑雁翼慚虛辱退之方急一簞食少陵徒思萬間屋語追競病代舍寬王將軍家祿千斛奮蜚行矣君有待否泰更之吾已熟豈容步仭局赤驥會見青𡨕上黃鵠奉川之汪乖崖上有粟如阜金如粟載寬縣籍償丁算長與饑民共年榖一牛鳴地監河侯盍令顔闔能饘粥雲巖曉淮山歸夢清莫續僧窗睡足雨亦足鐘鳴鼓動萁爐紅深炷沈檀共僧粥我生身口良易供志願略與山僧同明年聽雨淮之東還許幽人林下逢再次韻深堂清話紅燈續不减前人參白足談禪論詩僕為僵更啖芋魁分茗粥賦租正爾憂闕供安得繼日笑語同他年渭北仍江東鴈書定復嗟乖逢淨居主人索詩急筆賦淨居棟宇犀辟塵山居不乏塵外人我來肯作厭客想老語一一刋翠珉頻年愧煩香積供醉後狂言亦安用詩成每博覆瓿譏更向叢林繫輕重皎公啓公後進師好事繼今誰似之他年落筆須妙質政自兩公勞夢思送雲巖老住天寧寺道人兀坐雲巖山雲巖之雲是知己風噓岫吸漫不知道人之心亦如此從地湧出煥金碧信手拈來自竒偉門施鐵限十五年一旦刺頭鬧籃裏天寧古剎中闤闠學子逰人萬其趾世將喧靜計今昔不信道人心似水方圓隨器我何與乘流即行坎當止十字街頭鐘鼓鳴八千偈成一彈指今秋客公我得間井甘不竭囊無底清談要洗三載塵肯學玉川勞送米識村翁語勸耕淨居村翁老而健問其夀云山居淡食乃爾昔一村叟一野僧皆壽百二歲杜郎中史丞相呼而致敬厚設而歸即逝二人夀未必止此厚味非野人所饗也其言有契豫心作此紀之山僧一生饜山䔩溪叟所仰才魚菽闖首侯家與相家珍膳不應填汝腹百二歲翁清且羸茵坐鼎食寧其宜焉知暫飽博長往榖神震怒脾媼悲官家顆粒皆民力此祿食之須此骨兩翁妄食夀弗延當念無功暴天物我雖不偶猶餐錢車行肉飽𨽻後先食功揣已懼不稱因翁有言呼使前盤几畢識翁所言魏知元有贈仍索詩作此言别二首朋從應酬岐薄厚魏郎凜凜金石友四年再面情轉親日有溫言到衰朽涇渭不混清濁流雲雨肯隨翻覆手自今淮徼望吳天安得山林長聚首作詩求工今則然古人培本深其源周雅莊騷略未究浪摹月露綴語言知君胸中藏武庫平生逰戲皆好句老夫血指妙斫前亟當還家事溫故贈送行六子豫之官嚴文炳傳商卿張公輔臧子與子儀汝舟送北風獵獵吹行舟客子坎止今乘流汀洲立鷺仍飛鷗定應笑我當退休一貧所驅不自由表表六子古與儔知我此意不見羞送行兩舍未轉頭我生甚愧羊荆州郭吉校君誰劣優天氣氷井風力遒召棠蕪城甘滯留推挽共作平山逰倚欄逸興浩莫收劇談落屑酒溜油不許旅寓生羇愁飽閲世態諳枵浮髙情如君未易求嗟豫老矣胡為酬相與金玉論軻丘再次韻此身漂然不繫舟吕梁灔澦皆安流江湖萬頃浮一鷗此心玩世常休休吳山楚水紀所由湘纍老枚寧匹儔琢句亦復忘晨羞搯抉肝腎掉白頭歲六十四方佐州計原夫日無乃優客路日月迅且遒朱顔壯志逝莫留吾聊爾爾賦逺逰山川自可卷軸收老懷槁暴今膏油訪峴山石弔莫愁庸隨大楚皆萍浮顧我不樂夫何求緬思六客同獻酬如挹韓衆追浮邱謝儀真諸公蔣教授楊知録吳司理曹主簿挽留作十幅擬掛東風蒲衆賢好事爭挽裾盍不一笑留斯須咄嗟而具成燕胥仙醴湛湛白玉壺篆烟裊裊黃金爐駢集水豢羅山膚彼姝者子不待呼襪塵相攜來坐隅炯然皓齒明眸俱含宫吮羽纍貫珠移柱品索鳳將雛詼笑盡略世謭拘諸賢堂堂吏而儒才猷聲稱雄萬夫慰藉傾倒向老迂風義已與古並驅况把樂事分窮塗衰顔得酒失槁枯暫容二子相映朱尚憶扶醉下筍輿江灘人聲雜鴈鳬一歡轉頭墮空虛此歡欲繼良難圖周旋四賢偕兩姝此人此日吾知無繁昌縣感舊繁昌古縣依山麓縣外峯巒更重復連山斷處圍平陸有地可耕無十六昔我作尉三年留局促似為山所囚野行村宿飯古寺山路孰悉如吾州車如雞栖馬如狗風袂塵襟博升斗是時身健髮財斑頗復興懷為奔走逺近人家山影濃與我周旋圖畫中山鳥翔集相和應野花開謝能白紅薄宦而今更長道回頭秖覺當時好筋骸罷憊鬢摧頽不歎漂零歎吾老琵琶亭抱愁莫遣朱絃鳴此聲更與愁人聽江邊一聞琵琶語月慘風悽如動情何况思婦傷幽獨少年多藝顔如玉江州司馬廊廟人暮上諫書朝放逐輕攏細撚忍淚彈開樽側耳思惘然一詩說盡兩心事遺音翻入歌舞筵此翁詩名自千古誦詩亦歎琵琶女誰惜亭前泊舟客頗為漂零動悽楚鄰家故妓春風手此曲每侑澆愁酒今宵月影秖三人倚欄長嘯空搔首題陳主管東牆三峴圖堂上不合青楓起煙霧墻間江山更疑誤千巖萬壑眩明滅暖翠浮嵐滿窗戶峴山鼎列屹相望發地撐空騫欲翔一峯拔起羣山上嶪若紫蓋相雄長仙山佛國住杳靄晨煙暮雲追戃恍良工妙與山寫真詩中有畫須詩人誦君清詩對畫壁承蜩斫鼻俱疑神知君懷古有髙趣我攬襄山識佳處願抄此詩謄此圖開卷時時揖羊杜次韻許節推喜雨昨夕聽雨喜不寐清曉欲作喜雨詩撚髭臨紙筆未落墮前乃獲瓊瑰辭白鵝兔烹巫不鼓麥田欲乾沛甘雨𤣥璧揚輝珠剖蚌詩思方慳得竒語似聞比屋歌謡中如我與君歡喜同偕渠一飽已入手錫羡隂隲繄誰功民是天民天自恤佻天之功天所疾君言寵矣吾敢荷更喜因詩識詩律吾儕豐悴懸諸天此雨無亦天興憐轉頭匕筯薦餅托鼓腹可但田家樂再次韻舊雨新雨不後期豐年當復歌周詩手調玉燭屬廊廟歸功假手敢固辭婦子赴工聽曉鼓山歌和應揮汗雨麥黃蠶老十分熟坐衙日日聞此語偕君薄宦羣山中與我憂喜大抵同畏壘謬詫庚桑楚醉鄉盍訪王無功向來小旱煩憂恤喜雨新來慰衰疾焉得妙思作彊對如塤如箎吕應律行藏老矣不問天一飽肯受兒輩憐爐熏頻炷窗頻托公餘還我文字樂再次韻答余司理雨來不後晴不遲今晴昔雨皆可詩自憐老去才易盡平日尚有黃絹辭挑燈初聽鼕鼕鼓南風收盡簷間雨麥根既潤燥乃宜此事時傳老農語人家屋脊黃雲中南村北村歡笑同定知老子喜欲舞鼎來騷客爭奏功詩人例窮天肯恤浩然不逢李賀疾宿習纒結我未脫前身永思今次律君亦妙巧戕其天低摧與我皆可憐此篇嚴密更開托却須編入襄陽樂次韻答路監嶽房陵水秀山崛竒政與路子昌其詩臨風啓緘誦傑句狂酲病卧聞楚辭隂陽閉縱坎其鼓年年瀆神為暘雨所嗟坐衙未暖席已有疲民相告語買牲釃酒方熱中霈然一雨千里同雨足便晴夏田好麥秋决可收全功與民父天免銜恤更因歡喜忘肺疾雄篇良佩君記存聮翩古調仍唐律君前以律詩見遺人才髙下淵視天貂不易續私自憐側理漫草腮漫托纒聲鹿鳴嫓林樂再次韻答節推司理人生行樂當及時底用耽古仍癖詩老子平日汗牛載五窮追逐不得辭羅幃圍香擊鼉鼓食填巨壑酒如雨君看白面紈袴郎不知經史何等語笑我蠧魚塵簡中口角儒墨紛異同腹雷晝隱吟仰屋詫向子墨收新功雪毛眵眼不自恤譏訶抵觸取憎疾幾人插羽上金鑾漫云九事八為律不如醇朴還吾天抉腸剔腎誰汝憐且從酒徒趂落托向來失計今差樂再次韻答梁教授隂晴如期喜可知况復攟束收新詩相如未至客之右開編自愧多蕪辭倅二付我千家聚佩襟戴君霑化雨相從可獨臭味同接耳僅聽淮鄉語詩來驚倒囁嚅翁結字著語古與同少須官廨住家穩往問句法幾即功似聞知津問沮溺山間晴乾度山疾一笑行舉通家杯計日尚前㽔賔律過君定發醯瓮天傾囷倒廪當吾憐家居除領齊睂托意與諸雛誦思樂記揚州舊事吟成遂復用此韻一笑事固有大同小異者合宫嚼蘂今栁枝燕臺酷賞騷人詩國色天香豈凡品瓊枝璧月信好辭向來弄影對簫鼓楚山髙深自雲雨若為白晝去臨卭鸚鵡難防漏私語翡翠久矣雕籠中轉頭縹眇雲鴻同遙知懷璧駭衆目負山雖力難為功敢意歸來辱收恤瑾瑜匿瑕山藏疾客子一誦打鴨章東君盧胡置嚴律風生翠扇閶闔天酒邊重聽想夫憐闕中之燕當掌托老闕裙裾樂再次韻答節推司理路監嶽世傳秀句我既不能如唐王維民依慈母亦復不能如漢杜詩一官彊顔竊溫飽粗免庚癸形廋辭分從村歌趁社鼓厭見翻雲覆手雨槖中僅辦買山錢徑當拂衣踐此語三子表表吾眼中趣操肯復衰朽同辭壇嶄然推大手官業行矣收雋功老夫老矣暇他恤灌園之隟要治疾折腰曳裾今痛定端知縮鱉取卒律誰能違性譽所天俯睂屏息前乞憐回思一挽間千托帶索彈琴有餘樂贈梁教授梁與豫頡頏翰墨相傲於寂寥窮約之境惠詩用其韻答之昔人反招隱意也梁侯藿菽芼山雌冷坐欲試菁莪詩嗣聖急賢饑渴似項背趣召君得辭九門方懸帝堯鼓久旱可無傅巖雨幾聽言議得韜韞了知它日酬所語人言才俊當居中可使流落吾輩同鄧禹舊補文學掾蕭何不書野戰功民庸國計當惠恤和扁之側無廢疾會看同沐一臺春底用更試三尺律生齒所戴共此天杞國過憂吾絶憐八柱如虧遲君托未應詩酒私所樂次韻梁教授房陵為州亂山鎖雅宜著此衰病身勿云蕞爾曹鄶下舞袖莫回腳不伸土風疏鬯北通魏語音徑正西帶秦入筯臥沙慣割鮮溜匙雲子免薦陳發軔淮鄉此槃礴兩地頗復同真純出處徑付無何有泊乎無營道自親損欲驟覺靜勝熱休心寧作艮列夤聲名藉甚梁夫子相與一笑寂寞濵胸次但有雲夢澤衣上不留京洛塵賔友固應消鄙吝妻孥亦解忘賤貧衮衮新篇警衰朽清淵曉吹轉漪淪顧慚陸沈俗吏行長須叩户何妨頻世儒難得詩造妙汝曹但詫錢通神甓社它年訪遺老為君蠅頭編舊草甓社髙郵城西湖山谷詩亦及之以贈孫中丞莘老次韻梁教授一代司馬公山立臯稷後聲名竦華夷所樂在五畝著書不止陵左班措世治平嘉祐間不欺之學誰與嗣元城逸駕君獨攀秀野之堂新斷手儼如拱侍公左右扁榜結字吾何取顧使與堂傳永久斯雍古篆學未成鍾王石經空典刑向來玩碑一再宿怒猊渴驥慚舊評柴車爭道乏妙領畫沙之錐猶露頴閉門柿葉徒滿屋竟使吳霜颯垂頸潮乎相逢奈老何妙語愛君金叵羅及君未中元祐科深衣容我時相過次韻梁廣文重午弔古去年重午飲酒歸賡歌酬酢無俗子今年重午約同飲更向詩人閲詩史平生玩物遊戲爾把酒孰知情所寄交朋徑略形體中嗜好本非杯勺裏自昔騷人吟九辨亦知令尹安三已宗英分嚴君恩重一身摧折財稊米空遺楚俗千古哀沈菰鼓鷁喧江涘屬世休明偕五細尚論取友吾謝此但製荷裳扈明月無復凄風起蘋芷明日菖盤薦急觴容我客間先坐寐君來何止四者并九室之春賤如水再次韻菰粽蘸蜜綵作絲竹萌尚籜榴未子官居端午不可孤小却文移謝胥史酒社切戒屐聲疏詩郵莫漫奚奴寄與君相望淮南北宦遊適偕亂山裏老紆章紱我不稱路指雲霄君未巳相期玳席醉九室先向花箋驚八米自昔詞源浩千頃粗許老子窺涯涘明朝酒罷詫里閭頗嘗見客今有此古人獨醒怨不逢時搴葹薋棄蘅芷吏隱顧竊詩酒樂自公委蛇容食寐一歡况復酬佳節豪飲當觀建瓴水急筆次梁教授韻禱雨應祈梁有詩褒豫過當且早晚有三杯約故末章及之旱氣如燬民其咨漂然一雨喜可知醮席龍壇揭精意青章祝號免愧辭馨香了知罔時怨耕耦亟用發爾私四釜足食可倚俟三年餘蓄夫何疑小麥囷藏繭已擇及此得雨未後時隂晴向人信大巧此柄似付吾輩持豈特貧窶免逋捕抑令催斂減箠笞旱魃蝗蝻方躑躅不待炎火俄殱夷吾皇聖德帝所佑上瑞何必占蓍龜職民之憂假守事遇烖詎可缺禱祠貪功謂盜古不豫讀詩愧色浮清涯揣已未敢拜此賜亦念佳句堪療饑擊鉢千紙久不講聚頭一醉屬有期自公退食况病減今我不樂將誰欺青樓歌舞有新按中年絲竹聊自怡已戒𨽻人謹約束酒闌一屏驪駒詩髙頭市陂行欲盡山崛起十數人家住山觜行人不炊市無米買餅充腸聽頥㫖日未薄山收市里閉戶人家呼不起今春倦憩車曾抳風物人情不如此主人睨屋為翁指方秋此屋猶在水閭里襁負皆轉徙老夫危不魚腹死更向秋田問餘幾使之饑寒責廉耻不忘資人約諸已焉得人人顔氏子向純厚俗今不美曾是登山號庚癸謝髙機宜惠紙詩人百用皆草草文房所儲備精好君家此紙世上珍肯分嘉惠及此老女膚膩滑葭膜勻溪叟搗氷舊疑神何人袖有善幻手解藍田玉山為貧銀光魚卵人皆重薛濤小箋才近用盍自留供鳳尾諾十吏卷舒看飛動杜郎百幅顧見貽敢用實腹療朝饑囊詩方逐大堤客快意揮掃播掿辭䇿翰墨勳闖宏大功名逼君方未沫何當太史牛馬走秉筆特書端有待寄安撫程丈次榖城常宰送羊先是襄陽蒸羊甚佳試效蒸之亦不惡故作書生次舍先菜把乃有甘肥來筯下今日之羊我為政屬饜敢忘分甘者府公寬容蓋代豪憐我詩窮仍老叨臥沙九肋匕不筯出甑嫩顫如花糕即今野飯山棲地食指屢動饑涎墜榖城明府府公似割鮮庸繼臺無饋食神黃媪喜欲顛一夜搜詩不得眠將軍問腹汝見負世用官業俱茫然論情少須分袂處未敢徑指房山路餓鷹得飽遽揚去政恐陳登輕吕布次韻程安撫蟹二首橫前兩鋒踞草泥恃勇寧復防吳兒倐隨主父死五鼎豈止郭最遭寢皮凡物有用皆賈禍汝禍已酷孰使之平生一窟不自辦敢羡鯨鱷遊天池含飴茹酒瞢懷璧僅得士女稱珍竒不搖喉牙詫雋永逺封罌缶爭矜持爬沙躁擾良可念請續杜老觀漁詩物生不學螭蟠泥禍及乃諉造化兒良材厚味庸自保熊斃以掌豹以皮雄㦸介甲亦壯矣乘流未可聽所之託身要是鯤鵬宅不然借穴習家池主人仁心及蟲蟻一肉三韭不好奇每譏騷客寒蒲縛更笑狂士左手持忍饞愛物良未失可愧於牣形聲詩次前韻言懷莊叟所願龜曳泥正平止從屠沽兒了知聲利昏酣者一一癡骨包妍皮江湖我雖吏隱去仰視二子終愧之逝將歸種二頃秫又欲深鑿六畝池目寄飛鴻百念息付渠夸世與釣竒山翁溪友結三益長年直鈎時一持灌園之隟課阿買分題細和陶翁詩次韻程帥程分惠糟蟹破戒食之因詩來遂作嗜欲割去土與泥調虞氣血等稚兒拘拘謭謭世所怪未免鶴髮仍雞皮甘脆為目不為腹蠶繭自縛良苦之兩螯公子大於扇九室春色堪為池九室春房州酒名開緘况讀萬選句快意領此一假竒自憐忍欲忍艾似涎流津饐不自持明知喘疾有時愈更寄斫雪加餐詩分糟蟹送沈守再次韻笑呼赤腳拆印泥婦姑歡喜舞兩兒沅江似識九肋鱉伏雌秖慣五羖皮海螯不落江􅠪下郭索公子是似之但聞淮浙詫此味豈意分𣲖來江池今年二州大蟹不乏閉戶獨亨良多愧古以叨餮聮窮竒使君據案帶減圍一杯解顔情分持未用秉燭喚窈窕促軫且絃詩老詩再次韻犯雪南歸因帥來詩有雪句腷趵履險不踏泥我亦䇿蹇驅驢兒𤣥雲吹寒作飛雪瑣碎渺漭無地皮幻蒼變白頃刻爾翕張披拂誰為之定自帝所千玉妃羽衣鶴帔集瑶池俯視下方粲一噱剪水刻花爭出竒忍寒索句徒自苦萬象偕我遭控持明朝雪收鵲亦喜郵筒到眼還新詩帥寄詩再次韻才力髙下岐雲泥龜鏡國老乳臭兒紛紛過眼敗人意棘端覔猴毛不皮江西久無金華伯平水未識元微之府公牙頰著天籟吮潄濩武鳴咸池江城屢雪傳新作梁園賦客讓瓌竒振兩文忠舊號令赤手破敵無所持小人拜賜但袖手匪報未辦瑶華詩攜襄陽詩卷示子孫再次韻還家未浣衣袂泥聚首笑語環孫兒挽鬚倒褚問所得酬倡定續陸與皮小子情話吾所師指瑜擲瑕切中之謂公傑作含古意白月在天影在池阿翁贔屭十駕足故步雖在缺新竒向者護前今不爾自呼罰爵為汝持與問潮乎奈吾老亦喜商也能言詩再次韻是日得程帥詩筒歸擔乍弛誰洗泥使君載酒攜歌兒小家捲褥當酒負醉倒一笑眠虎皮平生自審枯槁甚髙情顧肯振拂之均州從事六輩來歡喜如官浴鳯池詩筒偕拜府公賜格律髙古語崛竒頭風失去肺渴减病夫雖病容枝持南山側望潔齊久知我日誦無生詩寄程安撫離襄陽始冒雨中塗大雪間關凄楚已甚然竒觀亦良快人車中讀程詩卷作古詩紀行且寄之歸袖翩翩去誰禦篝燈熒熒翳復吐取道言從草市西問津更訪修竹塢殘夢歘過均州山殺更尚數襄陽鼓盎盎屯雲連逺岫剪剪北風斜細雨袖手縮頸寒可勝羡殺昨宵宿僧宇伏龍一炊隨分飽小市居民無醢脯孔明棲遁此其地有廟才餘十里所側望縛足缺一往不得持杯弔忠甫鹿門三峴率如此何者不為積隂阻行行野香間幽艷晤對未用嗟無侣櫟林森疏陂渌淨江梅水仙爭媚嫵殿秋迎臘太早計花神今歲良誇詡黃堂交筆為爾吟題品再三猶記不天涯驟作懸麻藝但聽人家擁爐語寂寂關門喚不譍青錢可能沽重糈奪煬爭席吾敢校定知楚俗輕羇旅土風人情管頭好不比陽阿輒相遻饋漿亦有白首翁束緼乃得青裙女推枕每被荒雞催捉鞭動與寒鴈伍東村西里無乾地上山下山泥濺股𨽻厮任輦起復僵登頓連朝吾愧汝空荒頗怪人迹絶撩亂俄驚雪花舞攪絮鋪鹽疑變幻寒壑漫山太熒侮瀰漫六幕眩明滅夢汞兩間迷仰俯山川映帶巧裝鏤林藪斕斑幾纂組麋鹿决驟鳥烏駭頡頏獵夫布置罟腳毛罥羽不遺力割鮮倒瓶供快茹人間壯觀今創見城市蔽虧無此覩跨驢索句信能事還憶詞壇有盟主風雲月露溢緗素膏馥芳鮮存肺腑大筆軒軒軋時傑新篇衮衮流樂府擊節長哦風為傳吮漱天籟含宫羽雪神風師底顔面解渠嚴冷聊夸與霧掃天開一彈指爥龍揚輝上瓊圃勞勤愜快初不意倐忽起滅嗟如許及兹追悔前兩日浪唶萍蓬悲兕虎榖城重到昔所安令君存舊猶比數黃昏剝啄門為唘盤臥肥羊榼佳醑他時回首追陳迹可無甲子記毫楮歲乘赤蛇月就盈中浣之後厥壬午贈安道士道士能琴亦吟詩吳罝傳世皆妙語善升乃近崔遵度絲桐造妙詩疑神古來多屬方外人羡君矯矯雲山客子墨桐君生莫逆此人此藝吾了然錦囊傑句多時賢月斧雲斤且遊戲纒聲鹿鳴莫經意古人進藝道與俱如君不應古與殊謁帝行如稷邱子莫謾瓜芋嗤侯喜江湖長翁集卷八
