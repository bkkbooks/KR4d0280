body:
  text: 江湖長翁集卷九宋陳造撰七言古詩程帥以古人名作詩見寄擬作謝之胸次不平當近酒熱官奮揚肯回首即今羊杜詩中仙襄陽城中獅子吼我將仲子趨黃堂孰看畢戰搴旌幢筆秦曰筆楚曰畢吳曰不律抗顔路塵旋行役但有魂夢公之傍瀕海作宰我漫仕留贊郡符真左計老夫已老子白丁解頥與言遊戲事駢羅隱服芙蓉裳設張翰墨當絲簧敢向青山簡竒勝有田肯賣吾倒囊如公端合穆王度不靳尚作歸田語蓬萊朱金久已齊還許逺來結鄰否暗用古人名詩寄程帥羡公椽筆銜陽秋黃鍾大吕豪端收省闈髙掇未足道文章老手第一流轇轕玄談已驚衆倒河翻瀾駭飛動遞中筒詩陸續來舊債未償新債重即今搦管重犯嚴強顔回顧口如箝更驅行李伸此情句法政用公鐫劖次韻張秀才題汪叔量挹秀亭清江如玦山如環主人胸次自江山寰中秀氣困豪取著亭杳靄空濛間碧浪明邊帆影逺暖風香裏林花晚市聲隱地了不聞貪看霏煙抹層巘青山隱吏鬚已霜帶寬未用憐東陽每來亭上小箕踞傲睨山色挹江光一樽從君多暇日更誦清詩緑人髮絶勝九衢塵霧中金印纍纍客牢石再次韻清遊如省隔世環身繫組綬心溪山此亭攫踞山水上羡君脫屣塵埃間不應室邇嗟人逺時上風煙慰衰晚恍如坐我天姥傍長嘯持杯揖雲巘張侯清吟句挾霜肯因聞笛賦山陽空青染袂醉頽玉笑人簿領閲流光誅茅結鄰約他日會映軒窗晞秃髮徑從兩君賦歸來何須官滿六百石次韻鍾汝楫鍾郎耐暑如被酒亦復不間讀書口胸中莫可渚涯窺筆下時作蛟龍吼老夫瞪若終後塵兒子徒勞汗流走中年眼見花養痾肘生栁漂然振我衰懦氣此士此詩今僅有亦思琢句與周旋強敵當前難措手再次韻示師文中年多病剛制酒文字譏評慵挂口克家尚須獅子子時踞風林一哮吼藏山有書當衣鉢端能太史牛馬走之齊莫操竽名楚要穿栁未聞狗監薦子虛聊遣吳王質非有獨無鼓吹娛乃公勝日不應長袖手長句簡諸公縣圃酴醾小宴病不及賞復同賞家圃芍藥作此君家開宴為酴醾竹聲裂石絃輥雷我家芍藥繼如許如解商量先後開深紅妍白各媚嫵瓊瓊赤玉出廣韻肌玉骨無纎埃日髙未覺睡態足風定亦送龍香來素艷壓架頩欲雨粧面卧叢羞未擡邢娥微服屏粉黛衆女望影慙莫陪真妃嬌泥午酒困紅潮作暈回香腮春到陋邑好花少鬱鬱髙栁間古槐濃李淺桃不入眼菖條杏葉何有哉喜如足音賞魏紫前日看牡丹愁寄驛使邀江梅殘春索寞風絮亂有此二物生庭隈維揚金腰可伯仲閩南素馨但輿臺倚煙娉盈復妖嫮等間力挽春光回東皇有情花有意似欲我輩倒玉罍君家賞花我方病憶花有恨空成堆我家花開病適愈對花發興知難裁簿領困人日作惡玉山猛判花前頽及今樂事須秉燭風狂雨橫誰能猜愛笋犀非犀玉非玉拂拂輕霜浮脆緑披籜含梢欲成竹娟娟裊裊森可束稀間只稱佳月照徑處差耐清風觸少忍充庖得補林主人為目不為腹論材似也子勝人終竟鼻祖與膏馥官間盡日據胡床樂與此君同避俗冷笑京華癡少年枉費千金買花木次趙判院韻趙射弓損指有詩欲林教授出寵於某甚見推避次其韻公詩見壓楚服隨孤軍懾怯逢荆尸將壇已辦降旗送顧乃借重如等夷文工武習知餘事腰箭臂弓聊寓意僕姑不作餓鴟鳴䇿䇿鮫人珠迸淚巧匠血指非意及微恙未須湯尉治蟹螯置把蛇臥影生世多才古為纍誰家酒好花打圍今日人間栁生臂不妨惡客著坐隅身則獨醒心解醉出郭寒食日迓使車初甚怊悵郊外春色慰人戲成江縣居人寒食下少在縣中多在野哭聲不似笑聲長麗服新粧盡遊者長郊芳草接天緑我亦行行䇿罷馬盍簪命醉豈不懷卑官出入元無假偶來却勝特來好觸處春光可圗畫幾日隂寒風用壯今朝霽景天所借趁人胡蝶作團蜚逐婦鳴鳩數聲罷夭桃艷杏雖已過郁李金沙猶未謝其餘紅白爭姱嫮醉態啼粧各瀟灑顰風笑露頩欲語半吐梨花最間雅遊人幾許健倒去紅粉誰家短墻亞良辰獨醒還自惜捐佩一樽猶可貫餅盤餳筯巳寒盟故人應問花應訝對春長作了事癡不念清歡本無價會當從公謝不敏百罰深杯不辭把魏花有約待人歸秉燭酬春期後夜再次韻對花不領幾栁下以詩自苦如東野今年陡覺負芳時狎興蕭條殊曩者西湖南園恍入夢漫道凥輪神作馬可堪山鳥勸歸去擬為蓴羮乞長假十分銷瘦空自憐一段間愁倩誰畫春光只比東逝波堂堂去意那能借青梅崖蜜倐登爼禊祓鞦韆仍復罷感君妙句慰岑寂欲挽清歡付衰謝光風搖搖壓輕暑亭榭况經微雨灑徑煩麴糵寬懷抱未用文章繼風雅翻階芍藥醉面欹壓架酴醾香蓓亞江城日有問字人酒不論錢更須貰君今賴以主人賢我亦不憂官長訝鶯花好處醉為鄉與君平日俱聲價旗亭市樓故鄉約歲晚會須茅一把客中一笑且追陪飲勿言歸當卜夜次韻張秀才風前病眼如挾沙蕭蕭兩鬢吹蒼華翩然一馬度平楚時見碧溜浮梅花胡蝶蘧蘧恐非夢乾鵲角角營其家哦君新詩念鄉國鴈字一行天際斜望夫山亭亭碧山椒依約凝黛立何年蕩子婦登此望行役君行斷音信妾恨無終極堅誠不磨滅化作山上石煙悲復雲慘髣佛見精魄野花徒自好江月為誰白亦知江南與江北紅樓無處無傾國妾身為石良不惜君心為石那可得檢旱宿香雲香雲之山瞰平楚松篁路窮得僧宇明窗深室皆嚴靚白菊紅蕖相媚嫵它日欲來坐忙迫此行忽忽寧得所蒲團憩定飯秋蔬衣袂黃塵尚如許山僧共話豈須禪但愛茶甌如潑乳投床有夢不能記忽聽風林如過雨雞聲不貸擁被溫又控罷驂陵險阻出門便覺仙凡隔猶聞窣堵風鈴語今年旱暵遂無年枵腹籲天連保伍頗能念我困馳驅兩兩致詞相勞苦但使秋租毋病汝吾自卑官慣塵土田家嘆秧欲雨麥欲晴補創割肉望兩熟家家昻首心征營一月晴半月隂宜晴宜雨不俱得望歲未免勞此心謝翟元卿詩卷見投從君只比羊胛熟得詩已可牛腰束誰言此老四壁立襞積錦繡羅羣玉晨興諷誦暮編綴未覺飢雷隱枵腹我生嗜學類貪夫婪酣欲訴南山竹詩人到眼輒自慰句法得君今意足向來玄鑰笑談啓大勝幾年膏火讀駸駸警我欲川增前之汗漫今邊幅頗嗟詩客千鈞筆不博長安一囊粟人不求君君不即髙卧窮鄉數椽屋苦無好事問奇字寂寞寒庖供苜蓿長篇短韻寫不平日使貧交得驪目握瑜不價自應爾有底汲汲須圎曲我有鴟夷繫短轅持澆胸中三萬軸尚恨不作多田翁粳糯分君歲千斛題蕪湖雄觀亭大江來東南旁受衆壑輸下驛峽門窄積水陡下百尺餘勢如千鼓駴萬馬闛􅂒嚙蹙崩騰排軋爭危塗蟂磯賴是作齟齬不然頽沙裂岸寧復通舳艫霜晴似揭天兩鏡瞥眼浪濤相吞屠不知河伯窟宅託何所只應蛟鱷跋疐無寧居隂晴明晦何限景付與沙鷗浦鷺綸竿夫令君作亭攬其要豁然眼界了江湖我昔暫登覽詩瓢仍酒壺寒聲隱隱撼窗户緑霧噴噀擅曉晡吳檣楚柁亂秋葉蜚山湧雪略座隅淮山千髻更在洪濤外昏煙淡日時有無昆陽勝負等蠻觸魏中之梁直錙銖人生紅塵中局縮轅下駒安得李成王宰不死俱在眼水墨揮灑丹青摹江山千里入卷軸從此不數玄圃崑崙圗張秀才枕屏寒空慘淡森木古羣鴉無人自翔舞重山積水幾里所稍見孤舟渺煙雨意吞洞庭卓天姥短屏數幅渠能許何時去作湖山主還喚詩翁來著語謝朱宰借船宰為蕪湖豫官繁昌書生祿遫空自憐三年官滿囊無錢身如絆驥心千里安得一舸西風前令君磊落濟川手留滯亦憐窮獨叟大舟百尺影白虹借我搬家我何有函牛之鼎著雞肋涓滴渠須瓠五石劣留兩席置圗書輦石囊沙壓搖兀典衣買酒餉三老槌鼓鳴鑼人看好相過重讀借船帖我自盧胡君絶倒自繁昌歸先經于湖墨梅魚扇寄孫成甫都城六月難為客暑焮火山不餘息從人輒博褦襶嗔假館翁家得休適髯翁囷積胸中奇對客清談霰雪飛扇材寄似亦安用聊代玉麈談間揮須知寒夜氷花影著子駢枝可調鼎濠梁之樂物我融翁自欣然渠不領向來槃礴非畫工象外析理翁則同少酬他日清涼惠知我夢依君子風從王守獵生世能忘塵外趣官居定作車中婦男兒胸次萬斛寬不著塵埃著詩酒虎頭起秀屹雙髙層城更是干青霄使君領客凌縹眇天風颯颯搖旌旄吳嶠魯山青未了眇視平淮衣帶繞艷歌濃笑碧雲深聲下人間却驚鳥不妨卷障下煙霏翠袖紅粧旋打圍杯行飛瀑亂歌吹蜚霧暗香俱在衣詩翁得興飛綵筆銅丸脫手初無迹酒酣登車接㒿倒馬上梁州霜月白散解廟行巨靈揮斧山為拆谽谺飛出寒溪碧南酉北梘皆戶家種秧插稻供衣食此水不枯歲不飢此溪不涸龍是司森木古屋龍所宅人家望歲如取攜笳簫嗚嗚坎坎鼓秋報春祈從父祖雞豚肥腯社酒香擎跪曲拳誰敢侮年時雩禱嗟徒勤適龍睡熟喚不聞溪心蒿艾化埃壒可怪嘉榖遭惔焚千溝萬澮分飛瀑面露搖風際天緑懷寶睡足龍亦驚雁門之踦此焉復安得溪水長滂浪龍不忸怩民樂康向來野草填飢腸怨氣括作頥下囊粉水行散解溪紆福溪直兩山空中瀉清激瀦渟壅建幾千家邀入中田作膏液餘流復合古城東末世尚奏鉛華功定名粉水自誰始水神有靈當熱中去年龜紋布溪底房民倒垂憂死徙今年活活夜繼晨淥漲稻禾三百里此溪今昨殊虧盈郡民即溪岐死生天設地施禹疏鑿世人盍亦求其情古來名實為賔主兩溪厚農非小補但令旄孺無飢羸安用女子相夸詡田家謡麥上場蠶出筐此時秪有田家忙半月天晴一夜雨前日麥地皆青秧隂晴隨意古難得婦後夫先各努力倐涼驟暖繭易蛾大婦絡絲中婦織中婦輟間事鉛華不比大婦能憂家飯熟何曾趁時喫辛苦僅得蠶事畢小婦初嫁當少寬令伴阿姑頑房謂嬉為頑過日明年願得如今年剩貯二麥饒絲綿小婦莫辭擔上肩却放大婦常姑前鹿鳴燕亂山森立圍古房重碧疊青天與長鍾竒孕秀為雋良有如六子爭軒昻胸次襞積雲錦章漢之朝董唐常楊當日折衝陳堂堂尺箠不折築受降皇上籲俊奄帝王士孟其晉如康莊即今勸駕觀國光接翼便合鴛鷺行後先差池似未妨一夔自足開天荒五大次第趍巖廊懷寶判閲三星霜一杯首餞江夏黃一詩竊比振履商功名逼人未易量坐來相映睂間黃誰遣大宅浮春陽他年朝路偕翶翔惟南有斗耿昊蒼一字定寄漁樵鄉老子善誦君叵忘次前韻送胡省元南宫嚴嚴各分房過眼千牘春晝長戛戛百楛收一良主司黍纍作低昻黃道湛碧誰為章胡郎筆勢傲長楊掉臂舊升賈馬堂自讀君文此心降看寫帝伯仍皇王諸公盥誦顔為莊射䇿便近天子光一鳴坐瘖千駟行騰陵絶澗略不妨我昔塗抹䇿寒荒囊筆亦解趍東廊一官蹭蹬鬢頷霜桑榆聊樂師陳黃逐逐一飽隨工商才無它竒堪斗量放君緑鬢便銀黃功名若木升朝陽雕鵬舉翮雲路翔腰印纍金玉佩蒼功成晝繡歸鄭鄉車笠舊誓無相忘次韻許節推喜雪雪後緘詩送春燠何異祠壇起祗肅吟哦三嘆思答報幾欲揮毫紙隨縮多聞實藉益者三敬客不啻需之六别君方看月弦下及門僅比羊胛熟前時為雪謁仙佛俯傴叩神如問卜隂陽妙由帝把握寅亮傍賴公迪篤死生休戚繫雨暘此柄不輕果誰屬天公欠雪如負劵得之無庸計遲速盈尺告功遽放晴孰謂十寒財一暴念子詩愁替酒狂許云途中不濡唇幾日風飱仍露宿想見晨窗誤月明催汲溪泉煮山蔌雲際羣峯駮粉繪日下衆壑淙哀玉我雖越爼政無補猶飽官饔住官屋不嗟破履印遺趾更免長鑱劚黃獨剝啄或肯送尺書傾箱中有麖鹿肉遙知合圍罥蹄角驚奔窘怖徹毛骨放麑啜羮未恝然老子平生蔬茹足瓶中療飢餘白粲甕裏度寒仍旨蓄隱几日日面南山捉筆時時瀉懸瀑但有赤腳侍玉川分無散花問金粟春前三白盛世瑞幸此迂愚寬譴逐朝來徙倚觀稼上宿麥泛煙青極目佻天之功敢僥罪含生有自如其欲寒梅嫵媚糚更新弱栁瓏璁眉上蹙風日清妍近試燈載路已聽歌鼓腹不辭三夜同此樂甕蟻妓衣預催趣濃歡共貸家山夢小隊重按年時曲仕逢歲稔信可喜人任天真或為福長翁一世文字餘可是營生有機軸徑來同作醉鄉逰聚散回頭車轉轂觀稼房陵亭名豫三月即替云謝襄陽陶宰惠靖節先生編年大本陶翁清節人可追陶詩妙處吾所師百篇昭昭揭日月行雲流水無定姿顛倒後前昧甲子可忍白璧猶小疵三家紀述互蹖駮千載傳授仍參差逺孫挺立翁不死吏隱平挹鄉里兒空洞胸襟著今古遺編訂正當屬誰扶微擲隱究茫昧别白蒼黑分毫釐翁拔俗心詩其寓彼未易識此則遺幽意隱義眼中了筆端有口今見之細書大字肯及我故人嘉惠良不資摩挲老眼屏湯尉歘訝毛孔生涼颸歸裝不憂更空匱招隱正用寬衰遲世間報施有厚薄自顧壁立謀晨炊心期炯炯共一月未妨相望天之涯題識山堂物之或暌九牛毛理有適契鶴鳴臯對山眩旋目無主山靈定笑山不遭廬阜姿態杳莫狀煙容嵐影翻海濤德人眼力了天巧離朱眸睨難形逃髙堂面藝踞縹眇曠度灑落遺塵勞萬巧千竒領定體如闖闤闠挹同袍要須槃礴煩畫史正自指顧分秋毫聞道樽罍富賔從至今卷軸餘風騷我登斯堂唶遲暮仙翁巳躡海上鰲橫前三萬八千丈天台信美非其曹崩騰恍駭失要領窺覘厯覽首屢搔先生翳鸞驂紫鳳想後韓衆前盧敖白玉之童手碧桃雙成智瓊各雲璈神遊未置兹山遨徙倚悵望吾鬱陶塵中局束真狴牢但覺德人山與髙次韻髙殿撰題東山廬山佳處雲英英鶴歸誰識丁佐卿東林遺址倐興廢未害諸老傳清名向來杖屨孰遊厯猿鳥近人鷗不驚樂天本願秪兜率思邈不忘聽化城一從棘位復帥閫晉酌白獸懸旄旌先生本自逺公輩夢繫蓮社松竹行即今上品已補處妙句留並山崢嶸未下飲光領一笑曾是圎澤論三生何人著語嗣絶響浪許伯起新有聲尚憶詩翁運椽筆坐排九派咸東傾次韻徐監嶽四首文字挽回正始音如君豈合安家林干祿不作次且歎讀書方競分寸隂斯人與室幸孔邇有底尋丈能汲深兩詩竟得摩老眼慰我飢渴他年心落落過眼誰知音故山檜枝森碧林白鷗盟堅不待歃豈應辟影忘息隂末路功名夢已斷生平邱壑情自深素琴濁酒槃礴地頗領淵明千載心湖間波聲環珮音湖上遊子紛如林坐窗日夢舊逰處屯雲重霧專積隂凄風剝香梅塢滑輕煙暝翠松行深畫船載酒年少事老不耐間猶此心抱枝山鳥雖好音未放紅糝黏青林東風一掃寒雨盡羲馭明晦雲移隂嶝嶺熹晴亂屏合漣漪湛淥半篙深翩仙舟子得我羡笑傲山影眠波心再次韻呈林子長郎中二首林淳熙丁酉為當塗教官豫尉繁昌攝事郡中館于泮宫相與欵密再見行都俯仰道舊作此呈似且謝見觴諸生吾伊鶯燕音憶嘗客我詩書林交期離合悼今昔宦路漂泊費光隂故人恩意歌酒欵省郎香霧簾櫳深二十四年一笑適可待車笠論初心三歎熟君朱絃音可但文價髙儒林課聞安仁最花縣車想召伯駐棠隂詩壇自昔隱一敵意匠超忽陵髙深補衮活國要次第向來子牟魏闕心正月晦步西湖小憩市樓鼓腹不詫金石音吟步竹塢俄梅林方愛羣鶩漾清泚忽聽一鳩啼晏隂野飯不妨隨分飽杯酒却憶向來深明朝晴雨恐未卜鷗鷺盟寒空復心諸公約再逰再次前韻呈林郎中五首清詩似奏韶樂音林侯宿世孤山林疏雲時漏涼月影雛鳳獨嘯修竹隂金華后山儼在目非子誰復鈎其深掩卷炷香三歎息向來望若空潛心坎流行止忌株守敢薄紳笏髙山林平時交期車合轍回首夷路鶴鳴隂窮鳥低催客吟苦九虎耽視天門深南道主人推轂手賴君未遣灰吾心儀圗登俊煩玉音何人望傾英俊林比喜諸公挽此傑正復寶鼎薦汾隂楚珩趙璧希代寶丹地紫閣五雲深論思調虞要無迹安用夫人知格心一書僅逹缺嗣音蔀屋有夢定山林賢者即今在王所陳人不憂老墻隂或容連茹鴛鷺後聞道結知君相深時遣吳姝近酒盞更防蜀鳥搖歸心郎中出侑觴者仍戒以客中小耐春皇報人如寄音紫燕窺簾鶯繞林于時不無客欣戚此意正繫天晴隂傍湖樓影酒旗直到眼人家花霧深老子獨醒尚此興歸時參昴橫天心徐南卿招飯徐郎陋巷四立壁乘間亦戒賔友食慈親衰鬢不供剪定賣春衣典書册念君治具良騷騷與渠侵早來得得小樓十客不餘地猶勝陶翁劣容膝江西米絲作窩吳國香粳玉為粒嗣宗阿戎各好士笑頡羮鄙仍婦德老子旅寓得此飽勃鬱詩情喙三尺出門未妨雨墊巾萬屐聲中緩歸䇿再次韻東鄰客來每堅壁西鄰客來常蓐食旅中一飽豈細故偕舉大事書之册末路孜孜食眠計外此敢忘戒在得蘇端向我顔色好衝雨不辭泥沒膝居貧頗禁惡客惱念子稱薪仍數粒肺可用禴米可餅併付饞僮飽君德人謂裁詩等裁錦拙婦渠能把刀尺陶翁宜報苦未賡搜攪肝腸間倚䇿再次韻白晝曲肱睨東壁鸒斯空復賊糧食晚途自笑硯生埃少日頗嘗韋串册生世恐隨草木腐忍使功言兩無得長安寧無翕赩者自疑有鐡關腰膝樂天任運時近酒子房逃榮猶却粒求窮我者迄未知夫此誰怨夫誰德擬訪鶯花豁襟抱門外雨餘泥一尺山隂不待興盡回掠面東風寒策策再次韻謝徐監嶽惠和章若人胸中著奎壁落筆似不煙火食平生著述奏竒勳玉綴珠編今幾册定知前輩與爭驅抑使衰翁飽新得涎顙十駕終後塵坐看康莊驂齧膝陶猗廪庾詫陳腐小家瓶罍不餘粒清詩屬我猥見豫祇遣心顔賸慙德條枚拱把竟何取挺拔蒼松二千尺政恐血指匠石前袖手觀傍猶上䇿再次林郎中韻幾年塊處斷足音日詠楚些歌常林朋知久矣張邴我矻矻抱甕如漢隂末路面顔殊自笑故人情義無與深桑榆可收倚君重表表玉立行班心江湖長翁集卷九
