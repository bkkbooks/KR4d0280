body:
  text: 江湖長翁集卷二十二宋陳造撰記快哉堂記儀真子城東舊有亭庳局弗與地稱更而為堂營于前太守天台吳侯洪成于今攜李張侯頠以其亢爽屹立江山市區歷歷目中榜以快哉舊亭名也今仍之取宋玉蘭臺賦風之語夫君子固有寓意於物而實不在物者二公之賢其亦為此風之快歟其亦有快於此風而其意有在者歟吳侯為郡民庶而富千里妥安仁孚而政洽遺愛未艾也張侯繼之推前政之意撫摩之益勤其感悅化服子弟之於父兄然也南楊召杜而接踵政魯衛而適後先者也真之人亦幸矣哉君子為政喜憂以民未有下熙然而上不泰然者也人惟不愛人與無位以致吾愛則已不然目連甍接踵之繁夥耳塗歌里詠之說嬉其所以快于中為如何是堂也其更而成之皆熙然泰然之後也夫佩必玉蓋于其德見大水觀焉聖人之心所契者道也論君子為政毋泥諸物求諸物之所感庶得之想二公退食此來憑虛逺矚彼飂乎其清穆乎其和遡水波略蘋芷拂簾旌而褕衣袂不獨蕩氛歊而空之且將凌雲霄而茹沆瀣顧乃曰吾何快於是其孰為座上客盍以吾言復之靜賞軒記山何與於仁而仁者樂仲尼之於水非孟子莫克知之得諸外有諸中也子張子作軒以靜賞名取子美雲竹之語彼其連娟徑挺梳風媚月翛然埃壒外似君子之靜于此焉賞中可知或曰子張子賢而才從仕之始理棼整繁有不容已未可以靜藉其口是不然應天下之糾紛非至靜不能彼方駢集沓來我且竭蹶赴之事未易濟而心則倦憊皆是也子張子豈其然天下事波驚電駭覆却無方而不能干其湛然者夫是以隨遇而功子張子優之吾知之深且久故因是軒為之言淨香軒記子劉子作軒與其弟讀書以淨香命之人均有所好惟君子則得其正而此君之風猷韻度蓋非蘭麝而實香辟埃坌而獨淨淨以得君子之性香以與君子之行子劉子之所以寓王子猷之竒嗜而取杜少陵之所詠者歟二子居是軒香其行則人即之不容辭淨其性則隨寓而善應矣雖然詩人之於物皆有以領㑹修身與世之大者而觸類無所得則士猶病之劉子顧以子美語風吹雨洗者自玩自懌或者猶詳於寓而略於警非耶若夫拂雲於無剪伐之後吾特以是為劉子請清風亭記豫與客訪乾明主人登小亭時春色醺人欲醉豫愛其僻敻寂絶翠竹逺近羅立淡然忘歸主人乞亭名顧壁間詩則豫友趙子野所題有竹風清之語因請以清風名之且諗之曰境幽寂與竹宜竹與風宜夫其拂衣塵為此登蒼翠森疏玉立䕃映而飂然翛然忽焉動襟袂凉膚髮回視駢車簉武地如日偶俗輩一旦接髙人勝士背蒼嶺俯碧流不作市區埃壒面始揖而進固欲追騎鯨御風之人於風煙之表吾於此又將賡桂枝之篇誦招隱之章命此君披拂熏沐子其何如客曰是起豫遂為之記繼雅亭記郡南門為客亭其屋大小凡幾間其材堅其規橅適中名以繼雅取淮海先生詩光華逺繼周王雅之句前此客餞輅乃于征稅之區進退揖遜局不舒而徒𨽻車馬勃溪搶攘可厭今周旋餘地矣夫賔至如歸子産以美晉文而候不在疆里不授館單襄公知陳之不競河南陳侯為高郵大務舉十九動與古合此尤非可後者是亭也侯創而名之記而識之者郡人陳某也引月亭記亭瀕水月與宜太守陳侯創為之名以引月與賔寮登之有歌于側者曰月之徘徊俯亭之隈若招而來兮月輪兮盤盤儷公心之高寒月波兮沈沈嫓公惠之浸深月之從公麗紫闥映丹地兮望月屬思儂其有既兮郡人陳某適侍遂取以志其成槐衮堂記盱眙古邑也晉宋而下南北異壤嘗郡其地以相窺控本朝統一則邑于泗南渡之後復邑于揚紹興初定講和戎之䇿君相疇稽古今以其扼南北之衝升復軍壘又擇賢才守之歲壬戌也故大丞相少保沈公以軍器監簿寓直出膺是命至則規度營葺凡其所以昔縣今郡若閈關館廥營廨之類郡所宜有者頥指隨具不侈不陋吏至如歸不敢苟簡于事而民應其命有子來無病告規模立矣則嬰孺視民撫循詔告之自近而逺怡悅按堵乃興黌宇乃延儒先擇秀民輟官帑羣而居之而誨之以文諄復詳至至今襟佩文學不落他郡後庶而教之之政由公再至經始之又潤色之其加惠于民愈久彌篤故法備而愛孚去而相天子迄能成終紹興之治其家法所被才傑林立天為盛德報至矣今鮑侯領郡符後公蓋五十三年下車未幾論世師古獨於公之一話言一施設謂舍是無以為法郡齊之後所居堂名昔人以其諱徹之侯以槐衮扁焉求豫記其事且紀郡之始而載其德以詔無窮方公為郡豫雖幼聞見其德政甚詳吏有以僞帖盜宅金者家人質之公公不可否也隂惎之逃其包含恢大如是者不一淮人户知公果公輔才也若王文正公韓魏公其經濟器度皆見于卑官時公則無愧昔人郡課最或貶於輔佐相業茂外庸有不屑也公不然致君堯舜而虞周天下之俗方守是郡規畫井井後人雖欲出私意少增損更革之而不能是又畢公之克勤小物者歟兹可謂全德名世凡士之事君皆所當矜式則吏是邦升是堂盍仰而思公之懿俯而酬民之望篤其慕心庶泯其愧心哉侯不惟反已抑以淑諸將來名堂之意蓋在是豫故表而識之秀野堂記延陵吳公佩守符為高郵大侵之後歲才中熟公下車弱良撫寧强梗爬梳利害罷行惟恐後德心下孚咸有四釜之樂振蠱興壞亹亹日力百廢緒舉人視之良甚戞戞公則優為粵明年民氣洽和稼事十倍乃除圃西荒茀地重建秀野堂堂成領賔僚落之酒行主客胥樂笑語之餘周視四覽不假刻畫㸃綴而景物前陳目謀而心愜儼乎坡仙所謂秀而野昔人謂即兩言可圖畫者至若池荷動而鯈魚牣木䕃濃而鳥烏樂北垣挺竹千箇微風披拂舞翠幢而嘯饑鳳人情愈怡物態固若效竒佐之喜也公顧客陳某是不可不記子毋辭某得諸故老是堂自元祐則有之詩人楊公濟暨衆賢咸有紀詠中間兵纒淮地堂廢詩亦不傳紹興辛巳國家引齊宫貢士有院而不慁教養之地公創而備焉先生所為無掣其肘蓋與公意契鑰也公與先生相得幸矣而吾邦之士一旦偶二賢者不幾至幸歟豫故併書之而亦有感焉昔茫然今截然三歲爾夫孰敢冀今顧若此而事之興壞人之才否不能齊截然之後渠能必其不復有茫然之歎二三子他日拜先生之像其思之不忘又將如何吾僣且過憂恕之者知其為鄉邦計也云爾維揚貢院夀祠記安撫待制侍郎趙公為揚州庶富斯民之心切切焉其養士而欲其成渴如也民庸奏最矣學政亦既井井又惟試士無所創貢院凡若干楹諸生被公惠感公意淪入心髓乃即貢院繪公之像為生祠以寓其不忘之誠適高郵陳某來遊求記其事因諗之嘗承教於師吾於當世盛德邃學可法蓋嘗凛乎若立吾前晨夕斯食息斯不至焉恥也庸不失吾身以至于今小子識之今諸生之於公亦遇矣而又知公之可法至於繪像而極其瞻敬則凡公之刑于家孚于君補衮之績仁民之政行業文章必也凛乎立於其前深思究懷曰吾他日觀光上國䇿足仕籍皆由此而後進不惟大比較藝進而接之目將平居暇日著之吾心晨夕斯食息斯就其所以如公者而深戒其所不屑為則庶幾矣反是雖曰龍章鳳姿氷峙玉立日吾對焉於學猶無益也夫士志于上僅而中志于中果能中乎下而已曼云也昔人步趨聖師終瞪若乎其後善學退之者湜而樵彌不逮他無聞也汲汲學之如此爾悠悠焉吾憂也今諸生用意之善豫竊喜之然豫其友也故後譽而先規告以聞於師者游山記黎明䇿杖出錢湖門飯于旅邸主人入劉氏寺遍覽其勝處度慈雲嶺窺易安齊酌虎跑真珠二泉登六和塔就市樓小飲聞駴萬鼓聲則濤頭來自海門舟之候潮者如螽如蜂如亂葉如蜚而西客意漂蕭有憑虛意潮事已北訪石屋閲象鼻石入煙霞洞徙倚於清心閣晚宿于延夀小菴翼日茗飲于慧因僧了心之室小留郭氏庵坐于龍井石上漱其泉徜徉于新舊圓覺日已西自麯院買舟以歸周游歷覽然止二日不已勞乎豫以磨勘故春初館行都既五旬隂雨十九倦倚局坐一樓之間視不外窗户聽不越四鄰冒雨而出則乃問閽𨽻以偵伺朝士之在否其接客與否久然後知其胸次鬱滯湫底如鷹在韝而側睨平林曠野絡馬首而絆之也一旦風日清亮煙林雲壑葱蘢䕃映得以徐行緩憩而崇山積水嘉木秀卉泉聲鳥語後前左右一可以說耳目而適其心亦何異斷鷹之紲而縱馬于野是足以忘其勞始其出計新霽不容失暨其歸則明日復雨兹又非幸歟用是知世之窮者大約或小泰古所謂其勞可忘者身履之尤信且喜豫老而健猶可從事山林間也同遊者山陽陳德美顯教僧華記者高郵陳某唐卿某之幼子師是實奉杖屨紹興元年二月十九日遊山後記杭人喜遨蓋自緩緩歸曲始盛而極于今今為帝都則其益務侈靡相夸佚樂自肆也宜然湖山之勝近在城外城中憑高約略在目一舉足則向得之約略者皆身履之俗之喜遨亦其勢然山以湖故以南北名而北山尤便且易至豫遊南山竟再宿雨既小霽復攜兒出暗門歷觀廟二僧寺四略亭榭館墅降陟山阪遵栁隄穿花塢幾十里所既歸日甫銜城慿欄回首則適之所歷指以語人無遺者意喜遨者不必杭人也凡羈人俠客與夫遺埃壒工賦詠者尤不能忘情於此使其逺於闤闠非作意聚糧莫至則樂不償勞雖所欲將不能不然見於六一翁之記而聲於白蘇二公之清詩妙曲何其誦詠褒豫之不小靳耶豫尚留計時泛湖波且涉其瀕以細訪緩閲其煙水嵐霏清麗勝絶之趣以滿酬夙素以豫揆之則杭人之俗未易可議紹興元年二月二十二日東遊記紹熙庚戌冬豫東遊因有所得輒復記之非東遊是記所得之不可忘也鹽城縣去高郵二百六十里北瀕淮東斗絶入海城西有泊俗謂之小海其地卑下其氣底鬱其風物庳陋粗惡井斥鹵不可飲人墮俗習曾不他圖米麥之佳者就烹焉飯血如麵墨如驟見之不容茹時風雪連夜旦河氷數寸歸懷不可少忍膠舟莫前也倦悶臥髙舂浩乎泰然則已吾鄉閭井邑矣親友前勞酒肴橫從喜今悼昔未竟剝啄門有聲起迎客則吾友陳德美攜某二生來坐定容儼然溫氣充然和議論膠轕粹詣三子一如二客去陳子曰是人也其處已重其與人一而文采足頡頏一世而不有之者也是可友也豫慊然自失蓋狷易不任多端莫持士率犯此豫苦之而文又豫所嗜而不能自忘者是其果賢於豫矣則復自慰有買鄰耦耕之願吁向也歸心之鋭不可傾刻留非為身口計乎身口是計役於內也今者歸心之忘若將終老焉非以已之不足慕彼有餘乎慕乎彼是怵於外有所役有所怵臧穀唯阿其孰為正古之畏友歟其出也軒冕非華裔夷非僻人惟裳衣而語言皆吾族屬弟昆其處也邱壑封君桑麻萬鍾具菜茹猶列鼎晤妻子猶君臣不豐此而確彼不忘已而徇人獨立一世與造物者俱非夫無心而善遊者孰能苟進是則凡安彼邑之居而甘其食者視鄉縣何擇橫目食息之徒皆有起豫發藥者視三子何擇吾喜其有得而又惜其晚也聊識之辭記病豫幼多病然不苟病于食飲于暴露于妄喜怒也闕病始病脾闕又病目隨闕目與脾相反也益一則害一豫無如之何醫有知書者惎以救本之說劑以溫平滋補責效以漸凡物之賊脾而寒戕肝而風者屏不茹而絶欲節味如詛盟焉病遂少愈庚戌夏得利疾良苦謁數醫或曰血無非熱也經固云或曰寒極亦能血或又曰是寒熱相并劑更進血之減增視劑之寒燥然無益於瘳自夏而秋病勢衰矣孰繹而靖惟得工醫委焉進香連良愈攻風于胃乃大愈客問疾以豫熟於病且能瘳問所以計疾者告之曰人之生以元氣元氣索則死受賊則病善防其所以賊之者無疾之道也吾始病一療之乃病二置不療求諸已病乃不為害今之病之久也眩於醫之說也一醫難乎取訂參之衆醫衆合而愈益眩末得工者不假竒術高論去之掇如也蓋亦玩其疾之悉而自計審也夫詳諸已可以無疾精於人易以愈疾保元氣在我祛其害在醫昧此矣不死則憊曰子之言似可施之政請少進申告之曰吾熟於病知病之說爾渠及他雖然嘗言之國之有綱常道法非人之元氣乎外內姦宄交偵而竊伺非賊元氣者乎三代聖人於綱常道法致謹汲汲也時豈無偵伺以投其隙者不遂也有由是物虧而姦宄肆從而治之一消則一起或不可為者皆是也漢祖患功臣韓彭誅而北敵橫武帝患四夷衛霍功而海內耗讒臣興孝文無為光武戢兵其知保元氣者哉非借箸之言譊譊者售則天下楚而不漢恢以竒而信安國以常見玩能無妄舉乎若文之聽長者言光武之審黃石持以恭儉勤明焉蓋有見於獨而無所眩者是雖無祕謀竒勳然可以無亂亦可已亂子所謂施諸政類是非耶曰然古有醫國之說幾是哉遂從而書之集同年記小宰費公士寅西掖陳公宗召左史湯公碩倡之慶元庚申二月八日合乙未歲同年進士飲于西湖環碧之園其敘以拜其坐以齒其主席者三某官其預招者十二某某自舉觴至揚觶三十刻所飲既酣合辭言曰仕熙代取科第良幸而吾主客十六人者官于中外合而離越二十六年離而復合把杯相屬道國恩論情素勸加餐祝亨嘉聚首一笑不其尤幸况時仲春風物媚嫵欲雨倐晴雲日葱曨西湖山水秀麗甲天下而環碧之涵虛又西湖勝處宜春宜晴宜觴詠俯仰徙倚湖光澄渟盎盎如釀鳥魚弄影窺闖樽俎風柔無力落梅泛香斷續襲人一時佳勝為吾徒有不止古所謂四并者政恐後謫仙無此樂非三巨公篤事契忘名分未易得此此不容不識客命某致辭書者胡有開也記黃倡黃倡名真真本皇甫氏冒黃有愧也流落高郵倡兩兄優同養姥壬寅歲五月二十七日豫借郡妓飲客倡且來頗穠麗然騃而疏姥恢磊豐潤皆不類倡家豫固異之倡歌以侑酒語如侵衆妓倡不知也衆妓怒詬之倡憔戚不自容姥解釋譊譊乃已徐詢之倡父謹字公度曾為金州大將俄知橫州以事得譴去去而卒妻子失身乃爾姥褚中告在焉客悲之諭姥欲裒金嫁倡姥曰甚善然二子碭而優待妹乃濟二子之不濟妾則溝壑為良人與為倡孰優妾悉矣然無可奈何妾塗寧自振未有期則泣下客亦淚沾襟或曰謹在金州一部將妻女美法之妻女歸謹或曰謹志也豫疑造物者司世間事貴賤升沉榮辱翻覆之遽報其人往往過其適必不徒然及得部將事乃知倡至是也有由殺其人取其妻子與其子優若倡其酷也不異士有官有位惟已便利計不正不忠不廉不恤也汲汲計子孫而天下之男女不才失行甚者士夫之後不乏亦必有以致之彼且若是况倡父耶倡未足悲而客悲之悲之而不監之何益識之以示諸子記嶽侯事張平為盜湖南嶽樞使討之遣李道往平尅日與道戰道之始發也嶽集諸校置酒而歎問所以歎曰使道當平能不憂乎張憲請行許之計授憲臨陳就以道軍戰平降者與俱來又計授道憲到以兵授之而歸平臨陳求與道語軍士以張告平惕眙既見憲召左右議遂降嶽意李威名出憲下憲徑往則平且逃去臨陳投以所忌則氣奪識者以嶽之料平與李光弼降高暉李日越不異記王尚書事王佐宣子守平江政聲第一尤長聽訟小民告捕進士鄭安國酒守問之鄭曰非不知冒刑憲老母飲藥必酒之無灰者守憐其孝放去復問酒藏床腳笈中告者指言之何也豈嘗有出入而家者乎抑而家奴婢有出入者乎以幼婢對追至前得其與民姦狀告以酒處者婢也冀倉卒逃去皆杖脊遣之聞者為之一快議者謂與湯致逺治告牛肉者同科湯為江州斷殺牛嚴甚不盡止也則設賞以捕食肉者有民荷瓜入城及門被捕湯物色之蓋藏瓜中也捕者乃稅胥民云妻病不他食惟思牛肉故置瓜中冀達之湯引其妻與胥前臨之以威皆承其姦蓋妻與胥謀陷其夫者湯致之法古之良吏史䇿稱其神明殆此類歟江湖長翁集卷二十二
