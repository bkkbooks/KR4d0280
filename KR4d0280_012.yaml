body:
  text: 江湖長翁集卷十二宋陳造撰七言律詩赭圻朱旗僅奏蜀川功咫尺中原未向風禮接謝安猶故舊心知越石是英雄生前逆氣無宗國身後餘殃有狡童忍對青山話遺臭人生過鳥抹秋空門題自笑冠裳裹沐猴只今江海信虛舟斷無貝闕珠宫夢好在黃雞紫蟹秋詩外盡為間日月人間分占素公侯政須鷗鷺供青眼未厭山林映白頭飲客暑氣憑秋已自消可能枯䇿伴良宵試開玉友招詩客共吸金波對舞腰人近笙歌堪耐老天非風月定無聊簿書正使無間暇卜夜時須慰寂寥次丁嘉會韻二首其弟嘉正亦在倦駐頻題醉後襟離羣自歎闕知音卜鄰未暇論前約著語聊須慰此心小挽歸軒清夜飲憶嘗對臥白頭吟中年畏别猶輕别添我霜毛又幾尋塵裏清風忽滿襟詩成正始識遺音才輕餘子今文舉氣壓諸豪復季心棋罷蠟燈銜燼暗酒闌庭樹挾霜吟百年衮衮須今夕歲晚鷗盟要重尋再用韻寄丁知縣三首旗亭風月小披襟慰我東歸聽足音潮水去來當有信岫雲出入自無心酒杯乘興從妨夢詩律緣愁久廢吟明日揚舲回白首煙橫北固櫂千尋南樓酌酒未分襟啅鵲啼烏亦好音晴日倒紅生笑頰煙梧搖淥漲杯心可堪歲月供行色盡把江山博醉吟不繼蕪湖留十日焦峯浮玉恣幽尋丁為蕪湖簿留豫必以十日為約别時把酒欲霑襟楚翼吳鱗要嗣音撞玉饜聽辭客語斷金深得故人心對床風雨終前約滿眼湖山念獨吟何日水雲淮上宅草荒三徑肯深尋念衰心意雕殘底自娛每臨清鏡笑頭顱詩從多病難為好官過中年劣勝無急景驅秋著髭鬢歸鴻銜夢下江湖更應載酒髙陽伴誤輟歌呼話故吾間適二首人間火烈更風蜚笑殺幽人詠檜枝貪赴敵場爭腐鼠寧知造物玩癡兒百年擾擾𤣥駒聚萬化悠悠野馬馳老子床頭但周易尚容隱几耐支離丁年故紙枉埋頭老去時名底用求得句蓋嘗身被謗屏書姑免眼為仇關門工作槖駝坐閲世已𡨕鵬鷃遊槁木山麋真適適從來里舍議家邱九日留交代歸軒小駐莫匆匆佳節胡宜客路中巳締金蘭千載契政思茰菊一樽同磕山煙薄秋容瘦槐衮簾疏晚照紅此興向君殊不淺要看醉帽受西風次韻蘇監倉二首時蘇兼主邑學交朋又得一相如髙掩虞郎行祕書妙論析微驚我倒諸生到眼可人無一官幸此分鄰燭五字渠能攬虎鬚快讀清篇病如掃北軒風竹對森疏長日奔馳傳置如久妨著論與抄書逢人爭席有時有疥壁留詩無處無禦冦未辭躬楚製論文常憶攬桓鬚扁舟再有東游便肯向朋從自作疏再次前韻二首未說髙文錦不如談間已勝十年書是中我亦濳心久作者君今舉世無應俗不堪塵眯目論交政復棘如鬚獨憐兒戲心猶在更向詩筒較戚疏倉官尉職賤誰如終歲區區奉簡書勝日偷間須著便青山有約定來無著書聊閣如椽筆疾惡休張磔蝟鬚好袖新瓢五峯路碧淙清樾伴蕭疏縣圃酴醾北園紅紫巳蜚塵始放幽亭爛熳春疊翠影低珠幰重洗粧人倦玉容真薔薇清露疑分派茉莉評香且外臣領略濃芳須好語即令袖手恐花嗔賞酴醾病不赴不得花前共一樽蕭齊藥裹自相親間追水佩風裳夢空負雲階月地春縹眇瑤英霧為幄敷腴玉面酒生鱗蜚觴刻燭輸公等定指芳條笑惡賔次陳宰韻觥籌交錯舞僛僛曉色侵窗客未知便整醉魂乘款假尚餘吟興屬酴醾還家擬趂寶瓔珞喚客重乾金屈巵著意風煙與調護免教花意恨歸遲徐陶會松底軒窗卸虎韉竹簾間裊石爐煙山間風日小春後會裏杯盤長至前蟻子醪敷能及客彈圓侯栗不論錢巖棲野嘯平生意失腳塵埃雪滿顚即事泛蟻醪敷且命斟中年節物自關心風前千栁競春態煙際一鳩啼晏隂急景絶憐添鬢雪芳辰猶阻盍朋簪年時醉藉梨花地回首鷗盟可得尋縣西一徑斜穿犖確行身間尤覺馬蹄輕坡頭嘉樹千幢立煙際長江匹練橫茶鼓適敲靈鷲院夕陽欲壓赭圻城一春簿領沈迷裏野鳥山花眼最明上峩橋早行一從箠楚替陳編漸慣山行野店眠白㲲風霜雞唱後黃塵岐路馬蹄前光隂付我千莖雪伏臘何時二頃田寄語淮鄉隱君子浪言梅福是神仙寄幼度主簿辭家暑雨濺紅蕖轉首蕎花巳雪如歲月秖隨流水逝笑談陡與故人疏簡書我正罷長道歸棹君行指舊居他日霜風吹夢破空從旅鴈覔來書和張秀才山川向晚㸃塵無忽訝篩瓊屑玉鋪巧與梅花爭便旋試將姑射比肌膚破寒春酒何曾釅薦筯窮鳩不料臞陵藉東君從作意未妨芽甲暗昭蘇雪晴再用韻龍爥飛空雪漸無光搖窮巷麗金鋪妓樓遽喜春生座席户渾驚粟在膚剡水不須乘興去飯山猶是作詩臞自憐白髮疏慵客擁被髙舂夢未蘇次韻早春良辰邀醉得錢無雪後郊原翠欲鋪無力晚風搖柳線有情新日養花膚尋芳擬貸愁邊意照水還驚病後臞春到秖思為圃樂賸移杞菊種雞蘇次韻張秀才雪可是春皇吝物華羣仙剪水作竒葩壺中天地渾糜玉風處園林盡勒花宿火暖寒聊榾柮夜光落手忽驚嗟忍飢遽擬搜詩謝何異空腸更飲茶用前韻酬雪霽東風吹暖擅年華不放江雲揚素葩嫩碧忽看搖水面暗香巳復辨梅花塵埃憐我褐之父名德思君留子嗟沈辱清詩祛滯思真成酒病薦真茶寄丁主簿江邊聚首偶經旬自挽園蔬拂甑塵老檜根株官舍古凉蟬風露賊曹貧斑騅去後情無那紫燕飛還句更新一舸東浮待秋老菊花蘆葉定留賔寄林子長教授芹堂風景幾經過匝坐紅蕖倚緑荷下筯慣嘗雲子味開樽仍費雪兒歌官移催我離羣去夢境思君樂事多鴈足寄詩情未薄却慙屬和付羊何楊家會小坐斷霓收盡有雲屯月映蒼茫山斂昏白露素空猶暑意碧林危葉巳秋痕鳥烏定為何人樂絡緯惟能竟夕喧老閲流光易悽惋惜無佳客共清樽七夕龍旌鳳扇一相迎知費青禽幾寄聲天上經年才舊約人間轉盻便深更凉河只向樽前落微月偏來酒面明後夜玉琴彈别鶴獨應乾鵲夢魂驚復程平叔早歲雄文手自編偶同聞喜聽鈞天漫為官去吾何取肯寄詩來子定賢潘嶽自憐頭易白士安况苦病相纒羡君身健須如漆萬里亨衢穩著鞭汪叔量白酒妙訣何年受異人釀成珍齊秖逡巡端憂肯念霜髯客取醉時分玉色春篘處想如君德厚飲來渾類我詩醇借書問字渠須許走馬鳴鞭莫厭頻寄鄉中親舊攜書憶上上江船撚指官曹欲二年白傅病多空自歎老坡仙去却虛傳人生修短庸非命我判浮休不問天來歲過君定驚笑尚堪詩酒與周旋鄉中有傳僕物故者隱靜簡堂老贈藤杖兩枝藤杖各過頭一贈詩翁一自留借力崎嶇知意厚分岐喧靜果誰優拄歸山路煙嵐好橫向禪堂魔魅愁償盡阿師行腳債不妨分我老滄洲次韻楊樞視墟遊隱靜勸相江糜畚鍤忙却回小隊訪山房松風不約爐煙直晝晷濳隨僧話長政外輟間知有味區中得醉浪名鄉銅丸好句長哦罷坐聽驚猿墮莽蒼次韻楊樞喜雨神護天關色正莊挽回帝眷一絲香人間雨信先鳴鸛仙界雷翁叱臥羊剡剡青秧迷逈野浮浮白水澑方塘豐年信出為霖手懇悃憂民意叵忘病中書懷二首少日清孤效樂天諫書未落世間傳曾圎八節灘頭夢重了三生石上緣雪竹霜林便老境蒲團禪板付臞仙詩篇把玩真聊爾古井無波敢自賢促促浮生忽二毛安心有法賴禪逃夢知二豎今相避仇問三彭底許叨世路從今蝸兩角燈窗姑置兔千毫破顔細㸃功名録秖許淵明酒處髙次韻元卿二首君自才髙與世疏我頑能使此溪愚醫師久巳肱三折賦客枵然屋四隅莫道十年同好惡相過一笑間憂虞胸中圭角今餘幾詩膽由來巳破觚笑攜佳句又衝寒政用消憂觴詠間酒賤粗能留子醉食貧未暇慘豫顏搜詩杜老方須藥强項蕭生且抱關舊約偶耕猶念否霜林雪竹正斕斑次韻劉宰傾蓋回舟一再逢向來淮左又江東自驚歲鑰催衰白况說京塵踏軟紅吏役吾方百寮底詩工君更古人中挽留重試傳杯手得醉歌呼興未窮夏夜飲客矻矻官曹興易窮得間何惜一樽同傍愁邊到無惡客從竹間來皆好風勝日詩狂輸酒聖轉頭渭北復江東雕鞍未作扶攜去更放蘭缸子夜紅贈趙監嶽才俊如君士論推下交從昔最知歸談間八面無餘敵酒處千金不當揮方辦西湖陪語笑預愁南浦訴分違只今又捧江西檄連夜驚魂夢打磯行都露冷河傾斗柄低望仙橋外獨歸時風梳御柳娟娟靜月度觚稜故故遲幾處清歌留客醉誰家長笛倚樓吹太平喜樂朝仍暮帝力何曾爾輩知春晚郊外輕雲閣雨不成飛稍喜行軒貸夾衣帝里園林春欲老人家簾幕燕初歸滄灣潮應沙痕瘦碧隴煙生麥浪肥眼底湖山聊著句那憂樂事與心違託人賣馬二首伴我山城慣嶮巇長因馬健感吾衰三年粗了癡兒事併日猶嗟竈婦炊會見千金市龍種可能一笑換蛾眉還家劣有枯藤在神駕尻輪得自欺間人徐步覺優游馬似羞貧意不留久厭短衣隨射虎更憐匣劍佩耕牛楚山好處聊雙屩淮水生時辦一舟如子長才當柄用佇看干斾擁鳴騶次韻王知軍雪雪神濡物不遺時嗣歲懸知羡帝祺沙界積蘇煩阿母天仙剪水倩風姨郢城曲好無前調梁苑賔來有後期未辦壺天陪一笑夜深空斂索詩眉壺天盱眙齊次韻汪解元萬里亨衢子舊期故人留眼看蜚馳低回尚作風黧面遇合何妨物在頥落筆每驚風雨駛探囊或恐鬼神悲禹門合有龍頭信小待桃花浪暖時汪免解赴省次韻王知軍夜坐有懷夢想天兵下不其壯心搖蕩受風枝攝衣試作聽雞舞窮我庸非造物兒腰下誰懸蘇子印城中人笑董生帷西來江左夷吾在小敵才堪劍首吹次沈倅韻呈王漕王家流慶水傾東不獨烏衣紀數公天畀臧孫當有後人遲汲直未居中鳳巢衮衮九文羽鵬路搖搖萬里風隔坐從今幾雲母定知周魯各元功次韻王漕起秀亭夢躡常山萬仞巔寶符千載尚依然烏孫有底梟憑夜赤子能忘蟻就羶正朔會須還禹服登臨聊復對吳天明年重放危亭目萬旅公方北首燕王公每談恢復計甚鋭次韻趙教授辛丑大旱農枵腹可念歌酒市喧譁自如趙有詩次其韻爭米何心問斗城聚蚊底許太狂生未遑餼粟如子罕謾復公言付阿平緩我愁腸千縷結羡君筆力萬鈞輕闕頌却用詩情寫物情再用韻攜孥西壘復東城觸處千愁百恨生如許堯民艱粒食未應漢法廢常平愛君長䇿三農重泥古迂儒一芥輕會略文移倒陳廪一時骨肉慰皇情再次韻贈郭髙叔知君詩價舊連城不作渠儂苦瘦生血指有人慙妙斫空弮如我闕平珠同魚目曾非匹鼓過雷門定見輕久巳傳抄呼阿買闕可復置間情寄陳居仁二首得居仁書說來闕作此寄之鵲語晨簷燈夜花雙魚隨客到寒家交情從昔金可斷别夢即今天一涯風雨對床他日意雪霜欺鬢與時加閲人半世花開謝更覺松筠耐歲華尚記誅茅柳外隄水光搖霧潤窗扉桑間曾是僧三宿海上能忘鶴一歸野店樽罍醅腳釅比鄰雞鶩稿頭肥開顔一醉平生事更向行藏計是非次韻郭教授雪二首皇心憂喜與民同闕憐歲不豐瑤檢何時下仙界瑞花一昔覆寰中和聲巳自消疵癘陳廪從知飽困窮今世臯䕫活國手信知人職代天工詩力駸駸雅頌同人言平處逼熙豐清篇自昔傳平水妙曲何人和郢中頗怪鯨牙須手攬懸知鼠技笑吾窮衰慵合袖推敲手且可㫄觀斫鼻工次王帥韻後詩呈葉教授業履氷壺器鏌邪元戎韜略况儒家功名自昔須橫草南北于今賴灌瓜村墅稻田黃罷亞塞垣榆樹老丫義為公著意收詩藁傳與中都萬口誇功名回首負年華梨棗諸雛未克家老計生涯須下澤才非世用但匏瓜為儒僅博肱三折謀食寧羞手一義青眼故人猶念此肯持巴唱向人誇次王帥韻九日楚州燕帥出詩即席次韻使君觴客及公榮慰我他時渴德深巳為穆生重設醴更聞正始嗣遺音打圍紅袖留連舞論檻黃花取次簪恰似雄邊臺上醉回頭歲月歎侵尋雄邊髙郵臺守舊所臨書劉元之教授劄子後碧酒清歌興未央挽留行色為風光小人政自屬饜足老子工於作樂妨舞雪放間愁踏月夢雲驚散冷禁霜明朝一寄相思字旅鴈無情亦斷腸立春前一夕雪二首天仙幾夜集瑤臺剪水節瓊不受催直遣瑞花將臘去盡驅和氣與春回坐窗客有吟飛絮對酒人應唱落梅雪與相如俱末至可能草賦壓鄒枚雪龍侵夜正銜枚破曉郊原玉作堆雲葉攀翻徒自舞瑶花頃刻為誰開土膏巳遽宜農事綵勝何妨映酒杯幻作氷壺天一噱夢回品物各春臺餞趙伯衛趙有詩次其韻雪後垂楊裊緑絲郵亭折贈訴違離明朝月地嗟分影勝日風流此一時白閣論詩成夢境清湖載酒有心期樽前擬倩如椽筆細與邦人寫去思贈仲國美前年春國美亦留夜飲云三閲春光一建瓴依然歸棹泊危亭烏迎客子各頭白栁學故人俱眼青曾是縱談僵婢僕又成豪飲臥罍瓶明朝小話前溪别分付溪風管醉醒次韻彭景貺紫燕穿簾若有求為人端作置書郵詩翁别後猶能酒妄尉歸來亦未侯江閣香溫留語笑花樓月好記從游即今滿眼悲凉意投老寧禁此假愁贈課會諸公歲月翩翩驥受檛妙年雲路不應賒手中白羽真穿葉門外蒼槐又著花丹竈功成須換骨天河波淺待乘槎鴈行看即青𡨕上却笑臞儒兩鬢華再次韻答陳居仁二首籬菊擎霜又著花插花猶記醉君家兩州札翰雖頻寄一笑班荆迄未涯酒處賦成千載計床頭易熟數年加珠璣屬我元無踵坐想揮毫寫物華丁年也辦刺天蜚幾夢西垣與北扉未簉時英書汗簡巳煩溪友寄當歸桑榆境界寧辭冷芹藻杯盤可得肥說似故人應絶倒衰顔五十盍知非題殖軒窗户青紅斷手初桃蹊竹徑類僧居日陪騷客揮椽筆時著班衣奉板輿領會能忘一樽酒窮通擬付十年書仍聞布榖催春事一雨朝來溜決渠賀二石登科捷音西下亟蜚星二雋辭鋒舊莫京桂樹前宵減清影棣華同日擅香名謝家蘭玉真門户蘇氏文章亦弟兄此去提衡霄漢上鵬摶鯤運更論程次韻何符山人二首久雨而晴故有後章門下軒裳不轉頭何人皮底著陽秋獨煩客子衝泥屐屢到衰翁聽雨樓從昔詩聲追正始即今賔友驗宣州清篇快讀彊人意未覺京塵厭薄游曉看明璣下網絲物華俱屬喜晴詩一詞不措重呈拙七字鼎來當更奇喜鵲啅人真作意蝸牛屏迹似知時湖山好處長謠去擬赴蘇堤勝日期同髙叔不愚如晦飲再次韻二首詩老掀髯吟掉頭紅粧間坐眼波秋快傾良夕如澠酒宛是當時鎖燕樓樓乃舊名倡居想有疏簾窺白下可無急鼓衮伊州憑君更挽劉師命寬破三年爛熳游珠簾深裏按金絲幻出揚州杜牧詩共引玻璃扶窈窕更煩側理寫瓌奇一歡有約能如願四者求並每後時却念少陵從鄭老得錢沽酒話襟期題潘德久竹居竹裏幽棲不掩關解將應俗等居山風流彭澤羲黃上詩力蘇州季孟間官縛猶存紫公服客來肯靳玉絛環雪兒小直珠千斛可但疏簾見一斑次韻張直閣避暑紅榴照眼笋穿階峭閣登臨快此來淨境祛煩仍客共醉鄉逃暑更書催庭隂碎喜風頭動虹影明看雨腳回萬事屏除詩債迫此心抖擻未容灰次前韻謝胡運屬二首耐暑初宵露白頭詩來分我一襟秋露飛瓊滴漙蒼竹月漾金波氷小樓政用桐君絃白雪便煩從事到青州此懷未滿須箋與更為狂生賦逺游爐煙裊裊上晴絲伴閲長須送似詩眼著昏花豫巳老句鏘哀玉子能奇隨人趨步庸非俗取意粧梳自入時大手只宜臺閣裏不應猶話鹿門期早步湖上忽忽京塵漬客衣正須軒曠一伸眉獨行初日葱蘢處不待游人雜遝時魚樂暗搖亭樹影風輕間弄水雲姿因循又耐簫歌聒早晚湖山細入詩次韻章守移學千柱崇成儼舊規小勞移築未為非諸儒受業三熏沐賢守收功一指揮蕆事此時爭拭目決科它日看增輝問𤣥亦復侯芭事可但經生識指歸次趙解元韻養病年來懶著書逢人掉臂睨迂儒愁邊好客從天下談處清風起座隅愧我多言終不近似君知巳未應無酸鹹嗜好雖殊禀政恐渠儂誚太愚再次韻興劉止用一編書萬軸垂籖或腐儒表表君今超北學多多我巳悔東隅聲華看續諸公後爾雅深知一筆無縮手袖間真老矣灌園蓄㹀了朱愚再次韻呈章守吾儒交賀得宗師片善盱衡置百非小駐鋒車宣室召時觀談麈頖宫揮詩壇已許分餘論鄰燭何曾靳寸輝此意急須箋阿衮不因魚稻久忘歸次韻章守獵身著邦君小隊中縱觀虎將萬旗紅目光注射鷹窺草電影騰凌馬弄風忽有清詩驚破竹更憐蜚翼墮抨弓南歸又苦車中婦夢憶分鮮一醉同飲殖軒病骨今朝覺倍輕雲天昨夜巳全晴爛遊花木欣榮處賸喜風煙指顧生春草池塘頻入夢夜窗燈火會尋盟悵然又與禽魚别波影沈隄晚照明趙使君淮春樓落成二首五鳳規橅到眼中摘星奇觀欲爭雄客乘雲氣遊三島人聽歌聲指半空便擬瑤杯酌銀漢何妨醉面受天風胡床不盡登臨興未覺邦君後庾公步帳髙牙置下方華筵雲影入風裳西山爽氣珠簾外北海芳樽錦瑟傍賔主前聞無勝事簪鈿明日賸餘香一天和氣誰拘檢付與邦人作醉鄉贈趙秀才一首平生心事釣漁舟邂逅青衫映白頭肯為功名戲雕虎不留顏面對沙鷗露漙青蓋髙荷曉風約黃陂小麥秋入眼斜川歸趣好此身何處不莵裘寄興化葉明府進卿二首奧學居瞻數仭堂業文自笑及肩墻平時江月工分影勝日篝燈約對床身世我方憐枘鑿風期君肯遽參商相忘兩舍雖匏繫當有詩筒訪士鄉一昨連甍較詐狙缿筒合鬬未良圗君來嚬笑民之法政絶鋒鋩古與徒俗變身如游建德時清人不畏萑苻自公日有詩書樂大府仍無急急符贈曹秀才二首生杭人方免解赴省不復林逋起九京空留詩卷逼人清如君况自鬼神助擲地應聞金玉聲敗履人今笑東郭奔蜂我亦愧南榮三千奏牘真餘事側耳齊廷待一鳴抖擻胸襟一不優迂臨惟子肯綢繆訪書笠澤心摧落苟祿吳門路阻修老去欲追三徑約客來當辦一錢留它年水北山南計更挈詩瓢就我不次林計議喜雪韻雪縞長空紵帶翻數知冬意未闌殘歲功告瑞須三白客子憑髙耐一寒拍塞間郊瑤圃闊晶熒危堞玉龍蟠歸來凍坐追清賞重把君詩剪燭看次韻朱秀才二首蕭齊愁興倩誰寬籠鶴昻霄顧羽翰自昔詩深知武諤肯辭雨濕過蘇端心期落落空軒豁世事悠悠拙控摶正枕誦君悲壯語夢隨飛將躡鞮汗儒冠林立更鴻生經倚菑畬道可耕便合摘髭書桂籍未須擁鼻避時名似聞眕夢成三耳會見驚人取一鳴講易露門誰第一佇君重席振家聲次韻石湖居士見梅東風猶是玉為塵靜女氷肌小帶皴尚壓芳華擅春事枉當窮臘議花神仙姿絶俗遺羣妬鼎實收功看一新疏影暗香吾袖手且容詩伯繼黃陳虎邱長日蕭齊類蠧魚出門春事半銷除快舒中散飛鴻眼穩憩文公臥虎廬塵外風光詩筆底竹梢禪榻茗甌餘歸塗定有行人問底許空青潤客裾江湖長翁集卷十二
