body:
  text: 江湖長翁集巻二十一宋陳造撰記高郵社壇記政之大端二曰治民曰事神自天子達于郡邑外此無大務然肅於神亦急於民而已其事雖二其本一也夫社主土稷主穀土穀之利兆民所恃以生在六府為最重有神主之則斯牧司民者其可不拳拳焉究其心凡生齒之豐悴安否繫焉春祈秋報上之人揭䖍展敬以致其為民之意者捨是孰急高郵雖蕞爾郡而兩邑戸口猶數萬太守之責不輕矣霅川張公來撫斯民當水旱頻仍之後財闕弗支百廢未舉首按社壇之址惕然動心曰郡固匱局是寧可緩廼斥而新之為壇㡬陛高若干尺四廣若干尺為屋若干楹以備風雨望拜與夫更衣之所豐壯靚深足支五十年未庸苴飾也工畢而民不與知及期蕆事凛然凝然如神臨旃祀已吿竣觀禮者起敬聞風者悦娭更相吿語稱頌洋溢謂公嚴於神所以篤於民誠不可揜民翕知之公之心將以飭弗毁示後命郡人陳某記之辭不能公曰毋奚必文記歲月可巳昔左氏傳春秋志諸國語即天子諸侯致禮於神有至不至焉者知其休咎如指而吏政之優於國者决可以施天下公之蕃祉碩大未沬也吾得之民足以卜之神而窘廹未暇遑之時能急所先務即此推之他日佐天子調虞天下整釐百度其有不綱舉柄掲者乎是皆可書吾於是酌郡人之心不得而略高郵軍建貢院記河南陳公守高郵政成課最下歌舞之一日謂客陳某取士郡切務也前未嘗有貢院吾將興之某曰公之來為武學為軍營為麴院當歲大侵成屋八百楹戸駭其難似不宜復有所舉而易於言言不醻為前緒累公笑曰吾規畫定久矣木于岸甓礎灰竹凡其材于舟于所無缺然閲三月當成成諉子以記逮落其成後不十日則乃悔始之料公淺而服公識之卓才之劭所未施當隨意取攜于是役得之廼為之記曰古帝王之盛倚重於士不薄其養而重其用自堯舜而下法備于周凡庠序以羣之絃誦以肄之優以餼廩表以師儒其養之可謂厚歲大比賢能之書來上王拜受之職教者簡移論昇取可官而祿者為大夫士以佐王之治用之可謂不輕周而下寖不及古復古而盡其善以不愧帝王惟我宋漢唐莫進也夫帝王之於士養而用之悉其制隆其禮為天下之至權寓焉士而才才而用環索其所由底此非吾君孰使之夫然上之所以責士死力不苟士之所以為上報不容不盡兹實聖人之權而微其機非邪是權也出于一人付之郡國夫自黨庠遂序鄉舉里選古今文異而意則同三適有賞反是焉罰漢武嘗舉以詔天下而課興廉孝厯世皆然諸侯受天子寄至不至詳略殊而賢否岐矣高郵在本朝號多士名德相望寂寥兵荒而來治平且七十年文風漸振而陳公適為守前此取士寓試郡學不惟湫底局庳士氣弗振職校士者亦病之而襟佩挑達動累月未復公意以謂郡職貢士所取所養交害也坐視可乎安在其能受天子寄不愧古賢諸侯循吏邪密計勇為果不日有成為堂為廊為軒廡門房蓋八十餘間㕑偪藩溷備固靖嚴屹數百年計不四五十歲未庸苴葺也為錢若干米若干石積累銖兩之餘公私初不與知某月日集工斷手于某月日公赤子郡民之心既孚而易使固也如篤於待士恪於體國奉上儼不失家法故推之於政細大不遺今復創巨麗前此未為之舉不窮之計于艱歉之際若無動慮者予與郡士民不能無疑于始而驩服于今是宜大書是宜得當世椽筆鴻藻敷舒頌詠焉廼稱予老衰文力退廢猥使揠其思為之辭良愧然得因是盛舉而厠名焉不其幸歟公簡齋先生嫡孫名鞏字伯固維揚龍廟記五龍血食于揚肇自國初而備嚴于今屹然為一郡乞靈之地按圗志藝祖皇帝之破李重進也駐蹕九曲池上有龍鬬於池事巳乃廟祀之其後廟廢第繪像于建隆僧舎其廟之故基與夫不廟而像之故漫不可攷慶元五年帥郭侯某復屋之于池之西偏至嘉泰之元年待制趙公來制帥閫旱涸告病禱而雨歲以中熟慨念水枯旱挽囘豐穰非龍孰致之而訪視所建庳陋甚人莫起敬惕不敢安乃移為今祠居有殿獻有亭更衣有所為屋各三間别為門而垣之掄材而堅良選貢院之餘也擇地而亢爽宅震面兌兌澤震龍廟則宜也附佛宮主香火以僧欲其專也逺邇聞見奔趨畏敬祠祭祈報無或敢怠始其經度也或告九良星在焉盍緩之公一昔夢人頎而髯顴聳而色瑩黄袍而黑緣捧赤土龍笑授公公許即為立祠旦則鳩工庀材不日而崇成迎奉之辰晴日麗空遊雲蜚雨滃鬱廟廷公親書廟額以掲殿顔是日飛雪薦瑞邦人聳觀其靈異昭著如此夫仁民而為聖賢澤物而為龍相異而相同相須以濟其所不及天命之也而聖賢又龍所依惟五龍顯異于昔朕夢于今效啓聖之符而致濟世之功惟公積而德敷而政其信于君孚于民者俯仰無愧故有請于龍若桴鼔若景響惟其必諸已故能必諸㝠漠戃恍之表不幸而水若旱惟無禱也彼且略于已詳于龍吁其難哉公謂某粗知文者使之志龍之惠利廟之廢置庸詔永久辭不獲遂以公之所示而紀之且述其所以媚于龍者詩而碑之其詞曰五龍顯迹肇我藝祖越四壬戌郡所依怙顯允趙公建纛兹土廼新廟貌廼大祠宇廼以旱請應不移武始焉中熟今兹四鬴民舒氣和刈晴稼雨盈尺之雪及歲未暮既雪而霽望無違者民究所自式歌且舞惠濟如公漢則召杜宅生于公古則岐跗惟龍於公如賔斯主佑公之民頹祉羡嘏公為民請龍弗拒之鑿粢刑牲龍則茹之鼔桴之應如寄而取如掇而予如交臂語民體公意莫龍敢侮禱穰謁欵滌樽潔俎歌歈紛若坎坎其鼓飊馭靈旗庶其來下燕我孫子豐我稷黍庸祇事龍彌亘千古新建祠山廟記永嘉鮑侯守於台無㡬時政行而民諭下教郡民曩吾宰太平之繁昌嘗旱禱于祠山昭烈王即大雨有年建廟偕民事之所欲必請請必醻王威靈烜赫應感昭著自江而南咸所依怙於淮民計不恝然得可廟地于東山僉曰昔延昌觀基也後為平川堂矣侯曰為民乞靈與事遊觀孰急更而祠象設甚嚴墻宇孔固丙辰春郡以雨請應不旋踵民苦疫禱焉如響自是千里之間祗率奉事如嚴君敬共朝夕潛格隂化如得良傅師政益孚民益易諭夫利物曰仁所以推之曰心外心無仁外仁莫適為心凡神于幽賢于顯天俾之職是其仁一其心不容二賢者之于神印契之合桴鼔之應固宜必曰岐江之南北彼此厚薄之侯不然則神之心可知鑿井而汲隨取如意東風一嘘柯葉白紅欣然鬯榮無不足者即仁論心顯幽之間當以是求之侯有請遂紀其事復作詩三章俾郡民歌以祠其辭曰淮之田兮膴膴衆産之柔嘉兮可登俎繁吾薦兮神斯茹我福我怙於樂淮之滸兮淮之流兮清深氷瑩兮醴酪之甘潔吾薦兮神斯歆羡之祉訶不祥夫奚必江之南兮搴都梁兮淮山之趾儷龍蘭兮陋蘅芷氲吾之芬馨兮神斯顧喜荷神之休燕孫子兮慶元丙辰六月既望記四賢堂記郡庠三賢堂繪中丞孫公給事喬公龍圖秦公像尚矣兼繪少卿朱公則始于今太守陳公公按圖有問知彰孝名坊孝子朱公嘗居焉曰是可以表俗乃訪得其像繪于堂扁曰四賢而命客記之高郵至元祐人才林立是三鉅賢又傑然其間入而著論思之益出而茂惠利之績文章術業國史紀之遺書粲然足以師表天下範模後世况其里之人瞻敬而取法焉宜也而朱公幼失其母棄官求之備極艱棘晩得之同州若神物誘致之一時名士播之聲詩以美其事東坡至有今無古或聞之語三公信偉矣而孝尤德之本行之所宜先朱公則優之夫有生孰無父母有知孰不可為孝子有性孰不可誨而從感而動則四三公而像之俾得之聞見誦説其不興起㡬希昔吾夫子設為德行言語政事文學四科曾子得聖傳不後顔冉孝經一篇特為曾子設則以其能盡孝於親而得夫所謂德之本行之先者昔聖今賢其立教豈苟云乎昔王綸之為豫章圖陳蕃華歆謝鯤於郡朝堂其政寛簡有由也此前人像三賢意梁彦光在鄴焦通悍戾諭伯瑜念親泣杖之事卒為孝子則儕朱公於三賢誰其間然郡士民皆曰使君惠我無窮而能道其德心也則惟子奉化縣丞㕔壁記官有貳古也職重而任繁必有以徹其疑贊其決裨益所不及邑之大有丞蓋是意夫以邑政之難不有以佐佑之恃一夫之力應無窮之事㡬何不敝且敗簿尉皆邑官而又為之丞丞於令近而亞蓋佐佑其政資益之宏者而令每多忌丞毎諉嫌嫌所以蓋其偷安而忌則祇自孤偷安故局莫施自孤故多遺胥失也仕行所學不得其職則去袖手甘其祿何為也二十五老一人奉少陽昔人取益良甚汲汲退之書崔斯立事後世公患不有君子度越常情之表何以取新聞見予宰明之定海明六邑惟奉化民夥事叢號不易治平陽鄭君予齊年進士也同仕明實丞是邑學古而適今賢而才吏術儒業偕茂行已有信其於邑政閔焉恐其不至而令則括蒼胡君推信之深且篤於是焉得以輸布傾展不顧計兩君相予歡甚故其政聲民譽先人而賦租課程不後予惘乎出其後嗚呼事有大小理勢一也伴食不議相業當益崇畫諾無譏郡政止今所傳耶吾因二君有感鄭君今秋官滿以諸公薦改秩去書來見屬欲記前後為丞者姓名月日俾後有攷曰丐片石具矣子無辭予固樂道二君之㑹逢而知退之之言蓋激也而二君相與乃其常理常可遵激可戒也君子不徒言之不僅為之鑑諸彼合諸此矣鄭君名大成字集之畢叔兹通判義莊記畢氏義莊四百畆二角者創而為之者也又二劵合六十五畆有竒者續增之也凡四百六十六畆其庀涖出納有法其給壯稚衣食吉凶有數其防柅悖弗率有制取范文正章申公遺法增損之既無遺慮士君子可取法焉蓋敷文公之意而成於今别駕君畢氏自文簡而來世有顯人敷文公高節奥學照映汗青别駕君則堂父之室而克荷者夫君子奚學非夫推吾愛以及人乎愛其本自族屬始而承先志孝之大者君天資惠利赴人之急愛人之學蓋有所受自本施之則不悖得其大餘可次第然當堇堇不乏之初為之莫禦勇矣事以勇故立行以勇故果人惟勇於利悠悠於義故無稱焉且貽譏名教君獨能爾可謂賢矣捐田以賙族固范章二公意而為之於有餘與成之於粗足難易之間識者又當有以置其論畢氏洛人今占籍乎江别駕君諱某字叔兹思可軒記予既營所居堂目以懷莒又闢前屋西軒俾兒姪諸孫肄業休息于此扁曰思可夫事之有可不可成壞難易所由分也適其可勢則易而或壞當其不可理若難而或成此則繫乎其人之賢否思不思異也吾起吾家小子繼之向無置錐地銖積寸累今歲收中熟無飢則有田可耕向貧無書借而得手抄心記未饜旋復索去收貯且三十年其富至五千巻則有書可讀向吾理未徹學未定今既久隨所得諄諄焉迪以名理曉以避就入耳著心小子輩孰矣則家法又可守是三可者足以不匱足以持身足以保族宜家夫無一可而漸至於可不自意及此小子乘其可怠不謹則將反乎不可是庸不思之又思之乎有所懷不忘所以為吾有所思不懈小子得而辭諸殖軒記伏臘以農術業以儒可以心不勞而自富蓄其學以求仕良士之所當務也捨農則錐刀矣去儒則他習否則椎朴矣士之居鄉能去彼取此君子樂予之吾友胡君元善有田郡東西以為旨甘之奉資生之具負郭者尤其良也圃于田間屋于圃間將與吾兒結書課焉予以殖名其軒閔子馬曰學殖也不學將落今居是軒入而閲書出而觀稼理不無所得夫其勤於耕敏於耘亟之穡嗇之用人必目以良農而其家必且不匱士於學亦然其進之也猶耕其擇之也猶耘勇於取猶之穡重於發猶之用不具是而言學餒矣元善才良而性淑於士之所當務者兼之夫養生之理或得之屠治民之道或推之牧予欲其觸類而求之深故諗以閔馬父之言孫宰軒亭記軒曰静觀自上而言亭曰熙然自下而言尹孫君為高郵之明年創小圃中為軒為亭陳子命名如是高郵俗淳朴異他邑自頃南北雜處其習尨戾夸競陵暴尤嚚于田訟不復承平之舊歲辛丑大旱千里如赭民無所食彊者思為盗弱者束手待盡是二難君適當之人為君憂君笑曰在我而已事無難且非是人可為之矣於是處心以清肅待民以簡易下不忍犯訟減十五六佐郡將食飢羸輯流散勤以撫之不倦以終之所濟甚博來歲夏秋大稔乃始得為是圃雖未遽宏麗可樂然有以感于心者嘗試偕客游焉登軒而俯清池微風不興碧水泓渟游魚深行鱗鬛可數則得夫為政之理静可以勝煩此以是觀彼以是觀日而月暫而久雖欲不化不可得已登亭而舒目焉則鳥烏之嚶翔花卉之茂鬯煙霏之隂曀風日之清亮物之熙然猶民之煕然吾心亦與之煕然也然則中正以觀聖人之事静以觀君子之任故自上而下惟觀以静也宜而後天下樂者又君子之志向也民方慼然吾且得泰然乎故自下而上其心之熙然彼心先之我乃從之也君能是軒亭以是名不既賔其實乎君曰唯子為我記之知樂亭記直雄邉之西為小橋橋南有池從昔深之養魚其中今太守張侯創草亭池之北郡人陳某請以知樂名之蓋取莊生濠上之意夫道可以兼物而事事者于其理也未有深於道而不徹於理者君子超然領解而舉天下芸芸生遂職職陳露了於方寸無遺者彼魚至微物而泳游喁噞圉圉發發有頒首之適無頳尾之勞是樂也而隠几者則知之其必有融悟於言意之表者侯於道造詣深矣出而為郡刃無肯綮千里貼泰相忘而各得吾以名亭魚云乎哉蜚雲亭記張侯創草亭郡圃予以知樂名之亭東為橋復亭其上其成也偕予小倚䇿曰是亦宜名予以蜚雲告昔陽越生子待事而名東坡作堂既成而雪因榜雪堂今登是亭大風號空萬物披靡簷外晴雲東南蜚如敵怒而赴如羣駿之騖如斾旌旛幢翻倒凌遽可愛不可駐聊識所遇既名而去寓隠軒記吾友趙君日新得地十畆園而軒之美花嘉卉碧松茂木娟䕃映因舊增之左右後前風煙竒秀離迾間簉可觀可樂知者勸遊遊者忘歸謂陳子曰吾鄉近邉人莫計逺登覽觀遊寂無其處吾營是可琴可書可留客可奉板輿為吾親娛視世功名了不足圖子必吾肯名之其何如予應之曰士於出處顯晦岐而二之非也其大致澤人利物君子之道今子俊發通粹讀書學古非無用才而必於退與古異吾斯未安則以寓隠名子之軒道公物也且私之才天所賦靳不為世用潔已而孤物狥人而拂天古之人咸若是蒼生其魚久矣不惟是與世間之樂必同其憂設終老東山不足為謝安石安意肆志不為秦帝一出仲連其何稱士不膠所守其必有見子安此㡬隠者之歸吾惜也寓焉其可幡然之志未宜中泯聖主側席逮下中外賢傑林立而世方艱棘顧何時而果於隠歟果以寓視之請從子後敢辭老且衰邪曰子言是吾無間然退為之記俾列之座隅且以諗吾鄉懷器過自重如君者焉分定齋記孟子曰物之不齊物之情也夫其不齊皆物之天夫惟齊之以不齊者能全于天予待禄耕于淮之南春夏大旱客見諗某時雨霈然某大水害稼某雖雨未足也言接耳日異月不同職是非天數而一時旱澇豐歉凶吉乃爾不齊澇而病未雨而憂雨而喜意其人之分已定於㝠㝠天無如之何彼乃喜憂且病皆不得其正事皆然處其不齊而君子衆人之所以霄壤也無求者已尊無求生於自知自知者中泰即是而養之可以旁薄一世傲晲造物婆娑萬物之表不然營營伈伈有不為物役㡬希吾友王君勉夫學富而行潔知舊望之甚深壯未一命而其容充其氣和其居家與人亹亹肅怡怡也闢所居齋以分定名之於世了不經意噫其所謂自知而無求不為物役者歟夫有餘者貴分自足而已君子小之吾於勉夫尤深望之者又將以分人者責之適歲事軫慮而書來求記有起予之歎故書其説小莵裘記進而忘退古今墮此病曷其病夫彼惟知賤不如貴貧不如富閑寂幽獨不如頥指如意冒譏評不暇顧獨不知屈不如信也宜其病食祿而乘其車恂慄乎職業之或墮疚懷乎上官大吏之訶譴詰奭而隂忌旁嫉不皆無仕而得歸心休休焉此累氷釋信於久屈信可賀士顧瞢此所以多可議父子出關東歸時人感歎或泣二疏所以獨稱於漢也張公仲思賢而才齒髮未衰聲望方隆士論所期未副千一名所居則曰小莵裘居為他日歸老計夫以好進者之鋭且多也士之退者君子貴之適可進而預計其退其賢於人尤逺繼此鼎彝竹帛深刻屢書幅巾西歸吾知不待孔戣之二宜去不貽譏樂天之秦中唫客間謝道兒亦無庸聲其喙琴書樓記陶翁作歸來引有琴書銷憂之語㰎李張公取以名所居之樓置二物于中日與之周旋而求記於予夫必有以寓其心君子與衆人同而正不正白黑霄壤彼其心于貨利于聲色勢位營營逐逐不得則内慊皆是也公澹乎翛然不妄交奉親從仕之餘捨二者不以寓其心心寓是故樂寓是居是樓則挹聖賢與之偶論世尚友千古在目拊絃拂徽自奏而自領之想當得意唾為玉雪吟繹陶寫芥視軒冕心與手忘手與絃㝠樓外萬象怡愉暢適有偕其樂公之心得所寓矣雖然陶翁寓此以銷憂爾公居為曾閔仕為龔遂召信臣生不知有􅘅意事直寓其樂與翁則小異予得併言之盤蝸室記凡居室安吾身適吾意而已不必恢廣顯敞然後為愜大固快小亦不無所宜壹於快而已識者謂之夸而拘張公仲思飾小室目以盤蝸盤蝸之間横縱若干尺幽秘靚密與市塵隔公好詩吟興時動此宜㝠搜公寡交名友訪逮此宜晤語於琴宜瀏琅而聲圓於香宜氲鬱而煙留銅壺暖宜貯花窻隙虛宜聽雪所宜難一二舉公不此陋也何疑大厦萬間少陵思之仁物者欲廣容膝為安靖節言之自處寧過於約及物自夫處已公之心蓋有在興化縣移建學記葉侯令興化之明年以縣學湫隘頹傾訪得舊址規復之又明年畢其工祀有廟講有堂為門為齋庖庫井垣甚備而固巨湖映帶軒豁曠爽財出於積累之餘官不與其費工取於游手之募民不知其勞又籍羡田為養士之食馳書吳門求記於高郵陳某乃為之言曰有民必有士有政不可無教而化之逮乎下也益深民治於人者也士則將治民者民也而為士孰使然而刑驅威制必欲不吾敢犯果不足以得民之心惟詳於教乃可以善其心古者取士於民以為公卿大夫共天子之治迪民之性有以擾服銷祓其竒袤好利之念是立之學京師為太學諸侯為頖宮固也而黨有庠術有序家有塾夫化行而不究于下非治之至三代之學于其細焉不遺其亦深矣哉左氏記不毁鄉校詩人刺子衿挑達皆於區區之鄭言之鄭之人所以能枝强鄰大邦其民愛君效死而不叛豈無所自而然當時大國可知文武成康盛時可知皇家以文治凡山區海瀕百家之聚無不建學斯足以見聖化之深且逺興化雖小邑然介于海陵高郵之間二郡昔號多士名輩相望民純恪易治兹豈非根原于學而賢師帥教養之效是邑也不應頓異而士之才彦未多民鬬訟未稀與所聞大不同侯病之病之而不得其術則何益矣故其為政汲汲于學經營之始人知其難侯意愈堅曰將有遇請于郡時守趙公賢而文欣然從之畀以大木百章而繼之以錢若米部使者亦嘉其意贊其决果克竟其志今之為邑旦夕金穀獄訟簿書是課孰知有所謂學置不問於法令無責而金穀獄訟簿書一不副上官意譴訶立至可謂難而用小邑作久廢時無贏羡卒而成又甚難侯賢者也不小是邑切切求所以治民之本而臨于上者假之於金穀獄訟簿書之外尤賢哉事以賢立而多賢不易遇故予樂為書之以道邑亽喜慰之情因述古人建學之意而期其士民於方來有以滿足侯之望侯名簣字進卿蓋石林先生之孫云鹽城縣學蘆地記鹽城古壯邑有學舊矣特盛于紹興辛巳時令則時公紫芝公鉅儒以作成人士為樂學政井井也迄今二十有九年寖不逮昔士以空匱告諸邑令施君唶曰是時公所規畫不應爾乃按籍究索而得其由蓋凡財用之入雖不一而以蘆地為重其後人為蔽欺貨財冒没日朘月耗漫不可省事以久而蠧弊以久而生固然無疑也君覈其紿確其隠平其所入之筭不外牟他計而所得比舊倍焉民狃舊習為譊譊其辭君不亟不怒曉之以理誨之以教養之意然後欣然從之君邑政之懿大率皆然是舉也士醻所望而民不告病識者心服夫為政貴知本學非本務歟而忿疾其民者不能得其心君去彼取此可不謂賢哉是邑多良士秀民蓋自時公作成力君又能大時公之規而振其既敝夫豈特士之幸凡邑民將實受賜惟公卿大夫起于農肩比袂屬咸自大為儒有不為孰禦也爾民之子弟昆仍夫豈無秀且良自分農而不儒乎一或儒其不悔夫始之譊譊而煩君之曉且誨耶予書其事寫其士之情亦諗其邑民而要之將來江湖長翁集巻二十一
