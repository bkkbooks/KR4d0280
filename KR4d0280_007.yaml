body:
  text: 江湖長翁集卷七宋陳造撰七言古詩明妃曲漢宫第一人只合侍天子四絃春風手可用入胡耳天生國艷或為纍金賂畫工寧不耻玉顔初作萬里行朔風黧靣邊城昏路人私語淚棲睫况妾去國懷君恩穹廬漸耐胡天冷政復難忘心耿耿夜深拜月望長安顧歎當時未央影胡雛酌酒單于舞銘肺千年朝漢主傳聞上谷與蕭關自頃耕桑皆樂土向來屯餉仍繒絮廟算年年關聖慮但令黃屋不宵衣埋骨龍荒妾其所柘臯短吟鐵山橫飛截平野寧復江流飲胡馬大酋膽落狐鼠逃虎頭將軍自天下拂廬連絡屯長雲提戈敢謂秦無人驚霆白晝振解葉淮地一掃無留塵歌謡千載淮民口將軍歸飲䇿勳酒烏袍使者來如煙騰書乞和胡稽首蠅鳴鴟噪初不聞賈怒一舉雌雄分辛勤結髮七十戰數竒堪笑李將軍題趙伯政醫俗軒風淫氣格初不意往往腠脉流腸胃金匱一編亘古今幾人用之能起廢痛恙切身知謁醫俗氣痼人渠不知持籌側肩蠹日力錦鞲金彈隨癡兒斯人斯疾可攻否更恐良翳望之走南窗解榻竹風清請訪軒中十全手急筆贈歐處士酒所歐索去甚急作此送之歐善畫山水南州江山昔所厯雨峰黯靉晴江碧幾年思之忽墮前政得歐生醉時筆斯人厯覽山川竒得興落筆天露機不須十日五日一水石已可王宰相攀追相逢便整南歸柂短章許君慵未果酒邊搜句敢言工不解似君槃礴贏記夢示師是青燈寒夜思吾鄉合眼便坐吾家堂阿丁炯然目如水綵服蹁蹮趨我傍中心喜之謬督過還為遨嬉廢書課指似斜日西窗紅小賦未破書未供向渠不敢恩勝義亦憐忸縮不自容蝶蜚鹿失忽驚寤摵摵霜風在庭樹幾時筆力跨乃父與汝相忘不關慮題胡處士猿麞圖畫工神品今代無祁嶽一脉傳醉胡幾年傲睨不落筆乘興掃出赤縣圖今君所寶亦第一我疑神遇非有筆青林紅葉晚未暝遙山逺水秋一色五猿踞石相因依兩猿掛樹松枝低仰睇側顧麞善疑其二行齧如不知昔人畫馬師廄馬畫山直付居山者野猿不馴麞易驚邈影渠能寫間暇草露空荒逺刀几即今放麑誰氏子山蜂負毒不足憐盍貸蠨蛸留報喜百花樓樓中香漂百和濃樓下錦纈翻東風玉樽美酒清若空吳姬粧面相映紅人生一笑不易得是間一醉千金直元龍百尺君勿論芳時且可金杯側題劉明府所藏秋江欲雨圖明府侍兒善歌舞欲出不果墨雲含雨江空濛島嶼細瑣連煙空我家茆屋菰葦叢卷蓑背笠隨漁翁展掩倍覺心神融緬想慘淡經營中王孫玊面食肉相萬里山川入遐想當時宫禁斷過逢可得如儂逞江望江天漠漠那容畫渺莽風烟生筆下鳬鴻滅沒波不搖霧墅霜林共蕭灑乃知絶藝神與通盤薄傲睨窺化工市師日日江湖上幾人擅價能無窮君家雙蓮氷玉質此畫與人俱第一固應緘鐍付牢收俗眼紛紛莫輕出送項平甫教授之成都昔人石穴命西蜀豈知桃源華胥隱石腹詩人昔吟蜀道難何曾錦城風物平時看平時風物今猶故井絡坤維神所護漢官威儀二百年斬新不受胡塵汚蜀民日為藥市遊家說追歡不說愁蜀人之文落中州中州傖父縮頸羞吾徒向來夢遊處今日登仙送君去遨頭上客人所敬翰林先生士知慕似聞儒冠不容假近士之濫吹者去其半挽致鄒魯無難者况君筆力西漢前亟遣人才有楊馬錦城之樂樂未涯緑鬢朱顔君更佳要奉板輿追勝日暮萬里橋朝浣花古今勝槩爭入眼歸軒日日詩囊滿黃鵠東飛定有書莫靳珠璣秪推懶平甫能詩每言詩不工故懶作然人知其謙云題欽廟主器時所作登瀛圖唐家大府開天䇿祖廟工歌登七德僞王連組糸斥頸歸山東羞死虬鬚客文儒濟濟陪英遊海內共指登瀛洲未妨濫吹一延族中有謀斷臯伊流崇寧聖人撫洪業黃頭遺種初芽蘖青宫進講多暇日睿情逺覽思才傑水墨落紙分毫釐心融筆忘天運機鸞翔鵠峙儼在目更用褚亮摛辭為天翻地覆人得知神京北風吹皂旗空令便橋乞盟未央酒盛事拂膺正觀時天家所寶君家得拜手披圗悼今昔鼎湖龍去餘弓劒上林鴈來斷消息莫年筆力猶枝梧慣題七騎隂山圗為君斫句偕畫往貸我老淚淋衣裾布榖吟人以布穀為催耕其聲曰脫了潑袴淮農傳其言云郭嫂打婆浙人解云一百八箇鳥何與人事人以意測之是非皆不同為作此潑袴不容脫鳥語徒殷勤輸租質農器有袴那解新官中催科吏如虎告時趣耕爾能許即今春種未入田安得縣胥知愧汝卑棲俯喙良易謀聒聒彊任田家憂啼時未旦夜不休班班血痕銜口頭人將近似測禽語汝意真解憂農不或傳悍妻天所怒姑不可撾渠不顧罰為此鳥聲曩愆警世母為郭家婦南方諛佛古到今人持數珠家梵音區區說似一百八譏訶勸相知何心浙風淮俗隔江水意解禽言乃如此蘇黃妙句誰嗣之兩地流傳併須紀世間儒墨紛相攻巨細彼此臧榖同爭如痛飲卧長晝付渠馬耳射東風薄薄酒畢叔兹通判寓吳門無數日不觴客取足而已不求甚豐嘗見招酒所小鬟誦薄薄酒侑樽有感豫心擬作此詩薄薄酒顔可丹粗粗布身不寒醜醜婦貧相歡人生浪悲行路難欲不外騖心內安富貴底用極力奸政自沐猴求棘端君不見寒儒骯髒默自守橫前書笈燕坐甕牖麻畦可衣秫田可酒抽針紉綻侑樽鼓缶齊眉結髮賴有此婦人不裂眦事無掣肘陶陶此興殊未窮一身易足天地中巷東畢公子為樂渠能同宅舍頗軒亭園池亦花草相過便開樽掀髯寫懷抱蘭芳菊秀梅含春拂翠勻紅隨分好乏愛不無苧衣贈取醉何妨接䍦倒畢公子吾之樂兮樂自如一杯對婦兮布衣蔽其驅君之樂兮樂有餘妓女能楚楚樽罍應指呼醉鄉寬間兮吾得俱設侍以金谷傾城之艷姝酌以宜城九醖之醪敷被狐白兮擁羅襦朝歌暮燕窮歡極娛婪酣佁擬驕妻孥外若豐澤中槁枯吾不彼願猶彼不吾羡畢公子方吾徒狂歌而起舞更酬而遞勸蓋不知南威嫫母之有妍醜衮衣短褐之為貴賤彼驕其有殆醯雞之撇天貪其取如蝸牛之交戰益知心怡愈無窮塗中焚如無亨衢畢公子倡豫和女笙應竽他年遂初賦老盍歌歸去塵裏無曠懷人間有同趣四方向來志一巢今可具亦不願黃金為梁桂為柱茅屋三間近君住讀師文和郡侯喜雨詩次其韻時秋雨霖霪大為民患臨安最甚吾鄉恰五分熟可喜濤波襄陵尚霖雨龍伯不省田家苦官中出􅀈瘞流尸內地之民無宅土京邑本根枝外邦渠儂枵虛闖官倉流亡可飽骨可肉縣官仁愛吏慈祥古來畏天烖無小迄今百顰餘一笑陽愆隂伏誰致此共說羣憸投有昊一昨雩禱飰不葷神祠佛屋香炷氲霓望朝昏耐局蹐風傳真贋長紛紜我歸得同郡人樂愍農喜雨收竒作想摩鯨牙凌浩蕩更穿月脅翔遼邈吾邦不熟農告功溜匙雲子行沾儂小兒解謝倩人誚搜鐫徑欲分吾窮乃公拙無尺一召他日當歸有先兆耕先耘後計未失誰謂山林迹如掃世人二五不知十赴爭奪場不遺力分表營營竟何補截趾適屨山藏澤黃堂詩老民所天秋來衢路有醉眠樂職未賦吾歉然人言此筆須臞仙小草可録寸有長㑹從之遊據胡床蜂腰鶴膝容探湯借兒茹胾升公堂娟峰偷羊名山人惡其俗其峰􅍶崒秀整可喜余故作詩為山雪耻而以娟峰名之當年金華小家兒神遊九天狹八維房陵之山秀而竒蔚藍一山羣山推兒肯下顧停軿輜珠貝作宫瓊門楣門前亂石無津涯一叱轉眼羊萬蹄羒羝􅗑羯紛躨尼蹲鳴踞􅐅供兒嬉有褐之叟鬢已絲似黠非黠癡非癡傲睨竊覘兒所為掉臂席卷靡孑遺一杯見罰兒釂巵亟鞭風馭還瑶池幻變起滅荒是非彼此失得誰成虧即有而無道乃幾仙者狡獪人得知以偷而名真見疵我來訪古求端倪山吾良友兒吾師嘉木異石相因依如刻如㭬如鬢眉名峰以娟吾始之為丐片石儻可碑更遣子虛摛厥辭此兒此叟當解頤墾山叟雜木漫山誰所種居不臨流多不用九月霜風捲黃落羣山一昔皆班駮遙看拖帔橫椽衣農家刈粟山有畦家家墾田日嫌窄荒林翳薈惜虛擲斸荒作熟不掛籍輸官之餘給衣食州中之政常近厚不欲屑屑校升斗寧其棄之聽民取實亦藉是作康阜繼承不皆惠慈守底須彌縫吏胥口防有後來規稅畝竹米行竹君亢宗擅楚墟一一修聳山澤臞風流秀整與世殊楚俗食息皆爾須薪之籬之且籧篨笲筥箱篚䉉籃笯溝瓦厥祖羮其雛隨索斯獲掇諸塗今嵗麥秋旱嵗餘得麥僅足償官租竹君憫農如士夫著化結實千林俱密砌玉粒綴旒珠株株擷取雖錙銖彌頃亘畝無間株磑磨蒸炊勝雕葫鄰里乞索水火如坐令顰蹙興歌呼野叟好事能分吾香清而洌甘而膄此君行能不一書此惠及物旋就枯摩頂放踵忘其軀所學無乃墨者徒老子苟祿天之隅袖手無䇿蘇􅑱孤投匕三嘆吾慙渠聞舒州書生聚衆為盜邊頭僅絶胡塵警頻年麥秕禾不頴淮民久矣困憔悴淮俗豈常藏不逞槌爐血馬中夜呼劫吏驅民刃加頸吾民苦旱無生意更復跳梁汝為梗堂堂王度無玷缺赫赫軍容仍暇整前年蛋戶煽凶威長蛇封狶搖湖嶺元戎白羽才一揮欲丐微生一無幸爾曹么麼真癬疥大網莫倚容蛙黽昧逐青蟲千斧鑕盍辭緑林救要領鯨鯢虀粉有前戒儻被皇恩各鄉井旱魃逞妖民倒垂廟堂聖賢自司命徑須委節發陳廩少息流離服頑獷勸分已責可次第庶援沉焚痊國病正資方嶽佐堯禹側佇剡章伸此請田家嘆五月之初四月尾菖蒲葉長楝花紫淮鄉農事不勝忙日落在田見星起前之不雨甫再旬秧疇已復生龜紋近者連朝雨如注麥隴橫雲欲殷腐如今麥枯秧失時舉手仰天禱其私秧惡久晴雨害麥兼收並得寧闕餅托登盤米藏庾儂家嵗寒無重糈豈知闕凡幾憂晴幾憂雨吾儕一飽信關天下筯敢忘田家苦寄馮尉尉時捕蝗甚冗我遵兔徑西山麓荆棘鈎衣塵眯目憐渠此地費流光君亦風餐并露宿遺蝗蹢躅無地皮田禾蠶食猶子遺洊饑可念勞可忍君自坦坦人憐之繁昌亂山僅容鏬一一到我馬蹄下南村喫飯宿北村罷極憑詩寫悲唶即今不作勞者歌器識視我幾闕簡書趨走子如何皇家獵闕五雲深深護臺閣縹眇羣仙依碧落即看郭振起通泉應笑卑陬郡文學鸛帶箭行楚州營士射鸛中之鸛墜郡庭若訴云城邊鸛城棲水食衣楚楚欲鳴不鳴候天雨此肉胡宜登鼎爼柳營子弟弓石八南山之石猶飲羽如汝正可虛弦取血毛分披誰汝憐低摧直訴使君前使君德意孚魚鳥全汝之生令汝飽徐行側睨若無旁飲潔啄腥近臺沼使君暫擁山城麾詔音不日遄其歸矢來無鄉汝誰依江湖粗飽莫卑飛送瑞蓮新米白酒與韓監倉珍珠滴紅敵紫腴君家寶此如珍珠我家玉友亦勝友論交遣到君座隅秋蓮結實甘勝蜜香粳薦新玉為粒遙知毫末不及賔一笑聊同孟光喫招鄭良佐向來聞名思見面常恨東西異鄉縣即今去我一葦航亦復經年不相見重陽佳辰可虛辱橙香蟹肥家釀熟相過一醉猶待速為君已約東籬菊臘茶并三詩送李元誠池魚千里磨蟻旋人生出處俱可憐束書結鄰晏溪側淮安一寤三十年積今成古閲飛電我與昔人同此歎悲歡離合置勿論且喜重逢各彊健向來衮衮論風期百年心事多好違君如荆石尚衷璞我似野馬初受羈射陽廣陽水雲屋襄城郵城塵土衣俯眉作吏一不遂邱壑付君未覺非北風吹霜戰林樾菊花雕零梅未發留君無物供吟筆一炷沉煙伴清絶騷人悲悽為搖落舟挽不回仍此别還家試碾壑源春何似盧郎三百月喜雪六首寒空黯慘塞不開篩瓊屑玉卷地來乾坤變滅定何意風為披拂雲剪裁和聲載路天亦喜簸弄花絮為春臺了知麥秋更好在老農指此豐年媒平明僮奴更笑呼羣飛掇取如拾塗僵鳶窘兔真鮮腴勸汝貸此驚啼烏巢營卯伏知念母一一向來反哺雛梟獍縱橫鳳髙引殄滅此族寧良圗玉龍睡起長風激盡蛻玉鱗漂八極蓬仙帝女聚瑶臺剪水效祥誰所役或疑天公陋塵域幻作氷壺供一劇是耶非耶竟莫知杯酒聊容曲身直淮春之樓髙突兀憑欄小耐寒如割平湖穹山兩西子愛此鮮粧巧塗抹回首斜陽照屋梁玉際坤輿尚摧壓今宵更呼甓社龍髙掛明珠照空闊去年孰不蘇捐瘠今年已餘四釜食自公之來適吾願挽回太和夀此域一旬再雪近嵗無日日歡謡沸阡陌瓦溝待泮亦不惡要趂春前作三白南鄰賞雪珠箔褰紅爐緑酒圍嬋娟北鄰飛雪灑枕席擁戶亭午無炊煙袁安吻燥屋不補東郭足皸履已穿嗚呼悲歌兮歌且止安得薪炭如蓬酒如水東園詩寄興化吳從道吳索詩久矣今尋盟云溪流抱玦園亭裏三面欄干壓清泚養花種竹今幾年紅紅緑緑皆風煙黑頭主人富文墨隙地營園喜留客去年香霧搖東風藉花一醉君見容翡翠拂衣蝶窺酒歸時簷牙掛星斗有物繫足寒前盟徙倚東風空復情歌前酒所何限意黃鸝應說鷗應記一春不風即蜚雨曽奉親輿賞花否向來歡游付夢雲向來劵負今償君濡毫却嘆無好語說似能詩葉明府葉進卿寄和章次韻復之君文如泛濤淵裏方快驚瀾忽清泚手抄口誦欲忘年小窗長日銅爐烟端宜飲我三斗墨有底向人矜此客平生歌頌仍歌風寬柔靜直能形容心知公瑾勝醇酒人仰韓公真北斗詞壇正倚君主盟筆驅化工鉤物情詩來得我玩世意刻石便當幽居記兒曹轉手作雲雨陳雷輸心可人否中牟報政徑青雲此老洗眼久徯君重逢首理車笠語定指渠儂笑城府再次韻酬葉進卿病翁耐病杯杓裏鼠矢壓書毫不泚眼中凜凛黃初年讀詩意欲凌紫煙君才王佐綬猶墨公外從容作詩客心期與俗馬牛風化頑惠弱清而容不學𤣥明剛制酒不學陶公辭五斗斯民信君如詛盟飲羊攫金皆用情聖皇旰食求賢意姓字今應御屏記太微清都上雲雨鹽梅調鼎極可否一艇付我眠溪雲詠歌太平橫紫君十行看君拜天語去酌天漿列仙府次韻寄葉進卿回車記我君能賢席門忽下鳬背仙參辰相避徒自惜但有妙語邦人傳阿戎齒録雖牽聨陸沈父書如縳禪題鳳不置稽喜下殺雞容羞季路前才名放君一頭出髙山可仰井用汲小兒弄筆不及嗔顧捐鄭璞收和壁作十日飲當有時岸花水芝皆可詩祗憂老氣不復振挑大國楚提偏師再次韻酬進卿平生友仁今事賢長裾每侍黃堂仙東方一士復石友平安幾見郵音傳斬新好語來翩聨當念醉叟方逃禪亦知平處古人上更卜氣蘇君子前敢辭敝帚為君出眢井塵生不受汲但思共坐蓮蕩風雲錦明船月升壁把酒一歡當及時定拚費日仍費詩轉頭相望便淮浙已辦雇直呼篙師喜雪篇𤣥冥職寒事庀職今幾時窮秋試雪似早計冬令欲盡噤莫施風聲不怒日車近客裘未綿河未澌吳門十萬家心口同一疑天公行四序暑寒各有宜嵗云暮矣未見雪嗣嵗何以銷疹疵或云太湖龍避靜扄神扉把弄明月坐貝闕世間休戚吾何知瑶臺十二層列坐萬玉妃屑瓊翦水亦戲事仙界運指想不龜徒勞望切切終竟來遲遲芹宫氷氏翁見與俗異岐亦知仙人不作省事過龍公肯如游惰兒顧此千里間司命付吏師拊摩窮日力日究仍夜思向來祼露各溫燠一衾一絮公手之趙衰之日周比屋更以晴日相融怡黃童白叟歌且舞和聲協氣塤應箎羣仙飄然下龍亦赴指麾先之汛灑五日雨一雪不待公有祈花作坻壠絮作陳雪為翦刻風為篩豈直冬溫要彈壓抑令宿麥䝉沾滋去年豈無雪雪神春不歸賑施不預計熟視民饑羸他邦亦此雪災祥果是非苦樂咫尺殊滿聽民嗟咨孰知此雪瑞此土邦之人兮建德之遊春臺嬉坡仙昔頴尾喜雪憂民罷賦薪遺粟亦戶到盛事未逺誰可追即今欲雪未雪已著念挽回春意能先期擬揭蘇臺之仙惠慈術請繼頴仙千古垂惜無師曠琴幼眇絃吾詩次郭祕正韻伊昔乃祖使朔幽艱難以來無此流節旄欲盡氣彌厲始元屬國真其疇清篇神護到江表河梁訴别豈所侔兩孫學力有家法洪毅不割清不浮驥子受轡抹燕越粉袍長鋏猶小留人稱張籍好古淡我愛趙一辭伊優往之論交恐避俗是人搖揚如綴旒長年閔默墮俗學夙志顧省傷羈囚頎然扣門出新作山竒海祕困窮搜頃從同盟漫著腳歘遇强對須抽頭吾鄉巨擘子龔子磊塊貯腹皆陽秋麗唱妍和日九返君腕脫矣盍少休惡語送似定一笑共笑燕石酬精璆試俞珣筆呈羅大著時羅趨朝市工營營有工拙珣也旁睨裁一吷扣門屬我祗厚顔結字著書無一愜繡衣仙人歸告猷盍收此長助毫髮青霄政須立螭珥黑頭當看獲麟絶豐功被世名不滅珣亦歸裝倒明月春雨寒甚作長句白龍天飛宜莫測吳儂解數歸消息年年青帝發生時似妬園林春動色西山龍母誕彌月歸覲親顔供子職壽觴瓊醴俗共傳玊鱗素鬐誰所覿酸風鼓寒苦霧塞行人縮頭欲僵立蛟鼉凍蟄大水拔更問嬌紅并眉白閉門三夜淙簷雨起視溪流髙數尺去年夏秋走祈禜雲電收藏日血赤農家倚鋤望眼穿白汗呀流地龜拆天可問曷不遣兩龍此時㑹生日王秀才亦愛軒王郎一室天地中客來有榻樽不空奉親一笑辦能事插架萬軸收新功男兒磊落四方志况子郎罷方詩窮亟書周庸賜漢第可用容膝師陶翁寄鄭良佐良佐戶屨甚多嫉之者以為狎小娼諸生多引去者徐察之乃同姓比居之子嫉者嫁其謗可笑書生著書貪日課文士賣文救窮餓青樓歌酒屬富兒不意此名君乃荷風波平地自誰始一倡從知百人和東魯男子舊修謹南郡諸生底逋播平安敢煩街吏報潔白長賡楚人些流言不計兩曾參機上慈親枉驚墮阮舍尤須辨南北杜冠可無分小大寧知宋玉笑登徒或指宣尼作陽貨璧亡誤使張儀去兵利徒為少卿禍違從兄食祗厚誣償同舍金聊引過無黥可息劓可補未信白璧青蠅涴君不見吾宗孟公士所傾亦有俗子驚人坐贈龔養正二首與養正俱病久不晤㑹作詩寬之相濡詬之意也思君不辨一再過束書謝客方卧痾不為儒林丈人地可耐造物小兒何我亦病氣剛制酒自春迄秋在告多幾時蹁躚數訪我為君快作鯨飲河百骸綴聨等非實調虞小愆諸病入忘三彭仇念昔聞作五禽戲瞢此術吾身甚羸心甚安妻孥已捐今昔觀平生學力外生死砭劑求工聊復爾次韻嚴上舍讀書目昏聲利營營閲蜚電人生悲歡更幾遍羣兒沈迷如病酲尚念醇醪夢酣宴吾儕較之唯阿爾書淫僅逃紅緑眩短檠半世課蠅頭老閲舊藏紛莫辨近從損讀得竒方穩坐幽窗憩吾倦嚴侯著書定千載尚向枯䇿求聞見可無一洗竇郎癡捉筆因君拂塵硯謝韓幹送絲糕玉顆瑩徹珠就磋吳鄉早粳莫計過無乃風露秀結異移種崑崙之水禾君家厨婦窮百技三舂九淅付重羅銀絲萬尋忽縈積中疏外潔生搓挼扶桑仙蠶大如盎繅之本供織女梭恍驚萬喙鬪新巧罥作米茸雪網窠即今擬形供食事纎手幻出千絇多倒甑入筯第三絶色香兼味皆可歌周官賔祭珍餈餌有此復具理則那詩翁物色及粔􅀈得此來前當見訶鱠盤漫詫金縷飣湯餅徒夸銀線窩瓊酥玉膩信非匹胡麻崖蜜仍相和感君泛愛記衰朽回首一笑分餘波腐儒口實長作纍饞䭚之名定不磨金山别去每掛夢老眼復見還雙摩婪酣得飽問便腹如汝平生相負何更從公子乞方法日當飫之老澗薖買田二頃不種秫未怕酒客來操戈糕不用糯金山者名天下韓守松卿索近詩録數紙寄似并詩道意昔人技成歎屠龍似我五字耽雕蟲鐫肝搯腎探戃恍半世不辭詩得窮詩成頗訝神與力疇昔夢中分五色援毫動作萬鈞斡應俗何曽一錢直豪韓有句當千年取世所遺政自賢數篇蜚向青眼邊可復把玩盤中圎君家十頃圍翠密近榭逺亭如畫出時須喚我一樽同笑對風煙揮此筆食晚菘新筍化兒出竒安此腹不稱智囊不盛肉飢雷收聲才脫粟薦以藻芹仍杞菊園丁可是監河侯供我朝昏三畝緑即今春菘晚不衰况復桂筍森可束含烟帶露不相下拄腹撑腸未云足食單一日得一雋回首常嗜真與闕殿春日月官上速日擷芝莖剝纎玉風排雨浥猶須卜卧作枯荄起成竹題姑蘇南道者庵城南路長勤往返迎送何由貸吾懶向來紅葉撲吟袍重到緑秧圍望眼有人閲世風前蓬年年客我此庵中問津莫問庵中翁貝葉結伴渠陽聾江湖長翁集卷七
