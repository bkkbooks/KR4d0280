body:
  text: 江湖長翁集巻十七宋陳造撰五言絶句次張學録韻十首張以新凉入郊􅇕燈火稍可親為韻俗習有南北交情無故新得子班荆地朴魯俱淮人其二東隣夜牙籌西鄰晨伊凉孰知陋巷士乾坤書一床其三學者闖聖門贔屭未易入張子乃深造以文作梯級其四三呉士淵藪向我肯論交尚友忌一鄉同人貴于郊其五燒香為后山展像拜太虗誰能作九原候蟲弔寒􅇕其六張子五車讀筆作蛟龍騰百戰氣彌厲依然短檠燈其七廣文無酒錢到官倐改火清譚坐蕭齋惟子屢過我其八臛鴨乆欲忘食蛙近亦稍人言淮浙殊得飽不汝較其九君才髙一時從我計已左要追莊惠塵揮麈論然可其十衆景紛驕蹇君獨著語親十詩已櫝藏不與俗子論再次贈張學録韻十詩解頥康鼎來詩語窮益新政用追前輩不勞吞吾人其二再説可雙璧斗酒或西凉索飯仰屋梁付子癭木床其三杜陵深堂奥無已掉臂入裔孫漫睎驥槃姍取拾級其四取友英雋場如子乃石交進善定見與言從浚之郊其五閲世有順逆飛埃曀空虚曠懐畧外物曲士乃拘墟其六李蔡下中爾萬目指騫騰何蕃頭欲白秋窓耿青燈其七張子攜詩來危坐撥芋火三問笑不對政恐非助我其八冷官冷如冰餬口僅廩稍藜藿得好客欠餘不擬較其九擁衾哦子詩清夢即淮左莫年書藏山舍子誰印可其十置書營㪷升大似疎間親因之返初服佳趣遟子論次韻錢倅諸公睡香花四首鈎窓玩孤芳殘月衣上明紫囊拆蘭麝小風弄初晴其二幽人睡為鄉長日踵納息天香喚醒然頗復費詩力其三輩流魏家芳要領僧榻夢翛然目為青未敢蜚鴻送其四小籬䕶殷鮮乆厭雜芳眩風煙桃李蹊一付檀槐戰泊上虞驛來日行四首秋雨歇復下西風㣲自凉不妨舟繫柳已貸汗反漿其二梁湖莽蒼外後去未云遟縣市容吾戀江潮不汝期其三溪山可圗畫風物憶吾鄉漁艇鷗鶩亂茒茨菱芡香其四龍公底戲劇長嘯瞑江天雨鵲翻仍語風舟舞不前予七十趙監税見賀以詩次韻平生燭之武况已雪髯翁譽我猶時用君言恐未公六言絶句銅官道中二首人家自瀹新茗山路行衝翠嵐今日供人行李向來夢裏江南盡日巉巖峻陟有時罷亞横陳看雲不妨拄笏耦耕定自知津舟行六言風頭正㠶影駛雨脚轉天容開黄雲覆野未極青山趂人欲回題長沙新到鴈圗渺莽雪波烟渚有底鼓翅相呼如老子載家去眼明見甓社湖甓社髙郵湖山谷詩亦云題别浦逺來舟圗道人毫端妙用幻出烟水淮南頻與東風商畧幾時送我歸颿題野渡風烟圗畫師毫素筌蹄波光野色凄迷舟艤樹隂欲動魚驚㠶影應低題寒光雪嶂圗曀寒流覆絶壁君纔得想像間輸我一庵漁浦雪中真看江山禱雨木欄堂四首池上客熟無那池中魚不自濡安得凉烟泛坐緑荷盡日跳珠絶知豐凶有數豈必天地不仁鵓鳩底用緘口晨霞徒解欺人物享用達幽秘政戾自奸隂陽我已泣刑白鶂誰繼請烹洪羊醮壇烟㫁金鼎缺月印天一梳想知瞻望雲漢君王寢帳猶虚羅提舉見和再用韻四首又作凝香齋宿未容燥吻得濡頗恠太湖龍伯貝宫臥戲明珠斬山木寜為民焚巫尫恐傷仁看書饑而不害公政無慙古人紫沉初炷爐香青章巳達寥陽當有碧玉宫使叱起河瀕臥羊靈姻傳載所牧羊皆雷雨神也燄燄水芝照影娟娟風栁受梳何日詩成喜雨凭欄客意凌虚題草蟲扇二首捩首一振怒臂鼓翅雙揺利鋒底用交綏解鬪政應沐我仁風迎隨小躍低飛無謂二蟲何知却因毗陵畫手憶我田間杖藜江湖長翁集巻十七
