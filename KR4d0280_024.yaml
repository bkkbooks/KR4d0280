body:
  text: 江湖長翁集卷二十四宋陳造撰書與諸司乞減清泉兩鄉苗稅書某聞之天下有難信之事故有難聽之言舉其不易信之事而輒以號於人則宜乎其不我信及其利害是否之既驗如白黑如莛楹從而為言則聽者不疑决矣今某僻邑小吏當國計不甚豐裕郡計蹙迫局窘之時輒以輕民賦為言是最難信而聽之者然某非率然而言之也亦言之於可信之後也定海為邑前枕重江左背皆海鹹水環之邑為鄉七而清泉之鄉居二正江海之間是兩鄉東西六十里南北約三十里地平無水故無泉源之潤鹹潮之所沾浸故斥鹵瘠埆勢中高四下故水泄不蓄水利無䇿可講故十日不雨則蹙頞相弔兩旬不雨則秋收絶望其民坐是甚貧而頑歲以不輸官賦為常鞭撲不恥不可教語而縣賦不能取辦在諸邑最號難治為宰者往往不滿其任朝士亦知其然舉以戒授闕者是皆兩鄉所致某瞢為此來幸而當二年多雨故有秋者再誠若可喜然其民之不樂輸賦與巧為隙穴果為抵拒以蘄漏網者猶不少殺因按行其所種殖地利比餘鄉肥瘠厚薄二不當一就使善者亦三不當二及稽其所課之賦則四受餘鄉之五或又不止此也詢其始末蓋紹興經界之初舊賦之籍具存而其地之江頽海齧者十去一二以後來不足之地而敷平日成數之賦故如是之重目今五鄉之田賣買之價畝不下二十千或三十千而清泉之地佳者兩千次一千又其次舉以豫人唾去不受也昔人為政欲使金土同價而貴貨易土魏絳以是圖狄以闢晉境今舉東西六十里之地使民不保重愛惜何哉此則嘗官而居者乃克知之信之未易遽以語人舉今歲言之舉以語人則易信不疑舉以告其上之人真其時哉自六月不雨旱勢甚矣而五鄉山泉陂湖灌溉不輟其收比舊歲為羡而清泉之民束手以待無所用力秋苗之減十之三而餘五鄉無一人愁嘆者夫相與隔一江同此邑同此不雨而休戚苦樂如此所謂利害是邑既驗不疑可舉以告上時也其田之不利其民之甚瘁固也然其賦之輸則四或受其五是猶置而不言言之矣置而不問於心安乎且此田其瘠埆其無水利其利害視餘鄉大不同賦與之等勢已不易供况又重之乎夫人氣宇充實軀幹碩大使之荷百斤可也有人焉纍纍而癯厭厭而疾亦使之荷壯者之物是可乎哉况又所荷有重於壯者置不問忍人也前年其民有詞蓋嘗乞減賦矣當路非不憐之事雖施行所損未幾蓋以胥吏需索不厭遽至中格然民之受上賜亦自不資幸今當路皆吏師皆巨公名輩以利人濟物為務志逺大而不計目前故竊以為惟今日可以言之而必聽而又利害是否即今歲之旱而益表表甚白可以聽之而必信一引手之間使此兩鄉數千戶者偕七鄉有生氣無愁瘁而其地漸重不輕民不易視之有眷戀鄉土之意其休戚苦樂萬萬不侔究其源其誰致是耶或曰郡計如是之乏顧欲減賦可乎曰不然今之增減不甚繫郡計也向也賦如是之厚而缺負者十常二三缺籍有數而此賦必不可得在邑有追逮弛慢之憂在民有拘監笞箠之苦州府不得已而蠲除無歲無之前此侍郎林公蠲者萬緡郎中林公蠲者二千緡近高公亦蠲萬緡皆以賦重而輸之難故也使其與餘鄉齒必且不然今小有所蠲但蠲其不輸者爾於郡計何損也就使小有所損節省於上而能使此數千家均其隂賜大君子之學以愛人濟物為心必樂為之况不至是耶且使此邑本不有此二鄉將廢不為郡乎向來諸郡以上供窘闕甚嗸嗸也繼各有蠲除矣今為國自若祗見郡國稍寬裕少逭急迫一切之政民亦密受朝廷賜未艾也兩鄉之賦不敢望輕於餘鄉且乞與之同其數不惟民得溫飽免笞箠追繫之苦而為邑者心不怵迫惶遽得施其惠利撫摩之術則田里被澤豈有既乎書曰無忿疾于頑清泉之民其頑獷不率前後政疾視一律也某書生又淮人落北風俗頗淳慤其初來亦復厭此民之難化今年之旱親厯田畝斟量災傷放除其米至二千餘斛民以適其所望又郡政簡徑不擾與曩者大異無不相慰相賀聳踊怡悅問其賑濟賑糶之政則曰州縣既體我心已無死徙憂不願更煩官司賑給如是者十七八然後知孟子所謂人性本善富歲多賴詩所謂物則秉彜千古定論而此民向者之頑是官驅之然非其罪審矣且今習熟見聞士夫之論一則財賦二則富足一聞節省之說則以為老生常談一聽減賦之言則以為迂闊害事故民愈困而無訴上之百用按不以為過而日以不足不有度外之士孰能起天下之病而少息勞疲者之呻痌歎悼仰惟某官博大而高明慈祥而惠利可擬之古人而不當論之於他日拘攣之徒而又當清明之時居得言之地天下利害何所不當與故敢冒犯陳此雖然賦之減民利矣而邑亦與焉某明年七月初官滿去矣輕賦之便實無所賴故言之不自嫌而要譽於天南海北之人則亦何為但職在宰字不得坐視民之受苦者噫天下利害皆學古者事然知者能言之有位者能行之可言而不言則違於心得行而不行則孤所學不言之責某既謝此矣行之之責則必有任是者某實得以辭之與許運使論荒政書某丞郡房陵房之為州山險墝埆之地其俗惰窳由來尚矣平時上熟粟粒不餘去歲夏旱秋潦方未穡也穀粟臥野不實之沴公私未悟及冬則病春則大病今束手待盡者十二三而羸困相望也某被使臺命厯訪之雖未遍已深得其情前此猶食草根木皮近多炊煙不起問之則凡鉏鎌畚钁之屬鬻以救死矣卑官淚隨心腐無以為䇿但仰屋於邑思所以為拯民計輒有迫切之懇敢僣布於下執事房非出粟所故儲蓄于官者不多今凶歲之民望之官者不少非規規自守苟逃譴訶之時惟度外之人可與聽度外之言以濟非常意外之事而為德者有其柄天以是授之人而且辭焉則為失幾然而為度外之言蘄有所濟非大不得已士之粗有識者則未易敢及此也敢及此而其人或斷斷謭謭度其必不吾從而吾猶將言之而貽笑取怒有不暇恤何也勢之急不容已也若乃謀是事為是言適與度外之人㑹而且有懷不以告不仁彼可以濟其事而顧以斷斷謭謭者待之若貽笑取怒之虞默不出口不智理灼然而畏縮不勇下不以言上不之聞則凡懋于德而是柄之所屬者無乃孤天之豫人之意耶竊見本州有常平錢幾二萬緡廥積已二十年鐵鏹非可貯之物繡蠱脆壞日有破碎久不已祗為房州纍今未見也某之妄意欲丐台慈舉此錢撥付本州令災傷稅戶結甲量戶數多寡併錢偕粟借與之限以三年責其償目今郡民不惟無食而農器種糧率多不存民今得錢雖云不多然可粗辦春計責之以三二年之久償之亦不甚難此實目前饑民之大利然此錢籍在朝廷候奏報乃行房去行在五千里往返數月則索民溝壑矣亦望台慈火急行下施行一面申奏昔人矯制發粟正以其急且病不容姑徐捐身為民也厯考方䇿雖暴忍之君未嘗罪一人者銜命行火汲黯使事有旨乃擅為發粟之舉武帝不問也武非重誅謫者顧乃爾况吾君之聰睿博愛吾相之憂先天下而執事深結君相之知必亮其心不然某則建言請以我說不敢辭也亦熟思之矣設被譴一夫耳更生者乃千萬人設被譴聖明之朝决不至重報其與斯民枵腹待死無復生意孰為輕重緩急故决意言之民病且死矣臨于上者當如救焚如捕亡如復父母之仇不顧計焉庶有益於肉骨起仆在此舉所可慮者獨將來萬一薄收恐民貧不償因以為纍某謂民吾赤子財自民出當窮急時舉以豫之有以惠利垂死之人饑而飽斃而生逋亡而安居民之利國之利也二萬緡顧何足惜况遲之久决不至盡陷失也若曰常平有粟外此勿議則兩邑之民决非數千之粟所能濡沫有惠之之名矣未既其實也嘗即民而窺諸天是雖蚩蚩者天所甚愛也天所甚愛故天子尤愛之而賢者不容不愛聖人君子天其心故民其心民其心故凡可以及乎民而不負乎天者汲汲焉惟恐不及卒之受天之祐揚名錫羡其報如響故某嘗謂凶歲之艱正國家所以衍億年慶基者在是君子無愧所學而詒燕雲來者在是天以為德之柄授我取而為之如將失之可也漫為之拂天矣置不省逆天矣不拂不逆而吾不於度外之士望之而瞢焉為是若難之請是又不量彼己者也恭惟某官一代巨儒英聲隆望師表天下小試青陽則活人之政載在公論今者杖節京西適此大侵其於損所有以拯其死者有不行行之將優為而莫禦前所謂濟非常意外之事必也望之度外之人捨執事何之伏惟動心於倒垂之民一聽狂瞽之說或在可取之數仰乞即賜行下少緩之無益矣某以婦氏風緩垂死蒼黃隕濩急筆具不腆之辭仰扣威尊瑣細未盡之情亦仗廣文梁君面言之與奉使袁大著論救荒書某淮人也淮鄉之民情利害知之甚熟十餘年來若水若旱若鼠與蟹之為災率無豐歲間亦小熟矣然收不飽饑重以今歲之旱赤地千里聞之故老六七十年無此惡歲淮鄉土曠人稀雖荒歲窮窘其民食草根木皮猶無餓死者今草根木皮亦復無餘去麥尚半年而麥之熟否特未可知民之僵仆可立而待而監司郡守錢粒不餘長號大唶束手無措目今所謂賑濟不及千百之一民情嗸嗸如魚遊鐺釡之中望執爨者之撤其薪而濟以杯勺之水可謂迫矣某竊謂天下之勢一家比也平居無事其父頥指于上其子弟奔馳營幹于下生生計度量入為費各有常規一旦子弟大患難瀕於死亡則父之慈者必極力拯救不敢以常規為拘何也其勢急也今旱而饑饑而垂死矣吾聖天子憂民之心有逾父母則凡可以濟斯民之死者當無不為平時之法制有未暇議也今日之勢下之陳請如訴寃如復讐上之報行如援稚孺之陷如解同室之鬬庶可以逭民之死某之愚管見二事可以救倒垂之急請為執事言之其一曰積滯之鹽舉以借沿流諸縣之民其二曰募饑民以濬鹽運二河今泰州之海安西溪楚州鹽城瀕海陳鹽山積彼隨煮隨運者運且不洎則所積之鹽幾長物矣舉鹽城與高郵興化舉通州西溪與江都泰興舉海安通州與海陵如臯不以上下戶據所訴所放災傷分數五家結甲借與之俟秋熟拘之三州得此其民少紓矣則以其合賑三州之米併及餘州其民亦少紓所給之鹽運以小舟則無患乎不達而綱運阻滯鹽價踊貴之際則無患乎不售若曰虧損官課則聖主以饑民故旰食久矣傾倉廩以拯其死計亦不吝况舉未用陳積之物可以肉骨起死想惟慈愛之仁必且欣然從之患不聞爾鹽在民籍在官幸而歲稔取此劵折之可也則亦不取徒豫之也計鹽之價據時米價石增三百若五百以取之異廥以貯之主之以官陳新易置專以為凶年賑貸之備此則荒政大計也且此惟沿流可行謂鹽之運米之輸非高阜斬絶處所便也若夫自江而淮為南北之運河自高郵而鹽城為東西之鹽河兩河湮廢不修而聽其自爾者六七十年矣此不惟使客之往來米鹽漕運之所資而一路征商利源之要實藉此也資此以溉灌者率膏腴之田平日規模不復見矣雖近者稍置㪷門石䃮函管等民微得其利然始興倉卒未究其極兩河兵革之前其隄固其流深者月有培歲有浚而時開闔其泄水處兵革而來河之泥淤積已數尺隄淪于河而日薄河不濬則隄不固不濬不固則㪷門石䃮等庸足恃乎然窮盡其利而可為不朽計非偶大旱則未得措手大旱之際則河可濬取其淤而培之則隄可固今兹之旱民不幸矣而隄與河之利則幸可議濬河取土以培其堤而平時規模可以漸復今民之攜負老幼奔騖無歸者不知其幾優募此輩使從是役此趙清獻范文正公遺䇿也不惟河浚隄固農田可溉而賑濟之利實與俱舉一夫日與米五升錢百五十人食二升用錢五十其餘劣可飽二三口彼何患不樂從一家二人從役則六七口免塗殍矣某親見熟鄉之募人垾田食之而日與百錢民奔趨之則百五十錢五升之米足以來之而足以利之可以知矣及今諸縣辦畚臿釡薪之類春而興工二三月而畢畢而不妨農麥亦指日兾民雖枵腹而俟不憚也異時以河淤隄薄之故州縣修塞無虛歲所費不資近歲旱不見此爾又運河以淤淺故一遇使客釘閘壩流無所不至興役之民蟻集而民勞功少商旅阻滯兹未足論而鹽河淺淀雨足水漫猶苦重舟膠澀今舟斷不通承鹽之虧其課以袋計之蓋四萬八千向使已浚而通小舟亦可趂其半計其半二萬四千之鹽則七十餘萬緡矣不計此而目前之費是計望之常人可已此䇿一行不惟饑民沾利而已雨澤以時則州縣免塞隄之病歲雖旱也鹽米之運自若河水所溉之田又數倍於今此長䇿也夫凶荒之民待哺于官舉以豫之君之仁也不徒豫之而又興久廢之大利仁之至也然今監司之力不能獨辦而諸郡又以窘乏告螻蟻之見願執事奏之九重出禁錢十萬緡下淮東漕倉兩司措置助為之要以三二年之間兩司與州縣與食利之民分償之監司州縣之官以字民為先務有以利垂死之民雖痛自節約以償所負州縣之民得興無窮不資之利雖有所損以助其償亦理所當然不然則出折劵十萬緡為之今淮東楮劵甚重而難得上不勝費而下得其利亦如前說徐責其償可也蒙之二䇿揆之已見參之人情毋不可者或者曰鹽國之寶舉以豫民恐乖常制夫救愛子于壑而曰竭蹙失容非通論也范文正為杭州而旱饑民私鬻鹽不禁也民賴以濟既熟則禁之治其不聽者世以為是目今饑民鬻鹽官縱容之全活甚衆亦范公意也私鬻法所最禁法有時而可屈則以人命至重也今但略其法以借與之夫何議民知上之以已故而肯暫屈其法其感上之德不亦深乎又曰禁錢楮劵豈所可議而今兹遭旱至廣烏可遍給此又非達事體者兩淮國之北門淮民醇厚忠質數經兵荒最可念者浙江民夥土不能容尋常小遇水旱則纍纍而北者晝夜不絶此非兩淮無所受也疆事朝告淮民暮已裹糧從役中原歸義者非兩淮無以置之今日兩淮在國家最所當重非他路比而聖天子審天下之勢顧憂淮民最關宸慮前歲都下之稅歲二十萬緡尚以禁錢代之夫寬商販於安平之日與夫拯殍殕於饑饉之歲孰緩孰急孰輕孰重聖主有不聞聞之必將樂從行之必將恐其緩也今歲大旱非常之災也勉救其死何如坐視多救一人則一人更生力未必能終救之延一日一月之食則一日一月猶齒人類愈於遽僵路隅也此在聖主賢臣勉之而已自夏而秋蝗子之在土數寸其厚竊恐民以旱故饑者或死生者必怨愈傷和氣則來歲之災恐甚於今草茅之見切謂勢須傾國力以起民之死民愚而甚智知國家愛之如此心必感氣必和民心悅而氣和豐歲猶不應焉則加以罔上之罪某所不辭且民謂之天民君謂之天子承父之志子之職也故民者天所甚愛也天所甚愛故天子尤愛之天子愛天民而愍其數十萬之命無罪而死而能起之於既顛生之於將斃則民心膠結天心眷顧國家億萬世無彊之祚益羡于此理之必然而活千人有後是數十萬之命由執事而延其生則天地之報執事也又如何恭惟執事頒聖天子之命訪饑民疾苦于淮瀕淮民之俟玉節眄眄焉日南其首者豈不以聖天子之心赤子斯民無所不用其至田夫野老洞知之而執事推所學以愛人慈祥惻怛聞于中外不愧古人彼之所徯冀延其旦夕之命故耶某一命之吏待次窮鄉無所復望于世獨能洞識聖天子兼愛與執事慈仁之心悼歲旱之非常哀斯民之抱叫閽籲天之誠而不能自達也輒以二事訴之執事一得之慮不識肯少留意否罪言孟子曰位卑而言高罪也謀國計治達官顯人之任而猥賤者輒及之誠為有罪藩鎮之橫豈杜子之責安南之役朝子非在位者二子輒言之目以罪言宜也某吏隱江湖自分無求於世而僣言天下大計非罪乎然冒罪而言言之果為已耶此固不容誅言天下大計而或有一得焉可以少補當世為國者之慮彼將求之之不暇何暇罪之某之所言三一曰謀敵二曰備用三曰救時今方為吾敵者大國也幾晉之於秦宋齊梁之於魏也南渡已來議者所見不同或易而言之或憚其彊縮頸而不敢啓其口一於憚國何賴易而言之是石虎肆市朝之說也天未悔禍逾六七十年矣比者金主嗜殺棄親而又荒于畋嗜殺而骨肉不免則非所以自安荒于畋則其政事必墮自古有是二者不亡則亂况彼以凶德臨天下其亂亡之兆是吾向來臥薪抱氷禱祠而不可得者也今彼乃爾孰不翹翹動心急於乘之雖然當今在我之計尤當靜以待之隱忍持重以候可為必勝之隙必且有人以投機之說獻以後時之戒藉口此淺之為謀者决不可過聽也敵雖無道兼番漢之地有天下十七而蟠踞人上且六七十年使彼略無以留天下而伏人心其喪亡也久矣而乃數十年之間天下無變亦嘗有大變矣收其搶攘息其沸潰不甚動容變色則彼之上世亦必有術以為之今彼雖荒淫虐戾然天意猶未卜其决然一定者也昔吳入楚召陳懷公逢滑當公而前謂吳不必福楚不必禍姑辭之其卒果如其言楚莊之三年戎麋外侵庸蠻內畔議臣謀徙以避之想天下必以為遂無楚矣及蒍賈師叔之謀再用侵侮驟息楚以振起莊從是以伯諸侯齊威始立荒酒及色鄰國四侵一旦烹爵二大夫外懾內震齊以復彊古之大國危而復安亂而復治多矣不可不深考今敵人亂亡之兆甚著其亦天意悔禍使如苻堅一旦潰裂喪敗不可收集振立未可知也其或如前所陳亦未可知也然則在我當如何兵法曰後之發先之至又曰始如處女敵人開戶後如脫兔敵不及拒切謂謀人之國而取勝焉捨此數語無䇿也雖有䇿必疏今日正當藏脫兔於處女之時發之後以冀他日之先至可也悠悠之談未可輕從而易信輕從易信之前好已絶新釁遽結而吾中未有必勝之具一旦事起中止不可不中止則殘民費財而勝負付之偶得失古之輕舉而敗者往往如此皆其始謀之拙是今日當路者不可不洞知而謹守者也其次請言備用夫好功名者固非所以安吾國苟安而偷惰乎則禍常伏於既久蓋用國如用器輕用之固不可置而不用尤不可器輕用之則弊不用之則蠱天下亦然今之待敵以靜是不可輕用之說猥曰用之有成敗可畏其必無生事以勞人夫豈知天下固有可用之時可用而猶不用使天下驕惰宴安臣民習熟惡勞而甘佚是惟無事一有盜賊兵革意外之患上下相視倉皇周章無適為計此禍之最慘者也夫輕於用天下如漢武之鞭撻四夷如宋文之挑元魏甚至朝錯之削吳楚清泰之遷河東大或喪亡小亦憂悴此置不論請論置不用之為害昔平公據堂堂之晉玩歲愒日而戎馬不駕卿無軍行公乘無人卒列無長叔向為之深憂其後三家鼎分晉以不祀實平公胎其禍建之為齊足以有為甘秦豢養置武事不講終於糜滅君子謳吟悲愴今猶可憐蜀先主之後寂無影響一旦葛亮師出曹魏君臣茫然失措向令魏延之䇿見用長安或為亮有長安不守東首闖許天下或未可知我國家南渡而來權臣挾强敵之勢邀上以固位專以銷兵文治為說逆亮辛巳之變倉卒搘拄將不能使士士不間臨敵致高宗皇帝寒心旰食者半年非天怒強敵弗戢自斃吁其危哉是無他天下久不用固應如此也想晉平公之意必謂吾國如此其强固諸侯如此其畏服拱手可以保治安齊建之意亦謂秦於吾厚非諸侯比必不棄疾於我何苦治危事而從事於凶器殊不知慢藏所以招盜枕蛟藉虎渠能保其終可信也魏之謀臣如司馬懿劉燁之儔中外不乏而亦恬不以吳蜀為意何歟紹興辛巳之春議臣乃始建白謀及邉瑣亦後矣究其原雖權臣幾誤天下亦士夫之情喜安而惡勞樂因循而諱生事馴至於是其心謂萬一意外非我獨被其患刺口而先議衆所不樂之事必且有目前之禍不然夫豈天下無一人焉知夫備禦之不可不嚴干戈之不可不習敵盟之不可必信其習俗汙染所自久矣夫平日所謂用天下非必今日興某師明日戰某地然後為用之也凡進退將帥申嚴軍律揀練士卒儲蓄戎器凛凛焉如冦至此則用天下之實也昔杜黃裳之為相擇人征蜀越衆而委高崇文命下崇文即日戒行想崇文之為將凡所部之卒日為征行之計故聞命即行無復齟齬夫預備而不用固不害有命焉乃逐急求辦崇文之意必以為疏愚謂為國而用天下上自廟堂次而參議論之臣畢如黃裳之掄材付事下而將帥禆校一當以崇文為法亘古及今不可不然况今日敵有可伺之時乎萬一敵運已盡我無以為用國之具束手以守舊物似未害也然敵既失之而中原為英雄豪傑所據彼肯怡然不以我為虞耶狡焉思啓封疆自古喜事者誰不有是心又孰肯少有所得而遽止是今日用國之計勢有不容已者也今日上自君相下暨達官百執事汲汲焉以自治為務惕焉若憂患近逼吾身者惜隂競辰不敢頃刻置而後可也必曰人才孰可倚將帥孰可用得無有尸素具官者乎罷軟不任不能使下者乎某害可除某弊當革豈中無除而革之之術乎得其術其無乃有不便於此而沮之者乎至於為國六七十年而國計不餘一遇水旱束手無措况欲如文景之時有以不時施澤以逮斯民者乎古者國不餘矣民或優裕而今上下告乏本末俱困又可悠悠視之以為當然不加意乎竊見十數年來人才升進者往往多虛名之士若乃朴茂挺特之才初不甚見售比者矯言僞行或假靜默以蓋其無能為者多得薦進可用之人其實希少風俗寖壞未易挽回平居無事皆可自命以才諝欺誑上下一旦有事欲取辦此輩難哉文寬夫曰吾不比韓稚圭吾但粗才爾今得粗才之人如寬夫用之夫何遺恨奚必好高而玩竒乎國家久不用兵宿將盡矣後之知兵有威名者聲績未著也兵雖不可試而平日施之統御見之約束形之詞氣皆足以知異日之可用與否愚願宰執臺諫時前其人問之以治軍之術而叩其方略之藴拔十得五雖失不逺矣向來將校之進輿論動有譁言曰是貨權貴得之者此固妄矣然其間下中之才衆不以為可者間亦得之此謗之所以生而或不以其所聞為妄也今日宰執臺諫可無詳察詢逮得無有行貨市進與夫受之而為地者耶此成敗所擊非細故也悠悠視之尤不可若弊害之在天下不一而足求其端則是祖宗法不行致之也請言其一二而其他可舉矣寺觀不許典買田宅法也今也公然取之漫無禁止田入寺觀豈得復為民物今寺觀寖富民田寖少向之有田者服役僧道而仰食者日以加多未止也使監司州郡能守此法則無此弊矣監司郡守法之所由行也而法或格於監司郡守遏糴之害今日禁之明日格之此不過抑之使賤而官糴之爾其隂奪農夫之利似非虐政而民粟出不當價實貪而甚虐此尤不守法之大者此二事之外如此者不暇縷數也此在朝廷一二警束之則庶幾其害不極也若乃足國裕民之計尤為可憂古者為國三十年當有九年之蓄今渡江六十餘年而僅足不餘公私嗸嗸其弊安在今天下疆土不及祖宗盛時十五而彌文浮費乃過於祖宗時夫貧富之理最易曉也譬之富家當田宅全盛僮僕辦集之時歲入若干其出若干熟計而謹守之然後其主得以雍容優游接賔客而施惠利以結鄉里之心而家不失富一旦家道半退則吾亦當據其半而殺其所出不然窮匱可立待今日如半退之家其用財猶不肯減全盛時而所費或加侈焉宜其僅足無以為經逺備也為今財利之計必將必世百年絶口不言生財食息俄頃之際不可不言節財今日所用之財有可節省者否愚不得而盡知雖不能盡知然一節一目之間得之聞見者可得而言請略陳所知者之一二執事者求其比而計之國家郊廟之禮足以事天地祖宗百神加以肅敬誠莊千祿百福有餘矣而祠觀之間假崇奉藉口或且祿其官寮多其𨽻卒所費不資是何為者此可省者一也求其類而省之可也其類不知其幾也州郡冗員其俸給比紹興數倍大郡總管或三數員比之小官其厚數十倍此獨不可漸省之乎或半給其俸可乎此在外之可省者其類必不一也淳熙初李侍郎尹臨安建白百官賃屋錢月出無藝行都為之虛匱城內外僧尼私庵籍之足以居官寮不惟省臨安大費亦足以除僧俗淫僻雜亂之患既而中止今之視昔又增一二倍此等事何憚而不行僧宇雖大小不齊未足一一可居取其材改營之何傷且不許擅私置庵有增無已何為哉此其類蠧俗而奸法者不一二而止皆可求而革去之也今欲救虛耗之弊求其節當自貴近始講裕足之䇿致其益當自州郡始自上始所以倡其下使之知達官貴吏猶復刻苦如此况吾輩不然彼且不伏果出乎此某賜可辭許其辭之也某例未廢權許郤之也古人有自毁其家以紓國難者矣州郡寬裕之原非能自寬必大農有以寬之而後可州郡寬裕國有賴矣此如子舍方且窘亟憔悴救過不暇父兄可得享雍容有餘之樂耶節省之說行於君子格於小人小人多而君子少故其說易詘小人營利以自肥佞幸怙勢以逞欲一拂其意則謗議必且沸騰雖然無以拂之為自安之計則善矣波流風靡日以益甚彼豈思夫一錢一粟闕鞭笞而取之者也今且朘削斯民以肥此無用之人而或容其壞法亂俗何為也且為天下有持循恬靜養安之時當是時誠不可生事如慶厯嘉祐是也至俗壞而弊見駸駸焉如坐漏舟始而瀕沚俄而中流當其時如救焚不當矩步如解鬬不容笑談蓋聖人誨人未嘗不以中道而孟子乃惡夫執中天地有中國而燕自有燕之中越亦自有其中當救世之時有所過乃中可過而不過中之賊也大過一卦凡才過位則利且隆才位稱則凶且醜節之象上貴甘節下貴安節至卦之極則為苦節苦非美辭而繇曰正凶悔亡節而至於苦人率不樂以此為正固凶然聖人猶以為悔亡但窮而後用用之猶可無悔今日進退人物搜選兵將與夫革弊去害處之不以大過之時愚未見其可而足國之計有大不得巳者當上下暫由苦節又當有以示不終為是苦節也不然日日以弊不可救矣古之為治君相倡之內外百執和之正其身施諸政孚諸言動權幸宮閫小夫賤𨽻感而化之天下之人中外同信之今者聖賢相逢俊乂布列可無心協道同孜孜焉闕之本本一立勉而為持而久而治不效俗不革事不立有事而國不可用則自古及今無復為治之道六經為空言而君子果無所益於世歟江湖長翁集卷二十四
