body:
  text: 江湖長翁集巻二十六宋陳造撰書與真守書論士而索諸詞氣論士者之末也訥於口者或周於用朴不知文者或號廊廟器辯而文其中未必誠有也辭氣不足以論士此世俗常論然也世之君子或得之堂下之言或取之始見之文皆於立談之頃而超然信其平生未試之才而其後亦不負其所知是果何術也夫惟君子養夫心也正講夫學也定而持其氣也不怵於外推之而接物如燭之照如鑑之掲犂然有以相契乎言意之表是宜其能重衆之所忽洞世俗之所未知非豪傑不羣而不牽於世俗之論者豈足與論此乎伏惟閤下備文武之全才蘊高明之粹學禮賢好士而人莫得以欺其毫髮可謂豪傑不羣者矣聽堂下之言而執手以上讀始見之文而知其必為公輔者固應有人而不可以尋常繩尺而議其將來某也一介之士讀書為儒冀斗升之禄幸而齒一命之吏將以試其所學又幸而置其聲病綴緝之文而得以袖刺曵裾擇賢士大夫而見之以質其學之可用與否是以不待介紹進見於寮吏之末以庶㡬乎一目之顧一言之賜重之太山輕之秋毫惟執事所以命與竹山楊知縣書某比不自揆以吾兩邑艱食之民哀愬于繡衣始虞得過不謂果動其聽捐常平萬緡借之竹山亦撥四千緡布萬緡于兩邑春風和氣彌滿阡陌矣然及今般挈迨熟拘收不免小煩營計此如小家枵腹乞假于人苟或我從他日不便未暇預憂之也惟賢令尹慈祥愛人視此凶歉如已饑之小忍爛腸亟為津致解是倒垂或者必曰二麥熟矣毋庸盡散是憚小勞者决不可從萬緡散分兩邑尚恨不多始請二萬僅得其半又不盡給則僕不腆之書欺罔當路以樂為憂以飽為飢獲譴必矣切告留念公私望麥秋以日為歲此豈滛雨時耶仰屋悲唶不暇悼亡也繡衣寄聲見屬毋令胥輩規取是翁切切饑民不啻赤子之就墜溺吾輩胡可不勉也答鍾呉二生書伏辱寵顧惠示大篇其辭若不同要為善學者其見稱處則推予過優非僕疏謬者所敢當然僕始為學蓋未始自是切切焉問諸人亦若二兄之云云問之者既多蓄諸中似有所見不自是之心雖不敢去囘眎前日則似大異仰而揆之竊意夫前輩之為學亦必外資諸人内養諸心無所乎資聞見不博無所乎養志趣不定二兄之説志趣所養渾焉慤焉未可謂僕何從得之也而猶惓惓有俯就之誠不知僕之真無所取賢於僕者比肩林立兄其舎諸古之君子志於學而道俱從事於絃誦文章而中有所謂超然獨得者其求有據其入有敘凡令吾所以仰之神人然者其言文其行儒方寸洞然所謂性命之理道德之邃天地之動静人神之顯幽黙有以㑹而通之而其於世務則不廢若是者㡬於知道不知者岐而二之泥章句者守糟粕下此者矻矻乎聲病剽掠之技外若無復用吾心命之曰俗夸張者略形器塊然無營以土苴視人事蘄乎世以我為知道而中實瞢然命之曰誕二者學之蠧也二兄見教甚善言諸近者其志篤期諸逺者其志高篤者發乎真高者有所受仲尼曰知者動仁者静動静若無與於道實仁智之資也二兄之見不亦受道之資乎然竊有所禱者真不流俗高不為誕讀書績文之外涵養不可不至踐履不可不謹心游於學而道與俱來似必有以追躡大君子之迹所見如此不足守以為的也當更求世之賢傑以博其所聞荒陋不講久矣感二兄論學之善不覺辭費如此告亮之有暇見過時得親名理袪滯思尤幸也答臧仲武書某再拜前歲當塗得締令兄交慰甚令兄學有根柢辭不凡近持守堅重某所畏者而談間嘗推兄之賢自以為不及令兄之賢已難輩行季又過之耶官守下邑竟未獲拜識此心日偕月而東便中長書惠示副以兩詩讀之灑然其見慰則已如交令兄始也而令兄昔日之言又信不疑詩與書辭采爛然逼前作者大可敬服顧乃於某傾向若真有不及者何哉求益於某耶冀其稱述而增重之耶令兄之才不啻過某而且猶推避兄則於某何益於兄某之卑賤雖言之孰信又烏能增重其抑有抱不信而訴於某乎則㡬矣某生而多艱學甚晩矻矻迄今自視歉然世無予之者誤見許可則亦卑而甚窮者爾嘗意天以窮賦已㡬不可脱免受窮之資蓋略備矣寧不自知故於世之所謂榮進一不萌心兄乃於某乎取之不徒無所益而分窮以累人某又深不忍也而兄家有偏親不可無旨甘奉其可不萌榮利之心乎此皆即兄之書得兄之意而不能無疑者他須㑹面可盡謹和年字韻詩聊復垕意七賢圖某未嘗見故未敢落筆幸恕之未相見惟為親自愛答寶應趙秀才書趙君足下郵城去高居甚邇僕頃年往來山陽甚頻得足下聲華甚熟以是願見之心甚切相避參辰猶孤此願伏辱左顧惠示長牋陳義甚高文采爛然推予過當則非所敢當兄所言敬悉其凡始而自信已而自疑繼而自悔悔而改其圖似矣前輩之用力也獨惜其未善既悔之後也既悔之後進道之機也可不審乎夫學之進也以疑業之建也以悔可信也而不疑也不悔也夫何議不然害道深矣告子之不動心先乎孟子而義外之惑不能自克太元法言揚子雲得之深者乃在不為雕篆之後使告子而自致其疑當不媿孟子使子雲安於童子之技是枚乘相如而止耳兄能舎其舊而圖新其必有所得矣前輩之所用力恐亦如是然乃歸誠於僕何哉世有商而貧者幡然求所以致富而之黔婁焉則其貧愈益困不可救矣僕之疎繆庸頓蓋自幼年晚塗一第亦幸爾兄指其幸者以為既驗而不知其聱牙齟齬召謗而貽怒於人者不可縷數也夫發而必中者羿也發而或中者塗之人能之指其或中為驗可乎醫之十全為扁鵲蕐佗十試而一愈指其一以為驗一之外何取兄於僕所謂驗者捨一第何有而何以速化吾子且然不移深恐誤兄而人益以兄為不智故曰疑與悔進道之機也然不可不審必不肯已來為羣居計居且遊者名士不盡無偕吾子而之焉以求其所欲得退而相與講究磨切或者兄得速化而僕亦袪其蔽㡬矣兄其思之答趙解元書辱惠書陳義甚高文辭甚麗大慰平昔願見之心然諄諄焉以李膺陳蕃之任見望君子擬人于其倫僕於古人無能為役且敢望陳李萬一隨俗俯仰無泉幣以振抜困窶無聲望以題品沉滯倀倀焉之於世方蘄乎見資何以資人兄乃過聽若當世才名可以輕重人者而赴之何歟其由酸鹹異嗜真自取衆人之所棄抑姑激世之趨勢附炎者乎無乃阨於無人之境抱所有而莫知以某粗脱科舉欲推重于諸公間耶揄揚贊誦僕其敢辭然言之不足取重猶恐厚意之虚辱也此外容面賦答嚴上舎書前日垂訪授齊年柴丈書稱名德甚悉及讀長編辭義粲備良副所聞因得兄所嗜大略與僕不異嘗繹之天下蓋無正嗜然各不免有嗜凡味于口色于目聲于耳貪者之于財勇者之于鬭皆甘其嗜身可捐嗜不可沮吾徒之書于嗜與彼唯阿爾乃如宿疾痼人根結于肺腑臟脉未易盪滌僕也竊每自咎意其見笑于人與吾之笑人者無異思得體道無營者師之以袪汰所嗜求於心悉矣而兄惠然臨辱推予期待不薄能言所嗜之是否固有望於兄者而其嗜於文又過於僕何哉凡世之有嗜皆物也而兄以為聖賢嗜於道僕竊謂惟道不可以嗜言昔人言道者曰㑹曰造曰自得曰黙識然此皆自學而詣之似嗜而實非嗜足下於此誠有所見耶僕將摳衣以從其後若曰文之為嗜而曰嗜道舉世不足奪移則無乃無以藥吾病而又重之耶仲尼論奕曰猶賢乎已人未至乎道而心無所底麗則奔衝潰馳其害不細故奕雖鄙事猶不可廢援此計彼棄一則就一吾之所嗜不猶愈乎奕耶是説也猶安其嗜而遂非未免可笑外此而有得無我靳焉則幸而副僕之所深望者矣裁謝草草答周解元書僕與兄皆淮人聞聲甚熟識面甚後第於令叔義誠處悉其文名求見之心積有年矣今者肯顧惠以長牋投以新文一編伏讀數十過目明心壯大慰鄙懐僕之不文且置此已久恐不足以知其萬一厚意不可虚辱則就所知者聊復一二兄之文古澹而豐腴頓挫而莊舒而兄方從舉子較勝負場屋之文大抵快辨藻縟而止爾快辨之失浮藻縟之失淺僕以身試而得者囘讀主司所予之文每切慙汗夫彼目亂心煩之際授之以兄之文無乃暗投凡兄屢進屢屈僅以待補進豈非坐此退之四舉禮部曾南豐秦少㳺皆伸于久屈兄所挾持甚偉僕號粗知文者第玩其膚革遺其心髓茫不知畔岸出此以示人宜其䛕之未已又疾之也君子之學志于古必不諧于今尊已者不徇俗即兄之文得兄之學信篤于古可自尊矣彼或疾之非疾之也忌也或䛕之非䛕之也必其有慕心也忌者頓干將而䛕者繩南威皆不得其正兄益求其無愧于古而尊所聞焉紛紛俗見夫奚暇恤此或以太𤣥為覆瓿物子雲之書今竟如何退之作應俗文人必以為工自今觀之退之之文其表裏誥雅陵轢遷董者皆當時所竊笑者也兄亦求諸已而信其可信疾而忌固悠悠慕而䛕乎於兄未必益也古之君子篤於所樹立直要諸後世雖然侯芭之尊太𤣥籍湜郊島輩服膺其師之書不必後世始重也曾秦之文古矣而歐蘇亦非借之異代庸庸者不勝其多謂天下皆庸庸則不可兄之文之學淵奥不易知如僕之愚則已下拜敬畏而主司亦嘗處以首選况如僕輩者甚多而賢于僕者亦多收竒嗜古之士夫亦不乏取驥於鹽車弭耳之餘正恐不得辭也勉之而已此外妙意隠義非面不足承教姑草此以酬厚貺答陳夢錫書前日過訪遂得披霧大慰平昔未得再聆博約之誨此心歉然伻至辱書責我待長者以常禮僕也豈敢是日家間小故方寸擾擾本不暇倒屣急于識賢者爾責人不同有怒之有愛之兄之厚意僕得之矣愛我故望我望我故責我不然清妙超絶之語何為炯然紛綸墮前略讀未暇細繹熟誦則已敬畏慙歉滿懷讀兄書得兄之學趣操超詣不隨俗汨没人能言之或不能副也而兄之造語託意不愧所陳此僕之所以下拜而盥手也兄之尊黄陳確論也人士猶或能言其輕重陳周之論舉世恐不見此簡齋之詩非不善也學之者不善也為樂天詩為東坡文遂失古意豈二老過周之詩自黄陳者故律法森嚴不失為工周云吾於后山有得然劣於后山也得其佳處甚多而妙處無見也后山之詩庖丁之刃畫史之旁礴贏得之深而忘也一編之詩凡駢麗工竒俗之所謂可喜者無㡬間有之翁則寘之外集妙意可見周猶未足語此况其餘兄之趣操言議何其似周也高眎風煙月露形似之表頡頏淡泊閒雅之境此而不已后山真可跬歩山云予於書貪嗜不厭彼既已淫于書痼于詩鴆視時相糞土挺之死不少屈宜其枵腹就盡于此學之竟何益而兄㡬造域啜胾窮未可量而高論云爾無乃貽不知者詬怒乎僕也學后山者不但其文且欲俎豆其節顧未有得萬一而兄遽辱評品取衆人之所捐擲不睨而獨欲黼黻金玉之無乃貽世人之笑詈乎兄未必益也而僕所得則將不貲雖然君子相與以情一面焉而遽責我遽規警我僕平生望於人不一二見者兄真可人哉僕有所見亦何忍愛其情於兄夫三百篇之為經後世無以加士以詩名捨是無善學屈氏之騷杜氏之古律三百篇之正𣲖黄陳出于是而其才高妙故卓絶不可及如此兄之才不下當世其亦自周而黄陳問塗于杜揚鑣于騷而税駕于三百篇不此不止也庶逞兄之才而兄避是是不為也非不能也此僕之望于兄者若僕則齒髮可念志慮耗落仲尼所謂不足畏者何能為繼此鐫其頓䇿其甚不逮猶有望于兄此外須面以既答葉學諭書辱惠長牋辭意良厚設科待士師道也古人避不肯居而教官亦謂之師儒名則然求之其實則謹避是子乃以洙泗河汾見處非深知僕者名以師儒則課程陞絀職不容免士苟尤穎超乎其徒不得不優之優之未必可以服衆議子為場屋之文信尤穎而超其徒且衆議無間然僕與子皆小尉既已異子於人必有以信子於人固也似不待諄複者雖然文章士之末也科舉之文又文章之末屋多士而𨽻之本不止此捨文辭而德行政事云者則才無所試見祗以起偽遽望之以孟荀屈馬舒向之徒之文則合有司之目似不必爾果爾彼未必能知之故窮年竟日從事其末士非得已子繼是無局于科舉之文即古人之所謂文而超然得諸文之外異子而信于人者益大非特僕不敢靳有洙泗河汾設科待士者出將分席待子矣勉之答翁秀才書惠示誨篇陳義粲然何蕃趙德彼丈夫也何必榮古虐今取不自信之疑不肖者之瑣瑣碌碌何敢當昌黎公之任云云之諭敬悉雅懷事在州而予奪在縣始委之縣乃可不然今無能為也天下事無使至于鬨訟此一是非彼一是非此之説出于此彼之説將出于彼而邑長之於民决然為可否之言不聽則治之刑之施于士則不應爾紛拏至此調䕶之外無餘䇿丐安之答王秀才書蒙惠長牋三復其説凡兄之屬我已厚而所以望我者非也為吏與為士不同而待士與待民尤不同民有悖弗率患未知知則刑加之知之矣而未有犯焉猶不當掇取逆意其惡而治之也况士耶凡儒其冠豈容不禮貌之歟或者少有月評之玷又豈可不小忍之以待其定歟故曰待士與民不同若夫率意而行肆口而言為士而然不怪也號曰吏則顰笑舉動利害如響兄所指陳率焉言之使僕率焉行之兄則何悔在僕誠病矣何者吏則難士易為也學職之選府命也必曰再試敢以是有請乎家食者之欲進猶夫任學職者之不欲退也必曰某可排屏某可陞躐僕坐席未温客主之勢殊絶敢遽任是怨乎豐之惡四子之善自兄言之爾使彼且議兄必又雌黄皂白之不免詎容遽信兄行吏矣且自知其不當為舉子之意行也然兄所計抑末矣士為學宜與古聖賢偶不得已而干禄則淬礪才業以動有司聽果足以動有司聽則紆青紫趣勛名隨取隨有囘視虀鹽短檠處向所較者祗可一笑雖然是猶外也其本在器質器質在涵養敢以是醻厚意答李秀才書僕領教備悉榜所云示兄不鬻酒耳他無一語侵足下復何嫌且此自軍大將有請不自邑宰出也邑宰除去惡語為兄計至矣復何道事貴不欺欺心不去天不與人不是也隠之兄心所云云者果未始有此乎以為未始有則天與人均為不可欺者易以无咎為補過之善傳以自修止謗僕之渉世得孟子一語中則坦然而推之不可勝用曰反求諸已僭為兄獻兄家利源設或者据之分其贏兄能黙然已乎彼且分兄之利矣又惡其名之彰也曰是且揚吾過非勢位尊卑之大相軋恐未易得此于人也兄之意似不必戚戚戚戚于此必有左袒惎兄以多方經畫謂此莫大之恥不可不雪之者夫左袒者自為計則多為兄計少也兄且入其説訴之邑訴之郡訴之監司軍大將訴于此豈不能訴于彼且以兄諱榜為私酤地者彼之辭則順而易信而邑人負此不韙之名凡數家其來有素而兄不幸亦不免與焉于今但有循謹不欺仰俯求無所歉静重以待之耳榜何足道而旁引曲喻若患在朝夕求脫去者竊為兄患在朝夕然求脱去者不在榜也欲收去姑徐調䕶之今似未可幸亮之答嚴學諭書承過顧惠示長牋三復其説甚副所望吾輩講學所至難者將以求其定學而定止矣然而所謂定者未易言也士當審之於未定之先乃能安之於已定之後未定之先審其可以定而後定則隠之吾心而安推之於世而無議焉乃可為善學未可以定也而遽定其害道不細求之心則將不安然且安之則瞢然于是否取予之際人且排而斥之否則受其誤兄所謂告子先孟子不動心而義外之説膠固不移豈特告子凡荀子之性惡北宮黝之養勇楊子之自為墨子之兼愛以至佛之慈忍老之清浄惟其自是故自定自是而且自定啓于其始之不審其所向遽以安之以言之至今識者疾之不恕而悠悠者或沒溺其心想彼數子其始亦不知其弊之至此也兄之論學汲汲求其定此僕之所望於朋從而未有所得者春秋十説併以見遺其理有據其文甚暢理當而辭順足以卜其中之得於經者于以自定夫何議而又拳拳於僕乎僕之求其定久矣迄今未敢自定畏蹈昔人之轍今乃得兄將求友焉以冀其定而兄之學可以定而論定者顧肯下交於僕僕則幸而兄無乃謙撝之太過歟撥冗草具謝臆繼此時得從容言議以决其定兄其毋多遜答伍解元書識君子餘半年矣比者兩辱臨賜大篇疊來始䆳我以易之妙得其所以為出處泛應之機繼博我以詩之雅惎其所以為比興持用之趣辭雖甚約理則炳而周君子之於文不當如是耶凡此者皆鄙見之所不逮而辭之云云意之款款若真有求於下走何哉握靈虵之珠而動目周璞染指螯殻之鐺顧芻豢于家則厭薄之恐非愛寶知味者之正若曰時為邑學遊事科目舉子計則僕雖老舊技猶未盡忘敢不有以時發所藴效之左右聽其擇取而丞公尤長於此政自有不貲之益然有一説似不容黙是間諸生秀㧞者不少然皆畢力贔屭于學職至植黨衷刃以争掇之視此㡬為税駕地夫此計其名耶其利耶利固毫忽名何有而勇於校此何也國家科目其塗甚夷得之可以行吾學潤吾家澤吾親友不然行之充學之裕足以有立于世以敵軒朱而傲封君諸生之才有不取之爾孰禦者古人所謂不為也非不能也兄冲然澹然静退而誠慤來為吾重庶可勉諸生以當為而挽囘其積習以息譊譊者良幸答李秀才書伏辱過訪長牋見屬展掩吟誦使人悲惋含辛茹毒備見于辭夫何良士罹遇乃爾而又親殯未葬貧無以辦政宜奔走號訴求當代好義尚氣勢力足以振人者赴之不然名聲煒煒望實孚于衆借譽引重亦或可以委曲有遂焉如僕則非其人兄之厚意無乃暗投乎邑長古子男邦有民社有政事不應無財而定海異甚一簪不自有而税與酒他邑當有之者亦不與焉令逃嫌則固幸然何以為當用而用之者計兄之窘迫而有愬于宰非當用者乎此無以應焉良愧苟恕己而望之人人且曰是為大邑而諉他人何歟或乞醯焉乞諸其鄰而與之吾夫子亦恥之者惡不以情今瞢不恤而稱子於人其無乃貽不情之嗤乎若曰祥琴入御將過從文字間則謹不敢避是幸察答劉秀才書缺尾伏承過訪惠示長牋敬讀數過即言而得其意志於功名而以事業不進為憂以不求為求而抜出流俗之表不知僕之不肖而赴之以其情甚哉兄之好學與僕之向時相似也而不能使僕不疑者蓋赴其所不足赴而譽其所不當譽也僕少則為儒而恙患險阻沮之力不副其志自視常赧然顧何足赴應課而試邑辦賦輸防機穽凛凛汲汲也舊學何事顧今置不講得罪名教貽譏識者多矣顧何足譽而兄稱述皆浮其實非僕所敢當者故疑然言之諄諄意之勤勤其於學問不啻甚渇而蘄飲久饑而欲食未必能已吾饑渇也者亦從而扣之僕之初學蓋亦如此以僕之身所履者故信兄之用情也曾子之告人必曰尊所聞行所知兄所聞而知皆卓然偉然非僕所敢議顧乃垂問焉孟子之諗曹交亦謂歸求餘師夫四明多士之地凡昔之光賁史冊今之輝映縉紳標表士林者不知其㡬兄之敏邵恪誠必皆尚友古今中有超然自得之者矣於此何以進兄不然試誦其所以為學者以告僕二十五歲始知為儒痛其晚也意鋭而氣盛視經史文章欲吞取之里有邵薿元實者頗能文而又博洽從之遊朝夕凛乎邵之在側也謂不至焉恥也既又有濟南周孚信道者尤精博高妙古文與詩近世少比亦從之遊朝夕凛乎周之在側也謂不至焉恥也如是者十餘年雖環省不自足而或且取之且稱之以為能文夫以其二子為之表的甚切切也而吾之猶為吾也不然其尤碌碌不足道果也四明之多士若在昔若于今豈無二子比擇取其可畏仰者凛乎立士側朝夕于斯寢飯于斯以不得並立為恥則所江湖長翁集巻二十六
