body:
  text: 江湖長翁集卷三十六宋陳造撰表箋太上皇帝夀七十加尊號賀皇帝表聖孝有格慈闈晏享於遐齡皇文煥陳寶冊誕揚於大號觀㑹通而行禮盡愛敬以事親誠罄九重歡均萬㝢竊惟元聖體道人而之天大君顯親名賔其實天與徒故享夀祺而有永實既浮則播德美於無疆載籍以來其事可考髙辛著在位之載曾號榮之靡聞唐帝上應乾之名揭親德而粗備肇觀盛際不講靡文蜚英騰茂之罔踰亘古窮今之創見恭惟盡舜之養繼周以文方璇穹保佑於嚴君必玉檢鋪張於偉績展采錯事三辰交歡揚輝奮炎萬世彰信臣叨居外服幸際昌期玉巵方舉於漢儀瑶墄莫陪於虎拜隘千二百嵗授策於萬斯年追五三六經大書不一而足立春日賀太上皇帝慶七十表頥神間燕揭舜德以繫民介夀永延齊堯年之在位建天序肇發生之日宜皇家疏寬大之恩凡在見聞咸均鼓舞竊惟仁沾夷夏本乎為天下得人世享治安孰不祝聖人使夀况乎躬撫中興之運茂凝退養之休綿寶策神授之祥受聖子日嚴之事從心不踰矩道承宣父之傳修身未嘗衰嵗過有熊之永在希有濶逢之令典見重熙纍洽之昌期恭惟道大莫名功成不有廣運而奄四海措俗妥安難老而雕三光自天保佑將八千春秋之未艾適五百甲子之甫周嘉與函生同瞻盛禮臣適拘守土徒切望雲奉漢殿之觴莫陪百執偕華封之祝倍激寸心賀髙宗皇帝慶八十表雞赦疏恩巳講號榮之奉玉巵稱慶旋當震夙之期俯偕率土之歡共上後天之禱恭惟道傳列聖統接百王謨烈光昭如文武之共處晨昏色養備曾閔之所難格天瑞之鼎來喜帝觴之屢舉神策錫羡介八袠之遐齡電樞屬辰衍萬年之洪算某屬兹守土徒切望雲以天下而養親身逢大舜祝聖人而使夀心慕華封夀皇聖帝加尊號賀皇帝表肅嚴鳳駕祗造親庭誕揭鴻名推尊聖德凡屬聽聞之數孰非鼓舞之深恭惟得道之傳奉親為恱六府三事大禹克承帝功五日一朝漢皇蓋有家法謂淵懿之妙欲推其盛然形容之際實强而名益隆無上之尊丕衍維祺之夀煥聫寶册前奉珠庭若帝之初蕆上儀而嗣講丕天之慶掩振古以無前臣服采使軺馳神魏闕想雲趨之列辟獨阻造廷偕葵向之斯民徒知擊壤賀夀皇聖帝受尊號表怡燕閒之神授聖有託受徽懿之號嫓天其尊亘今古以用光奄華夷而胥慶臣聞聖人所為不可以形容盡神心之妙亦難以稱謂求然人主事親之誠敢忘歸美而天下被化之久咸極推尊上所不得而辭禮之所謂至盛恭惟繼堯而治天德用寧咨禹之功已憂庸釋茂神聖簡寬之化奄帝王號名之隆古與徒亦天與徒夀必得則名必得煥成寶册祗奉慈廷疊矩重規侈慶源而未沫展采錯事揭丕則於無疆臣夢想中宸身縻外服覿丕天之盛舉莫預造庭同率土之含生第知擊壤賀皇太后箋禮奉未央親顔載說慶叢長樂母道益尊凡屬聽聞率同忭躍恭惟輔堯為治授舜承顔厯熙洽之期一嚴閫教佐揖遜之舉再定睿謀屬嗣皇極尊親之誠推顯號為隆古之冠展采錯事三宫均歡騰茂蜚英萬世彰信濬慶源於孫子逺暨雲來侈樂事於邦家益駢祉福賀夀成皇后箋明主奉親極推尊於聖德皇家衍慶實立本於坤儀揭熙號以嫓天見盛時之冠古恭惟承堯滋久輔舜無為措時三登繼紹興之至治儷聖一意承長樂之歡顔方嗣皇孝治之益隆宜慈極德名之兼懿雖天地之大不容繪畫然仁聖之妙庶或形容揚輝奮炎擅一時之盛事燕孫翼子垂萬世之洪休賀夀皇聖帝尊號表代石湖享承顔之養親付萬幾受賔實之名妙參三極中天叢慶率土均歡臣聞至人髙謝於聲稱妙道豈容於言議天地之運固不可繪畫索乾坤之象或亦以健順名况聖主奉親欲罄推尊之懿而慈皇體道兹當極治之餘仰鴻號之載熙宜上儀之丕蕆恭惟繼堯為治旋底三登咨禹畀疇式歌九叙凡授受相與一道而孝儉獨冠百王從姑汾四子之逰衍箕翼萬年之慶退藏於密合乎人固合乎天何事於仁得其名亦得其夀兹勤檢玉前奉凝旒駢祉福於一家掩風馨於二典臣縻身香火矯首雲霄想祕殿之班莫偕率舞追鈞天之夢徒有馳神賀皇帝表祗欵慈闈誕揚鴻號懋帝功之極盛擅美無前即聖德以強名推尊敢後邇遐雖異忭躍惟均恭惟繼統而興奉親為說九功惟敘克祗禹命之承一道所傳盡得舜心之正一遵勤儉庸守盈成謂親恩之大欲極於形容而天德之妙固難於摸擬兹嚴檢玉之奉用效運衡之窺益隆無上之尊丕顯盡倫之聖增光古昔叢慶朝家臣夢隔帝居身縻琳宇覿丕天之盛事莫預造庭同率土之含生第知擊壤賀太后箋上號名之隆親顔載穆衍邦家之慶母道益尊凡屬見聞率均抃蹈恭惟儼聖君而立極體坤德以廣生人法地地法天克全道妙堯傳舜舜傳禹一本睿謨方嗣皇極尊親之誠揭懿號為振古之冠蜚聲騰實顯盛德之形容正國自家襲丕天之祉福豈特掩典謨之巨美抑將示孫子之宏休賀夀成皇后箋明主尊親上儀載蕆慈闈叢慶懿號兼崇凡屬見聞均兹鼓舞恭惟嬪虞輔治咨禹懋功厯三朝一道之傳佐萬國重熙之盛坤順乾而載物迄底生成月承日以為明並稱臨照方嗣聖祗勤於孝治宜母慈同舉於號榮揚輝奮炎侈一時之盛事詒孫翼子垂萬世之宏休賀皇太后箋賔實之名尊親敢後自家而國積慶有源上儀肇舉於中宸盛事獨超於振古恭惟睿慈偶聖柔順應乾如月嫓日以麗天亶資合照暨禹嗣虞而繼統旋底阜民輔孝治於明君侈榮號於慈極尊獨推於無上夀益衍於維祺騰茂蜚英掩百王之景鑠重規疊矩示億載之宏休賀㑹慶聖節表夢日開祥撫千齡而接統後天效祝綿四海以傾心凡屬生成均知鼓舞恭惟聰明稽古信順尚賢離明善繼而皇圗底寧常久用亨而廣宇丕應罄小心而事帝挽回太和躬至養以尊親晏享多福惟有大德者得其夀蓋無能名而則之天旋屬虹流之辰茂膺川至之慶臣限拘持節阻簉奉觴竒齡之邁五龍欣逢聖旦率舞之同百獸儼近天威又里社鳴而啓聖震夙生辰葵心傾而向陽坤維仰德居匪遙於禹服祝請效於堯封恭惟稽古有為繼明而治資兼仁智動合祖宗孝孚華夷超冠今古武不殺而品物自遂刑幾措而一夫靡寃故言天有驗乎人而大德必得其夀適華渚流虹之旦馳寰區就日之誠臣雖近皇居屬兼漕節竒齡邁莊椿之上但頌延洪率舞同舜陛之前益勤夢寐又龍飛協慶肇臨載夙之辰鼇抃均歡共祝無疆之夀內外百辟古今一時恭惟見堯而知紹聖之治離重明而善繼乾行健以時乘寅奉兩宫躬曾閔所難之行增光列聖掩周漢而下之君無能名而則之天有大德者得其夀適届虹流之旦茂儲川至之休臣屬在驅馳倍多鼓舞受夫帝祉固知天子之萬年偕此民謳願效封人之三請又萬寶告成偶珍符於夢日九州丕應祝遐算於後天凡屬燾持孰非抃躍恭惟聰明齊聖信順尚賢厯數在躬祗承大禹之命天地合德紹隆虞舜之華色養奉兩宫之歡心傳探二聖之妙惟有德得其夀蓋言天驗諸人肇臨震夙之辰咸瀝誠忱之禱臣屬拘持節阻簉奉觴竒齡髙邁於五龍欣逢聖旦率舞願同於百獸儼在帝庭又祥開夢日方良月之就盈誠切望雲率後天而效祝千齡協運四海交歡恭惟陶鑄百王粃糠衆甫繼堯而治燁乎帝華之重咨禹之功畀以神器之大怡神而友造物釋負而置萬機蓋治身以道之真宜大德則夀必得華旦適逢於繞電遐齡茂介於增川臣秉節畿封馳誠魏闕偕千秋金鑑之獻猶阻造庭紀萬嵗嵩嶽之呼或能泚筆又推里社之鳴辰載逢於震夙效華封之請祝咸暨於坤維凡屬燾持孰非鼓舞恭惟聰明齊聖信順尚賢勳業五三六經之傳太和二十八載之久堯父禹子古謂無憂帝興王成躬示其法釋負置萬機之重褰裳從四子之逰蓋身佚樂則年彌延而仁滲漉者帝所佑信大德得其夀宜言天驗諸人適當電繞之期自衍嵩呼之算臣庇身祠宇矯首帝居奉萬嵗之玉觴莫窺盛禮上千秋之金鑑敢後羣工又渚流虹而啓聖良月就盈葵傾日以頌君後天難老一人有慶萬夀維祺恭惟協帝重華如周過厯躬神武而不殺掩帝王極盛之功得歡心而寧神盡曾閔難能之孝格天心之眷佑宜睿算以延洪適甲觀告祥之辰誠均夷夏罄華封使夀之請固等岡陵臣夢阻帝居身縻使節億齡滋永企瞻南極之星三舍匪遙尚逺長安之日賀明堂禮成表因時謹禮告成萬寶之秋配帝禋先毖祝九筵之室純誠昭格熙事備成恭惟統輯羣元參稽列聖圜丘薦灌殫精意以屢親重屋揭虔備縟儀而間舉復罄一純之報恪遵三嵗之規敢以宅憂而怠於靈承逮其竣事則受兹景貺星宿溉潤協氣泛浮乾坤清寧皇心娭豫翕羣靈而頽祉綿奕世以垂休臣持節畿封注心魏闕望侍祠之冠佩莫近清光偕擊壤之黔黎賡歌盛事賀正旦表千載題期膺璇穹之眷命三朝受籍罄海宇以來王載維嵗序之更端茂擁日新之純嘏凡居率土舉切望雲伏以參四大於域中地法天而天法道著五始於聖作正次王而王次春欽厯象以履端本中和而鼓衆庶方丕應百福惟新恭惟發政施仁承天從事慶綿慈極新唐堯在位之年祥著珍圗衍漢帝聞嵩之嵗適迓舒長之旦同躋仁夀之氓臣偶此令辰叨居外服奉玉觴而上夀徒傾就日之心考瑶厯以卜年願效後天之祝賀改元表函三體極繼聖治以匹休謂一為元端宸心而謹始凡居率土同切望雲恭惟乾健自强離明麗正龍樓問寢不違五日之朝瑶厯告祥申衍億年之慶惟視大始而正本宜和萬民而面王於昭繼志之勤用祀奉元之號揭兹正朔同彼車書臣忝與使華竊窺帝意謹持盈之治蕩耳目以一新大接統之稱暨華夷而四被謝賜厯日表御四時之氣肇自履端頒一札之書庸昭敦本布此劭農之政首諸持節之臣俯與民編仰孚德意恭惟寅恭事帝惻隱臨民管天地之覆持嘉生咸遂握隂陽之遞代元化曲成自璿璣玉衡之齊底攝提孟陬之正將嗣迎於豐嵗爰申錫於成書舉是含生孰非拜賜臣敢不驅馳原隰勸課農桑雖帝力之何知各安耕鑿俾田功之克謹仰副生成又課清臺之厯庸謹夏時頒太史之書旁周禹服凡王春之所被仰帝意以交孚恭惟彌綸兩間甄冶萬有神策錫羡介親夀以永延緯星儷明格天心之純佑上稽乾運欽授人時正躔離弦望之經節析因夷隩之事莫重履端之命俯咨共理之良臣敢不存問閭閻服勞阡陌政捐苛細庶息斯民愁歎之聲職布中和冀迎嗣嵗豐登之慶又襲堯之爵仰聖主之無為行夏之時劭農功而有叙一扎謹人時之授萬方何帝力之知恭惟厯數在躬天人助順隂陽寒暑璿璣玉衡之以齊震兊坎離攝提孟陬之既正躋斯民於盛富納品彚於中和臣敢不祗奉成書恪勤所職務農重榖少裨大君育物之仁薄征緩刑庶迎嗣嵗至和之氣又欽崇天道敬授人時課巧厯於清臺具嚴聖作分成書於方國庸劭農功肆令繡斧之臣仰識璿璣之政恭惟至誠贊化溥愛法天髙拱帝功之成深惟民事之重五辰坐撫厯數知在於舜躬一扎下馳正朔宜頒於漢殿雖聖意亮隂之際體璇穹生育之心臣敢不仰奉至仁率先羣吏政尚慈惠用安析因夷隩之民瑞迎豐登庶捐歎息愁恨之苦又奉一元而司契肅正夏時協五紀以成書均頒禹服凡分民寄仰識聖心恭惟挺德睿聰承天寅畏心勤民事謹夷析於秋春緒正皇猷嚴勸懲於舒慘究幅員豐富之效繄把握隂陽之功宜一札之所臨率九農之胥勸臣敢不體兹優渥奉以恪恭代庖而布郡條雖無補報載耜而宣上意庶竭罷駑謝太上皇帝清安降赦表親顔恱豫慶珍膳之復初帝澤尨鴻覃幅員而無外望堯雲於咫尺拜漢札之丁寧恭惟約已奉親重華繼聖勤顧復之念曾跬步之不忘調寒暖之宜在承顔而惟謹小乖宣節旋就寧康喜慈極復遂於含飴宜皇恩誕敷而宥罪伏況太上皇帝陛下德侔髙厚仁冒華夷有增二典之光丕享萬年之福方一人祗勤於色養惟疾之憂眷兩儀敷佑於皇躬何恙不已尋正周王之履從封楚府之錢無間邇遐均知鼓舞臣外持使節大識王言俯與編民效華封三祝之請更資汗簡紀嵩嶽萬嵗之呼謝明堂赦表九筵宗祀熙事迄成一札細書湛恩溥暨邇遐雖異鼓舞惟均竊以合宫班常實統和之所明主教孝昭事帝之誠雖天子必有尊惟聖人為能饗間郊而祀得禮之中均暨有生咸䝉大賚恭惟受天眷命酌古御時參華祖宗探妙經籍恪勤一意謹三嵗之揭虔並侑兩儀聫百神而腏食緝熙而懷多福斂用以錫庶民粵兹食土之毛舉被漏泉之澤三靈敷佑萬世無疆臣使事所縻帝居徒近執豆籩而奔走莫厠羣工之聫沐雨露之沾濡俯同一物之數進布表如天之覆外暨堯封厥篚之共庸羞楚産前件物出從荒陋製則單綀瘠土所宜謝女紅之纂組彞章有在瀝臣職之勤劬聖節進貢表祝聖主後天之算俯罄輿情舉海隅食土之毛無非帝力思效嵩呼之喜敢忘庭實之陳前件物珍育山川貢修淮海多儀及物見四方來賀之心申命用休衍萬嵗無疆之慶髙宗皇帝升遐慰皇帝表為天子父永作範於帝臨與造物逰忽乘雲而仙去普天之下局地靡遑恭惟道貫兩儀恩覃萬宇奄違鳳闕之奉空切龍胡之悲恭惟妙得心傳愛隆膝下遽隔承寧之養可勝哀毁之情仰兾睿衷俯遵禮節少思順變領臣鄰寬譬之言惟用解憂慰聖母摧傷之意慰皇太后箋祲纒慈極哀結中闈凡屬生成孰非摧慕大行皇帝陛下業光列聖仁浸中區萬嵗為期養歘捐於興慶百身何贖攀徒切於鼎湖恭惟協贊帝功翊扶皇運方聖嗣抱永違之痛宜母慈寬臨感之悲少慰臣民用安宗社慰皇太子箋享天下之養方迓寧康悼仙逰之遙偶兹變故遐邇雖間糜殞可勝大行太上皇帝陛下執古御今以堯授舜祉福施於孫子勳業光於祖宗奄違鶴禁之朝惟極龍胡之慕恭惟任隆主鬯誠切奉親方聖主哀摧滋甚天傾之感宜睿情寬譬益勤日致之思豈徒順變以節斯是曰寧神之大者慰皇后箋慈極永違悼天傾而地坼含生結戀紛雨泣以雲悲閫政所孚睿情罙篤大行太上皇帝至誠贊化懿範宜家三紀題期修身可以治國九齡朕夢厭世去而上仙摧慕之深邇遐無間恭惟協成兩宫之教祗贊五日之朝奄隔承寧益深哀毁仰冀奉先而思孝少答民情無如順變以節哀用寬帝念祔廟慰皇帝表禮終襄事孝重寧神廟室有嚴仙游來燕凡在生成之數可勝號慕之情恭惟親受堯傳益深舜慕助因山之禮川嶽效符奠在天之靈羮墻注目事髙振古誠格寰區冀寬天性之悲摧用慰坤慈之眷屬慰皇太后箋定不祧之禮參對三靈申罔極之恩儀刑萬葉凡居覆幬同極悲摧恭惟儷德皇居協成聖治悼仙遊之忽逺瞻廟貌之儼存送終有加率禮不越伏願抑攀號之至性計詒燕之永圗上寬聖心俯慰天下慰皇后箋陵園毖固廟室崇成孝孰大於寧神禮用嚴於追逺恭惟密佐龍樓之養忽抱鼎湖之悲協贊聖心掃易月之舊制參稽祖武燕在天之威靈千祀流芳二儀薦社伏冀承寧天故寬譬皇躬仰用慰於坤慈俯亦安於海宇祔廟慰皇帝表襄事迄成寧神惟重爰考不祧之禮用昭罔缺之謨攀戀之深邇遐所共恭惟繼堯守位如舜慕親奉弓劍於橋山悲纒穹壤儼衣冠於新廟日對羮墻垂顯懿於無窮嚴繼承之有永冀思付託少節哀摧式遵遺誥之言仰慰東朝之眷小祥慰皇帝表慈極上賔痛無甚者天時已駛祥則廓然想淵抱之纒悲暨海隅而揮涕恭惟繼堯守位如舜慕親自驚興慶之違緬想鼎湖之隔思萬物莫為之報備竭孝誠謂三年乃免於懷力行古制事光今昔哀動華夷當春秋炎涼之已周宜霜露悽愴之增感願思託付少抑悲摧小祥慰皇太后箋慈闈棄養天運如流望隔鼎湖悲纒長樂恭惟早偕多難同建中興方期萬年耆艾之祥遽有一旦幽明之隔藏稽山之弓劒徒想仙游閲漢厯之春秋已周星嵗霜露之感君臣所同尊矧極於母臨哀有聞於天至願寬聖念少慰輿情小祥慰皇后箋聖主謹終力行古制天時遄運俄閲嵗周誠感寰區悲纒中禁恭惟肇偶龍飛之運久承鳳闕之顔斯萬年參興慶之朝遽一旦有鼎湖之痛屬兹祥制罙切睿情冀有以寬聖主之哀思所以慰天下之望小祥慰皇帝表聖君慕親豈哀摧之庸釋玉厯紀叙適寒燠之已周普天之涯蹐地莫處恭惟羮墻在念衰絰以居貫兩儀而與通行百代之既絶盡謹終追逺之義聖者能之推節哀順變之規期巳逺矣願思託付之重少寬悲毁之懷小祥慰皇太后箋仙游寖逺星嵗忽周痛結東朝悲纒率土恭惟作配上聖收功中興含飴九重當聖子躬問安之養乘雲一旦屬慈皇有厭世之心兹厯春秋之更宜深霜露之感冀寬摧慕以迪夀康小祥慰皇后箋頃自慈皇窅然厭代蠢兹率土摧若無生甫臨祥制之期益切坤儀之痛恭惟輔成聖治偕罄孝思躬服衰粗行古者三年之制感深霜露厯星躔二氣之同可無寬譬於皇情庶以慰安於聖母小祥慰皇帝表仰慈極之仙游邈焉寖逺稽攝提之嵗叙倐爾既周哀切中宸感深率土恭惟慕親之篤亘古莫儔受精微之傳揭為聖治念鞠育之厚備極孝思心注羮墻體安苫塊德通天地誠動華夷方祥制之甫臨計皇情之彌切願寬聖性遵節哀順變之文庶奉母慈盡謹終追逺之義小祥慰皇太后箋海宇天傾慈皇仙去期云已久哀則有餘恭惟蚤擅媧皇之功光輔文考之治謂綿億齡之夀同享五日之朝祲遽結於橋山感益深於興慶甫兹祥制倍切皇情冀抑哀摧仰以遵遺誥之訓用精調御庶少寬嗣聖之心小祥慰皇后箋聖主慕親之切亘古窮今海宇感化之深局天蹐地矧惟坤德罙極睿情恭惟順事慈皇周旋聖孝屬兹一旦仙馭為帝鄉之遊胡不萬年褘衣陪鳳闕之養期雖已久哀則未忘願抑至情式遵中制髙宗大祥起居皇帝表代石湖酌祖有臨尚兹遏密奉親為恱可後燕怡再更祥制之期倍極皇情之感恭惟受舜之託見堯而知法度用彰彌切羮墻之念嵗時亟易自興霜露之懷然禮本稱情孝當養志願儲祉福仰寬三宫追慕之情用億神人俯慰四海勤劬之望髙宗大祥起居皇后箋服堯結戀彌惻皇心承舜解憂率資隂教禮無違者祥則擴然恭惟儷聖膺圗自家刑國共底天民之阜孰非祖武之繩弓劍已藏攀龍胡而寖逺羮墻如在悵駒隙之莫留倐臨再期冀襲多祉庶裨養志之孝以燕在天之靈髙宗大祥起居皇太后箋太上神遊彌切羮墻之念慈闈淵抱每興霜露之懷奄届祥除益深摧慕恭惟補天立極嫓聖膺圗輔三紀之垂裳靖四方而按堵仰橋山之結戀望斷龍胡悼羲馭之迅遷感深駒隙情則痛甚時方廓然願抑悲摧調珍膳玉食之御益迎夀祉慰聖子神孫之心髙宗大祥起居夀皇聖帝表堯喪躬服舜慕日深悼天運之巳遄倐祥除之甫暨緬惟注想尤極增悲恭惟聰明憲天仁智冠古起積弊之俗處縗粗者三年盡大孝於親立標準於萬世竊思痛甚之念未憗廓然之時願寬攀摧益厚宣節仰順慈幄含飴之適俯安聖君問寢之心髙宗大祥起居夀成皇后箋服堯之喪莫攀仙馭輔舜之孝允屬坤儀倐祥制之甫臨計哀悰之彌切恭惟克躬婦道合德聖心方慈皇奉親茂揚彤管之教適太上厭世悵然白雲之乘輔行三載之粗縗共示百王之檢柙劇神遊逺矣之痛適淵抱廓然之時冀抑悲摧慰聖心之養志益思寬譬奉長樂以含飴髙宗大祥慰皇帝表四海纒悲服堯喪而甫既九重養志體舜慕以未忘逮此祥除可勝淵抱恭惟配天與合繩祖有臨孝理冠於百王道原得於三聖治而繼治坐臻法度之彰嚬有為嚬益注羮墻之念方慈極畢縗粗之制宜聖君進寬譬之言閲駒隙之光感暑寒於天運問龍樓之寢叢福慶於皇家慰皇后箋燕髙廟之神百靈薦敬畢堯喪之服三殿纒悲情則廓然禮無違者恭惟道尊儷極教始自家端有姒之儀刑輔成聖孝想橋山之弓劍易閲天時倐届祥除益深感慕冀迎祉福上解兩宫之顔永億神人俯偕四海之望正旦慰皇帝表親養奄違方宸衷之在疚天行已駛倐嵗叙之更端舉海宇以悲纒識君心之痛甚恭惟尊惟歸父契堯舜之相傳孝則動天雖曾閔而有愧五表始還於素幄三年躬服於粗衰簡䇿所無華夷胥感屬届元正之旦遐追五日之朝想惟至孝本於寧神而節哀所以順變俯安率土之望仰慰在天之靈慰皇帝正旦表龍髯莫攀凛聖情之在疚駒隙已駛倐嵗律之載新凡屬幬持可勝局蹐恭惟色養之謹超冠古今孝思之誠感格天地念萬物莫親恩之報而三年茹服舍之哀緬聞異域之傾心咸仰中天而稽首况暑寒之遞易凡燧火之幾更冀奉東朝之顔用承眷注勉遵先帝之訓少節悲摧起居皇太后箋更三聖之傳離明善繼極兩宫之奉坤德彌尊格宗社以儲休自閨門而叢慶恭惟德兼任姒教被家邦立極中興之初含飴纍洽之旦助揚神化人法地而法天密啓帝衷道傳舜而傳禹而况蘿圗增固蓂莢告祥塵外風光晏襲三靈之社壺中日月長稱萬夀之觴卒哭慰皇帝表祲纒慈極致養莫追痛結宸衷厯時斯久普天內外望日悲摧恭惟全大孝以奉親盡誠心而繼志茂隆聖德有增上古之光申介親齡宜衍萬年之福瞻興慶以如在悼鼎湖之莫攀亮隂方仰於不言成事俄聞於易祭伏願少裁戀慕之痛注念繼承之艱恪遵遺誥之言益思順變欽奉東朝之養庶用解憂發引慰皇帝表親闈棄養天運如流栁馭戒期倐驚緬邈楓宸永慕尤極悲摧恭惟心合帝王孝踰曾閔掃易月之陋念親德之難酬告因山之成悼仙游之益逺睿斷敻超於今古哀誠丕感於華夷伏望少抑至情俯循中道式慰東朝之眷是誠先帝之心冬節慰皇帝表養違親極莫追五日之朝候變天行倐届一陽之復眷流光之已駛仰淵抱以奚堪恭惟襲爵紹堯奉親如舜養志為大收帝王力行之功承顔不違盡曾閔難能之孝謂萬年勤鳳闕之事乃一旦抱龍胡之悲邇遐無間偕痛天傾代謝不停甫臨日至想宸衷不已之慕結親德罔極之思共願仰慰母慈俯矜民欲任大守重謀惟宗社之休順變節哀少寬霜露之感又親闈不待悼杞國之天傾嵗運已行書魯臺之日至悲纒淵抱痛極民區恭惟如舜紹堯傳心是道窮今亘古盡孝於家方勤興慶之朝遽紹鼎湖之祲報德罔極緬帝鄉白雲之遊流光不居甫陽氣黃宫之復共願納近臣之寬譬解慈極之悲摧力務寧神是為順變代趙提刑遺表雨露疏恩許還官政隂陽為冦莫究天年尚延屬纊之期少布戀軒之悃伏念臣受材么麼逢世休明䇿足仕塗素佩教忠之訓致身朝列昔䝉越次之知繼三把於州麾仍屢持於使節罷駑自力期上最於中天試用罔功偶逃刑於司敗氣衰得疢福過挺災思假息於清間用祈哀於洪造俞音賜可指里社以未前大數有終寧膏肓之容療將殞生於泉夜終結戀於聖時忍一死於須臾思片言之補報仰祈聽察俯鑒哀誠伏願力行帝王遴擇文武集和戎之福普暨華夷收偃伯之功用光今昔大孝念無窮之計慕親寬弗及之悲綏御至和演椿齡於西極寅羞備奉供綵戲於東朝儻天地之恩猶或聽之則螻蟻之願於斯畢矣江湖長翁集卷三十六
