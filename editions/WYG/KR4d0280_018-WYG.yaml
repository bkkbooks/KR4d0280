body:
  text: 江湖長翁集巻十八宋陳造撰七言絶句劉向二首江邊逐客楚宗卿諌數君疎命自輕可信後儒慙往哲輙將强聒議更生若將初節訂賢愚聖哲功名古亦無一代儒宗憂國意當年幾落偽金誅梁元帝二首慢藏已重阿琳憂君道平時况未優冀北羊腸各亡社浪言建業勝荆州中外誰非肉骨恩顒顒帝子亦王孫君王日握金銀筆忍署兵威極六門管仲二首棠潛俄正魯封圻施伯安翔稇載歸屍授夷吾寜復此君臣應愧始謀非平生勲業載成書脅制諸侯秪霸圗盍繼車攻奏嘉頌迄今璧帛簉東都孔明二首古今深忌忿為兵及霤師臣要力争白帝敗歸思孝直端知難抗魏元成搴蜀寜蠻走阿瞞功名繼此坐天慳平生囊括華夷䇿畏虎纔教見一斑東坡二首五載詩鳴卧雪堂暮年長嘯走南荒當時戲綵慈親側豈復陳編羡范滂髙文鯁論博艱危凜凜聲名百世垂得意王公莽枯冢誰令聖主想同時王逢原二首弱嵗文推一代豪諸公斂袵看顛毛天於屈宋應為地不放先生㒒命騷文章俯睨漢唐餘屬思深湛到古初正使玉樓須有記忍令銀筆嗣無書閲史六首百戰淮西僅奏功澶淵欲戰已平戎三紆相紱猶公道長為萊公羡晉公公安枯竹本何知摽表精忠解不私應笑神竒甘臭腐䜛鋒得意幾餘時樹威立敵秪商君俯仰欺誣莽更文何事君王自聰哲三槐五鼎買崩分帝惜人才幾手培誅鉏借作盗權媒更憐孫息追仇誤忍死龍荒首不回徐穉申屠晚見機當時張邴是先知冥鴻乆矣層霄上置網彌山漫爾為平時憤世謝王符更肯佯狂踵接輿須信有心端有累與君乘木用舟虗讀晉史二首司馬家兒轉首亡姦欺三葉是餘殃區區牛氏何闗汝覆面猶須淚滿床只知成濟犯乗輿劉石兇威更有餘狼顧魂靈應自反尚將鬼責怖公閭曹魏二首雎盱漢鼎漫心勞夢覺俄驚馬食槽馬漸天飛龍在井當塗能得幾時髙問卓諸公半虎狼魏旗四指不留藏老瞞清水如先死不必炎劉果後亡袁本初二首入門偶藉移韓馥健者何曽抗董公須信阿瞞人物論但言𤣥徳是英雄嬖孽朝兄主父囚女戎衘猾史蘇憂便教官渡交綏去二竪猶能亂冀州公孫述東来温詔枉丁寜隆少忠謀肯汝聆不待賔臚延馬援始知西帝偶人形隗囂諸父論情是至親若為見賣苟全身發崔寃魄旋無憾眼見君侯殺伯春馬援朱勃風標似可親文淵竟作白頭新平時輕侮知何事辨雪寃誣獨此人光武二首濟業何闗赤伏符王梁不拜未云疎君王幸郤東封請底事終身溺䜟書閉闗謝質保豐功建武規模見祖風宰輔駢誅非細故平章敢謂茂陵同髙祖二首未推壯邑賞平津已采先知赦奉春齊越淮南皆斧鑕單于遽指漢無人坐馘闗東扛鼎雄指呼奴𨽻走王公秪縁奪嫡中心慊反畏商山鶴髮翁和憙仁傑狂甥趂獵人頗能戴眼笑庭紳漢家退堡猶麻沸正復羞為女主臣相如二首中宵卒卒去臨卭賣酒壚邊混僦傭想見令君醒後意向人深悔謬為恭逸徳狂情頼補苴文君端合壻相如白頭曲裏殷勤意不愧先生諌獵書文帝君王儉徳本天然蕭相鳩營已造天不見千門并萬户露臺雖罷未為賢詠史二首暴楚狂秦席巻中謀臣戰將各言功端知四百綿炎祚秪屬商山秃鬢翁平側區分偶儷勻無階更復古真淳浪言此秘無前覩畢竟休文是罪人遊靈山二首髙人避俗水雲居客子偷閑簿領餘本自毗耶病居士不妨僧飯小躇蹰何年山股創禪房陵谷遷移不易量舊日中流小浮玉如今欲到秪褰裳早夏安石榴花猩血鮮凉荷髙葉碧田田鰣魚入市河豚罷已破江南打麥天滿地榆錢未掃除畫簷忽復燕將雛風窓夢破搔頭坐重課兒時讀了書偶題霧紅烟白忽横陳雨後風光望得新説似遊人須著便隂寒已破一分春題人家壁等是黄粱未熟時車塵馬足竟胡為山翁不起功名想足糓多田正自竒棲隠寺紫薇花二首深紅淺紫碎羅装竹樹隂中獨自芳巳伴白蓮羞逺供欵陪黄菊薦陶觴絳霞影裏一徜徉甚欲搜詩與發揚馬自虺隤塵染袂句中羞説紫㣲郎題趙秀才壁日日危亭凭曲欄幾山蒼翠擁烟鬟連朝䇿馬衝雲去盡是亭中望處山新林小憩見花二首白玉毬團青玉枝幽芳不恨見春遟酴醿過後榴花未管領風光更是誰畧得花邊一欠伸羅衫歸去滿緇塵鳴鳩乳燕空多思苦雨凄風不貸春贈相者二首人言龎艾可功名獨取臞儒子麽生槁項猶多吟擁鼻闕材同樗櫟將安用官帶笭箵亦漫為更欲品題人所棄君癡尤勝老夫癡次玩鞭亭小詩韻心事即今驚白髮世情從昔彀黄間竇家錦上四百字秪道藁砧山復山竊禄未辭官九品歸田止欠屋三間著書他日藏嵓穴或繼淮南大小山獻玉者三付身外與馬為二合田間亦知此足無人縛政恐有文移北山次林子長教授韻伯主或能尊九九餓𨽻恐復辦多多盤姍勃􅌥不快意鈆刀一割君謂何豫章材成七年後潢潦眼看三尺彊山翁坐閲刺天翼抱書亦耻崔嵬藏次張節推山字韻詩留其行足音肯到寂寥處風味要看樽俎間行役小休良不惡雷聲昨夜殷南山人瞻甫里歊埃外詩著蘇州伯仲間爽氣慿銷殘暑盡鈎窓不用對西山紅塵歎我奔馳乆空谷逢君夢寐間政使公榮可無飲風江驚浪湧銀山再次前韻三首粹學堂堂真有本𤣥談亹亹盡無間小回餘事入詩律句法還能逼后山老醜只宜嵓谷裏何人挈致俊賢間雖云章服裹叔夜尚有笭箵隨次山故人偶得一飯欵僻縣纔餘十畞間赤米白鹽君勿誚病夫官况等居山靈嵓道中二首過盡南山過北山幽花好鳥翠霏間滿前風物牽詩興可是平生馬上閑渉澗登山倦不勝松間敲户有人譍竹簾𤨏細爐烟直小作蒲團入定僧游隠静往反四首突兀南山萬仞青饜觀山頂白雲生今朝訪道五峯去却向白雲生處行烟樹雲生若有無行輿咿軋路盤紆小風弄雨晴還落身在龍眠水墨圗一隨俗駕走紅塵松竹生愁鶴怨人杯渡老師相悉否野僧心地宰官身夢覺篝燈曀曀明碧鷄啼罷欲三更定知山雨陣頭惡但怪瀑聲雷様鳴戲促黄簿雞粥約三首㣲吟仰屋耐調饑腹負將軍竟是誰側耳隣翁隔墻喚黄鷄粥熟是何時鵝䏑博嗔寜復計馬肝知味不須評老宜此輩充庖宰更問鑽籬與不鳴隻鷄可饜小人腹未羡侯家千足羊借問解黿食指動何如蒸鴨瓠壺香次韻黄簿先生不著恵文冠須信論才當價難法律剡章真未盡盍言粹學輩豪韓揮毫麗句得旁觀字字懸黎間木難可但詩聲髙海内有人金換過三韓贈趙丞四首老嬾無詩到雪梅僧窓駞坐撥萁灰朝來好語成快讀匕筯驚投不為雷君家鸞鏡照芙蓉笑我衣襦綻不縫想見後堂頽醉玉梁州按罷晚粧慵我衰但作一㕓計認古宣城為故鄉待得故人來作牧試吟打鴨起鴛鴦共約京都看早春棗騮緩踏軟紅塵要君彈壓湖山景莫惜新篇舉似人無題三首酒鴟車後無何飲易巻床頭脱復看豈謂浮生須此具世紛方解不相干才不時宜嬾治生學専信已一官輕只今尚友須千載獨惜時無尚子平居為耕叟出為官出處人將二致看朝市山林俱樂地却須神武掛衣冠臨澤寺留題乃予舊讀書處發冢詩書謾一官舊遊重到鬢毛斑塵埃可是山靈意不待文移始厚顔庚子冬望雪二首冬盡風霜只薄寒人將雨雪卜新年癡兒不問豐凶事但快茒簷炙背眠隴麥枯時雪意濃可堪新日已曈曨因循度臈無三白孤負明年飽二紅次韻郭教授雪二首霏霏透隙上承塵想見園林玉樹春明日銀杯隨寳馬城東應有探梅人世紛長作眼中塵酒力能回物外春清論挟霜詩映雪即今超俗頼斯人元夕遣懐二首陸海蓮開夜色鮮短檠燈下掩陳編風姨竟日鳴條罷月姊因誰得意圓平世計功須壯嵗異時敵已盡亨塗鬢鬚乆巳沾青女窮達何勞問紫姑書南柯太守曲後二首門前車馬競飛馳等是槐安未寐時何似阿憐歌此曲一巵隨分得伸眉竹葉舟前客念家慈雲甕裏事如麻而今不笑檀槐戰笑汝研桑了嵗華次韻諸公絶句時賡唱已成巨軸琳宇無塵夜色鮮露明叢菊月臨淵世間人境雙清處誦與西風更此編荆玉驪珠忽滿前未須攻石探濤淵南㠶自詫歸裝富凖擬重呼阿買編贈郭髙叔三首元宵作詞與太守陸子煥密寫寄營妓盖欲其備卒也戲贈髙叔䕶香深閤寫烏絲有底朱樓望得知與問天津倚欄客庸非青𤨏竊桃兒燕臺賦就尚緘囊已作新聲遶杏梁見説負山常夜半能言鸚鵡枉闗防翠扇紅牙淺黛愁梁塵飛下晚雲留貫珠未竟金杯側却欠周郎一轉頭游普向十首謁雨石解元得十詩隨得書之呈王仲衡尚書西湖西岸三百寺一一題名嗟未能他日誅茅追勝賞却尋詩版驗吾曽一老昻藏物外髙陳陳胷次盡龍韜功名未療湖山癖却著袈裟替戰袍青林果熟星宿爛修竹風来環佩鳴翠影扶疎僧宇静吟餘屋角見雲生虀鹽未必劣僧蔬塵裏光隂易破除他日摩肩霄漢上却須此室與藏書日冒風埃鬢脚黄歸懐絆驥可能忘誰知碧領蒼雲外占㫁人間五月凉寺壁龍蛇石刻新䕫州十絶典刑存鵝溪為巻湖山去擬與詩人到處論逺近僧垣共白雲蕭然不著世間塵朝参夜講庸何計野飯山棲已可人處士前身自水僊天教清句紀山川即今秋菊寒泉意雙鶴飛来若箇邊崇岡回首路縈盤夕照明邊小凭欄舡閤淺沙催客上玻璃影裏見長安行穿老檜千尋影歸受凉荷十里風從此勝游縈客夢夢隨黄鵠下雲空十絶句呈章茂深安撫雨餘凉氣曉風渢却愛朝陽一抹紅照影芙蕖天與逺可能猶恨打頭風忍饞留得可羮魚㣲沫相濡未就枯自解栁枝投渌水勞生與汝各江湖三傍清淮酹酒杯四年霜鬢犯風埃即今定被淮人笑又見衰翁禄遫来追尋名勝賸留年白首猶参五字禪寄語蜚亷亟回馭擬凌風去訪詩仙詩伯于今第一流清篇傳誦到鰲頭共推句法源流逺伯仲䕫州只楚州密受眉山一印傳斯文千載石林仙使君酷似牢之舅更喜鸞膠續此絃右史文章海倒流淮南異政古人儔親聞撫几推雙美獨向夫君放一頭楚城巉絶控窮邊楚俗傷弓未帖然一自并州煩李勣不聞貴買渡江舡里社過逢起醉眠行人魚稻不論錢欲知勸課功多少地覆黄雲逺接天經綸術業向来優千騎東方恐未儔他日應携報恩子還朝看拜富民侯村居二首五風十雨梅破夏三青兩黄麥欲秋山禽誶語野花笑瘦笻隨客下西疇巻書揩目小披襟睡起初便茗椀深一縷碧檀無與語坐窓閑看竹移隂謝三提幹召飲三首既往則妓車集一盃徑歸坐上紅衣未放歌客問冷靣釂金荷驚飛可待聞檀板擬奈吾家故事何賔筵笑語雜絲絃説到山翁更粲然衰鬢豈應粧面側陳編只合粉袍前不慣香風擁妓車分當清坐冷官衙歸来自笑殺風景却把茶甌對菊花謝兩知縣送鵝酒羊麵二首僧様齋厨冰様官饑慿脱粟食無單不因同里兼同姓肯念先生苜蓿盤麥生宜配卧沙羊鵝䏑仍便碧酒香陡覺今年好冬節朝来紅日為誰長次兩知縣韻四首老去棲遲八品官劍頥深悔誚田單東隣未省吟髭㫁笑擲牙牌命肉盤暴醉琳膄飽棧羊廵簷閑認小梅香胡床曝背闗情甚古錦囊詩引興長似我聱牙亦漫官倚君風義慰羇單開緘更識新詩法脱手銅丸轉玉盤政成無復敗羣羊萬軸書前一縷香明日過君况休務茶邊清話不妨長題椿桂堂四首為莫倅作日日髙堂笑臉新五株芳桂拱靈椿枝縈非霧根盤石共閲壺中不盡春靈椿移植自仙宫丹桂年年不辦供材薦明堂皆巨棟君家培殖富隂功蒙莊漫詫楚冥靈獨秀吾今陋郤生更笑田家紫荆樹每隨人意作枯榮鴈影聨翩上絳綃庭蘭再世更竒標義方可但燕山竇行跨當年八葉蕭次石湖送炭韻贈龔養正三首饑烏窘兎不謀身君亦衣穿桂作薪小露化工陶鑄手地爐分得雪中春廣文書案雪沾身竈婦冰葅焮濕薪綵勝銀花猶拜賜凍醅寒餅不成春立春日大雪是日國忌寒谷冰崖底著身望晨疑寢越王薪今年未辦廵簷笑急雪隂風肯貸春立春後雪寒特甚送鵪鴨腊龔養正二首龔以憂不作詩霜湖風草自徜徉夜網晨弦不易防作意分甘資一飽為撩清夢到江陽騷人茹粥耐支離過眼風光不到詩鄉味慇懃勸開肉未妨新句解人頥早春十絶呈石湖不是風寒即雨寒朝来春意破天慳恠君未解春皇意恐把韶華付等閑倐看媚白破梅枝更喜嬌黄著栁絲春事斬新當客眼可須山鳥報人知樹外晴雲不擬飛東風無力愜單衣垂楊院宇斜陽裏還是鈎簾待燕歸中林頻度養花風合放林梢一㸃紅蝴蝶與春偏有約依依先占去年叢杏羞桃澁要詩催客子情鍾倍費才惜欠王家千杖鼓輥雷聲裏看花開未須看竹扣人門且復尋梅過水村香片㸃衣歸馬健臨風只博斷吟魂虎邱僧宇瞰坡陁幾許香軿載酒過遊子花驄烟外駐麗人塵韈水邉多緩引牙檣載綺羅寛圍絲錦著笙歌小擡醉眼遊絲外夕照衘城奈樂何鴟夷古錦犢車轅盤薄沙鷗舞蝶前少日長安聚蚊夢莫年詩酒解隨縁館娃宫外趂遊人不見湖山自在春聞道石湖清絶處芳時不著綺羅塵題溪橋雪月圗雪野無人訪夜䦨冰壺絶景畫中看橋邉覺欠梅枝在姑射嫦娥各耐寒題髙縉之劍室二首髙郎櫑具映峨冠沈燎茶鐺一室安遊刃聖經千載計即今長鋏未須彈皇家威徳憺遐荒何物樓蘭尚頡頏想見詩人欹枕處雲霄中夜有光芒題龔養正孩兒枕屏二首養正方若少子小屏光潔雪難如寫出嬉然同隊魚索句擁書皆薄相笑啼嗔喜莫憐渠眼中何止舞雩童况是君家積慶重夢裏送来煩孔釋要令門户繼荀龍次韻答陳夢錫十首古人存心屹底柱巻舒晦明付時行蕞爾之身函天地政可蠛蠓睨功名吾宗石友讀書眼可但於易鈎其深日来弄筆課七字萬象犇忙供醉吟向来應俗用古學我亦未悔金注昏伍胥宰嚭各腐滓呉歈越吟誰誦寃巨室熒煌萬金産小家經營一簪餘克庸盟隨制挺足更用荆尸来擣虗姜子嗜酒不良行諸公俛顧慙登瀛尚堪堅坐作周鼎底用詩名滿鳯城冰檗未肯執名卿搔頭自剔書窓燈君家老人如椽筆淛江鄞水倒泓澄九重聖孝絶今古矞雲麗晝南山髙臺閤不無補衮手付我五畆耘艾蒿諸儒峨冠每捫舌四肢非骨寜自強即今可言尚十八直須坐治開明堂續經發冢古今病未容灼膚防瘡疣决知蕭蘭異根葉始議溟渤包衆流詩人鋒鋩不可觸瞢攬鯨牙撩虎鬚飛来此編更作意詩行快對䕫州圗次韻呉守四首時上冡得呉詩招賞牡丹十日隂寒此日晴歸来趂賞大花春主家千斛香泉碧却自摩挱漉酒巾園林落粉吹香雪魏紫姚黄獨歩春明日挿花同一醉小閑譚麈岸綸巾莫管龍公嬾放晴主賔笑語自生春不妨妃子天香靣滿壓林宗折角巾是日以雨行當日謫仙隨鳯詔毫端寫出禁園春沉香亭北人沉醉誤認龍香在領巾謝劉提幹墨竹見遺二首王孫筆自徐州𣲖戲為詩翁寫渭川眼底疎枝欹密葉静含寒雨暝蒼烟龍孫裊裊初辭籜鳯尾娟娟擬受風疎影向人翩欲舞夢殘依約月庭空劉有詩再次韻四首小㸃猩毫出碧鮮技隨文思各増川秪應月地饒槃礴心醉寒梢曳曉煙已後湖州秃鬢翁喜君揮掃有遺風幻成殢雨熹晴態盡使塵凡一洗空此君髙韻已蕭然更向新詩得媚川誰遣小家藏二本為君時炷水沉煙耐暑支離倚瘦笻百金未博一襟風了知詩有蠲痾力絶勝江濤捲碧空題畢直閤繙經圖三首凝碧有詩纔逭死青巖不語竟何禆先生著論胡塵底未覺丘明見仲尼伯圖無繼昧尊王獨抱殘經析渺茫地下威文應吐氣人間宋李解升堂中原正朔合天王細讀遺書癭作囊老子披圖揩病眼為公重炷石爐香循資趙宰有賀詩次韻三首宦塗跛鼈陵坡上學舎寒蟬飲露清蹩躠强顔纔跬歩不應天驥與論程蒿帛入門無㡬潤妻孥食粥有餘清文林則添減如此輕肥騰趠非吾願矻矻雌黄且課程反唇餘子輕𤣥白屬目耆儒上紫清老境我甘追汗漫明時君合訂章程都下春日煙林紅翠已班班雨後春工不暇慳付與笙簫三萬指平分綵舫䀨湖山次韻答趙文卿四首才名一世未通班天向詩人每坐慳不作上書来北闕可無擕妓醉東山平日詩聲不易班聨翩屬我未應慳得無紙貴咸陽市當有人逢飯顆山小燕招邀慰病顔何曽雨澁與風慳分明喜鵲先知得未曉飛鳴閙屋山簾疎財許客窺班未得纒頭小破慳已結雲愁蜚蝶夢莫斜秋水蹙春山次韻袁憲勞軍許浦中路冰合二首風聲雪意恣馮陵更挾霜華夜氣凝水伯䕶河銀作板欲留公闘玉壺冰細讀清詩擬泣岐問津平日㡬河湄只今西去須遵陸平地風波恐更危予亦阻冰常州次韻袁憲打冰移舟三首倚柂扶篙待打冰回思鷁首潄波聲定知行止非人計料理詩愁喚麴生留滯何曽念奮飛君恩已布得徐歸賢勞肯羨膏粱子醉眼瞢騰坐妓圍東行定見野橋梅望望花隨驛使来曽約南枝春信否急煩好句與催開贈何符山人二首小詩落紙粲春葩傳遍侯家與主家未恠東来将隻影十年囊筆飯京華冷看俗態詼謿裏緩閲年光醉夢間想得酒瓢詩巻外此生無物更相闗趙介卿見簡解謿二首複閤朱樓繡箔褰蕙蘭風處各嬋娟詩翁它日揚州夢回施京華美少年酒家舊識元真子街吏嘗隨杜牧之回首昔遊堪一笑暮年茶果秪僧期寓吳門十首張監留居平江率趙守袁憲月助桂玉費作一寒驅去還千禄萬慮紛然秪愛山閲世怳如清夢覺求田聊計白頭閑官卑責薄得徜徉漫仕歸来味更長它日故人多好事龍鷄載酒未吾忘諸公念我閑無食粟繼輿臺扣户頻眼底梅花還索笑酒腸詩膽已輪囷溪翁園客問何如可諱浮生百計疎不憚典衣規得酒長因乞米衒能書向来勇䇿著書勲一刻曽将白璧論老去光隂都不惜静看烏兎役朝昏興䦨猛輟凌江棹重看鶯花茂苑春歸自乗流留亦好浙風淮俗總宜人日日煙林野市間路人應作老狂看排門賞竹寧辭罵踏雪尋梅苦耐寒稚子浪憂陶令老山妻終譽仲卿賢虎頭試寫經行處龍具寧甘未死前禹益咨俞儼紫庭藩星仍映使星明鄙夫少日三千牘盡付詩情寫治平平時觴詠妨生理此去狂疎託上官但使推敲貸衝節不煩排日報平安次韻張丞官上絶無歌酒樂堆豗了事孰非癡開樽良省纒頭費却有新章贈雪兒是日仇香出寵不費而歡洽有小曲之傳次張丞送菊韻二首時已十一月粉身免泛杯中物並駕容陪隴首花況耐嵗寒雙榦在周旋三益羨君家寒花彭澤門䦨舊好句柯山伯仲問貧負清樽只三益詩人錯笑庾郎慳紹熙壬子勸耕妙勝四首縣曹文墨厭拘纒野飯山行舊所便秪道窮塗難措足朝来風日為誰妍每愧敲榜辦賦租㑹心還喜勸耕初渠儂嗣饗金穰慶老子長捐柱後書勝日乗閑覺半仙笑摩老眼向風煙平章春事禽能語媚嫵韶光栁未眠桑條麥隴接比鄰社酒家炊丐路人風俗尚如它日否慿誰細問故園春浄居勸農三首妙勝庭前折小梅浄居門外躡枯苔日煩禪老羞茶供親與田翁把酒杯今年春計定何如説道家家甔石餘滿意為翁開笑口老夫心事秪耕鋤簿書堆裏得抽身梅栁風前觸眼新報答好春還著語今朝猶喜是閑人次韻王統制喜雨公餘競病揮詩筆誰似風流老伏波對雨肯来同把酒當令阿素為君歌示阿㤗三首孥累登招寳獨留守舎既歸小詩付之曽倚新晴望海天天容海色湛相鮮奩中遥㸃羣鴉影萬舶千艘忽過前官上依然四壁空訟庭人寂每從容看家不為穿窬計老去登臨分外慵老稚懸知樂有餘迎門先問小於莵風煙滿眼山環海對酒還曽斵句無次王廵檢韻三首王得予詩鋟之木搯腎搜腸不自竒細模深刻似非宜流傳縱便鷄林售指擿防遭鵝腿嗤平生嘿識玩詩昌對客揮毫底未忘秪恐韓陵讀碑客誚君草草誚吾狂每愧銅盤走柘丸忽驚檀軸巻絲闌真成敝帚千金享笑喚諸雛掛壁看朱倅索詩作三絶謝之因循不試推敲手日月消磨簿領問舊故書来盡新作窮兒劵負㡬時還多謝詩翁肯唱于挑燈泚筆復踟蹰龍文虎脊渠皆有鶴膝蜂腰我未除從公揮掃且觀傍免費雕鐫苦腎腸血指忍慚嗟已老怒矊相向更深防瑞巖寺三首嶺岫周圍罅縫無勝流三百鏁冰壺客来誤作囚山想猛憶門前自坦塗横前石廩疑無地歩入蓮宫别有天説道三山環弱水不應回首羨巢仙巳到平生未到山朝来白水漲田間要須樂事成三絶更倩詩翁露一斑再次韻三首得君清句我愁無不惜長哦缺唾壺句法森嚴誰到此了知島可但中塗俗塵我亦憐多病道價師今重五天投老鼎山追舊約未妨林壑着臞仙寺主作庵鼎山云連朝飛雨暗羣山局歩修廊廣霤間㑹作閑人留十日當令屐齒遍苔班喜雨二首永寧開善皆留宿夢破階除急雨傾人道行車定膏澤我知龍伯念春耕招寳山鄰娑竭宫縣峰仍接補陁峰晴晴雨雨皆如響謬挹池鰻拜土龍定海甲寅口號七首長官清苦舊傳聞檢放秋苖近四分畢竟不緣胥吏手旱頭科斂枉紛紜田租有約不相違比着豐年數已虧一飽分明郎首賜㡬曽刺口問抽卑已抄口數報隅官嵗後朝餔定不難且願眼前彊健在趂坊討海過冬寒水泛溝塍意欲饜凌晨還復雨亷纎早秧未頷其感切猶須挿晚榖無多不更㘱直亷切父子分頭上海船今年海熟勝常年官中可但追呼少不質田輸折米錢鄰家兩兩捉春歸笑語相過復嘆咨共説􅄓頭前夜作㡬人莆網罣流尸連宵飛雨喜滂流已入梅天過麥秋二十年前如此晩金城地抱却全收謝張徳恭送糟蚶三首徳恭師文友也舊箋蟲介甘温性樽爼風流每䇿勲況復餔糟小酲後眼中羣品此其君壓倒淤泥白蓮藕半捐介甲露穠纎玉川水厄那知此急具薑葱喚阿添誰與江􅠪角長雄一時風味兩無同吾兒不友王文度底肯分甘及乃公再次前韻三首春事兼回寂寞濵茅簷背日已書勲徑須引睡攜黄妳未辦尋芳命紫君連夜愁隂苦戒嚴雪将寒雨闘㢘纎老人凍餓人情斷米價何如酒價添茗甌對客乳花濃静聽揮犀發異同度臘迎春如此過不知人世有王公張守送羊羔酒将以三絶次韻答之生嘗跪乳資名教死去遺芳謚碧香洗盞開嘗吾未敢稱寃肯入菜羮腸俗云秀才食羊踏破菜園小槽清凝帶羶香釀法知非羸角羊拜賜未辭乾講舌呼兒留得薦蒸嘗甕中别作一家春羒羜㣲生得效珎少貸陶家煎雪水更論徐邈對賢人郡齋鶴飛来作三詩還之倒頬翹然望四遐芝田懸圃不應賖僊僊飛傍茒茨下誤認西湖處士家不知蝸舎安卑陋何似侯家效羽儀千字罷賡明逺賦一詩聊送佐卿歸君家矯矯乗軒骨聞道今成趙璧回却擬黄堂掣鈴問夜光論斗㡬時来守許以詩贖張守有和章復次韻三首一骨萬金知未惬五雲七字不妨賖此翁久斷揚州夢徑付凝香舊主家接翼鴻冥聊爾爾大書麟獲更儀儀雄邉仙伯横琴處應道蘇耽興盡歸雄邉臺名閑舒側理題長句漫與胎仙紀往回花徑宿鶯樓着燕因思如願賦歸来再次羊羔酒韻三首元放諸孫憐遽許截肪醉骨薦馨香茂先九醖猶須問自是詩翁石作腸萊子杯盤别様香春浮親面日相羊老夫底幸霑餘瀝却笑無魚客孟嘗他時阿奮辭髯簿来作東風席上珎安得方平鞭亂石百觚陸續丐吾人再次還鶴韻三首朅来室邇念人遐回首青田㡬許賖飛去定驚魚蕩水跫然今似客還家啅鵲却陪新飲啄啼猿儼識舊容儀可須辯士誑荆楚似喜逐臣還秭歸人家往往琴堪劈誰定如翁肯放回他日飈輪駟修翮衘恩當復誓雲来題項處士山堂二首一庵小憩俗問勞月牖風軒俯鳥巢我亦青衫倦遊者羨君先辦盖頭茅久安楚俗眠雲屋又向吳儂倒藥囊出處無心俱樂地世問何處不山堂江湖長翁集巻十八
