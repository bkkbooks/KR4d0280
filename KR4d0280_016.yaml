body:
  text: 江湖長翁集卷十六宋陳造撰七言律詩次韻楊宰食蓮戲作平時蓮實吾羊棗日飫甘寒不自疑病恐傷生嚴食事居多節口甚嬰兒舌融沆瀣詩能說手掬珠璣我屬思對酒移風勞想像靜看千柄泛前池再次韻詩到衰翁耐病時辟渠三舍更何疑才髙王儉幕中雋氣懾孫郎帳下兒向我論交得無意他時懷舊更長思蓮莖把玩不為腹羡殺逢人飲上池次兒輩戲商卿設醴韻二首水豢山膚自土宜况邀從事到青齊賔筵大嚼寧虛口竈婦深顰想噬臍爛醉豈無醒酒鱠明朝重閲不鳴雞扶頭更憶松江曉旋買鱸魚薤搗虀將命長鬚腳未移聮翩客馬已來齊菊花旋採浮雲液羅幕寬圍護麝臍醉裏有詩皆虎鳯區中無物不蟲雞主賔等是龍津客未分金鱗卧瓮虀再贈澤卿商卿道舊三首一昨西風散馬蹄肯如接淅去東齊人家炊玉香馥鼻禾壠如雲髙過臍飲雋不無驚渴虎醉歸同約候鳴雞二卿好客家聲在遮莫茅柴薦韭虀隆汚非是莫端倪瞢蹈觴深試汨齊荆璞笑渠忘衛足塢金何䇿贖然臍悠悠塞上悲亡馬斷斷尸鄉業養雞可是世紛吾屑去平生結習晚吹虀過眼紛紛更問為幽人生死况能齊海桑恐礙日車轍宸極劣為天磨臍臧榖君方墮書蠧研桑我亦笑醯雞晚知戰勝輕千乘悔厭晨鹽與暮虀九日登神居留題行行十刻冒風沙驟喜深堂放馬撾旋報隂雲漏紅日共追佳節把黃花多煩沽酒留元亮莫漫移文調孟嘉未竟笑談人已醉簷棲片月欲翻鴉傅商卿借鵝吾家水豢慣秋春榖飼欄栖又一新友義何須換鵝帖鄰墻防有嗾􅋙人眠沙泛渚期它日問俗充庖戒未仁酬我質劑當倍稱學書還復慰清真次韻謝陳守伯固投老登龍借齒牙可能病驥待揮撾清篇久矣窺修月谹論琅然聽粲花小却御屏書姓字行當宣室拜亨嘉恩章衮衮從天下濃墨疏行砌亂鴉贈傅商卿商卿以豫憂患冒雨相訪詩謝之殘年多病更銜哀今日衰懷得好開聞道場功因雨止徑緣老子犯寒來下簾小熾萁爐火煨芋聊持藥玉杯翻憶黃公酒壚夜略無憂患嬈靈臺夜宿商卿家復用撾字韻萑蒲無警南塘靜歉嵗村謳鼓罷檛更喜良宵共談麈幾煩親手剪燈花酌無多酒仍餘味懶不吟詩政自嘉蝶夢蘧蘧才一霎鄰雞啼罷又啼鴉述懷有作青奴白牯共幽情鷺隻鷗雙自舊盟家視子平如已死世嗤張翰不求名馬牛見命從浮俗螟螺觀傍得此生千載淵明吾易地心期端有不容聲贈實老神居禪翁訪子于華村用舊遊壁問詩韻贈之幾時風色不飛沙再遣齊魚為客檛塵裏槐安空夢境眼中優鉢忽天花𤣥談正用蠲憂患白飯胡寧當㫖嘉南去路貧同一笑不憂攫肉有飛鴉時豫不將行李次韻答龔澤卿君如緑耳抹流沙躞蹀追風不待撾綴葺曽童楚山竹燕遊行插曲江花久煩鳯詔搜竒逸定復龍光疊寵嘉叱咤即今凌筆陳坐令楚幕集歸鴉晚飯商卿家用土山韻我似長松久卧沙迄今諌鼓夢猶撾倚消愁斛人如玉欲近書籖眼有花投老無庸尚强聒過君每肯具柔嘉婪酣得飽行摩腹不省饑號有莫鴉次韻答楊宰民情可但絶愁嗟吏畏誰何等受撾教諭久知風偃草山行聊賦雪飛花牛刀試用終稱屈鳯詔緘春定拜嘉穩上要津吾拭目角犀冰峙鬢如鴉次韻楊宰宿北阿寒事峥嶸念解攜芳樽憶共拆紅泥郵筒空有詩相續夫子東歸我復西刺刺掀林朔風駛沈沈閣雪晚雲低巴歌擬報陽春贈未敢從人索品題次韻楊宰令君輿馬俱倦有詩豫亦寂居荒僻因次韻君方總轡冒塵沙我亦青燈未著花縣宰憂民暇黔突道人有飯即為家倦溫村釀萁火暗笑撚吟髭風帽斜等有灞陵橋上興不妨頻著小詩誇次韻楊宰姚法曹可人也官滿去民惜之君與豫尤惜之然池蛟籠鵠君與姚豈宜久淹者因次宰君詩韻我方獺髓療蜂腰渠自才華蓋代豪州掾聊容養文豹玉音催去踏金鼇聮芳君亦花封最雙峙人推玉筍高看即提衡霄漢上得無交口話啼號次韻楊宰遊神居峯頂留雲一鷲騫山腰涵碧老蛟蟠鵾鵬翻海十洲近江漢分流三楚寬曽是乘間上埃靄小留舒嘯倚高寒想君緩憩雙鳬舄不羡冲霄吳綵鸞次韻楊宰二首早緣官事坐兒癡晚悟騷人賦汨泥耐病久間金騕裊扶衰時近玉東西詞場尚友心終在詩力逢君價自低欲試成風須妙質莫懷章甫問雕題五斗寧辭小折腰簿書那久困才豪得無貍豹驚雕虎妙有鉤絲掣巨鼇詩就鼎來宫錦賜間中眼與楚雲髙橫陳景物無央數付子秋崖萬竅號次韻楊宰野步眼邊室邇歎人遐再見驚飈衮雪花嵗歉民勞真諉子泥行草宿又誰家題詩山寺神應助問俗村區日易斜隨處棠隂誦遺愛他年賸著翠珉誇再次楊宰遊土山韻述房陵昔遊志公巖頂雲縈繞羅漢洞前山鬱盤鯀禹鐫鑱那用許乾坤包納若為寬我行六月猶春服誰遣千巖起暮寒思與三花古仙伯往還遊戲轡青鸞三朵花仙人也隱于房陵市井都畫像敬之且像于志公巖東坡有詩畫圗欲識先生面試問房陵好事家次韻張守塗中生日豫生日皆客中凡四年感漂泊諸雛稱夀紀桑蓬此㑹頻年客路逢撫事祗令傷急景持杯隨分發衰容心緣羇旅長多遻情為思親政復鍾更惜齊眉舊蘭友今春觴詠斷相從次韻張守妻閔忌豫亦有悼亡之戚萊妻魂逝不容招敢問何方處寂寥老去更堪聽薤露病來久不近金蕉聲搖夜夢蛩相弔垢翳篝衣雨輒潮細讀君詩重悽惋隱侯膚骨不勝銷次韻張守曉起客亭移枕待殘更起趂鄰雞第二聲了了每添新悟解營營無復舊心情興來命酒禁詩瘦老去衰容怯鏡明况是杏花濃露曉不應蒙被問春晴正月十六夜大雪次張守諸公韻二首陽闔隂開意莫窮東君衒巧似良工紅蓮熄焰人收市丹杏開時雪滚風韻語真宜詠飛絮短歌當有頌元豐一畨壯觀俄漂忽已落詩人卷軸中詩款鈴齊到即通細工時肯博粗工政聲已獨當時步人士飫觀前輩風未分清新命開府可能簡逺盡安豐談間和氣熏人醉不覺栖栖客路中次韻王簽判二首客中誰者伴間身秪有蒼槐與翠筠回首昔遊驚夢斷故人重見倍情親簿書簡省官居好月露清圎句語新千里相思匪天意聚頭一笑此何因五鬼侵陵兩鬢蒼振窮掃白分無妨酒徒叢裏投名懶詩社中間趂課忙塵暗鳯笙空自歎風驚鴈字不能行因君草草追強韻政復通人笑楚狂豫重見有兄服贈吳子隆小飲俯江樓分韻子隆得遲字借其韻贈之詩到吳侯信崛竒汗顔飛動可容追小揮夢裏五色筆吟作人間黃絹辭滿耳龍鸞嘯空曠驚人雨雹散雷捶相如氣壓鄒枚倒未覺樽前運思遲次韻張德恭主簿二首一日乘間燕畫樓連宵飛夢只樓頭掾郎談麈驚飛雹公子吟毫漲怒流歸去定誰扶下馬重來有約屬馴鷗可堪風雨妨人樂却向盧家訪莫愁彭尉侍兒慧甚漢南獨步有登樓肯為衰翁吟掉頭價比連城容品裁句専八米見風流生涯枯澤鳴饑鶴老去驚波蕩白鷗當念飯山人似削撩人更遣耐新愁次韻張守勸農二首傳聞載酒西郊曉迎候前旌擁老農賢守承宣先勸課太平風俗見聲容官堤烟樹紆紅纈沙岸風蒲裊紫茸想憩凝香倒囊錦銀鉤側理疊千重競簉行軒親色笑教條初不作風霜為公醉德仍醇酎惠我溫言亦報章重見桐鄉敬朱邑不須畏壘詫庚桑受㕓定許休吾老已戒諸雛計裏糧次韻張守泛春亭小退鈴齊復此亭自公喜色更津津再紆皇眷分憂寄坐鎮江城與物春長日雍容少公事共誰談笑作詩人撚髭慣厠分題客元亮柴車已命巾遊乾明分韻得山字一從雋軌得追攀日日江臯倒載還貪向諸公論友義未容老子憶家山酒邉鯨吸仍疇昔筆底羊腸出險艱莫便樽前話分袂此心不與石俱頑寄真州詩社諸友疇昔離亭酒一鍾酒杯不比别愁濃羡君聨璧方保社付我耦耕親老農握手陳雷便膠漆幾時韓孟果雲龍自今筆硯還高閣可是詩情病後慵真州諸公語别分韻得杯字嬌紅爛紫正銜枚不待王家羯鼓催佳客又衝新雨至羇人未許片帆回自今寒食嗟無幾奈許閒愁撥不開只擬分攜乘醉去為君領略十分杯次韻趙夷仲趙侯才望屹撐空肯我過從笑語同妙論全勝十年讀清篇分餉一襟風碔玞可用酬崑璞涎顙何曽夢錦蒙莫把詩聲陵此老遲君謁帝畫平戎再次韻坐聽嚴更一再通卓肩搜句夜蟲同拜嘉傑作開囊錦似為衰翁療首風素問以頭風為首風紫誥君宜步西掖蒼顔我欲隱東蒙鞬櫜文陳甘三舍百勝將軍正總戎再次趙侯韻趙能文為古選詩三見屬次韻贊歎理窟疏明面面通如君襟抱古賢同孤標碧落行霜月勝韻芳林度蕙風妙語寧惟壓元白大封端合啓龜蒙規恢佇看收功去自勒豐碑紀殪戎送臧汝舟楚州秋試羡殺君家有兩方阿戎材幹更昻藏久知筆力能扛鼎此去賢書定探囊鄰近玉淵嘗借潤眼中珠樹看爭芳舊陪衆俊工飛動老氣因君尚激昻重九山陽儀真兩使君送酒酒㑹文期興尚濃佳辰一笑坐天窮兩州各遣六從事九日俄成一病翁詩不受催空急雨帽無緣落任西風明朝晴徑通行屐却漫枝笻繞菊叢次梔子花韻豫家有數本亦可愛居士窗前薝蔔花清香不斷逗窗紗傷和錯詆風霜實照夜偏憐玉雪葩瓊樹未應矜潔白金神端為發英華世間俗眼便紅紫試遣詩翁較等差次喜雨韻被旱農家怒伏龍衰翁嵗望甚於農人方半菽延朝夕我亦頻年闕釜鍾灑潤似驚萁火冷驟寒不貸布衾重有來喜雨清新句一笑令人失病容次韻李夀卿明府憶梅不分無花空折枝探梅要趂未紛披憶常月地攜笻去似許風裳倚竹時莊蝶認香憐夢短墨君寫影竟誰欺故人底事江南北驛使來時僅好詩再次韻炯若橫陳耐凍枝清篇細讀更重披即令扶病揩塵硯痛憶尋芳載酒時政使雪霙來眼底却愁霜鬢被花欺暗香疏影君能事何處羈人敢語詩次崔帥韻崔叢碧置酒話别有詩見贈即席次韻虎塞風雲自壯懷詩壇尤見不凡才至音忽作鏘金發急筆寧須擊鉢催屬饜重嘗項上臠拜嘉如嗅隴頭梅還家定遣比鄰怪珠璧光芒重載回崔侯燕城西髙家亭復次韻昔人勝踐此興懷復見西園遊上才談麈生風容滿聽酒觴插羽未須催小令纎指鳴飛雹却遣紅檀趂落梅更約歸來醉叢碧將軍端豈興闌回鄧倅有詩次韻袖手從公辟不懷天心月脅有餘才將壇賈勇知無敵冊府新除定見催楚國誰今衙屈宋歐門我亦後蘇梅錦囊得句無虗日盡卷淮山勝槩回次韻寄汪教授二首友賢端許寫中懷千丈孤標十倍才黃絹舊知儒業富黑頭寧受嵗華催筆囊小却司盤誥鼎實終期薦傅梅指日元侯矕龍衮未容文學久低回客路何人起病懷論交今得謫仙才每當玉麈𤣥談勝不問銅壺漏箭催魯泮舊常烹瓠葉廣平聊復賦江梅揆豫儻可陪英軌莫向詩筒靳往回客路寄崔帥笑語生春慰老懷鄒枚端復顧凡才酒邊徐罷長鯨吸夢裏還驚去鷁催野渡水渾妨轉柂霜林寒淺未逢梅神馳縹眇凝香地却惜無人為挽回再次韻既歸梅開甚嫵崔帥贈酒更佳且二丈皆有送行詩次前韻寄之解槖臨風得好懷祗令公等費詩才行裝併喜鴟夷滿春意如煩羯鼓催飯白重供飛雪鱠眼青還對照溪梅滯留不惡歸仍好笑殺山隂興盡回次韻陳學正道居鄉之適區中塵外自由身囊不留錢最入神便約春秋同保社不妨天地著陳人園翁溪友曽無問野蔌山肴繼薦新却歎聲名雪堂老莫年嶺海夢峨岷自審江湖槁項翁浪將張邴並高風就間耕釣真無說投合侯王况不工䇿足不應諸俊後如君寧復老夫同亟須秉燭歡遊地行簉英雄入彀中次韻趙帥賞古梅豫後不及賞故云把酒花前量自寬花同人意愜輕寒盈盈似駕翠虬起特特為邀青眼看紙貴共誇詩律細客來旋報粉香殘若為白璧青錢費可問東君博此歡次韻劉常甫見贈二首重來觸目總宜詩頗費行吟與坐思舊友相過有嘉惠滿篇更喜勝前時連朝把玩驚飛動萬象低摧受控持塵翳玉笙嗟耳冷何人度曲顫鸞箆筆陳平時枉計功鈍鎚那辦突銛鋒灞橋雪裏嗟良苦飯顆山頭記昔逢斫句自知窮有相從人財博繆為恭彭郎小隱劉郎宅抖擻塵襟聽所從次韻張守勸耕二首吾徒一笑似關天離合胡寧付偶然夢境萍蓬渺雲水舊遊花栁更風煙交情繾綣今猶昔妙句傳抄喜欲顛廷尉歸須結襪客為公飽飯計留年三揖清揚嵗兩更煩公倒屣費逢迎抽簮仕籍心彌厲撰屨詞壇計欲成西洛况聞髙紙價蘇州從昔擅詩聲拙衰枉作登龍客領略𤣥談自阿平使君子主簿公作詩甚進題彭傳師無喧境壁塵外軒窗寓嘯吟勝遊重到更情深湖山覿面渾相識蜂蝶窺簾似見尋客路每歌歸緩緩嵗華亦歎去駸駸摩挲竹樹論今昔親見栽時已欲林次韻髙賔王見投四首殘年病眼苦眵昏盡屏甘腴誓緑樽龍樹難逢刮膜手孟公顧有獨醒孫頗煩十吏供揮掃無奈諸峯役夢魂友義惟公記衰疾新編肯到雀羅門病念還家可奈愁客中日月急梭投土花暈壁迎梅雨海燕將雛送麥秋霑袖正憐珠隕睫關門能復玉為舟搘頭閣膝髙舂卧黃妳青奴共此樓簷花如霧濕黃昏猶夢君前白獸樽但有紅塵染衣袂更堪碧草思王孫逃威正坐齊竽謬歈舞難招楚客魂回首仙曹雲雨上誰云九虎踞天門知君斫句為袪愁得句須防有暗投我病床頭但周易人誰皮裏著陽秋騎驢久袖推門手載酒慵移捉月舟秪命君詩作三益伴翁聽雨卧徐樓次韻贈髙賔王二首瓦注緣窮也自昏掃除膠擾近清樽瘦田可穀宜投劾小子今年亦抱孫慣病已拚疏藥物就間聊免愴吟魂徑當雲卧山南北芋火醅紅晝掩門滯留無地豁間愁詩將壇髙許客投過我肯論新舊雨即君如望蓘穮秋幾時霧縠搴蛟室快意湍濤放鷁舟搯抉腎腸須小息請攜霜竹上危樓再次韻贈髙賔王二首塵外髙人謝宦昏生全天爵嚌衢樽逸民佳傳須銀筆常侍流風見耳孫入洛真能折傖父浮湘更欲弔英魂男兒有志輕萬里辟世何如金馬門虞卿與世得窮愁枘鑿方圎豈易投政復有文衙屈宋須防罪我坐春秋千株已種柴桑菊萬斛空橫野渡舟可惜玉堂揮翰手獨緣羇旅賦登樓再次韻自誑簡賔王二首魚避清澄鳥愛昏陶翁歸計酒盈樽山田雨足鳩呼婦籬院春深竹有孫百首旋編新賦詠三生猶憶舊精魂小摩他日紅塵眼間送蜚雲過海門庾郎胸次枉堆愁馮衍才名迄不投歸去來兮嵗華晚末如何矣鬢毛秋令威心事千年鶴張翰生涯一葉舟回首月堂金谷夢却憐海蜃結飛樓次韻方祕正方未相識有詩和韻聊致謝云靜女無媒未易昏幽人樂地但琴樽詩聲况自推侯喜墻仞懸知陋叔孫拜手行申不敏謝慕賢正黯索居魂拘拘泄栁非君匹老子來時肯閉門小窗危坐正凝愁詩客華編肯見投明月拜嘉千斛賜清風分送一襟秋路迷端倚司南駕金換還隨過海舟誇與湖山須快讀湧金門外倚曽樓次韻答髙賔王向來騎鳯下天津冠屨因循混世塵行處西湖作西子靜中佳茗是佳人秋風暗凝金莖露香霧潛浮海樹春喚蕚緑華書玉葉人間新筆有通神陂量如君信有容諾金到我豈宜蒙蛾眉自古偕三惑虎旅何心待九攻雨室聊辭秉燭女石腸莫笑叩舷翁吾徒嫵媚青編在檗茹冰棲定雋功次韻林子長一首使華不袖生春手綘老泥塗亦使年病後隱淪甘甫里向來魂夢頗祁連受㕓已傍鄉三老對客還矜我二天處士一星君漫記㑹揚光彩映台躔次韻楊帥留客賞雪二首錫羡端知自杳𡨕更資和氣與烘成饜觀攪海翻雲勢旋聽摧簷瀉竹聲狎坐鴛鴦方薦笑窺簷烏鵲已熹晴從公草賦梁園罷未羡將軍下蔡城園林花絮忽冥冥水墨工夫憶李成瓊樹挽春爭炫晝玉龍轉野寂無聲綺羅樽俎諸賔醉簫鼓樓臺九陌晴不比遊仙向來夢真陪仙伯燕曽城再次韻二首雪神不袖噓枯手嗣嵗豐登預告成泚筆徑煩書上瑞載塗况已沸歡聲騎驢有客搜新句扶路何人趂晚晴一笑與渠分樂事的知瓊露勝宜城瓊花露揚酒名吹花舞絮才俄頃可待區區刻楮成催動江梅傲春意喜聽冰筯滴階聲剡溪載酒人乘興縣圃明空月碾晴更想捧觴天一笑恩光旋浸鳯凰城次韻趙帥四首酒㑹頻頻詩課忙從公秪爾了星霜虗舟自昔安驚浪左角從渠赴敵場戀月每忘寒夜永寄梅渾訝驛書香吟邊更厭秋蛩苦滿聽青鸞嘯女床北歸客子謾貪忙河欲生冰野覆霜他日鸛鵝常避敵即今竿木又逢場思遲正坐相如渴文好知熏武仲香妙語鼎來吾拜手乳泉更用汲銀床月姊多情闖綺窗停雲著意護飛霜艷桃穠李寬圍坐舞雪歌雲各擅場醉倒不堪酬勸數歸來贏得夢魂香明朝誰省扁舟客但載茶鐺與筆床舟子喧呼解纜忙駝裘答堸冷禁霜行分槁項新岐路心屬毛錐舊戰場談笑慣陪北海酒馥膏擬炷后山香詩筒儻肯生毛羽飛到幽人夢蝶床用贈朴翁舊韻二詩送徐南卿南歸兼簡湖上詩友飛鵬尺鷃計窮通今古幽人一笑中等是勞生浮大塊誰能詭遇詫良工書堪引睡聊遮眼酒可袪愁勝作公此意平章有同社絶憐相望馬牛風莫將半菽羡千鍾生世誰非囿數中薦福議碑雷已震浩然遻意句徒工我知寒餓憐顔闔人說乘除有志公窮鬼趂渠來敗類秋禾一昔仆霜風次韻趙帥登平山堂東皇未憗養花功逺近嬌紅亂老紅勝賞已容陪雋軌慿虗仍喜受雄風小㪺蜀井寒冰齒旋俯波光碧蘸空更看詩翁落椽筆彈丸句法許誰同平章景物我何功猶博賔筵醉頰紅歡甚鋭戈思却日吟餘豪興欲凌風急觴泛灎春浮渌摻鼓喧轟鴈墮空白雪拜嘉仍袖手汗顔終恐坐雷同修月于今第一功後車九萬蜀箋紅詩供寒食鶯花課袖拂平山楊栁風匝坐蕙蘭歌似剪生香笑語酒如空胡床不減南樓興今古風流正自同次韻鄭同年饑行時癸亥七月一官自食天水草羣雋追奔風馬牛儉幕胡寧效涓滴孔裝未擬借膏油交情顧我失一臂才地較君輸幾籌更引功名挽衰朽天生江水不西流挽章隱操人將處士看寧知器業自槃槃襄陽耆舊今餘幾儒館先生定莫攀元亮歸來猶責子德公老去竟無官子孫忠孝聮三綬說似前人合厚顔少微前夕欲無光白首俄傳地下郎一代衣冠郭太宅百年文物鄭公鄉松煙黯慘空黃壤芝檢紛綸漫紫囊人過新阡應下馬不論知識涕滂浪太碩人臧氏挽章二首德風千祀藹芳馨生享修齡殁更榮早嵗衣冠賢德耀莫年門户寄升卿迹陳莫嗣登堂拜匏繫空馳執紼情里巷萬人緦布㑹一應如我淚河傾帝恩三沐夀親筵更數何人福慶全紙眩鸞回餘舊誥地占牛卧忽新阡隂功不倚長年藥補處仍開上品蓮欲紀哀榮付豐石諸儒當有筆如椽江湖長翁集卷十六
