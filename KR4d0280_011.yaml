body:
  text: 江湖長翁集卷十一宋陳造撰五言律詩山居十首山間有好事時肯問何如束送筯頭薤鮮分匙面魚披襟偕我飽攬髮為君梳一笑塵勞外都無病可祛咀毒橫戈地財堪博一羞時流正攘臂老子解抽頭秦楚蝸兩角跖夷貉一邱向來回晚照了不見全牛忽作斷過訪經旬間瘦笻慵添和詩債病減灌園功石鼎裊輕碧庭柯零碎紅竹君如見慰竟日嘯窗風居深自少客兒輩省譍門日課午鐘飯生涯三畞園嗜魚親蛋戶輟果及王孫不惜苔錢破橫縱步屧痕鳥息我亦倦行行取徑微石稜妨錯足藤蔓每鉤衣森木各天籟連山同夕暉推門吟袖冷滿帶野風歸涉世慣多遻還欣愜此心雞孫當歲稔竹母值秋隂言配香粳軟行須緑影深繼今摩腹去風日更蕭森萍梗才糊口爬沙亦畏淦悠然三徑地有此百金軀乘興聊吟筆無絃且稿梧幽居喜客醉未遣秫田蕪蕉鹿謝依乘孤髙乃得朋間談每褐父清晤或鄰僧止酒元真子居家杜伯升此心安隱處蜩鷽傲鵾鵬一室市聲外生經良不孤園花非獨笑風竹巧相娛為客求鵝母供家課橘奴殘年溫飽爾外此亦何須丁年陪友舊塵霧去駸駸不賴學問力終孤雲水心無波真古井躍冶豈祥金撫已知今是扁舟釣碧潯元夜病起二首霽色莫澄鮮和聲入管絃人家無事日時節放燈天璧月紅塵外東風緑酒前強陪兒女笑病骨得輕便節物撩佳興浮生盍自寬山城如許樂燈市不多寒微步漂香細行歌惜夜闌何人欹醉帽朱袖簇歸鞍香雲寺山月明空隙庭柯下稿乾沈沈僧夜靜漠漠鴈天寒夢境愁偏隔詩情老易闌未容辭水厄聊復踞蒲團丁簿到蕪湖書不至幾日到于湖交情未合疏相望百里地不寄一行書待此寬相憶何人念索居朔風吹鴈斷徙倚正愁豫墟上小村山影裏山腳水明沙春事初移柳人家未摘茶生兒了門户饌客有魚蝦笑我塵埃者奔馳鬢易華丁酉道中暮春去家如昨日節物轉頭非風處緑自舞雨餘紅頓稀野橋平水過村路躡花歸趂得酴醾在箏琶拂舊衣秋日夢蟻浪多憂隙駒如許遒凄涼一霜早黃落萬山秋得失古青簡漂零豫白頭不因多病過始覺此生浮仁于庵䆉稏圍僧屋檀欒隔槿籬月池聊濯足雪壁賸留詩里社皆囷廪鐘魚亦歲時平生松隱賦回首十年遲次韻翟元卿君是儒冠秀源流况父兄文堪一戰霸氣欲五郎卿與世甘多遻謀生迄未成其誰為推挽小試合承明我困柄投鑿君才瓴建髙要之同臭味政以借熏陶觴詠聊真樂媸妍付爾曹能來緩詩頰芋火薦松醪得姪消息二首甚喜年榖熟仍聞佳食眠郡人新過此鄉信得真傳社酒浮蛆淥湖魚割玉鮮平時計安穩莫靳里胥錢二頃居耕穫為謀未覺非輸租能早計坐社莫相違念我官將滿連宵夢只歸團欒老邱壑肯作食言肥感興如鏡江流去奔馳合自羞病容霜後葉歸興浪前漚岐路三生債風埃一飽謀山田饒芋栗珍重故園秋送人赴試之子是荆璞溫純仍琢磨諸公推大手壯歲合賢科豹霧三年隱龍門一躍過得詩應自慰老子閲人多金地寺側徑崎嶇去飛蘿次第捫山橫欲無地路轉却逢村竹柏圍荒寺莓苔上繚垣殘僧不知客芋火老雲根留行都久飫南來飯長維北去船薰衣子笑韻入筯望潮鮮意適忘漂泛吾生計食眠歸期何用數寬待藕花天調官歸穰穰衣冠地耽耽公輔居雲霄有捷徑塵土且長裾老去懷歸切生知與世疏解􅋔漫刺在况説子公書陪盱眙王使君東遊四首錦席浮波影牙檣轉霧霏飛花窺碧酒舞蝶傍紅衣野日歌前淡雲峯望處微遊魚應與樂啼鳥莫催歸纜解鷗飛處船移柳影中林廬桃李月浦溆蕙蘭風酒淺能無醉歌長惜有終賦詩聊泚筆寓意未須工紅旗圍皂蓋離迾碧山隅水色涵雲樹賔筵著畫圗香溫金鑿落花亞錦屠蘇醉裏銀絲鱠漁舟不待呼風林山闕處茅舍兩三家小駐回鶻隊重尋粟玉花疏煙橫暖靄碧溜漱晴沙野興未渠盡數峯明晚霞都梁八首淮汴朝宗地孤埤只眼前譙樓西日淡戍鼓北風傳破竹非無計澆瓜亦自賢客愁渾幾許撫劔倚吳天天外纖雲盡山巔望眼遙平淮剪緑野白塔界晴霄客裏風光異吟邊物象驕功名它日事回首興蕭條新居得翠微景趣自幽奇白石羣羊臥修篁翠葆欹山光銜睥睨雲影傍藩籬席戶無車馬禽猿不更疑關塞凄涼處青徐指顧邊如何漢正朔不盡禹山川將略輕三捷天威重萬全諸公不愒日老子判留年路惡惟沙磧山回忽市鄽樓臺明晚照花竹暝寒煙生事知無警歡聲驗有年猶嫌武陵遇不載割淮鮮犬吠蔥青裏人家竹徑深短籬循石澗老屋枕煙岑牛瘠知春事鳩啼認晏隂豐年易為客杯酒慰幽尋向來經世藴每作負山馳鬢髮不留黑京塵慙舊緇生涯黃卷在心事白鷗知回首林泉癖窮吾不為詩年年漢臣節春鴈與同歸番俗尊華服皇家後武威市中斜毼賤水外拂廬稀南北皆生息和親果是非寄姪擁衾聽良夜風葉不餘飛天地清霜冷江湖旅鴈歸幽人惜短夢遊子念征衣窮老人間世愁城屢合圍雨後病起二首旱歲仍無麥淮民食正艱幾時占雨信今日破天慳盡息田家歎聊開病客顔何由長歲稔金火莫循環小臥竹間齋幽懷得好開病從涼後減雨及望時來兩屩山千疊諸雛飯一杯吾生計此耳無夢到燕臺歸自湖西晨具湖西飯還家腹果然怒風長擘席急浪不鳴船身覺青冥上情留白鳥邊衰年端一快整帽向雲天客中多夜淮瀕夢言歸未有期愁禁客舍雨寒過杏花時酒廢無何飲春如不自持若為丹九轉能黑鏡中絲次韻朱萬卿五首陳雷好賔主亹亹各風流末座仍枚叟捐金得莫愁濃歡兼卜夜暇日賴銷憂近按梁州譜何妨一再謳風義陶朱裔斗南無此流懸知禁厨臠不賦畔牢愁筆落無千載談間散百憂盡抄新樂府惜欠雪兒謳彼姝緑窗子歐靚亦其流裙衩何因瘦眉梢不貯愁唾花新得意庭草共忘憂雌鳯求凰曲人前莫誤謳一雨動三日溝塍皆怒流風涼欺酒力喜色寄詩愁不待桑林禱俄寬杞國憂豐登知有象滿聽載淦謳平時歌酒伴雲散與風流白髮潘懷縣青衫許散愁生憐自謀拙人謂不堪憂只擬江湖去狂吟和棹謳寄興化徐尉二首敬問昭陽尉餐錢得飽無時方依絳帳課謝剪萑苻賔爼仍黃雉書窗了白駒低回自愛惜才業正時須自折河橋柳何人慰寂寥一書寧用靳兩舍未為遙瓜戍裝應趣荆扉興自饒回頭五雲處猶肯訪漁樵次韻彭景貺鳩杖隨身去鄉園得自娛紅鮮終日有俗物向來無酒所揮椽筆風前據稿梧逢人休舉似兒輩笑吾徒贈課會諸公書社他年事尋盟未厭煩須吾執牛耳助子躍龍門凌厲先諸彥從容即萬言雋功科舉外暇日要深論次瓜州雲曀平山塔煙明老濞城客行判費日舟泊細論程閘水清兼濁潮天雨復晴未須歸有夢午枕愜涼生贈髙黃二子平昔金蘭契過逢意自饒乘間無窘步命笑有嘉招翠斂歌眉黛紅生醉頰潮歸驂從惜夜小待玉笙調贈趙秀才衮衮紅塵去扁舟得挽回半生障日手一笑沃愁杯應俗吾衰矣論文子壯哉明年日邊信滿冀好懷開約二趙棋集雨不果來客子離羣意蕭齋只睡宜得無新雨歎漫有故人期日力須棊局風涼入酒卮轉頭車婦去相憶各兒癡次韻髙縉之二首能事餘千牘幽期自一邱向來書襞積不療客漂流小挹蘇耽鶴同歌寧戚牛幾時詩酒社相屬話天遊奚囊走湖海襟度極風流學力隱一敵才華追二劉與時君有用漫仕我非優它日霄霏上詩成復寄不次韻石湖居士瓶中早梅二首詩翁靜三昧笻杖壁間橫小閣自清絶幽芳從瘦生巧當窗影見時映燭花明底用尋春去衝寒踏月行羅帷護春色羣木未昭蘇絶勝翻香坐聊陪琢句臞天資便靜獨氷影倚空無後夜逢姑射仙家白玉壺翁約相過再遊虎邱二首闔廬歸骨地僧宇庇髙邱又趂能詩伴來為弔古遊英雄餘幅紙歲月莽東流未解山前客相逢更説愁末句紀所見令節攜壺客當年伏虎山詩成雲氣上人語畫圗間官作三年住時須半日間從今碧眼老幾送醉中還謝陳夢錫詩卷二首詩法工如此何時粟一囊渠儂須擁篲老子欲燒香世論瞢賢否人家皆稻粱願天開老眼為子療飢腸髙才萬夫敵餘事十全醫有句撞哀玉它年飲上池可緣乖世用政自畏人知當復嫌多口頻煩説項斯即事側徑苔竹潤短籬雞鶩喧小停障日手聊憩臥雲村緑影烏皮几新醅老瓦盆平生農圃計重與野人論次韻羅春伯提舉龍公靳飛雨盍趂望時來尚及豐年計真令笑口開池蓮端自若月地信佳哉倚檻西風夜題詩判費才送髙縉之歸謀武林結課二首眼底論人物如君亦壯哉作書猶乞米造物不憐才跋履妨詩筆祛除近酒杯飛塵棲劒室歸棹莫遲回劒室縉之所居輻輳羣英地皇州異别州能文才倚馬作意付焚舟士價知名下醫門要擔頭明年春鴈足詢我賀書郵歲晚言懷病在歲云除相羊小石渠連朝無出日進藥止觀書舊苦將迎困新慙誦説疏官曹不事事世恐誚相如紙屋酣春意霜空凝凍雲甘違酒伴約稍策睡鄉勳寂寂觀空色堂堂斂放紛冥心得今我回首謝前聞雀響初防雪鴉驕恐報晴徒妨一老夢莫究二蟲情虛籟吹羣動洪爐寄短生只今觀物化未替白鷗盟天晴雀飛有聲時人以為欲雪贈相士蜀張二詩博古亦多藝相形仍論心司南輔名教左契指升沈好語空千紙行囊未一簪鄉關劒閣外鴈足謾歸音貧病謝人謀形容覽鏡羞要隨耕釣往聊為斗升留子術誠探妙吾門恐暗投霜髯文學掾寧復鄧元侯贈陳錢二别乘久絶還往邂追二公陳園小酌話舊且約為小築之遊蜂蝶如相識窺人却怪生平時被花惱因病此心輕笑語初疑夢香紅旋問名杖藜回白首頽景歘銜城花氣浮遲日鶯歌佐緩觴肯孤留客意兼貸著書忙疇昔朋遊樂扶攜醉後狂因君話塵外清興頓能長塵外樓名小築縈人夢詩翁况舊期定攜桃葉女猶羡習家池鶯燕聽歌慣風煙取醉宜餞春餘幾日一笑更容遲送李元英還常熟從周宰讀書久趼尋師足還家訖受經可容輕日力政使帶朝星髙步須堂奧它年看典刑奉親時得笑餘事賜袍青次韻歸路微雪卓犖康時略昻藏報主身衝風還按轡飛雪却宜人帝渥先春遍詩題觸目新行行何樣好歸路玉為塵鹽城阻氷雪贈陳德美三首斷港氷初合窮塗歲欲除臨年仍此悔議道得無疏撫事空搔首何人為寄書海風吹浩蕩側望正愁豫身口真相纍風霜得備嘗即今歌匪兕未憗反屠羊辟謗規間口因衰再覆觴不知詩酒外何計逭悲涼雪意知呈瑞還欺客鬢星悲歡隨處異艱阻向來經夢境翩蝴蝶宗盟近脊令盤餐更談麈足用慰漂零夜雨窗聲呼夢斷燈影尚微茫忽掃蚊專夜從知雨獻涼佳眠嗟莫續殘漏耿猶長却憶檠三尺馮書怯曙光次韻何學諭送行二首時小休吳江新詩念報答呫囁未能書落筆羣英右惟君一敵如窮愁疏翰墨客路費羲舒延閣青冥上摩研正望渠湖山迎客棹觸目總宜詩回首蓬萊近平生汗漫期衰年得奇觀往事屬懷思何日鴟夷去扁舟共翠眉曹娥廟二首處死稽緗素求名每寂寥紛紛等枯冢凛凛獨髙標玉刻龜趺字風驅水伯潮英魂儼如在楚些未須招閲世誰無父渠寧厭久生驚波輕一死森木竟雙塋石壁千尋立江流萬古清祠宫拜遺像猶復涕縱橫寄師文二首父子相為命淮鄉望海隅誰非牛舐犢心羡燕將雛綵服藏書蠧青春負隙駒營營溫飽計猶恐未良圗阿泰知何似無書坐地偏未妨歸緩緩可免意縣縣肖父仍便酒如翁不蓄錢况須供老眼欲説已欣然登招寶山一鷲風煙上三韓指點中地隨山共盡天與水無窮夢蟻紛軒冕騎鯨可閬蓬仙曹應拊掌顧我簿書叢定海四首縣境拖修直人家住土塗三方鯨浪湧一島虎頭孤風物猶佳處絃歌付老夫平生蟲篆意或許間憂虞齒髮今如此東來料一寒愛民平日事宰縣昔人難稍得官租辦聊容坐席安渠儂趨負挽疑未厭兒寬穫稻來墝埆開篘薦碧香地偏皆斥鹵汲井得甘芳漫仕今千室前人陋一鄉民安吾亦飽相樂亦相忘官廨鹽煙外居人雜賈胡聽言須畫字討海倚輸租習俗何妨陋鮮肥頗不無已甘三載住疇昔計乘桴聞師文過錢塘二首行役兒無慮衰懷自不忘待潮何處泊聽雨共更長指俟烏供哺先容鴈著行更寬三日計茫蒼下歸艎時師是入州迎兄舟九堰三江外欹帆側柂頻海鮮當入筯雨鵲定隨人椒酒須分歲江梅巧借春團欒多樂事未沫物華新即事平昔功名念如今冷似灰藏書堪樂死望歲待歸來小宅依城築虛簷枕水開溪翁詩社侶有酒賸追陪官居二首磔磔初鳴曉通通已報衙拙勤知待旦欺紿未停撾漫役鄉園夢秪添老眼花屈信庸敢計斗祿倚生涯官居不惜日宰縣動三年忍事腸欲爛為防頭救燃不應一飽計長受衆人憐俯仰堪供笑人間海易田送學生歸赴秋試因省别業三首涼意蘇殘夢催兒起問塗功名數前輩術業舊原夫漫觸煙樓破應先老驥驅蠲痾吾有待端不倚岐盧年事真無賴官曹已憚煩兒堪付門户吾粗有田園遊舊因相問襟懷為細論此心歸隱計日日受風幡食口幾鵝雁田收問菜麻子美力難及黍稷得種菜與麻寧堪再攬減淮人謂歲飢為年歲攬減又抱兩嘔鴉越人以嬰兒為嘔鴉投老憐漂泊何時了貸賒終慙陶靖節歸不計生涯冬至至節占天意豐登又必然相風緑漪靜賔日矞雲鮮比屋皆生意窮閻有醉眠端容衰病宰索句海山前正覺凌曉望日出五色雲捧之是日無風立春春信葭灰動尋知寒事休光隂從冉冉身世判悠悠鬢影看銀勝官期志土牛羸骸更元命惜為斗升留祭龍廣殿羅籩豆修廊振珮環帝觴初拜手仙馭不違顔瑞霧浮空下靈風拂袂還定知龍宛宛千祀拱南山答龔炳澤卿龔寄書首云今更名炳之子違離久前宵夢見之秋蛇開側理曉鵲啅疏籬歆秀何時改郊庠更問為有言今贅矣暗裏自應知送嚴上舍並寄諸公十首嚴子老且健翩然湖外行歸來困一跌悲嘯念餘生幸棄扶衰杖幾成折足鐺開籠出雙鳥身已御風輕嘖嘖鴈聲急稜稜秋意深行都舊新雨獨客短長吟子肯憐衰病時來慰滯淫惜無移日酒留照蠟燈斟右送嚴自昔金陵幕周旋未盡能凄涼論閥閲突兀擅聲稱直已堪從事公言不負丞嗣當蜚鶚牘留眼看依乘聞道張夫子還家俗纍輕兩官終短袖五字屹長城龍斷悲人世煙雲寫物情只今遙夜月獨許伴空明右寄張次夔縣丞趙子趨吳幕豫偕詠舞雩迄令推轂力不墮拾塵誣鬢腳今全白車輪欲半朱何階答知巳氷蘗耐窮塗已種河陽柳將題晉客輿論交記曩昔因使問何如擁燼應多暇援毫不一書詩成當屬我拜賜衮褒餘右寄趙景安府判憶訪俞夫子頻煩挽袖留酒邊無俗物塵外有髙樓未醉催歌扇言歸聽漏籌此歡誰與繼怊悵歲時遒暇日詩成集西來見未曾金徽想流水玉井定層氷呵護山靈惜流傳紙價增石湖千載託密密續前燈右寄俞君任府判交際論才業何郎種種長元推萬人敵况别四年強文看青錢中詩須古錦藏西歸容盥讀老境借輝光舊識追風足低摧坂下車長驅待雲路小捷已鄉書唾手須科第差肩有詔除公餘富佳句記我渾樵漁右寄何解元再次韻十首重見髮更白羇棲偕在行余嗟遽如許子亦可憐生玉粒書新劵霜蔬煮破鐺詩成莫浪出或取世儒輕曲巷才人迹泥淦沒屐深未妨衝雨到要伴掉頭吟大巧專亭毒何時掃疹淫濁醪君莫厭排悶勉孤斟客舍無佳晤君來肯小留衣穿從見肘賦好似登樓論世聊捫舌輸棊不計籌明窗坐方穩寒日為誰遒吳門詩酒伴入社記吾曾香篆溫難燼銅壺冷易氷賡酬恕吾老聲價放渠增衰謝猶回首思分蔀屋燈朝家無闕政秋禜繼春雩恤緯憐吾怯知言敢自誣閉隂寧董傅為已肯楊朱未斷蝸緣壁仍多豕負塗城西山水窟早晚命籃輿勝絶僧能有拘攣我不如山雲側步踊雪壁細行書它日嘗盤礴蕭然樂有餘中天有臺閣自問汝何能世路信薄命吏曹須異稱北歸甘醉叟西上且聾丞執友論文地能無興可乘進業湖海窄取名絲縷輕因君論前輩衛道有金城潢潦先知本機緘貴用情靈臺與秋日炯燭古今明仕為飢寒迫歸憐興味長卜居從詭譎勿藥幸康強鄰擬千錢買書開萬卷藏殘年文字癖更欲競流光靖節瓶無粟思歸更命車慵垂督郵帶况袖子公書老我須間適塵緣得破除還應與鷗鷺分占碧溪漁題陳主管小壺天三首陳延客棋于中一室凌埃􅙟公堂更左偏間消官上日小隱洞中天棋酒隨醒醉蚊虻斷撲緣憐渠煆爐側矻矻計巢仙棋枰外世故喧靜信奇偏俗網恢三面氷壺令一天時供詩友課未斷宰官緣付我紅塵去如君自半仙未放歌雲散先看醉帽偏周郎自醇酎樂廣定青天持勝收賢業推枰聣世緣明年一品手却訪玉堂仙過八疊鋪問宿平野俄空闊遙山且有無斜陽對捫蝨暝樹忽啼烏老去猶羈旅生平頗壯圗田翁詫豐歲不擬話為儒髙頭山小駐緣雲腳居然睡眼醒楚田銜樹闊漢水挾山青蹀躞初忘倦巉巖已飽經川原方啖蔗不擬歎漂零無題三首薄宦受風梗還家歸岫雲行人與喬木老色竟平分末路慙周朴窮交有墨君看渠綬若若千騎詫鄉枌浪出嗟何補歸來樂有餘山川付不借天地託蘧廬酒熟聊呼客鈎垂不在魚平生棲遁意政用蓋迂疏卧病十四五秋來身自輕已拚不藉在寧復可憐生每笑隱者傳尚存身後名灌園聊日力分藥且交情思歸薄宦隨漂梗流光任迅湍家山蝶夢隔節物鴈書看往事頻回首微吟小憑欄多情但烏鵲時肯報平安答壽詩感念垂弧日無成忽老衰尚須庚癸諾可諱甲辰雌但有散人傳難勝幼婦辭呼兄張座右言配蓼莪詩次韻章宰窮山從薄宦小郡著衰翁政術甘疏拙辭壇敢長雄一飢才自救五細未宜中又擬包羞去京塵冒軟紅遊舊多厭絶怪君終眷知帳留仍碧酒紵獻更清詩風義固難及月評無乃私相從文字樂悔作十年遲過樊村幾日囚籠鳥今朝縱壑魚空勞計遲速凡百有乘除岸勢驚禽過江聲午夢餘心融得新句澄水滴銅蜍漢江水黃濁貪行不暇汲井書懷二首俯仰人間世才為一笑資百年羊胛熟萬事虎頭癡文字聊遮眼功名浪朵頥浮生如此爾况復病餘衰薄宦爬沙地平生一不施才名將底用齒髮歘如斯自笑書汗馬誰今手不龜惟餘五色筆忍賦四愁詩步西湖次韻徐南卿前後九首載酒幽尋地乘間得再臨麗黃啼曉霽魏紫笑春深撫事揮犀管他時夢鶴林心期更閴寂物理付升沈楊園騫絶嶺萬象赴窺臨坐久嵐霏潤來時翠碧深鶯花自佳處魚鼓亦叢林誰在飛埃外藝藝付陸沈山寺曾題竹尋詩記所臨緣雲俯空曠捫石探幽深倦鳥低平野蔫花下碧林沙頭催喚渡空水逺沈沈水月春猶淺攜壺記此臨雲煙淡間寂魚鳥媚清深堤路俄人海侯家或肉林髙樓下金彈簾影眇深沈水月趙園名徐子學詩苦硯池寧暫臨課功初贔屭著語遽精深更積歲月力儻陪英俊林人生才業地渠輩分平沈徐郎小隱處愛我許迂臨多遻話歲晚言歸忘夜深祛愁倚詩酒結伴卜山林更喜檀欒舊風煙挺緑沈西湖千頃畫政用好詩臨鑒揭霧解駮屛紆雲淺深鈿車隨寶馬紅舫度青林歸去開囊錦君先炷水沈詩課逭離索蕭窗誰肯臨語方逢衆怒自詫用功深未議辭窮鬼才堪補笑林舊交多册府肯信有湮沈逐利爭名地扶衰瞢一臨官同氷谷冷盟締海鷗深局步無夷路卑棲有故林鳶魚天地內遂性各飛沈觀諸公射於城北書壁二首舊約已湯餅新歡仍碧香小間障日手同憩臥雲莊羣彥矢復沓老夫詩在囊蔬畦暝晚色野興為誰長塵我玉蟾蜍弦君金僕姑分曹雙壁立中雋萬人呼壯歲功名地從渠山澤儒他年玉音問册府起孫吳次韻楊宰次郎裴時豫亦留西鄉因述懷信次尚村落食眠隨曉晡山瓶餘濩倒村人以野釀名濩倒僧宇謁伊蒲笑挾兔園策問收魚澳租前灘起鷗鷺為我作前驅次韻楊宰公田道上人有褰裳去時間野渡舟知君問雕瘵隨處訪深幽歲事方關念村醪不破憂貰租仍已責或可繼前修次韻楊宰樊汊邑東南或偏得雨然足不足村村不同嘗與令君言荒政寧虧官無寧厲民此役也哀不幸略僥幸乃可因君有詩輒次韻龍豈分勤惰司存想異方禜雩均此意豐歉竟殊疆惠戒憎漏網君寧專擊強東南有偏熟鄙語未應忘次韻楊宰秋尾雪密雪界秋冬悲歡可得同祥如關歲事時合奏場功政要肉骨手民方霜葉風強吟鹽絮句面不蓋羞紅次韻楊宰葫蘆格生常信流坎老不歎漂零雪後菊未死雨餘山更青仍煩析塵語逺寄打包僧政績隨詩價多君日日增次韻楊宰述懷為儒如此爾糧食第晨晡詩漫南山杞愁連董澤蒲賔筵闕鵝炙劵負有牛租久要惟窮鬼文成不受驅次韻楊宰野步笻杖陪隨去漂然不繫舟雲低山影暝風定竹林幽病減柳臂感老無蒿目憂吟詩如蝕月玉斧儻能修次韻樊汊荒政賴賢守湛恩推上方龔黃真父母秦越肯圻壃手自起僵仆術先銷暴強膏肓得司命銘肺可能忘次韻楊宰雪對雪動遐想此情今古同饒為灞橋句會奏蔡城功恥臥袁安屋思乘列子風髙翔廣樂地眩旋九霞紅次韻楊宰宿田家雪曉烏驚矯無風葉自零人家住莽蒼徑柏挺寒青千載猶歸鶴三生省病僧脾虛眼多眚更比向來增次韻漕使張守二首政績新皇眷功名舊壯懷人才雙立玉筆勢各排淮鵬路天惟咫鯫生骨未埋行看仲淹弼接武冠堯階授書天佐漢鼓篋客師韓氣宇包溟渤辭鋒凛莫干經綸股肱似姓字齒牙寒不作規隨起誰令九鼎安題吳司理子隆兼隱紳笏視林藪逹人忘異同端知柱下史却笑鹿門翁犴獄仍隂德詩書亦雋功何須笠澤去煙浪放船篷次韻張守赴真州辭家爭引依風領須公布惠慈深恩手摩拊數計月盈虧歲事方援溺情親更語離來時鴈天闊觸目總宜詩次韻張守惠山詩伯心如水熊轓再護邊教條父老舞姓字裔荒傳客到牽鈴索詩成仰屋椽平吞雲夢澤聊酌隱之泉次韻張守塗中逢節二首向豫房州之行亦舟中作歲節飲塗中歲遒盡江影暮澄凝柏酒惟宗武河梁似李陵問津田叟傲捩柂長年能繫纜才沙觜人家已上燈賞心仍令節十事九相違老境家猶逺愁城日合圍客塗君尚歎世路我知非羡殺鄉居子耕梁木葉衣次韻張守與潤守總卿詩四首天階玉作筍此地合垂紳尚戒專城馭虛逢籲俊辰公方閲竹馬名已薦楓宸政恐經綸去諸公拱後塵漁樵送晚景天地著陳人澗底離竒幹人間浩蕩春峨冠才識字何策可資身不擬千言賦忉忉慁大鈞殘年仍舊學平日亦新書酒渴今司馬巖棲昔幼輿夢無三字拜家有五車儲但諗催詩燭吾衰冀少徐向我能忘勢張侯却甚真頻分代舍飯遣濯客裾塵長日無知巳因君愛此身可須砭劑力振臂起漳濵俯江樓分韻得春字子政文筆徑武陵豪氣振髙騫霄漢步分占燕鶯春造化歸吟思謂二公樽罍著散人芳時好賔主載酒未妨頻次韻楊宰泛湖昔日草玄手效官今武城端憂計豐歉行色問隂晴詩酒時陶冶身名孰重輕猶能記駑蹇拜賜得瓖纓次宿北阿韻聞道籃輿去遙岡復近阿詩應弔孝逸碑或贊頭陀靜者官糊口公朝禮作羅憐君日阡陌塵土撲隂何北阿李孝逸破李敬業處次韻趙帥四首藩方人奠枕楚尾鐡為城曉日熙仁惠春雷殷政聲護邊一李績增户幾王成笑指瓊花露如公徹底清腹裏羣經笥毫端五字城少陵寧漫興侯喜欲無聲竊聽鏘金奏仍聞破竹成君知盥手處毛骨為誰清我亦飽參僧裸糧走百城諸公傳句法夫子擅詩聲自笑屠龍誤時須畫鶩成峨肩出苦語蛩夜共凄清自昔繁雄地蕪城壓錦城惟公工活國上課已蜚聲富庶幾當日調虞屬老成歸應演周頌宗祀奏維清次韻林子長詩壇舊同歃攀附不無因攬轡今膚使回轅記老身雲泥知已隔談笑尚容親不記棋前酒當時定幾巡次韻趙帥歲暮夙心觀物變投老得詩窮玄草居然白爐萁却暫紅詩緣梅雋發愁倩酒消融未用凌羈客疏簾逗雪風次韻小閣聞道委蛇地金虬自炷香心雖便靜默時恐後騫翔物外貯春色人間占夜光定誰傳句法俗骨點玄霜髙宗皇帝挽章二首雨露均皇澤丹青煥帝猷恢圗自天運授聖與神謀方眕修齡夢俄偕造物遊姑山餘四子不復候瓊輈措俗皇風粹怡神象帝先寶圗傳聖嗣金闕覲羣仙典訓昭如日華夷痛所天衣冠遊歷地一一淚河前髙宗皇帝挽章二首天地重開闢華夷赴指揮羣生欣按堵三紀仰垂衣鳳歷雖無極龍樓忽告違廣成談道處千古想驂騑精一心傳後功隆道固存徐乘仙馭去往儷玉皇尊典誥無遺意臣民有斷魂嵩靈弓劍望愁霧慘中原壽皇聖帝挽章孝儉超千古初終秉一心時前未央酒每惜露臺金遺範天同久湛恩海與深攀摧慟夷夏悲淚作秋霖壽皇聖帝挽章二首受授光堯禹規摹陋漢唐皇圗開夀域國步坦康莊檢玉方慈範乘雲忽帝鄉華夷均孺慕矯首涕滂浪慈儉遵先志剛明肖上乾題期千一遇躋治五三前他日山藏壑終天澤漏泉稽山穿望眼松影五雲連強同年次子挽詩二首識子初襟佩嶄然自夙成風猷乃公似文字老夫驚遽隕連城器難推造物情新宫漫仙伯政復待君銘弱歲不好弄俯窺同隊魚開編便頭角諸老辦吹噓囊錦餘詩草悲風忽輤車人今埋玉恨清淚灑衣裾黃尉挽章二首傳緒祖風懿居鄉家道肥羣書了漁獵一性自弦韋官僅紆黃綬時須補黑衣空纒百身恨遽作九原歸落筆心猶壯論年鬢未斑硯捐初鑄鐵澤失善藏山談麈那容數靈輀去莫攀松阡縈望眼衰淚可勝澘李粹伯挽章二首今代論時傑如公未易量氷壺鍾器質繡假粲文章遂鬱鸞臺望俄成馬鬛藏忠賢如此爾天意竟茫茫病酒漳濵久傳聞信復疑為郎真地下哭友漫天涯雨紼何由挽風松想助悲自今思有道時展蔡雍碑五言排律九日樽俎天風度亭髙眼界寬江山對吹帽煙雨入憑欄蟻酒傾靈液霜花碎辟寒樂長回過鴈香細靄雙狻樂事酬佳節千金命一歡燈前喚歸騎星漢巳闌干次韻盛教授詞章有餘力老色歎侵尋况苦漳濵臥俄聆正始音新篇驚間發平處冠來今修月無前手凌雲得此心葩華分子細矛戟駭隂森玉楮何勞刻於莵不易擒競傳平水市或博樂浪金妙斫風無迹窮搜海並深與時猶落落逼古謾駸駸襆被征塵暗臨流鬢雪侵徐驅憐老驥決起羡驚禽善價渠能許清愁可得禁不無青白眼聊費短長吟頃歲欣相識髙山慰所欽周旋窺義府衰朽謝書林適越慙荒陋依劉耐滯淫交情向來密詩病幾時針遲子迂軒蓋呼奴潔釜鬵萁爐足幽趣玉唾滌煩襟斗酒窮簷日招搖得共斟再遊殖軒小酌生世岐喧靜平章有不如宦塗吾畫虎濠上子知魚去索長安米歸紬笠澤書兹軒住蒼莽勝日復躊躇酒盞扶頭後鶯聲禁火餘蘭風度樽俎蝶翅掠襟裾有底煙霄意便為水竹居可須供麴糵未後課耰鉏花蓓紅酣日池光碧浸虛鶴頭依緑荇龍骨鬧清渠詩興因超忽愁端得破除時從一吟醉小計百硨磲送羅提舉萬口歌謠裏臨岐挽使車五雲金碧際平步闖天居皇眷須禆益清朝有詔除致君真夙素活國此權輿壯歲持英節春風滿比閭民皆樂耕鑿吏敢狃侵漁日者流離歎時方旱暵餘飽飢親勞來骨肉費勤渠汲直開倉後韓公報政初重前漢皇席肯挾子公書冠豸傳應實嬰鱗可待徐規恢今日事抱負與時攄吏治捐邦蠧羣妖信鼎魚衰翁憐命蹇違世坐才疏但有江山助曾無甔石儲登門仍造次作意借吹噓此去逰丹地能無薦子虛壯心翔碧落歸夢謝黃淤凝睇成分袂從人更曳裾念為天下賀不擬賦愁豫謝龔養正病後分藥如許臥痾久入春知少蘇遽能捐藥物分惠及吾徒字驗親題健形非賤子臞人情工老芋友意寓柴胡怪底隂陽冦偏陵山澤儒從君足力減歎我酒腸枯解橐供砭劑投笻試步趨身方困厲鬼名巳屬亨衢書蠧妨生理杯蛇可自誣斯文千歲計平世萬金軀大手堪周史諸公待董狐幾時隨急詔帆影漾前湖養正補官有信勸農書淨居壁小出成休務徐驅免戴星風枝禽磔磔煙隴麥青青蕭寺蜚塵外行軒數刻停賸呼黃髮叟看臥碧香瓶庶富幾無憾耕桑飽所經由衷疏直語或可比閭聽寄顧簽判定海虛籍米數簽幕主張蠲放作詩謝之版財虛占籍為弊與年深挹酒空名斗無虞可即禽焦頭寧自救捫舌未渠瘖上幕真時望平居念陸沈蠲痾丹九轉援墜綆千尋容易令公喜恩勤獲我心益昌留署考神武貸抽簪厚德何容報交情擬斷金飲寓隱軒亭曉清曠行樂未妨頻無客不堪醉有花長是春憑欄尚紅藥結伴擅芳辰笑駐凌波步香分折角巾鶯聲殊自健杏子况嘗新仰止宗英伯來為鄭驛賔言辭獨樂樂仍命可人人鴻弄舞時影梁蜚歌處塵棋枰誰得雋詩筆自疑神欹倒何妨屢歌呼却甚真升沈塞上馬容易鬢如銀奈許追歡地回頭迹便陳再逰福溪巖贈主僧山路細縈蛇欹危訝泛槎幽人肯假榻倦客似還家柏徑初軒豁筠窗更靜嘉飢腸如作苦齋鼓恰停撾茶供含秋露菘葅帶早花香粳有炊玉煮餅不搖牙好在經行處還憐舊約差摩挲驗蛇蚓圎缺屢蝦蟇境信人俱勝心寧迹與遐農時多閔雨意緒每如麻却話三生契空嗟兩鬢華蒲團坐雙穩良夜對篝紗均州贈應守沈倅聞道均陽郡平時百萬家客行休訪古世異定興嗟逐逐才為市通通亦摻撾僅成新聚落那復舊豪奢屬者歌簫地連畦蔓瓠瓜今來冠蓋侣薦筯欠魚蝦連日買漢江魚無所得狹路幾沙磧頽垣賸土花街塵坌鳥雀屋影暗桑麻恐有如梟鵩仍驚攫肉鴉遺基滿空濶面勢踞谽谺一水紆龍脊羣峯簉犬牙封疆界梁楚形勝引黔巴郡計稽圖牒農功富秉秅吏庸常報最帝澤向來賒劫火延中夏髦頭震四遐風聲離夷裔俗習墮奇邪榖蓄寧關慮山荒久廢畬腰間尚牛犢籬腳漫豵豝久矣皇恩洽悠哉戶籍加帥車初柅軌倅戍未歸槎厚本還千載移風待兩衙撫摩端不苟悃愊信無華已日知胥悅為生漸有涯耕耘捐末務惰窳棄前瑕條教須源委浮淫計蘖芽要能瀦鄭白不必漕褒斜號召人投袂汚邪歲滿車騰陵傾獻替陸續拜亨嘉績效煩銀筆人才况絳紗翰藩仍庶富餘付史臣誇江湖長翁集卷十一
