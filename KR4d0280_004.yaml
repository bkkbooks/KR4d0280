body:
  text: 江湖長翁集卷四宋陳造撰五言古詩泊海子口池口至海口望望三舍外辰發莫已到回首西日在風師肯憐客祖道煩一嗌我舟疑凌虛楚山真厯塊蜚鳥相讓疾驚浪乃弗逮窮塗坐局縮頗嘗得此快遄邁自本圗闕供恐貽悔未辦問村膠且計具薪菜泊小姑山楚山屹兩姑我見乃其稚聞名詩卷間識靣客舟次玉刻極端麗簮植瞑蒼翠娟月上天角相與詫嫵媚怒風將我西未憗卜晚憩山足舟可艤山木纜可繫山外正風波獨此佳食寐斷知有神物主此勝絶地明朝捐行槖可無答神賜白鵝雪為肪緑蟻香馥鼻舟穩風又熟無乃契神意未暇訪彭郎辭費辨非是郭家洲攜兒上絶岸微徑步蒙密人稀鳥烏樂老屋幾百室荒涼郭家洲籬落映殘日問俗得周旋譍門頗倉卒興衰今昔殊郭姓尚十七鄰里闕鹽茗翁姬僅盥櫛共説頻嵗歉平陸江浪沒場圃或潭洞椽栱行蚓蛭去秋微收爾樵採取黔突接耳多樂郊一去恐兩失吾邦有杜母撫我不待乞蠲租桑柘在休役孫子佚意使流殍無寧後倉廥實官今潯陽來吏師那容失書紳拜此賜知我佐郡紱古來禆肉食多自芻蕘出必若窮吏道孰先究民疾剝膚快目前吾固笑無術富池廟買香馬頭西跂望富池口我帆廟下卸秪費一炊久匆匆索冠裳堇堇辦牲酒所取薦蠲潔不必須富厚精魄我為悚勇節公則有出門聞風聲萬竅一呼吼林摧巨木折江驅雪山走繫纜下窗坐齋心念神佑鄰舟瞢冒去膽碎面黧黝非今羞供留例亦罹釁咎交神不用卜遲速示可否噬將捨舟楫望望終稽首離富池江流寂無聲明滅窗月曉客枕歸夢餘意先西蜚鳥雪天信少風翳面正繚繞富池忽信次肯羡雕鶻矯向免犯險艱神惠顧豈少今晨有佳興調笑向諸小波平旗腳直康莊馳騕裊鱗鱗到座隅健鵲啅林杪人家積蘇間山影橫練表未成官縛去得句吾事了馬口氛昏翳春曉瞪目如受蒙停舟少須之紅日碾髙空是時羣山間積雪未肯融巖霧不盡收似角藻繪功屏障莽回合粉墨紛異同嵌巖眩有無草樹森玲瓏皛皛瓊為田奕奕斾卷風羃籬抹髙頂下乃卧玉龍隱顯隨斷續間簉成蔥櫳微漪湛不搖一一縣鏡中酒杯與詩筆客次寧闕供搴取不資景納我雲夢胸一笑漂泊裏孰謂吾塗窮摩挲好東絹世恐無此工銀葫蘆山水佳有餘我與之周旋江行已久矣今復領其全漾舟銀葫蘆雪在春漸妍素瓊間蒼玉化工與雕鐫屏圍無空缺護此百頃天圖畫别濃淡粉墨生雲煙人間有此境定屬水府仙先生嗜竒勝久駐無由緣命名失雅馴吾意終慊然玉鑑扁山石取重須時賢可無泊舟所作亭近江壖登臨付楚客當有雲錦篇回風磯大江悠悠去渌靜初演漾山石齟齬之湍險乃萬狀君看回風磯却略不可上椒石卧中江與江作陂障鏜沓匯石下漰澎劇奔放北磯屹對峙其中過舟舫水流作髙下咫尺便尋丈我行返壑餘坐想潢流漲頽波次灎澦如馬亦如象攖觸寧完舟竒禍此無妄入峽與上瀧艱惡偕叵量下澤遵夷塗回首一怊悵龍眼磯甚小而巧漁者聚焉誰謂石一拳不作江流礙朝來揚帆西瞥若驥厯塊龍眼風火磯培塿視華岱似聞潢潦時亦復鼓湍匯鑿去本不難竒巧禹所愛其上嘉樹密其側魚網曬居惟羡漁鄉復欲老犢背西歸儻得此庸敵七里瀨散花洲晚泊略眼毛山夾枯涸不可留風帆劈箭去遼海吹一漚長年面死灰死爭如赴仇一飯六十里幸泊散花洲呼婦具盥櫛命酒浣驚憂我無資身䇿老計糊口謀勿云朝不坐叱馭復何求奔車非伯夷覆舟無孔邱薄德既謝此身世付浮休亦念三徑具歸從沮溺遊笑説今日快擊轅為渠謳别留初孰酒飲處酹陽侯庾樓晉起不由德亦坐崇清虛陵夷莫挽回後世猶受汙庾非適用才夷甫真其徒樓以庾得名而庾愎且迂面勢瞰空闊簷楹煥丹朱遐想如不及效尤無乃愚風流與經濟本自珉玉殊空談養虛譽胎禍取炭塗峻約火燎原典午轅下駒舉扇障蜚塵王叟寧厚誣徇名不既實扁榜誰權輿得興偕下僚小節安足模捍患識黃樓仰髙題景疏于是復間然吾言乃迂儒題六宜堂昔人厭俗心寧取無肉瘦平時眼為青緑士須客右立節自修竦適用兼庇覆君家所居堂音響不待叩千溝蔭百椽一一渭川秀公今王元之好尚如授受記樓賦此堂異聲同一咮心謀耳目適所樂一能副昔人言外意泥一乃百漏拘拘六者間見未脫科臼我此小盤礴萬境歘通透徐步寒玉琤長謡靈籟奏主人信清絶此君舊幽茂並䇿超俗勳醉墨點衫袖次韻余司理余為𨽻所陵見告治之有詩次其韻名分屬我輩那容徇多可勢由服勞屈享以綦貴夥積水須固防易溢不難破勸沮自有機懲一警千箇世儒略其本顧詳獄犴課彼頑工抵巇未可援宥過姦名犯具分論罪不在大吏姦易為熾士氣寧受挫漏網容汝輩厚顔向此座新詩驚老眼唱髙信難和向來摶虎手老去但慵懦近者勞阿買金薤編玉唾此詩尤傑出氣有江山佐揆豫收新得比君倍當賀禱雨福溪巖巖下初無旱意蓋泉所沾溉也我訪福溪巖行行黍稌中人家打麥罷鄰里笑語同迎官問來意不信有藴隆淙激田間泉詰曲走青虹此泉有餘用此巖無闕供福巖真福地為民保年豐縹眇三花仙蜿蜒千尺龍翛然乞靈地陪此超世翁是巖既磨滅是泉乃終窮洪慈小決擇妙化符鴻蒙彼此猶屯膏無乃坐怨恫稽首貢此言庶其鑒丹衷近榆亭豫以近榆名亭取少陵詩種杏仙家近白榆而梁教授作長篇見贈以詩句為韻答之小亭園西偏政復園取重扶疏百本木自昔誰所種敷舒曉霞爛磊落金丸奉城東詩客在端許與此供董老故自貧但有滿林杏别令雕虎守探囊續人命我老斷狡獪昔人慵季孟惟餘隱几地可愈俗子病天亦積氣爾種榆誰所傳人間自得得何適而非仙少陵健於辭暇計然不然長翁名亭意繫影更可憐何年嵗星精典術曰杏木嵗星之精夜辭天帝家幻為賴鄉種增賁别乘衙似聞綵鳳舞天風亂晨霞尚當月林飲一摻漁陽檛豫到官此花已過坐亭撚吟髭搯抉了不近詩來良為吾吮漱賸芳潤遽令方丈屋繞壁走虬蜃何如嶺頭梅題品得何遜托華復食實果部誰稱伯兄桃奈其弟無若此眉白三玄信殊稟五沃擅嘉殖藏核待東歸分供橘奴帛少日接為構無何了桑榆邀食有餘地何事須千奴此亭與此木到眼聊為娛五詩信睡語定博君盧胡答余司理余以豫在定海時宿雲巖韻作詩見遺故答之緬懷海縣遊不作千山隔雖償還俗債自教官作邑人謂還俗兹復望霓厄孰知赫曦中歘有油雲升六幕一汛掃病骨如濯清西山殷其雷晚溽尚雨意頗思雲巖宿靜聽崩空勢靈湫貝為宫龍伯肯小留與翁寧兩心當亦憂民憂願龍噓為霖彍電歸袖手免令山城民議我拜土偶千里飫玉粒秉穗周困窮牲肥酒如油嵗嵗敬為龍教授有詩再次韻人間望晴雨長若物所隔虧成間十五嘉榖信多厄假手方寸丹誠與爐煙升風伯齟齬之不容徹九清玄雲起西北似副祈禜意驚飈鏖晚空汛灑第末勢寄聲主雨神雲車盍小留咄嗟澤枯稿為人消殷憂輔帝凝太和繫子一引手如昔五三代濟時須聖偶詩壇我賤工康莊自途窮眩旋向良樂並御天間龍次韻余司理路監嶽瑞巖禱雨是日雨明日雨足二公有詩因次韻入山日正烈出山雲忽濃身疑潤空青旋覺霏雨濛歸來坐良夜淙瀉如崩空縣知焦卷地轉眼青芃芃似聞移晚秧竭蹶不暇慵人計故新年已判一倍豐此惠究所自無乃西山龍澤物龍能之叱使則天公我行與雨會僅殺顔發紅地上螻蟻臣渠敢貪天功兩公壯藻思表表千夫雄新詩猥見豫拜賜豈所蒙得意筆生春狀物斤成風生世有如願兼得寧易逢此詩自宫商為君絃枯桐凖擬雞酒社往和擊壤翁和陶淵明歸田園居六詩豫漫仕代耕山林之意無一日忘顧口未糊爾官上得師文書知垾荒田竟自此告功必酬曩志乃和淵明歸田園居詩以自堅其約且志喜云一室類蜂房為食來窮山僅救飢火煎跋履恐雕年平生邱壑念回首魚脫淵鄉居何許佳菰茭滿中田有兒可耕牧枉滯章句間昨日鵲啅餘鴈書忽墮前云集南蕩工數竈騰青煙書賣猶可市前功戒頽顛官業詎宜老倦客志在間置書命鴟夷心事今泰然良驥馳康莊驤首輕韅鞅筋骨倐謝昔得無伏櫪想自審涎顙質蹀躞欲奚往如我合漁樵奪煬忘幼長資身本缺如與世志空廣老去傃所安豈直樂榛莽種禾托其實即穊乃可稀儒吏瞢不長竟為老農歸妻藝兒可犂稱力食且衣平生睎龎翁此意今不違半生冒吏塵初不一日娛往往清夜夢翛然繫林墟已辦二頃耕更有三畝居養魚近傳訣種桑不論株呼兒計曩昔屈信果何如不復首尾畏形泰神裕餘枝笻莎徑微枕書竹牖虛日用食眠爾外此一事無我慚曠達人夢寐眷鄉曲十年仕楚越政坐食不足人皆詫善奕舉世鮮識局陶翁有髙躅迷塗炳明燭於焉稅吾駕作息課昏旭把竿坐斜陽跨牛出曉陌長謡柴桑詠聊復自適適梓里三釜餘鄰犬不吠夕稼穡政使忙樽酒取空隙仙曹有知友自揣無能役經時雋英事小人分耕績成言君勿問賣菜可求益病起四詩一節食醫經戒多食書惡殄天物細茹取微足衛生此其術是銘當匕筯况我日衰疾胡為冒所戒一卧復十日恙疴不虛生一一自口實大嚼健武事欲強蒲柳質行年踰知命備厯世纎悉山膚與水豢嘗味幾十七婪酣復不已頤正昧終吉昔人議四凶叨餮乃其一不見辟榖翁曾是漢良弼二止酒少日良束修但識名教樂誰令憂患後頗復近杯勺嚚號或跳梁扶攜取諧謔興來偶一適事過含餘怍向非病鼎至或未悟狂藥不知黍麥毒終乃堇葛若腐腸自浸漸履虺尚歌咢覆觴吾已後遽覺今勝昨此衷天啓之相豫固不薄卒嵗辦僧過茗粥安淡泊時醉床頭經妙意翔碧落三息念祿位據極品勳業垂不磨出從白馬肥家有黃金多世間貴富者才德乃莫過骨相審自知甕盎哀駘他一昔讀書史志空慕邱軻矻矻章句樂所趣不及他日月倐遷謝如此定命何知己初不無腰金鳴玉珂一旦逝水去匪斧嗟不柯揆材既樗櫟揣分合澗薖旌翻火馳餘但有雙鬢皤逮今要勇往灌園仍養痾石女自無兒古井那解波西湖佳風煙久矣辦一蓑四論報我本扶犂手為儒父兄意全家飽官廩髮膚盡君賜一念三稽首報答迄未議向來挹前修謂可跬步至即今頻頻食空負堂堂志尚當桑榆收未可辨髦棄奈何不自愛生理冒所忌致君榮吾親環省已不冀餘年猶視息舊學有造詣其次在立言揆豫敢辟是於世粗有益就死可無愧噬將金玉女凛凛戒失墜題陳主管奧廣樓卷舒樂天遊仕宦甘吏隱吾宗大雅士為學先究本樓居盤礴地超然寄妙藴沉沉一機深納納萬象泯人方窺端倪我自絶畦畛胡寧山川麗詩卷規束攟彼哉狹且露之世坐拘窘瞢焉登斯樓不博粲然囅題雍和堂元功播萬有洪纎各秀頴一或疵癘之稿乾例榛梗是身儲至和舉世乏妙領粹然太邱裔父子皆秀整學自付衣鉢刃不留綮肯文字長少蘇智趣大小耿翛然詩禮庭翩度脊令影穆穆塤箎春矯矯塵務屏會看蟬嫣去滋味調九鼎彼哉夸毗子肝膽作蛙黽斯焉世宗師胡不日三請題通明堂世儒困墻面窒外由蔽中一理有朝咮八窗自玲瓏公無末俗病人識古賢風照物鑑絶塵與世雲行空似聞虛白室略與公心同彼哉壞陂老史語寧所蒙吾知泚筆意千載端為公次韻余司理留襄陽日侍帥論詩既歸余有詩次韻一從荆楚役八數昏旦星剸裁有瑣碎觴詠無頻仍世故未焚劵官曹方治經客或嗤臞儒下亦安聾丞過日念知己逺方空舊朋持斧乃宗匠歃血主文盟天瓢賸挹注風翼困凌乘袖憐醉墨淄眼為故交青招此窮鄉吏闖彼小玉京樽罍容吟噱粉黛羅娉盈理窟領新得詩瓢傾舊盛風前雕虎嘯秋後寒蛩鳴六花嚴堅陳尺箠鏖罷兵是翁信竒偉小子慚奉承攘善悖古訓躗言防天刑見推無異辭君語吾未憑離伏龍北風鏖屯雲倦鳥白晝迷篩為縣麻雨寒氣晚凄凄何以贈行客去路一尺泥卒徒淖莫前草棘取新蹊可能辭滯留十步九顛隮窮我恐非天問子誰見擠少日憂患海有眉未肯低流年况衰病縱死非孩提戚欣何足云夀夭久已齊秀色浮嶺路清音淙上溪會心各姿態捋須忘慘悽山靈不無情斬新獻詩題過八疊山我從外朝來嶮峭相連接巉絶不可上孰與西八疊車匪毛羽去我豈猿猱捷一步九頓仆陟起正岌嶪飛蘿攀恐斷狠石髙更躡時方積雨後沒骭泥涉涉客居慣澤國未到意先懾呀如敵場赴𨽻卒不敢怯及此問次舍猶覺口嚅囁剪燭未渠寢尚恐夢驚魘還家登悔來坡下坡黐鴈墮上坡風鷁退厯險雖末勢未易忘歎慨散人吏隱心下上不云悔摩眼見南山衆嶺莫謀大雲隂巧蔽虧日御頗隔閡誰規山一凹千室作闤闠嵐影暝竹柏吾廬良好在言歸休吾勞嘯詠山與對程帥和陶二詩見憶次韻離合定有數撫事尚忍言憶掎枚鄒袂遊從如兔園堂堂繡衣老凛凛雲錦篇繄公笑談爾諷玩良超然效顰徒區區晞駕嗟無緣登樓漫多感漂泊類仲宣窊石取供醉孤子真次山東望搔白首不獨悲流年次程帥和陶詩韻勉兒子以學亦公意也昔吾竊科第正自學力勤雖從士夫後祿已不及親痛感韋經傳敢忘擇孟鄰念汝知䇿厲燈夜仍雞晨立志忌作輟惜隂計寸分盍抽胸次陳驅為筆底春解顔獻新得眩眼釋嶠雲鉏頭足膏腴天人巧相因奉親有如此况豫耐賤貧誰今子不如儷美須前人謝程帥袁制使安撫程文詩筒不乏近袁文制帥附寄蜀書五部以把筆已頭白見書猶眼明為韻以謝昔人道與俱物外一不假而我同是見兼取及土苴虛心超萬境詩筆時一把造詣豈二機此祕知者寡還山念初願老夫辦一物生平萬金産自託五色筆譬如十全醫付此無妄疾落紙亂蛇蚓超然百憂失世人事夸毗失得紛滅起回思少年日失腳幾墮此尚友千載人得已吾徑已髙眠北窗風賢否付一指俗間苦逼仄有士能湛浮任真自得得與世不同憂得間書遮眼覺倦書枕頭不辭蠧魚誚不眙牢豕羞江左風流人安石頗巨擘絲竹不去耳用逃憂患域陶琴不須絃我輩所矜式設逢東山翁兕觥與浮白好書飛墮前客有記衰賤蜀道六十舍汗牛煩軺傳端如枵腹人品列睨嘉薦常伯古賢風凛凛眼中見會青嫓熊膽入眼氷雪如疏雲放佳月赤眚為之除自拭烏皮几日課蠅頭書政使堂下笑矻矻糟粕餘豐約自定分絲粟戒妄求斯文寓理窟多取誰汝尤人間張長公骯髒謝公侯窮塗有樂地投老容夷猶九死得此生萬事遂成懶惟餘坐進地劣亦受推挽交遊金玉人畢力補疏短詩書銜砭劑陸續到老眼一編用劉漢誰似進履生髙吟謝世書我嘗羡彌明昭文倦袖手此曲寧虧成屠龍與澼洸付渠自重輕程帥以詩見慰用韻謝之平時聨輝星轉首食既月誰能玄覽空影事睨盈缺老子一掬淚未憗謝天合生世岐髙下末路各一穴莊生悟浮休荀粲枉悲咽公言敬書紳聞道有先達梁廣文歸自襄陽作古樂章迎之自君之出矣適我患禍初入門悼今昔顧影憐畸孤古有鼓盆達自笑食蘖如石交不在眼勝談誰見娛自君之出矣春意尚妖冶著我愁城中轉首已中夏豈無鼓吹具塵筆置不把亦欲鞭其慵獨倡無和者自君之出矣無心惜流光但記燕營巢俄復蜂割房煩君驗節物可孤北窗涼戎葵一笑粲竹萌十尺強自君之出矣飢民日北首春從二天來共拜更生手未議解倒垂促膝此何有非君靣揚𣙜誰有筆端口次韻陸子髙子髙歸鄉里去甚匆匆有詩見贈因次韻留之一從别君來圎缺幾望舒相與兄弟然異姓殊厥居向來帆歸船欲去仍趦趄平安可但已擬憑雙鯉魚兩地邈千里二年能幾書了知故人意記憶猶勤渠當君訪甓社值我留南徐參辰巧相避終冀或起豫扣戶聽剝啄果爾不作疏屬者久契濶兹焉不躊躇甚欲挽袖留扣子萬卷儲子家老嗣宗三賦陵相如阿戎青出藍萬壑赴歸墟宸廷奉大對百韞財一紓有偕仲補衮無取辛引裾俯視漢諸公彼餒此有餘置之不吾即欲刃捐礛䃴南臺復西掖髙位為誰虛未須芹藻地脫口鎗珮琚平時交遊間别酒慣攙袪如君可畏敬且復同鄉閭求全待補劓涉險資間輿滔滔多靣朋著眼增欷歔視我若浼然於君何賴與願言風誼重暇計日月除許尋十日盟子髙初來己欲作十日留妙論窮終初治具有赤腳抄詩戒小胥安得方角輪一昔生君車再次陸子髙韻奉寄言懷敘别孰能下書帷潛心如仲舒沒沒視息間飽食仍懷居紛華或交戰進修顧趦趄屹立視儕輩未脫同隊魚欲耕我無由生計付束書推卷了無得每嗟吾負渠日月駒隙過撫事猶姑徐衰晚時用少幸直女罵豫拙憐官路澀貧覺交情疏沈沈王侯宅進步終踟蹰所悲名不稱暇計家無儲一官劣自庇晉如復摧如犂頭足膏澤良田本榛墟洪鍾忍不扣妙意誰為紓纎缺間衆美狐裘羔為裾而我空無有一饋九歎除眼中今士龍才業世舍諸椽筆將精騎詩來真搗虛陳前眩錦繡論報乏瑶琚應以巴人歌局蹐疑見祛逝將賣書去近君營田閭更僕懷韋編課兒肩竹輿有志竟未酬南睇幾欷歔愛我寧惡石非子而誰與江山悵路長氷雪迫嵗除臨風歌歸去平日賦遂初塊處念離索文會思樂胥寄語識自警僕夫行膏車感事十詩上李侍郎齊人石為瓠自視比金璧鑽之不能竅寶此果何益人士為已學落落肯如石當知井用汲又惡匏不食客來自羅浮遺我藥如粟茹之三頓首已覺顔如玉飛浮日月傍夜訪銀河宿和氣均人寰坐使年榖孰鄰女德稱色婉孌白玉溫無資嫁未售行媒不顧門佩是親紉蘭庭有手植萱君子正求匹不聘甘難婚芳嵗逝不留苦節中彌敦澗潦有遺采此意與誰論國工鑄良劒髮白心志悴晶熒淬斂餘干莫並犀利入匣蟄虬龍落手懾魑魅衛身未足道適用在一試樓蘭猶頡頏顧汝豈虛器荆璞自楚寶顧終雜土木和氏浪三獻一身已再辱小儒褐衣底磊落幾荆玉把玩坐蓬屋和應笑遺俗善價誰不懷一辱詎可贖吾亦笑和氏葵猶衛其足伯夷困采薇名不厠周亂敬通可言命四七拱炎漢聖主方側席士或槃薖澗有斧苦無柯古今同此嘆大人世鳳麟吐握豈云憚么麼未足數一官從浪漫長松倚絶壑髙蘿纒綿之蒼山屹半空白雲相因依揮䇿馬不前自問此何時聖賢運化樞竒髦各騖馳躑躅諸儒後稿暴窮山為槃木貴有因平心勿嗟咨燕君市駿心一昔馳九野豈知千里足近出鹽車下臨風非一鳴幾謂無識者詳肉略之骨曠古無善馬枉尋固已汙索價則已欺人生功名念舒卷自一時榮辱取所適窮達非敢知及物儻在道卑官亦可為咄咄厭矮屋心無一日嬉還應乘田翁笑汝太矜持幽人一床書不肯睨侯伯領會有真樂未厭四立壁平日太元經看人五鹿客今代元紫芝獨未覘顔色向來縈清夢倐喜得親炙一洗衰俗耻滿腹志願畢隱靜道中晴日暝復出煙雲尚飛浮東風解人意松間作颼飀罷馬不用鞭正愜道塗修涼氣濯毛骨百疾灑然瘳縈紆草根泉激激氷玉漱籬頭薔薇花娜娜新婦頭空林人語寂野鳥時啁啾名山無窘步春色况未休盤礴翠微寺判作三日留曾非耽禪寂聊此樂深幽文移暫見貰清境與心謀晞髮五峰影濯足雙澗流同陳宰黃簿遊靈山八首宰云吾輩可謂忙裏偷間苦中作樂以八字為韻浮天大江白發地羣山蒼江山環挹處一鷲棲寶坊偶從紅塵中與客分僧牀却窺紅塵底紛作磨蟻忙精廬兩牛鳴欲往輒復止山靈應笑人矻矻簿書裏清辰陪詩翁俗態方一洗但恐煩移文松檜負餘耻令尹拯濟功在處騰歌謳翛然伊洛意副此招提遊一笑倥偬餘政以先民憂雖懷蔡侯靜不作趙孟偷我雖裹章服雅意耕寬間著貂可採藥拄笏或看山白頭敲榜地兹遊破天慳有興聊可歌睡語不受刪枕流未云清食蘗不言苦老禪家翠微風壑嘯一虎碧眼照人天金地漂花雨千偈彈指頃竟亦無剩語名山吾敢忘獨往興易窮勝遊得勝士杖屨凛生風表表益者友當求古人中今世習鑿齒前身黃石公一代無為翁雅志屬邱壑至今玉雪句為山鎮不若生平稽生龍何時令威鶴弔古但三歎九原如可作吾儕自由身聲利為纒索不有山林幽何以寬此縛熏爐仍茗碗鉤窗共盤礴何必覩史天是中差可樂郡寮按樂飲趙判院有詩次其韻簿書棼如絲取樂得少空悠然杯勺興藉此歌舞送從事來官厨醉不睡鄰甕衣裳賸蘭澤言議雜囂閧人生醒忌獨勝日飲須痛向來韝上鷹府公解其縱僉判司理稟樞相許之方作會先生作禪卧肯以靜嗤動形臞詩則昌萬境供日用文字與紅裙寧非一理共退之強分别無乃夢中夢絲竹娛中年耐此髮種種明當解豫酲酒德賡舊頌再過楊秀才莊茆茨竹間見竹根漱清流翛然楊子宅面勢崇山陬開窗得小憩忽復成再遊流光屬深省昔扇今駝裘主人中田宿穡事方未休譍門紫蘭兒見客頗邀留雞黍要後約行止寧前謀攬轡茗事已黃塵迷馬頭江湖長翁集卷四
