body:
  text: 江湖長翁集卷三十五宋陳造撰墓志行狀臧子與墓志銘臧君子與諱鏗楚之淮隂人臧氏郡大族大父翌以承信郎當建炎兵亂被命通判泗州與權守徐宗誠死守獨不餌於虜安撫大使劉公光世剡薦例遷終訓武郎父圭保義郎嘗主管盱眙軍𣙜場二公家世雄於邊敬賢下士賙人之急鄊里訟訴往往為平之既官則就間樂鄉居不切切於仕君其中子也兒時岐嶷異甚授以書竹破氷釋遂儒其冠遊場屋如猛將轢陳辟易莫前驥子一鳴羣馬瘖伏四取鄉書掇如也論者曰是必大臧氏天以報兩翁耶嗚呼不幸死矣君奉親孝事兄鈞謹撫弟鏞姪濟之而教之恩意良篤用是弟姪請鄉書皆有立與朋友敬而信與人節而不固通而不流世之為儒粗能文則狷挑遻世君尤薄之與豫父子遊最厚居連墻往來無間侃侃也以師命某而文筆與小子頡頏後先君微疾而死某時客儀真不及視其屬纊久則歸哭於奠筵而已念之慊然銘以紀其實有以慰君之靈而信將來豫其責亦所以少殺其愧云君生於乾道乙酉四月八日卒於嘉泰壬戌三月五日享年三十八以某年某月某甲子葬於某所娶元氏子一方七嵗女二長適進士胡庠次尚幼其銘曰有茂其姿而嗇其施怛悼唶悲是將曷推不顯其垂視我銘辭吕正將墓志銘正將吕君卒越明年其弟思忠思問擕其孤瓌以母氏梁夫人命持所為君行狀泣謂髙郵陳某先兄不幸其與子遊舊矣敢以墓銘請某惟昔嵗客行都獲交君知之甚悉其見敬愈吾知君不容以不文辭君諱思恭字禮夫東平人世業儒曾祖震娶楊氏通經好文元祐間徙京師蓋有志於學也靖康初南渡家於杭祖安道娶陳氏父興祖今梁夫人其配也幼失其父偕二弟事梁夫人幹蠱外酬應肅給遂推擇而仕積官自承信郎至修武郎職初樞密府屬次親王府次監左騏驥院次樞密院正將不及赴受知當路則徽猷閣待制宋公之瑞顯謨閣直學士樓公鑰內相髙公文虎大著楊公寅尚書劉公德秀左史陳公讜右司林公桷薦揚咨委甚至始梁夫人娠君外祖母夢神擕偉男子闖門翌日君生魁梧豐潤符所夢識者曰是吕氏慶也弱不好弄既長果亢其宗惟以奉親為樂色難志養無所不用其至仕須次不敢逺親夫人未寢不敢退夫人飽食乃甘夫人疾藥物口乃進饘粥手以食嘗病君奉事劬頓幾不救營為細大與二弟孰議則曰於母故罔或敗事治家嚴而不苛紀緒撿押截然也二弟謹守為令族君器度凝重性宇粹溫居官廉勤自將與人交務施而不責報人以匱告多輟已有袖畀之有所豫惟恐其知人或負之輒自責曰某時某事似有愧宜得此行孚於人翕無間然及其卒中外聞見咸痛悼如至親􅂒𨽻二百相弔曰捐當取之金以惠其下寧復公里閭之財際者相告語嘗起母病折劵以利我公叵忘城東民尤孺慕也曰甲辰之疫吾輩不腐胔吾微知之公實生我凡君刑於家媚於官德於人其懿如此然皆自事親之心推之理委也必源其徒然歟君好賢而語上愈於已禮之惟恐失色辭勉子弟以學常誨之吾不得逞於書惟是慊然其令聲懿行乃爾人皆曰是天資媺是固然然孔子於孝必厯言所可移者孟子謂治民信友悅親其本也君之賢吾得之源委也非耶女弟二長適元氏已亡甥二女甥一婚且官皆君力封殖之次適趙氏君娶張氏先君二十四年殁後娶江氏元祐省魁衍之族也子瓌進士女二人長適承信郎張思義次早世君生於紹興庚午四月二十有六日卒於嘉泰改元四月十日將以某年月日葬於錢塘履泰南鄉積慶山之原祔先塋也二弟念兄之切置不食頃子孤立尤所感故為銘曰望之儼乎其容也即之裕乎其洪也宜於官施於人愛而周節而通也遡之源孝之充也嗇於邦家則豐也燕儀斯惟無窮也徐氏墓志銘眀之定海多隱君子其儲德育操家政可法如劉君宜之最其優者究所以致此實內有彊助其配夫人氏之力為多夫人生於慈溪之徐氏歸於劉君有二子二女其孫三其女孫四其曾孫男女三方其在家女德婦儀與性而俱不以矯揉暨為劉氏婦承以順迪以義惎以禮遜延士輯睦鄉閭治生不貪豫人不靳然不害其優裕用能植立門户為持家者表式其遇子若孫嚴毅而不失愛誨誘而不云瀆擇賢師儒授以詩書里之可教而無力者館贍之為子孫友逮今庭蘭侁侁儀觀偉甚儒業有聞皆夫人啓其源自幼至老德日以茂譽望隨之鄉人誨其女必曰盍法是第其族姓必曰劉氏有敬姜焉見貪嗇者必嗤之曰不愧徐夫人乎享年七十有八生以某甲子殁以紹熙壬子十月二日其謝世後劉君幾年而家道益大以治長子某次某未仕長女適某次適某皆先夫人卒某某某孫男也業於郡序孫女長適某自餘與曾孫男女皆幼平生孳孳懋德聞人善奬導之恐不遂耳毁訾之言輒不怡素喜佛書屬纊之際超然而逝若釋氏所記者夫生為鄉曲師殁以夀逺若邇猶曰胡不百年嗚呼真不愧古圗史賢哉某宰是邑其長子某懷經來客久彌敬一日踵門有請將以來年春偕先君合葬於香山之原不可無銘非子尚孰宜為乃為之銘曰婦德豐世道隆備厥躬始以終我銘之詔無窮洪氏孺人墓志銘孺人洪氏某郡某縣人家蓋甲族祖若禰皆有隱德嫁為同郡今房州司理余君澤之妻始其歸君猶從事場屋孺人經理其家務俾得専力於學厯若干年果得祿孺人力為多在夫家克勤撫童𨽻賔祭躬女工寧自約不私所有接親姻無廢禮撫童𨽻不失恩知人緩急周其乏惟力有謀焉畢其忠或有所規警人素敬之以故多樂從淑姿懿行纎悉不遺姑氏寢疾久左右省侍饘粥藥餌非手不進凡枕席濯瀚寒燠起居咸孺人焉是仰凡三嵗無少怠姑屬纊執其手唶曰汝若是吾何憾人以為難舅通直君既鰥處性嚴重孺人侍奉順承不失色蓋十五年暨其卒有庶女二已子撫之為擇佳室以歸伯氏以毁繼殂其室他適其孤二收育其男女雖偕其母往孺人顧恤撫存皆不殊巳生人尤以為不易於其難者饑食渴飲然餘優為之士君子或能之孺人則無愧是足以業家法後佐佑其夫既仕矣推於諸子誨導之諄復備切皆儒其冠駸駸有立其生以某年某月某日年若干為余氏婦享年若干而殁時慶元乙卯三月七日也男四人某女四人長適待補國學生石必簡餘在室孫男四人某方從學孫女四人皆幼將以某年月日協吉葬於里居北原髙蓋山之下孺人未既歸識不識愛敬慕效之司理君居官所孺人家居以殁用是莫不慊焉為之慟司理君父子哀摧痛悼求銘文於豫豫與司理君為寮於房其子某又從豫逰而惎以學嘗答之以書者故不容辭而為之銘銘曰婦儀之秀母道之茂女德之所應有曷不百年以衍厥後彼固存者永世不朽安人曹氏墓志銘安人曹氏婺之東陽人祖某父某隱不仕歸於郭氏為今揚州通判某之妻奉舅姑敬以愛接姒姊穆以順施於中外歸重無間言治家儉勤隨事區處不御以嚴而不爽節度家以益振其所以奉蒸嘗延賔旅必躬親之豐備辦集皆如其志而其自奉取足而巳衣楚楚則歉然耳目玩好若凂焉者至於閭里窮匱賙之無靳色安人兄弟早世母繼逝捐私蓄振之其送終之費一切為辦治其赴義甚勇率如此偕通判公宦遊言未嘗及外事間御童僕嚴且密及倅維揚安人病不克偕語别勉以廉勤諄諄也生於某甲子卒於嘉泰辛酉七月十七日享年六十有四男子三長昌年次昌時季昌宗皆業儒女子四長適成忠郎王觀國次葉浚次應淙皆進士次承節郎趙汝樞孫六人女孫四人尚幼以通判再遇郊恩受今封將以嘉泰癸亥十二月十八日葬於紹興府上虞縣上雲鄉皂李湖順嶼之原求銘於髙郵陳某某通判公之友也宜為銘嗚呼安人在父母側已著淑聞施於夫子婦道以修母道以隆家政紀緒斬斬乎以媚於其官儀於其鄉胡不百年聞見興嘆然安人學釋氏有得其淑質懿行書之皆可無愧賢哉銘曰為婦而婦君子譽處為母而母帉燧繼武自家而鄉有挈其矩善始以終了彼旦暮順嶼之原松茂柏廡亘嵗千百來者燕裕致政朱公墓志銘代人致政朱公既卒之二年其子紱走書吳門謂其里人羅某曰先君襄事有日當有銘捨子誰宜為某不克辭姑次其行業始末公諱某字某撫之臨川人曾祖某大父某考某皆不仕公幼而悟敏學力超邁志未竟考以家務委之細大區處無遺慮家富而行益修親說之謂吾子克家而孝撫一弟謂吾兄視吾猶子其族人稱其洪毅曰嘗陵之不吾較也其鄰里鄉黨賴其訓惠曰頃邑荒政有緒公則主之至減直發所有榖富室取則價為平建東西孰於家受業者赴之待之與其子均蓋其資質淑茂進善纍德得之自然繼以不怠古所謂篤行君子者歟淳熙丙申甲辰慶夀之恩霈再授修職郎夫人陳氏賜冠帔以其子士與鄉薦故有此拜乙巳八月十有六日以微疾卒於正寢享年八十有三子男六人紱綬綺績士紘女一人適進士侯賔王先公五年卒孫男十二人損復之豐之渙之震之謙之漸之兊之益之履之革之升之損早卒豐之亦嘗與鄉書餘方就學孫女十三人長適進士吳廷秀餘未嫁曾孫男二人將以丁未某月某日葬於新豐鄉之奧原某與其子士偕遊場屋故得公為詳嗚呼士抱所有不克時施有淵渟無雨施古今所歎然其裕於躬刑於家孚於鄉足以示規檢無窮使凡為子弟為家景其風將曰九原可作則亦可以自慰銘曰內之充甚粹而醇嗇厥施積諸其身家而鄉罔底於君羡以儲利其後人丁君墓志銘士生世以才若德既其窮達則命存焉君子知人且知天閲古今無怨尤即丁君之初終益信不疑君信之懷玉人樂鄂渚土風因家焉儲德植操輩行古特立士其事親孝其行身謹其持家和而節其知識閭里推其賢服其化頗被其振拯凡士所當有者君優之求所以然蓋由學問出君幼則嗜詩禮工著述奉親應物之暇書不去目從師友四方不憚也如戴公幾先官儀真苖公昌言在秣陵率諸弟從之遊其文新竒渾厚落筆數千言一舉於鄂與弟之煒聫鑣忌者以土著藉口訟而聞罷君怡然不沮而志加勵自淳熙甲午三舉於漕闈皆與計偕則以助邊補授而試然皆屈於春官人為君憤唶不平君若不聞益懋於業為古學計其逺大者家有室舊榜延桂盤薄其中焚香盥沐課未見書詩與氣益昌名與業日隆諭子姪以不倦不息諄諄焉蓋其學有裕其德義不餒益知士之行由問學乎出盡善無議也而不得齒一命以卒惜哉夫積諸身者可及諸物行諸家淑諸鄉閭者可施諸君推諸官而事與理違君子天人之說至此猶置之歟君之卒紹熙二年十一月壬子也享年若干曾祖某祖某父某皆不仕而儒其家收書教子汲汲至君父子而盛四弟某某早世某不仕某見官襄陽娶章氏生三男曰某某某克嗣其業長女適進士江某次適成忠郎趙某將以某年月日祔葬於先君之兆以某與君厚且知之審來求銘銘曰驥也不使馳於千里玉也不使器於璵璠能其人不能其天理則云然其不容沒者世所謂方賢也太孺人王氏墓志銘代人孺人王氏其先有名宰諱肇者起其家繼是登甲乙科蟬聨有人孺人羣從兄弟也占籍撫之崇仁髙祖徙宜黃家焉曾祖及祖日章父徽之孺人早孤隨母饒氏適崇仁之王氏暨笄歸於居士繆公昭字公著孺人在家為淑女既嫁為賢婦訓子持家為令母為慶門中外懷服閭里師仰豈苟然是有德焉而其資質之純詣識趣之髙逺足以行之故也始嫁也繼姑李氏嚴甚不假子婦以辭色孺人獨能得其歡心居士簡淡事不嬰慮孺人區處分畫井井不紊居士既下世則以興起門戶自任治生外延名儒課子孫以書其後薦名禮部相屬也而資産視昔亦三倍增其處骨肉之間特厚聚居千指穆如也無間然者娣姒有寡居者幼稚林立夫人撫愛踰己所生家法整整而待下有恩意凡臧獲一人服役則全家仰食環其廬不自炊者蓋數十室性不嗇於財振貧窶恐不力女之不能嫁喪不葬倚夫人而辦自內之使令外而鄉社不知其幾惠於逺近之人及門無不售之物負劵無必得之誅平生蒸嘗家廟而巳老佛之徒禱祠福報之說一不能入至有所丐請則亦不拒施豫自其天性豈寧惟是舍東樂陂溉田餘二十頃岸善頽業田者病之夫人嵗任修築有田之家坐享全利不與其勞費賙恤之博且果於及人如此性剛明人不敢犯有觸其怒尋亦置之不念也凡簿書出納一過不忘隂陽五行百家之說皆能知其義生於政和之辛卯至紹熙辛亥以終享年八十有一少疾疹耳聰目明生啖寒茹壯者不逮也嵗時為夀子孫後前濟濟侁侁人欣慕之當淳熙甲辰我夀皇上文母夀以其孫嘗與鄉薦封太孺人嵗丙午髙宗皇帝慶八袠加賜冠帔是皆天所以為厚德報非耶夫以富夀康寧加以好德與國慶澤者再寓世可無憾然歿之日不惟子孫戚屬摧毁攀慕而鄉鄰揮涕咸興胡不百年之悲是何從致德之所感而人懷慕有不能忘自然也德偉矣亹亹焉曾未始有其有不幾老氏所謂不德有德者歟男三人漸先夫人三十三年卒次渙洪女三人長適某官羅次進士曾參裔次修職郎前福州閩清主簿羅衛男孫六人長進士驥次謙康仲騤皆鄉貢進士女孫七人長適某官李次進士曾匯越七年卒次進士羅默次進士羅餘次國學生羅勳餘尚幼曾孫五人女四人夫人得疾即自謂不起預言其期既革呼子孫前人為之誨皆可佩服言畢逝矣乃其所期日十二月之丙子也夫人有得於中者超卓如此推之於世有本者固如是哉將以某年某月某甲子葬於所居之水北曾潭之先塋而以銘文見屬某方縻朝紱母氏且老不克歸營襄奉以為大戚謂某捨汝復誰宜為銘夫人於外孫惟某為獨厚不以常兒蓄之某今者謬綴班聫不失其身者思所以報期待也恭惟此恩深重叵酬又其得夫人行實之詳莫吾母若然其所述亦槩舉有不容詳盡者銘曰持之有常無為為之德之盛也望之士君子其猶病也允矣夫人得之安行取之性也刑之鄉本之家侈其慶也曾潭之原松楸鬱然尚百祀之敬也安人張氏埋銘安人髙郵新安里張氏女也歸於同郡陳某里不喜士人始嫁莫不以壻儒為嗤㸃安人獨隂自喜某貧嗜書安人捐所有佐費且幹家政某得以登乙未乙科尉繁昌職吳門教宰明之定海通守房陵安人同食其祿凡二十有四年乃卒始某免白丁安人淡如不改常日問之曰此自吾命何喜陳氏泰於舊安人猶初度也其臨子弟其處室接物婦人應無者不屑為之於儔輩不一小異其佚樂報享亦倍其類生二男子師文師是皆鄉貢進士孫尿扆皆進士封孺人再封安人以某官及格故其生以紹興壬子十一月十一日其歿以慶元戊午三月十四日嵗庚申葬於華村之西原蓋近其父母家云將葬夫陳某乃為之銘於墓之左偏熊氏墓志銘代人夫人熊氏世為撫之樂安縣天夀鄉人既笄歸崇仁吳君某時吳君已授室慕其名德故樂從之吳君有聲於為儒既壯請舍貢數屈於有司唶曰吾自揆可施於國無路以進施諸家可乎夫人譬解且贊之曰翁才德如此顧不遇命也淑諸子可也佐其營理不遺力家遂以饒吳君卒生幾男其三夫人出也繼而異其居所得産薄甚然不以介懷其後家道日益給足享年七十一而終其生以宣和之癸卯其卒以紹興之某甲子其持家鄉人敬慕既殁咸取法焉夫人卓有髙識思遵吳君志篤意教子餘不甚經意每立三子誨以勵業曰汝無以立於世孤先人望非吾子也始其别居僅有米一囷屬親舊擇師果吾愍即豫是粟外此吾無有得師嚴甚三子小遻怒之往往過當夫人喜曰自今吾可無憂用是三子為舉子著名而長子某被某年恩廷試名在第四夫人不靳於財宗族有不給凡老病若吉凶隨多寡賙之已之衣食取不饑寒而已性嚴毅不喜飲酒時召諸婦戒以異姓共處當遵義忍事聞者凛然服行之幼長雍肅嘗嗤世人徼福懴過一諉之佛書所行則多愧胡為耶其言與行率不悖於道法可不謂賢哉陳氏吳君配也生一女適邑人進士繆興時再娶王氏生一男曰某一女適樂安進士周鐔夫人所生長曰某次某某今迪功郎新吉州萬安尉孫男十人某某曾孫三人孫女五人皆幼將以冬十月二十七日歸葬於浮原天寶山下走書行都求銘於里人羅某惟夫人資禀髙邁守之彊行之果其篤於教子古敬姜孟母固應如是而起家應時無一可議不書之無以勵俗且信後故為之銘銘曰炳識以為之原蓄德以培之根以大其門以澤其子孫以善其鄉載之公言孰吾取規敬瞻此天寶之原李公行狀論士以賢古也後世去取以貴若勢果貴勢乎取則淵憲窶人子而季孟師尊至今絀千駟之齊而賢西山餓夫仲尼其私且矯乎士抱負偉然局不少施以歿其庸沒諸吾所以直書李君之行於古或無愧君諱知柔字望之家儀真之珠金沙居郡庠為進士工文辭衆推之晚年定遷城東隅居面江曰兒從學無便於此弟知剛今迪功郎新和州烏江縣主簿花君知彰亦興君同其母二弟與君幼同居長同學怡怡切切始末無間言後異居推其財於二弟為多君篤孝壯且老念親不衰有柴地嵗貯所收専為追逺費一簪不他用孝友之行著矣人以匱乏告視其力賙之咸曰是宜掇危科享上夀為有德報疾作竟不起夀六十八學充矣不得為一命吏聞見者唶惜之既病諗諸子汝曹植立未副吾望貧無以為學士公患汝幸也田足以自業居足以自庇置書愒日吾目不瞑汝不愧名教乎無一語及榮利事結纓易簀於以見先哲所學君之識過人逺甚危惙所言不失其正賢矣哉曾大父某朝奉郎大父某朝散郎父某隱不仕皆葬於儀真之東山母孺人周氏妻楊氏洪都龍圗公之孫女四子長大亨幹蠱為優次大節大鑑皆鄉貢進士幼大異出後弟知剛女三娘四子兄也適馬堯佐孫男六孫女七君生於紹興甲寅嵗之二月五日卒以嘉泰元年正月二十七日葬於楊子縣嗚呼才則見用有則見知士宜然也亦孰知夫用而知之有不盡其燕裕未既也手植三槐者待諸其子李固一代名德其先世豈果抱關𨽻君之不盡者未勝計而其二子取賢書如掇視經史饑餔俯取然其大李氏之門而侈君之澤倚而需可也豫得而併書之江湖長翁集卷三十五
