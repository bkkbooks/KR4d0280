body:
  text: 江湖長翁集巻十三宋陳造撰七言律詩次王仲衡尚書韻着脚功名馬絡頭人生君所㡬居州惟公徳操朱絃直映世氷壺白月秋久已短長㝠尺寸可須骯髒羡伊優即今千里謳謡地贏得揮斤五鳳樓次韻石湖居士晴窻遣興閶門車馬隠晴雷我亦臨風詠快哉平碧際空煙羃歴蔫紅照影水縈回園翁門巷初沾絮遊子杯盤欲薦梅落晚小家還饌客旋篘春瓮取新醅次韻石湖居士遊虎邱山靈知我欲巾車岫幌雲扃已祓除竹葆松幢平几席碧煙紅影認林廬飯分禪供清無敵飲屬詩流興有餘莫話長安牢石客付渠塵土曵長裾寄王仲衡尚書世態翻雲覆雨間令人合眼夢還山生平名義非肝膈嵗晚師門要面顔鷗鷺波寛雖有約鳳凰城近可容閑留年看試調元手未擬安仁賦拙艱贈陳簽判訪陳方關門飲熠熠螢光畧露荷揺揺盃面漲金波受風正作團欒飲閉户深防褦襶過情話想無雲母隔新篇應有雪兒歌揆予可諱劉郎笑講舌長乾鬢自皤京口呈張閤學歸懐未用話南園卧治于今又北門但息兒啼寛上意小稽霆擊取中原虎頭鋭視非無種猘子當觴且勿喧更恐譚公家世事斷無宣勸定驚魂時迓北客故云色辭他日慰凄凉别去吳山楚水長蟻國槐安消㡬夢鶴歸華表恐千霜安排久饜冷宮飲軟語重登君子堂所惜將迎無暇日妨人詩律悟濠梁題成倅小築主人領客竟成遲閑殺林園此叚竒勝日阿蓮須後乗即今佳菊尚東籬肯来雪壁題詩處許繼華堂墮幘時醉後與渠同起舞一庭花影月迷離皇孫夀詩二首寳祚煌煌羡帝祺天潢餘潤到孫枝夀星良月占重見振古熙朝此一時椽筆紀祥芳草頌龍樓開笑正含飴蘿圖况與乾坤永長款三宫奉玉巵曽簉蓬莱挹徳風日親儒保罄寅恭學窮奥閫包賢聖人仰英明肖祖宗綵服近天仍樂孺帝觴拜賜更從容應劉夀語年年事九萬香牋未闕供酬賈學録韻并送炭何人戴目倚錢神更問吾徒拂甑塵醉纈不供詩客眼弊裘應笑廣文貧坐看十日澠為雨遥想千家桂作薪貸子曲身當得句地爐分施臘前春次陳夢錫韻二首薄雪晶瑩壓屋茅未須桂玉計晨庖已便鹽絮明愁眼更喜烏鳶得夜巢小聽騷人賦梁苑旋看春意滿東郊忍寒便擬尋梅去夢想瑶英㸃舊梢思君采艾歎如年眼底羇愁只自煎破夢有来驚剥啄衝泥徑欲跨連錢新篇端復千年計舊集猶須百手傳早晚聚頭三日語麈邊閑聽有源泉次韻朱解元雪掉頭取别未經旬已積胷中㡬斛塵宻雪忽明銀海夜端憂空負玉花春筆驅和氣君何健囊致新詩我未貧勝日兎園當有賦可能客右欠斯人次韻陳夢錫手板夤縁替荷鋤從渠爭挾子公書三年已辦青箱蠧一飽纔分代舍魚煙燼萁爐朝兀兀窻明風霰夜疎疎獨思把酒看君醉墨汁淋浪㸃翠裾約二同年游虎邱兼旬閉户耐寒威起視晴空碧四圍黄鳥啼邊忽游子白龍去後漸單衣年時尚記尋芳約老境仍憐得醉希紅影幽香虎邱路杖藜携酒莫相違次韻陳倅趙宰䨇竹兩君深結此君縁句裏蕭森墮我前筍茁便應欺瑞麥詩成端合付䨇蓮窻間儷影斜新月風處駢梢褭緑煙㑹擬韓公頌連理為渠小輟枕書眠寄王尚書一昨家庭拜帝綸熊轓催去不逡廵小遲繡衮昇元輔復向蓬莱作主人竹馬未迎歡意浹蒲鞭重試敎條新詩賡樂職諸生事筆力誰今斡萬鈞次韻嚴上舎待月尚思前度月中天圓璧不留分即今霜氣挾靈籟如許金波乗壞雲念我吳牛終喘夜憶君冀北忽空羣文炳時已就他館睡魂作魔病作祟猶賴清詩来解紛次韻朱通判嚴上舎蜀莊漂泊闔閭城獨向陶朱意氣傾詩寫閑情易為好雨鏖炎暑欲爭清居同蟻穴晴猶閉歸笑鳩巢老未營久擬投君渠保社援毫空復可憐生君家名酒壓呉城肯向時流取次傾篘玉誰今窺正色班荆渠定賞眞清䨇壺問字寧能許一醉留賔不辦營莫惜驅車餉元亮須防結韈要王生再次韻二首萬手抄詩遍洛城老懐可但向来傾采菱白雪方迭奏蜚雨曉風相與清價重欲輸和氏璧令嚴誰犯伏波營即今貂尾那容續更判工夫費此生子元才望未専城玉面醪敷且細傾寵辱盡捐身外事醺酣聊樂聖之清分甘亦復憐吾老飲濕終慙不自營歸去須君傳此法秫田百畝便平生再次韻後篇戲朱淙淙雨埶欲沈城衮衮辭源亦對傾闢戸渾疑雲氣近誦詩如在玉壺清射知猿臂須穿札陳怯魚麗且閉營只把兩君新句法為歌豐樂詔諸生似聞新醖敵宜城想對簷花又獨傾别乘工為海鯨吸廣文當念露蟬清投醪頻遣春浮頰盗印寧無夜闖營約束長鬚牢閉戸瓮間防有畢先生苦雨再次前韻後詩謝許送酒席蚓堂鼃豈趙城崩空急雨未休傾青秧可復成堅皁碧海渠能受濁清田舎望秋猶萬一官曹需禄更征營寳熏定有回天力即看朝曦指顧生底用詩名到鳳城未妨醉㡌笑欹傾日聞螟臝譏狂率目送鯤鵬簉紫清譚客有時三不對生涯除酒一無營鳴鞭走送君能斷小印親封定好生試院贈三同官八月十二日果飣茶甌意未䦨獨慙衰鬢映朱顔聚頭長作三更語屈指惟餘兩日閑食葉蠶聲行入聽探珠驪頷不應慳預憐朱墨秋宵永咫尺燈窻斷往還歸有日喜作夜燈晨飯棘圍重檻束飛猱鶴在籠敢效騷人悲迫阨秪防舉子誚冬烘摶風定有莊鵬化得雋從知冀馬空明日還家壓新酒菊登金蘂拒霜紅次韻袁提刑勞軍許浦中路風雨方隅咫尺儼威顔窮谷回春不作難渥澤欲隨金節到先聲已失鐡衣寒来時敢憚風将雨泊處仍聽浪巻灘天自與公供壯觀海涵雲物正闌干次韻常孰感舊詩囊隨處紀山川古縣繁雄更海邊按節將春廵甲壘循陔回首記丁年綵衣尚念親三釜芝檢終當嵗九遷移孝為忠賢聖事期公迄反汶陽田次韻犒士萬竈連連儼舊屯朝来喜氣襲人溫固知除器須平日政復投醪亦至恩帝綍函春周壘壁使星回耀照和門文經武緯君王聖汗簡須公紀治原次韻回塗打氷欲遵陸轉頭風日破堅氷未用穿危冒滑行瀚海無波聊整棹陽春有脚莫論程詩情動處髭頻撚使事閒時酒細傾馮問逢迎黄髪叟里間驩意為誰生别趙文卿明府人品推君第一流論文向我肯綢繆日從紅粉追譚笑家置青編紀唱酬轉首各乗鳬背去㡬時同作鳳城游臨風莫道書難寄旅鴈飛還是便郵次韻袁丈知府喜雨使君今代叚荆州指顧為霖旱不憂比屋便令開笑口散人亦復掉吟頭封君擅富寧容數義廩賙貧可待求想閲賀章天更喜津津玉色動凝旒次韻袁憲雪二首犯雪回帆嵗遽殘自憐雨澁更風慳從遊巳落鄒枚後著語渠能季孟間夢逐蜚僊凌色界誰因逋客䕶雲關獨思快目毗陵曉玉襯金波妥錫山塗中壯觀如此天憐梅蘂怯摧殘善後何妨小作慳一雪應期真望外三詩説喜想顔間瑶花已兆食四鬴沉炷為通天九關捲帳盍醻民氣樂蘇臺持酒挹湖山贈趙歩帥出處升沉轉首非無端顛倒念分違瘦羊博士尚骨立白馬將軍今肉飛共仰鈎陳明帝極少須尺箠下金微為公草罷平羌檄徑指淮鄉舊釣磯壯觀亭為真州作頻年入夢此躋攀驟覺平時氣象還呉客到應忘月觀淮鄉勝不數平山飛檐曲檻霄霏處疊嶂横江几席間見説能詩好賔主風雷落筆每乗閑次韻呉江陳學長送行二首詩人六十合恩袍平日周庠重譽髦舊學堪重漢儒席新文欲僕楚人騷等觀得䘮心無累飽閲豪英眼更高聞道青箱富嘉頌詔音早晩召王褒白首詩書未亢宗還紆墨綬揖王公玉堂金馬拌身外法䕶僧彌且眼中自詭噓枯醻雅志肯從束濕就竒功垂虹高士知心客定信襟期出處同次韻張丞月試士人居有齋庖敎有官諸生肯復計安閑充庭數貢知非逺造物于人本不慳思苦得無金注拙眼明終眩錦花斑自憐慣秉雌黄筆案牘如今拄屋山次韻答張丞顧省辭華分槁乾簿書堆裏作麄官客懐止飲仍多病海氣乗秋早戒寒好語相濡真禁臠不才持答欠琅玕從今惡況能排遣日課君詩一再觀次韻張丞二首夫君腹笥盡竒謀每叩談鋒聽不休誦賦久嗟無此作薦賢端合拔其尤小遲榮路觀掀趠聊為同寮葢謬悠政恐諸公有推挽平時果藝仰由求槁梧閑據自沈吟投老真成負此心酒沃渇鯨悲事往官隨跛鼈笑吾今進為終愧周人朴歸去曽無陸子金尚賴君詩慰牢落時清聾聵發純音再次韻二首銅墨才為一飽謀還因跋疐賦休休南州習俗難馴擾北客迂疎易悔尤世味辰星今落落歸心風斾正悠悠知非況自五十九為問衰翁底更求自揖高人擁鼻吟湖濵詩酒便論心天敎聨綬同民社日許挑燈訂古今刺眼未妨飜著韈躍爐寜問不祥金簡編自有千年計遲子追還正始音次韻周秀才暇日枝笻對揺落衰年悲感為誰多政疎里俗有囁呫身逺貴遊無孰何耐病阻陪吹帽醉祛愁聊復擊罇歌詩来起我湖海興夢逐狎鷗分白波正覺寺細穿詰曲上高寒一鷲青冥杳靄間欄楯欹浮滄海影東南重見紫金山方壺入眼鯨堪跨璧月依人桂易攀聞説老禪佳寢飯一生無夢落塵寰次韻張丞邦人邑吏總堪憐茶供爐熏共籲天占雨㡬孤霞粲曉望霓何啻日為年翻黄已熟村村麥平渌行看處處田擬倩龍公作霖手更煩終恵息頭燃諺云朝霞不出門近頻有此亦復不驗故云次韻任解元喜雨二首寄語今年主雨神當知小雨未康屯人心正切霶𩃱望農事深愁晼晚春朽壤舊嘗封蟻穴停雲空復疊魚鱗鯫生宿蘊天人學無計王前拜手陳俗謂魚鱗天必雨跪奉爐香幸見憐人言匹庶可回天及今一覩盆傾埶滿意重占斗覆年僅息黄塵昏永晝㡬時翠羽冒中田此心安得頑如石水旱豐凶付偶然次韻陳秀才二首其父在獄有詩哀鳴為弛其禁作此答之吏治因循俗巳疵可無柱後濟寛慈顧慙徳化一何取敢意古人三不欺剔蠧方圖洗熏染放麑端復惎衰遲成君今叚莱衣笑莫更風前賦百罹七字開緘粲陸離元非劒氣爥圜扉夜光信出老蚌殻錦叚遽分鄰女機庭賦繼今行北闕市娼過眼忽南威蜚騰可但榮親計我亦他年得儁歸元日爆竹聲中雜笑呼斗杓插海寺鐘初椒觴帶夢隨小飲桃板得詩仍自書愒日晚塗知内訟占風吉卜定非虚新年舊管新収累大府隆寛儻貸予次韻張丞是日忽晴縣人燈夕舊嘗看夜敞窻扉曉不關勝賞繼應追俗尚晴暉巧與破天慳招邀便擬日復日容易遽吟山上山更乞紫姑豐樂語為添喜色到顔間張計為越行再次韻長日官曹迄未閑佳辰一笑頗相關萬情同樂那容失四者来并每坐慳歌酒恐孤燈市月煙霏猶曀海門山龍公可復㑹事發汛掃隂霾彈指間再次韻末燈夕張丞送詩再往返矣十四日丞飲借三妓遣往好時好節工惱客投老祗思深閉關鶴膝痛醫終是病蛾眉公奪豈容慳浩歌已減落梅曲苦思更妨頹醉山冷語陋姝何所似貧家矮屋劣成間十四夜丞和章来復次韻是夕隂無月衰年寢食僧齋似甚欲持盃解入關桂魄元非月蛾靳韮葅終笑庾郎慳不成小醉穿燈市又作相逢嘲飯山思澁徒貽山婦怪羡渠飛雉落黄間十六夜張丞有詩次韻燈夕勝遊皆遻意可無謌酒答豐年雲藏玉斧重修月樂奏壺􅋖小隠天鴈陣低空危欲墮龍公驅雨未成眠惟應鐡鎻銀花句落紙明朝萬口傳張丞再有詩次韻仰高排奡玩清圓學力卑摧舊判年後進或夸金擲地前修猶是斗横天晚規省語安衰病暇復分題攪醉眠秪有君詩追古作未忘緗素遣兒傳再次張丞韻十六日作假風狂雨横無聊就枕復作龍職隂晴肯轉圜寒侵春事倍常年彌旬稔聽盆翻雨一室何殊甕裏天多病可堪嚴酒戒高舂未憗枕書眠忘憂蠲忿疑無䇿小草論功亦浪傳次韻王簽判奥學聞君不近名聲華猶是壓時英詩篇向我肯揮掃句法驚人渾老成未厭泛蓮依衞幕只今薦鶚達周京明朝置酒當投轄萬斛洪源看倒傾次韻自序丁年拾芥視功名可但紉蘭茹落英深愧官曹無所補向来志願㡬餘成分營伏臘耕淮壤久絶音郵到帝京尚有好賢餘習在老懐端合向君傾次韻戰艦下瀨千艘舊擅名漢家虓將况飛英呼韓欵渭人胥後小耿平齊事竟成擊楫定無違廟筭覆盂端有奠神京聖君動静天人合持滿何妨亦定傾次韻招飯不赴吏能儒業實慙名晚喜論交葢代英千里久勞魂夢往一歡猶阻咄嗟成粲花論勝違頻聽擊鉢詩工况莫京别後槱溪縈望眼此心川水漫東傾即事江漾晨光入縣門樓斜晩影到漁村海聲不為無風静山色居常帶霧昏問俗即今防愒日来時撫事錯銷魂浮生寄寓君恩重未覺天涯異故園勞農淨居贈皎啓二僧勞農今喜復南轅夾道扶擕亦笑諠縣尹庶㡬無疾病山人迎送耐頻煩芼葱湯餅聊堪飽出瓮春醪半帶渾惟有為民真實意異時陳迹付公言題林監税漁鄉小樓半是蜚軒半是樓主人雅趣寄滄州晨霞莫靄紛濃淡越舶畨檣閲去留徙倚想君舒醉眼從容須我掉吟頭病来止酒便髙卧㡬夢煙波沒白鷗九日登樓海上重陽率多風雨邑寄罷飲作縣曹逢節猶忙迫隂雨乗秋每接連九日歡娛異前日㡬年晴霽有今年湖山入座褰珠箔茰菊挼香薦玉船㡌委西風判一醉故人應未笑華顛鑑湖道中風煙佳處放歸橈吟坐篷牕首屢搔萬壑千巖争獻狀三江九堰自忘勞尚多菡蓞張秋錦少待蟾蜍印夜濤繚碧森青誰子宅未容載酒訪清高言懐二首此身與世分相違可是平生不見㡬知己方占白雞夢寸心已傍碧山飛周旋觴詠須三益斟酌行藏欠一歸甓社湖西隠君子為翁應掃釣魚磯自是三生賀季真亟應收拾水雲身蜚鳬吏隠聊同俗飯犢生涯且耐貧林壑風煙當未憗利名韁鎻聽横陳世間静者猶張邴老境婆娑定笑人贈陳居士居士不娶居林氏樓與一神童處敎而成昏宦冥冥墮急流羡君高謝此籠囚能詩似是林和靖博古寧慙許散愁上藥化金纔頃刻虚舟觸物信沉浮何時我亦休官去對卧元龍百尺樓次諸公韻歸髙郵張守即日招飲次韻謝之回首舟飡野店棲何殊子美詠青泥朅来賢將先回眄徑上詩壇許命題舉白爛陪山簡醉凝香到有武陵迷異時過計今方悔曽慮談間彼子西對雪小吟次前韻時使君留嚴文炳偕師文飲翻鴉啅鵲瞑争棲舞絮郊原雪氷泥已綴瓏璁分檜栢併揚光彩賁欀題撚鬚句好無前勇索酒人歸有後迷客子鬢毛今愧此忍寒挾䇿市橋西再次韻謝張守得新居得巢歸翼愜卑棲尚巻風茅落凍泥病樹縁階旋培植舊書堆案細籖題地非新野聊龍卧人似東屯賸客迷身世只今供冷笑百川東注月行西再次韻呈張守烏衣雛燕正依棲又見南風逓赤泥宣室殊恩子夜對天章清問御書題可無上藥蠲民瘼有待司南覺世迷好在論功繼臯益毋庸問管凟曽西再次韻朋舊攜持過陋棲炊香瀹雪鱠拖泥酒澆礧磈聊娛老詩愬酸寒最切題種秫集功今有約對棋銷日不嫌迷千奴别去平安否時欲拏舟甓社西聞盱眙北使信感事再次韻漠北陰山合故棲函關底限一丸泥幄中已辦吞青海甲外寧惟馘白題犂老上庭煩指顧笞中行背問顛迷提封舊物渠須計一候鞮汗更向西雪晴再次韻璇穹瑩澈晴風後曉日初融陌路泥老檜蒼筠濳動色迎春送臘好分題藏春僧閤心曽戀闖海山亭夢到迷回首桑隂三宿舊鄮城東去虎存西對客再次韻客来一笑同鄉味便粉秋菰雪藕泥糟浥子薑仍舊法籠緘乾笋儼新題白魚紫蠏空濡沫窘兎驚麋想碭迷自揣臞儒合蔬糲放麑終恐愧巴西述懐再次韻髙車駟馬笑雞棲亦笑餔糟與汨泥魯酒得間聊復飲晉輿投老偶然題春氷自水収新悟雨矢無鄉悔舊迷尚有平生山水癖未妨遊戯向京西江湖長翁集巻十三
