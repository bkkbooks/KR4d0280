body:
  text: 江湖長翁集巻三宋陳造撰五言古詩三月初晚晴寄髙縉之三首東風掃積隂殘雨不敢漂壊雲裂裳帛倒掛隥嶺腰鳥影不作瞑夕陽眀山椒安得上上頭風露永清宵人家繡閨閑湖上粧面新湖山簫鼓中魚鳥安得馴山靈建飛雨淨洗綺羅塵即今隄邊柳為誰管殘春曲欄倚青㝠萬井入指顧湖光漾明霞照我凭欄處森木倦鳥歸遥空征鴻度定知待月人破竹有竒句苦雨有足不下樓有耳秪聽雨一日不可耐忽忽彌旬所軒蓋斷還往尸居成獨語日色似見慰雲氣復如許西湖梅柳月裘馬趂簫鼔細追他日夢一笑念縳虎再用前韻贈髙縉之三首晴色與春違香紅不餘漂出郭縱逺目草長麥齊腰詩來慰幽獨吮諷芬蘭椒招月作三益庶用娯中宵閉門雨兩月君來無舊新白眼睨牢石騫飛不受馴落落含風松紛紛棲睫塵慚非脩月手向君和陽春髙郎客京華好事有左顧儒林丈人行乃得曵裾處亦知短褐底藴抱美無度繼今數公間可但傳新句謝袁起巖使君借貢院居以簡齋詩一凉恩到骨為韻書生歎漂流卜築定何日折腰為斗升問舍羡九一諸公有好事往往遂所乞懸知許黔突當復念容膝火雲烘白晝悠悠晝日長黄塵撲面去行客汗反漿老夫清夢起開巻鉤北窓微風入巾袂世恐無此凉久晴忽一雨為洗暑氣煩斯人作欣慼造物無怨恩我方墮窮塗獨能庇寒暄公亦不自徳自笑煩於言槃簿蕭寺中永歎無客到吾室自勃谿粗免以饑告及此䕃寛閒好風日見勞安得長者車茶餅寫襟抱槐龍舞脩影頹景忽西沒空庭漾金波坐待月東出臨風思傳觴沃此支離骨開門拜嘉恵正得杯中物是日鹽車送酒人適至寄題徐虞卿醒心亭人間聲利場疾馳不知反營營計毫末一益昩百損徐侯大雅士探道自其本䇿勲虚明地外累不待遣出能同光塵歸念寄蕭散著亭得勝處竹茂水清淺亭中眎亭外畏塗塵眯眼翛然得此心萬化無餘藴老我尚問津人與室俱逺向來卜鄰計欲舞嘆袖短㑹當尋此盟蔬飯同茗椀洒落無何遊共閲世沈湎昔嘗託虞卿買屋丹陽價髙不果餘姚飯昨暮浴上虞今晨飯餘姚官期有餘日我行得逍遥盤實剥芡芰羮魚薦蘭椒一飽老人事茗飲亦復聊捫腹每自愧昔賢尚簞瓢僧垣棲翠微金碧煥山椒龍泓甘可茹塔鈴如見招遲留本不惡况復待晩潮車堰牛牛力輕萬鈞性順異諸畜有足不解踶有角不皆觸課日引耒耜為人給榖粟私家憂闕食公家要餘蓄公私雖相須置汝誰取足柰何過堰客行舟動千斛挽牽亦諉汝贔屭頸髀縮扣角一勞之不語對以腹物生愧無用懐安或非福於人儻有益厪身豈云酷君看廟前牲被繡飽蒭菽膏血薦鼎俎誰定悲觳觫舟行即事昨日出曹娥明日指慈溪待潮舟為膠得潮舟若蜚留滯復一快計程元不遲人生意失得孰者乗除之今屈昔已伸彼贏此或虧但可自適適尚用悲喜為水伯愚弄人政如造物兒丈夫木作腸渠輩未易知饑寄定海交代縣尹古子男今不一錢直低催奉簡書偵伺常屏息白簡與按章嵗月供彈劾當路雖所懼姦民巧狙撃吻間售蜂蠆意外變白黒防虞莫救過彌縫或逃謫政使有卓魯未容置形迹云何世難事君不動聲色編民翕風移惡少且心革田廬有笑歌魑魅亦竄匿斯人紀仁愛幾磨南山石政聲懿如此僅免繩治厄諸公蜚鶚書犯嚴尚遺力安得定海民為君灑薦墨蘭臺傳循吏採訪多失實安得定海人為君秉直筆嗟我吏隱者志在山南北身名萬金重如博試此擲賴今遺愛地一一可矜式政恐效西子美顰得謿劇江臯一樽酒聊挽朝天客妙樂喧江浪清譚倒理窟盟言底遽寒舟駛潮水急西望念風義感歎徒至骨復呉祕正五詩以識子用心苦為韻武陵邁往氣當世隱一敵揚眉諸公間甘作遷客客裔孫典刑在磊落抱深識我學謝柳州顧肯睨門席簿書阻從遊人逺嗟室邇胥徒恠坐忙眉睫若為喜方𢋫于蒍于忽誦子虚子悠然得此心外累蚊過耳我如不材材自誑無用用向來風月前詩筆頗吟弄低摧髪皓白無與世輕重枯株欲丹黄因君彌自訟作宰古尚教宓齊但横琴唐吏猶易為讀書或松林一從來海瀕琴書暗塵侵俗有古今異鞭扑違寸心君詩用功深平處猶近古北斗燦繁星拜賜詫兒女亦思貂可續中夜攪肺腑攬鬚粲一笑笑翁祗自苦張丞見和次韻荅之中年賦逺遊羣僊謂匹敵朅來吏海隅笑死鶴背客昔人混屠酤不取俗眼識惟應赤城老黙許分半席故人十年别墻宇今密邇譚勝復詩工排日有驩喜所嗟連城璧過詫窶人子何况政術疎一一賴提耳我本山林人娯老有日用時須禽一戲暇乃笛三弄言償作縣責顧敢寳所重催科未妨拙防速牙角訟張陳舊莫逆雅趣瑟和琴器用異所宜渠觀與山林朝來覽鏡笑鬢雪無可侵但辦摩衰眼送君立班心男兒鼎珍食富貴倚稽古不然東山車穩載十眉女可憐强項令俗塵塞腸腑端如溧陽尉老訴食薺苦送李象山趨朝二首象山海邑古稱象山郡今聽李明府言頗亦費支梧故云人将宰象山蕭散目郎署即今撥煩手蓄縮殆難措鄰分銅鐵名恐坐汙染故髯君千日留曾無疾頑怒徳孚俗風動政洽民孺慕過虞櫝中毁穩下竿頭歩定川壮哉縣瞢不揣鯫腐虎鬚有危攬羊腸無善御彼此劇易間霄壤計相去滿懐血指羞乏君斵輪具鄰輝幾餘分忽復失强助歸舟不可挽臨風悄延佇書肘詎容掣箏柱不可膠付事多其防職業自寂寥頗思圓機士細苛舉綱條宰邑古難之茹苦耐煎熬百抑不一揚推波益驚濤由來法愈密秪為下所操一饑驅我出銅墨强折腰捩翅著籠中側睨鵬冲霄平生有知已持槖貳銓曹君來定倒屣道我不自聊願推變通術霧雨均枯焦而况代舍舊肯惜引手勞遊慈溪龍虎軒軒有石湖碑字如新刻坐曹可勝勞出郭復行役半年定海令三度慈溪客慈溪足勝處山秀江繚碧終然縈夢寐遑此事遊厯髙軒閟龍虎表表市闤側得興不暇慵徙倚且數刻洞戸初推敲階除旋登陟向來攫怒勢枯幹抱頑石乃知名實間未易膠今昔尚喜詩翁碑不受蒼蘚蝕可但神所護人未忘翁徳非使老眼明斯遊竟無得十二月二十六日趨府誰謂一舍逺不辦三飡趨亭午縣市西衙鼓府城隅匹馬驚鳥去指槌氷在須北風挾霜氣萬象付摧枯想當折琴絃未怪裂人膚駞裘被甲如是日有若無客首不暇回顧容少踟躇出處不能同勞逸為之殊龎翁馬少游似非隠者徒鄉居老躬耕飽温得自娛婆娑銅墨間盍亦省頭顱蓘穮脱中孰吾口良易餬十二月二十七日趨慈溪既到更盡則同官以新帥夜過狼狽而還予念從者寒且勞獨留宿西風蜚江浪江畔那容立霰花濺千尺望望客衣濕小舟艤兩三人已鵞鴈集側睨波洶洶俯憐身岌岌乗凌玩掀舞生死付呼吸前登為回首舟重巾􅋾􅋾支徑不通車車去如見縶念此役夫苦體我官事急傍顧中夜還得無僵仆泣畀汝就甘寢白飯亦周給徇人多意外自信寧不及利物身每輕睡覺况六十次韻王省幹王以懐君想報珠作詩見遺南橘合嘉頌為枳縁踰淮黄濁轉眼涸一昨瀰兩涯志士抱根柢千古容興懐後生事蟲篆蟻穴鏖檀槐一官初有禄三月免無君平時愛人學蘄試百一分習俗南北異所見違所聞致化要無倦儒者貴長文王侯文振竒人作髙山仰世學方波頽渠獨不流蕩諸生畏雄驁六藝厚涵養遥知落詩筆髙像寄逸想叔也過我門往往接䍦倒惎以元亮止終然劉伶禱我此待鶱翔夫合戒陵傲惰遊置耕耘曷怨鹵莽報大匠成風手器就不待模老夫黙自哂堆豗守一隅論交獨何幸魚目儷明珠他年君鄰墻作意營一區次韻張丞政平民安之不在書上考君看道傍樗蒼雲䕃合抱明時話英躔佳氣指蓬島孰知嵌巖幽乃韞希代寳張侯儒而吏笞箠環臺皁政聲載輿論文價動諸老學富食猶貧志堅進不早即今紫霄人豈必皆横草亦知名煒燁曽上薦士表静女家無媒深閨自媚好胡寧倚昌丰濃抹且淡掃㑹看邢娥前妬婦付絶倒謝制帥髙卿剡四首宰邑非良才朴拙瞢信已曽無補毫髮粗不畏首尾倚公造物手襲璧護玷毁世有百謫餘觀旁首重稽薦書未及門啅鵲拂人衣盥手衮字褒祗遣顔忸怩瑕瑜僅相償葑菲終不遺窮途石作腸持用荅恩私去年來甬東旄倪喜動色公今畫船西行路亦嗟惜去來本何心民自作欣慼達人了世縁八極付揮斥論世究徳業先生處其全谹議可斷國餘功猶護邊此行雖暫屈衮職正急賢璽書起黄霸摩眼待新年次韻張守不欺堂鄉守張仲思以不欺不擾堂二詩見寄求和為次韻使君古醇儒内視保良貴芸芸鏡中影了莫遁情偽賦芧豈至術機灌彼誰子退食一堂間百事反諸已床敷但詩巻庭砌亦屐齒洞洞靈府閑拳拳聖言畏獨傳迂叟印不作俯仰愧何當拾級前拱坐商略是謦欬付元城歸詠如闕里從俗倦執熱得意風雨㑹元城問迂叟學誠所入叟云自不妄語入次韻不擾堂取民狼走羊勝之楚克庸孰知號召初已賦大小東賢侯守此道力若㧞山雄深堂玩閴寂翠影環䝉籠泛應得天遊靜鎮副上衷樂知前池魚吟當北窓風情寄埃壒外俗自和氣中髙吟與傑作鏗谹而舂容無欲民自朴契鑰今古同即今美化孚袖手自即功坐令鞭蒲捐寧遣馬力窮我心偕郡人㑹當志願從新年鋒車南帝渥看稠重政聲頴川上可庸不作公時予宰定海未識君宿雲巖山是夜大雨名山邦域中每歎夢境隔如何夏而春共苦沽水厄向來夢中山真作縁雲升夜氣與僧話凛凛氷壺清初宵潺淙聲大慰望霓意睡醒鐘魚鳴猶是翻盆勢不因官事驅寧許山門留况今浴種天頓釋嗣嵗憂雨既副我禱山亦入吾手一旦二喜并誰謂終不偶渉世嗟聱牙天頗憐其窮更持靈臺香歸謝淵徳龍定海有淵德觀祈雨所也李伯成食甘豆粥和淵明詩分寄次韻八珍較半菽豐悴岐兩端志士傃所逢心泰體亦安李侯貧食粥吾獨於此觀竈婦不餘顰鄰劵有後還顔帖孰嗣之范叔可勝寒破碓砂瓶前蘭佩雜木難堂堂五字律鋩鍔凛莫干不羡侏儒飽寧追陋巷顔挈瓶肯見分特特扣荆闗讀詩良起予投匕忘悲歎次韻解樞幹二首我方首儒冠頗亦易此人尚友卑自漢讀書考先秦士或暗鄭朴識面蘄卜鄰計疎志空勤敝帚浪自珍口前齊東語瞢欲潤帝綸學如村社醖百醨間一醇老蘖媚衰紅飽閲姚魏春顧慚誤題品五字極清新君才允文武行矣拱帝宸余年念桑榆歸去儕編民阿文鈍于學莫計故新年向微他山錯詎徹醯瓮天論交置才否如君政自賢為導有源水俾加視後鞭譬彼千仞登投足得攀縁君生英衛家造詣超儒先餘論分吾兒一一當手編繄我液􅀈木卧沙不受鐫鵲音曉見諗羣玉紛墮前政使髙帋價敢蘄世儒傳題張仲思孝友堂筆端吐陽春胸次著雲夢袖中匠石斤規矩隨意中君侯道藝樂不許俗子共深堂埃壒外平日文字供黙對八窓靜不但十年種妙語落人間一一萬金重平反與進脩併作㫖甘奉只今衣五綵頗亦笛三弄何人侍板輿觴豆燕羣從鴒原春事繁鴈影天宇空傍睨梟雉呼或作鄒魯閧紛紛手翻覆納納腹空洞汲直合居中器博滯近用初計㧞薤來竟息憇棠訟翛然擁書坐竹風助吟諷更聽雛鳳鳴未妨蜚鴻送今皇志復古俗有後賔貢斯文屬耆儒夏屋况巨棟江漢繼崧髙誰當第嘉誦縣知尹吉甫縮手辟張仲次韻嚴文炳暫别歸呉門且堅仲春歸來之約白駒縶維之君乃再嵗住政如荷蓧翁鷄黍止季路得句推敲餘每肯向予吐平生識丁字頗亦指佳處只今妙著述詎云工訓故東陸方播和南雲遽回頋似聞漢諸公交口河東賦挽袖不轉頭歘作翩鴻去郡舍雖舊約侯門有晚遇可忘酒招攜况識棋勝負老景樂事稀春意駿足騖無令歸驂前怒風鏖花絮再用才子富文華校讐天禄閣韻贈周教授仙人藤隂夢金骨窖黄埃當年晁張䨇縮手推其才陳編且千載萬蟄聽春雷偕公閑弔古文遊但荒臺歩屧城脚園蒼官拱緑士向來錦打圍轉首就紛委流光不貸客感喟中夜起肝腸舊輪囷言賦子虚子胸涵陽秋筆眼髙古今宙周子定可人萬象棲一咮眇睨紈綺郎自詭多文富世有九鼎珍唾去不渠嗅窮途有快意辟席得異聞青天千萬里翳日帶煙雲今者君子後滿窺崔蔡文當此陣堂堂歎我提孤軍矻矻守枯䇿頭童未起家居陋婦勃豀食貧兒讙譁養髙有驁岸戰勝無紛華黔浴如可移誰辨鵠與鴉徇物笑蠻觸自守等毅豹寸壤聞蚓吟九萬觀鵬踔孰知塵外士戴目嬾此校營營彼誰子磔蝟計微效審知才非充敢怨言不讐進乃隔九虎退且辦十牛向非食不足此檄當徑投黄馘漁樵翁揣分吾其儔君家小阿韞擇壻須才賢我家小於莵披霧欲窺天鵲語燈著花妙契黙有傳何當珠簾外綵絲自相聨萬木同一秋松栢正也獨夫君閲流俗塵過不留目我昔甘曵裾低首問宜禄及今君子前玩易愧頻復假板未通班此氣渠容索周友萬巻腹小却石渠閣培學虎出翼息妄眼蜕膜何當去為霜萬壑正枯涸别俞君任通判三首客舍不宜久黄塵翳衣纓非君此解后孰使老眼明握手雜談笑洗醆共濁清已燼銅爐煙倐聽丙夜更清詩相勞苦凛然見髙情珠璧眩璀璨珩璜競鎗鏗寧惟老眼明亦使病骨輕語離信所重未敢促歸程一代石湖翁韓歐或其儗當時出門下如君屈幾指論定難為才我乃輩多士椎成方未器正賴君礲砥師友繫魂夢栩栩輙千里驚見得此客乾鵲預為喜一笑破千憂天幸寧有此石湖倐眼中此翁真不死房陵望毗陵計舍六十餘今我從逺役羡君方逸居逸勞不足道㑹合嗟愈疎向來江南北二年能幾書殘山賸水地詩題當不虚得句茹不吐思君定愁予遡江日千里豈無紅尾魚交情儻未忘與問今何如書隱靜寺壁丙申秋入隠靜未到雨甚苦行既到遽晴迫官事即去感而作籃輿初半塗飛雨欲無路到山臂屈伸赫日照窓戸山靈太孤介深厭俗塵汙雨似難客來晴似推客去書生林泉意此癖端有素俛眉紅塵中正以五斗故堇堇三徑資渠須畢婚娶出既非得已歸亦奚早莫他年五湖舟何殊一杯渡巻舒吾自由誰招復誰拒贈臧文仲四首青山玉所藴下此翠鳳雙音含古韶濩身非世文章衆羽不敢睨謂是聖時祥有人摩老眼側佇雲路翔夫君根柢學宜我屢即之罷馬取長道顧肯過我為索寳黔婁家怪君焉取斯頗嘗見此客且用詫吾兒理以定故明用智或成疎芸芸自根求一一皆我儲饑糒渇須漿水固不宜車請君黙自燭是物誰欠餘始吾泛其觀中吾固其守拳拳寳所重世或輕敝帚廐馬我所師家鷄誰得有此心如此用煩君訂是否戒飲三詩并叙予中年病于酒以飲自誓謂不當自賊亦不以賊人飲客多寡聽自酌人皆笑之然向病脱然客亦未始因吾病臧子子儀獨不見笑且曰某不能飲見虐以酒輙病求予言曉客因信筆申其戒古人之詩語工而意婉使人思而得之思而得故得之深守之固後山秀骨畫眉是也吾亟欲為臧子益故直書而詳為之言不暇為前人也子其識之毒痛痛受辛斬刈憎暴秦杜康與儀狄賊物其罪均商毒烈火炎岐鎬方陽春秦暴虓虎摶歐粤無顰呻二子起酒禍古今同湛身計實乃鴆葛適口良甘醇文錦覆深穽病媒鬼之隣劋殺不遺迹辛政猶為仁今子知所戒薄俗豈其倫生世千金軀况復富席珍中古避世者或以飲自名世網未易脱顛眩寧其情嗟哉竹林子嚌茹日瓶甖時既謝周漢顧肯羡久生中聖憐徐邈種秫想淵明卯金當塗髙委質吾顔頳偕我偶盛時生亦未易輕况子淑茂資天驥趣脩程論才應時須挺志為親榮親言銘肺肝盍師陶士衡自我銘盤盂覆盃逺麴糵人或安清脩身亦享黄髪柰何悠悠者沈酗無虚日言之每逢怒周誥存苦闕狂悖貽世戒氣血瞢中竭持觴勸客意彼肯獨夭折投轄車鈐頸抽腸擢其骨交遊多若人自重要勇决闗須太虚閉交繼叔夜絶毋興聖賢悲濡首右臂折司馬子如飲孫搴搴即死髙歡謂折我右手邵伯阻風小泊贈送行諸公長征每愛日小泊未遻意隂風自南北客子聽軒輊召棠望吾鄉不作秦越異船閣鴈鶩洲人穿魚蝦市相逢各呉語知識十三四水實不自買海錯有佳饋餞行餘十客超俗見友義笑譚寒谷春為我洗羇思相與卧玉瓶䟦燭得微醉老懐易作惡别語毋動喙次韻丁判院丁方謀保職官丁侯袖詩來容聽媧皇絃咀嚼氷齒頰如漱錫谷泉露花有餘姿風漪自成紋中含班傳香夐絶郊島寒汗流竟後塵何有一字難明月墮我側盥誦喜欲顛因君念漂零俛仰追昔年門間半面初隄柳嘶晚蟬寒暑機不停奔騖履欲穿客舍此相遇把酒霜鴻天男兒氣干霄猶受稠人憐似聞國士遇度外置拘攣渠信造物兒賦予終竒偏凌風謝垢濁仙者一探丸多肉彼下乗更趠驊騮前我老從斗禄纎鱗潜重淵饑火少見貸歸志久已堅自甘尺蠖屈何與風鵬搴㑹看鶚書薦領此雲錦篇從今拭病目長風駕蜚翰泊瓜歩擁衾迎鑾曉艤楫瓜歩夜問俗鄉音轉束緼野宿乍去家倐兼旬取道逾三舍江神雖世情羇客忍陵藉初趂風色好忽復㠶席卸泊舟市區外繫纜古柳下遥聽波浪湧未息妻孥怕譙翁身世拙衷貨迄未價榮望絶臺閣歸計盍桑柘男兒四方志肯與衰鬢謝古人出處間分取世俗訝呼酒把譚麈捫虱復王伯魏帝廟佛貍嵗未卯志欲吞宇縣當年江飲馬腥血浸淮甸無人飯耕牛有井巢歸燕至今閲遺史為汝空飲恨緬想瓜歩留殺氣纒呉分云何此山椒遺像儼髙殿無乃甘事讐呉俗昧所見或復綿厯久後嗣忘敵怨㝠漠彼有識福汝吾敢信君看趙與薛狥國冒禍釁魏侯繼前躅長呼死白刃胡不尸祝之香火均逺近豈但祈神休抑使頑懦奮誰今决從違引手適我願趙侯立薛侯慶魏侯勝皆淮南死事将也長蘆寺二首梁帝號用儒顧有佞佛癖區區泥其粗佛者寧汝即矯矯隻履翁談妙塵可析冀上一言契何意水投石瓶錫翩然逝北去甘面壁有道惡驚世應俗肯留迹一時起誕罔千載受誑惑至今利渉地傳流何荒惚渡江一葦爾古今尚遺植紛紛捕影徒唱一和者百逺渡有浮杯行空或飛錫至人果善幻幾何異鬼蜮世人墮邪蔽狥虚不計實我學謝傳韓艤舟重唶唧昔年望長蘆去江逾百歩垣宇呀已缺浮圖欹欲仆僧徒噬肯留日有沉溺懼重來舒望眼佛刹非故處安衆得亢爽定遷醻夙素似聞瓶錫侣復作醯蚋聚居人禱蠶麥行客乞泉布營者肆夸侈施者不顧慮百堵煥金碧奚翅復其故往往豪儁人四壁有未具彼徒創寺意取鎮湍濤怒向來梵唄所倐為蛟螭據在已不自保誘俗説依怙波流置不省此理吾未諭泊龍灣闕沙觜沙外仍奔湍是間以龍名信乃龍所蟠浮煙澹寒鑑斷岸圍清瀾孰知面埶要中有水府寛我來艤倦楫天水夜茫漫狂飈吼薄暮驚浪摧舊灘鯨鱣碭厥居渡鳥垂羽翰孰睡不知曉夢次聞平安龍公自兼愛况此行路難何以荅神休幽佩紉蘅蘭龍灣看初日江聲夜寂絶江霧曉空濛亂霞映淡日隱隱空濛中羲馭巧呈瑞不與他時同烱然玉奩靜泛此瑛盤紅分明三足烏依微絳綃䝉曾穹歛氛曀幽壑舞魚龍昇從海僊府光射河伯宫遥想麗帝闕佳氣正鬱䓤鸞鷺同虎拜三呼并神嵩散人得壮觀醉約持釣翁舟中除夜老境閲流光翩若下坂車除夜更深念繫尾留去蛇坡詩云昔人老世故亦復興此嗟迫嵗况羇旅孤舟如泛槎妻孥共蓬窓偪側棲樹鴉撥火話鄉國悽愴雜笑譁桃栢粗能具爆竹知誰家歘聽鷄鼓翼尚看燈結花遥知諸神曉共正青帝衙我亦東風前坐待帆影斜草鞋夾隆岸圍小河紆鬱江之隩初看一泓窄旋望百頃渌艅艎與下瀨山屹復雲矗自治貴不試此舟江左腹向來胡騎南勢若撼坤軸飛城截中流羣孽頸為縮元兇坐自斃犬羊僅還轂千齡有機㑹二竪方角逐武剛環貔貅突騎騖陵陸古今常勝術所投副所欲神州久望望廟算佇復復區區計自保膠柱難為曲客行寧賈胡小泊遂信宿撫事空三歎為儒慚碌碌泊慈湖北岸坐覺江流平漶漫裂三股舟子告風横因循宿中浦慈湖古戍近猶復小江阻漁翁家葦間蝸舍無鄰伍把酒訊三老此寧泊舟所諗我今昔異解帶無所苦向來探丸徒白晝猶旁午一自尚書來此輩凛刀俎江山亘千里有屋皆外戸似聞襄江道祍席過行旅翳公舊威愛平寧尚如許兩地好經行為官喜欲舞倒床鼻雷吼夢破聞船鼓受欺墮姑息迂儒彼何取謂張尚書定叟泊府口建鄴重東南爰從呉晉後鎮戍分淮江心腹運臂肘我舟厯陽岸煙外見鍾阜問名良賔實南渡此其口龍蟠虎踞地永藉藩籬守六朝或易之戎馬輙騰蹂鐡山此濟師竟致凶渠走扼吭儻得要制敵果何有設險務究本不獨計山藪任吏所宜擇撫民所宜厚孤生恤緯意南望凝竚久深愧行歌人招邀話佳酒采石渡大江礙崇山突起作湍悍采石天下險掲厲誰敢玩戈樓泊千艘鋒旗麗天漢昨憶辛巳秋胡馬蜂蟻亂敢觸貔虎怒旋作狐䑕竄繄此折其角羣孽終内叛孤亭試一登明眼得竒觀回首吾葉舟已復艤沙岸我犀不敢然幽察神所憚歘聽鉦鼓閧戎事閲鵝鸛折衝須武備保治賴彊幹鄙夫華封祝泚筆亦其漫上下驛磯湖隂數里間山麓矻兩磯磯麓突江出禹功不及施千古妨行舟死生繫毫釐我昔歩磯上雨歇暑氣微驚湍下百尺怒勢轟千鼙尚憂坤軸動無恠沙岸欹蟄龍渠得安過鳥翅欲垂頭眩膽為掉坐歎舟上兒壮哉天下險姦軌容扺巇如身護風寒要地此㡬希今來嵗華暮去舟良坦夷人言水進退寒暑分盛衰古來設險守亦有可易時函谷與劍閣秦漢嘗用之人輕地亡重正煩折箠笞恃險無興國興國須藩籬帝王所取重文武各攸司險易倐變改即磯餘可推蕪湖感舊下帆同烏棲掛帆逐鷄起但見蕪湖月耿夜清如水江左此壯縣我昔舟屢艤諸公各敬客欵曲豈今比酒杯慣邀留妓圍供燕喜流連動十日每過蕪湖朱丁諸公約以十日為期揮掃或千紙舊遊想如昨故交今餘幾逝者泉壤隔存者參辰似浪慿楚些招盍寄相思字可能喚巫陽且欲託雙鯉過繁昌江山互映帶竹樹渺隱見居人江山閒安處忘古縣泊舟穴子初舊觀儼自薦􅀈山髙攙雲雲際抹深靛慰我塵埃容嘉此煙雨面山脚慣奔走尉曹分卑賤縣人應指似鬢改顔状變漂零渠未知憂患嘗欲遍俛仰二十年轉眄閲蜚電故人半在亡在者或海甸明朝理去楫山影暝江練安得人如山來往長相見繁昌早發客行固厪身留滯如捩翼及兹祖禮竟蓐食理㠶席風停浪未蟄天曙月正白版磯匯湍殺荻港煙樹碧杖䇿丁家洲徙倚容少息無酒問山店憶鱸聽村笛烏烏啼松行鴈鴇下沙磧回柁投曲澳又寄糝潭夕情疎或易合不作淮楚隔纍然槁項翁軟語慰行役江湖長翁集巻三
