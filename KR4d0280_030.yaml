body:
  text: 江湖長翁集巻三十宋陳造撰文偶吟長翁貧自安拙自慰拙故不勞貧故無累瞢瞢貿貿閱人間世玉不獻而全足國有役而掉臂氷釋夸跂之慕灰死彊陽之氣然而嬉笑怒詈起宫羽音歌酒風煙辦遊戲事是則全樂于天資養于地者也彼孑孑而名掲掲而營将倚墻麾之豈容動其喙耶酹淮文長淮渾渾蕩沸潏兮經楚被吳瀆之一兮匪河匪江天豈以是限南北兮衛拱皇居神所職兮殺敵之衝師濟其出兮皇皇聖筭包九域兮搴幽冀跐龍荒行有日兮掀然臨流豈曰效楚囚弔湘屈兮盤盤鼎立胷武庫手椽筆兮燕然有石可繼勒兮緜緜祀典為神之報歆芬苾兮壬寅十月十日同行葉三錫君予劉宗元之二君命某酹之乃云表盜文陳子罷官吴門坐貧無廬百指纍然備官舍以居右連城闉其左通衢空曠僻夐塊處幽屏斷絕比鄰之區岑寂無人之境置孥營食漂然而北逮負檐之勞方休妻子之望已亟營營擾擾若不遑息陳子問其然其愬嘖嘖其意唧唧曰自公之出偷兒赴隙一之日穴吾壁四之日闞吾極僕驚婢寤已無留迹雖幸焉而無喪亦禠魄而震愓揆犯險而徒還豈来意之遽䦨盍擇地而規鄰須公歸而定遷陳子曰嘻抵冒之一再固盜之頑也有以惎其来繄誰之愆也悖而取雖義之蠧靳其予亦仁之殘也絲寒粟飢賢愚所資一貧為累彼我共之守之者罄其術以甚密何異取之者殫其力而不遺豈知夫外其身則其身存私其蓄則所蓄隳達者之徒其大無隅其見靡拘委吾形骸曾外物之不殊相彼凶戾同赤子之一初穽填而檻撤可以馴䝟貐掊關而去鍵可以却穿窬自其心而論之有其所有則予亦盜忘其可忘則盜亦予況乎患起於用智疑生於多術髙明之室羣偷所集夫吾今者幸飽温之不謀唶僕奴之赤立彼之来也盖已瞢冒不審得諸外而昧其實寧不由髙墉大屋之為累乎今又警徼之彌増防閑之愈悉四植矛㦸九省扄鐍惴惴凛凛真若護寳庾而守金埒者宜其窺之不釋而乘之愈急也獨不聞挈篋而趨蒙荘之誨人祼刺外示陳平之全身匹夫罪也璧未去文豹取也皮之存理則固然顧乃以無有為有不文為文則咎不在彼而在汝曽慢藏之足云然則視盜而一之者徳之至表盜而示之者術之次今慮勞而形弊由兩者之俱蔽儻欲其無患歟盍思所以反是仲歎季服敞怳愧悔倒床甘寐罷警屏衛老稚俯仰帖帖無事還鶴觀長翁之居宛在澗薖有草不鋤無雀可羅翩彼皓鶴来自無何傍我槿籬啄我徑莎側殷鮮之丹頂揚漂蕭之𤣥袂方刷羽而振迅欲遡風而凌厲童見棄而得主良愜心以暫慰佇立凝情延頸悲鳴俯有粒而不睨寂無人兮尚驚女既嫁而非夫倐悔心而濳萌繄胎禽之翔集必芝田與瑶池胡失脚於雲衢受塵寰之攸羈崇臺峻沼之間處之猶戾其性庳隘局陋之地得此寧其所宜愍其失所歸乃故主言從隙地徐行郡圃碭而迷昔驥之困鹽車復而喜俄珠之還合浦佐卿獲反於故居華表漫訪乎新語汝来其始宜吾之鄙捨池籞之華潔歩小家之尋咫自我而言不幸乃爾孰何棲止潔粒清水彼破琴之戇夫與攘雞之饕子或搖其牙血刃腥几乃吾是逢不其幸矣方汝来客其居促戚其棲偪側集枯捨苑寧計之得吾挽其留稻粱是謀鷙猛是憂有繫眯於虗明寧它日之休休今其云旋忘忿悁脫紏纒躡空曠鳴風煙玉粒而清泉吾亦置營營捐拳拳氷釋夢覺兩適而並賢紛紛萬殊莫適尸諸貴而王公賤為匹夫夥若萬金細而錙銖認之者愬愬任之者愉愉影事視之固不可必其已有又安可有其所無徇諸物則多累求諸巳則有餘吾可不泰然於既失之後慊然於儻来之初凣孫若子吾無隠爾作還鶴觀有味其㫖房陵勸農文誘而諭之曰勸國家寶農嵗勸以仲春俾守令奉而行之盛徳意也爾房民有待於勸者吾不可不告房之水地山泉灌注號為艮田而車建之器略不知其今若壅者壅之不可壅車建而溉不惟凶荒當減十五而平原陸地皆可為秔秫之區房之原陸彌亘數百里而桑柘絕少蠶事滅裂飼守繰織皆未得法端疋狹燥絲綿席暗無可取貴與其植他木不若多植桑柘每嵗春辦為四十日夙夜之勤繰織飼守求盡其技精其事将不止温煖取給亦可貨以自贍二者汝房民之急務宜取法江浙之人夫淮漢之俗大抵畧同權守淮人也亦以農起家每不自以淮俗為是而農器之製必訪諸浙耕者蠶者亦取法於浙故農功日劭親舊之見從者日以給足吾今樂以身所履者語汝而以待親舊之心望汝汝其聽之外此則賦稅必務早輸輸後期一或追逮費将十倍受笞于官何益母耽道釋母徇巫鬼凢吾所見耽道釋必貧徇巫鬼必貧或誤其命非吉凶不得已母非時聚飲非農隙母遨嬉聚飲多費遨嬉則子弟浮惰房民未免此吾又舉以為勸汝其聽之歸與婦子兄弟鄰里鄉黨即吾言思之或相率從之當漸享安富之利而權守布宣勸課之責不愧于心吾與汝交有益豈不佳哉汝其聽之毋忽定海勸農文國家務農重穀凢張官涖政無非勸課之意又命守令率嵗二月出郊延父老諭以此意其望於爾甚切爾居海瀕服勞力田頻享富嵗之樂今猶以勤農為爾勸不幾贅矣抑勤之外猶有可進者兹不容黙夫常賦不可闕爾寧有不知而率憚於輸送致煩追逮或鞭扑加焉田業已所有而假它人户籍出沒遮覆僥覬不敗露而卒不可掩毆詈閧訟以争毫末墮棄耕耨縻耗裏囊是皆積習已久迷未反者不可不痛自悛改夫官租未輸官吏勞擾于上而里正長旁午于門酒食酬謝夫豈能免或受杖而去不免於輸所損如何託名寄產已負刑憲嵗或出穀而人各有心終未必可保不忍小忿求伸其氣而不免俛首下顔胥吏之前捐金求售恐其却之所得幾何所喪多矣三者未去雖勤於農恐未能全享勤農之利也爾今幸者以吾為非欺盡更舊習無撓官法心閑無事畢力於農晏受豐登安富之樂而令亦得少休憂勞不兩利而俱優歟爾父老訓誨子弟告諭鄉里無忽吾言又言當由中政貴不倦人無貴賤官無髙卑率不外此令臨是邑已再見春盖嘗遵用令典奉天子之意躬行阡陌酌酒治具以農事為汝勸其所以為農之利與夫習俗已久自貽其害者諄複言之未應遽忘今嗣豐之後復得延見父老皆非姑應故事而已也凢吾起于田間身所更而見之審者悉以告汝盖欲其違害而就利由中之言冀汝聽從指日以須跂足而望者皆未甚副吾意誨爾以常賦不可違而不盡輸以煩追逮者自若也誨爾以隠寄不可為而立偽户以興訟訴者猶昔也以至訟鬬好勝費財妨時招敵而結怨最不可不忍尤切切為汝誨而亦漠然如不聞也豈令徳薄而政謬不足以服人而使之從或者所言不切時而不足聽歟政與徳令當反求謂言之不切果非也汝雖未盡從令敢有倦于此用是申告汝父老盖理約則易遵意支則難從令不欲多其說以滋汝惑其歸率子弟鄉閭思吾言副吾意将見化成于下官不勞于上他日言民淳而易治者首舉是邑而推原其自亦知令嘗有以教之而然此所甚望也汝當明吾心又令到此三勞農矣丁寧苦口亦既一再非鬲上語汝輩孚信邈視所未敢必而今者比之初来比屋之間農業漸成訟牒稍稀誕謾粗減輸送頗應期約則是老令之言爾輩盖亦樂從矣用申言其勤切之意去嵗不雨數旬於理宜旱清泉無水利始憂其必且流離飢凍而穡事如願民在樂土清泉之民亦粗充腹初無流殍天於汝甚厚令亦竊其餘祐盍思所以荅報天施荅報之實宜益勤于農儉于家敬養父兄輯睦鄉里訟牒誕謾益悔其舊習輸送奉公益知謹畏羞為頑獷之俗同趣仁夀之域使凢觀風于上繼政于後者知老令訓曉而然爾父老惠我不既厚矣哉毋忽又代平江守王仲衡尚書皇家分任守宰專意勸課嵗二月俾之出郊延見父老諭以農意守也敢不祇率汝父老前明聽守言吴門之地最為膏腴穀粟之出全浙所賴去年之旱浙民苦之而郡境獨豐鄰壤嗸嗸汝民嬉嬉雖曰雨澤不愆之故其亦汝民勤農所致非歟勤農之利既已享于昔可不勉于今其歸率汝鄰里勉汝子弟深其耕精其耘亟其收昔嵗之澇可戒也不可不培乃隄防去夏之旱可戒也不可不浚乃渠陂利乃灌具知勤于農而是之不務則害其所以為勤毋飲博毋侈靡毋鬬訟輸官欲先毋以身試官府貸貣欲信毋以詐累鄉評苟反是雖勤無益也守到任以来凢臨汝以鎮静撫汝以寛慈不敢略有苛擾則以身勸汝久矣今復勸之以言是皆聖天子愛汝之意守不敢不遵奉者果如吾言汝等享温飽安佚之利守亦得以免曠瘝之譴以仰副九重之􅈤惻顧不懿哉汝父老毋忘守言祝文祀文宣王祝文惟王天縱将聖心傳是道師範古今陶治帝王世底治安其原有自衣被天下盡物莫報祀兖國公祀文惟公受道聖師優入其域善則服膺仁則充已四代禮樂畀付惟重道之固存萬代如見祀鄒國公祝文惟公術自孔氏聞知之深養氣知言其傳有木楊墨迹熄儒不晦蝕衛道之功淑諸古文祀勾芒神祝文青帝司春神則其配發濳振滯無㣲不育熏為嘉生冀迎嗣嵗祀有常典吏敢不率又嵗事惟新青帝尸之神其佐也厥功則茂鞭春令辰掲䖍嘉㫖為嗣嵗請守敢怠廢又惟春職生惟帝成化佽助贊理惟神庀司因時祇事國有祀典徂嵗之旱民既勞止屈指嗣嵗以逭倒垂繄吏之憂繄神之責恭陳潔蠲神其監之祀風師祝文惟神體巽披拂輔天發育成物之功載諸祀典致敬展誠敢有不時矧惟徂嵗常暘害稼故兹蕆事寅薦蠲潔為嗣嵗請豈止應故事而已哉祀雨師祝文穀之生成雨則潤之雨之節調神則司之有餘不足皆物之害時而霈焉稼穡用滋脩儀蕆祀國有常典式陳明薦神其茹之祀雷神祝文發潛振滯惟神庀司聲嘿以時嵗乃弗沴爰陳蠲潔為稼事請民亦勞止職神之憂登極赦祀諸廟祀文聖天子行堯之道受舜之託揖遜云初澤沛方内自明而幽祀典咸秩惟神有功郡民利賴惟舊侈上之賜所不當後薦誠祠下實惟帝命明堂赦祀諸廟祝文湛恩解霈徧暨幽明惟神黙佑斯民有功社稷因時宗祀腏食弗遺玉音俯臨郡敢弗率謝諸廟祝文丙申麥者穀之重民者神所庇也為穀而服勞者民率民而趨時者吏也麥以旱而病民無麥而飢雖吏之咎亦神之累也故無麥禾者春秋所譏而有功於民者禮經所祀也齋此心走羣祠盖日日以冀也飄然雨雪殿臘而肇春掃氛沴也焦然者油油慼然者欣欣有生意也解民倒垂逭吏曠瘝神之賜也修辭謁款以答殊休迎嗣嵗也社稷神祝文常暘為沴民實病之田疇龜拆比屋怨咨奸和召戾吏政致此斯民何辜坐須轉徙庀職民事神則吏同俾嵗之登繄神之功霈然一雨冀畢稼事惟吏與民均荷神賜秋祀諸廟祝文經曰有功於民則祀之惟神血食此土人所㤑賴今者嵗事豐穰民氣和豫物無疵癘繄神之休疇敢掠美萬寳告秋式薦嘉㫖用伸昭報郡敢或怠又惟神贊帝之化依人而行血食郡境吏民賴庇嵗豐氣和實惟陰祐秋報之典守敢不䖍祀龍母祝文惟神上承帝命血食名山誕育神龍澤潤率土震夙之慶郡民弗忘庸酌依嚮之心少陳奠獻之禮庶其陰騭錫以屢豐又惟神陰佑兹土血食自昔誕彌既月人所欽慶是薦蠲潔用陳薄祭俾民樂康而嵗登不懈于永乆惟神之望秋謝至徳廟惠感夫人祝文惟神生有卓行沒為明神郡人賴福爰自古昔嵗事告豐人以寧康昭報之儀用致涓潔諸廟祈雨祝文雨不時降農工告病某也持節一道復攝郡寄愓然不寧徧走諸祠冀垂陰騭油雲急雨日蒙膏潤嵗事有望豈繄人力神況不貲敢忘昭報林屋洞天請水祝文某以天子之命兼攝郡事入夏以来常暘為沴民情嗸嗸聖主旰食夫庶富千里仰寛顧憂某之職也旱勢有加其敢寧居凢仙佛之居神龍之祠哀訴備至邈無感通意者誠心未至政術失中有以奸和氣無以格幽㝠故歟計已窮矣時巳迫矣及今得雨庶倖下熟過是已矣惟龍威神赫然出入無有宅是靈湫福此一方兹復請命于龍庶分此水用掲蠲潔仰冀哀憫郡民霈以澍雨嵗事粗收民免轉徙則某之庀職龍之血食皆可無愧龍水祝文比以旱故投誠于龍寅奉此水庸展控扣之意果䝉顧歆信次即雨来日又雨今復大雨民以呼舞吏釋重負神之威靈應祈如響更祈惠況調䕶雨暘卒兹穡事則終始之施與民不忘諸廟祈雪祝文郡雖告豐猶多貧窶嗣嵗之望不啻飢渇年華暮矣雪未應期民則跼蹐守敢自安惟神依人而行受帝所命矜恕羣情及時未春錫之瑞應蠲沴導和晏享屢豐迫切之懇非神孰告諸廟謝雪祝文比以雨雪不時致禱于神轉首陰晦霰雪㣲集霽睍已遽上下之心慊然未足去春尚逺神可恝然盈尺之瑞佇解倒垂諸廟祈雨祝文時将徂夏雨不時霈農功告病羣情焦然惟神陰騭此境民所依賴用走祠下為稼事請西成有無繫此數日伏願謁帝祈命鞭龍起伏俾我郡民晏享嗣嵗之樂則職幽司明兩為無負諸廟謝雨祝文比以旱不敢避瀆神之譙爐熏未熄雨已蜚洒冀神終惠為霖之利繼此不靳則斯民免流冗之虞遂豐裕之樂皆神之賜諸廟祈晴祝文稼事告終場功将興淫霖為害民用咨怨吏之與神憂民之憂顯幽不同其職則一止陰為晴神則能之吏為民請神必響答龍池祈雨祝文房州吏政之繆致此旱暵夫復何言然龍之神靈宫此福地民所以怙如慈父母吏民之情捨龍曷愬是用躬扣靈湫伸控蟻螻之悃伏冀慈仁愍惻念郡民之窮窶恕假守之弗逮施以大雨使畢稼事兩邑數萬口即今解倒垂之憂繼此享温飽之樂吏亦少殺其恥其敢辟再三之凟仰惟宏貸之仁毋惜一引手之勞副此翹企龍堂祈雨祝文龍之窟宅此地威靈顯著民所依怙今兹之旱捨龍孰愬懇請屢矣其答如響然雨未霈然禾則尋槁郡政之悖有奸陰陽吏之過也民則何罪使至此極夏序將終三兩日得大雨或餘中熟過是民必流亡吏且獲譴亦恐龍之不容恝然也躬走祠下委誠歸命伏冀哀憐副此欽企散解龍廟祈雨祝文是山之泉灌溉之利居郡十八而神則尸之郡民依神何啻怙恃久無大雨泉流衰殺近雖應祈而逺邇聞見之間多未沾洽澤枯涸福郡民自昔取必于龍兹用祇謁祠下惟惻然動心申以三日之霖俾千里均被神休吏亦陰荷貺施惟龍鑒念之祭文祭陳吴縣文云云吾徒相望社燕秋鴻偶兹為寮神合意融情好之膠固玷闕之彌縫譚諧之傾輸術業之磨礱斷金之義彌久益隆甫病告之再旬欻泉夜之長終嗚呼哀哉才難之歎古今則同君之製邑指麾告功蔑肯綮於遊刃斵彫刓之成風凛凛黠胥熙熙良農謂将培萬里之風背下九重之芝封曽天意之可度而令此涕之不知所從也嗚呼哀哉孰如君之聽斷明而公乎孰如君之臨蒞清而容乎孰如君之結友應物簡而情節而通乎痛哉已矣埋玉有期抱恨何窮我酒既㫖我肴則豐君其茹之鑒予𠂻些嗚呼哀哉尚饗祭趙提刑文惟公譽隆宗英徳為吏師踐揚中外模楷當世胷襟之軒豁猷為之敏劭圭璋特達干莫立斷結知九重儲望多士謂當論思補衮柱石皇家而天不慗遺中道奄棄嗚呼哀哉俗方嗜進恬不之怪而公山林長往之志盖自壮年黽勉小留其中之所存蕭然而不屑其於物也則悗然而泛應亦既蘇罷瘵拯彫弊而清風髙操芥睨軒冕桁楊聲利邈眎埃􅝙之表足以起頹俗振士氣人皆凛然知前輩之風流出處與世殊絕也況如某輩託庇二天盖非一日話言緒論厯厯在耳幽明永隔痛恨如何一觴薦誠莫既攀慕嗚呼哀哉尚饗祭趙節推孺人文惟靈性懿而淑志恬以穆奉祀則敬御家惟肅生于望族慶門是歸有子而秀得夫而才瞻彼女師貽我婦則凢曰有家不顯惟式天畀其賢復奪其全躓于中塗逝不待年藏山而運神莫為力埋玉之嗟豈惟宗戚悼往念存我心孔悲薦誠此觴靈其茹之祭丁知縣文悠悠生死如晝之夜理有未澈羡生怛化惟彼仁賢斯人所依欻焉去眼渠寧不悲嗚呼哀哉君器瑚璉未薦清廟干莫小試隨用而效長洲繁叢周施沛然政優才敏儒其根源棒檄屑為以㫖甘計勤已撫人略行曩志賢愚夀天理有逆施地下修文竟荒是非親顔孰怡民瘼孰恤為寮之情矧膠投漆撫事悼亡有涕浪浪魂其不違歆此奠觴嗚呼哀哉祭汪叔量文彼良者玉載妙其礲有挺其材宜即之工欹嶔温潤盖世若公澗松兮榦梢雲荆璞兮氣吐虹曾不得備重鎮於東序薦一柱於公宫況摧折而糜捐方迪吉而告凶宜朋知之見聞驚此涕之無從嗚呼哀哉我則姻家契合趣同眷三載之周旋發其蔀而啓䝉慶吾兒之附葩得氷清之婦翁消鄙吝之曩懷收著述之新功摻别袂之一翻想音儀於鱗鴻楚水兮悠悠淮山兮崇崇千里兮相望夢境兮與通我昔計行擬訪公而舂容云亦辦来省老衰之萍蓬宦遊拘纒予既阻西姻事營畫君不果東曽蕉鹿之一寤痛明幽之異蹤嗚呼哀哉孰如公之賞予真兮匪繆其恭孰如公之愛予子兮一係其衷孰如公之純誠儼恪兮嵗寒始終今焉已矣孰與之訂出處而譚汚隆千里之遙兮薄酹是供楚水可塵兮淮山可壑悵此恨之難窮尚饗祭羅樞密文嗚呼哀哉萬生芸芸天所司也鍾為仁賢民所資也夀夭之殊恍可疑也豈短長必有所制将聽自爾而無所尸耶嗟嗟先生當世之師有國之基民之怙恃君子倚毗其身在亡關時盛衰佇觀修程一旦及兹嗚呼哀哉正學心傳公黙會之宏材時須何適不宜泛幕蓮於江城領英蕩於震維邦有元龜民頼母慈倐芝檢之催歸方宣室之受釐肅肅朝行蔚為羽儀塗抹誥雅則帝綸増輝銓敘官聫則臣工允釐適事變之非常人莫保其闕睢幸元弼之調虞藉婉畫之贊禆蟄驚濤而席平捲氛祲而天披投輔國於有北翊曽孫而垂衣帝曰惟公副予疇咨本兵之地捨公其誰曽𠂻藴之未究奄波逝而莫追嗚呼哀哉地闢天開繄今何時如伊必萊如臯必夔屋必棟梁虧一則阽危人必四肢廢一則弗支有如先生其夀止斯此所以吾君興慗遺之嘆而斯民深殄瘁之悲也而況吾徒倚公挈攜是輓是推是嘘是吹培纎植以干霄風弱羽而雲蜚鱗翼攀附自昔是期竹帛姓名今其庶幾曽是瞬息志願遽違彼蒼者天𡨕茫莫窺福善禍淫豈其吾欺恨終天而無盡淚浪浪而綆垂彼蒼者天知乎不知有肴薦盤有酒注巵公一茹之慰我夢思嗚呼哀哉祭石湖先生文於偉先生斯道宗主斯文楷模外庸内勳傲睨龔黄臯歩益趨士蟻附之小大迄成如金在爐文振哀玉筆奔狂螭乃其緒餘一昨龍荒雍容口伐氣懾大胡公推上仁天怒為霽南北免魚活億萬人夀當永延顧止此歟徳人去来寔天所尸偶聖誕賢孝宗睿明公起作輔數庸非天嵗将流虹公則遊世實先期年及乘白雲復期嵗差帝後公先昔重堯華今參羣帝惟公周旋生榮死哀實孚名白顧何歉然我歸自東恍隔顯幽情有弗宣念昔杖屨日親色笑心銘話言薦㫖此觴師資如在有淚頹川祭林子長右司文堂堂如公世第一流其學粹醇其文炳彪其守之卓其用之周其騷雅也今代之元劉其政術也前身之求由郎省宰掾課效獨優西麾東節播之歡謳此其小試爾矣終不得斟酌國論丹青帝猷然其翛然物表之志盖嘗桁楊軒裳一壑一丘其所以和歸来之章而新横塘之居也足以見其不惠不夷而傲晲公侯我輩從公許以好修為禮則隆情則綢繆朅来周旋觴詠唱酬色笑愛予熙然而春名理規警凛乎其秋日月以冀者踐丹地踞黄閣而侍冕旒也汲引茹連固非所蘄庶或偕坐上客為羊河為劉侯為枚鄒嗚呼已矣怛腸裂而胄抽酌彼醥清侑此甘柔公其茹之慰我沉憂髙大卿哀辭偉哉堂堂顒顒仰公時英哲兮其學邃詣其才超軼靡或缺兮胷涵宏大氣陵髙寒挺奇節兮孤介自守廉隅凛峙耿玉雪兮皇曰咨女粲為使星炳卿月兮僑之遺愛武之去思曷其竭兮奇抱陳陳百未一施俄中跌兮中州餘運絲棼燎燼方騷屑兮天不憗遺即公巨帚掃腥孽兮儷浯溪石嗣燕然碑垂不滅兮儲精蓄靈復幾何時産此傑兮我曩即公聆堂下言薰蕕别兮斷斷銅墨煌煌旌纛望淮浙兮公騎鯨魚漂然閬蓬成永訣兮有堂翬飛有子山立修佳謁兮撫事興懷老淚莫制鋸霏屑兮慟為孟孫淚償唐瞿劍首吷兮江湖長翁集巻三十
