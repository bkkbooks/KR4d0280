body:
  text: 江湖長翁集目録别集類三宋卷一辭賦二十首卷二五言古詩七十七首卷三五言古詩八十八首卷四五言古詩八十一首卷五五言古詩六十八首卷六五言古詩五十七首附四言四首卷七七言古詩五十首卷八七言古詩四十九首卷九七言古詩四十七首卷十七言古詩四十二首卷十一五言律詩一百九十六首附排律十首卷十二七言律詩一百零三首卷十三七言律詩八十三首卷十四七言律詩八十三首卷十五七言律詩九十八首卷十六七言律詩九十八首卷十七五六言絶句四十六首卷十八七言絶句二百五十二首卷十九七言絶句二百三十七首卷二十七言絶句二百二十首卷二十一記十九首卷二十二記十八首卷二十三序二十八首卷二十四書四首卷二十五書十首卷二十六書十七首卷二十七劄子三首卷二十八劄子十一首卷二十九傳贊銘針偈說共二十七首卷三十文四十八首卷三十一題跋五十七首卷三十二論九首卷三十三䇿問三十四首卷三十四易說十四首卷三十五志狀十一首卷三十六表箋六十四首卷三十七啓三十七首卷三十八啓三十三首卷三十九疏青詞九十四首卷四十致語上梁文二十六首臣等謹案江湖長翁文集四十卷宋陳造撰造字唐卿髙郵人淳熙二年進士官至淮南西路安撫司參議遭宋不競事多齟齬自以為無補於世置之江湖乃宜遂號江湖長翁造既不竟其用故事功不著於當時史亦不為立傳元申屠駉為造作墓志稱其於誨誘則良師於撫字則循吏身篤操修道兼體用雖金石之文稱述類多溢量而當時未聞異論則亦非純構虛詞也集中如罪言一篇專論應敵備用之略蓋仿杜牧而作所言雖未必悉當而比於牧則不足比於陳亮劉過則恢奇排奡可以肩隨其他劄子諸篇亦多剴切詳明不徒託之空言記序各體捶字鍊詞稍覺有傷真氣而皆謹嚴有法綜其大要猶為不失典型在南宋諸作者中亦鐵中錚錚者矣至易說一卷始於無妄終於比凡十五篇疑其未竟之書中多以史證經乃楊萬里誠齊易說李光讀易詳說之流殆為時事而發託之詁經歟其集久無刻本明季之藻以淮南自秦觀而後惟造有名於時始與觀集同刻之於髙郵其中青詞疏語諸篇均非文章正軌今以集祗抄録亦姑仍其舊附存於卷內云乾隆四十二年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
