body:
  text: 江湖長翁集巻十四宋陳造撰七言律詩次韻嚴文炳兼簡張守二首嬉遊有願自今償回首春容巳浩茫霽景偏遲張錦地小園秀岀卧雲莊梅林破玉香沾袂池水揺漪渌泛堂茶具筆床陪語笑未妨日飲慰還鄉梅梅栁栁䕶深行倦客重遊眼更明谷鳥自應尋舊約渚蘭潛欲換新萌詩工已可醒人醉賦就當須氷坐清老我客渠真得計夢魂無復鳳凰城文炳許作賦再次韻二首宋璞隋珠不當償平時佳思墮荒茫老規種秫師陶令備有前茅愧楚莊蜂鶴攪腸空軋軋鸛鵝嚴陣怯堂堂即今全勝輸公等自占床敷霸睡鄉欲轡青驄試小行擁衾待得曉牕明端知霽日渾無價可信啼鳩識未萌勝處風煙堪一醉是家池館擅䨇清不憂兒軰妨人樂倚賴詩豪五字城再次韻二首郡政只今多暇日名園欲到指蒼茫能詩有客憐侯喜好士惟公繼鄭莊促膝未妨澠似酒轉頭當復玉為堂聨金綴玉真吾事賸刻堅珉表士鄉近墅何妨一再行後車應著老彌明詩成直壓枋榆上譚勝寧容鄙吝萌鷗鷺一灘窺語笑松筠千挺峙寒清從今好繪斜川集莫靳流傳到帝城再次韻張徳恭二首公家父子書林傑力探希微析混茫膝上風流識文度鯈遊領解契䝉莊六花陣勢容摩壘五鳳規模見肯堂自歎吾兒豚犬爾秪冝耕牧守窮鄉平日疎愚但意行每從師友仰髙明如君况是庭蘭秀向我防譏凍芋萌栢悦懸知待松茂渭流終不溷涇清新詩應敵纔餘事紙價于今貴列城文炳近嵗節感愴作詩寛之嚴侯才氣舊無朋晚作江淮肉食僧飽對風煙吐膏馥時因節物動銷凝君今宛是林和靖我亦何如杜伯升濁酒寒菹共一笑未妨同剔課詩燈再次韻復文炳君猶芹泮老賔朋我似房公再世僧煙徑幽尋春澹沲月牕冷語夜澄凝人情感舊多為祟酒盞澆愁更計升笑命棋枰同永夜旋添萁火上篝燈再次韻呈張守使君劉白信其朋笑我頑然粥飯僧打睡正便簷日煖味詩還喜蔗漿凝破隂風軟梅猶小弄影雲疎月漸升一自藏鈎得新句莫停吟筆到燒燈再次韻贈張徳恭老尋詩法得良朋轉處驪珠悟後僧帝所宫商中夜奏仙盤沆瀣未秋凝樂天不幸逢元稹季友而来有彦升交手當家親父子為君别本記傳燈再次韻二首辭鋒森列看分朋退作窮山苦行僧每讀嚴詩驚我倒亦知舜績待公凝絲綸指日從天下閶闔摩霄接武升更想班衣奉親夀五雲低護九枝燈闖門不乏逺方朋辟席渾如問話僧筆底煙雲無盡藏譚間霜霰不寒凝身行建徳歡謡裏人在春臺瑞日升老子生涯漫訾省擁書猶傍短檠燈再次韻同門誰定肯論朋拙似苕鳩嬾似僧病減不辭詩語拙歸来少貸客愁凝老欺鬢髮絲千丈糴仰官倉日五升臺閤中天清夢斷分眠山店問漁燈都梁塗中西来行路未妨長敢指淮山作異鄉隨處饋漿驚禦寇有人醻藥話韓康栁方弄色新經雨雲似多情巧護霜風俗淳厖節物好一樽時與倒詩囊謝鄒祕正恵淮白吕判院送酒簷鵲聲前拆鴈書䨇材有底到蝸廬潔樽㡬夢沾膏露下筯于今薦腹腴仙府流霞端伯仲徐州秃尾但臺輿寒人醉飽何縁静徑攪詩膓撚白鬚寄章茂深郎中二首州麾郎省未華顛解組歸来作地仙杖屨良多閑日月亭臺仍占好林泉青奴白牯氷壺裏墮絮漂花醉眼前政用著書傳我軰未須緘口縛枯禪章酷好佛立譚當日受知深不待陳情道古今髙㑹㡬陪山簡醉長篇許為愛卿吟嵗華遷謝心雖在世路﨑嶇老不禁擬近卞山謀卜築借公泉水濯塵襟嘗約訪卞山久未果自適三首自憐老瘦仍癡絶每强衰顔趂後生療癖無方了詩課迷魂有寨對棋抨繞床不著阿堵物玩世何須身後名倚賴兒曹解人意典衣長得解餘酲渺漭湖天入短篷心期秪許白鷗同人言火食閬蓬客自命官身田舎翁酒可銷閑時得醉詩憑寫意不求工更那長日溫書眼一送飛鴻下逺空雲水為家百累無意行從昔畧方隅飲忘醒醉狂常爾夢到無何午未蘇遺俗可辭翻韈錯付渠隂作負舟趨譊譊禮法工相聒閉戸仍防大小儒正月十四日雪鄉園燈市頗豪奢客子扁舟恰到家月姊層雲藏寳鑒雪神千手撲天葩未容火樹陪宵燕謾説江梅擅嵗華苦憶醉穿羅綺陣小軿吟度赤城霞送七子赴省旋轉璣衡運化樞嗣皇襲六待耆儒斗南譽望俱難匹鄴下才華舊不孤郡賦今推作者並王庭可但諍臣趨竹林昔隠休回首四輔三公此首塗次韻胡元善栁間鶯友羽衣輕花外溪流鏡面平勝處過君時得醉今春屬我老歸耕吏塵秪可黄梁夢棋社聊尋白鷺盟猶計浮名孤樂事風煙滿眼得無情張守招隠是日王勉夫到明日嚴文炳之吳中春風吹作萬家春誰得聨鑣從使君㣲徑問花同載酒深堂剪燭細論文王郎把臂簮仍盍嚴老呼舟首又分安得雲龍隨上下佳辰不復嘆離羣次韻張守勸農是日雷東郊春好近清明小隊相羊為省耕扶路人歸皆喜色應時雷殷亦和聲不妨宻雨催花放有底屯雲妬月盈遥想一尊同客夜燭花未剪已詩成再次韻眼向囊書老不明合遵寛敎事農耕雨餘驟變菖條緑曉起欣聆布榖聲譚笑俾民無死徙豐凶轉手有虚盈衰翁倍荷殷勤意緘致無非翠織成次韻王勉夫晚春送春無酒未須嗟却有新茶試大家便愜輕凉生小扇獨憐撲蔌下蔫花霜膚解籜初嘗筍怒癭因誰擬問蛙嘉樹著行森羽葆翠青疎宻儼排衙次韻張守遊趙園躬挽慈輿訪小園徑㪺和氣滿壺天㣲風㑹意祛輕暑紅藥多情駐晚妍欬唾生春見能事平反供笑掩前賢奉親得句無窮樂不學狂生卧酒船次韻張守王勉夫二首兩雋詩聲敢重輕蒼山對峙大川傾形為幼眇無遺恨有入題評莫遁情未許曹劉夸獨歩不應邾莒合逃盟清篇讀罷重看鏡似覺青絲鬢脚生世味平時虫臂輕獨留意氣與君傾向来繾綣資磨玷擬話分携已愴情盛際功名方䇿足他年車笠肯渝盟漢廷取重張廷尉可待區區結韈生再次韻送張守目送歸帆風翮輕贈詩還笑字欹傾如公風義仍知已計我隆汚合用情想覲龍顔新得意未忘牛耳舊同盟周旋尚可諸公後肯放江湖了此生再次韻三首未解州符累巳輕辭源滿意酒邊傾頡頏前軰真無愧褒拂迂儒每過情老境更堪聽别語書郵當復固齊盟吳山正合供酬唱安得風前兩翼生唾壺聲裏晩凉輕風自虚徐月自傾詩好要從知者道格髙今識古人情三熏誰定分膏馥十襲吾方守詛盟預恐幽居念離索時須開巻慰愁生性資凉踽繫時輕青眼惟公底裏傾砥柱頹波儲碩望陽春窮谷見髙情青冥蜚上應回首陸續詩来可待盟念我老無當世意擬從樵牧寄餘生次韻常倅俞君任二首匆匆同醉記前年客路重逢亦偶然理窟扣君彌入域生涯憐我欠加鞭了知富貴難投足共約歸来徑息肩舊欲将雛卜鄰去未應須辦十牛田與俞甲寅倉卒三杯即别南徐再㑹約共歸休甚鋭與君顔面各臨年同滯江湖恐不然虎兕向来甘曠野驊騮寜復待揮鞭政成合進凌霄歩客裏猶擡斵句肩人品國華君可仰豈應學我賦歸田又悼石湖老人老商笑不待三年枵腹人人得果然商俗均霑傅巖雨中行羞死繞朝鞭探原已茹丘軻胾落筆聊差屈宋肩緬想神遊知有處定驂鸞鶴戯芝田再次韻酬俞君任闖首亨衢屬壯年即今奔騖恐徒然時情合退羊腸歩宦路難加馬腹鞭朱紫浪驚流俗眼風騷要拍古人肩歸休計辦君當賀兒軰新營種秫田再次韻呈楊侍郎左符得請未逾年民譽朝評兩藹然補衮工夫舊荷橐承流政績暫蒲鞭周衡可迓須分陜孔室容窺顧及肩側佇翹材着枚叟看公親反汶陽田楊侍郎召飯再用韻昇沉渠敢話齊年妙句推褒軰行然髙燕况叨瓊作醴凡駘底稱玉為鞭歌終畫扇猶遮面舞困欹花半壓肩此去雋遊縈客夢夢陪笙鶴下瓊田郝澤民主簿贈詩次韻二首夫君糠粃視錢神詩逼黄初論借秦義㮣咸推天下士簿曹聊見宰官身茶香延客自不飽書幣踵門誰可人從古功名多晚節相逢䨇鬢未妨新薄宦年来尚轉蓬忍將榮悴問虚中共憐杜老諳為客不訝元忠厭作公勝日笑譚方衮衮殘冬光景苦匆匆棋枰得雋詩反水誰信吾徒舊諱窮再次前韻二首解纜征塗一愴神房陵十舍望西秦苦無勲業禆昭代久分江湖着老身三楚上遊常定伯六朝陳迹𣺌愁人不縁俛仰悲凉甚可博臨風得句新起柁揚帆趂便風狎鷗驚鴈水煙中裹香薦彘聊隨俗計日聽雞等自公詩句滌愁収一一酒杯澆别悔匆匆與君二紀陳雷契猶遣時人笑兩窮登平山堂平山堂上命琴樽前軰風流肯見分戀客嬾斜當檻日藏山不斷隔江雲吟牋得意窺天巧醉面禁凉減纈紋杖䇿歸来新月上落梅如雪㸃風裠郢州二首古郢繁華得少留披雲更喜識賢侯徑容拱挹侍譚笑怪底咄嗟成獻酬羅綺香中偷醉眼蕙蘭叢裏掉吟頭何如白玉堂中客試問樽前小莫愁滿慰人間渇雨心未収雲靄定為霖憐渠沾水論涓滴况我行舟苦滯淫已漲麥田千里碧更添沙料一篙深小軿㑹指晴山去布榖提壺各好音春日客中二首平時謾説醉為鄉對景今如石作腸老去猶興客中歎春来剛制酒邊狂露桃煙栁為誰好蜂蜜燕泥徒自忙紅紫打圍歌笑地暮年多感怕思量芳時已歎鬢毛斑何况棲棲客路間杯酒故人千里隔錦囊著語一春閑燕鸎飛處頻囬首桃李香前合厚顔昨夜東風貸庭竹少容歸夢到家山石城山巖水繚石為城千古餘風尚典刑競詫君王啓藍縷不無艇子載娉婷流連猶問主堪柲兆朕虚傳蜜作萍更惜讒鋒發蘭尚祗今日月炳騷經次韻程帥遊習池三首牙纛猶容後乗追枕書不出此何時香飄玳席千花塢影倒粧光百子池詩句肯藏捫虱手仙曹容著牧羊兒回思行李冒塵土更喜百憂偷一嬉后山百憂間一嬉清明勝賞尚容追不減觴浮曲水時坐覺晴雲戀歌扇看供吟筆㵼天池春光有底遽如許酒量勉添些子兒可但大堤民氣樂啼鸎語燕共嬉嬉青編勛業笑談追千載生賢瑞聖時竹帛㑹書河似帶封疆不止漢為池𤣥譚日屬王平子妙語心輕謝客兒来嵗賞花應帝所賡歌宣勸倍歡嬉春雨贈陳主管初宵㣲月尚窺簷雨脚斜斜曉入簾春謝歡悰風處減愁將老色鏡中添頗思甫里陪觴詠不歎周南更滯淹倚賴宗盟慰牢落得閑詩筆未妨拈陳主管招隠時納婦鵲拳庭竹語頻頻忽有書来寂寞濵盛事許同花燭夜芳辰仍醉綺羅春璧聨香閤初鳴鳳霞泛仙觴定脯麟更辦歸裝攟珠玉一時人物各詩人山行寄程帥雨餘支徑濕平沙恰稱卑官下澤車雜樹暝煙森立槊亂峰迎客儼排衙水禽時弄蹁蹮影野草争開細碎花久憶山行此如願不應回首更思家次日再次韻三首山行風色怒飛沙山末屯雲湧砲車伏軾不容同蝶夢問炊猶可趂蜂衙龜魚泛渌熹晴日草樹留春著晚花暮憩自憐塵滿面五漿先饋定誰家㣲吟緩歩愜晴沙聊謝愔愔載婦車時遣貰貂邨店酒回思縛虎長官衙春山好著屛中色吟筆誰添錦上花不妨習池風月主只今何處問詩家鷗䨇鷺隻傍汀沙却匯沙汀過客車清吹解撩叢竹嘯髙山如受衆峰衙寒生碧澗懸魚網潤著蒼崖賸土花所惜隔墻紅紫滿行行無暇訪山家榖城道中何許珠襟繡袂娘額黄胷粉自新粧野芳貪折髻丫重蝴蝶亂隨裠幅香緩唱采菱空答響小留挑菜翠盈筐漢風未許休喬木行客相逢莫漫狂再次習池詩韻寄程帥二首南園勝絶真堪畫邊上誰為李伯時山納嫩嵐侵宻坐花駢紅影闖清池吟牋傳遍鴛鴻友舞袖輕于翡翠兒東府西州皆四鬴若為長伴酒邊嬉春意垂垂如我老客懐領畧欠當時倐驚鶗鴂鳴清晝便有蜻蜓㸃碧池酒榼相過但溪友錦囊餘㡬問廬兒芳辰渠盡人離索苦念從公秉燭嬉次韻寄王帥屬才華奔逸可能追我識王郎自壯時酒處每看鯨吸海書成還想墨為池窮交徒自憐東野孰看于今敬道兒莫靳詩筒數還往人生何處不兒嬉次韻寄陳主管軺軿七十曉相追記得張園叙拜時香襯蕙蘭来北里雲隨笙鶴燕仇池朋簮重盍寜人力貧仕居卑聽化兒秪冀幕蓮分靫菂詩壇棋社與閑嬉諸公邀留不及赴次前韻寄謝一失濃歡悔可追故人應念獨醒時回思翠幕圍香霧定復長虹起硯池照應鼎来聨璧客風流羞死聚蚊兒當時枉重千金諾不見芳辰卜夜嬉次韻謝程帥復遊習池見寄二首名園壯觀還前日禊事追遊可後時試問繡筵張緑野何如詩客到昆池綺羅香外鸎偷眼花栁稀間鳥哢兒定許此民同此樂春城無處不嬉嬉風流羊杜不勞追况復輕裘緩帶時醉倒莫孤桃李月詔歸恐便鳳凰池政傳西域中和頌筆跨東京大小兒我亦抄詩支郡去公餘吟玩取娛嬉復次韻寄程帥二首節物匆匆可挽追直須樂事趂芳時行春倐喜花圍屋借景何殊月在池南昌當官借景未妨民恰似鑿池取明月對酒不無桃葉女扣舷却笑木腸兒山家有約須重到定放遊人張水嬉人家禊祓競攀追刺史春遊正此時羯鼓聲中花作錦壺籌多處酒為池絶須絲竹娛安石賸有篇章付雪兒聞道續貂容下客老無佳句坐荒嬉畱交代韋倅山城老稚競攀轅况復官曹辱後先敢愛一樽追笑語未妨五日作畱連天香國色酡顔去渭北江東把臂前巳辦明朝開煑酒絲桐小置式㣲篇觀山刑鵝夜歸巢鵲枝蜩已罷鳴風聲露氣可勝清人諳淺瀨安然度月隔髙林未肯明却亂宿雲尋去路漸因更鼓辨孤城誰知嵗事關心切翻憶衝泥傍險行禱雨鳳凰山二首跨鳳西来得好山千年人與鳳俱還本䂓法席専嶄絶先遣山靈鑿捍頑聞道碧泓嚴水印或請雨于龍龍見日帝印封水不敢取試攜清醥闖雲關此心烱烱龍應識莫遣歸塗更厚顔人心神理未交孚敢愛㣲軀走道塗雲氣滿山空夢永秧畦夾澗就焦枯罷羸眼看號庚癸感格吾猶愧鼓桴老去憂民心易折龍公髙卧得知無病起二首吏民兩兩議公癡簿領空勤笑語稀元亮有詩新止酒休文多病不勝衣飛塵嬾拂孤三絶止水初澄悟百非窻度凉颸殘午夢閑聽喜鵲啅斜暉即病偷閑却自怡坐憑竹几獨多時銅爐煙畔熏風度藥臼聲中書漏遲政自腐腸嚴酒戒不應了事悔兒癡淨名文恵誰優劣為問沾沾造化兒寄髙郵僧門巷蕭然草不鋤小軒祗置兩團蒲惟師表表叢林秀眷我凉凉山澤臞晨飯每同三韭陋夜棊常辦百籌輸一書未負西飛翼滿寄清風到座隅苦雨連月奔趨禱雨壇即今積雨厭濛漫蒼天信自有時漏后土不知何日乾坐想田疇淪沼沚忍聞升合換羅紈縱陽援溺知無術慙愧身為撫字官客次小憩竹屋深明許息肩田家延客解欣然霜枝髙掛􅀈虬卵風砌初揺白玉錢得飽秪疑珠作粒汲深仍詫乳為泉譚間更笑狂沮溺政復知津未是賢騎過山村煙村面勢枕蒼山一徑循山作屈蟠入望髙幢羅翠宻掛空匹練噀清寒吟髭撚白迎風去粧面駢紅倚户看頗似騎驢后山老倩誰粉墨洒豪端杜母杜母遺芳豈逺求田功誰比此邦優麥疄桑隴疑淮左近水遥山似秀州樓識景疎知俗美亭因思孟各風流我来眷眷淳厖處比屋嬉嬉路載謳次韻程帥二首帥二子未之識到襄陽二公是日成行因帥有詩次其韻滿懐披霧慰生平到日音容隔暮城想見舟中留郭泰可能酒處欠公榮韋家相業應門戸謝氏才華况弟兄愧我攜兒在塵滓寸田墝埆望茨京人間塵不到籌邊詩老乗閒思湧泉千佛香名仍世繼一燈素業自家傳斗城一去嗟多病賔幕重登便半仙要看諸郎各行馬染鬚膏面計留年再次韻門第應疑甚不庭翩隨府檄下山城江梅作意先秋拆檻菊多情擅晚榮飲處凝香嚴畫㦸客間張丈間殷兄主賔縹緲蜚埃外信有人間小玉京從公囊筆看西邊不比分弓出酒泉觴詠每忘秋漏永平安晏有夕烽傳痼腸頓已蜂腰病妙手親逢鶴背仙歸捋霜鬚詫兒子為翁試校故新年再次韻横前整整萬全兵自笑空弮借背城更遣齊竽混東郭坐令鵠卵化南榮黄陳得法仍宗派甫白論情自弟兄顧我無能鄒賈役放公筆力擅西京因詩衰病顧徒然鑿井今猶未及泉藥幻霜鬚端有待囊緘玉唾愧無傳冥心擬學無言子授訣今猶不老仙探妙衞生俄兩得信知穮蓘解逢年再次韻小雪餘言别是日小酌舞霙飛霰閙中庭已辦持盃聽渭城漢水襄山驟漂忽早梅晚菊自枯榮雪神作意凌風伯客子歸途待日兄蹀躞霜蹄從踣鐡穿林䠞石賦于京語别詩翁玉麈邊已催歌舞壓香泉日陪色笑庸何取槖攟篇章敢浪傳還舎賸書銀筆字今朝猶是玉壺仙后山幸自坡公客誰遣離懐愴暮年江湖長翁集巻十四
