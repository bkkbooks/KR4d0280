body:
  text: 江湖長翁集巻二宋陳造撰五言古詩和陶淵明二十首予幼多病不能飲酒中年稍稍近杯勺延賔客對妻兒每舉少分亦能數舉陶然足樂也頃以病復作絶不飲對飲者意輙為之酣適暇日讀淵明飲酒二十詩并東坡居士和章遂次其韻紹煕壬子閏二月定海邑齋不計憂患場賢聖頗中之淮鄉酒價賤希復獨醒時齒髪變今昔撫已屬負兹清坐挹飲客辭費未免疑客歡我怡然此戒何妨持壮嵗鋭著述瞢欲藏名山中間忽自哂聒聒厭多言棄置杯中樂雕鎪耗嵗年不知百嵗後何益空名傳薄俗不難化君子要得情善政良易孚循良本無名一從吏海邑我暇民樂生穽填虎自避心㝠鷗不驚且了飽飯課不問報政成不念建徳遊枉作心奮飛一溺狂泉飲坐受人所悲吾樂有餘地醉鄉真可依酹觴初問塗嗽醪便知歸棄置近藥裹改絃計扶衰歡趣固自若誰謂志願違捐金得嘉㫖舉室更笑喧老子舊小戸醉帽每先偏即今省酒費或辦歸買山吏隠有定趣縣債當亟還乗流遇坎止畢世佩此言張竦詆陳遵彼此竟誰是徐公今似優昔行未容毁中年覆觴過畏病乃能爾兒輩無真見緼袍賢錦綺海鄉亦好春紅紫紛蕤英黄鳥托庭柯啁􅑜如有情知我得碧濤似勸花前傾豈知好飲客靜坐耐耳鳴茹津拆紅泥鯨吸看後生碧濤酒名骯髒老眉面豈是趨世姿謬著百僚底躄躠彊折枝深知才用短敢謂時命竒歸耕不顧計更問婚娶為何向不貧賤肯為寸禄羈公朝不遺才蕩蕩天門開雜遝盡竒士騰凌舒壮懐有客尋遂初與時自作乖脱粟傲肉食官居當巖棲東州拜璽書西州迎芝泥夫也商聲謳滿屋金石諧詩書孰踐履簿領甘沉迷平生獨往願萬牛挽莫回自公有至樂詩巻還坐隅得句一吐之嬉然忘窮塗百世一俯仰萬象付馳驅吟情當飲興其樂皆有餘役心聲利場咄咄彼何居卯金穿窬雄典午盗有道當時附炎人忍耻稱國老延之終代北范粲車上槁矯矯竹林儁麴糵豈真好陶公諸公右烱若横道寳不就酣湎逝亦恐自標表訪書酒誥空揚子浪傷時頌徳譽大人劉伶頗費辭人生意行耳暇復商略兹用已律世人一信起千疑規規滯所然在物寧非欺我心受風舟漂然隨所之人生無賢愚彼是皆夢境矻矻迷所求㝠㝠睡未醒此心方放紛息念乃要領衝風有驚波揠苖無佳穎夢覺悵今昔吾其黙自炳暇日坐北窓好風竹間至楚騷偶到眼開巻已心醉愛君君子心湛身抑其次自靖各所安苟難豈所貴非渠工語言誰遣忘肉味憒憒綺紈兒客或大其宅長公抱胷竒所向有削迹窮達吁可驚賢否乃什百請君勿此計計之當浮白九品寧用評四并良可惜細閲史氏書宛若身所經夢録以命之過影紀虧成一堯間十秦寒暑倐變更我起千嵗後遊心於大庭俛仰海塵揚鼓舞天籟鳴紛紛閲過前表立俱志情予讀史名以夢録達觀無畦畛自狹叔季風典書有佳釀飲徒常眼中彼醉我俱適未覺介勝通剛制免寂寥政復人得弓少從師友間雅意效一得中年彈塵冠欲起復回惑初無輔時具吾責良易塞即今禹紹舜羣俊萃王國臣猶自知之環省每愍黙昔人蟻壤遊方復詫貴仕回首辭窮約投分感知已鄰鼓驚邊隅得無豢養耻戰酣日為却血尸三百里推枕視窓日前事皆可紀向來心營營乃始得真止彼此誰賢愚所持那足恃陶翁出宰縣徑去亦天真閑居詩成集古雅仍深醇坡翁訪赤壁臨流雙鬢新小袖補衮手千篇凖過秦兩翁閲當世眇若毫端塵煕豐望義煕愛君最忠勤向非與道俱寧爾著語親自我誦遺編行身少知津敢忘炷爐香亦復墊雨巾鼎鼎蓋棺前期無愧斯人書法蟹方後放麑念號鳴易牛憐觳觫仁心誰獨無天機或待觸悠悠寄宇宙往往狥口腹君子一飽適庖事不到目寧知刀爼間宛轉無聲哭空蜚與土穴暴殄無遺育況此佳風味世肯貸爾族炳炬擒爬沙免介薦膏馥向來横戈怒不救揺牙酷醤浴酒拍浮方法忍抄録躁擾至絶命耳聞痛在肉淡茹吾能事晚食媚山蔌寄二孫憶昔初抱孫雙鬢颯已秋眼看與我長嵗月如許遒我以薄宦西汝為守舍留夢輙來後前嵗律歘再周想今與迺父長我更半頭天姿粹而温整整靜不浮六經如取攜八面自優遊落筆動萬言頗能如翁不如翁何足道抗志須前脩良匠有妙斵惰農無厚收彼哉碌碌者不源而計流吾言不虚往過是夫何求右㦿阿泰幼儻碭勢若泛駕馬暫别已束髮折節殊曩者誦書口瀾飜晝夜曽不捨課肯犯雪供筆亦揮汗把才地校優劣不在阿儒下平時於方兄眇視真土苴念翁少年日為學不餘暇混俗類疎放秉心迺儒雅兒今頗肖吾解笑時苟且師匠求有餘好書不外假緬懐螢雪邊力倍功更寡可用吾季孟直輩古班賈右扆苦旱六首旱氣乗炎熇觸耳仍怨咨九重正宵旰解顔定何時書生身世憂寧止八口饑可復河朔醉欲賡雲漢詩雨師久退藏風伯恣吹鼓蓊然西郊雲離合太熒侮及兹一汛灑頗亦清袢暑幾占魚鱗天僅得龍尾雨我雖甓社居有田不瀕湖漫漫湖水長奈此田中枯攜文客邊侯劣可輸殘租黧瘁不識飽愧爾耕田夫枯旱嵗十九無若今嵗酷日色雖許赤苖心尚餘緑舉觴勸睡龍雄飛勝雌伏作意收桑榆前愆儻容贖蒼生惜死所倚須數寸澤連朝油雲度空勞問雨色豐歉恐數然造物莫為力定知天屢隂為爾動悽惻頻年忍流移猶幸稊稗孰稊稗亦已無何以填饑腹時方迫凍餒埶恐瞢榮辱儻無意外憂根蘖猶可斸馬上見賣白蓮者三首引息度竒暑風日正交戰淮鄉六月春嫣然擔頭見香凝素囊拆濕餘清露泫豐膚專正色一忠百佞賤祝融迺司花慰我紅塵面買歸一盃適得共黄葵薦東蕩百頃寛滿蕩蓮結花孤村蓮蕩西茅茨吾所家年年紅紫盡為春留芳華酒船墮雲錦歌棹凌瑞霞只今鄉閭夢不道身風沙把花但三嗅對酒長咨嗟東蕩花清晨西湖渺無津凉荷引天逺極目粧面新鳴榔與鼓枻彼豈尋芳人香風漂我舟領略不及賔當時賞花句興在迹已陳歌似氷玉友花面俱迴春蔡秀才求予所作記作詩贈之時蔡移居古人四壁居今人猶歎息蔡子攜百指亦自無四壁分絶㯽榔求未斷文字癖此行誰知已所向盡艱食予文久自知不作杯水直方君忍饑雷可語寧此石彭尉焚巢二首彭以韋經名堂彭家柳邊堂江色潤書畵迺公根柢學衣傳自心㑹唾手勲業餘探妙文字外區區青紫計韋子豈君配神物護揮毫而不告成壊赫炎巻地過椽瓦了無在賴是堂間書萬軸腹中載迺公洞天理否傾則為泰向來薦才名開口取猜怪從今柳先生頗為參元快迺翁五車讀弓劒初一命九十歸田園顔丹眼如鏡客來不告倦筆落有餘勁霜嚴草花落松栢獨也正吾憐盼與扎徐閲襄昭定濟美竟寂寞陳編漫輝映翁家戲綵郎足繼賢業盛雄詞逼王楊奥學窺韓孟援今校古昔兩翁猶此病今段天試君處此要以靜次韻章舜舉天孫望河鼓杳眇河西東參旗映天梁歘作秋夕逢人生風馬牛未害心期同章侯大雅士抱負難形容平生萬巻讀㑹意春氷融小遲風雲期未剖琳瑯胸我頃誦清句神馳水朝宗識面勝聞名論文得新功烱彼如意珠來自仙者宫徑作君苖焚執筆吾熱中荒學顧何取目昏鬢已童惟應得石友天用慰塗窮再用前韻贈鹽城四士行李小槃薄海西禆海東交情半新故生世有遇逢從我二三子草木臭味同業工畫眉嫵飾此氷雪容髙軒一再過向我作春融陳侯犀一角錦腸星斗胸章侯金百錬學派傳正宗楊侯較諸楊朝墨收儁功王郎天地間合侍明光宫我老一無可短翼羣蜚中樽酒剪銀燭詩錦佩奚童寛破十日留文律得細窮次韻王解元賃地築屋饑麟不落毛士生常百憂何人金為埒振客不待求之子磊磈胸貯書不貯愁焉知奉二老百指借岸舟方耐冷侵骨未暇吟掉頭目前帡幪託急於温飽謀詩來愬窮状讀想寒颼颼我亦寄别巢其拙真病鳩每慙烏所瞻更羡鸎出幽君看沉沉者生不譚軻邱可食忘嗟來至寳忌暗投天地吾蘧廬此理君信不為親儻可屈三返無宜休次韻章時可般門難呈拙仰屋方自咎詩肩卓兩峰因君笑今又袖手非不佳拜賜良獨厚翩翩王公孫肝肺衷繪繡向來傳新作價欲擅文囿妙語再墮前吟玩忘昏晝江濤駭澎湃風竹聆疎瘦足我學古心如飲得美酎氣無寒郊寒派續後山後采采葩華林羣芳釀孤茂錯刀合瓊瑶内索慙寡陋肯如周人朴唾去不一嗅贈施都正三首嚴嚴神仙居不受世塵涴棲身白玉壺眼淨詎容唾主人敬愛客馬秣僕不餓洗心爐薫前容了舊經課雨窓舞晦明風竹作騷屑斷無思歸夢人境兩清絶道人氣金玉妙論挾氷雪未須金鼎丹始可黒霜髪欲觀芸芸初當求根極地古今貉一邱貴賤魚千里纎雲翳太空𤣥珠在深水安得數年閑與師商㩁此次潘徳久韻潘茂和買妾不成其兄徳久有詩即席次韻沉沉王侯居列屋皆妖妍性斧糜春䓤日詫歌舞筵孰知山澤儒超然廣文氈野花供嫵媚山月獻連娟潘郎真吾徒常加視後鞭居無鮑生馬紅粉風蓬旋張公為石奴處仲政復賢繼今看逺業賤子當留年次韻章茂深安撫見寄引領數仞墻坐厯幾秋仲西風度凝香稍羞文字供使君今退之一眄士輕重碩徳金玉文天畀為吾宋鄙夫老世紛萬事曲肱夢向來竊膏馥編綴飽吟諷此詩含古意羣騷之橘頌理窟有餘地猶許一醉共名卿璧一雙豪士笛三弄侍公眼生纈聊目歸鴻送七月附米舟之浙中作白䖝散如蛆黒䖝聚如蟻循縁仍咂齧欲寐復九起吾舟玉為粒生此果何理神竒作臭腐秋暑况如燬人生託洪爐一飽蓋分爾臨流念彫年胡迺置身此笑口忽唶惋曼膚或瘡痏隄防費應俗情偽良不美短籬護松菊吾歸殊可喜錐刀詫朋儕嗟爾商販子召伯停舟辟雨去年是日之山陽辟雨繁梁作菩薩蠻云窓度荷芰風舟艤鴛鴦浦落㠶憩篙師辟此白淙雨長征取愜快留滯不云苦適喜縣麻埶為盪鑠石暑去年舟繫柳卧看虹飲渚龍公㑹事發尚記跳珠語﨑嶇不諧俗似為龍所予一盃酬新凉開瓶先酹汝過樊村襄鄂二千里何啻三百灣風色九順逆左往復右還舟行已三日沿流不作艱即今蒼煙面猶是泊處山信次有定期曲直了不關聊可供戲事輕橈與回環吕城待閘得陳魏二生晤語吕城望犇牛道里不作逺徙倚不容前奈此河流淺窘歩客懐惡癡坐僕夫倦班荆得兩生晤語忘旦晚文巻得細披湯餅亦粗辦生須朋從樂時亦慰連蹇長吟行路難回首偶耕願卜鄰儻君等老我幸無怨贈楊伯時璧月無纎翳氷壺不受塵西京子雲裔有官居士身今代龎徳公淑質秉大雅生事一邱壑龍鳳拜床下緒餘辨官業膏馥付爾曹詩聲華岳重士論錫山髙京塵逆旅中初喜識芝宇鄙語愧呈拙有底極推許漂流當定居久計浙西東他年結詩社未嫌後從公送葉主簿楚州應錢帥之招主簿已七十漢庭用少餘無䇿銷外侮充國七十翁勝算定樽俎夫君譚西北萬里真目睹諸將失投機遽豈一二數形勢可聚米君王未借箸江湖五十年帝閽嚴九虎後生不更事兒戲議邊圉圓方殊枘鑿寂黙忍羈旅平生干霄氣百吞不一吐白眼閲流俗閉口避爾汝山陽文武資幹國今吉甫清嘯臨籌邊志已無驕虜經年虚代舍須君作謀主心嗤區區鄭緩不省之武盍思度外意徑略紙上語山陽吾未識彷彿夢眉宇斷知磊落人衆棄能獨取一巵勸臨分三歎欲輕舉抒君胸中竒定作商應羽還應訪隠淪道我聽鷄舞次韻王解元觀名計利心惴惴日交戰洪濤探龍睡赤手投虎圏孰知青雲士眼靜不汝眩中年琴書趣早嵗林壑願我無適時具未敢厭寒逺政須營一醉尚喜春酒賤前回所探花撲蔌已如霰把杯臨清池纈影中流見可須催歸語且領提壺勸向來眼中人此客頗嘗見兩王風流絶聲名到朝彦新句如破竹脱手金丸轉石交可忘年時亦共酣醼春來景物好題品遍詩翰鶯花不無情向君真自獻贈錢郎中刓方利禄媒抱道俗不省詩書工發冢孰起世儒病錢侯挺直節蠻徼復蘭省劒氣夜星明鵰翮秋霜耿上前論世務萬乗為首肯平生中原慮壮嵗左符請不作黄閣想擬試白羽秉孤忠當宁知宏圖時宰領羣兒須圓曲謂可力勝命彼此計乗除得甓喪崇鼎平生信所得一鑑照萬境幕中辭脂韋客右進嚴冷主簿聱牙伯評俗怒生癭謂伯永令君强項翁爭事不藏頴謂劉山陽但有周舍思可無衛武警我亦意行者泥古志未逞朝來聽名理剪燭延落景寸田殊易荒有賴剔榛梗效竒乏良䇿汲深慙短綆惟期佩公言不墮頹俗穽次王仲衡尚書鹿鳴宴韻儒冠幾經秦士貴始藝祖英儁承上意不止工造語文風逮列聖秀異彌博取即今再太平比屋務稽古先生國元老曩亦原夫舉倚相能邱索吉甫允文武後生藉膏馥掉臂雄藝圃豈伊鄶無譏敢睨大國楚諸生觀國光名欲簉龍虎初非意敢料顧為公所與蕙蘭侈芳筵肴核富雕俎酒行不待醉闔坐喜欲舞妙句韋白前拭目嗟未睹豪氣倐賈餘舉舉陵天宇懸知三千牘去作虹霓吐我坐廣文氈勤拙初不補看揮修月刃穩送摶風羽傳燈知道尊食蔗記荼苦明年公東歸商衡傅巖雨附翼偕渠儂逺臣觀所主再次韻謝王仲衡尚書薦章禰生布衣兒始未客黄祖一鶚輕百鷙名已騰薦語跌宕噤不施衆笑此何取一賦出緒餘已可光近古先生傳正學抱負幾文舉名世昔退之好善今衛武汲引略權近論薦及農圃髙義表一時惡氛可消楚俗方急梯媒中表羊而虎低顔下氣地百請幾一與代舍著衰翁秋芹薦侯俎泉甘困深汲袖短妨妍舞薦士不待求昔聞乃今睹傅毛可飛肉矮屋俄廣宇平生氣輪囷非公向誰吐小當工撫字大或效遺補長風初借便振迅顧雙羽未妨著書縁人有譏自苦朝來詩興動毫端鳴急雨夸似鱣堂生頗見此賔主次王尚書韻呈石湖聖經三百篇凛凛詩鼻祖日月懸太空不作雕篆語可學不可議仲尼親去取變為屈宋騷刻畫已愧古曹劉驥騄騁沈鮑鴻鵠舉並稱五字雄繩墨蓋陵武甫白壁萬仞眎彼柳樊圃又如曹邾鄭屏息從晉楚黄陳嗣前作風壑嘯兩虎公生四子後相望心相與溟渤無棄流酸鹹或登俎取源自聖經長袖固善舞清篇神所護近句誰先睹鄉來儀朝行拱揖尊帝宇出使辭氣振前席情素吐非公任安危衮闕幾不補歸來将詩壇越笴傅之羽陳黄伯仲爾胡復用心苦學力我枯涸進冀濡教雨首肯公不疑更用詢季主次前韻贈龔養正淮鄉富竒髦歛衽讓乃祖及今戸相矜十襲藏妙語遺澤有源水豈直輪一取夫君典刑在落筆更醇古白眼視公卿矧肯睨豪舉世味淡如水進徳吾孔武四壁但圖史一飽問場圃脩眉氷玉顔初服仍楚楚團蒲芥軒寂索手繫雕虎客來輙欣然詩就寧漫與自云窺官達束身著髙俎肯思麒麟楦强作沐猴舞見笑寒如氷如睫不自睹君眼髙一世天光靜生宇寓意文字間軋軋蠒緒吐后皇急幽側員闕多未補當儀振鷺羣亟下㝠鴻羽鄉來受㕓地幽屏良獨苦蓬萊道家山金碧上煙雨反君招隱篇長懐報明主大雪復用前韻呈王尚書密雪何自來雨禰雲其祖史臣紀上瑞外此可無語帝豈為詩設偏為詩人取梁園謝家庭麗句傳今古𤣥㝠老更事厥職甚脩舉屬者甫見白今者復接武賦形想像殊玉田瓊作圃定知懐璧人蹍足不向楚天孫事遨嬉開闗叱九虎剪水幾何時下土均付與羣僊燕青㝠酒所未徹俎狂撼白榆花笑看風處舞林巒帶城堞變滅眩所睹安得鶴背游一覽了九宇頗煩孟光請杯覆詩不吐海圖拆曲折兒女粗紉補明年麥秋好落磨收鵝羽盍賡屢豐謡少慰田家苦嘉應自邱禱不待書閔雨飽飯對翻飛此恵仍地主祈雨齊雲樓與羅春伯提舉露坐索詩作波涼魚初浮露下蟬罷警胡床俯前池妙意吾已領主人絶俗姿此地背塵境霜華耿玉宇璇漢轉金餅桂娥不無情與客閑弄影紅糚擁千蓋環坐殊秀整盤珍供剥芡水厄停煑茗羅以河魚不飲茶清譚略逕庭快若客酲醒不辭僕頻更頗覺夜彌永明朝雨一尺重約追霽景但恐閑麈尾鼓吹閙蛙黽適聽歩虚聲縹緲碧雲頂次韻諸公清樾軒詩塵中望青山防有移文阻誦君清樾篇頓忘三伏暑想見松風底樹羽仍設虡山靈莫逆友獻豈煩縞紵招隱未容反陳迹渠能序詩翁麋鹿姿窮不問唐舉歸誅故山茅呉鴈馮寄語君寧山中人居州定王所代羅大著遥題雲巢髙人玩世心仕學有餘裕稍償俗間負未忘塵外趣結巢依莽蒼泉石得佳處牙籖三萬軸遮眼豈云蠧鳥哢巖作屏翛然不移具時招櫧山雲蒼白繚牕戸徑潤樹罩煙庭虚月含霧萬景供旦夕與人美無度園翁垂綸叟或許陪杖屨我亦漫仕者雅志買山住即今想像意未辦魁傑句他年登君巢酒所尚容賦次韻胡學長喜雨胡君著述間動作千載計雅奥三百篇挹取欲無藝一源發至醇萬象赴傲睨平生笑此癖論交惜晚嵗君詩信入神我眼本無翳屈膝邢娥前酬贈慚醜戾憶初拜雩壇遽恐枵腹斃徒然隂樞縱寧止乾胏噬敢徐救焚歩頗徇非鬼祭端知世興道密若有司契神孚聖君徳家沐良牧恵天人隔顯幽論理不論勢朝來望阡陌白水漲天際歌呼滿中田不勉渠自勵黍稌分後先稂稗易耘薙清泉向小歉比屋念遺穧饑飽巧相補上帝亦已諦老夫辦疊期是恩良不細僊曹有佳招天閽不堅閉長安粟一囊或許引前例不然買青山補破仍茹糲出處顧何心一漚寓斯世衆雛能稼穡暇日訓孝悌相望渺海涯恩懃未渠替張侯本萬中蘇子勞再説排霄眄世儒笑閲風外蔕草麻侍金鑾雲空澹溶洩丈夫要特達不必須援繋即今轉圜句可薦五方帝如今縣麻雨立見萬生濟贈鍾汝楫坐窓雨蕭蕭出戸泥活活旅食向六旬淫霖破七八舊新佳客斷局陋不可活鍾郎巻銜袖詩與人秀發誦之未數帋驟覺隂氛豁壯如秋濤湧清比哀玉戞騷人詠香草不足供採捋詩人深堂奥掉臂欲排闥應接殊不暇愧耻那容刷正宜長聚集慰我抱饑渴不見動十日有力苦見奪轉頭二十年夢覺幾電抹我甘鼯五窮子亦狼載䟦川増得深敬外此本毫末别語忽見諗回腸隱膠葛乗除等寒暑休王有回斡豫章出林遲出乃千丈㧞天居五雲處往矣儕俊傑當念淮山陽有人晞短髪噬肯回葉舟譚妙共蔬糲題徐居士遯庵世網誰所張四彌天宇大萬情本一機矻矻同此在徐君經世心心乃超世外趣靜縁有動無顯奚用晦姑為辟俗去示世無吾待結庵定其遷初不憚一再容膝得勝處外物了纎芥有山自煙雲有水可灌溉百丈峙翠屏千尋拖碧帶床頭三聖書㑹意謝分掛天山得要㫖肥遯元非内此名扁此室吾詩儻容配次韻徐秀才十首以才子富文華校讐天禄閣為韻冷官卧漳濵書奩漫棲埃飱魚芼瓠葉局縮養不才窮鬼不受送與君作陳雷将軍視将浼夫豈餽無臺杜陵将詩壇受㰱湊多士黄陳大其傳劵契密付委徐君萬巻腹詩作風雷起春秋富有餘著眼置餘子向來孟浩然醉眼髙宇宙清詩落京師蘇李欲束咮蔗隴槎頭鯿未覺黄金富纎鈎餌蝦蠅但取浮陽嗅翕赫公侯門下客亦方聞慘澹埃􅅽地髙賢絶通津蠧書分此老華國須竒文渠觀有旁招子行當冠軍毅毅掛榻翁孺子來如家長安聚蚊兒車馬紛囂譁裔孫㑹兩窮韶顔映蒼華長嘯叙孔李驚翻籬角鵶霄霏上㝠鴻山霧卧文豹餓鴟嚇腐䑕啄啄詫飛趠吾徒為己學欣慼置不校小草或逺志詭遇乃近效鈎妙如悟禪去瑕等居讐學詩得是法善刀無全牛脱手希代珍願子母輕投衮衮譚項斯愧非古人儔閲世難衣食眼中子能賢萬像入吟筆摹寫皆其天蹇孑我荒學一字不蘄傳子家文章録得書或牽聮釣湖鱠紅鱗斸山飯黄獨書生甘若飴八珍不在目出處有餘裕贔屭營寸禄一舟指三徑不逺儻許復堂笑伊優登米笑侏儒索見笑與笑人等可付束閤從俗心易波矚理眼無膜但求種秫田歸療酒腸涸次諸公詩韻去年略憩成倅小築約今年同遊不果諸公詩巻來索和章感而次韻成有歌姬甚黠云墻圍護風煙簷影納紅緑城西百弓地論價指和玉滄浪取具體輞川儼遺躅年時得小憇振衣休汗足山靈不留人定復厭棖觸坐想散花女深堂伴金粟今年桃李月僮馬幾装束竟成夢魂到永歎春事促此亦志願違世有谿壑欲似聞偕六逸成仲鄰句㑹凡七人碧酒仍艶曲風鶴羽人下露花妃子浴詩巻肯屬我為洗顔面俗元亮晚耒耜彌明舊符籙可須白月前熠熠度螢燭八月晦試院中作官居課程地生有文字癖誠知蟁負山詎得辭此檄嘉禾古多士孰者非巨擘老眼不待封舊苦眩花隔勿云石賈玉箴失眸亦得荀子云失箴者眸而得之捧心若為妍竊鈇徒自匿陸海貪窮搜竒寳多偶獲巧常昏金注勇或便大敵清醳聆鄒琴欵識辨周鬲頗收半段槍遐念連城璧渠應悔羔袖吾敢厭鷄肋撫囊搴利頴體國免素食明朝羅客拜定自百夫特俗無抛塼惡歸舟緩張席九月二日燈火一樽酒笑語亦固然如何棘圍夜憶歸不成眠衰懐動多感妻兒須眼前人生四方志誰遣霜覆顛次韻袁憲閲兵許浦皇澤泉及瀕戎索均帝闕邊屯笳簫地彎弓睨胡月萬旅皆金繒不待持閥閲于時江流澌極目雲閣雪嬉嬉忘其寒恩寵自稠疊使星照海徼天意不虚設勞勤需摩拊勇怯要旌别除器有良楛扣閽許陳列古來分君憂下敢謝薄劣叱馭陵九折推鋒取三㨗况公經世才翻浪海鯨掣夷吾吾目中江左佇茂烈汾陽唐柱石守器未應缺銜命兹小試鼓勇士眦裂指揮用諸将他日須此傑聖君中興主詔語一見决治具有罅漏詎容惜捫舌兆朕貴先識沉黙真小節鄙夫百僚底欲隱尚不屑幾登王公門面醜辭易竭向公又一鳴當復笑燕説江湖長翁集巻二
