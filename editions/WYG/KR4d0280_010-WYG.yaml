body:
  text: 江湖長翁集巻十宋陳造撰七言古詩贈王仲和架閣王招飲小姬十輩執樂甚閑予以王之才諝能辦又疑其天降地湧也徐乃知皆其妹所有再訪之去巳久矣為賦古詩朱樓窻霏楊栁烟樓中香霧浮龍涎眩旋客眼錦繡筵鬧花打圍妖且妍小蓓稚蕚紅玉鮮酒行急管雜繁絃羯鼓催開褭風蓮横笛未放蛟鼉眠老子判醉忘華顛歸去就枕疑針氊但有夢語追遊仙芳訊忽聽青翼傳翠鸞彩雲歘漂翩縹緲三十六洞天水佩風裳若箇邊重来朱樓栁吹綿樓中主人卓詩肩瀹處士茗安僧禪兀坐向我俱可憐君才時彦孰後先宦路已著祖生鞭富貴取攜固有然列屋指見羅嬋娟老子賢否真天淵蕙蘭香中錦瑟前觴詠或可君周旋次韻林郎中龔宗簿散人擁書茅屋底秖合下澤居鄉里浪指青𡨕期策足端復滄浪規洗耳林侯坐分韓席半龔侯天才寧習慣瓢酌天漿㤗紫傍峩峩貝闕連蜚觀名位顧肯卑微休兩傑未易今世求老子志願一邱壑鷦鵬彼此逍遥遊清篇駢来真好在誰云物理莫兩大捧心血指不得辭門外長須翹足待再次韻寄林郎中林侯理窟元無底如拜宣尼親闕里經笥沈醇文筆古俯視時流皆口耳我生憂虞占多半鼈跛蠖屈今已慣林侯尚抗倉庾塵盍胡嘗作不二觀相魯君小公儀休從政顧自愧由求崧髙蒸民有吉甫飄風浪欲歌来游索米惜不畱行在坐論看君偕五大樵謳或配鼎彜書衰翁縱衰猶可待再次韻呈林子長郎中龔養正寺簿荒學蹄涔易窺底祿遬不應来帝里昧為此役君定笑當念平生意行耳過耳毀譽紛相半曳裾袖刺何嘗慣餬口未忘丐斗升投閑正須問祠觀歸雲倦鳥且罷休鏡中頭顱盍反求小兒能耕婦能餉老子卒歲良優游石友青雲兩君在肺肝傾倒不自大還家猶可詫里閭渠儂秪博白眼待再次韻林郎中醉鄉陶然真我底落世瞢作魚千里頗思溪風鳴檜枝一洗半生市聲耳帝城春月雨强半躡屐衝泥今巳慣湖瑩氷奩濤湧山回思向来領竒觀角角倦鵲語未休晚鳩饒舌如有求明朝定可載酒去攜兒一為湖上游湖西羣艶雖無在宿雲掃空天宇大蹇吾健倒趁早歸醉尉未須嗔目待次兒輩喜雨韻呈太守老子簞食師顔淵憂世不合居民先今年不雨春破夏惴惕亦復針氊然嗟嗟五月河無水温飽之望疑己巳一雨滂浪彌夜旦龍伯至仁端起死國史未用書旱雩人神幽顯修交孚老子一飽危不給恩私仰戴君大夫君恩如天不遺物龍伯豈應甘蠖屈使君况是龍之友偕兒同依趙卿日再次韻寄楊宰小家作活魚脱淵凶歉之備渠能先勞勤頗似抱甕叟安得心數如計然人方渴羗欲沽水龍公睡足那容巳怒捲淮江作飛雨旱魃潜藏蝗蝻死令君丘禱亦魯雩天心黙隨人意孚百里旄倪歌載塗我亦飽飯竟潜夫今君豈復池中物中年墨綬人稱屈髙郎小邑徑刺史老子賀書當不日使君有詩復次韻詩播樂職聞子淵貴耳底用泥古先吾宗使君當世賢援今輩古敢間然祖武孫謀有源水功名濟美方未巳即今朝野屬望深簡齋仙人真不死詩律欲並元劉驅郡政坐使豚魚孚編輯妙製紀殊績瘖不措手吾非夫壯歲毫端有神物才與年衰此心屈伸紙索句頗强顔漫把清明譽天日贈臧汝舟次韻昔人得珠没濤淵悟後悚惕悔厥先世間萬事無真是辯口莫究然不然此心疑然古井水與俗方圎寧得已紋楸亦有進道機介視勝負齊生死臧子多智守已愚能事不蓋已日孚南風覆舟後詐狙義戰得雋逾老夫閑中敗意防俗物喜君相過不待屈此樂政令兒輩知閲日無庸譏愒日次韻楊宰花石綱遺石令君藻翰輩古先脱口一可樂石刋盍令珥筆草大冊底用韻語談槐安一詩為弔湖邊石深感崇寧全盛日玉燭叶和黄道明天扶休運非人力豐碑端合頌虞周逺来近恱絶歎愁有君無臣古所恨殱佞嬉笑乗膠舟鴆心飴口諛聖主漕石移花鬧南土玲瓏蒼石中路棄不見姦憸歐刀死此心安得此石頑感物抱恨甘終天平日志願裹馬革杖扶鬻茹吾衰年再次韻楊宰君不見竒章平生石解顔有得甲乙勞鐫刋又不見衛公平泉嚴作戒要與山岳爭完安袵席杯盤易沈溺可無雅好嬉過日生須玩物不流物負山暇問誰有力此石擯棄歲㡬周㡬人摩挱動詩愁不妨野鳥印爪跡曾是畫鷁明方舟奇嗜豈必真無取尤物未可輕糞土二公真情不激詭靜對孱顔堪樂死揆予骯髒如石頑一跌叵復能朝天石黙不言詩為宣正用吟玩忘吾年次韻解禹玉解作詩亦工於畫詩則饜觀矣諸公多得其畫予獨不見與故詩中及之夫君官職雖西班夫君不獨師孔顔畫手人言逼曹覇詩力自詭追子山對客每遊庖丁刄得興笑解齊女環槃礴臝前筆未落競病韻險思不慳掀髯掃出山河影就醉或放風月閑我亦平生弄翰墨諸公頗置齒頬間側身南望常仰髙肯交下風俄二毛京口市樓聽度曲廣陵帥席陪揮毫悲吟自作夜蟲響絶唱傍羡秋鷹豪虚孰髙名擅頋陸僅識妙思陵莊騷金阜老仙憲文武醴筵繼日喚我曹銀臺吐燄眩金翠繡帷護煖聞蘭膏挈挈去尋樵牧盟貸我抗俗慙山靈風流雲散有悲唶目前赤脚仍樵青府公忽駕西蜚鵠言訪劔閣摹舊銘女媧青泥萬山外爭突雲日寒崢嶸前懽弦斷更容續一紙寄意良未能向者望望君不来談舌攅棘胸填埃叩門剥啄粲一笑灑然一洗衰病懐新詩絶妙不我靳笑口忽復緣君開驥足爭先真老矣屠門大嚼亦快哉但令石交不遐棄此外擾擾付一咍㡬時攜將好東絹倩巻吳中山水回贈解禹玉解將家子以文字取世知予望之以致逺而老夫書癡為可戒故復取前韻作詩進之讀書秖博雙鬢斑詩好豈解留朱顔平時無客憐轍鮒觸處有人嘲飯山相府略嘗喚宜祿木門不夢窺銅環多病但結藥裹伴得酒間發詩囊慳頻頻終慊􅢟斯飽浩蕩擬逐江鷗閑未死更費屐㡬兩此生秖欠茅三間方營巢未竟丁年悔不全吾髙正坐枵腹守不毛卑官餬口竟何補捐棄什百収一毫執版仰看上官面可復直氣陵羣豪夜剔殘燈賦招隱愁追交情廣楚騷豐約僅足優龍具汙隆真可付馬曹共嗟孔奮不自澤政復所至無脂膏向来枯䇿苦傷生塗窮却用陶性靈故人肯来問牢落河畔罷吟草青青夫誰急草脩期檄夫誰大刻班超銘孽虜遊魂須晷刻燕然蒼石髙崢嶸横槊千篇月三㨗是責捨子誰當能可遽學我賦歸来臨流欲濯襟袂埃老子期君舊不淺看上要津舒壯懐烏驚兎急易寒暑堯蓂不辦供合開文字玩世請少息盛時難得君念哉昔人聽謀取一得勿以老耄資笑咍君不見壯歲一跌子陳子江湖畢世甘低囬次韻楊宰食蠏長翁服食僧様清灌園得閑収落英壯歲頗營口腹事岡有罝罟梁有罾大胾每快屠門嚼美酒慣陪豪士傾酒邊最愛無長叟坐隅未揖先風生揮斥肴品進此叟似去傖荒遊上京王謝家兒負販子氣味不待口舌爭年年屬饜不汝厭勇向上黨人夸矜一從多病戒竒嗜屏絶鱗介疎薑棖水中之怒寧阿系丈室髙臥幾淨名二年閑殺把螯手久要藥裹熏爐并旱後籃筐薦蜞越君乃下筯収所憎銘盤久斷舊嗜好垂涎忽誦新歌行射陽浦口霜耿耿繁梁埭頭霧𡨕𡨕及今尖團日供百莫孤君家竹葉清射陽最出蟹自繁梁入城故云予嘗傳無長叟無長無物也今秋此物艱得而小送羊侯因簡崔帥殿廬護嚴外蕃宣崔侯文武能兼全石城之政列城先迄今遺愛春與妍爾来淮上提帥權淮民歌舞且晏眠術業可但朝路傳異域南首爭駢肩舊故顧念無愚賢如我衰病霜滿顛眷眷未肯即棄捐一紙緘春飛墮前嬾拙雙足如繞纒欲徃謝之尋囬船毎獨念之㡬針氊叔子北歸氣翩翩棋酒辦與君周旋未醉定復譚臞仙知我抱犢方中田黄堂名酒壓香泉香泉髙郵佳酒名淮白不下槎頭鯿叔子小駐當還轅有人北望心拳拳無使渇德垂饞涎次韻張守垂虹小駐聞道垂虹舒逺目江波浩蕩江天晴江城竹馬待已久未妨小寒鷗鷺盟郡民憔嗟歲下熟丈夫慨慷志在行盛時陳力要接淅遮莫常譚嗤老生再分韻得花字春工㡬時来天涯人間指顧成豪華未歎丹杏無餘葩能事已到桃李花東園地勝賔盡嘉塵邊霏屑杯中霞將壇令下手一义陣勢歘變常山蛇眉顰肩聳靜不譁詩成笑語還紛拏吾儕此樂世莫加聚蚊金谷何足夸但恐兒輩揺齒牙法士亦復工疵瑕君且休矣吾還家况復髙栁翻倦鴉徑催紫衣巾小車我亦欵段隨揮檛贈趙子野子野分韻得日字借其韻長翁飲徳腹為實趙侯論交膠在漆官曹未肯孤吟賞車載鴟夷挽衰疾樓前紅樹媚晴霽樓間清風細披拂崢嶸帝皥專花事彷彿江妃奏瑶瑟巾欹幘墮人傲兀堂堂飲興方未畢眼看韶華吾囁嚅氣摩蒼昊君豪逸人間樂事易陳迹便恐清歡轉頭失孰知椽筆今詩史煩君揮毫記今日贈劉行甫分韻得耳字劉郎雍容古君子平時人指原夫耳忽然闖我風雅壇疾雷破柱蛟龍起豫章可棟今七年魏舒驚人纔一矢後来獨步君仲宣撫斵輪具吾衰矣次韻趙子野贈别白地倒海翻重湖趙侯塗改插架書石麟角犀清而腴了知不是山澤臞舌宫齒商鳯將雛一笑著我東郭竽曹後鮑前君指呼郊寒島瘦君童奴翠鳯未䏑口不餬吮漱沆瀣騎兎烏擘水挹取驪頷珠掛作白月照海隅丹山阿閣久榛蕪跳梁餓鴟啼鵓鴣兩鳥囚作轅下駒巨靈蹶起張怒鬚一鳥伸喙羣翼趍向来偃仆須君扶大篇落手吾戒塗春風得意揄翠裾東西州爾非秦吳猶金玉音寧所圗送曹器逺從使虜暑風焮面黄塵底曹侯據鞍輕萬里曉趁官程夜未休不為功名為知巳男兒生有四方志誰能俛眉婦車裏周原咨度使塵飛漢官威儀渠顙泚異時横草恐不免此去灌𤓰聊復爾赤縣神州吾舊物文謨武略君奇士列聖恩波迄未涯百年胡運今如此山川險隘須黙究他日上前煩聚米殺胡之林定何許持酒遐望一啓齒歸来有句敵車攻老子滯懣資一洗送二趙金陵秋闈之行君家種德麻葦似兩郎今日東南美石麟角犀互輝映拄腹撑腸皆錦綺賢書聮翩取如掇文字欲貴江淮紙􅇍光久匣自光芒僕姑所指當披靡去去秋風鼓鵬翼翺翔烟霄此其始建鄴山川古雄麗平分勝槩供筆底氣陵鍾阜峰頭雲辭傾白鷺洲前水聮璧不難先衆俊歴塊仍能輕萬里平日雙眼不屢青竒窮一生端坐此即今意氣為君傾老子閲人蓋多矣送劉常父秋試兼簡行父良樂佇目思驥子工師擇材須杞梓劉家昆季寧近用直幹百圍日千里戯綵之暇同鷄窻平挹千古如探囊尺箠政自無堅彊况腰烏號手魚膓鄉邦驚歎有此客一筆與翁箭鋒直秋賦春闈溷子爾老子賀書已濡筆香名聮翩傳里閭珠宫貝闕方權輿他年日奉平反笑更勝而今讀賀書題六么後愛愛少日淫奔女愛愛死作貞烈婦東隅一跌収桑榆竟得佳名傳樂府男子處死正自難此女勵志雪柏寒至今挺挺在人目詩翁作詩垂不刋誰翻此詩入宫羽檀唇緩歌細腰舞直掩霓裳羽衣曲更問離魂饋漿女且玩此舞空金巵莫奏此曲增悲悽蘭摧蕙枯崑玉碎不如人家嫁狗隨狗鷄隨鷄百年佳麗終枯骴汝名芬芳無巳時捨生狥義渠安之而我更用興悲為我悲所悲人不識撫事懐人悼今昔翻雲覆雨行路難君不見買臣之妻彦升客陳伯固使君禱雨得雪為作妖魃肆虐挻餘災麥田未麥空黄埃饑民忍饑守鄉土倚公力挽和氣回梵筵告旱初拜手補陀仙人已囬首楊枝一麾神受職雪龍占先效奔走飛翔作意擅曉昏膏潤趂時救枯朽人名此雪宗丞雪祈禳取攜屈伸肘德政可但人間最大士與徒龍與友閔雨競喜雪應祈今段尤拜天賜厚歸前帝席指日冀更遣竒祥福諸後太歲在戌如在酉看取乞漿還得酒次韻楊宰頭顱敢意封戸牖飲處徃徃推祭酒宜人珍果亦鼎来把杯未省嗟不偶拳栗御棗玉山竒南北氣殊仍地醜少日詩人鱠鯨興莫年醉客持螯手令君未負將軍腹襞積琅玕向誰剖三珍薦槃侑從事翛然徑訪無何有詩来可但落饞涎萬巻更慙王季友送赴省七子憶昔塗抹鬢未秋著書初不緣窮愁交契徃徃第一流愛且助之恩意周翳桑槃飯驚浪舟如輠轉轂需膏油疾需妙劑寒需裘李郝硯席初綢繆陳趙進脩警墮偷出語鑿鑿珊瑚鈎三臧筆底風雨遒丁年出我便一頭儒林丈人拔其尤賢書政用譚笑収七子寂寂從我遊窮人累人君信不迄今里閈聞沈浮玉音下天正旁搜南宫之行勿夷猶巨魚縱壑鷹辭韝鴈塔岐路隣崑邱㨗音聮翩走吾州壯志此去不啻酬士抱奥學追前修噤不施世吾儕羞肯臥少室甘沈幽肯闖侯門提蒯緱賢科夷淦古共由論才君等誰與儔可學老子拙自謀所向數竒老不侯一樽上盡猶未休索句軋軋蠒緒抽不作兒女聲悲啾倚須接武拱帝旒付我一竿釣滄洲石湖兩帖還李推官石湖老子家蓬邱一笑俯作人間遊風度人品第一流結字亦復無朋儔還軫蓬邱俄十秋恍開此帖揩病眸便若執鞭侍瓊舟狂奔渴驥騰驚虬斷圭折劍紛然投蜚虹曳霞爛相繆人間至寳人貪求無閭珣琪雍琳璆彼此輕重寧其侔借我肯作一月留我癡不減顧虎頭還君孰視仍牢収愛護幸免惡客偷亦幸不汚寒具油陳學正惠詩酬以長句寒風折人粟生膚局坐掩戸孰與娛吾宗髙義駕為迂新詩爛粲慰槁枯一百十二驪龍珠春意誰遣生座隅吾宗學力源委俱决為巨川瀦陂湖粉袍未脫口未餬氣凌雲霄色敷腴肝肺向我每傾輸我老舊學慙榛蕪妙語正賴君起予不辦𤓰李酬瑶琚病鶴曳翮寒松臞可復飛動索故吾陳學正孫學錄有詩復次韻俗子敗興蚊咂膚獨賴勝士相嬉娛彼異趣者嗤我迂豈知木茂水不枯繄山韞玉淵懐珠二子豪爽仍㢘隅才名角立風義俱詩筆為我翻重湖雨膏霧沐春糢糊佳節尚忍孤雲腴古来左角計贏輸但有邱隴埋煙蕪願言公等常娛予不辱裋褐榮瓊琚山雌卑飛未妨臞更用鳥烏歌吾吾戯作飲食小過不佳趙帥招飲淡食止酒因成古詩書生禀賦紙様薄平日扶衰惟粥藥一日飲濕小嚙肥河魚數日煩醫治佳辰府公約把酒嚴斥厨丁預節口借問主賔醻酢餘還許公榮袖手無厚味腊毒古不予如作病何仍古語生世例非金石堅支離如我更可憐饞噇動使諸病入冷坐亦復百憂集彭殤瘠肥本自齊此理秪許䝉莊知筯下萬錢無足取厨薦三韭徒自苦法士語飲應且憎何如臥客懐中醉不譍婪酣任人嗤榖伯何如辟榖髙人師黄石陳遵張竦柄鑿夫何為彼此未可相是非七十老翁誰能促戚縛此戒醉死病殂吾命在次陳倅同年瓊露酒詩韻君家家釀人家無市酤漓澁真剥膚朝来洗盞酹先酒凝去聲若金莖秋露珠色香第一味稱此輿臺桑落卿玉腴客間公榮不共飲主人恩意無乃孤歡伯三益能娛予愁城九守付摧枯淮鄉香泉豈其徒䰟夢枉用馳枌榆君家家釀人家無渴羗惱君君恕乎為君劇飲首就濡可待謀樂間憂虞題髙夢錫指牛圗將軍向來馬量谷封君劣比羊千足浮雲富貴漫夸毗不博范叟回青目此叟落魄水墨仙松煤染指皆其天奏刀浪詫牛無全寢訛降飲二百角身不服箱鼻不穿觳觫肯受衆目憐髙郎畫徧米家船此軸寳重一當千老子老欲耕淮壖薋菉葹滿髙下田政用百尾收烏犍刀劒縱售能幾錢展掩此畫空惘然平日幽趣終拳拳此叟儻可作九原畫我草履麻為鞭經挂牛角羣牛前次朱必先與師是唱酬韻朱郎滿腹抱賢業壯歲彈鋏仍哀歌飛將未侯方朔餓天無老眼如子何紛紛過眼日百十超拔如君信難及平陵筆陣吾敢支穩掇世科人所必小兒鹿鹿空肩隨血指汗顔驚崛竒於莵一嘯百獸懾誰顧露草寒蛩悲詩書鼓吹且强飯舜咨臯謨適華旦功名迫逐可得辭等閑莫詠南山粲再次韻男子負抱成蹉跎唾壺自擊商聲歌此聲此意誰解領政用折柬招羊何人言百里半九十它日聰明嗟不及雲衢掎袂夢空勞神武挂冠吾已必久要但有窮鬼隨此鬼亦使文怪奇推敲慣嘗京尹怒登臨肯興賦客悲蠶蟻可浴牛可飯農家星候知昬旦不妨婢子辦黄紬更貸鄰僧供白粲客以詩為東園飲不果次其韻二首東園千樹簉白紅攜壺滿意一醉同向来可是君宿諾政復急雨斜驚風縣知此興未渠盡暖日晴雲豈終吝叩門日聽長須来老夫於子驂之靳春池照影紅錦衣鴛鴦與鴨同低摧金籠鸚鵡頗誶語解道春色今寒灰客来命笑還錯莫此情不似君情薄會須把酒杏花前秪喚茶甌充罰爵主人怒諸妓故及之雨未止再次前韻二首蒼顔無酒不能紅坐窻袖手禪衲同幾時羲馭肯憐客滿意花卉揺光風樽酒向君懐抱盡賡歌劇譚忘悔吝更看珠玉聮翩来孰云猛乞猶小靳樽前罷唱金縷衣花為蔫萎玉為摧欠伸舊識名駒子后山語蘭艾一燎同飛灰匆遽不及呼莫莫春愁禁人酒力薄擬令大白徑浮君畢獻繼今仍此爵次韻魏知元詩人索詩無乃俗我乎索之更虚辱從來東郭濫吹竽繆使尾續陽春曲此腹涸矣勞誅求我老知耻吾罷休使君拂雲敞新樓且可一醉同樓頭是日真州拂雲樓買酒再用韻青樓琴客信超俗俗外客子幸臨辱定知略眼歲寒枝肯負平生白頭曲雌凰雄鳯副所求和鳴之樂方未休暗香疎影春借力更看青子駢枝頭次髙賔王餞徐南卿韻徐郎坐窮無㡬請千里過我身將影未辦還轅梅雪漂頗憶離家鴈天冷髙郎表表今子雲等閑落筆詩中君學力不為救飢分歸從夫子収奇勲贈畫士龔子古人論畫索畫外世俗區區較形似眼明亦有可人者龔子畫形兼畫意龝蘭春蕙相與芳梅花照影生暗香倚煙映霧各夸嫮併作短軸供寳藏斬新雪色三丈壁勝日煩渠揮淡墨楂牙老樹對醜石龍騰獸伏起恍惚松底跳波隱隱轟千鼙石間横斜風竹相因依長翁雅趣在水竹新開湖南規辦五畆綠此松此石偕四友身未出門先在目暮年供給良易足龔子惠我真絶俗萬錢酬贈不頷頥新詩渠能飽君腹平生好事吾屢空龔子好事未後翁藏詩寳畫從人笑與子把玩無終窮呈趙帥訪帥困於腰舖次日帥聞到招飲雨行本自貪風便四十里程真劈箭長年攤錢夸半仙一炊黍頃風頭轉生世快意多所辱葉舟瓠壺浪如屋暗摏觸船船版折船丁籲天船媼哭淦窮儻有哀王孫腰舖人家𦂳閉門丁翁祿遫捕魚者向我顧肯顔色温茅屋新成容寄宿麻茶初熟仍見分解衣滅燭睡欲死鄉夢醒時鷄喚晨平時晨餔下南浦定向揚州聽更鼓飛㢘生憂吾敢怨薄命若為防市弩今朝河面吹細痕竹樹不聲人駿奔掣鈴一笑話疇昔便有樂事酬佳辰鎮淮主人開淥樽蕙蘭香前簫鼓喧一盃為我安驚䰟勝談亹亹清耳根向来憂虞無足言江湖長翁集巻十
