  - {type: page-break, offset: 0, content: '', id: KR4d0280_WYG_006-1a, image: WYG1166/WYG1166-0065c.png}
body:
  text: 江湖長翁集卷六宋陳造撰五言古詩四言附旅館三適豫以病愈不食麵此所嗜也以米糵代之且宜燒猪客有惠清白堂酒者同時饗作三詩識之厥初木禾種移殖雲水鄉粉之且縷之一縷百尺彊勻細繭吐緒潔潤鵝截肪吳儂方法殊楚産可倚墻嗟此玉食品納我蔬蔌腸匕筯動輒空滑膩仍甘芳豈惟僕餈餌政復奴桄榔即今弗洎感頗思奉君王雋永項上臠紅嫩劣帶膋彼美大欄君坐受羣毛朝鼎湆走真味正籍松炬燒芼我銀絲窩䓤豉巧和調堇塗非所宜淑郁如蘭椒腹腴但下𨽻羶根合藤條併填長翁腹未覺喉牙搖但訝大嚼餘無補詩腸枵佳齊肯見分春意偕客至誰將清白名言代碧香諡起瀹饒磁甌玩吮色香味醍醐馥牙頰沆瀣沃肺胃桑落古宜城不足偕品第我病久不飲此日欲小醉快哉羇寓中乃遣拜嘉惠一杯先晨飯歘作凌雲意米飯薦燒豬佳此三者備飽足仍酣醺眇睨人間世官務磨陀為官多曉了未更厯今世從仕者萬口用一律文按日從事鴈鶩竊投隙自謀脫悔吝初肯計易劇追逮有踵接符牒動山積豈念南畝民晷刻校日力停犁聽上命質衣供旅食誰定老我師黠民幾鬼蜮締彼刀筆吏表裏肆狙慝奈何食肉人立說與推激此論儻不破此弊終未息揆豫閲世熟敢此諗在職奔牛堰挽舟下奔牛挽丁已疲極長弄此埭東弄心齒砂礫千指取寸進贔屭山可拆舟子提肺肝舟材寧鐵石即今揚塵處劣計三百尺時賢或興懷僅費十夫力往來日幾舟孰者違此厄為人計安便作吏戒徒食斯人仍斯患胡必須目擊猶為埭兵地吾言竟何益吕城堰堰西緑泱泱堰東已膠杯吕城校奔牛客舟更遲回嗟我為貧仕此路幾往來厲翁市冠師與我熟追陪渠貧安無求我困坐不才三别二十年鬢髮各摧頽擬𢋫北山杞倐笑南柯槐惟翁未厭客望影笑口開生得數㑹面升沈何有哉相約飽飯過世事付飛埃命書命書唐濫觴委源傳吕後有倡莫為遏波蕩今不救字育叵數計八字詎所囿甲子動垓億舉一百萬漏荒唐無稽据誦言指休咎奈何聰達人頗復安此謬懷刺曵長裾偃蹇文士右夸詡走干謁薦墨不待叩士有待濡沫百請不一售我昔遊江淮知識間新舊文士不到眼此輩日交簉辭章輕杯水羡彼行橐富鰓鰓問利祿吾儒所深陋自笑與世違迂論取排詬正學政術自學術君子惡其欺道學不容僞世以僞用之向來濂溪翁粹然時所師光風與霽月取重前輩詞兩程從之遊流變已受疑應世頗拘謭自立如矜持何人傳其粗矯訐取世資口中誠敬語掎袂挹惠夷其行則市井跖屩差所為危坐悄長默覆此庸蚩蚩經正盛時事怪女尚抵巇秉畀幸一旦嘉榖去稗稊正士鴛鴻集古學星日垂江湖隱淪客有見真管窺爾輩受排拫似亦無孑遺得無竒英士失腳遂磷緇用過賢用功取璧忘小疵願引抆拭手免興失時悲願分斗升祿少救併日饑闢以周孔塗正以孟韓規嵬瑣審辟就譸張慙昨非六通而四達恢若隆古時治道貴去甚世變須防微吾言或可録敢用告採詩財昏師昏古所辭財昏今不耻傳祀合二姓古者貴由禮四德五可外貨賄亦末爾民風日就頽捨此爭校彼媒氏未到眼聘資問有幾傾篋指金錢交劵搴租米東家女未笄儀矩無可紀已聞歸有日資送耀鄰里西家女三十閉戶事麻枲四壁漏風霜行媒無留趾坐貧失行期趣富瞢貪鄙流弊例不免其源實此起多約或少酬暫譽甘長毁坐令親舊歡詭譎變狐鬼何况性習間貧富岐臧否土俗未易挽人情大不媺悠悠何足道吾以諗君子聽政為政貴中和偏徇古無取無心斯善應奸譽乃其蠧奈何聞見間往往用心誤扶弱抑其彊古或垂此譽世異俗且殊處今猶徇故曲直本不昧彊弱豈所據君子不此恤情僞溷丹素富室被剝脧日有貧窶慮士夫受加陵悔不齒編戶羸弊取必勝玉色吞氣去不知世闕如母子所怙不知意定向未語機已露傳繼用一律抱寃莫赴訴用是致和氣南首問燕路錢弊為家重墻垣為民須貨殖揚廬國北戶東南賴控扼淮民魚米餘百貨仰殊域用銅防外泄用鐵乃竒畫一利伏一弊救弊要得䇿持貨貿官劵捨此莫衣食錢貨天下用鐵乃限南北坐令兩淮民塊處斷貿易計鐵取劵直十才收六七朝賢愛淮民此困盍矜恤銅鐵均國寶通變豈無術近甸視逺地未可岐畛域况今苦倒垂倚待振焚溺緣江八郡爾雜用顧何失官劵朝北來淮俗暮安宅即今私鑄斷胡尚膠今昔吾貧復淮人計勢不容默次韻林郎中相送北歸銖兩作低昻舉世皆此心羡君松柏操不受霜雪侵向來車笠誓嵗寒迄能尋骯髒吾何取振拔意彌深天才有賢否宦路岐升沈鼎貴聽新渥疊來當好音我草賀緘處碧溪映青林祝公小婆娑未宜輕分隂次韻楊宰淮俗日就薄識者頗借憂天變不徒然旱暵將誰尤日來聞見同比屋聲悲愀令君不鄙夷匹馬走道周似聞疄隴間蟄蟄霰雨稠課功撲燎餘凖粟秉庾收一斃乃百孳皂堅肥螟蟊服勞豈容已善後良未謀即君論才諝為邦似求由佩蘭扈𤣥離所向多暗投世賢劉係宗芥視東家邱方將解倒垂未遑賦歸休橫前觴深淵君其萬斛舟願天開老眼一雨洗歎愁旄倪飫菽粟羇罷安田疇探九等和扁沈痾灑然瘳我亦民之一擔石略不留遭罹本自致未敢忘反求詩來念賢勞效顰聊殺羞孰視援溺手不計輸幾籌送羊侯因簡崔帥一首遊宦何許佳解印還故鄉舊國仍舊都别去未始忘一旦吾眼中怡然得徜徉釣處它日梁樹是兒時桑扶攜擁道周老倪皆壺漿官簿有髙下此樂均未央羊侯萬金將文武擅兩長稜威肅貔虎談兵厲氷霜小作漳濵卧斗飯方健强胡為倚秋風歸思歌慨慷似聞山陽郊迓者立堵墻湖蟹九月肥社酒千室香海舶來麋䴥江戶送鱒魴舉白作鯨吸羅幕同春陽樂事有如此夙志今始償我袖如椽筆落紙煙雲翔自今小晝錦為君記新堂題陳守宰仁和無倦堂二首仲尼治道師今古誰造閫公與由也果有得非二本為政貴無倦聖語要自反吾宗宰仁和條教仰瓴建吟對千挺竹日課五升飯膠擾付氷解隱幽莫形遁器資銅百錬心地蘭九畹人絶懸魚續自詭割雞偃秉心寧作輟提耳悟頑諼豈伊不可耐据以為益損譬如嵗豐凶良農守穮蓘功名自民庸君子計嵗晚陳侯昔為邑鼓舞輦轂民爾來佐淮郡喜詫有腳春例滿徯志望正繄不已純帖焉受馴擾初豈煩令申撫臨不云倦依然舊持循終始秉厚德邇遐沐深仁報政已捐日設施方日新羣蠧繼革熄千棟成逡巡向來簡齊仙九德罄忱恂長源無涸流盍嘗究所因一印妙心傳千載挹聖真此學不勝用企公嗣前塵次韻楊宰留别業偶雪欲作詩未暇因詩見及次韻有薪尚濕惡有榖未舂簸病客正牢落急雪忽蜚墮枵腹亟問炊曲身可缺火簷隙納璀璨座隅紛碎瑣繽漂才一瞬彌滿已四野慨念菜茹農負愧吾顔赭人同忍朝饑神亦輟秋社吾村劣收穫猶幸了眼下嗷嗷聞見間久已絶貸假何人發陳紅倚待由也果次韻楊宰對雪有感生世波上舟髙下隨掀簸樓閣或藩溷風花聽飛墮榮利計圭黍光隂付膏火胡不養𢎞大而顧蹈嵬瑣君看前宵雪積玉曉覆野朝陽麗山川湛碧仍眩赭簿書辦官事酒肉趂村社長翁取意適吾䇿未云下優服作貴賤觀傍了真假平生招隱詩尋盟逮今果贈張德恭張作詩日進有句見推次韻謝之少日試推敲未脫蜂鶴病世間十全手噬肯愛三請即今悔少作草草生氣盛逢人忍修縮拜手博是正往往掉其臂百叩不一應贔屭仰前修萎憊不能徑從君父子遊似頗識蹊徑使君唾隋珠枚叟每後乘郎君撞烟樓楚珩復相映兩豪五字律萬象一清鏡賸馥副羣趍餘風振不競郵城望迎鑾未敢憚奔命向來從渠後無乃瑩吾聽回省多岐亡滿冀一語訂此篇尤愛我見推乃見警政使元白前向君亦修敬次韻張守阻氷豫訪使君于真州㳂塗亦膠舟故云清篇方鼎來强韻不可奈膽掉久未定如守上瀧柂渾厚出綺麗平談含頓挫正始歎不嗣黃初君突過想當舟陷泥勢若右旋磨河神要好句待君顔一破我行阻重壩倍費客炊火邦溝塵欲揚人步溝尾汊一雨濯旱枯此惠誰所假生世天不人孰者可弔賀遊北山張守送酒次敬字韻作詩謝之有客可與遊闕酒得無病豈意四從事過我不待請洗杓挹風度免慙林花盛公學此味如渾厚兼醇正公量虛谷如有來良善應肯分兵㕑􅅹少佐筆力徑罷營杖頭錢徐取松間徑登臨舊能賦七發踵枚乘此興老未衰西日尚餘映風怒雷再鼓雲破天一鏡山花下野鳥詩題一堪命府公文章伯聲稱聳羣聽明朝倒錦囊非是庶所訂豈伊綵鳳鳴而聆露鶴警定知謝東山凡百易子敬再次韻春月驟寒既晴小出當臘可折絃羣植不告病春令宜畫一驟寒乃竒請淙闕雨後摧拉北風盛倚戶頸為縮引闕逢袖手謝酬應坐歎花信遲陡怯弓力徑今朝晴色好呼童掃幽徑客子踏青約久許陪驂乘逶迤望北山巷柳俄䕃映乾鵲語紅樹遊鯈噞明鏡平時詩酒社賈勇與春競即今鶯花前欺客頗方命擊轅歌于蒍寧入俚耳聽喧靜交戰間詩老儻能訂寓物不流物古語方自警追隨黃白郎不擬繆為敬吳節推趙楊子曹器逺趙子野攜具用韻謝之平日從俊遊寂寂坐多病犯床漫飛埃瑶笙罷重請犯床置樂器床謂宫調相犯修樂器惟笙日請昔遊喜復到風物他日盛坡恐名燕支樓亦詫端正新交間舊友氣合宫羽應談麈氷霜厲筆陳鵝鸛徑吏隱分樂地與世不好徑拔貧辦一歡挾貴輕百乘四豪載酒過講德珠璧映歌奏雲近人舞罷鸞顧鏡酬酢忘主賔笑語似紛競朱樓識阿眄白酒醉師命明朝耐殘酲江聲醒幽聽此樂謫仙後同異君試訂四豪成風手可但隻字警我投詩社名拜手敢貌敬再次敬字韻張守召飯卧疾不赴主簿送和章再作隂風摧行車歘作三日病使君敬愛客重此折簡請碧香駢柔嘉虛辱禮意盛老衰已不支節候况失正寒事動奸時暖氣久未應積雨遷厥怒密雪佐其徑新詩挽春色墮我桃李徑飄蕭尋芳興亟問果下乘把君珠兩兩後照仍前映重燒見火浣百錬乃寶鏡折箠敵可笞歌風楚不競讀檄且觀濤夀我無有命舊聞句通神瘧鬼褫魄聽援君起廢手直用古賢訂笑送夢中竪子行良機警亦笑齊東翁口舌邀客敬再次韻張簿生世詩作癖頗坐艱局病當前成風手每來難塞請後身習鑿齒名儷乃公盛新詩再出竒後出尤雅正髙吟步芳園靈籟想隨應荆戶厭盧羅陳勢無前徑鍧隱度九軌眇睨秋蛇徑狐兔新竄伏願前王公乘我學但宋璞多慙楚珩映才與年貌衰不擬拂晨鏡妙句駢魁傑曩見絶夸競居然大小巫詎容耻受命目窺曹劉墻日有韶頀聽古今尚論間未遽優劣訂此意客未知太簡效規警平生孔文舉敢替此心敬分韻得家字以人家寒食月花影午時天為韻東園郡勝處不作里所遐池臺掇天巧草木專年華一雨洗清曉十頃圍紅霞云何秉燭客未駕載酒車掾郎郡之望士價詩名家折簡挽名勝行庖富柔嘉清風應靈籟髙談振衝牙酬酢角鯨吸賡和紛天葩痛飲未渠醉浩興渺無涯孰知此老憊坐受强敵加空弮將一旅堅陳凌五花時分韻同某六客詩成字欹倒病眼正麻嗏遊乾明分韻得山字竹風清如水浣我塵埃顔老禪貧無錐小破蔬筍慳短轅下鴟夷共此半日間住筆訊鶯燕把杯屬江山老夫病止飲苦語澀莫刪揆豫郊島寒著君季孟間江柳未遽折園花且同攀後夜短亭夢漫寄東風還小飲俯江樓分韻得俯字流光肯貸人春事遽如許眼不到蜚鴻身每念縳虎他日載酒約坐受隂寒阻非君韻超俗疇肯顧羇旅今朝鶯花前有興浩莫禦兹樓可圗畫山立瞰江滸壯侔彭城蘇氣吞潯陽庾乘凌脫埃壒盤躄上煙雨向來狀雄觀尚缺魁傑語江山君周旋得句忍不吐詩成人未醉鄰雞喚亭午新音略韶濩至樂非簫鼓却話庾與蘇今古一仰俯招朱法曹趙宰趙豫野飲以寒食數日得小住為佳耳為韻分得食得二字秦郵望儀真相與不三驛仕學四十年此地幾旅食寓公芹泮士十九盡親識兹遊最竒偉詩壇許投迹每當觴詠間不蓋慙頰赤赤手挑虓虎空弮抗雄㦸四眄號猿手未敢箭鋒直排日有勝踐尚恐坐岑寂才卷俯江帳復蠟東園屐小奚費收攟巨槖珍的厯摩莎歸裝富足容傲侯伯自公置簿領來作一笑適表表三英粲各各萬夫特揆豫自僑寓人詫有此客風煙入揮毫江上皆動色尚友古所貪解后歸未得今朝鄉思動招邀話暌隔非復向軒豁但有新淒惻吟詩尚爾工把酒不能喫縣知短長亭小蓬雲月白還應蘧蘧夢蜚墮清江側儀真諸公餞别分韻得永字旅懷我岑寂詩語君雋永新篇蜚墮前坐閲仙府景曉林媚紅酣春池涵渌靜叱吸風起籟模寫燈取影東園固成言此境亦深靚應世足變遷為謀難要領酒車且新圗客棹非舊整明朝鷗鷺前鴨緑渺千頃飛觴擊鉢地獨夜起重省還應蓬背雨間滴魂夢冷真州諸公語别得杯字屈指舊新雨何人顧蓬萊駢車各鴟夷良為老夫來古今漆投膠不獨數陳雷衮衮慰勞意一杯復一杯索句不解工何以寫别懷敢惜吟髭折奈此雨意催此㑹良姱嫮此行重徘徊得無葉舟重滿載離愁回送趙夷仲南歸離索老不堪應接意多遻愛者挽不留惡者推不去道人心如水胡復生愛惡方厭塵眯眼倐驚瓊為樹趙侯南州英中抱經世具碧巖紫電耀翠竹青鸞翥聮翩拜新作一一彈九句傾蓋得此友霽月破愁霧交君良恨晚别我用許遽溽暑挾旱氣河底車取路在客身為本食眠要將護燕子遡北風端許問尺素立秋日酷暑如酷吏頃刻不可對萬口噤不息束濕底多罪况我七十翁形劣氣已􅉵悶若墮丹書孰者我牘背微風忽鳴秋遽喜又無害天豈芻狗我生死置度外㑹看三日雨怛悼推所愛甘澤洽嘉榖生意亦蕭艾寄嚴文炳以寄聲來問安足音到空谷為韻嚴寄書存問甚至云故人千里逺論心未遐棄不謂江淮隔尺書鴈能寄春風生展掩滿慰别後意陳義凛氷霜不獨相思字隻影秋鴻驚獨夜秋葉零離索歘五霜搔首聽此聲豈無金石友相避參辰星安得木作腸與世無復情子雲草𤣥宅門徑積莓苔昨夢憑詩說新雨無客來衮衮手可炙自詫甘寒灰蜀莊寂寞者念我首獨回烏墅兩馮君風霆藹休問自昔從之遊詩力借餘潤夫君凛一敵鴻筆上羣俊舊壇今尋盟得句毋我靳兩馮君謂真州父子嚴子老於莵彪炳踞賢關可憐五車學僅博九品官客程望至喜江濶山叢攢勔懷造物心念子詎能安善忘常憎醫獨者自尊足嚴子骯髒面如我不諧俗世情趣操間憎愛岐珉玉饒舌誇我賢祗取白眼辱文炳每稱賞豫或者不然之來書云聮鑣行樂地俯仰成古今可但捧觴人貫珠無復音繾綣棋酒伴電泡半銷沈何時兩衰翁話舊同清斟趙侯當賜環倔强耻媚竈張侯鳴琴手戍期幾時到何郎偕賢書論價未足道多煩問何如好語君一報三君與文炳同居吳豫與之厚嘗有詩送之石湖良樂眼收士冀北空嗟我孤所期經世老無庸一莊賴芥庵報厚艾亦豐賔實得美諡表表無終窮來書及二公故云嚴子從我時修竦峙雙鵠章綬裹瘦􅀈此相胡宜肉當嗣溧陽尉苦語叩哀玉寧當蘇門翁清嘯答幽谷次韻楊宰檢旱野宿豫近亦頻至莊上人情備嘗也旱後訪親知悲風鏖愁霧未辦飽翳桑况能嫁阿騖令君妙為政果藝今求路道逢枵腹民挾纊誦言句保社知自愛敓攘可無慮飛騰要及時封殖須此樹來年步畏壘繪象各村墅時宰君垂滿題劉行父淨香軒劉郎何所有寒碧二百本方渠懋進修藉爾伴蕭散妙處鼻觀領翛然市聲逺朱墨五千卷日力自繾綣久聞伯仲間珠璧各櫝韞一笑挹此君方外得稽阮饑鳳吟夜良斑犀散春晚慣嘗推枕聽肯作芼羮挽長翁紀幽致一字粲褒衮譜傳渭川孫石屹益州笋行當洊驚雷龍躍闖天閫功名有咄嗟世道計舒卷平昔對床約里閈規息偃大屋俯嬋娟晝繡替前扁次姜堯章贈詩卷中韻徐郎巢已焚庭竹亦無在太倉五升米舉室枵腹待云何鮭菜供日與長翁對世有作金術閭里頗猜怪邱嫂剪髻餘舊質疊新債詩傳侯王家翰墨到省寺姜郎粲然文羣蜚見孔翠論交辱見豫盧馬果同異念君聚百指一飽仰臺饋我亦多病過忍口嚴酒戒終勝柳柳州吐水賦解祟壯年志在行皇皇困無君老矣此念灰去住如間雲詩壇二三子一見勝百聞徐郎吳下䝉絢麗工語言滔天自濫觴昔人求其源隱几有妙領未覺市聲喧自甘謝祖風屑屑掃一室凖擬髙史來函丈置三席聲名絶輩行文字追古昔黃白馬上郎覿面不相挹眼青節食事日耐饑雷吼兹幸陪衆後酒巵甫到口不離寂寞濵徑造無何有問津歸有期尚許尋盟否次韻林子長計使林侯上州麾便飫大官飯左淮魚稻供顧肯回一眄待人均待士樂易屏崖岸懸知訖民庸功倍而事半淮鄉舊樂土兼有齊俗緩頃來南北雜頗復煩城旦要須禁敓攘淮鄉歸正人誘率江浙遊手剗佃良民之田計使約束甚嚴淮民安妥立可息愁歎為公泚銀筆攘袂歌粲晏次林子長韻招燕拂雲樓讀子長遊壯觀亭詩因賦孤亭屹山椒山靈信多助比肯迂玉節來作數刻住江明山動色取重以公故未須坐談客子弟自翹楚雲嵐逺明滅阡陌隨指顧何以驗人情楚歈雜吳舞我來空想像夢去上煙雨尚及拂雲飲醉狂煩杜舉新歡償昔遊幸㑹乃如許古人重一飯志士賦盛遇歸時混遊人健倒各扶路再次韻酬林子長運使繡衣如椽筆可但江山助登樓得秀句飛雲為公住使君傾意氣接我便親故自忖庸鄀陋兩公富全楚賦雪容末至髙軒先左顧醉鄉信餘地肯作長沙舞和氣挽春回氷柱下簷雨是日晚晴簷溜有聲代舍著狗盜珠履賁豪舉阿遷詫齊魏瑣瑣吾未許我從兩公遊趣舍本神遇更當問學閒司南取夷路再次韻拂雲宴之明日雪復作回思偕趙帥賞雪于淮海樓樂甚兹地足以繼之復賦一篇雪神再出竒剪水誰佽助羣仙幻塵寰落勢未肯住政成氣乃和此瑞豈無故同雲方頌周惡氛已銷楚乾坤玉花中客子昡回顧人家占嘉平酒處應起舞了知及物功當倍蘇旱雨前雪淮海燕把酒欲輕舉今雪燕拂雲勝槩驚似許客途一笑適樂事詫晚遇回思何人家雞黍羞季路陳宣卿為豫作後雕圗吾宗灑畫墨似我詩得趣未至心手忘敢議江山助東絹十幅圍中有千尺樹窮冬萬蟲蟄拆地雙虬怒倣佛風雨聲想像棟梁具人間汗反漿對此毛髮竪怪君物寫影落筆神與遇自言閲世孰妙解等僧悟每當槃薄餘了知精靈聚此圗尤傑出持用博新句墨君第一流論世無殆庶三熏且十襲復靳為子賦四言古詩次趙判宗送李象山韻邑政易墮我方在行挽袖柅車交遊至情兩君玉峙闕崇國士下榻傾倒有賢公子我介三子匪同而和提衡掖挽交口孰何月堂之評罙久未改匿瑕振過兹焉有待卜夜之飲輟驪駒章顧雖情鍾河魚未康作吏則疏羡人報政彼益者友工藥我病低昻達窮冥心所遭獨喜故人往偕仙曹搖搖修程炯炯初度眷言顧之矯首雲路胡不小留共頽醉山胡不更僕共談孔顔西睇歸䑺徙倚悽切去留之間仙凡斯别再次韻判宗留飲以冗故不及終席作詩謝之載羽其觴客遄于行歸從我私兹焉用情一竒搴秀萬金論士生世已後識古君子宫倡羽隨至樂則和俚音間之人謂斯何潔不容緇薰不蕕改言受此柄劣副期待斯道在公九報其章人徯時施躋之阜康曽是偉人而未聞政袖司命手旁睨世病海瀕埤汚蒼山周遭觴詠翺翔樂殊爾曹盍攄胸竒煥我王度盍提公言闢我賢路赫日中天麗彼南山賡歌交修不靦其顔有鉛者刀用或一切雲龍從之無重此别次程帥勸農和陶詩韻房民種藝簡率水旱豐歉一委之天人力不至且不知用水車土皆桑柘地而蠶事尤莽鹵因帥勸農和陶詩次韻呈帥且示其民之不甚愚惰者我官于房庸諗房民是腹枵然惟貯一真服事告工以成以因雄也言之參天以人燥之潤之是有黍稷天不竟刈物豈自植繫人之力溫飽稼穡惟蠶而衣如稼而食盍槌于家盍桑于陸飼眠後先如族昭穆爰繅爰織如冦之逐悠悠玩日迄莫歸宿孰溉不車曾不計久孰視槁乾徒用播耦吳豐楚約誰非朕畝穗斯繭斯均措厥手彼多其儲汝則易匱效勞計工寧終不冀蹀躞十駕與驥一至枵中赤立吾代爾愧吏職民憂無庸汝鄙農以濟學繄吾素履豈曰多言率遵前軌教詔順從庶或兼美程帥和陶二詩見憶次韻我瞻西郊雲停不雨雞栖亂山十舍千阻一書緘春慰厲存撫望之或違搔首企佇停雲釃之蜚雨濛濛啓筒有獲如渴吸江孤月河漢輕颸牖窗憶侍誨色杖屨後從盱衡推豫褒衮儷榮靡懷不傾靡言不情㑹晤良難歘然西征孰謂愁斛無自而生竹萌觸雪粟花綴柯風日山城未春已和命駕取塗計日不多官曹簡書公其謂何江湖長翁集卷六
