body:
  text: 江湖長翁集卷二十八宋陳造撰劄子寄政府劄子中年讀書得為宰相一術已不及用乆思效之人未敢輕出恐聞者以為迂僻而恠某官行有端揆之拜而於鄙言毎不甚棄絶試為言之是説也不出于六經史傳故不特難言而亦難聽非度外之人必不能聽度外之言此某之所以欲默而不已也古有嫁女者未始一語惎之女登車顧曰大人終無以誨之與曰切無為善然則為惡乎父曰善不可為况為惡是兩語竊以為古今宰天下至術也宰天下非一官一職比未可數數然也李林甫楊國忠元載之徒是為惡者也置不道反此者屑屑焉有心於善而為之将以利天下秪以弊天下蓋無心者易功有心者毎窮惠以政者利惠以惠者厲古今宰相以惠惠人反以賊人不知其幾而王介甫其尤也近世亦多弊于惠然其弊立見故弊淺而易拯未若王之弊弊于既乆久且深難救者也孟子稱子産惠而不知為政政立矣何惠之不被詳於惠而略於政惠而窮人必病子産之惠不特徒杠輿梁之可議如左氏載毁廟之類有心於惠固為人所測耶鄭小國也子産政不浮于惠未甚害也特不可槩以君子為國之道爾使子産為齊晋秦楚猶不改故智幾何其不敗某所見一郡一邑凡切切于小惠者未有無弊者况宰天下而可後政而專惠云者乎子産治小國而不甚弊亦盛徳臨之爾他人而用其術且弊而敗矣他人之德未敢望子産也伏願某官贊其化於無可指名之中藏其用於無所歸德之地使百官庶民相忘於無心庶幾弊不形而天下隂被其賜某官之勲業使人無得而知人不之知天與吾君不容不知識治之君子亦必知之善戰者無智名勇功将云爾况宰相乎而必欲功名云耶所見如此若使一一引近事為證則能之而不敢者也復有一事三年省試如漢淮之遠别號取人似切而可行中間髙郵守上殿嘗勸以建白委以具草今見在謹錄呈草後去年補試果亦行此推之省試又何不可甚可以收遠人之心而攬其豪英持之久所補将不細且此不容攘善陳子與監丞向嘗云輪對則乞比寂無聞豈子與竟未對耶豈言他事置此耶嘗言之矣豈以其不可行故止耶以某度之豈補試行之不弊省試則殊絶乎相公不言之爾及此時言之收漢淮遠人之心搴博碩純朴之士以致用人之利某官改省試於二月天下卒不可易被其利者不容筆舌既不應决然於彼而次且於此也儻果有不可用之説明以見教豈勝幸甚寄政府劄子某苟禄窮山行書考矣自知甚審井水不波古書遮眼聊娱老境職事極簡未至汰遣皆出鈞播歳復科舉矣輙有管見欲陳于下執事相公向來見示云有所見具來且許以秘不示人用是又復強䀨嵗丙辰春闈題目出舉場瞢不知所措有曽讀國語者亦不能詳記且辨析也數千人閧然不著席然後簾中疏出纎悉乃僅有落筆成文者竊謂用國者貴有體且不當自掲其短國家南渡以來以寛厚待士春闈廣場所命之題若易而難難題時出之矣若上庠公私試若郡多士者之觧試則不難無以折之至羣天下之士而試于春官四方人才之不齊裹糧趼足而來較此三日冀遂進身而進退之數則有定制奚必難其題目以強其所甚短南方之學短於記問與北學大不相侔從古則然毎見北士觧注與書並能上口如爾雅之聱牙正文傳注誦如流水比比也而南士摛繪或工於廣記不忘萬無一二焉能之強之以其所短彼有狼狽蒼黄應課塞白悲歎不得效所長而去爾彼其去固不害吾所取然其所去取者不免付之幸不幸而已於人才未必有得也豈寧惟是吾南士之所短吾所當自掩覆者一旦表而出之此豈可令北客傳之敵國聞之耶丙辰之舉可見矣二三千軰無一人落筆簾内瑣細疏出喧囂乃定舉事如此國體謂何丙辰而來士戒此頗留心記問然記其一二遺其十百千萬脱或題目又不易則一二偶及者幸矣其不能遍記及此者乃大不幸三嵗取士此豈小事而付之幸不幸之間乎某自㓜頗能記問年未四十日誦四五千字四十之後日日以退而凡持身渉世日日自覺老成篤厚無少年氣習今老且衰絶不能記矣與吾南士言及文字尚頗以能記見推則南學之於記問不容強勉或者見一二人之能記舉多士而強之以此彼有老死布衣藜藿而已耳而某之壮與老記問之進退遼絶也而其涵養器識厚薄亦以不同自上之取士者言之其壮與老強矯厚重其孰為可用乎古之君子已有所甚長平日於人不肯以是律之况三嵗一取士而或者謂吾能廣記備言無所不該彼必如此而後取責馬以驥天下無良馬矣天下可以大用而用才責功皆當以中制服皮袴百畝自課婁師德為屯田不患不最師德之後為屯田者不必衣皮自課其職亦舉上之人必曰汝必師德若也則不恕且害事矣為劇郡者問牛及馬鈎情不遺趙廣漢優之攘牛不還涕泣不去人服其罪魯恭感人者如此而今之能撫字能綏輯民無怨咨者皆可以為吏上之人亦難乎必以廣漢魯恭責之也記亡書三篋抄五行志不誤世不無此人不能使人皆爾也就使能是未必可任以政其不逮者未必皆棄才况科舉之設姑以是進之云爾其臨政其事君治民則俟之以繼此之後檢之以官箴而懲勸之以舉察一占吏藉回視場屋之文芻狗土苴欲以一日短長工拙定其賢否耶嵗巳丑乙未某皆試于春官士人互傳兩宫有㫖寒天短晷毋以難題困吾士子不知天語眞有是否也而傳者鼓舞交誦誓言既仕自重自厲以報君恩即是論之困之以難題無損益於得失之數徒使老成不逮者多屈幸不幸付之一擲孰若有以感其心而進退以其工拙之眞者也士之就試才彦眩于外得失戰于内能不失其常度者幾何人某嘗兩為考官所閲試巻超㧞可取者無幾而合格之文多不充所取之數則亦匿瑕恕取之爾聞之諸公雖廣場閲士亦艱於文字姑充員者每每不少平日如此况窘之以難題則文之可取者愈見其不能充數矣或者見敵人取士不著題之所出隨舉換經色色務為艱難人猶有應者意曰彼能是我何為不可行此又非也中原之地本非金有也故色色以無道行之若士若民亦飲氣委順以任天運爾吾而為之敗矣况楚辟我衷若何效辟叔向固有是言可法也吾宋之所以得天人之助而享國無窮者政出於優裕中和而緜宻委曲之使不至壞亂而巳不恤之政一無有也故以勢論之似乎不振而快意者少而天下利賴廟社妥安皆本于此凡百皆如是獨於士子待之以不恤於理實有所未安也今日參政公相天下之孟荀韓歐似不當為士子地某僣瀆甚欲望鈞慈軫介奏之聖上諭之公卿寮宷確守高宗孝宗規模将來春闈所出題目參比紹興以來難易以幸士子而收能文之士無使偶能記憶者取之利害明甚若秋試若廣場如國學公私試自不妨時出難題以盡該博之彦庶此學不至全廢此非特某所望者第某已脫科舉言之無嫌且實愍退敗之英多不得展罄所長而去故喋喋如此某亦愚甚矣舉所不當與之事以言于鉅儒大臣然鉅儒大臣以天下事君者也芻蕘瞽矇皆所不廢某所見或者未下此軰似亦未可全忽用才劄子已下並代人臣聞為治在得人得人之術致之不可不廣而用之不可不精國家取才有任子有進士有雜流凡所以羅絡招徠無所不至士之仕粗可以中其程度莫不任使之其致之不可謂不廣内外之官上自朝廷下至一命之吏凡其按制之權甚嚴不可犯纎瑕微纇一掛法吏之口則罷絀隨之其用之不可謂不精凡今日邊隅無警盗竊不作内外晏然號為粗治者其本原在此無復可議然臣竊有私憂過計于此試為陛下言之夫天下無常安之勢聖世無可棄之人方天下無事士之粗守繩墨無過可指皆可以為陛下之吏以副所責任者而搶攘倉卒意外之慮聖人不能保其無有當是時非竒才異能不足以應之聖人在上惟能察其傑異之才隂厚之而覆其短儲而蓄之以為不測之備故天下不至有搶攘意外之慮就使或有焉吾有以待之不病也夫論人之法才與行殊士固有負傑異之才而行或不謹者然其以行之小不謹舉其才而掊棄之則一旦有事誰使任患臣竊見今日士大夫初節蹉跌嘗𨽻丹書或法吏所擊之後往往排斥不恕世既共棄之彼安得不跌碭自棄夫此輩豈皆無可用之才但法吏責之太嚴置其才而求其行則是捨所有而索所無置其長而攻其短聽其言誠若不可復恕而不知容而收之或可儲之以為異日用也臣非以法吏責人之嚴為非也夫以天下之大士大夫之多人人以傑異自命而睢盱繩檢之外則上之人可以為治故夫隱慝顯過無或不聞有聞焉無所不取此固法吏之職所以振朝綱而肅官聨不可少弛者也若夫隂察天下傑異之士可以略其行而收其才儲之以備緩急之用則陛下與宰相事也夫法吏之所不容而陛下獨能容之誠似私矣然天下之理為一已而私其人固不可苟其為天下國家而私之適所以為至公人之抱負所有亦欲建功名致富貴以醻其素志今也以不謹之故不見容於法吏而顧賴陛下識察抆拭用之不為廢人則其德上之心将銘肌刻骨宜如何報國耶善養生者平居無恙膏粱參术足以充適氣體然烏喙天雄之屬獨取之左右豈不以外邪客氣嘗關念慮孰謂為天下可以玩治安而不加之意乎昔者李克薦呉起之善兵必先言其貪而好色魏無知之言陳平亦不為諱受金之鄙葢欲其君明知其所短而收其所長故也宋璟之為相以李邕鄭勉並有才略文詞但性多異端好是非改變若長棄捐才用可惜請除渝硤二州刺史君相之用才槩必如此頃者湖南之盗雖曰𤨏細方其跳梁負阻士大夫間所謂潔然無過可指者或無用于此而卒能辦此者多向來嘗被譴而今日可指之人也况事有大於是則其雍容辦集庸知非出於罪累之人如陳湯之誅單于李靖之平江陵裴豹之困欒氏類乎故臣謂君相之用才與法吏相違而實相濟惟陛下恢兼容之量謹求備之戒時以度外待天下士掩瑕使過俾聖世無棄人兼儲並收有以為未然之防臣之狂言使其終不驗也則天下幸甚萬有一焉如臣所言則國将何賴矣廣言劄子臣觀自古帝王求盡天下之言孜孜懇懇若恐不我告者世以為聖德事非也葢勢之不得不然帝王之德不在是也帝王能審天下之勢以為非盡天下之慮不足以為天下故常不自有其聖智而使天下皆畢其見於我合天下之慮以應天下之務何向不濟衢室之問總章之訪善旌謗木傳言箴諫天下休戚何所不聞而下情寧復有壅蔽之患天下安矣人君乃可以優游無為與天下享其治其勢不得不爾後世自聖之心熾惡聞其過人不敢言似若無所拂其意而不知情有所不通弊有所不聞則迕意勞慮之事時乎不能免此雖由不能恢廓兼容則然然亦不審天下之勢甚矣陛下即位以來大度無我容納直言逺諛侫樂忠諫真得帝王用心漢高祖唐太宗有不足道是宜天下情皆無所不達利興害除無不如意而今日聞見猶間有未副者無乃求言之誠尚有未盡而能言之心尚有所鬱乎陛下之公卿近臣固天下之選知無不言言無不聽頃又詔朝臣使言闕失則其在列之臣咸得展盡固無遺恨然臣竊謂陛下宜推好言之誠下及海内使天下草茅之鄙人一介之賤士皆得以納忠九重使其言達于天聽焉知有不肉食所不及之慮乎陛下求言之意切矣求之宰輔求之臺諫侍從求之百執至矣特求之天下者似猶未至曩者如星異如旱饑如疆事之興皆求言於下之時聖慮偶不及此臣願陛下少留睿意一下此詔使天下若吏若民舉得指陳闕失陛下擇其忠鯁憂時的然可用者旌賞三數人不惟作天下怠惰之氣抑使萬世之下知陛下聖德之盛如此猶復切切焉求盡天下一得之見實垂裕之道且聖人所為豈直計一時動為後世子孫以禹湯文武之聖而佐之以伯益伊尹周召之徒豈不足以為天下而其心常不自足者凡以為後世計則然盛德美政聖人為之後世有不為聖人不為後世孰為之不特此也近者士氣不振有萌矣率以軟熟無忤為賢而指好言者為生事不靜不怒則笑之此風寖長非國家之福明者見於未形是豈可不有以振起之臣非不知上一求言下紛然而應荒唐謬悠委巷之言必且不少然此於陛下聖德初無所損適足以彰盛德恢洪無所不容爾萬有一焉其言關宗社國家之計則陛下所得多矣正綱紀劄子昔孔子論為君難謂知此則一言興邦書亦曰予臨兆民懔乎若朽索之馭六馬葢以一人之微立乎四海之上情偽向背千態萬状必欲使之帖然順治亦甚難而可畏哉古之帝王審其至難有道以處此在我者約而彼自絶奸犯之思在上者正而下舉無搶攘之患者曰紀綱是巳昔之人善論紀綱者莫如韓愈其言曰計天下者不視安危察其紀綱理亂而巳矣紀綱者人之脉也脉不病雖疾不害脉病而肥良醫憂之人主以一身而臨天下捨紀綱何以為治然紀綱之在天下人君主之宰相侍從挈提之執法之臣紏正之中外百執拳拳焉共守之譬如網之在綱孰能保其久而不壞一繩之腐一目之缺隨即補之則大綱固在聽其腐缺幾何不就盡耶國之紀綱亦惡能保其不隳上自人主下至中外百執隨壞而補則與日惟新謂之未嘗壞可也臣螻蟻之見亦欲陛下君臣即綱紀之将腐缺者補之請言其凡夫京師以衆大為言萬乘在焉列而為千官百執屯而為千乘萬騎利害差跌動關宗社所以置邏卒以防耳目之所不及固也而近者邏卒所及卑官小吏亦從而被罪祖宗置邏卒之意豈為此等哉郡縣所寄廣矣難乎為吏者毎甚今日財賦之間左枝右柱嗸嗸度日而比者誣訴官吏或出皂𨽻臺部亦為受理委官追證逺近紛紛駭人觀聽夫外而小官守倅制之監司制之内而達官長貳制之微慝隱惡不得而聞者有之矣至於公議不容衆口沸騰孰能彊庇之今也邏卒亷之皂𨽻陳之是逹官監司守倅皆長物耶此風一扇壊紀綱之甚者在國體寜使司敗有失刑諸吏有漏網無寜使權落小人寜使監司郡守有失察之謬無寧使上畏其下下持其上此非細故也分為諸邑而臨之以郡列郡臨之以監司小大相制如裘之領監司以察郡縣而郡守倅又察其屬有罪而取固其職也間有按之而非其罪與其取輕而置重者在監司守倅固非善矣然以此罪其按之者去之則大不可比者大吏為郡監司按之而俱罷者有之按縣吏不當臣寮以為言而去者有之夫此獨不可以他事罪之乎即按吏為罪而罷去士夫懲之有不按而已此風未息亦壞紀綱之尤者近者監司郡守頗以彌縫為政彌縫之術於身無悔吝於人無怨尤然國家所以命官之意臨政治民亦取其為上任怨爾使皆巧於彌縫國何賴耶臣葢嘗靜觀中外之事彌縫之風不特在外則然今之宰執猶不免彌縫言官而言官又自為彌縫夫宰執天子之心腹當傾輸自信展盡底藴與國同其休戚者也今也深懲前日權臣之弊退縮藏晦不敢自信視天子可否以為予奪聽臺諫風㫖以為是非夫君所謂可而有否焉臣獻其否君所謂否而有可焉臣獻其可晏子而愚人也則此言無用臣非取宰執之不畏臺諫也宰執之所畏者非臺諫也畏公議耳臺諫者公議之所自出使宰執進退一人罷行一事於公議無慊耶臺諫過以為言初不害其為是何憚而不為不然臺諫雖不言天下固交口謗之矣今宰執不究是非惟臺諫是畏日事彌縫宰執彌縫于上侍從百執彌縫于下至于臺諫有所取亦視天子意向待遇既衰然後攻之不遺力上下相師成風自為計信工矣寔非國家之福也宰執臺諫近臣紀綱所自振者顧乃隳損紀綱如此而不自知此其弊不見於顯顯之中而伏于冥冥之際夫彌縫之俗起於士夫有苟免之心士夫有苟免之心何以責之立事人之為家御一婢一僕接鄰里鄉黨一以彌縫為之未見其能有立孰謂事君為政而可以彌縫為之乎臣願陛下明諭宰執臺諫近侍之臣知無不言為無不力無所顧忌以公家為心以清議為畏一掃彌縫之舊習至如邏卒察吏皂𨽻訴事有以禁絶之振監司郡守察舉之權而正上下維制之體無俾小大之官低回畏縮防意外之患自一繩之緝一目之補日求而罷行之期使紀綱無至隳壞上下之間以是存心國欲不治亦不可得矣臣僣越言事不知忌諱陛下少寛其誅臣不勝至願荒政劄子臣伏見陛下以今夏闕雨焦勞特甚救荒之政臣之責也日夜疚心思有以仰副陛下愛民之意凡蠲下户租賦計賑糶賑濟等事條具聞奏繆當聖心亟為報行一路之民見臣以荒政奏聞其應如響莫不以手加額不肯輕去鄉土亦有中路復還之人儻非陛下愛民至切事干荒政計辦早定報下速達則流亡之民已不可遏近者闇於事體之人揚言謂荒政舉行失於太早行之太銳彼但見目前流移稍定便謂可以髙枕萬一朝廷誤聽州縣或致解體飢民豈不失望臣雖至愚亦豈瞢然全不體國自始及今施行荒政除樁管常平米數外凡乞度牒截畱和糴米之屬皆非過當難從之請而飢民狼狽多在冬春之交今荒政雖有端緒臣惴惴憂愓尚恐不能善後若遽畏立異者之口毎事中廢将来必孤陛下委任之意人臣事君意趣不同安輯飢羸乃慰悅君父之急者若揣人君之心惡聞飢荒之說以歉為豐臣竊鄙之臣一面将應有米斛斟量輕重賑救貧乏之民鈐束官吏必無妄費伏望陛下詳臣所奏遍下諸郡官吏使曉然知陛下愛養元元之意有加無已毋致迎合怠慢則實惠所及一路有更生之幸重獄官劄子臣仰惟陛下重人之命欽恤庶獄無所不用其至是宜内而理官外而州縣之獄無一枉濫以副陛下仁厚惻怛之意然得之聞見猶復有孤聖慮臣嘗深求其故而得其説是葢獄官不重所致夫諸州獄官率用經任無舉主人充之彼其不自植立視監司郡守顰笑以為輕重望其能爭衡是非收平反之效豈不難哉且一事繫獄不論深淺小大提刑守一見郡守守一見獄官亦有一見監司郡守出於遙度獄官宜深得其情然士夫效官其能以名義學術執持有立百不一二其間承望上官風㫖以意為獄滔滔皆是况以大吏臨小官意之向背動為升沉此獄官所以媕阿附㑹以取媚而陛下赤子往往䧟於非辜也然天下士夫之多豈無守名義根學術執持有立之士亦豈無剛鯁不偶俗不得已而為此官之人即其能固執所見不為勢力所奪平反寃濫其事灼然可指者臣願明詔中外時令監司郡守特以其名來上陛下與宰相亦時召見一二人審其無偽稍加超擢使天下出乎所料如此庶幾陛下獄官號人才者皆屑為之為之必且振職不輕人之死傷有以副陛下欽恤之意寛州縣劄子臣謂今之郡守古之諸侯諸縣猶古之子男王室之尊安繄侯伯子男是賴事體所繫不可不察京師仰諸郡郡各仰諸縣勢葢如此向來士夫固以作縣為難無它葢以財賦取辦於此旣不容闕供而又不可擾吾民也然財不闕供民必受弊事之必然數年之前郡有貧富故為郡者有苦樂諸縣之不齊亦然今也郡縣之可為者絶無僅有臣嘗深求其弊皆出於士大夫不究國體某郡匱乏某郡有餘為監司必誅求有餘者某縣偶可措手監司郡守則又專求于此必使例不可為而後已郡縣天下本也豈可使之廹蹙無聊郡縣迫蹙無聊陛下赤子被害有不可言者矣國體所繫葢不難見士大夫苟知體耶固將使不可為者可為今也皆有可為者不至於不可為不已也駸駸不已臣恐一二十年之後郡縣無復可為陛下赤子嗸嗸不聊生非國家之福也臣願陛下明戒大吏務全州郡事體無令逼迫不自聊賴監司郡守究察諸縣其所以不可為者其咎安在保全調䕶有可以蠲除省减紓目前之急者决意為之此非為州縣計實為國計非為郡縣者計實為陛下赤子計且郡縣窮迫無聊之甚守令豈能傾囷廪以了公家事不取之民復取之誰也陛下寛臣之罪使得從容盡言臣無任薦舉劄子臣聞人才布在天下人君收而用之一人之聰明不足以徧知故以薦舉之柄委之監司郡守監司郡守薦舉之當否人才之得失國家之盛衰繫焉臣竊見近日所舉之人往往不由已見非出於達官要人之親戚則其故舊否則奔競營致持書以刼制者寒畯静厚之士絶望陞進或者慕其所為變其所守至於端方獨立不苟隨俗者天下有幾如此則薦舉失其本意不惟不得才實而又壞天下之風俗或者猥曰吾聽其舉爾他日有罪坐其所舉則何患臣以為不然彼有挾而進其身亦必有挾而庇其身牽制營護有罪而不露罪暴著不按而脱去者多矣而纎悉不掩寒素則然此又情之難究者臣願陛下置其流清其源日諭宰執臺諫侍從上體國政前日委親舊於所薦不可不一革其習或降睿㫖丁寧戒諭而又罰其不䖍亦於監司郡守臨遣日諭之以薦舉重事惟才是取毋憚大吏此風旣革人才有不得公道有未行士所養有不歸厚萬無此理臣狂妄語事願寛其誅上丞相劄子某以疏繆之資荷一路常平之寄今歲之旱無大雨者且三月餘如秀州雨不濕塊者數十日吾君吾相憂勞之心焦焦然朝夕不忘某之不肖顧所職云何其於早計預圖可不加勉凡其蠲不可復拘之賦乞截畱不可津致之米似亦急務而鬻爵度僧又皆昔年救荒故事凡有所請朝奏暮報仰惟聖主憂民之心天地同量嗸嗸之民識上心所在小致安妥猶復纍纍渉江而北而好異之人見謂計荒政太早舉行太鋭蠲減太多此言一出郡縣間至解體吏民亦復惶惑葢不知事體者事君之計惟欲悦可其意揆度君相必不樂聞凶荒以歉為熟以苦為樂自古不無此人今日聖君在上猶狃此態可鄙可笑彼謂民以安居乃某張皇其事不知自四月至七月末二三州有未嘗識雨去處杭秀之河八月以前猶復枯涸常州而西今猶膠舟此亦為張皇耶言此誰欺某雖至愚豈瞢然略不體國以干譽於民者前此旱歲有請之臣動以百萬為數某亦竊笑之豈有工於笑人而遽貽笑於人者凡某之所蠲所請可復也方民困極憂旱之時略無生意其間無賴惡少志在乘勢作過而縣寮無識者揣其蠲減有期督迫甚急所督未必可得或者徒驅之為盗爾人無逺慮且果於違異見目今流亡粗少便謂無復飢民殊不知今秋晴霽又沾賑糶微潤粗可苟活冬春之間某之愚慮深恐不能善後又田里之僻與城市大異嗸嗸之民不接於肉食之目何縁遍知某忝為部使者而不知之不智知之矣恬不為慮不仁不智不仁之名某寧罪去可已不忍身犯此也聖主愛養元元之意如此下至窮山僻野無不洞知中外小大之臣可無布宣惠意恢大德量拯垂死之民措之袵席挽回和氣以植皇家億年之基顧欲以庸庸者之事君取悦一時耶某孤立無助視去如鴻毛一身不足道獨惜君相之意如此而臣下不知之兹者仰冀鈞慈酌某衷藴本不為進取計流言可畏曲賜保全調護使得少效駑力仰副九重托付之意實某至願至望常平劄子臣伏見兩淮國北門藩垣之地所不可輕而頻年水旱民不聊生去年赤地千里淮民無食官中舉行荒政而儲蓄不多無以盡稱君父憂恤赤子之意且淮地米麥之外他無所産向來豐歲米麥價賤農傷已甚不幸水旱民就飢罷官中束手無䇿救拯則是歲之豐凶皆不免病民民情安否固圉謀敵之本柰何置不為慮救此之弊豈眞無術竊惟古法可萬世常行無弊者惟漢耿壽昌常平豐年增價而糴凶歉減價而糶農末兼利官無所費外此利之未究其害隨之欲望陛下捐楮劵各百萬付之提舉司豐年而糴稍髙其直不幸水旱凖元直出之價稍增則農無穀賤不售之病糶不出元直則農末俱濟且今楮劵在兩淮甚重此䇿行民得所用而此百萬之劵常在一路或豐或凶皆被其利此最艮法無可議者如行之有利推以及他路将無不可國家逐路置常平使者各有椿積錢米然歲旣乆米多陳腐虗數淮南鐵錢乆積將遂蠧壞不可復留行之又不能盡西漢歛散之法據空籍貯長物將以備凶年坐是實惠及民尚鮮今據已行之法又加以此䇿畢舉豐凶歛散之術國家初無費耗而恩德可以淪浃斯民益侈億萬年無疆之休實基於此去年之旱飢民所在擾擾郡士人鄒如閔者頗富前此捐金貯米自去歲七月置籍而糶止收元價鄰里鄉黨賴以贍給所居崗門一二千家嬉嬉如平時獨無貴糴飢窘之憂人深德之而如閔初無所費一士人爾尚可以此術惠利一方部使者行之其勢必甚便易其利必且無窮而國家實無所損臣以此推之灼知此法可行而無弊外此無復良圖仰冀陛下斷而行之取進止江湖長翁集巻二十八
