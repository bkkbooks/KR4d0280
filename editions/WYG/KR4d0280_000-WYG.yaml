body:
  text: 江湖長翁集目録别集類三宋巻一辭賦二十首巻二五言古詩七十七首巻三五言古詩八十八首巻四五言古詩八十一首巻五五言古詩六十八首巻六五言古詩五十七首附四言四首巻七七言古詩五十首巻八七言古詩四十九首巻九七言古詩四十七首巻十七言古詩四十二首巻十一五言律詩一百九十六首附排律十首巻十二七言律詩一百零三首巻十三七言律詩八十三首巻十四七言律詩八十三首巻十五七言律詩九十八首巻十六七言律詩九十八首巻十七五六言絶句四十六首巻十八七言絶句二百五十二首巻十九七言絶句二百三十七首巻二十七言絶句二百二十首巻二十一記十九首巻二十二記十八首巻二十三序二十八首巻二十四書四首巻二十五書十首巻二十六書十七首巻二十七劄子三首巻二十八劄子十一首巻二十九傳贊銘箴偈説共二十七首巻三十文四十八首巻三十一題䟦五十七首巻三十二論九首巻三十三䇿問三十四首巻三十四易説十四首巻三十五誌狀十一首巻三十六表牋六十四首巻三十七啟三十七首巻三十八啟三十三首巻三十九疏青詞九十四首巻四十致語上梁文二十六首臣等謹案江湖長翁文集四十巻宋陳造撰造字唐卿髙郵人淳熙二年進士官至淮南西路安撫司參議遭宋不競事多齟齬自以為無補於世置之江湖乃宜遂號江湖長翁造既不竟其用故事功不著於當時史亦不為立傳元申屠駉為造作墓誌稱其於誨誘則良師於撫字則循吏身篤操修道兼體用雖金石之文稱述類多溢量而當時未聞異論則亦非純構虚詞也集中如罪言一篇專論應敵備用之畧盖仿杜牧而作所言雖未必悉當而比於牧則不足比於陳亮劉過則恢奇排奡可以肩隨其他劄子諸篇亦多剴切詳明不徒託之空言記序各體捶字鍊詞稍覺有傷真氣而皆謹嚴有法綜其大要猶為不失典型在南宋諸作者中亦鐵中錚錚者矣至易說一卷始於无妄終於比凡十五篇疑其未竟之書中多以史證經乃楊萬里誠齋易說李光讀易詳説之流殆為時事而發託之詁經歟其集久無刻本明季之藻以淮南自秦觀而後惟造有名於時始與觀集同刻之於髙郵其中青詞疏語諸篇均非文章正軌今以集祗抄錄亦姑仍其舊附存於巻内云乾隆四十二年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
