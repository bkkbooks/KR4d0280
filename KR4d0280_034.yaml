body:
  text: 江湖長翁集卷三十四宋陳造撰易說無妄復受之以無妄復之為卦陽已得時寖長矣至此一陽自外來而為主三陽在上咸得其位而二五正應君臣相得為無妄之主天下事無復可以加智力上之人茂對時育物而已矣剛自外來為主於內動而健剛中而應大亨以正非人之所能為也天也凡天下大治與夫極亂聖人設卦皆歸之天而後責之人以應之曰否之匪人雖曰匪人然儉德辟難彚正繫桑之事則當以人應天其匪正有眚不利有攸往與其爻辭所陳人事所以處無妄者無妄之卦在彖而往則不利大略舉其世不可妄有營為爾初則往吉爻辭也爻所以各應其時不可拘以卦體剛來為主三陽在上二五相得我無正應無應於上以此而往何吉如之初之吉以志而言初之志乎無妄之世正矣三則災矣三所謂災五之所謂疾也二與五應而三繫之雖繫之而二之順而正如行人焉終不失其正徒為邑人之災邑人三之謂也此其所以在五雖曰為疾勿藥有喜而試之則贅也至於四剛而近君得君為深初四之剛在無妄之世均宜有往而四之近君比之初勢便而位比故初言其往四則言可正又言固有之則不待往而得矣至於上九處卦之極而恃剛而反其道無所事行而顧行焉此所以有眚而無攸利也災天為之也眚自取之也三之災上之眚於此乎異其言災有不幸之意眚則自作孽不可逭矣又曰窮之災災與眚具以言上之失無妄之道甚矣自為眚而天災之云也昔之君臣其失得於無妄之世可考也舜其善處無妄者也舞干羽而苖格苖為惡於舜之世三之疾也舜能不試其藥者也漢之賢君其設心亦有得於此几杖賜吳而逆謀不敢萌濞在漢三之疾也漢文能不試其藥者也陳武請用武賈生請繫單于笞中行背一受之而不從彼無妄之行者吾能止之文之賢漢之舜也歟唐之太宗躬致正觀之治幾千載一時可謂無妄之世矣而帝不能安於無事南征北伐勤於逺略迄無寧嵗伐遼之憤死猶未悔其下不忍無妄之疾而藥之者歟至於六二則垂義甚明六二輔九五為無妄之主者也猶臣之用事者正當適無妄之時不必以巳事君以人事之可也不必以智能事君相安於無事可也以人而事其君故凡智勇功名要不必皆自己出有能效智能功名於吾君而吾援之以進則亦吾之所有矣與其君相安於無事故持循調虞斷斷若無他技天下隂被安靜之福而吾君享恭已之治故曰不耕穫不菑畬利有攸往夫耕而後穫菑而後畬事君之常也惟無妄之世用事之臣人耕而我穫人菑而我畬無惡也曹參之事惠帝日飲醇酎戲婦人而漢民不失其安蕭何之法足以為治也何耕菑而參穫畬者也房杜相唐諫推王魏兵濟英衛而盧懷謹甘伴食之譏而畢姚崇之相才是皆有得於無妄六二之義者象曰不耕穫未富也人勞而已享其利誠以彼有長於我如己未富而資諸人爾威公命鮑叔為宰曰臣君之庸臣也治國家非所能也若欲治國家則其管夷吾乎公用夷吾齊果伯天下鮑子之言易之所謂未富是也彼為大臣淺中狹度必欲擅天下之功名又惡人之有而媢忌傾危之妬婦然者其何足以與此屯屯難之世非剛陽之才不足以康屯康屯非隂柔事也九五得位而中康屯之君也初九在下康屯之佐也將以康屯必也共利為恱共給為安九五在上而下應於二狹其施者也故曰屯其膏大正凶而康屯之佐不必使君相自躬其勞無營於此任羣才以其事而屯且濟矣屯一卦彖言勿用有攸往利建侯初九康屯於下者爻又以盤桓建侯為言則處已於膠膠擾擾之外以貴下賤分土建邦使民有所繫屬則何勞之有何往之有初與五皆勿用往者至二三四上則輔其君佐者也其所言雖有得失有宜有不宜皆攸往事也二有守不苟所從者也四則自重即我而後往者也三與上失中與正或非所往而往或不足與言往故爻象言之不同如此同人羣居旅處交際之間皆同之之道也人之道不同則爭奪陵犯禍亂隨之矣卦之所以為同人而後受之大有同之之道盡天下至治之所從出也彖言同人一卦之義內外之才無所不善而六爻皆不能至善何也爻以二五為主雖曰隂陽履位上下相應二剛介之彼其心皆欲同乎二而不以道者也要之二五終合不可間然無始有終即象以求其義於以見天下君臣上下之間其同也未嘗無間之者也君子體此豈宜苟焉同之昔蜀先主器孔明關張不說苻堅深信王猛樊世席寶之徒不便也臧倉亦毁鬲孟子季子以女樂去仲尼雖聖人猶爾况其下就小人之情言之九三以剛用剛果於禍賊者而四則以剛用柔欲逞而知其非遽反焉與三不謀矣故指其吉曰困而反則聖人之於天下恢乎其容雖至愚小人略可挽回其惡未嘗不豫之也九四是巳粗賢於三則巳不見棄矣初之于門將以同乎人惡得不出門庭以守絶物之介耶上則同人極矣將以反其極而超然乎其外人道惡可以遽絶也哉雖在我無悔而君子之所謂志則誠有未得也長沮桀溺荷蓧丈人吾夫子隘之大有人君以柔順謙虛之道撫接其羣下是可以有其大也大有之世五陽拱一隂而六五據尊位大中以臨之如舜之溫恭成王之自稱冲人是也當是之時無凶悔可言聖人述其盛於彖矣其於爻因象以示戒而巳二五聖賢相與道同志合剛柔相濟無間然者三過中公享王之象公享王盛禮也故有小人之戒四近君多懼必也壞植散羣以孤忠結於上故有其彭之戒若夫初上之亂統一卦之體為言也初之無交之戒為大有之世戒也故象曰大有初九上之吉利為大有獲祐言也故曰大有上九世方大有君子恥貧賤之時而獨孑然窮處於下可乎以賈誼之才當文帝之時不為公卿所與是也孔子繫上之辭曰履信思乎順又以尚賢也是以自天祐之履信思順而且尚賢六五之盛德也而上九言之為大有一卦總言其盛也决矣豫豫和也豫安逸也悅喜也和也生於安佚喜悅者也說卦曰豫怠人皆蘄為悅豫安和而君子憂而畏之以其戚促則思豫既豫矣怠忽以生人之常情故卦之彖備言天地聖人致豫之道而爻則詳為之戒六二以柔順居下居中履正上下無應與由豫之爻又不相比附知豫於安為不可就故介於石舍而去之武而亟不至終日惟此一爻全於豫而獲吉九四一卦之主上下拱之由我以豫者其任其功不細矣然近柔弱之君處多懼之地五之疾職我之由則巳逼矣雖非得巳然孰與二之優游而得豫之道乎五君位也曰疾以四戒也其義可戒也理或然非必皆然也古之大臣用事君柔弱而疾多矣然享成共巳者不乏常不死猶中之功也以柔居位御大臣以中則不亡矣易因象以示戒則然至初六應三以比與二大不侔故或凶或悔而上處豫卦之極則又為冥豫冥甚矣然許之以渝無咎去惡而從善去怠佚而為修省去悔吝凶咎而即吉聖人未嘗絶人也䝉䝉之九二一卦之主也仲尼曰舉一隅不以三隅反則不復也故童䝉之求初筮告再三瀆不告也君子以果行育德果成之也行在我成之矣乃可以育人之德巳無是責人以有是難矣故將以育必先果行初之柔上之剛皆治䝉者發之於初志於不受桎梏擊之於終禦寇而戒為寇聖人於治䝉之方忠厚如此九二卦之主六資乎二者也二爻君臣之分師承之道盡之三與四又眀夫避就之宜主乎䝉者人之所宜即之者也逺之而不能即䝉無自啓即之矣或非其道而苟就君子惡之四之逺實宜其困三之即二不順之行人之所不豫也六位之間即象以示義甚備如此需需須也剛健在下而坎險在前須其解也求之人事凡政事之須其成教令之須其孚危須安亂須治與凡在下者所須皆是也剛健而不陷直可須之而已坎險莫終病也異乎止不去而䝉止於下而蹇違行而訟澤無水而困也然剛健而須猶以逺乎險不亟於須者利初於郊最逺也至不亟也利用常何咎哉于沙迫矣以中也故衍于泥汙矣故寇至敬謹猶免則以剛健不困窮也與自我致戎者異矣坎在上所以為需五中正之君需之主也不特不病乎下三陽須以及已爻直言正吉而已四上之柔皆為險以病陽者需之時則有退聽而巳而二者安行與勉彊又以不同于血迫乎陽隂之不利於迫猶陽之需利乎逺也傷而出穴失所安也雖順以聽抑勉强而已矣頻巽頻復之謂也六進於是不迫也入于穴不失所安來者三吾知敬之宜其終吉於以見隂之於陽小人之於君子其情其勢有所不同而捨彼即此安行而不拂者貴也夬五剛在下長而未已一柔乘之在彼有不容安處在此不得不决而去之也在下內也君子道長極矣極乎道之長小人可决去之不疑泰言君子道長不言去小人二五止言君臣相豫宜密餘爻所以處泰而為否之防而已至夬之六爻餘無其義専以去上柔為言而其言又往往艱其事悖其施則知决去小人雖當可為不疑之時猶不可易而視之也彖既言揚王庭又曰有厲乃光既言五剛有攸往又曰告自邑不利即戎象曰施祿及下必曰居德則忌奏功矣苟居其德必有所不服是所忌也初以躁於其進則有不勝之咎二以惕號莫夜乃有不恤之得其忽與謹相去逺矣決小人於五剛之時任一相足矣非人君事也五以小人迫近夬夬莧陸然切切於是雖曰快所欲不宏矣故曰未光三之與四其情意趣操特異聖人必嚴為之戒于頄面夬矣非其心也非其心乃其應革曰革面夬曰于頄豈其心哉牽于應在一夫未足道或者其沮衆君子之謀而招禍納釁焉未可知也故必曰君子夬夬卦才則于頄君子當則夬夬也在卦獨行遇雨君子則當若濡有愠也夬夬云者夬之又夬一於此不疑也所謂念兹在兹是也易之乾乾蹇蹇井井坎坎亦是義也四之才剛位則柔且不中正居近君之地乃如此故不果於行自為違異犯不韙於公議若不聞焉異乎二之勿恤者矣在下四爻二之外顧如彼五之夬夬於莧陸有君無臣古今常患中未光也有由也自古決去小人最不易也最不容造次也誅二張於復辟之後乃置武三思此議乃出於張柬之司馬文正别白熙豐元祐之臣而去留之難當時所謂賢公卿或不然其說晉諸公去賈充而其黨設詐挽而留之則小人之在國天下知其當去不疑而或者立異以為能隂厚以自結不能保其必無有也聖人於九三九四二爻示戒之切如此不然君子之去小人反為其所傾擠多矣雖治平之世揚庭之時猶或不免而竇武何進無所憑藉瞢焉於東漢之末其禍非自取之歟姤姤一隂生於下有浸長之漸故曰女壯防微之意也謂初也初為勿用取之女故欲繫于金柅豕雖羸已若蹢躅防之至且於其早也女壯勿娶之義初爻巳具之矣餘爻所言則皆遇之功用不重出此意五與二皆剛也君臣相遇一卦之主二之遇初有而包之其包之也五實命之君所委臣所任也故曰以杞包瓜民在下上所封殖可以養君子魚與瓜其象也五能以二能包如自天然盛矣上遇道窮矣不足道若三之與四或不中且不正皆失其遇或未善乎遇之道也包無魚近君而失民其起凶也宜若臀無膚次且處無所乎遇往無以為決優於四之不正矣亦豈遇之之善者哉聖人於姤之象彖雖防隂柔之進然抑隂而尊陽其義巳徹於夬故此詳於遇而略於隂意互備可考也小畜大畜畜云者反情以復性格其放紛而歸之真醇之謂也三陽在下健而上行巽順則畜之艮止則畜之畜之止則止矣巽而畜之順適而已其功蓋不侔三陽受畜大畜有終小畜無終善初大畜畜極而行小畜畜極而悖則以止與巽剛與柔功用之遼逺如此也然剛不能以畜健畜之者柔也故小畜以四為主而爻稱有孚大畜四則牿牛有喜五豶豕有慶故曰至柔乃畜至健柔不能自為畜必剛主之而能以之故大畜有天衢之亨小畜九五有孚攣如富以其鄰以其鄰謂以四為畜也曰剛上而尚賢指艮而言指上而言也曰剛中而志行謂九五也巽而畜故初有應則復自道二則牽復巳不逮矣三比四乃至說輻反目止而畜故初則已二則說輻安於畜也三而畜道行且亨矣故良馬逐間輿衛攸往之利有不畜而已用固不同然靡不告功者主小畜五也上則告功既雨既處尚德載小畜畜道成也婦貞厲月幾望有所深戒為四戒也小畜有戒也宜隂柔而見用烏得而不戒大畜之道大成則不必爾也凡皆巽而畜與夫艮而畜異也彖於小畜曰密雲不雨自我西郊不雨有終雨之意自西則必東故小畜亦云亨而畜功亦收於上大畜則直云剛健篤實輝光德新止健大正而應乎天言之其氣象小大如此不待細讀深求而灼知之復復云出入無疾朋來無咎夫陽為君子為德為舒為生夫易其尊陽之書乎在復陽反自外而復於內其入其出在巳皆無疾以見其安行來而附者其朋亦無咎以見其得道多助噬嗑用刑之卦物有間用刑乃能去之二三四五其象皆用刑者也初上無位其象受刑者也聖人畫易示人以象也然初之受刑輕在下也卦之始也上則重矣在上也卦之終也故初校其趾取其不行聖人以為小懲大戒小人之福上則滅耳而凶所謂不可掩解是也然君子為善小人為不善各以類勝初無應於上故其惡小而刑輕上有應於三其惡滋矣受重刑宜也革革之象與義革者九五是也革於人者初二三四上是也九五以剛居中而正君位大人也用以革故曰虎變龍虎皆君象也其化如神其信於人甚敏未占則巳孚矣革於人則有難易遲速淺深之殊鞏用黃牛受革而已他無用焉無惡也二應上已日乃革革之易故征則吉而為所嘉應也四比上悔亡有孚命斯改改斯吉其受革與二同其易三則難矣革以言末矣三就然後見信征而即君凶其宜也象以為又何之則以其逺君而又失其中非餘爻比明矣聖人之世固有怙惡悖義詔告再三而後勉强而從者也之人也其足以進而與天下乎比比之為道貴乎廣廣則無所不比其為用也貴乎神神則由而不知夫能是君人之道也若曉然示人置彼此厚薄於胸中則有比有不比非君人之道也九五以剛中之德為衆隂之所歸若能窅然神運泯焉無迹無適莫無逺邇咸與之比則其道大矣今乃顯其比而下應於二夫其有所應則心係於所厚而它則不皆厚如王田之有三驅其於禽逆我而來則舍之順我而去則取之以逆順為取舍則失前禽矣王之失正在有厚薄其於邑人之後而比者則不誡而吉是為上所使之中也非為上之中也易之為道欲其應而君子之善世又貴乎廣大無所决擇有應則狹而小如康屯之世而九乃屯其膏如同人之時而二乃同于宗皆有應而小比之九五其義同此初六以柔居下將以比人而執謙抱誠盡比上之道故不特有孚而又無咎不特孚信中足而亦有它至之吉比上之道此為盡善若二之自內應五雖不失所比然視初則有間矣故正則吉而不自失而已至三之比六乃非其人而比之比非其人傷之者矣四居上體之下外比於五亦為比得其所故曰比賢而從上易之為體下卦則內而上卦則外也四近五故曰外比若夫上之為爻居一卦之極衆隂比之上時巳瞢不知幾彼皆爭先為比而已獨後比則無能為首凶之道也雖欲終之其可得乎江湖長翁集卷三十四
