body:
  text: 江湖長翁集卷十五宋陳造撰七言律詩送詩陳惠伯惠伯求所居三詩既為賦作此送似危樓深室桂為堂題品端宜虎豹章歷數諸公皆大手尚須此老索枯腸馳神幾夜層虗上血指如今妙斫傍聊復送君供覆瓿未須傳到鄭公鄉襄陽賦秋日江梅菊花秋香冬艷各時宜叵怪花神令出竒金菊正含霜曉秀江梅不待雪寒期帽欹同伴龍山醉詩到終嫌驛使遲陶杜當時儻經目定并東閣賦東籬次韻程帥二首平時渭北與江東文會賔筵幸許同政使遲遲嗟去魯未應咄咄遽書空抄詩奚翅無瑕璧會意俄乘在下風摶扶搖風斯在下更喜朝來賔鴈足陽春封寄客塗中從昔文章蓋代翁言間有物自無同娟妍徒玩花含露灑落還驚月印空底許賤工慙擢矢信知妙斫有成風古今一印元呈露要在神融領會中次韻言懷房陵回首望淮東物土人情未易同比屋蜂懸人帶癭亂山戟立勢凌空汙鯫共饜川人食簡朴仍存太古風破我殘年七百日盡拋詩卷酒杯中次韻記别程帥榖城旅夢金翹搖曵玉丁東賔主依然醉笑同舊事忽隨殘漏斷新愁不逐曉雲空挑燈旋拂穿帷雪攬轡還禁逆帽風回首夢魂飛到處壺公窟宅五雲中梁教病起側聽長須得好音笑談已復替呻吟逃知二竪今無地仇想三彭亦就禽定免帶圍憂沈約可須檄手待陳琳尚須十日安岑寂酒聖詩愁恐未禁上外朝山度隴凌坡冒百艱今朝又上外朝山當車狠石通人過交道飛蘿要手攀猿坐沉寥猶嘯詫鴈驚巉絶故飛還臨風却快塵埃眼全楚山川指顧間過八疊山路入于平舒倦眼襄陽佳處亦班班燒香峴好思三峴八疊山髙似萬山喜此經行無雨阻向來遊覽坐天慳山靈定笑貴野鶩默遣歸求邦域間馬息山猿蹊鳥道且攀隮瞑靄頑蒼只尺迷狠石忽開防地裂屯雲不散訝天低眼髙欲了三千界夢斷猶驚七百梯回望故山真可指杜鵑腸斷為誰啼寄鄉中親友二首棋酒遊從歎離羣犯床吟筆漫飛塵潮乎可奈才力老甫也尚為南北人安信不隨秋鴈到流年倐復野梅新南岡北阜憑髙地引首吳天幾愴神坐衙隨分吏分行退食還先藥探囊已為河魚廢詩酒強教籠鳥聽宫商老猶苟祿寧良計病悟休心是祕方想見親朋遲歸楫為翁補漏斸空荒賀程帥因任四首且言久缺詩筒之意恩綸蜚下漢江濵特許襄民借寇恂千里江山皆動色列城條教再生春灌瓜夙稔安邊䇿茹草寧無待哺民方倚金城親邵父近君寧惜小逡巡詩律寧惟似變風姓名久矣御屏中逢辰千載合致主入夢九華仍插空鐵甕倚聽新號令銅蹄終舞舊兒童煩㪺叶氣成豐嵗却簉臯夔侍舜瞳肯優襄峴劣南徐行止平時每裕餘荷紫端宜冠鴛鷺飛黃猶似顧蟾蜍緬懷夜燭賡清唱况許春郊載後車從此追陪得如願重分膏馥澤空虛先生一筆將詩壇􅍥匱珠璣底坐慳平日鷗盟當未愸于今鴈足每空還傳抄可但聞平水老瘦從知笑飯山緩帶輕裘秪常日千篇破竹定乘間再次韻答程帥髙機宜四首自分迂愚著海濵諸公薦力漫忱恂摧頽晚境空多感局縮窮山亦再春故里歸耕雖有約中田敬饁遂無人何由消破愁千斛甓社春濃莫計巡甓社春吾鄉酒名名德誰今挺古風人嗟汲直合居中揮毫有物鬼落膽與世無心雲度空倚聽金鑾拜新渥又煩竹馬走羣童貝宫風露鼇峯月行矣輝華映兩瞳髙郎筆勢未姑徐千紙珠璣咳唾餘春興漂蕭陵野馬夜窗清絶冰去聲金蜍諸公交口傳黃絹蜚詔褒賢定赤車亦使窮山拜嘉惠衰翁擊節正馮虛倒海翻湖袖手觀揆子才思坐天慳愁攻心折仍無賴債壓頭低不辦還坐想賡酬聮白璧秪令翹企仰髙山拙疏却喜便衰病􅑿得蕭齋盡日間正仲和帥屬被盜二首衣囊緘鐍竟胡為祗與偷兒便挈攜髻重得無猜祖珽璧亡遮莫議張儀館人求屨古未免有力負山人得知不用經營辦春服舊紉蘭芷扈玄蘺向來忠信倚垣墻誨盜如今坐慢藏望意漫言疑聖智竒文不合吐光芒玉川空屋遭窺瞰子敬青氊果在亡賴有平生千牘在未妨攟載作歸裝贈髙司理窮鄉洗眼挹清揚凛若重登月旦堂驥子鳯雛端不苟吏能儒業况兼長簡孚首解秋荼密襞積仍熏古錦香我亦床頭一經在自公正欲共平章再用前韻贈髙司理共八首少年場裏獨鷹揚他日懸知玉作堂小試問囚窮兩造徐看載筆擅三長得詩遽眩珠璣爛玩味還疑齒頰香風月無窮才不盡坐須喬木擁千章帥幕羣才賴激揚衰遲猶喜後升堂雷封局縮聊償債衮字褒嘉但寸長再試真成不龜藥九言終佩辟邪香龍門夢斷誰知已幾誦桑阿賦末章衰宗如此况他揚碌碌諸雛欠肯堂薄宦幽憂殊未醒故園歸夢可勝長杯盤頓頓家雞嫩翁媪嗚嗚社酒香猶記比鄰笑行客夏畦龍斷為金章詩語庸非自播揚流傳朋舊定哄堂儒書投老空成癖舞袖平生不解長黃鳥啄殘丹杏顆清風搖動緑筠香山城寂寞便吾懶劣勝精神弊句章俗裏毫絲起抑揚請君時閉讀書堂渭清肯混涇流濁鳬短徒憂鶴脛長千載流傳防造次百年表立要馨香了知此印君堪付過眼尨涼忽報章蘇李宗風我舉揚少陵公按子開堂官曹此地文書省詩社從今日月長山滴曉煙收後翠蓮漂天女戲時香可孤煮餅分強韻正使銅花澀印章腰錢幾夜夢維揚上雨傍風秪此堂人笑鉛刀那用割自知襪線豈能長課詩壇畔獨飛動問字人來且碧香徑欲披衣還舊隱二天寧久溷蘇章帝旅曽觀武事揚如君文勢整堂堂了知一筆無前古坐遣諸生喪所長丹桂髙攀霄漢逈捷書西下姓名香貝宫鼇禁應餘地看展平生補衮章君方從舉子闕倅有桂華闕故末章祝之病起間步瞑緑園亭小雨晴病翁雙眼為誰明栁如張緒不殊昔竹與子猷相對清門下鳥烏無客到壁棲蛇蚓又詩成回頭溪友千山阻更向何人話此情寄師文二首時悼亡室世塗豈必盡籠囚自是迂疏拙應酬簿領嬰心寧素志夢魂何日不滄洲揆吾溫飽兒堪託平昔行藏婦與謀已判來年拂衣去寄言亟辦釣魚舟萍梗漂浮已老翁歸來差樂未終窮稻田取足隨豐歉花圃逢春自白紅禪老版頭容客飽臧孫鼎足秪墻東更聞名酒新傳法詩外棋邊莫放空次韻什邡馬主簿二首陶謝前蹤一筆追掀天聲價舊風馳瑞時不數九文羽換骨疑飱三秀芝蜚電燭巖方左席明珠照乘忽清漪裹創瞢欲凌堅陳可諱含毫不自持紛紛過眼甚螽斯膽掉驚逢驥騄馳獻替付君溫省樹朝晡還我故山芝荆江蜀棧聊舒嘯卷耳思齊正採詩回首定傳天上信囊荷知傍紫皇持再次韻馬主簿二首後詩餞共行冥搜成癖漫勤斯緬想騷人正坐馳點化今逢萬金劑神竒蒸出九華芝三吳才雋應焚硯萬里風煙盡入詩盍與元劉論伯仲未容郊島更矜持左顧衰翁底取斯轉頭歸馬又西馳賸催阿買抄新藁大勝齋房紀瑞芝樂嵗人家皆有酒髙秋天氣總宜詩霜花露菊留迎客預戒西成省控持再次韻二首飽食頻頻秪􅢟斯可堪迅景隙駒馳不逢猶是桐為弩當價胡寧􅌲作芝天籟寂時三弄笛楚山窮處四愁詩將壇可復宜衰病此柄須君為主持歷塊飛黃可得追加鞭十駕浪驅馳不應猗頓懷周璞敢向天仙話土芝晚傍涪翁觀落筆了知髙叟固為詩謬為恭敬吾何取政恐龍泉有倒持偕章宰勸農房山登臨一擬豁心胸著我松窗竹屋中宛是官曹縳雕虎不容塵眼到飛鴻綿延天際應平碧孤負林梢抹嫩紅俯仰去年舒嘯地解衣聊復近熏籠簷外雲深雨合圍此行不歎始謀非對君便是蘇端過把酒曽無御叔譏紅濕煙郊思散䇿寒欺病骨旋添衣了知未盡山隂興共作衝泥傍險歸簡章宰二首蕙蘭洲北觀山頭未暇尋盟訪舊遊自笑春來多病過靜無人處但詩愁遙知聮轡窮幽勝更想簪花賸獻酬報答東風應得句奚奴亟肯寄儂不縹眇雲藏羽客廬不妨尋勝小踟蹰鴟夷載酒鶯花處古錦囊詩簿領餘百和風輕吹欲醉萬山嵐凝對慿虛談間定笑衰慵客竹屋髙舂尚枕書上已溪上燕二首後溪分占羽觴浮雷隱歡聲半棹謳况我間官似犀首為渠領客作鰲頭玻璃影裏粧光膩桃李香中步障留病骨得晴堪近酒與君同拜醉鄉侯杜若洲邉卓斾旌佳晨一醉萬金輕春光僅有一分在天氣可能三日晴解道蘭亭亦陳迹肯吟楚些愴幽情人生到處皆兒戲笑看爭標鬪兩鯨試柘枝溪上是日晴色衆客喜甚蕙風花氣雨餘天報答融和玉作船壯嵗自能鸜鵒舞老狂猶有柘枝顛羣鴻翩度昆明錦雙鳯翔從玉井蓮起我少時豪俠興未甘詩客號臞仙次韻答許推章宰二首矞雲非霧靄飛浮滿聽遊人載路謳痛飲君能判濡首新翻我亦辦纒頭羽觴瀲灔風微度翠蓋蹁蹮晚尚留且倩銀鈎寫陳迹未須詩律壓劉侯北來青翼導霓旌翩若凌雲鶴馭輕煙栁困眠才寤曉露花酣醉正熹晴獻之能賦雖辭罰楚客同醒恐不情豪興尚堪追少雋漏巵灌酒鱠長鯨再次韻答節推二首透幕穿簾香霧浮行雲低影傍清謳遊人是處歌鼓腹佳客伴翁吟掉頭令節可孤三日醉歸期猶有一春留詩壇酒會容先歃莫問將軍老不侯虧成久不撓心旌老閲人間百事輕却笑平生甘淡薄每緣行樂問隂晴羽觴餳粥同春事卧醉行歌見俗情擊鉢更遭強敵困可能赤手控奔鯨再次韻答許節推二首褉事罷覺飲過度強起遊觀山小雨尋止因節推有贈用韻答之兼簡知縣起依笻竹似桴浮改就新詞却自謳囊錦斬關聊袖手酒兵推户且扶頭東風已拆紅躑躅碧樹更啼黃栗留醒醉醉醒殊未沫不應通守羡通侯步屧巉巗屏騎旌松風茵露為誰輕已無桃李擅春事忽有鳥烏啼晚晴羽客不妨同水厄宿酲端解敗詩情開緘又拜同寮賜錦假中含掉尾鯨再次韻四首三公再和復成四詩道歸休意且謝所貺亦以談詩新釀開缸渌蟻浮舊辭仍缺唾壺謳宦塗要處難插手詩社叢中常引頭倒載肯陪山簡醉反關莫厭孟公留秋田粗可供佳客不比封君亦素侯翰墨場中對抗旌黃陳一筆萬鈞輕武安屋瓦秋鼙震湘水波光夜月晴沮洳求魚真自笑渚涯向若倍馳情吾生恨落任公後不見投綸掣海鯨尸祝代庖良過矣即今坐嘯免謿謳陶朱計食魚萬尾景略有兒牛十頭甫里過從勞夢寐輞川歸去忌遲留大弨一弛吾通袖冷看逢蒙中射侯韻語聮翩到浚旌楚珩非重夜光輕吟成品物回春態誦處東風放曉晴抖擻錦囊娛我老滌除愁斛見君情固應詩膽驁無本刺手霜牙摩怒鯨梁教授次柘枝詩韻再和洞裏鶯花别有天為渠蘸甲上金船舞姝貪看塵生襪飲興渾忘雪滿顛弄影競垂三昧手倚風疑裊五枝蓮廣寒再閲霓裳罷笙鶴飛來未是仙書懷人間窮達命汚隆作意功名欲捕風但見劉班誤車子何曽鄧禹笑王融官曹得飽餘何事書課乘間亦雋功少待蓴鱸付張翰一溪風月放船篷次韻髙幾宜送别棋枰詩課憶同堂轉首暄寒幾蔀章每歎羇離念陳迹更因衰病感流光亟催江鷁休停棹已信溪禽不亂行魚澚芋區真好在連宵歸夢為誰長士價如君定玉堂陳陳腹笥漢文章即今綵筆春爭媚它日青藜夜有光詩力不勞凌汝輩才名况自溢班行清篇見屬吾何取愧闖辭壇闕寸長再次韻謝惠詩仍敘不敏百鎰籯金數仞堂何如盥手頌佳章奪胎信自非凡劑獻佛當知便放光斤運向來車合轍影斜還惜鴈分行衰年離緒誰禁得鏡裏新絲莫計長小家茨竹即為堂暇訪深林索豫章平日牀頭但周易看人筆落便靈光庳隆賦質嗟多樣良楛論材要當行莫向黔婁問竒貨長沙舞袖可能長贈黃國器二首豫仕窮山故人黃國器亦奔走湖湘豫官滿相值鄂渚敘舊喜甚約連舟東歸二詩贈之交情凜凜久彌堅遊舊何人似子賢别去漂零各天末喜今談笑復樽前德人政用寬幽獨歸路胡宜更後先彈壓山川須妙語不妨排日為君編簿書叢裏久囚拘鷗鷺羣邊忽自如白傅已甘多病過安仁况復悼亡餘歸田且辦充腸米遮眼非無插架書如子功名方迫逐未應偕我問樵漁過伏龍祠蜀棧荆江志未酬兩京直擬笑談收僅容孱后存􅈶祀誰遣東吳解魏仇制敵豈應無法正為謀不合有譙周伏龍祠上長煙靄憤氣堂堂恐未休武昌客子修程未息肩江山佳處小留連醉臨庾亮樓前月夢闖回翁洞裏天形勢盤縈蹲虎鳯輪蹄隱軫度絲絃登髙欲賦還東望楚些無因喚謫仙歸歟老秋已辦求田問舍謀登臨那復更悲秋蟹肥與客爭先把稻熟催兒徹晚收霜後峯巒添峭措波間鷗鷺劇風流寰中勝處天應惜付與癡兒秪暗投宿何人家步尋松篠款谽谺忽到孤山處士家十頃蒼鱗漾墻角一鉤寒土插簷牙杯行不乏紅絲鱠飯了仍供白露芽把臂傾舒吾已怯又分離緒上歸槎次韻張司户鴈汊解后張有詩見惠橘頌精靈雜逺遊如君信是古詩流吳門肯問鱸魚鱠東武當營燕子樓有底揮毫挾風雨定知貯腹盡陽秋即看珥筆鴛鸞右莫漫江城詫狎鷗他日猶能説宦遊老禁多病厭漂流近臨西蜀窺鮫室舊傍東溟看蜃樓歸計已嗟霜蟹晚吟聲間伴候蟲秋塵冠徑欲留神武萬頃蒼茫漾白鷗凌晨復有惠急筆次韻小駐江千接雋遊渭清涇濁可同流假真笑我陳驚坐造妙推君趙倚樓姓字已髙時輩上功名尤忌鬢毛秋等間莫學金華伯碧水如天擬夢鷗山谷詩夢作白鷗去江南水如天仕塗決矣息交遊姑向林泉訪勝流短褐直甘乘下澤異鄉終勝賦登樓驚心夢境檀槐戰屈指鄉園秫稻秋雉翳龜燋緣有用未聞金彈中沙鷗贈四子二首龔澤卿傳商卿臧子與子儀追送豫至維揚作此贈之峩峩冰港僅通舟䇿䇿霜風透重裘良為豫來真好事小留君住得銷憂可無談笑傳觴處賸有煙雲灑筆頭保社相娛倚公等暮年干祿判悠悠交遊過眼亦班班四子聲猷豈易攀百里來羞長翁贐片言仍解相公顔事乖雅意疇忘歎我已南驅子北還繼此開樽講德處定知矯首向雲山次韻雪詩林郎中宴八客七客皆朝彥出春雪詩軸因口占次韻欺梅瀉竹透承塵熒侮東風似妬春匝地閭閻皆種玉插空樓觀忽鎔銀坡云鎔銀百頃湖窗明尚憶耽書夜身曲誰憐旅食人親見飛仙下瑶檢諸公居處與天鄰再口占次韻林舍人伴射得賜銀對客云此錢已盡未能觴客俟置一姬訖當尋盟君家朱閣隔嚻塵可欠賔筵蘭蕙春橫草定銘鞮汗石穿楊新賜上方銀幾時釃酒招嘉客不假傾囊得麗人莫坐風慳仍雨澀秪將詩筆詫無鄰次曽左司韻贈俞德瑞時俞買妾班荆同冒軟紅塵一種東風兩樣春雋飲放君顔似赭幽居憐我鬢如銀簡編自誑供良夜要襋渠今有好人把酒若歌歸緩緩不妨折簡喚東鄰次韻答德瑞詩客胸襟舊絶塵惠然分我一緘春裁成蜀國添花錦貴重丹砂伏火銀坡謝二孫詩養火雖未伏要是丹砂銀暮雨朝雲知有夢瓊枝璧月可無人要須共醉彭宣酒莫諉忘情宋玉鄰再次韻贈俞德瑞前後共三首珠軒繡轂輾香塵回首西湖羅綺春便合行歌訪花栁可辭買笑費金銀清吟自屬當千客勸醉那無第一人肯學孤山舊居士平生詩酒秪僧鄰孰知妙語析微塵細寫都城浩蕩春向我能分趙城璧為君還缺唾壺銀平時宦路甘違俗投老詩聲更後人枘鑿推敲有砭劑不勞千萬得芳鄰襟袂猶緇客路塵攀追強踏帝城春落身窮僻才全璧敵已遊從半佩銀枉却近臣開薦口頗嘗內地著癡人君看捉筆青燈夜得句歡呼聒四鄰送張文昌帥豫章二首倚俟新年轉化鈞晝方三接徑抽身平時但有凝香夢盛世那無勇退人滕閣賔筵時可醉金華詩令看重新盍思逺邇商霖望不但淮鄉有涸鱗張文濳云補外之樂發於夢寐故后山贈詩時平身早達未用夢凝香談間賔客重宣州到後兒童敬細侯薤本擊強休領攬棠隂問俗見風流湖連市屋疑豐樂江繞城闉似石頭鷗鷺要盟公莫信江湖秪許半年留行都夜歸燈火通衢苦未稀望仙橋外獨歸時風梳御栁娟娟淨月傍觚稜故故遲隱地輪蹄忘夜旦幾家樓閣不金絲時平睿澤天無外帝力何曽爾輩知次韻同年諸公環碧敘同年會天瓢挹注拱仙官更閲詩仙錦繡端離合不忘車笠誓留傳當並畫圗看玄談想有蛟龍聽得醉仍均客主歡俯仰謫仙三百載從知樂事繼今難東坡云謫仙後三百年無此樂再次韻春意溫然侍上官松醪更勸語更端行厨賸遣黃頭載下客何曽白眼看傑在漢庭方眷注功將周室更祗歡孰知末至慈恩舊老境猶歌行路難又次韻聚首論年不計官寥寥故事復開端俯容我輩輸心語更遣時流洗眼看庾亮賔筵無盡興昌黎文飲有餘歡舍人妙句還新樣白雪賡酬政自難約徐南卿出遊前夕雨曉枕作古寺周圍錦樹窠清湖演漾麴塵波偷間已計三餐反敗興其如一雨何政復小孤鷗鷺約未妨來校魯魚訛春光尚有三之一徐辦蘇隄一再過時豫編惡藁南卿每分勞西林訪銛師師頗能詩天將宿雨淨春空却著湖山鼓吹中載酒言辭藉花伴運斤來看斫泥工前身師定參寥子拙宦吾今張長公俯首人間皆長物未妨分饗北窗風約吕徐二友遊淨慈二首二友簡問行期急筆以告芒鞋明日踏晴沙肯學渠儂走狹斜天井巷前休倦足暗門城外把煎茶暫同佛屋僧庖飯徐訪姚黃魏紫花要及錢唐尚留鑰共揄吟袂緩歸家一笑成行不待營可無條約諗同盟盤餐取飽真君事杯酒邀歡太俗生撥冗得間殊自樂吸光飲渌不勝清即今冷眼聚蚊夢彼此劣優君試評再次韻二首問舟初立栁汀沙雲日升空渌影斜詩槖恥隨金埒客蔬腸未厭玉川茶青湖波外方遊女翠幄叢間亦晚花小待春歸簫鼓靜還容襆被欵襌家塵中誰定免營營鷺渚鷗沙且舊盟夙世林逋漫千首逢人圓澤悟三生扣門喜共僧窗飯斫句猶能鏡樣清身世已拋春夢外更於文字措譏評還王編修詩卷奕奕長篇間短吟子綦天籟伯牙琴幾人不溺西崑體老我親聆正始音得寶渾驚探驪頷換金當復售雞林還詩正恐非豫助晝易忘飢夜易深元日訪丁端叔安撫二首時丁出謁徑行留講古一集幾夜徒勞夢帝宸行資已槖更逡巡北山秪合追逋客南道于今欠主人表表德名當世重堂堂公議有時申繼今重䇿沖霄足鶚表胡寧後隱淪節中應接可辭煩客子回車重慨然比我過秦應一笑想君出峽富千篇前知此别非久别定復新年勝故年紅藥紫薇方次第莫占風色問春田次韻王編修二首作詩還王詩王有詩次韻謝之落手新詩吮復吟自甘壁角挂枯琴祈光已吸金莖露張野俄聆帝樂音療我平生風雅渴放君髙步雋英林人間夢想珊瑚樹龍護靈湫萬仞深老誓捐書斷苦吟君苖筆硯戴逵琴因君又試推敲手揆我終慙繳繹音漫作蠧魚餐朽䇿倐聽鵯鵊語中林闕臺盤客曽丁字碧酒留賔聽淺深江湖長翁集卷十五
