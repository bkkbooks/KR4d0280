body:
  text: 江湖長翁集巻三十八宋陳造撰啓房州交代啓老涉宦塗可堪䟦履情依德宇倍切傾馳行酬披霧之私庸締合符之契敢攄衷藴劣具柔緘某官儒者司南士鄉宗主疏榮桂籍慈恩無㡬之在前奏課花封單父繼聞於多暇䇿足合霄霏之上題輿姑風月之分今焉告𤓰戍之期繼此抗楓宸之對需扶亨運盡展壯猷某書社陳人淮鄉冷族服勞州縣笑跛鼈之不前繫夢樵漁羡冥鴻之何慕尚啼飢號寒之迫輕重山複水之行幸竒蹇之暮塗嗣仁賢之英軌漢河南之畫諾稔聴風謡楚令尹之告新更資䥴警郡太守啓諗官期於天末久切遡風仰德望於斗南行將披霧敢藉鱗鴻之便庸修竿牘之恭某官龜鏡羣工範模一世懿文卓行儼乃祖之髙風露冕褰帷躬斯人之司命中外傒公侯之必復廟堂知旅力之未愆佇膺尺一之褒優羡魁三之慶某儒冠蹭蹬官業迂疎虚名不救於啼號局步敢期於軒趠彊顔佐郡忘六十翁之衰取道浮家輕三千里之逺幸吏師之可法仍徳宇之焉依縮手觀傍即上承宣之課最因人成事與霑飽暖之君恩答梁教授啓𤓰戍有期付修塗於去鷁芝眉入夢挹嘉惠於來鴻春風和氣之滿緘明月夜光之溢目老方殿縉紳之後何補盛時貧猶服道路之勞姑從吏隠省鳩鼯之技念呈拙以何為簉鴛鷺之羣指掩瑕而有待喜朋簪之將盍倐雲翰之逺投瑶玖之報李桃曷云其稱玉刀之資礲錯其自於今答葉都監啓心期有在何計秦吴科目是拘遂分肝膽頃公言交口之見諗果王事同寮之得才人謂斯何吾知免矣某官東南一儁文武雙優萬巻撐腸謝臞儒於山澤千篇横槊抗竒志於伊吾屢魁右學之諸生旋射集英之大䇿仕雖地逺勿云禦㓂之卑才則時須即有升華之寵眷惟老嬾得與周旋日近石交已若弦韋之在側袖銜文巻不㡬珠璧之暗投但知珍玩之為榮未有絲毫之論報答竹山楊知縣啓驅傍險之車自憐愒日厯班荆之地尤切思賢拜嘉絇縟之文一洗勞勤之歎誦詠數過妙斵庸示於拙工始終一謙深蔵今信於良賈眷惟邑政顧屈時英小為星嵗之留需溢鶚章之數佇牛刀之最課看鳬舄之冲霄自莫逆與友之初巳傾意氣豈同官為寮之義猶靳䥴磨沐流問之不遺愧修辭之已後答髙司理啓戴星無斁舊叨府主之薦函披霧有期復拜郎君之教墨凛然風義逮此衰殘載披繡叚之華不覺屐齒之折某官才猷敏劭問學淵通膝上風流推義方之有自眼中才雋信餘子之平吞姑徐隔坐之除來試問囚之事念龍門之舊客未肯棄捐勤鴈足之尺書首加存省是盖窮塗而得石友不止空谷之聞足音美疢寧惡石之如息黥有待瓊瑶謝木桃之施匪報為慙答尹解元啓竒英入彀滿副時須大貝充庭有光吏計詫主司之得雋知支郡之有人某人胷次無塵筆端有口師魯之擅簡古綽見祖風吉甫之詠清微宻傳經㫖曩錦標之優奪兹火浣之重燒掇仙人緑雲之衣平凌月窟慰老子青眼之舊果破天荒功名啓途里閈計日江梅粟玉崩騰開鵬翼之程春酒湛觴凖擬醉龍頭之客答路上舎啓不可有二之文喧傳梓里方今第一之選誤聴鵲音財別榜之見收駭公言之尚鬱長牋拜賜老眼增明某人優讀父書蔚為國器當千較藝坐收拉朽之功旅百充庭合首觀光之客夫何斡鼎而寳瓠真成射目而中眉燈火可親春秋尚富中虎闈之雋姑令秀造之知歸題鴈塔之名盖亦功名之未晚答王上舎啓試闈蹉跌雖不偕鄉老之書文力清竒終然動主司之聽小緩集英之對姑為璧水之遊拜粲然藻翰之貽識賢者義命之戒某人經藏腹笥文掞春華姓字壓六州之英信難伯仲是非決一夫之目顧處下中效已試於仙方昏似成於金注抱負在我屈信有時雖云小得而大遺無乃愈鈍而後利太學待何蕃為重平心作三嵗之留淄川上孫洪之名拭目看諸儒之冠答胡學長啓十年蓄學静以須時萬里論程此焉進步豫章胡宜於小用荆玉深愧於暗投眷是勤劬若為報答知季子之裘已弊寧不興憐儻監河之粟有餘豈應固惜官曹冷甚郡計枵然勉為君謀試小割鸕鷀之肉能明我意聊助加驥騄之鞭答路主簿啓不平則鳴正須審克先入為主㡬亂偽真載欣君子之得輿聊貸小人之滅趾兩造得情亦其常事一緘叙謝何乃過謙聴訟貴夫無心察人考其素行居然乾沒㡬成瞰屋於玉川此復致疑豈有酖人之叔子略加詰問畢見欺誣彼既厚負荆之顔此姑薄謫金之罰事非獲已得屨果從者之廀君其自今徒行免大夫之後答竹山鄭宰啓邑政非人寖成弛廢郵音到眼大慰傾瞻玩辭采之不凡豈朽枯之可稱某官擅楚材之瑰偉追漢吏之循良種河陽之花中袖陽春之手製尹何之錦再揮斵鼻之斤聲華翕載於僉評餘力佇新於積弊揣越爼之無取喜盍簪之有期隻字分華衮之襃何容得此九里借靈河之潤其始於今答樂解元啓鄭鄉小駐仰都騎之雍容禰刺見投略冗官之衰朽忽衝牙之振響恍蔀屋之生光某人雷劍藏鋒楚珩論價子長少有四方之志越相肯為一鄉而留定知達者之髙懐偶動歸歟之逸興舊都舊國話親友之故情某水某邱訪釣遊之勝處夫何䝉昧顧肯臨存衮字拜嘉慰平生之碌碌錦囊新得尚餘惠之頻頻答竹山鄭宰啓牛刀再試一皆飭蠱之規繡叚墮前備見鳴謙之意情偕辭而兼厚仕與學以兩優悉諸見聞良用歎服釐拯既弊每易見功剔攘宿姦尤當謹始惟令君所以施設在鄙見廼無差殊藥能起死决非下醫奕之取勝或因敗局如治家者求義方鞭扑之餘稽化工焉暢春事雪霜之後束濕似非媺矣揚湯如益熱何側聆條教之肇新已見吏民之改觀不已者神所畏宜終始之屬思過情乃古所辭顧推襃之非稱方時多病答教後期謝不敏以雖勤應且憎之寧免賀淮漕移浙漕啓巳下並代人澄清之最久達中宸襃寵有加就移内部逺俗喜賜環之亟邇寮快覩鳳之先載瞻使者之星已近長安之日竊以舉刺之任分委諸道畿甸之地密邇九重凡激濁揚清固不輕於畀付然自中及外尤莫重於本根眷兹右輔之浩穰允繫羣方之觀聴八州餽餉必也不擾而錢流百吏觀懲要使聞風而心革克堪至重之責孰如已試之才迹夫所為優有成效兹由才徳之選實曰公卿之儲恭惟某官徳宇恢洪才華秀粹胷武庫而用則不器手干將而投之成風擁麾都梁旄孺咸依於召父攬轡淮右衣冠共戴於蘇天載在僉評不容久外江淮它日被萬福之威名朝廷諸公知弱翁之治行以公自近由帝深知不寧推按澄之功繼將有禁近之拜某辱知有素荷庇實深佩印虎城親受故侯之規畫搏風鵬路尚依先達之輝光展賀末由馳誠徒切賀浙西漕除總領啓十行芝檢來自層霄一道使權總之碩徳省蘭寓直營栁回春方逺邇之悚聞翕驩謡而載路乗軺問俗孰遵前日之教條足國裕民行繼昔賢之事業某官禀絶人之識為名世之儒挺薦紳表而雅推獨行之賢讀古賢書而不為無用之學棟梁杞梓允謂良材衮繡文章直其餘事自横蜚於仕路即妙簡於宸衷百吏革心咸仰范滂之攬轡列屯宿飽未多葛亮之雜耕况此常暘之餘良苦轉饟之梗河流如帶千艘銜尾以莫前粒食比珠萬旅張頥而仰待事有至難顧今乃爾賢必已試然後用之不有一代非常之才曷振此時兼足之䇿輦駕以輸河内少留子翼以給軍根本之固闗中側佇鄼侯之相國要令元勲之冠列辟豈止再見而位上卿某猥以郡符撫兹淮俗久依風於徳宇今頼寵於使臺聞嘉命之真傳撫微躬而知幸成於自同敗於自異需使指以趨承淆之不濁澄之不清尚仁人之覆䕶賀宰執加官啓孚號明庭疇庸近弼惟時盛禮亘今昔之未聞推上至仁遍邇遐而均被况鴻名申述於上聖而鉅筆允資於大儒驩傳兩宫信示萬世雖文階一級未足為大臣之重輕而睿㫖四頒莫不竦天下之觀聴云云厯攷帝王而下鋪觀典册之傳奉未央之酒者夀祺之㡬聞上應乾之名者紀述之猶陋固巳増光信史夸示當時孰若堯舜共揖於一家稷臯㕘聫於四輔五福一曰夀衍遐算於岡陵大徳必得名揭洪休於日月繄鋪張揚厲之力底輝光篤實之新恭惟某官名世真儒爽邦碩輔躬持正學傳孔子孟氏之道原鈞播生民如伊尹周公之聖偶謦欬皆格心之業雍容收論道之功屬皇家洪祐之申休乃太上修齡之衍慶虔修寳册寅奉慈皇揚徳業之登閎聖而益聖紀乾坤之髙厚名非常名發揮六藝之情文陟降一人之左右頼良佐之鴻筆成熈朝之上儀帝曰汝嘉爵豈予靳繇廟堂贊襄輔成於聖孝則股肱承弼可後於襃章惟皇極敷錫厥民宜王明並受其福上徳以有徳方迎未艾之天休大書不一書倚俟洊膺於帝渥某奉親尸禄乗障罔功夢想台光辱在照臨之下眼明郵報不知鼓舞之由自今疊舉於祲容繼此嗣馳於賀幅賀周右相啓誕告公朝延登碩輔雖事樞久秉終符巖石之瞻而帝載用熈始喜台躔之正晉陟文階之峻陪敦井賦之腴併兹便蕃異數之隆庸示體貌大臣之意偉聖賢之聚㑹聳夷夏之聴聞恭惟驩慶伏惟某官真儒範時全徳踵古心濳聖學得孟氏之正傳道覺天民負阿衡之大任儀仕塗之寖久擊朝望之益深謂周家守成必也資彼上宰而司馬不相何以活我生人顧兩地優游厯載於兹而九重注委惟公是眷能用三傑子房乃帝者之師襄我二人尚父實聖人之偶一旦正中台之位兩宫倚泰山之安盖大賢生世意天甚難然明時論相在帝不苟既精神同魚水之契將勲業侈竹帛之傳佇殫經濟之心用究規恢之略某之衰晚意巳彫零辱知最深係望罙切頼徳宇之庇居惟引領以自怡聴麻音之傳想見在庭之相賀屬縻郡寄阻厠客間了知白首之餘更有洪鈞之託賀施知院啓光膺帝制晉陟樞廷上眷日隆國威坐振惟真儒之進用繫寰宇之重輕雖與政彌年未究經邦之藴惟本兵要地正須榦國之賢端宥宻於廟堂庸折衝於樽爼兹聖賢之聚㑹聳夷夏之聴聞伏惟驩慶恭以某官徳禀兩儀學髙千載心濳孔聖得顔孟之正傳文掞漢廷小淵雲之麗藻雖徧儀於華近曽未究於經綸朝廷知弱翁之行能久勤注想夷狄問晉公之名姓盍副倚毗旋奉隆恩入㕘大政况上謀決帷幄之勝而全國無疆場之爭儻非登進於儒宗何以宻禆於廟算天開千載一時之華旦日騰兩宫萬嵗之驩聲可無除戎器謹萃聚之時㑹當誦車攻繼周雅之詠惟公任此視古過之亟正位於師臣究惠疇之相業某之衰晚志巳彫零辱知最深屬望尤切竊厦屋之庇仰厚徳以依歸聴綸言之傳激懦衷而踊躍屬縻郡寄阻簉客間託造化於鈞衡沐恩有地數安閒之日月撫巳留年賀蕭㕘政啓誕揚帝綍晉與政機酌公論於朝僉舉真儒而柄用儀圗衮職之補賢不假於外求調爕太和之元治益新於輿望宜乎不動聲色端拱廊廟之上可以丕建事功嫓儷祖宗之時仰聖賢之相逢格夷夏而胥應伏惟驩慶恭以某官徳禀天地學窮古今道統有傳宻受孟韓之正文宗不墜挽回舒向之醇出則逢辰進將致主雖徧儀於華顯然尚鬱於僉俞方帝載疇咨冀有禆於盛治暨王佐大用今始快於公言况鼎湖之莫攀而宸極之在疚不言罔由禀令兹適亮隂之初告后爾有嘉猷正頼彌縫之力既巳登老成而立治表是宜慰人心而固邦基行瞻下相衮之襃當亟正師垣之拜盡推所學髙蹈前修某適用無堪辱知最厚竊厦屋之巨庇苟託衰遲聴麻音之真傳尤多踊躍屬縻郡寄阻簉客間即今台宿之光第勤拭目繼此翹材之館猶許登門賀黄察院啓光奉宸恩晉居言職喜正人之道長翕善類以氣伸雖砥道坦平尚或狃竒衺之習惟官箴肅示顧敢輕紏正之司直諒一登邇遐四賀恭惟某官識窮繫表理探古初經笥濳心不役於無用之學仕塗䇿足亟醻其有為之心蚤副公言漸儀華貫在木契雌雄之掌寧復久淹顧烏府紏察之權旋當小試盖將端倪天下之治豈止繩根官曹之違况公朝圗治之勤而聖主求言之切忠謀讜論必切中於事機致君澤民益大恢於賢業於焉落衛將之膽巍乎立朝班之心陳儒術帝王之隆躋治世祖宗之盛致身槐棘紀績彞常蔚為吾道之光大慰海隅之望某牧民無補慕徳最深方郵報之真傳拊心期而竊抃河潤九里仰大庇以焉依嵗閱三遷嗣賀音而未沫賀趙漕應辦山陵轉寳文閤啓光奉明綸峻陞延閤扈因山之役不日奏功揚渙汗之除自天紀績朝僉允睦時望益隆伏惟驩慶恭惟某官學粹一源身兼數器楚珩趙璧世莫指瑕干將鏌鎁物皆迎刃自横翔於仕路已妙簡於聖心方使華奏最課之優而慈極纒上賔之痛惟時竁事倚辦宗英約束陽侯安流以濟指麾風伯纎塵不驚奠真遊弓劍之蔵寛翼室羮墻之念眷惟勞烈孰與擬倫鬱層閤之祕嚴萃兩朝之製作兹焉庀職副是疇庸翕輿議以稱公見明時之馭貴某幸同委質况比分臺聆睿渥之鼎來激愚衷而自慰清資益峻豈惟奎畫寳儲之司賀幅繼馳亟有甘泉法從之拜賀浙東提刑啓細書温詔來自中天近甸祥刑畀之碩徳藹平日惠慈之譽慰東人跂望之心辱在同寮深諧素願恭惟某官自天禀粹經世有為鳳躍蛟翔冠時賢而屬望龍韜豹略重國勢以折衝大副朝僉益隆睿眷先周廬之諸衛嚴扈九重按漢使之六條平反庶獄惟淛民之甚弊幸嵗事之粗豐須公之臨延頸以冀瞻旌麾而動色近繡斧以生春即看狴犴之空亟正節旄之拜某久違望履幸此分臺原隰驅馳愧拙勤之何補珠璧輝潤丐警誨之不遺苟逭曠瘝實繄左右答淮西方漕啓效官昭代無益公家持節近畿獲依䕃宇揆拙勤之不補方應接以為罷未脩記府之恭首拜誨函之賜見存已厚不敏是慙恭惟某官望重一時身兼數器性姿超卓禀粹自天學術淵深探原於古逮横翔於仕路亟簡注於上心隨用具宜有施皆可揚橋門之教按收造士之功佐貨府之頒曾靡負丞之歎即因最課旋畀左符未建郡牙遽前君席霜蜚齒頰陳兵農富彊之規米聚山川指江淮表裏之勢益承帝渥庸遣使華棊布百城皆樂生之赤子雲屯萬旅有棲畝之餘糧凛如孔明屯渭濵之師即見公孫上金城之略入参廟算坐振國威盡令車笠之遊從同出帡幪之庇覆某自憐老境外典祥刑雖原隰不憚於載驅而鰥寡尚虞於無告正資䥴切冀免曠瘝兹辱朶雲之書但形襃拂遽令覆蔀之室蔚有光輝賀潘漕啓恩言如綍申霈龍光漕計須材重分玉節振本根兼足之䇿得中外已試之賢慰邇人觀聴之新孰前日教條之舊伏惟驩慶恭惟某官氣涵剛大學有本原金鐘大鏞為寳固重芝草靈鳳瑞時皆知蒲鞭騰愷悌之謡綵服奉平反之笑益隆朝望深結主知眷近甸之輸將方資時彦最異時之讞議允謂老成小遲法從之陞洊錫使華之賁錢流地上豈惟收富國之功玉立朝端行且既格心之業盡攄賢藴大穆師僉某久矣向風兹焉頼庇與有分臺之喜良慰願言側聆持槖之除嗣馳賀幅賀耿安撫啓帝庭一札之書渙孚睿渥天邑四方之極晉畀時英惟時皆稔德之民相語已望風而化盖令行率由於身正而源清自底於流長聲稱載揚中外交賀恭惟某官學傳千載用集衆長儲重望於縉紳結深知於旒扆剖符鐡甕今餘愷悌之思持節繡畿洊究激揚之志上念帝都之根本勢為天下之樞機適丁空匱之時庸付通明之彦雖四方情偽之紛集剸决為難然它日揚厯之在斯見聞已熟首清俗習枚示教條剔槖鋤姦行奏趙張之最師言底績亟参臯稷之聫進輔熈朝並恢逺業某久依徳宇方仰政規衰晚何為莫逭官箴之闕拙勤或補願分鄰燭之輝賀李察院啓有命自天誕推渙渥得言之地登進正人由睿眷之柬求亦清朝之公議邇遐萬口驩喜一辭大忠將自是以復君善類固於焉而吐氣恭惟某官妙窮道奥識造象先學盖得於家傳材畢周於世用六經斟酌揖古人而與俱多士楷模繄君子之自任一從仕進藹著聲稱奏馴雉之祥屏書姓字聫乗驄之屬氣壓權豪温乎白璧之無瑕凛若朱繩之不撓方聖主布惟新之政念臺寮須特立之賢矧時望之在公允師僉之自昔盡行所學其始於今大正官箴翕朝綱之肅穆旁開言路屹治具以恢張佇参爕理之權庸輔盈成之治某依仁有素荷庇益深烏府生風已絶豺狼當路之歎魚封頌徳少伸燕雀賀厦之誠方事使軺之馳阻趨賔幕之下賀黄正言啓渙奉詔音晉司言責楓宸妙柬素髙難進之風衮職方虚庸付弼違之託非正臣無以立治表而老成所以重典刑遐邇聳聞縉紳交賀伏惟驩慶恭惟某官昴精孕秀崧嶽降靈正大之學踵躡前修淳深之文表示後進久儲時望旋上仕塗中外踐揚雖宰字勾稽之細胷襟抱負皆經綸鯁挺之竒果妙契於宸衷俾横翔於諫省惟平時涵養發固不苟然當世利病講之已詳雖四方咸稱已治之時在庶務豈無當言之事眀目張膽吐論有可回之天考古騐今致主立無過之地非徒君可而臣曰可所謂言行則道亦行亟躋禁嚴用究康濟某焉依有素欽佇匪今正人得路之云初盛世迓衡之可卜展盡二百奏行即繼鄭公之愛君不言凡七年可復為陽城而著論限以驅馳原隰阻逺門闌喜雖倍於他人進莫偕於賀客答湖南憲啓聖世謹刑上心重逺輟中朝之賢傑敷南紀之教條列郡謳謡想已在春風和氣一時畏愛顧何用柱後惠文某官材重杞楠氣涵金玉汪洋有本之學隨用而宜懇惻利人之心益推所愛久矣徯晉卿之日兹焉占漢使之星乗軺小駐於湖湘補衮亟還於槐棘某拙勤不補瘝曠是虞引領平反之風依依朕夢盥手褒拂之語一一過情答常守啓朝廷擇牧宸慮優賢寧容逺次之需果有近藩之拜方賀誠之未展忽問幅之見貽把玩再三競慙千萬某官禀清淑之氣為通練之賢翺翔仕塗詩書用之飾政術翕赫課最姓字久矣結上知盍冠壓於朝班况低回於家食惟毗陵之名郡居浙右之要衝千里向風薤水亟孚於美化五日報政絲綸佇下於中天某誤叨聖恩尚殿朝著鷗盟未替歎夢境之空勞魚素鼎來愧衮褒之甚寵答淮西漕啓來啓謝制語褒予命下九重身紆三組天子念循良之寄其任匪輕詞臣居潤色之司每慙不稱夫何拜賜有此過情某官名髙斗南價重天下蔡澤之於富貴當自取之杜陵之論文章猶小技耳望實久孚於朝右忠誠深結於主知兹出綍於帝宸俾乗軺於淮甸惟形勢表裏之地非賢不居而絲綸斧藻之言其才難彊聲宏盖由乎實大思遲未見於文工泚筆特書方申顔而自咎開緘敬讀㡬衮字之過襃答鎮江葉守啓輟從近侍出領便藩堯文儲東壁之輝榮参禁直禹甸重北門之寄庸荷顧憂念賀幅之尚稽愧誨函之先辱恭惟某官爽邦碩徳名世真才探正學之淵源躬斯文之經緯踐揚中外如庖丁之善刀獻替禁嚴仰山甫之補衮儲列辟之重望結兩宫之深知瞻尺五之天共須秉鈞之拜疇百二之險自詭殿邦之行惟鐡甕之名城實天朝之巨屏頼宗工之作鎮重國勢以折衝側佇揚舲即承開府吴公本漢廷右載上民庸安石如蒼生何行攄相業某才多違世仕不先人方攬轡而驅恐拙勤之不補藉為寮之益庶瘝曠之或逃兹引領於州麾冀分光於鄰燭有如不敏猶或見容賀林殿院啓榮膺宸紵與領臺綱著定聫華夙已期於峩豸權豪屏息兹相戒以避驄正人得時善類吐氣恭惟某官儒英輩古徳操範時掩文價於二京探道原於六籍學充而富視趙孟之欿然氣養以剛過孟賁而逺矣自通朝籍深簡皇心冠六察之司雖参持於邦憲圗一臺之正方注委於時賢帝曰汝嘉誰處公右然施於事者繫所養而裕厥徳則優於言眷望實之已孚翕班聫而歸重風采所厲孰非黙就於表儀官曹之清政恐不煩於繩治懿綱醲化坐臻載歌東府西樞尚有虚席行試調元之手盡酬及物之心某一節服勞萬間席庇傾瞻徳宇夢亦繫於臺烏阻逺賔墀賀徒深於厦燕江湖長翁集巻三十八
