body:
  text: 江湖長翁集卷三十三宋陳造撰䇿問丁酉楚州秋試䇿問事有其名則二而其勢不可不一者文與武兵與農是也天下之政無大於此古之所以治未始岐而二之也後世相視氷炭矣乃欲其治之如古何哉古者入則公卿出則將帥其君子皆雍容揖遜而習熟於射御戰陳之事士卒之間亦或悅義而知禮故無事則相樂其安而有警則不憚其勞降及後世乃有毛錐安用歎不識丁字之偏古者釋兵戈則農置耒耜則兵凡比閭族黨州鄉之民𨽻于司徒者軍旅或起則驅之於伍兩卒旅師軍而不攝故民不窮而兵不驕降及後世乃有畏兵如冦讐疾民如草芥之患然則古之所以易治而無弊者實本諸此後世分之而其弊不勝其間有志之君救之得其道僅可以自立而其治終視古有愧焉巳酉秀州秋試䇿問問人情警之則不惰而銷患者於未然總文武以為治宜無急於此或者後之何哉漢文射于上林親屈細桞不講於代來之初孝宣本始之詔牧民風化才及郡國二千石而已二君七制之盛舉一則置一緩其所當急略其所宜詳姑勿論是周之成王詰戎之戒尾于立政之書董正之術舉於四巡歸周之餘吾猶惜其有姑徐之心焉主上祗承堯舜之傳同心一道以纂聖統嗣位之初未遑他務明詔首頒戒敕中外之官將帥之臣丁寧委曲不啻察父誨子以計其家者凡輸忠竭誠率作興事洗心滌慮勉圗職業既導之以所當為至因循玩曰怠忽荒政徇私奉己請託掊克又禁之以所必不可為且曰副朕倚毗報夀皇聖帝之恩又曰事不素備何以應卒兵不素練何以待用則奉親保治之心眷注有在文武之官可不思責望之厚少禆志飬之誠體苞桑之念索衣裘於未寒乎夫君以言論下不徒言也必有以繼之而要其效也主上初正急所當務如此周漢之君無足進焉王指不匿之後宜無不欽承丕應以求稱上意然天下之人賢否如十指恪勤競勸者少苟且誕謾者多勉勵於暫久或怠廢則致察於勤惰淑慝權之所在非一人聰明之所獨任是將誰屬歟心迹情偽之間至難見也將旦旦而察之人人升黜之歟抑懲一可以警百所旌者寡而感發者衆自有道乎請鋪繹古今之失得與繼此可施之要以暢祗若休命之風以仰副聖心所欲悉以見諗將有以復于上吳門芹宫䇿問二十一首問小宰弊吏治以六計皆以亷為本晉執政多賄故悼公之後不復能伯士大夫食君之祿者玉雪其操行以赴功名之會而為大吏者要當率屬表下尤不可卑汚自棄固也然賢否之氷炭故趣操之霄壤往往齒仕版者功名之志輕而漁取之念熾三代而下拔葵挂魚却四知金受一大錢之類書之史册以為美談蓋其貪者猥衆亷者則可貴非耶今曰堯舜在上此風宜熄而吏之貪叨黷貨漁奪侵牟猶復疵政而病民仰勤聖主之詔謂躬率之未至歟則主上儉德之孚凜凜漢文之上謂教化或不必此法禁以濟之歟則主上嗣服之初嘗申祖宗之制治其一二焉而習俗猶自若何歟夫州縣之官總於守臣統於監司而分職於外者內之逹官實司其進退夫所謂總統而進退之者有不禁禁必聽不然則鉏而去之爾自此而上苟或不固其守其權重上故其取豐且易其勢崇故其敗難其足以疵政而病民大矣似不可詳彼略此也今欲清白之行自上而下一從聖天子之所欲無愧周小宰之所職而不至踵晉卿之弊必有成説願詳以告問得之也難則失之不易來之遲則去之不速昔人論創守有是言矣然求之方册其合否有可疑齊威五伯之盛經營其業蓋亦甚勤矣考之春秋北杏之會書人説者謂始疑其可不可也幽之盟不言公説者謂外內寮一疑之其成之難且遲者如此晉文之賢下齊侯者反國未幾城濮之役定襄王服楚師一戰而伯則可謂速且易矣然齊威之後不復競強而晉之伯諸侯與春秋相終始乃與前輩之論相反何歟春秋而下漢唐莫盛焉髙祖仗三尺攬羣雄親與項籍爭一旦之命敗北者蓋十九繼以燕胡淮南之變老於兵間僅定漢鼎其難而遲又非齊威比乃能垂祀四百天下帖帖戴漢其間非無悖逆隂謀之人終不能劫斯民思漢之心使之從已唐之太宗以英睿之資取孤隋攘羣盜如摧枯拉朽如拾諸塗天戈所指惟遼東僅遂旅拒其餘解辮執贄率為內臣與起之速而易視晉文倍蓰而其垂世久近已謝兩漢外則夷狄之難繁興內則背叛之變代有其不失舊物者亦幸矣雖號為振拯者猶倐起而驟衰或者飬成其亂又挺之使熾也二代之難易遲速衰盛如此其不同又似與齊晉異何歟姑置此將以垂裕論之歟則唐之慿藉扶持視漢之規模似無所愧以寬仁較之歟則援民於虐焰秦楚隋氏均也而晉之與齊何有兹二者儒者為有用之學非王伯不談夷考四代興衰之殊必有至當不易之論願聞其説問業文非古也至漢頗以是命官爾後以文取士立為定制文而弊古無是也至東漢漸衰極於晉宋齊梁陳隋唐初猶踵徐庾駢儷纎艷之病韓桞提衡而作正元元和之文乃無愧西漢自武德正觀以來凡更三變乃始近古其難哉後世之文久則必弊救弊必有其人本朝繼唐而治士不業文而進世且耻之故科舉取士足以奔走天下英雋名公巨儒建立功名多出于此文乎文其不關國體之衰盛繫士氣之厚薄哉國初之文五代萎薾之氣未除也士君子思革其弊穆修桞開倡為古文天下倣之往往用意過當聱牙僻澀至不可讀歐陽公力去其弊蘇長公自科舉出亦嘗為梅公言之以二文忠之救弊其視唐之韓桞難易如何孰優而孰劣耶今者文弊甚矣識者厭之至司文柄者建白于上革其繁冗禁其支離無容妄意所見以議祖宗誠中一時之病雖然天下事弊于狃尤病于懲狃則縱懲則激以古文言之韓桞之下為樊宗師為孫樵又有下二子者焉而文漸弊穆桞之意善矣其後乃有劉輝輩非歐蘇逆救其將然其無乃欲救其弊而甚之耶今日議臣之言不容復議士苟不明其意懲之太過則繁冗或為窘縮支離或為拘忌祖宗之事在人耳目不一置諸心士不畏懦苟簡則且榮古虐今是皆不可不預計者伊欲不弊于狃亦不病于懲文弊盡去如議者之見而弊不生於慮外何術而可鑒已然而圖未然學者本務其詳言是無以有司為私憂過計而少之問所貴儒者之學以其異於淫巫瞽史也彼以技吾以道技用之必窮道無自而能窮技之於道逺矣彼曰金穰火熯得中則虛吾則曰災不勝德修誠可以格天然邇者之旱自夏而秋民心嗸嗸主上側身修行如周宣六事自責如成湯而郡太守禱祠祈禜無虛曰誠與物俱至宜應不旋踵而感通之不速何歟豈巫史之説亦有時而信歟夫旱乾水溢有請于天君相守令責也而民庶致祈佛老者雜然靡所不有甚者怪誕之人亦欲乘時而售其妖妄僥覬偶然而邀敬于世古無是也而流俗則然縱之歟抑少抑之則是乎今既秋矣雨無益于溉者至廣賑救之䇿不可不急講浙西八郡仰食者不知其幾而粟之籍于常平僅三十萬石被旱不無輕重而獲中下孰者甚少自今至來嵗食新其日月甚長吾之術不過賑糶以防踊貴賑濟以止流亡必也不出三十萬石之外何以兼足而善後常平所儲之外曰勸分曰補官曰通販之類可舉而有益者何事諸君優遊庠序篤道正俗其學粹矣荒政非細務可無講之有素用之不窮之術願併言之以備採擇問利害之易見者人知之人言之興而除之不難也利害之易見或者援害以沮其利而指利以庇其害利害始瞢昧不可言方是時非明者不能有見明矣而勇不足猶無益於行也國家駐蹕臨安按引椘屬以給在所大江去臨安七百里之近雨小愆期而漕之不通漕河之填淤不浚者數十年矣浚之誠利也而議者憚之時非以其動衆而費財耶動衆費財誠未易輕犯而漕河之決不可不浚也蓋其勢而然是非援害以沮其利也乎浙西澤國也自昔多病于水疏道渟瀦昔者最為急務自頻嵗之旱執家大姓障陂湖以為田日廣于舊今未見其弊也脫或雨水泛溢則於疏道渟瀦以為民田之利者無乃病乎彼規利者之口必皆以增賦稅為言而郡縣之間或亦甘其説邀諸久彼其為利果足以償其病民乎是又引利以庇其害者伊欲究利害之正而亂名實者不容其喙通漕渠之淤而復陂湖之舊勇為之而不顧是豈無至當之論願與聞之自漢唐以迄本朝建言通河渠之臣歷歷可考而陂湖荒茀之地佃者有禁又法意也置不問可乎夫大旱之後於浚河則宜而規廣其田者皆動其心在今日尤不可不講故舉以為諸生問問諫君臣職當然古未有尊卑之分也舜之時怠荒之誡益陳之慢遊之誡禹陳之禹益非大臣歟伊傅周召之為相訓誥之作不一而足非諫歟工以藝庶人謗賤猶諫也况䇿名居位者後世以諫名官示吾急於求言而有所專與古雖異而同然言而當聞而受者常苦其難今主上親擢臺諫妙柬其人使耳目之官與腹心之佐相維相資共凝至治邇者復國初之制置補闕拾遺之職亦親擢而妙柬聖君納善求諫勤且博矣其欲凝至治而立於無過之地不食息忘可知也然臺諫任國風憲其於諫諍抨彈二者彼此詳略亦猶有可論否乎臺諫職抨彈遺補則諫而已議者固自有意抑兼二者之職如臺諫其於理體利害果如何孔子論諫曰吾從諷至其言比干列於三仁其與直也又如此陽城為諌官言事於數年之後韓歐立論咸以為非稽聖賢之言將孰從德宗時言事者細碎不足采城默不言一言則救陸贄沮延齡相可謂無負而秉史筆言細碎者又退之也其屬意似有在歐公之論竟不以城為是韓激而云歐豈亦有為耶孔聖韓歐之言取以為職諫者之法其去取如何諸君行仕矣設為臺諫為遺補必有定守因論諫併欲聞之問小家戒宿舂有十金之産無卒嵗之儲戚如也臨百里而邑撫千里而郡而府廥竭涸入不支出可乎郡邑古諸侯之國其權不為輕縣官所以藏富天下倚為裕足之地者非此奚賴况民社所寄有政有化非止財賦出納而已而今之郡邑以財賦為病專意于此猶惴惴不足視政化何有乃者天下之邑不可為者十八為之令者巧取豪奪之術用之不暇諱監司郡守習見無可奈何可歎也今天下之郡不可為者十四五為之守者或亦出於為邑者之計逹官臨之漸亦習孰是寧可不思救之承平之時財之留州者不少以上供送使此不惟無事之時郡邑優裕得以撫治其民一旦緩急足以自支而不深貽朝廷之憂趙清獻守越而旱募民興役民得食而百廢舉非郡計有餘何能爾富韓公守青活河北流民四十萬處而食之沛然也亦豈窘匱者之所能及今之守宰平居無事往往救過不暇而水旱盜賊之虞古今不能必其無有者果可恃乎人之疾其始受之也有由而今已之也有術良醫則洞知之夫有一疾則有一藥天下無不可醫之疾亦無不可救之弊敢問今曰郡邑之空匱其始受其弊也何由而今欲已之也何術仕優於學孰不志乎醫國苟瞢然於其所苦之原而泛然於其所用之方則弊何自去和扁肉骨之術世必不乏患不求爾諸君切於憂時此其索言無遜將有以獻于當路問衆人指已然儒者究當然已然者事當然者理也求理於事之表于以訂所見而蓄勵吾有用之學蘄乎他日不瞢其施儒者其可捨理論事哉春秋之初齊莫強焉齊衰而晉強大西則秦東南若吳楚皆大且嘗強矣齊威霸天下也自服楚始非楚大而難服故歟而晉在威公時不能齟齬其間自滅虢襲虞之後寖大而強則齊反為晉弱奔走盟會與諸侯無異僅倔強魯衛間爾使孝公之後復有君如威公其能伯諸侯而使晉之聽已如巳之聽晉乎秦形勝之國也而晉據天下樞兼形勝用之其視西鄰往來酬酢不直十六七秦卒不能逞於晉秦之兼諸侯也晉已為三使晉猶一也雖三而合也其能禁秦之兼諸侯而秦之擅天下晉能之乎若夫東南之吳湖江舟楫是其長技吳子用之入郢之舉勝齊威之所不能勝其後闕溝中原怖齊怛衛晉之強大不能取長於黃池而斃吳者越楚與晉齊不與焉使吳衡行之際無勾踐議其後其果能伯諸侯紹威文之業乎或曰管鮑隰朋數子不世出齊何自而復振晉之屈於秦商鞅范睢白起之徒中國無之也嚭專而胥死吳不得不破是固然矣設使管鮑起孝公而見用商范白起之在晉胥信而嚭疏三國當如何其能得志不至如今之所聞歟設使諸友當數子之任其輔三國賔秦而尊周其術又如何置當時已然之事而究古今或然之理政將以觀諸友志之所嚮幸詳言之問曹沫之劫盟程杵之立趙孤古傳之而左氏史官也為春秋立傳不聞筆此楊子雲投閣之事漢史書之甚著而可信先儒乃疑其無有夫信所可信置其所不當信學者急務則左氏不書三子于傳先儒疑投閣之説學者孰從問事以法舉法或弊治之在法法行而人弊之治之在人法以人弊而且治其法則雖嵗變月議也何補國家仕進文法試吏而改其秩必舉者五人凡未應格不可妄冀非固齟齬其塗以抑其進蓋將以勵士夫亷能之操重逹官激揚之權即其所舉與舉之者可以交觀其賢否法之良不容少議比嵗以來用法䆮弊有挾者必舉孤立者不省有挾必舉則罷汙者往往冒進孤立不省亷而能未能陸沉由是用未必才才未必用何以辦天下事士大夫患此久矣未知所以救之之術雖然果法弊歟抑人弊之耶弊在人而非法之過輒欲歸咎於法寧能有益乎或者曰書考之久者可置是而權要之子弟抑而損也使夫士之仕徒計日月而已則旌别之術廢旌别之術廢則賢不肖混淆無章矣漢楊惲唐李德裕輩又非權要家乎本朝名臣子孫事業焯焯者不可縷數今一變之不幾去小不便而得大害因咽而廢食乎至有建白于朝欲試以制誥法律者試以法律是銓也銓法之設為無舉主者爾用之一舉主及格之人大似未允制誥之文就令工此他日未必不為虛器徒以是紛紛然則議者之言孰為可用於今曰繄欲因仍舊法則所患乃爾改絃易轍以救其弊未必有益諉其法而治之固不可人之弊法久矣將以革之何以為術今欲使法不變而弊去無紛紜之患而下無怙勢沉滯之虞舉於人者之必才而舉人者之必當其必有要而易行者諸君行仕矣論天下事宜若素官願攄平曰所見而言之問書蕩于秦漢四百年文物寖盛而君子之論文章取西漢而已至東亰不論也夫自秦而漢學者伸於久鬱宜其文之盛文之寖盛宜見于積久東亰繼西漢而治宜其愈盛而遽衰何歟西漢之文信盛矣韓退之以孟荀之學去取千古其於二百餘年之文又特取司馬遷長卿劉向揚雄而不及其他西漢文士未可一二數載于史可考也其文似非後世所及而退之去彼取此其意安在退之之文其視四子果能伯仲否耶較之西亰多士其果足傲睨而陵踔乎班固為西亰之書其繼史遷似不甚多愧退之猶不比數其意非例以東亰待之耶諸君讀班史熟矣其不及四子者安在使退之秉西亰之筆將不止如固乎試商𣙜之問言古者驗於今武帝之進士大夫有是言也書亦稱學古入官議事以制然則考古而宜今乃有用之學虐今榮古君子病之亦何有於世務夫以道而言古今一貫也即道而形之於事紛然不齊古封建也而後世郡縣古肉刑也而後世笞箠若什一二稅之殊若賢能科舉之異以至禮樂之用兵農金榖之計凡見于品式節目巨細詳略援古而校之今同者無幾然則學古之士何術以施之於今不至於遵古而泥違古而悖乎君子之論士必曰博古通今博古通今捨圎冠方屨者誰望兹所以有是問也毋略問天下之事泥古不必便今徇其名不若既其實三代而後膠于泥弊于徇而貽患者多矣至是則改過無我者乃帝王之度成王不歸周公漢祖不止六國封乎昔也疑今也新逆刻印未巳輒銷繼之夀周祚之脈而定漢家之鼎其不繫此乎曩者議臣有請屯淮南之田期以復古者寓兵於農之意救今曰飬兵耗財之弊行之數年本始之謀畫餅捕風而民以被擾告兵以不樂聞夀皇聖帝審言者之悠悠也罷去不疑兵欣然而歸民帖然而安而郡縣之吏亦免調護耗蠧之患聖度無我髙出周漢之君之上顧豈泥古狗名者所可擬議雖然財之耗於兵極矣荷戈之士一不知負耒者幾家可以奉之救此之弊舍兵民之外幾乎無䇿而兵民之難合自五代始唐初猶以府兵強府兵寖弊則婁郭韓重華之徒出而收屯田之利夫以府兵近州法太宗行之而便屯田沿漢法諸公行之而利唐去今未逺也不聞其泥古而不便於今徇名而遺其實何歟意今行之有未得其要歟將所屯者非其地而屯之者非其人歟抑今日之視唐又有古今名實之間不可膠柱歟或者謂法行之貴久而執之貴堅王介甫為青苗助役非不堅而久拂衆遂非貽害甚深長也今以屯田之不便罷之軍無間言而淮人鼓舞欣躍則益知介甫之久而堅果繆矣然飬兵足國之計屯田之外猶有䇿畫可􅊰而行行之而無害者乎願聞此以備謀國者之有聞問士之節貴靜退其出為世用也貴自知仕止六百石過是則引劾而去士之靜退不當爾耶入關之始所望令校書以通顯為可弔又何其自知之過厚也今士大夫才諝學問當不愧古然其於靜退自知之間猶有可議以弊習俗伊欲進而知止不欺人以所不能有以息躁競之風革夸誕之習其端本于上者何術而可問太史公為史證周生證夏無且載禇先生之文不一而足歐公五代書資劉羲叟而宋公之唐書多取小説至司馬文正擬左氏作資治通鑑於書乃無所不取四子者之於史號擅其長者而皆不專已意於人之言掇取而備收之其本原于經者何自請詳述其意問詩頌文王曰思皇多士生此王國士之多王國賴之而天之純佑者在是舜之時黎獻共惟帝臣仲尼稱其治乃曰有臣五人武承文之後多士未憗也亦曰九人而已於焉發才難之歎則五臣九人而外非才歟申命用休不我庸釋之意又果安在漢之君勳業之茂者孝武而建中興之功者宣帝也史述二君得人之盛在西亰鮮儷武自公孫而下幾三十人猶謂有不勝紀者宣自望之而下亦二十餘人較仲尼之言虞周多矣而漢之治果舜武班乎武之於宣其人才似過之考其政治失得人民耗息華夷衰盛論者每不足於武而於宣則無間然得人之效重有可疑又何歟東京至順帝漢業益衰無以議為也一時賢才承風咸事李固而下二十許人見于范曄之贊者皆英雋課功計效設未及虞周之盛猶當振起炎圖之墜緒紹復武宣之丕績而無益於寖弱極弊或者激成天下之亂也不惟賢者無益於國小人得以藉口而天之生是人必不苟也顧乃爾又何耶諸君師孔子之言而深究二京之治亂請深述聖人之意而鋪繹三君治否之迹賢才之所以生于世而用于上者其定論安在問聖上受守之初詔天下言事古闢門逹聰意也章陳公車蓋無虛日其間豈無新豐逆旅切中時病十事九律動見晚之歎者何以待之歟若夫迂儒曲士乘間抵巇汗漫其辭譸張其説者又何以處之設諸君有言於今天下事枚數而切論之何等最急其所以興除利害講磨政化先後次第其説又將何如問仲尼化工六經日月也古今莫加損焉去仲尼既遠孟子乃著書明道孟子非得已者使其為顔子則書不必作可也有聖人為之依歸有六經為之講貫於是焉又為之書非贅且僣歟或勸退之著書退之辭焉曰俟五六十為之然卒不著書也自今觀之何害為退之楊子法言文中子中説皆擬論語而作議者譏之然雄既死而法言盛傳通雖死中説終不甚顯世猶以家教嗤之二子之書傳否顯晦其優劣竟安在雄之書愛者惟侯芭桓談二子非能輕重世者而王氏之門人皆唐初卿相大臣其傳否顯晦似不應如今所見也如何三子之著書與否得失優劣又如何併陳之問道載于六經世用之有得失其迹著于諸史本末之兼舉精粗之備究也必於學焉得之微而士大而帝王一也然帝王之學與天下異取法於經取鑒于史致天下治安祖業延洪而已誦説絺繪云哉主上天縱睿聰家堯舜而師之六經之學心成神解久矣臨御之始取治道於經蓋無一扞格方且命講筵之官進讀三朝寶訓寶訓之書六經致治之成效也得於此則合於彼矣邇者言事之臣復以資治通鑑為請上可其奏命與寶訓更日進讀夫豈不以有所法不可不有所鑒歟是書也敘于神宗皇帝吾夀皇聖帝尢重焉闢殿以請之今日之治謂非是書之功可乎然其書以卷言乃二百九十四以始末計至十六代千三百餘祀治否成敗雖曰該歷代之史猶為浩繁未易悉究故言者期以十年夫為治計無窮十年未為甚久也敢問今日進讀之官於通鑑之書猶有可以效樞機挈維綱以禆聽覽者乎諸君行奉大對其於是書窺究紬繹熟矣可無鉤元托要以進備採擇者乎則將何言其見教焉問國是不可以不定國基不可以不裕國威不可以不振國之有是宰執持之侍從臺諫言之而本朝宰執與言語之臣多相矛盾中間合而為一初無可否秪以成權臣之專然則國是果何自而定國以民為基基固則國安任此之責非監司守令乎今日精擇監司升絀守令纎悉不遺而民猶告病民之病困於窮匱而經費有常國家恤民之念日切于上而不容以豫民者結其心則國基何自而裕紹興中北敵請和正以諸將乘屢捷之勢雄視中原敵人懾爾當時朝廷亦有尾大之憂今日將帥遷絀不異郡縣立國至此可以無患而大將威名烜赫無著聞者則何以使四夷知畏然則國無尾大之虞將而將兵而兵使威振于內而敵畏于外又有道乎問根本之地用兵者之所謹高祖爭關東而關中付之蕭何光武起河北而河內付之寇恂自古知兵者莫急於根本之地而謀人之國者亦務攻其本根袁紹不能用田豐之言以取許唐太宗不能用李靖之䇿以取平壤君子皆有遺恨然高祖用之於彭城尋以敗歸慕容垂用之於魏圭魏亦小挫而復振王檀劉鄩不能得之於晉陽莊宗乃一舉而入梁檀之與鄩不足以望莊宗固也而莊宗乃過燕王漢祖者耶成否果係乎才歟抑其事固有幸不幸歟諸君學兵者此最兵家之急務願索言之武舉䇿問十首問兵詭之道也用之而不窮者可以橫行天下尚論古人能盡此者鮮矣韓信之下趙李左車請於陳餘欲斷其糧道謂二將之首可致餘不用其䇿信耳乃得以成功使餘用其言信之兵其能舉趙乎使趙用左車則夫背水陳立赤幟之計其可施乎將二將有所謂不窮者非左車所料歟蜀自先主殁寂不聞聲魏人不虞之時似可用竒矣魏延請于孔明欲以精騎襲長安魏將不武必委之而去然後孔明大軍繼出孔明不聼也延痛惜其言之不售果有街亭之衄孔明不善用竒者耶是時魏將司馬懿號知兵使孔明果用延䇿懿將何以為計孔明之所慮者安在而瑟縮不決如是耶信之兵輕用之而卒勝孔明重用之而終敗豈二人之才長短不同或用之窮不窮異乎即巳然而論其或不然蓋將以觀諸君得於兵者問戰以車古也今之論兵不敢復議得非以唐陳濤之事乎陳濤之敗意非車之罪房琯迂儒疑不知所以用之也夫制騎之衝突非車何以夷狄騎也中國多徒徒所倚以為固非車何以衛青擊胸奴以武剛車自環為營故能困漠北之戎馬隆為偏箱車鹿角木屋隨地而施破木機能通涼州建一代之竒勳或者曰國家行都於吳吳湖江舟艦之地車戰尤不必議然吳在春秋巫臣之子實教之車戰闔廬夫差得以敗強楚通上國幾伯則亦用車之效也似未可以一房琯而置古法不議敢問今日制騎兵之術用車之外有可恃而必勝者歟吳用而勝者何在漢晉二子以此制敵䇿勳而他將皆不聞用之者何故唐則致敗又果古今異時不可膠柱歟諸友罄所見言焉將採之以獻當路問兵有衆寡衆難持寡難支用寡而能支則可以有功用衆而能持何向而不克矣古者用衆而敗者固有而粗能持也則固無敵兵法是以有十圍五攻敵堅敵擒之説而以寡取勝亦不乏人敗于寡者皆是也故將兵者不得已於用寡而樂於用衆固也而勝敗之迹異則能否之不同也秦之攻楚他將以二十萬而敗王翦曰非六十萬不可夫傾秦國之衆付之一戰而翦遂克舉楚至苻堅之南兵至九十餘萬淝水之衄何至狼狽如是而堅尋以亡秦則用衆信不易矣李陵之果鋭得士死力又名將後也以步卒五千涉血北地終以降敵辱漢陵之材似非瞢然者固宜知以寡犯衆不可以為常其出也非惡有所屬而然歟是亦不得已而用之若馬隆之於涼州自詭滅賊募衆三千木機能莫禦也涼州以平則又豈不得已而用寡者歟諸公學而得於兵之深必洞曉于此凡兵之衆寡用之各有其法歟抑臨事應變不可隃計乎臨事應變之説人知以此藉口翦用之秦隆用之晉夫豈果不可隃計歟願詳論四子之得失托其定説以見諗焉問事莫不有法况兵乎法不善用鮮不敗事兵法而不善用之其患豈細哉古之兵法如韜略如孫吳如司馬尉繚之屬可謂備而密為兵者捨是奚學求之古人讀父書傳者卒敗趙師按古車戰者亦有陳濤之衄顧方略者乃克有功學萬人敵而不竟亦復所向莫敵其相反乃如此何歟荀卿儒者也其論兵以附民為主而孝成王臨武君為之屈卿亦言之爾使其一試之其能有濟乎陳餘亦不肯用詐謀竒計意二子用不用殊故荀言為至論而餘竟就擒不然即其所言探其所守彼此成敗其能大相逺即書生料敵情萬里與夫頗牧禁中者彼蓋未嘗韋絶是書而身履其事也其於兵法顧乃深有合者何歟李靖之教侯君集謂其法足以制四夷外此不肯盡其術靖之於兵法制四夷之外猶有所未盡者歟今考問對之書其止教君集之法耶抑亦盡其所謂不盡之術歟諸君學兵法而有得必有見於此他日之用今日之所見者也願備陳之問國之強弱以兵兵之勝負以陳言兵者首陳法陳法不定而專言攻取分合竒正之術是猶不根而枝不源而波奚可哉昔左氏傳春秋其於諸侯攻戰之際書陳法不遺焉自拒之左右卒之偏伍楚之中權前茅齊之驅二胠啓之類載之不厭其詳其意有在後之史所以備載兵陳之説非丘明起其端歟然考諸歷代置陳之法未見出於萬全而可以垂不朽者項羽號善戰挫漢師蓋十九觀漢軍之破成臯斃曹咎乃望楚軍則走險不暇其後英布得其法漢祖猶畏之以其如羽之陳也諸葛亮之用蜀南平孟獲東懾魏師雖志不酬以沒其布石以寓陳法識者以為常山之蛇雖然羽之陳摧拉奮鋭其勢不可當氣衰意奪人得而制之是長於攻取犯堅要非不可敗者故費將軍終勝之而布亦卒於就擒亮陳嚴整堅重其勢不可犯然緩於逐利後於赴機終不能大逞於敵所謂節制之師不大勝敗者歟要之用於紛紜強悍之敵使其未死未必得志然則為陳之法何以使在我者不可得而敗加諸人則可以收竒勳挫堅對歟羽亮各用其所長爾精於兵則可以兼而用之歟李靖之論陳法詳矣若校之二人其工拙有可據以優劣之乎其悉言以告問朝錯論兵於漢漢臣之辨於兵者未或能先之杜牧箋孫武書至有盤珠之諭談天下利害纚纚可聼三䇿之陳君子偉之二子徒言之爾未始自用也七國西向錯方用事不能一試之而其設施與曩言大不侔牧於料時成敗乃或能竒中謂言者必可用則錯乃爾一以言為虛談則牧又似非錯比請考二子言之始末併論即空言以既實用之方毋泛其辭問兵之有分合繫巳乎繫敵乎用衆寡者于已料堅脆者于敵二者不可不審處用之非宜敗北不旋踵趙奢之救韓與許歷惎以厚集其陳豈非秦兵之強不合勢併力有不能枝乎若夫勝於兩甄既敗之後與此大異杜曾雖號善戰比之秦師則猶脆寡而周訪之兵其視奢之用趙勇怯有異故不得不分而以中甄全制其後繫乎彼巳者不一而衆寡堅脆之異用要臨機制變不可為定論也敢問楚兵之禦黥布分而為三欲以相救識者以為憂且曰彼敗吾一則俱走爾既而果然是可合而分其敗在分元昊撓西陲皇朝枝之師出輒衄河南公曰敗在不知分兵且歷敘六弊焉又曰分兵則有六利楚之所以敗于分西師之所以困于合繫彼乎此乎衆寡之用堅脆之勢可得而推知以為定論乎願聞其詳問將不智無以愚其下有以愚其下則出入生死惟吾所使田單之用即墨不為愚齊抑以愚敵後之為將祖其故智者多遂有功凡孤虛厭勝風角鳥占吾意皆古者愚人之術不然何以我往彼亡用以取勝振裙外嚮貽笑千古耶雖然既暮徙營昔人危唐兵於魚談者又或得以藉口諸君所學將士也分合竒正治衆料敵其大者也所謂孤虛厭勝風角鳥占之説亦嘗經意否乎問險要之地論兵者之所急關中四塞號為天府龍興虎視賦客頌之下甲建瓴辨士夸之地之險莫加焉而秦漢治亂修短大異則議者有不足據歟唐起晉陽乘隋亂入關關東僣偽指麾而定而其後世東諸侯旅拒略無尊唐之意杜牧又以取山東為言至謂王不得不王伯不得不伯賊得之故不安牧雖言不售也終唐之世藩鎮叛服不常亦羈縻而巳莊宗以河東蕞爾之地鷹擊颷起既得趙旋得魏趙附晉故能北舉燕魏屬晉故能南滅梁向不得山東未易得志天下牧言至是而驗然莊宗亦英主宜其見天下之勢偽梁既滅不能據秦以制天下顧乃用之蜀蜀於天下果繫存亡強弱之數乎宋武命世之雄既得秦而衄于赫連桓溫於其時比之善博未能舉山東而敗於枋頭二人之才似不下莊宗而成否異何歟牧之使裕無留秦心溫入關不肯渡灞水於功名何有設二子其心無他果能據秦以舉山東由山東入關以雪晉耻乎即牧之言晉唐之事求之古今豈無一定之論而英俊豈無必成之功乎諸君陳其詳問兵不犀利與徒手同甲不堅重與袒裼同載于考工記者已略矣然大小短長之制莫不有法故制兵當如為屨不當如設權量足之不齊故屨有小大故乃一之如權量不幾固而害事矣比以臣寮之言勑州郡寬為之期使修礪兵器誠萃聚除戎之意夫楚兵既利秦以不怡而家鶴膝戶犀渠又傖父所以賦吳者吾之所長吾為之何難况國威在兵不必用之四夷凡盜賊有所憚而不作斯民有所恃而不惕其亦本此諸君潛心於兵詳言其制之利害以備採訪焉定海縣學䇿問問修而裕諸已之謂德推而正諸人之謂政自是而人利之之謂惠三者吏所以撫民者也導和氣厚生理而振不足一出諸此比者不雨亦既兩月禱禜靡不周舉漠無感通德不足以導和故也此令之耻也猥曰是有定數則叩頭而風反火撤穽而虎渡河旱有不苦之謡雨有隨車之應獨何歟今者歲猶三釜而清泉之民良病餒於德審矣拯此之病施之以為政而利之以為惠者必有先務瞢未之知也若夫發陳廩以振乏絶令所無有蠲欠籍以寬責令所不制外此見之政與惠有可以為目前之益以少殺其耻者否願諸君悉以見諗江湖長翁集卷三十三
