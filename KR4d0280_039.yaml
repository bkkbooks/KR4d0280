body:
  text: 江湖長翁集卷三十九宋陳造撰疏祈雨雪寺疏雨雪愆期民人告病咎由吏職憂甚頭然懇祈不憚於再三感格庶幾於萬一冀諸佛無方之應錫以有年喜六花盈尺之祥始自今日佐春工之發育起壠麥之焦枯密賴等慈是蒙休應凡一榖不熟謂饉少息凶年襁負之悲自三日以往為霖更迎嗣嵗金穰之慶欽惟悲願洞鑒翹誠祈雨雪觀疏麥苖告病由雨雪之愆期吏職所憂仰昊穹之是禱屢殫蠲潔有冀感通見晛瀌浮喜崇朝而汛灑罔時恫怨慰嘉榖之焦枯荷隂隲於神休凝至和於嵗事既沾既足生我百榖佇可期盈尺之祥是穮是蓘必有豐年庶無復荐飢之歎是伸謝悃願鑒丹誠觀音殿謝晴疏有生實難一氣運行之或戾無剎不現羣靈依怙於等慈自冬而春不雪即雨嗟民愁之巳甚顧人力以何施殫我寸誠扣彼大士宏誓善應歘桴鼓之感通新陽發生喜煙霾之解駮挽回和氣播作歡謡梵音觀世音不替利它之願人樂與衆樂佇迎嗣嵗之祥祈雨觀音疏久旱為憂斯民抱倒垂之病無剎不現大士有宏濟之仁肇告丹誠即蒙休應油然雲沛然雨且蘇稿乾林而生總而羣庶絶愁歎是伸昭報少答洪私更推三日為霖之功迄終百榖用成之惠我相衆生相寧間自他梵音海潮音普同依怙又旱氣赫然民情憂甚禮嚴祠禜念丹誠籲天而莫通教在音聞惟大士應聲而必赴寅羞靜供哀扣能仁伏願辭補陀內院而慰依怙心視光福報恩而無去來相大雲澍法雨蘇百榖於惔焚膏澤多豐年寬九重之憂顧解散祈雨道場疏比緣久旱祇扣能仁赴初願之利它答微誠而應供漂然汛灑雖粗慰於民情尋亦稿乾恐竟傷於嵗事敢勤法馭久駐城闉猶冀等慈不忘終惠油雲沛雨寬聖上宵旰之憂應物現形賴世間慈悲之父祈雨滿散疏時雨愆期稼事告病哀民愁之已甚邈帝眷之未回虔演仙科迄終醮席恭願一下霈然之澤載矜蠢爾之氓三日為霖尚奏豐登之慶兩宫稱夀頓寬宵旰之憂嘉與海隅永依道蔭諸廟謝雨疏雨不以時禾將枯稿吏方修禜神罔怨恫霈然甘澤再此沾滋蠢爾生民一皆鼓舞乂時暘肅時雨猶賴節調比如櫛崇如墉坐凝庶富少伸昭報仰答洪私觀音殿祈雪疏良農望嵗即雨雪而驗年豐大士能仁以聲音而作佛事凡其副感曽不遺聞蠢兹郡民跂彼瑞應冀圓通之示現祛氛祲以濳銷蟠地際天同一雲而布潤耕田鑿井慶盈尺以為祥密賴等慈俯矜衷悃真武殿祈雪疏雪事缺如揆時巳迫天神貴者有感必通眇爾哀誠敢兹控扣眷惟吳郡密近都城日邊盈尺之祥已書史册境內兆豐之望未愜民心仰冀洪私俯垂哀祐同雲灑潤達誠意於九清嘉瑞應期告嵗功於三白佛寺祈雪疏天未雨雪嵗序將窮佛之利生人心所怙仰冀等慈之妙力挽回洪造之至和俾右湖左海之區屢豐慰望凝友風子雨之氣盈尺告祥欽惟兩足之尊亟副羣情之願滿散祈雪觀音殿疏雪事愆期郡民告病惟菩薩大慈悲父具佛子不思議心致此懇祈密冀能仁之力漂然汛灑未收潤物之功憫我投誠庶其終惠真武殿疏時將發春雪未應候守臣軫飢疫之慮夕惕疚懷真聖斡造化之機心存濟物粗效回翔之勢未收沾洽之功冀達彼蒼克終此惠真武殿祈雨疏厯時不雨農以軫憂在天之神職司兼濟矧無幽而不燭信有禱以必從伏願訶畢宿以騰芒叱龍公而起伏自三日以往霈甘澤以沾滋靡一榖不登底斯民之富庶誠或交於水位祥冀兆於金穰銅像觀音祈雨疏適長嬴時民嗟久旱有慈悲父誓濟含生儼補陀海上之睟容罄索訶世間之真禱伏願辭獅子座覆以慈雲倒龍伯宫霈為蜚雨體九重之宵旰息比屋之怨咨仰冀遺聞永依慈怙諸廟祈雨疏厯時之旱闔境其咨念平時奉嘗之神是所依者於斯民饉歉之戚渠能恝然躬即靈祠瀝陳懇禱伏願體當寧之意護國不忘圗嗣嵗之功籲天有請鞭起羣龍之伏霈為三日之霖坐俾邇遐迄臻富足祈雨觀音滿散疏旱氣藴隆人情局蹐念彼大士應身剎塵仰惟能仁赴世哀籲兹嚴羞於淨供庸申控於洪慈現聲音圎通諒自他之不隔澍甘露法雨俾焦卷之立蘇佇俟有年庶幾本誓祈雨真武滿散疏穀今就枯雨不時霈仰惟真聖幽必燭而願無不通矧今盛時人何辜而旱既太甚肆申控扣所冀哀矜可無普潤之功用解倒垂之望祈雨諸廟滿散疏政姦隂陽雖吏之責物砥疵癘亦神是憂比殫請雨之誠冀動依人之鑒敏有甚於桴鼓庶或感通望方切於雲霓倚需貺施觀音殿祈晴疏豐年在望久雨為災抱飢饉憂莫慰懷生之願有慈悲父密推度厄之仁是敢控祈仰資哀佑伏願掃清沴虐揭作祥曦膏澤多豐年節淫霖而不害慧日破諸暗俾嗣嵗以應期罷散疏雨藝連綿民情局蹐仰福神之儷極輔鴻造以好生觀音殿云赴索訶世間之諸苦賴補陀大士之能仁神廟云惟神抱正直之德輔帝砥施生之功庸訴哀誠已羞淨供宿雲解駮喜后土之告乾朝日暉華爍羣隂而盡掃迄成豐嵗仰賴宏休福溪巖祈雨疏小郡罹惔焚之旱屢羞控祈至人以利濟為心肯厭塵黷躬造棲真之地冀施起廢之仁伏願俯光明臺宏悲願海察下吏熏心之迫慰斯民戴目之須起潭洞龍眠霈三日為霖之澤與里閭爵躍沐一時起死之恩志公巖祈雨疏繆政姦和遂成常暘之沴至仁惻物屢殫歸命之誠雖響應之不遲終屯膏之未溥爰兹謁欵所冀感通伏願推願力之洪深悼民生之困弊起睡龍之久伏布作蜚霖掃旱魃之如焚迄臻中孰祈雨開啓疏多稼在田厯時不雨嗟民愁之已甚邈帝眷之未回虔演真科冀迎景貺伏願鑒含生倒垂之病推妙造宏貸之仁霈三日之霖俾嘉生之翕應餘三釜之食尚中孰之指期庶令邇遐盡免捐瘠祈雨滿散疏田苗稿矣雨意邈然巳虔演於仙科庶默回於帝眷伏願鑒藻芹之微薦鼓槖籥之至和導迎休祥翕楚氛之盡掃霈作膏澤蔑湯旱之為憂嘉與天民同依道蔭聖節放生疏千齡聖運喜當震夙之期四海恩波遍及蜚濳之類推好生之帝德綿有永之夀祺日運長明乾旋不息得一以正施帝祉於子孫於萬斯年扇仁風於動植凡鳶蜚而魚躍率天施而地生儷美商邦已開三面之網告符嵩嶽更聞萬嵗之呼開啓天申節寺觀疏繞電之祥有開華旦後天之祝旁暨寰區預演仙科寺云佛乘冀通帝意伏願岡陵等固箕翼儷明新又新而聖德彌隆朔復朔而帝齡滋永一星有耀煥丙度以丁躔萬夀無疆同天長而地久滿散疏候屆長嬴紀珍祥於夢日歡均普率祝睿算於後天虔演仙科寺云佛乘增羡神策伏願蘿圗益固玉厯長新聖子神孫日嚴於備奉玉巵寶册時講於盛儀洪祚丕延靈椿不老撫重熙之聖治帝王無得擬倫錫有永之竒齡天地相為長久聖節功德疏里社一鳴兆聖君之有作華封三祝綿睿算於無疆演仙釋之祕科瀝臣民之至懇蘿圗鞏固玉厯延洪龍樓五日之朝朔而復朔金鑒千秋之籙新以又新晏享平康茂隆貺施建極而斂五福丕顯重熙後天而雕三光自然不老又慶叢慈極晏享康寧恩霈寰區率均呼舞申演仙科寺云佛乘之祕密益祈睿算之延洪伏願周厯又新莊椿不老膺穹祇之錫羡綿帝統以儲休宇泰內融小廣成千二百嵗夀祺滋永齊人皇萬八千年髙宗皇帝康豫滿散疏聖神之御六氣節宣有宜天地之薦百祥敷佑惟謹巳虔羞於淨供庸欽祝於修齡伏願誕受殊休益隆多祉豈但松筠之等茂抑將箕翼之並明塵外鈞天皇極備九五之福壺中浩劫靈椿閲八千之秋天申節疏慈極上賔遽結終天之痛南薰應候載臨誕聖之期凡屬生成益深摧感惟竺乾勝文顯有妙果而冥陽淨供具嚴祕科少資帝所之遊式藉佛乘之力恭願圎成妙覺密證等慈偕諸如來同入性海與大天帝均福世間演椿算於九重鞏蘿圗於萬祀又虹流啓慶適謳歌歸禹之初爵躍均歡若富夀祝堯之始一寫臣民之願兩羞仙釋之科玉厯長新蘿圗允固玉巵奉兩宫之夀孝治旁孚金鑑兆千秋之祥帝齡滋永下暨可封之屋無非躋域之民又天開禹子載臨震夙之期民祝堯齡外薄坤輿之逺式嚴仙佛之供必答君父之恩恭願箕翼並明岡陵等固兩宫備養玉巵奉萬嵗之觴四表來同金鑑上千秋之籙小周齡之與九符嵩嶽之呼三又虹流電繞兆帝命以維新鼇抃山呼祝聖人而有請式嚴佛供觀云仙律冀演皇齡恭願周厯長新莊椿不老玉壺奉兩宫之養金鑑來萬國之朝松茂而川之增孰知其極天髙而地蓋厚相與無窮又渚告瑞以流虹載逢華旦葵傾心而向日請祝聖人羞二氏之祕科演萬年之遐算恭願蘿圗增固寶厯無疆聖子神孫綿慶源於寶祚玉巵金鑒叢樂事於壺天桃薦西真星明南極象教六十小劫嵗蕆梵筵莊椿八十為秋日新慈訓又夢日開祥自帝心之眷佑望雲拜手罄海宇以歡呼虔羞仙釋之科仰祝岡陵之算伏願受天之祜如日之升鳳闕承顔永享三朝之備奉雞竿肆赦佇看再舉於上儀光浮南極之星算衍西真之籙六十劫住世與佛日以比明八千嵗為秋等仙椿而不老開啓几筵道場疏諱屬慈闈痛天傾之莫救哀纒率土紛雨泣以何追虔演仙科寺云佛乘冀資神馭伏願儼威顔之如在凌灝氣以超然夙駕玉京乘雲金景翺翔穹昊超十地之真遊敷佑宗祊施萬年之純嘏滿散疏抱終身之痛莫報深仁畢三日之哀式遵遺制兹嚴梵設寅奉真遊道士云兹嚴仙供寅奉神遊伏願覺性長圎威顔如在逍遙帝所友泰紫於九天保佑皇圗綿子孫之萬葉進功德疏違大安之朝賔天寖逺抱鼎湖之痛扣地無依聊憑二氏清淨之科少答三紀生成之賜伏願凌紫清之勝境了解脫之真乘逍遙帝鄉作天仙之依怙保佑皇業等箕翼以綿長胥暨民區咸蒙祉福小祥開啓觀疏虛興慶之至養嵗敘已周演道流寺云竺乾之祕科臣心敢怠庶憑仙供寺云佛力仰奉神遊伏願悟性象先宅心塵表入無出有參羣帝以獨尊證聖成真位九天之最上寺云超證一乘俯參羣帝慧嚴常住赫慧日以中天慈觀現圎敷慈雲而覆物佑慈基統固等岡陵五月二十一日道場疏物外仙遊莫攀真馭人間鳳紀洊屬休辰傾下臣悼慕之誠羞內典密嚴之薦伏願性天慧日湛若圎明法海慈航普兹濟度超證先諸佛之覺翶翔儼羣帝之朝厚祉福於兩宫睿齡有永鞏安強於四海盤石彌堅髙宗皇帝大祥開啓疏燕髙廟之靈已終祥制演金仙之教觀云演琳函之教寅奉神逰心則廓然誠惟顒若伏願妙融真覺髙步上清謹嵗時之朝萃十方之仙佛駢福祉之集綿百世之本支胥暨邇遐亟蒙保佑滿散疏堯服有期民猶雪泣夏時巳駛禮謹祥除羞祕典以告虔適靜筵之竣事伏願遨遊仙界怡燕梵天受羣帝之朝金闕玉京之祕邃施萬年之祉神孫聖子之綿延偕此函生晏然蒙佑常平司開啓疏堯仁所被痛隔仙遊禹服攸同奄經祥制羞供鳳驂之馭揭虔象教之文觀云蘂笈之文伏願超證真乘騰凌灝氣十地賢聖謹時敘以來朝萬年基圗傳本支而滋永功德疏藏髙廟之衣冠可勝悲慕閲夏時之寒暑奄及祥除庸羞仙釋之科少為君父之報伏願妙融覺性超遂其遊玉京金闕之祕嚴環羣仙而髙拱聖子神孫之蕃衍綿億載以無疆胥暨天民同躋仁域滿散疏髙廟尊安悼神遊之寖逺堯民哀慕兹祥祭以告除已羞祕密之文庸罄攀號之意伏願證佛之果與天為徒九清十地之祕嚴儼四朝之仙佛兩儀百靈之保佑傳萬世之子孫凡他時之望雲沐遺澤而躋域滿散疏服堯之喪奄屆祥除之制體舜之慕敢稽薦盥之誠已蕆梵筵仰資仙馭觀云羞淨供於琳宫殫微誠於仙馭伏願具古佛智與造物遊八境九清肅來朝之羣帝三乘十地環歸命之諸天綿有永之本支施無疆之祉福小祥罷散疏慈闈結戀祥制告期仰資仙界之升巳演佛乘觀云道流之祕伏願洞明覺性妙證真常飈馭為九天之遊頓超無上蘿圗鞏百世之永敷佑彌隆提刑司開啓小祥疏攀親馭之龍髯痛之甚者閲天時於駒隙祥則廓然虔演佛乘觀云道科用殫臣禮恭願佑上帝之座御羣帝之真逰尊中天之居統九天之仙衆鞏洪基於百世寖厚福於黎元滿散疏悼興慶之虛養倐攝提之告周敢竭丹誠已羞淨供伏願凌玉輿於沆瀣造物與居拱金闕之祕嚴衆真咸衛用翊扶於寶祚措富夀於仁民皇太后大祥功德疏違長樂之朝痛纒宸極諏攝提之運甫屬祥除虔羞仙釋之祕嚴庸罄宗藩之控扣伏願性融妙覺聖證自然寥陽帝宫肅衆生之拱扈極樂國土即上品以超升誕敷嘉祥均被生齒開啓疏月律初望適三官下降之辰仙科謹儀祈千里亟蒙其佑仰鼓桴之亟感憐耕鑿之含生嗣享豐年連甍甘四釜之食熏為和氣鼓腹共一臺之春於樂聖時永依道蔭罷散疏民已樂生盍迎嗣嵗月云初望敢控丹衷兹演仙科仰通帝意冀衆真之敷佑盡滌愆尤俾百榖之嘉生坐臻富庶龍母疏神休所庇飛空専普潤之功廟貌有嚴闔境肅誕彌之慶爰因榖旦庸蕆淨筵伏願俯答民心仰尊帝命俾右湖左海之俗嗣享豐年絶鳴條破塊之虞迄成樂土冀誠孚於肸蠁當嵗薦於旨嘉為徐南卿乞米疏徐南卿行身如魯男子傲世若西山夫九守窮途駢來竒禍方越石父墮縲紲誰其乘馹以請之暨王參元赭垣廬深愧焦頭而救者坐觀枵腹誠復何心此客不無覬知己之逢老子未始為強人之事兹焉破戒政自犯嚴若富家翁於寒士謂何輟凶年榖亦古人難者想去彼取此所以輕千里而來俾虛往實歸庶其慰諸公之意房州辭廟疏兩書下下之考民免怨咨一荷冥冥之私事無瘝曠兹申控扣庸冀保綏伏願俯恤微生曲垂終惠楚氛迄息病軀新藥物之功江浪不驚晚境畢鄉榆之樂停推疏體上心之止辟庀職惟勤底郡政之空囹收功有自庸羞釋供少答君仁繄吳要衝自昔都會鼠牙雀角雜然難明玉律金科使之易避至邦人之不犯由聖化之已孚敢憑諸佛之仁益熏協氣俾無一人之獄旁暨普天欽惟等慈俯鑒昭報又布宣化之教條載更嵗鑰捐問囚之箠楚三啓梵筵由君德之好生底郡民之遷善兹嚴淨供庸導至和敢輕兩嶽之平反虔副九重之欽恤冀絶向隅之泣侀也盡心庶陶遜畔之風使之無訟仰惟妙覺鑒我翹誠又御衆以寬方聖上推好生之德得情勿喜致郡民孚逺罪之心虔羞佛供嵗已再三仰報君恩意希萬一載仗竺乾之祕教俾陶建德之純風凡曰含生微一夫徽纆之繫庶幾盛世追中古囹圄之空古城寺僧化十八羅漢疏十八尊宿湛然圎通大千衆生咸所依怙欲寫國清寺具足體請看古城僧精進心當有達人助此勝事我相夀者相莫生一點自它佛身聲聞身要是大家香火無量因果便須承當光孝寺建佛殿疏有唐名剎合盛於熙朝大雄祕宫劣存於故址劫火歎遭罹之酷精藍墮寂寞之濵住持更幾人叔出季處之靡定經營不一日銖積寸纍之有涯未免小舉而大遺幾成置本而徇末儻黃面老之像設弗獲所棲則舉直師之願心得無遺恨多助良以得道成事不嫌因人仗四衆之信心還千齡之壯觀繼今晨香暮火永燕徽祖在天之靈凡其片瓦尺椽無非給孤布金之惠神居山寺興三門厨堂疏嚴法席之扄要為安穩除食輪之地尤戒因循按為郵郡之主山昔有神居之佛屋荆榛粗剪宛如劫火之初日月其除良切鄉賢之恥兹宜急伊蒲塞之供豈特謹鐵門限之防冀舊觀之兩新賴信人之多助繄萬人不費之惠何妨信手拈來追平時輪奐之功會見從地湧出更辦羞福德藏式用答喜捨心小疏户屨罕前炊煙無寄寧惟興衲子之歎亦以重賢者之羞捐杖頭錢八方俱祗園之衆領聲前意一諾敵季布之金建橋砌階疏長路安行要免衝泥之病飛橋徑度更寬迂步之勞兼二者以修營實羣情之願欲陶磚灰石亟收鼎成之功傾槖捐金當有度外之士廟路砌階小疏嶽神行殿郵郡左方簉千里以乞靈情不巳者俾萬人之安步利其博哉冀遂甃甓之功可無揮金之士砌街浚渠疏潔汙通塞弗為胡成出力捐金有唱斯和眷此嬉遊之地久興湫底之嗟浚溝闢塗兼居者行者之公願陶甓礱石豈日計月計之近圗鳩六十餘丈之工會千五百緡之費得人任責指日告成凡屐蠟之經行冀慳囊之小破安樂院砌階疏人間坦塗本無不可腳底實地兹豈徒然欲免傍險衝泥正須因人成事毋使葛繁方便専美有聞自今持地圎通見成無礙當四集揮金之手看一新甃甓之功此去大家安行要是一假竒事尼求度牒疏出家是大丈夫事允屬當仁得度以比邱尼身要須本色人能贊喜誰不圎成看我擔囊遍干無礙大士佇君指廩證果清淨法身一句合頭萬金唾手建龍廟疏分一勺之清甘澤為豐樂下九重之褒錫用赫威靈昔假郡符實膺神貺兹大新於祠宇庸仰副於上心敬捐毫分以助朴斫砌街疏街雖近於新街巷猶悲於陋巷拖泥帶水孰不苦之運甓聚沙今其時也各自勉力那不通津念向來傍險衝泥涉患者而後知樂繼自今行商坐賈徐步亦可以當車一諾雍容大家方便東釋迦墳院建山門疏釋迦古剎何必舊基長翁門僧聿新保社在我欲起門户入手便有規模更憑信人共贊勝事八家髙廪又何惜一囊錢禪窟不關要共入三麼地請機簡堂再住隱靜疏桑下作三宿留孰知非住佛法在一切處拈起重新世未免過現心我自無去來想某人法門標榜祖籍棟梁喉中作金毛聲指端現無縫塔一色打臨濟鼓笛舌下風生十載坐杯渡道場學者蟻慕雖萬年龍象力挽而少駐然五峯猿鶴猶覬於歸來暮鼓晨鐘前日見成調弄拈槌放拂入手更覺精神速來和一鉢之歌要驚裂羣魔之膽不須擬議便請承當請崇老住開元疏住山規模僧中當得本色續佛夀命聲前已露真機重把布袋頭解開不妨門限鐡踏破雷音一震雲衆四馳崇公臨濟正宗簡堂嫡子寶王殿上珠璧騰輝獅子窟邉狐狸屏迹雖曰刳心契道蓋嘗出手為人殺活二機喧靜一轍廬山滿眼幾於古廟香爐興國開單倐現長空霽月載辭普化小憩吳門與其作萬夀西堂僧孰若為開元東道主况燕國夫人崇福之舊固自見成為符離居士折簡而來有何不可慰一時之龍象示四衆之梯航作用斬新分明拈出嗣釋迦三百餘會定知絶後光前祝人皇萬八千年看取感天動地何須退避亟為舉揚請修老住能仁寺疏祝聖道場豈容虛位住山尊宿要是當人只今祖席生風何止禪和披霧修公打臨濟鼓笛立或庵門庭面壁少林靜中已成饒舌開單安吉閙裏正用藏身拳棒頭盡是工夫自它相更無縫罅孤雲瞥去初驚沒面目阿師萬牛莫回方信硬脊梁強漢殺活妙用卷舒自由雙塔昔遊況嘗作三宿計洞庭冷坐無乃墮一色邉好來作能仁住持恰與示叢林榜樣不須擬議徑辦行纒現掣電機穿象教諸方之鼻趂流虹節拈吾皇萬嵗之香請義老住褒親院疏能仁道場巳請箇烈挈強漢陽山勝處又須得本分阿師來為故家住持共作宗門壯觀義公喫長安飯傳祖師衣坐斷諸方葛藤打動古佛關捩獅子哮吼有聞必驚鏌耶鋒鋩何待已試惟吳門褒親之故剎乃相家崇福之名區要須若人付以是事且輟鳳城之應供求登麑坐以接人抹月披風好傍仙泉濯足拈槌放拂更教龍母點頭請升老住廣惠疏祖令方傳詎容厭閙縮手世緣未了要須打硬到頭不妨兼利死生豈可強分南北升公廣臨濟流𣲖秀應庵宗支震大雷音野狐喪膽示正法眼古鏡當臺才辭聖夀叢林又主華藏法席堂堂攝受色色見成惟廣惠之精藍護中原之義冡忠魂勇魄委安隂宅之藏孝子順孫與被漏泉之澤虛席以待冀公肯來重現舊時風流燈燈不昧普答此間幽顯局局長新便請承當不須退避請充老住瑞巖疏為一大事不妨遊戲世間愍四衆心未可棄置度外雖曰因緣有待要是收放自由肯堂長老得臨濟正傳受卍庵密付孤峯頂上打坐間雲莫羇十字路頭接人白月遍照一音振響五天屬心作石佛主人禪宗欽仰領精嚴法席祖令斬新豈容呼猿洞前便做省事人過緬瑞巖之孤峙秀鄞水之落東雲山邃深厠上剎之數海嶠密邇接大士之家勝境正須得人方丈即今虛席副我渴想冀師肯臨飽聞信手之方圎願觀遊刃莫負隨身之竿木秪麼抽頭請堅老住乾明疏保社寖衰即日要須振起禪翁已試知渠未易荷擔覿面似許作家袖手豈容間地堅師長老挈提正教照映叢林曹洞法窟前作金毛獅子吼密庵棘林裏藹優曇鉢花香古祖席特為賢守一來新寶熏當效聖主三祝宿緣不苟新乾明與換舊乾明衲子知歸東道主今為西道主徑煩敷坐且省打包請長老住乾明疏古寺規橅荒涼已久道人行止收放自由要甘沒滋味禪乃見硬脊梁漢某長老傳正法眼現比邱身向來出手為人未始縮頭辟事披風抹月曽是北山燕居片瓦尺椽幻出醴泉舊觀休憚無麵做餅尚能敲空作聲為凝香主人肯來不妨竒特把圎悟禪師拈出方見神通長翁請疏大丈夫漢殺活祗用一機不思議心行藏初非兩轍要看接人方便自有本色住持惟某公阿師密護象教而乾明禪剎久墮劫灰道繫我以卷舒法因人而輕重長翁老子率爾有請凝香大士欣然特拈説苦談空定能鞭石流血課無作有不妨剗手駕雕從來白月流天會使黃金布地鋒藏掣電一分付於瓣香節近流虹徑祝延於睿算青詞天申節醮筵青詞已下並代人皇天開治世之符篤生元后率土祝聖人之夀咸罄丹衷爰因載夙之辰虔致由中之請竊惟好生惡殺兩儀之妙造寢兵措刑一人之極功洪惟太上之施仁默與化工而合德必得其夀自然睿算之川增知慕其君猶冀皇穹之桴應恭陳淨供寅奉髙真金龍玉簡肅若前陳風馬雲車庶其來下伏願翊扶國步保佑聖躬申命用休固億萬年之基業降年有永閲八千嵗之春秋又帝齡有永初何假於致祈天道無私亦自然而善應敢殫悃愊仰瀆髙明竊惟世道交泰之時神聖無為於上寶圗晏粲鞏泰山而四維國祚延洪羡神策於億載其治有如此者非天其孰相之邇者有隂寒愆伏之虞亦洞識扶持全安之念蓋穹昊眷皇家之意不替益隆然臣子報君父之心有加無已即王正之初望延仙馭之真遊祈鑒丹衷俯臨淨供恭惟九清默佑萬福無疆龍樓覲物外之天鶴駕駐壺中之日聖以益聖仙椿不老以長芳新而又新玉册屢書而未艾永依道蔭共戴君尊薦兄青詞天倫之痛中有切於肺肝帝意可通敏或逾於桴鼓輒伸控扣仰冀哀憐伏念臣賦性冥頑受生么麼始其多難遽違膝下之慈晚則苟全獨賴友于之義禍倐延於伯氏釁實自於臣躬鴻鴈作行莫遂白頭之願脊令分影空纒黃壤之悲念俯仰成幽明之殊惟薦嚴有超升之助陳醮筵而寅奉丐仙馭之來臨恭願至仁俯推宏貸察臣心手足之至愛矜亡者夢幻之短生許以懺除振其沉滯蠅營濁世洗厯劫之積愆蟬蛻幽扄證髙真之淨果志斯永畢他敢有祈青詞妙道無方虛而應物含生多釁痛則呼天適元命之再臨仰層霄而有請伏念臣賦資甚陋涉世多虞什一自營幸資身而粗足晨昏色養冀將父以為歡而父某粵自中年遽纒末疾不良步履歎殘息之僅存居惟呻呼悼餘生之靡樂砭劑莫收於寸效寃愆恐自於宿因敢罄潔蠲用伸祈控念痿者之不忘起痛極熏心然至誠之無不通法先思過恭即上元之夕肆嚴清醮之科伏願帝眷不違仙真俯降許其懺謝錫以寧康起廢針肓夢倐亡於二竪肉骨生死仇永絶於三彭全功有遇於良醫隂佑實憑於司命含飴晚景虔奉親闈負米此生庶共子職誓依真教漸絶妄緣閘上醮青詞人生實難有戾考終之命天鑒不逺仰資宏貸之仁輒罄哀誠庶幾昭格號為澤國繄此郵城衆流合以西來濬為運瀆數板扄而中峙匯作濤淵雖云通濟以利人或致顛躋而就死流尸不返徒磷火之隂沉主祭謂何望鄉枌而夜哭浮魂滯魄怨死妬生兵火而來才五十年姓名可舉幾七十輩分為魑魅牽引朋儕積釁所加既天年之中斷餘殃旁及貽鬼責之何窮靜惟真科可拯幽趣肆恭陳於醮席用虔奉於仙真披瀝丹衷懇投洪造仰祈慈憫哀彼沉淪道廕旁滋釋多生之寃對法橋安濟脫衆苦以超升繼今行者之經從無復向來之橫夭所蘄生齒同我夀康真武醮青詞大聲疾呼脫姓名於鬼録回生起死荷貺施於天神敢罄丹衷用伸昭報伏念臣賦資不腆涉世多艱雖居侯伯之家未憂凍餒比苦隂陽之寇良近阽危恐夀命之不長致君親之莫報輒瀝由中之請冀憑隂隲之功念真聖稟水位之精而妙力度人間之厄嘗殫控扣竟免顛冥是即私居恭陳淨供伏願憫么微多難之質推救護羣品之仁延以夀齡蠲其疾疚居肓之上膏之下儻不夭於天年無幽不察願不成誓永依於道蔭祈雨青詞邦家先務莫重農功草芥賤臣冀通帝眷敢伸控叩用瀆髙明粵自長贏屆辰旱暵為虐禱祀莫效比屋戚然呻呼飢饉為虞九重為之旰食仰測天心之見異得非吏治之姦和默訟愆尤不遑夙夜兹恭陳於醮席庸欽奉於仙真察其思過之誠賜以有秋之慶挽回和氣霈為三日之霖播在頌聲馴致九年之積上資道蔭滿慰宸衷太一醮青詞黔首望嵗如痿者之念行貴神在天豈恝然而無意憑仙科而申控蘄帝眷之仰通長夏已窮常暘未究翹雲霓之望益挺流金焦土之災走仙佛之居未諒撫心籲天之懇局蹐萬室歎愁一詞至若九重之憂勞幾於六事之自責况惟委質尤切熏心仰十神之常居統一氣之妙造恭羞淨供寅奉真遊伏願啓乃帝衷霈一雨均霑之惠畢兹稼事全九清善貸之功無待毛澤盡而人力窮要俾民心悅而天意解上寬宵旰俯逮困窮又道妙無方虛而應物民勞已甚窮則呼天載殫螻蟻之誠未獲桴鼓之應伏念臣肅持使節兼綰郡符民之宅生所臨八州雨不潤物亦既兩月比屋起凶年之歎九重躬旰食之憂是責有歸非臣誰任四走羣望曽神聽之莫聞三羞祕科冀帝衷之俯鑒惟天極常居之貴總化工密運之權已薦潔蠲猶冀感格伏願少霽威怒挽回泰和敷大德以好生計下臣之思過霈為膏雨自三日以為霖拯此疲民尚一人之有慶誓棲心於妙教肩事上之精忠祈雨青詞驕陽為沴民且倒垂大德好生天不庸釋兹布由中之懇仰祈宏貸之私伏念臣持節以來分臺而治所臨八郡覬舉絶歎愁之聲上奉一人庶不孤付託之意屬兹旱暵甚害農功多稼在田稿乾無幾至仁當饋惕厲靡遑自長夏以迄秋猶常暘之肆孽豐凶可卜弗違數日之間凍餒是虞盍動九清之聽即琳宫而謁款冀飈馭以來臨伏願少霽威嚴俯憐哀籲鑒聖主畏天之已至察生民局地之可矜挽回至和霈作甘澤立蘇焦卷俾迎中熟之祥坐息流移咸享安居之樂誓堅精白用答生成三元青詞千里妥安一被施生之賜三元上吉載遵禳報之科吳門大邦聖世樂土農功勸課嵗獲豐穰民氣協和物無疵癘敬涓榖旦仰答洪私本仙律以羞崇必真遊之眷顧俾鑿井飲耕田食咸樂生經凡普天下率土濵同躋夀域物情攸屬天聽孔卑薦嫂醮青詞促促短生悼幽明之永隔茫茫洪造知感格之非難輒攄不腆之辭仰扣蓋髙之聽伏念臣稟生寡祐涉世多虞粵自孩提已無怙恃念衰宗之靡託惟邱嫂之是憑險阻艱難盡出提擕之力出入顧復幾侔生育之恩門户之寄不替於祖風娣姒相與咸儀於婦德淑諸三族胡不百年生久臥於沉痾沒不登於中夀興言及此流涕無從然念備更險夷務生經之為急居積釁咎慮鬼責之或加是用虔奉醮科仰延真馭冀動九清之鑒俯矜五陋之軀許以懺除恕其瞢昧法橋安濟脫怖畏於泉扃道蔭具依趣清涼之仙界兹焉伸控它敢有祈女就蓐設醮青詞忽然為人女子莫危於就乳虛而應物天心不外於好生竭悃欵以呌閽獲感通而如響敢酬夙素用黷髙明伏念臣生理么微族緒單蹇屬由天稟視女有甚於愛男憂與喜并舉子當臨於就蓐呻呼可念副坼為虞方局天蹐地之時瀝血誠而有請暨起死回生之後豈精意之敢忘恭設醮科冀延真馭金龍玉簡庶幾賤婦之動天風馬雲車亦許傾葵之向日欣然來下監此微誠寸心聊效於涓埃默饗諒同於桴鼓志斯永畢它敢有祈江湖長翁集卷三十九
