body:
  text: 江湖長翁集巻二十五宋陳造撰書代上周丞相書雨不時霈郡縣以旱告者凡㡬所天子焦焦然責己自損求以應天天意邈未易囘意者天道冥冥當求之無方凡今日所以應天某謂莫急於通下情邇者詔兩省侍從臺諫指陳闕失矣又令監司陳民事闕失某獨以為未也必也求言之誠徧及天下使天下九品之吏一介之賤皆得以言天下利害吾君吾相置其迂逺不切泛不可行者擇其愛君憂國切天下之務者既行其言又旌異一二人然後下情不壅天意必囘陛下求言之詔久不下矣因今之旱推廣聖意俾一發此詔誠天下之至願得之傳聞上以旱故欲使天下言事宰執有以既無闕失不須如此告者不知是否然聞者莫不信其必然蓋廟堂邇者之迹頗似不樂言路之廣不樂言路之廣得非以悠悠者之有言往往輒及廟堂歟某竊謂人之情不病風䘮心孰不尊君而畏相有言而首及廟堂未必非愛廟堂也夫士民任一身之憂為家者任一家之憂郡縣監司各任其憂所憂之外他非所任宰相任天下之憂者也天下有大利害大休戚伏於耳目之所不及彼且緘黙不我告是吾憂也彼言之我受之將有以裨吾之聰明啓吾之智慮又何暇病其攻已人無言也則已苟有言焉則必自宰執始雖某之愚陋今宰執無非知己使某有言焉亦必自宰執始何也宰執荷天下之任則冝受天下之責荷其任受其責則不得辭其攻已今之時雖使臯夔伊周為相人亦且攻其失彼亦且受其攻其職守云何而惡人之有言耶大抵人君好問則晉州男子一字可以救時弊宰相不忌則新豐旅人片言可以裨朝政必曰肉食之外皆不足賴無乃欺天下乎天下之事使宰執朝士言而行之無復遺慮則政豈有弊而天灾豈復如今所見今尚爾則固宜畢天下之慮以圖天下天下之弊極矣未易縷數其最可畏者軍民並困兵困故驕而怨民困故畏上而不愛上民者國之本兵者衞民而捍患今且若是天下之俗苟玩歲月目前無患也因以為安而不復他慮今有人焉起居自如飲食無故而外澤中乾病客脉絡未嘗冒寒雪渉憂勞故病不外見和扁借憂而方狃以為安諱其言病一旦冒渉雖悔何及昔周公還贄見士吐握下白屋此亦勢之當然公之盛德不在是也公憂在天下方資於士士貧賤止矣何有於公衞武公九十相周語其下無謂我老耄而捨我朝夕以告戒我聖賢固然矣申屠嘉何為者聖主愚相之言一旦脱於袁盎之口不惟不怒方且引為上客仲尼曰聖人君子吾不得見得見如嘉亦可矣後之為相者動以臯夔伊周自期比以申屠嘉未有不愧怒以為輕已即聽袁盎一節觀之後世所難及者恐不止此史不能備書也伏惟某官學術之醇正相業之優裕根榦源流有光近古深願與周公衞武匹休無甘出申屠嘉之下俯採鄙言啓白聖主一下求言之詔使四方士民得以攄發所懷必大有以資某官之聞見設施而灾異庶㡬可息無曰業已旱時已過無如何矣或曰某處雨某處小熟天意已解夫氣和則形聲和民氣不和于下則天灾自見于上氣即未和旱之後孰能保其不為他灾富韓公言今歲旱矣焉知來歲不再旱故民氣既和而後信天變之可銷也竊觀今日民氣壹鬱未和正恐旱暵之外勞吾君相之慮未已也士夫皆曰相公欲去久矣自為相此心尤切特不可苟去耳某以為貴而為相進而求之實難退而去良易祗如求言于下同列不欲也某官獨主之力固不必勝不勝而去之可也凡今時務可罷行者甚多才雋鯁亮之士以庸庸者之充位滯于下者不少職薦進任憂寄者必有如公孫宏之無堅守張安世之逺嫌疑以自便獨某官毅然自信建白于上罷行數事薦進數人若其言果不用去之可也儻或低囘蹙縮上且畏天子之嚴明傍亦忌同列之違異憫黙愒日如是而曰吾欲去則人决於不信猶今傳不求言者之决於信也某受知門下最為不薄惟其期相公於功名不期相公於富貴故盡言如此自以為愛門下之深聊為知己報也惟某官亮之與王提舉論水利書某竊惟事之利病休戚當與身履之者論之身履其事或瞢其源流不能為經久之利或其蔽於己私則猶不可遽信利病休戚當與身履其事而又識足以察而不狥於私者計之兹者某官玉節遍臨兩邑講究鹽河隄岸利病想君子博見無我歷訪公議其下因是有言者必不少矣此正識不逮而狥私者得以惑視聽之時不可不謹其防究其情而求為無弊經久之計某待次此邦粗究其事請效一言而試訂其可否自本軍至鹽城鹽河二百五十里其右有隄則以民田之在右者下於左數尺故也隄所以障水古人之計不惟通漕運亦以溉民田爾隄介高下田之間其或水漫不泄則必奔衝壞隄隄壞而田没矣故為之函管以水之大小為之啓閉主之以官吏河之在高郵八十里間為函管三十三後來再興之止二十未能盡復其數多其制小則欲分泄之分泄之者為其隄之薄而防其水勢猛戾將决吾隄且害稼也分泄之有不暨是有斗門之立所以佐函管之不及八十里之間為斗門二其一曰東河口其一曰三一斗門所泄可並十餘管之水然必東河口必三他處無之者二處地甚闊水雖湍猛不壞也又東河口其下則海陵大溪三其下有山陽河溪與河皆所以受湍猛之水捨此不可為矣古法三四尺通漕運之外容民汲以溉田則兼公與私利之此元祐間朝散毛公法也毛公遺愛邑民至今言及之無不稽首隄下之民取水於通漕之外法也其遇大旱或犯其法盜之盜之誠非也隄上之民自狥而妬人之便者必指其然而操戈醖毒焉而隄上之民於此水初無限制無法禁浚渠以掇取之爾方其旱水來自上源者且障之不使入河以理推之盜之之害小何也彼猶有所忌吾有所誰何之也其與掇取之無禁者相絶也而盜水之名則甚可惡故隄上之民常以此藉口者利惡有所分也河兩傍民情自元祐到今率如此今陳言者必曰高其管且大之高則無盜水之患大之則可以殺暴漲之勢此其言者必其田在隄上者鈎其情可知也一隄介高下之間其取利於河者總三邑計之左右大約各數千家去隄之逺者無與也高其管似可以為盜水者之防然今管底比之毛公初制已改而高一二尺矣近高郵知縣掘函管數坐驗實數内地名潭子溝柏家溝二坐當時人吏不肯申修故毛公古制具在知縣亦掘視之低新管一尺或二尺制度堅壯亦高下不及二尺餘即此可見古人用意處其高之一二尺則以淤泥不浚之久而河流淺也兵火之後古制廢且六七十年今淤泥四五尺矣民日日冀官中浚之以漸復舊制所望者不醻而又議高之民誦言泥之淤有增無已則高其管不一再止也泥日淤管益高隄右之田日病隄左之民幸何如也利不分則偏享之如所圖也此猶可也大其管之為害戸知之何也水下之驟田必受害也今管多而小歲大水隄下之愚民猶冒昩以死塞其管不肯通恐其害稼一或泄之往往稼沉水底大之而民猶塞之則何益大之而聽其泄則此三邑隄下膏腴之田澇則委之耶毛公之於水利其於當時後世計蓋審矣似未可輕議也二斗門之大什百諸管之小明甚然則為今計當如何隄上下之民一舉可以兼利在乎浚河即今淤泥可四五尺淺者猶不下三尺取以培隄隄益固而水深淤泥盡則今之管底高水低且三四尺隄下之田不患其盜取而隄上之民亦自沾丐民之夾河者向來操戈釀毒之心亦可潛消隂化而為和順輯睦之俗不至於巧為譸張以眩上聽今日捨此未見其有利無弊而毛公之法决未可輕易有所變改公之法自兵革則廢而壞㡬六十年紹興而來有河之形存隄之名而高下之水漫漶無留障澇歲十六七一遇旱則大小舟皆不可行官病之民譊譊訴之任責者初無其人至淳熙八年苦大旱河無涓滴坐此鹽虧其課者㡬二萬朝廷遣奉使袁大著衘命而來訪兩淮疾苦某時待闕家食亦以二事請其一濬兩河之説也妄意謂事業之興皆在大旱時今日之旱似不幸而實幸謂古制漸可復也袁公是之適諸司意合興役浚治自是鹽運大增而隄下三邑百千萬畆之田化為樂土頻歲全收戸口日增今某官之來但見河淺不可運民田乾涸惻怛愍悼見于言色議者乃欲乘此以售其欺某官特未見淳熙未役之前爾隄下之地二三百里葭葦際天魚鼈所家行一二十里乃有居室所仰者樵漁爾民不利己如此而漕運抑又不通動虧千萬數前年提舉陳公亦又以此河兼西運河建白修之費財勤民增修其舊前歲亦旱歲也亦浚河之機㑹不容失也惜陳公不能擇人任之培隄者止客土而河泥一畚不舉甚者朘其厚以培其薄利民之實不浮于名雖然以經久不朽計望之則然然役事甫已春夏大水隄不没惟咫公論謂非去年一修又復無秋矣陳公所費十五萬緡去秋總三縣失得計之何啻百倍河兩修矣規畫皆不能大滿人意然淳熙則化三百里為良田而綱所虧減十五六紹熙而後則又僥倖上熟以此可見毛公舊迹乃不朽計廢壞之後小修之小利大修之大利廢不修則為吾害輕有所更張亦或利少害多昔人議西門豹遺迹曰賢人之所為不可改也史書之以為美談故愚謂今日捨浚河無䇿而浚河當自朝廷命之前歲既興役矣今部使者又復有請實難其從且在執事又似暴揚前人之短某竊意隄下之民必以此為請某官因其有請備以申奏彼亦或能叫閽懇祈秋春之間一興此役盡復毛公之利延之無窮非某官名世大賢不足計此亦不足行此此之為役惟旱歲可議向來再役皆以大旱惟其旱故土可取民易役因㝵而役之雖勞之實食之也今夏本軍大無雨此亦一機㑹故某之僭越且自省雖識未必能究見利病而田之在隄上下者各數頃非特不敢私亦不容私言之可以無嫌故不敢黙而一鳴于門下伏惟財省與楊總領書僕聞之陳義於其上之人有間則易投有因則易合叔向謂鬷明子無言㡬失子間也孔文舉見李元禮引孔李通家之説不然不進也非因而何士非是奚所挾持以遽售於人况當世名德鉅公其顰笑足以軒輊輕重我其又可瞢焉以前乎僕生于淮南之高郵自為舉子則已聞奉使總領大卿英聲偉望表表天下矣幸竊科第厠仕版則服膺聲望而願見之心罙迫于中南北漂流有志未遂而王府之客元實邵公某師友而和甫吳公某之同舎生始為尉則又趨事故樞相于當塗其見顧予賞歎以名薦之朝人有入幕之羡其於楊門寔老賓客今者有所請于門下不為無因且承郡房陵職有所𨽻於使所事有未伸而吐其情夫孰知其不博叔向㡬失之歎是亦有可言之間者比蒙使所行下以閏月錢銀有司估以下品而駮其高價而誅其餘出内之吝有司之責不得不爾然沿土俗本人情酌之以義而行之以仁此則大君子事房為州束以亂山舟車不通商賈不由凡百貨材藥物邈無一有其間最不易得者銀與楮幣上司非不知然亦上下皆不得已常賦責是二者卑官毎歲不免科買於州若吏若民無免者敲榜禁錮所不忍為不忍言者僕書生所學何事非仁惠利人將少醻所志乎幸脫邑債承郡于此乃日蹙頞强顔于受笞箠者之前苟逃曠責負所學甚矣房僻左如此百貨無有夫安得所謂上品之銀雖非上品科之吏民每兩猶四千八百遇其亟窘或五千餘不暇計也而有司未察槩以下品而裁其價彼有未見敲榜禁錮之苦爾脱見之猶忍為之非情也彼亦未聞敲榜禁錮之苦爾脫聞之亦或動心夫下供上上之責其供不索於其所無况肯索賤於其所甚貴乎責銀於房索以所無也然亦上之人大不得已不然軍儲國計將有所闕若又索賤於其貴則是可以已而不已者君子之於下情有未見未聞之爾聞之必將惻然向來交代韋朝散當紹熙慶元之際亦以閏十月之銀價䝉使所行不甚峻是時使所乃趙大卿也韋亦覼縷本末哀愬于使所即蒙寛恕抑亦洞察房州隘陋必不能辦在使所可以已而已之也趙大卿一加惠恤而敲榜禁錮所省不知㡬何人伏惟某官正學以從仕中和以臨下寛厚慈祥之政其源流之來泓涵演漾儼故家規模未替也其與人其臨屬吏孰不篤歸嚮之心况如僕者雖老且衰攄此情于下執事而知其楊氏舊客其必加矜恤貸貰使之苟安賤職大君子之惠利寛慈其肯恝然歟僕瘖不以告則是自棄自絶于名德鉅公且此銀一切行之而責之必辦買之於京西非五六百千不可不知敲榜禁錮之害無辜而被苦自此又㡬何人當僕之繆而不能哀鳴辨白按以為例則凡繼今以往不惟官府不支而虐害所加後人求其端寔自某始某所以深惜以此垂老之身胎禍於後人兹是用傾瀝肝肺東向拜是不典之辭日冀特達蠲除之慈推故樞相所以見待之意與夫門下士從遊之素不下於趙大卿所以待韋倅者無胎此敲榜禁錮之禍他日或有立于世必有以禪德譽效言議之末僕淮南男子决不敢食言止如湖北總所行下屬郡自今買銀每兩增價二百亦禁吏民買者則可見銀價之日增月長也迫切有懇方哭婦氏之䘮抽揠荒亂之緒辭不達意惟高明亮之寄袁京尹書某不上寒暄問當疎行細書修卑官禮自惟俗尚之末不可廢要之有所禆補君子聞見者尤急也有懷亟言之不容後比讀邸報秀州華亭縣保正胡詢者興販私鹽五千斤已捕得犯者而詢乃集親族七百餘人被甲持杖奪去犯人并贓物縳去廵檢張承信及捕事人張興等十三人殺死捕事沈旺時七月二十三日也及今四十日不聞捕獲行遣某謂此正某官所當自任者必有所處矣然今日風俗不媺月異日遷狃於寛政習為頑惡獷戾漸不可長在平江時見常熟崑山民負罪晏處弓兵一人至家則羣起噪呼往往箠曵摧辱且云法不許公人下鄉汝何為者邑官委之保甲保甲皆其黨類庇䕶囊槖互相結以自便否則不敢喘息聽從指揮者某淮人耳目所未接此一旦見之駭惋不自安久乃漸慣不甚怪也及來浙東此風尤不佳大而鹺茗之利大姓擅有之小而桀黠者挾勢力以陵困細民細民受害瘖無詞者皆是不得已而到官則桀黠者端坐至經年不出偵知離邑暫去則徂徂一狀細民被追逮來不敢後桀黠者則又影滅迹絶久知其不容闕役屬於强梗今日無罪而抱寃不信非其僕厮而拘繫供資於人者滿東南矣和氣之不應水旱之頻仍夫何怪胡詢今段不㡬於亂矣乎究其至此原於綱紀在監司州郡者悠忽不振姑息頑民已甚國家寛仁厚澤網漏吞舟為良善設而今頑狡兇狠之徒反竊之以便其私而當路不能察以其所以待善良者加之桀黠故善良被害日深六經之書皆為民父母之術曰愛民曰保民曰恤民曰撫民然所謂治民亦不廢愛之保之撫恤之矣無以治之馴至今段亦其當然爾上之君相任寛慈以撫結其下必有司嚴憲法持綱維以濟其所不足夫然後上下之體順而强梗退聽柔良有賴今乃一之耶切謂執事當以胡詢事奏之吾君白之吾相决意取渠魁誅之取羣兇竄逐之毁其巢穴籍没其家掲而示四方則又申嚴憲禁諭飭有位毋或專任姑息務行中和之政使高明知畏單弱有以自立以救今日積習之弊惡俗尚可望其少弭且胡詢見役之人禁戢𣙜貨是其所任乃反冒之取利其多至五千斤則何所忌憚集衆至七百人緩急之間能使之忘其軀命則其能服御羣不逞也有素驅而使之何所不可拒捕而持杖巳甚矣復被甲而鬬則其必於專利快意於犯法狃於今之寛政僥倖苟免且冒利不復顧藉之心灼然可見此而可忍是祖宗金科玉律皆虚器也東坡為杭聞顔章顔益歲擅藥絹之利州不能誰何坡至未暇他問法外配二人者民乃信伏胡詢之惡㡬倍二顔監司臨之郡守臨之一保正敢爾是無監司郡守也法禁𣙜貨或猶犯之迫於饑寒耳是儻可恕此物敢庇七百人販鹽五千斤非家已温厚何能及此乃冒犯至是是無君父也執事通儒不退謝坡翁且疾惡之政載在輿議向來憲臺沈軍五潘軍七標首長橋迄今浙西强盜減十六七是皆腐儒俗生陽為大言心掉氣拂不敢議者執事處之如無事必不應能施於彼而不能施於此亟願選清强官委之體究苟得實行下諸邑廵尉必盡得兇徒乃巳天下無事久矣姦兇之人不自聊賴窺伺時隙以圖抵觸者何所無之晉劉靈者力制牛走與馬俱貧不自食歎曰天下何時亂乎衞士焚張彝第魏置不問高歡笑之霸據之念於是遂萌執事高明通練博古洞今可告以此故喋喋敢言幸察之至禁公人下鄉固良法然法不能無太甚者在監司亦須少寛之使任人重於任法近民之吏不至動為其下所操切迫蹙庶頑惡者知畏邑官不然申明其事明説邑不能追逮或不輸官物或私擅𣙜貨許申憲司本郡專差人追之用破姦人之膽今法乃直禁不許差人下鄉被追者許之越訴夫使下得持其上上之無以制下如為邑者有彌縫而巳爾其間牟利者反與之為市置不敢議按而行之非國之利民之福也胡詢之事又未必不因此馴致之書生妄言非職分事是耶否乎丁寧教之不我厭斁良幸謝高大卿書僕比者攄發肺肝飾固陋之辭忘其愚謬敢以本縣失額米數請于門下冀其矜哀而蠲除之退自省察不謂真足以動高明之聽慨然興憐從其所乞向之虚數一旦捐去邑吏荷憂累而受督迫者方負山而俄已息肩事之幸㑹古有之今之所難偶者不意某之竒蹇寒陋亦復得此竊惟宰邑之難昔人已言之而况今日今日宰邑之難惟財計催科之不云易民狃寛政曾不德上之撫我而皆幸其寛容反以傲其上海瀕魚鹽之民頑然者多税賦有常式往往以不輸為能先輸為失計故邑宰尤難七年來凡五易宰不終任者三而府符每以終不可辦也而釋放所負動數千緡或萬緡以上無非坐是常賦猶不易辦况名存實亡者此如繫風捕影初無益於府計而邑宰䟦㚄不得伸累政所苦者在此某何為者而能足其所求也耶譬如疾疢之纒其身而望于世者惟良醫之或遇也有二人焉其所病所苦則均其息薾然其形累然其心雖未甘即死而生意日少則均日赴於人而或莫憐之憐之矣莫能已之骨立僅存而已其一焉伸吭引頸以鳴于人而見之者惻然肯憐之憐之者其為術又足以已其疾援砭探丸一試焉而宿痾盡去生氣隨復囘向者呻呼倦臥忍死望生之意而為今日纓冠正容委虵歩趨全身名營子孫之計至此而後自喜且幸其身之遭而惜且歎前人之不遭也今其誠類是坐縣曹親笞箠猾胥環之于旁頑民窺之于下酬應俯仰其失毫忽其跡已尋丈仕而為邑且來海瀕此如康强之人勢須嘗疾而一受之者羸惡不支固矣又加以實去名在之籍既病而重以病者也前交代趙宰非瞢然者有請未察某之侍使令者甫爾一請而收恤之趙之不遭嬰病之日長某之不遺受病未㡬而遽脫去之是不當以能否計而某前之所謂遭與不遭幸不幸者殊也恭惟某官當世士望中外吏師德宇之恢洪天資之粹明政術所加可以生死而肉骨可以起僵而扶危大用於廟堂則必不袖司命之手小推之方面猶日試和扁之術者也而某也首得以其疎樸無庸之身而與乎臨照委使之地一鳴其衷藴而沉痾宿痼已去其六七則見而肯加憐憐之矣又有已之之術不少靳焉而滿適其控愬之望荷門下更生之惠自今以往豈惟某一人雖然仕而受其弊猶之賊邪之中人待其上有以愈之至切也王公當路往往有言而不見信非其果不信無乃其下之未足取信故歟望于上者大必不若反于已者不恕之為得某淮人之拙直者期以誠應乎上其於事可則為之不可則言之言而有察不察固也察不察之岐信不信之分而某之窮通去留所繫而半愈之病或在其不復為祟而元氣漸復惟門下之所以終惠而某之誠否所形見矣或者有一毫為門下欺是厚德未報而又負之名教固不恕天且臨之惟執事有以鑒念而少信其説謝張尚書舉自代書事之遇以天者非汨於人者所可測也而君子則洞知之君子之心蓋索之古古與今穹壤也求而合即而應甚者蘄乃予之相與以人者然也匪求也而合未嘗即也而應予之而非有蘄天下之人究其所以然而不可得必且瞢其心支乎言而於其事益戾其所見殊不知夫古之道天而不人而君子之於道身今而心則古夫目擊起敬所敬何事堂下片辭設中理已甚略而仲尼叔向之予人㡬乎天者亦古之道云耳士今而近古如仁傑之被薦公亮之見用未始形之言而或者反毁之勿恤也婁師德張安道之篤於古蓋不多愧彼下是雖未可輕訾其亦去二子已逺而去仲尼叔向愈逺矧夫進恥呈身者置不言賢否何如哉今夫某起于田間偶竊科第一官救饑為生多病資身易足為多病故安於慵惟易足故廉於取而恥於衒又孰知夫天之所以予我者詩書之癖著述之樂于以自誑以謂外此無益於求得者置不動慮吏隠二十五年自期老江湖而止耳而某官乃獨搴天下之所棄捐不睨者題品而振拂之而聞者惑曰是奚所聞又曰宗公鉅儒其於知人亦有萬一失乎其無乃情有契于度外雖若合以天而人事有時而戾乎是之所疑雖不可謂無据然不古而今常情不能免夫彼豈知夫大君子心婁公張公之心而其所以取道自仲尼求之可乎是寧可悠悠者議恭惟某官聞望之隆燁操守之端方謀王斷國之學經世緯務之文皇家之龜鑑而人士之司南謦欬色笑增重萬鈞而某於某官雖服膺其言議歩趨其行業然服僅一識面周旋承接未遂夙素一旦以其名剡上舉以自代曠歷累月某未之知也迫行都乃聞之此其為遇世之人莫諭其所以然而諉之以天合者某獨得以窺某官之心某官之心古聖賢之心也雖然施不蘄報而受知者身為輕也亦匪今而古某官之於古至且盡矣而某於此雖不敏不敢不勉大君子安而行者我小子勉而無怠将庶㡬萬一惟高明亮之詩文若干篇塵獻以求鐫削庶少慰老未廢學之志上涮劒洞龍書六月吉日具位陳某謹齋沐裁書頓首再拜獻于涮劒洞之龍聞之天下之物帝皆愛之而其愛此人特異于物天之生物且愛之無非為人計也為人計者至故擢其人之秀粹公直者為吏取其人之聰哲端亮者為仙神若龍匪吏胡治匪仙神與龍無以濟吏之所不及凡此皆帝心所託以遂其愛者也幽顯雖殊而其相須以及人相待以事帝而致其愛蓋若臂指輔車不可闕也是山之崇隆是洞之秘嚴龍則家之而為一方之民心所祗事信向某也無似被天子命來丞是郡又以一時闕守而假其章以享其禄則是民之戚休安否非某與龍實司之乎房之為郡束以羣山可耕之地什三而膏腴無㡬平時穮蔉告功僅無饑色不餘也今兹不大雨蓋已月餘畦畛龜拆溪澗絶流農時將窮而秧之未移蓋十五六斯民束手跼蹐怨嗟如倒垂如刃頸勢已亟矣三數日不雨流離殍踣必且不免是非某與龍當取以任其憂責乎夫彼此之間有能不能凡聽斷撫字所以施政孚化吏則能之若夫嘘為雲氣沛為甘澤叱咤欠伸足以水焦枯澤嘉穀化凶歉為豐登易啼號為嬉笑龍則能之龍所能者某之所不能然能以民之所病掲誠以告龍能齋心飭躬率斯民以為龍報斯是用大呼疾趨赴其迫急于龍龍其毋苟安臥洞府秦越視民而悠悠聽牧民之吏二三日之間施以大雨起民於垂死安之於將亡某無似將兄龍而弟之率吏民廟龍而祀之猶在官以朔望朝龍繼此終此身香火俎豆龍或曰郡旱禱已久矣而曾未及龍急而請取怒爾某曰不然凡曰吏曰仙神與龍其愛人以事帝必不應計細故而使赤子委之溝壑幽顯一道也吾先聖言當仁不讓見義不為目以無勇龍之威信恵利于人與世必不相逺或又曰今禱而終旱無乃帝命有所未及龍雖神無得而専之歟某又以人事而望于龍古之君子不待君命矯詔發儲活人於饑窘不一二見而止也其君皆有褒嘉無誅誚今龍决焉施此惠活此民龍何罪孰謂帝之福善輔德反不如三代而下之人君乎凡某之所請龍皆毋得以辭側聞龍之家此地民小觸之莫不迅霆怒雨苦其藝殖是龍威靈烜赫信可畏矣龍􅘅其意能怒適其意顧不能喜乎其怒也能奪其喜也顧不能予乎可畏而已初無可愛之仁可恃之效則龍之為龍失其所以為龍之道而甚悖帝所以命龍之心而某之迫急之誠漠焉置不省則龍果不昭不可揺以義而責以所當任之職不特某於龍告絶而民且不利賴怙託于龍在龍為可羞矣龍之德仁靈異某請于此舉卜之也伏惟審聽而俯從之幸甚與葉總領書僕愚無取竊謂士貴志不貴徒志志之立他日之成就其崇庳廣狹是否一本于此本立矣守之不堅則易墮無以質之而自任焉則多悖僕儒其冠甚晚讀古聖賢書則知士從仕本以行其惠利之學學之行否未可必而次諸功業者則有立言焉可以垂世二者取以定吾志他日或兼舉而並得萬一不見于行猶見于言見于言夫何歉從仕二十年矣如遡湍流逆驚飊錄錄無竒節可稱而齒髮衰頹無所復望則囘顧舊學尚或可以鞭其後而磨礪其不及即吾志蘄乎古之立言者今而置之且移奪之則守之不堅又何取遽自以為足而不求先達之士質而正之則所有未必是無乃自蹈徒志之譏乎僕于詩文學之久矣向也拜三數鉅公而獲侍杖屨時出其所有亦或蒙首肯焉雖然未敢自信彼無乃憫吾之懃姑以慰藉之耶此疑未泮是以聞見當世君子不敢匿其所有且不敢不委心投誠以祈一言將以不負其志恭惟某官功業之建立煇燁不掩文章之流傳士宗師之今之韓昌黎蘇東坡也竊謂士如藉湜晁張輩不蘄乎登門是無志於是抑有其志而卑且狹者也况僕辱近宇下於趨承為尤便敢以其夙志見于書以獻平生詩文千篇貧未能遽辦繼今盡發于大儒之前丐一字去取詩文一編幸先與過目與范侍郎書論才猶貨然天下之貨自一簪以上凡其可以衣寒而飽饑適器用而充玩好者人皆資之苟資之則必争得之等而上所資者大則所争得者愈切如兼金美璞珠璣象犀之類非有力者固不能得也然夫人思得之之心則不忘於中至於商之瑚楚之珩隋氏之珠和氏之璧則人皆知其希代之寶聞其名而未始見之者舉以語於人則必曰吾或得之富可敵國一旦投之於前則亦且不顧而去蓋其意而欲之者雖切及其真見之則又不能識也而隋和商楚獨得而有之者豈非其儲天下之寶也多識天下之寶也盡故天下之至寶人易之我貴之宜其之我而不之他也士之才亦然凡智效一官行高一鄉一簪以上者也人皆資之至於翹然于人士間傑然而頴異者兼金美璞珠璣犀象之類也資之尤切而人争得者也及夫才可以師表當世望可以輕重天下士視之以為進退顯晦者商瑚楚珩隋珠和璧也人睨之而不識識寶者人所貪而獨能有之者也某淮東鄙人少而業儒四十三而脫科舉陸沉不振老於州縣平日讀書所得無地以自施商瑚楚珩隋珠和璧固不敢自命環省其中亦未肯自同一簪以上者低廻偃蹇莫有善價伏惟某官道德之純全才猷之超詣名聲煒燁卓乎立于天下蓋懷寶者之所赴以訂其貴賤者也患不求不患不知患不見不患不識某也調官而來猶欲取正于當世聞人鉅公不獨救窮餓而已輒不自揆寫詩文一編干冒塵獻而副之以書伏幸矜覽抑嘗聞之周人以玉為璞宋人以腊為璞周人聞宋人有璞禮而索之宋人靳之不得已而出之藏之蓋十襲出之死䑕也周人掩口而笑某之未試之學無庸之才雖曰自珍其無乃宋人之璞乎儻執事一留千金之盻不至掩口而笑則某所望足矣謝楊樞剡薦書某自山林中來厠屬吏之末將二年矣某官凡百與進貸其不及而取其寸長凡某所以受知門下實出望外而觀傍者或亦驚眙而竊睨以為卒然之合一旦之頃容或如此久而覺其無有未必不悔且沮也某官不然及今顧遇有加移藩之日又辱以薦章衮字之寵捧受悚側内不自定竊惟知人可以觀德知於人可以觀士宗工鉅儒所蓄之厚所養之醇而與於一介足以見其不矜崇重富貴無一慊然而顧且鰓鰓若恐士之不足於我者足以見其不驕人之才凡其可取若精若粗無小無大皆納諸度内彼莫不以為厚已而繩尺高下自有定論又足以見其公而明故曰知人可以觀德老氏曰知我希則貴有所待而知者易窮汲汲乎其售者易䙝無所乎因而人自得之盡善而士之安意自重以待之實難故曰知於人可以觀士伏惟某官生勲業之裔躬鈞樞之貴文章政事高出人右方且與寒素之士相驁於名理著述之場所謂不矜不驕明而公者獨於某官見之其於人士尤不詭隨於今之習俗如臨當塗所舉十數皆所自知無一敢有挾而進雖進不受也而某之竒窮衰陋僻在下邑恥於自獻者豈能忘情於世蓋有待也相公一旦與之進不以俗吏見待而褒拂之辭特浮于實不知何從得之豈非亦以其不苟於進不輕於售世之所謂鈍而君子所當取耶凡某官知某人以為難某之受知人亦以為不易交足以觀之如某所陳矣然士之窮方其未知則其心莫不泰然自恃曰吾所有如此世孰知我及已知之則其心必且歉然自責曰彼知我者如何而我果何有耶人之情蓋如此今某受知不淺矣不知繼此果能以其所有推於世而宜適於用而不窮不貽門下羞耶此朝夕所自責者故某之此來非特為知己謝抑以質之高明期不貽他日羞也江湖長翁集巻二十五
