body:
  text: 江湖長翁集卷二十宋陳造撰七言絶句題傅商卿家壁二首表表兩卿吾莫逆青芻白飯玉為醅因循桑下成三宿解后花時更一來兩卿傅商卿龔澤卿也酒處清談燭下棋歸期初未厭遲遲若為徑作翩然去明日隂晴可得知時兒有訊初三日過華村豫以及曉先一日去題彭尉軒壁三首小軒肯許置琴書客邸僧垣總不如豈但郎君可棋酒舊便江水煮江魚甓社家居水四環房陵官舍秪重山客中一旦兼雙美山影江光袵席間軒成首作梅仙客再到園池更可觀日有脊令栖小樹時看鸂鷘下前灘題吳子隆兼隱二首盛吉低眉亦問囚不疑斷獄但春秋定知小試皮鞭罷却喚樵青薦茗甌元亮官居亦松菊次山生事有笭箵酒如欵乃聲中醉目向平反笑處青次韻張守仲思食車螯斥除介甲更加鞭雋永豐腴舊所便蟶弟蛤兄從倚市車公酒處信光前寄趙宰三首同趙子野吳子隆趙楊子登俯江樓小酌楊子以約客之北山先躍馬去急筆賦此俯江山水簷楹外壯觀風煙畫軸中詩客去留俱不惡緩搖吟轡倚天風猛士語難熊虎樣畫樓山立水雲間雄豪等作詩家助酒處吟箋莫放間北山何意阻清遊似為江山挽得留客未言歸君好事此盟端肯再尋不學宫諸生飲邀豫與子野同之三首同簉儒宫把一觴鹿鳴伐木奏深堂要防技癢論文地莫憶前宵放酒狂少日峨冠英俊場課餘觴詠共徜徉孰知薄宦江湖去頻夢爐亭餅飥香忍飢不嗅嗟來食強項從教俗子嗔乘間甘作不速客好事無非我輩人登俯江三絶趙宰增為四復次韻答之泛香樽俎飛雲上著色江山泚筆前乾鵲鳴鳩共晴晝長紅短緑各華年右追和流光何忍太忽忽一假清歡歘夢中賴是緘藏玉雪句老人他日苦頭風兩豪揮筆對江山怪底風蜚齒頰問雕虎未馴金索緊長鯨已鱠釣竿間兩夜北風吹石裂雪神驕蹇更淹留羇人坐歎肌生粟媚白妖紅耐此不東園北寺非無約瘦骨禁寒未敢前寄語驚風并急雪多情多感况中年贈相士潘翁二首平時鏡裏笑頭顱道我為官已近諛但遣餘年猶甲子不妨絳老尚泥塗翁謂豫頗夀涼涼寂寂不關天自詭詩窮五十年君比老夫癡又甚更教斫句當行纒題乾明寺壁用趙子野韻不待車輪四角生欲行還駐為交情又成一笑渌樽晚詩卷竹風相與清題柏氏壁二首二月二十七日客裏春光似許忙還家餘幾酒邊狂酴醾芍藥芳期在不問蕪菁滿意黃夢覺號呼攧鷂風忽驚膚粟似深冬凄涼斂白收紅後賴有春醪琥珀濃次梁教授見貽韻五首紅塵半世僅緋衫白首官曹兩換銜羞見淮鄉隱君子紫芝黃獨老嵌巖沐猴豈合纒章服野馬如今脫轡銜屈指悔來坡下路瘦笻隨客上巉巖誰向仙曹接勝談金泥天篆署氷銜如聞不惜蜚霞佩乞與耕莘與築巖藏室仙經玉作函一編當復翠鸞銜即今尚喜觀書眼月射清池電耀巖敝帚千篇漫手緘分無三字入官銜消磨不盡干雲氣時作長虹貫夜巖喜雨口號呈陳守伯固十二首旱風蟲孽久挻災好雨如今陸續來誰道天人不相與青章解挽帝心回共説邦君禱雨時䀌如疾痛切膚肌公心一片秋空月可但圓通大士知使君近請觀音祈雨未明出作夜深歸敢怨今年雨後時豈獨旱杷全好在晚秧不死尚堪移淮鄉散種日以旱杷醮壇初上水沉煙甓社龍公敢晏眠為建清泠三萬斛坐令翠密舞中田貨絶交通腹殷雷人家一雨便春臺即看商販接踵集已有米船銜尾來錢輕幣重病吾農未有竒方起困窮粗遣年豐官糴粟少令錢幣各通融使君手有垂雲帚虐魃妖螟掃不餘十頃飛蝗戴蛆死已濡銀筆為君書是夏凌塘飛蝗十頃許忽至人方憂懼繼皆抱草死一蛆食其腦癘疾流時囊探九羸癃十九得安全再煩起死回生手挽作山城大有年邦人苦旱日呻呼公比邦人更瘠臞賀雨歸來人競問邦君今日解顔無得句聊將頌作霖開樽亦復陋孤斟南亭舊約何時踐志喜從公更一吟嵗收粗足蟄飢雷不賴門生送酒杯坐遣將軍捫腹笑端知此惠有從來雨後郊原小杖藜行人相語各伸眉即今極目如雲稼曽是蝗蟲蓋地皮漫與與世端如上瀨船還家稍辦買山錢松風吹斷蓬瀛夢詩酒淋漓送暮年跋簡齋二帖夜光一百八十七簡齋三進劄共一百八十七字有底六丁忘下收密勿端知紫皇側鎮欀猶計子孫謀無題多譽庸非蠲忿草一謙良是辟兵符先生謦咳忘雞口俗子過逢動虎鬚陳君美許仲和赴省病不能出錢以二絶句修程快著祖生鞭勝日同乘李郭船自愧不能扶病去郭南亭上看登仙何人把酒送揚舲定復從容栁下亭共説歸時栁隂合與君衫色鬪青青春暖贈梅喜作二首晴日烘開粟玉葩懶隨霰雪送年華淮鄉地冷開雖晚竟是人間第一花手撚芳枝酹渌樽東君乃有發生恩即今省暖銅瓶水羅幕圍香共晏溫遊山陽十首豫於山陽似有宿契頻遊焉遊必久留丙戌正月以事再到成十詩觸事感懷隨得書之遂無倫次山陽城外艤舟初先問黃公舊酒壚空有向來觴詠意嵗華不貸白髭鬚邗溝帆席即長淮鬢未霜時慣往回絳縣老人今若此此生更復幾番來官池二十四鴛鴦錦綵爭鮮伴醉狂翡翠有兒知更好幾時飛到酒樽傍玳筵當日小紅裳珠壓雙丫十嵗強回首方知但青子胡琴聲裏怨茶商故人不復倒奚囊但有荒阡蔭白楊魂定可招吾得已試吟楚些命巫陽髙郎胸次著瀟湘亭枕城闉野趣長我欲亭西分一曲白鷗波外自嗚榔會看亭下水涵空菡蓞香中理釣筒北道主人吾有託不應獨饗北窗風多許金叉換好辭長巾短帊縷金泥老來詩力知何似細訪香羅驗舊題劉伶臺畔酹金巵寂寂荒丘帶晚暉今日先生不能飲婦言屏棄未為非熙臺楚觀小開樽老去登臨易斷魂蹀血龍荒平昔志即今搔首望中原招山陽髙徐二生飲二首梅花時節屢開樽欲贈梅花欠可人今日有人梅樣好遲君同賞雪中春欲作山隂興盡回良思與子共銜杯要須人境俱清絶好抱瑶琴踏雪來題因老松江煙雨圖二首逺峰近薄鑑中浮每泊行舟十日留雨望晴臨俱不惡最憐煙靄暝髙秋千里湖山宿霧昏倚欄一筆解平吞漁郎好在收綸罷想踞笭箵共一樽題因師百鴈圖二首蓼灘蘆渚好徜徉肯便雲天去作行未用選奴防夜燎不妨結伴傲晨霜聞道崔公作蘆鴈端如莊叟玩鯈魚騫翔唼喋妙百態君看老因槃薄餘題因師蒲桃圖二首因師寫物三昧手公取天機付筆端坐想瑛盤分磊磈憶嘗貝齒氷去聲草寒晶熒壓架紺珠圓苒蒻縈風露葉鮮病酒人方渴羌似為師開卷忍饞涎八月十二日夜偕客賞木犀八首氷蟾蜚下一天霜領略巖花旖旎香我亦小園清絶處與君同命醉為鄉謝蘭潘璧少年場玉麈金罍度夜央老子遽能忘此興且容投杖喚胡床朋來濟濟盡嘉賔飲興翩翩笑語真絶勝謫仙邀月醉當時和影秪三人露顆零空沍欲氷風姨收盡晚林聲金波冷浸山河影直為髙陽酒伴明衰懷對客便超然病骨枝梧勝去年未作槌腰摩腹想尚堪渌蟻翠蛾前客間那不笑翁癡酒處猶須古錦為不道詩成還玉雪聊慿一解桂娥頥人間雨恨更雲愁月殿仙娥替汝羞試酹此觴堅後約與人晴霽作中秋酒邊先起未須扶猶聽槌床擊唾壺風月撩人成不寢隔墻却擬應歌呼曉枕二首兩鴨驚鳴轉五更幽人宿酒未全醒小軒秪似孤舟上憶得霜湖帶夢聽銅九驚破將軍夢銀箭催登朝士車老朽布衾酣曉暖晨烏夜鶴莫愁豫書城北尼庵二首時觀諸公射小搖蛇影鳥驚墮已落背毛牛自如瞢欲分朋慙老病與渠甘作典籌舒諸郎弓力勝黃間中戟穿楊氣貌間樂府新傳朱鷺曲看君飛矢下隂山漏澤院四絶句偕羊統制三臧二孟射于漏澤園寺主置酒為賦雪翎如扇十鈞弓霹靂聲前玉斚空人似堵墻爭指似少年場裏著衰翁雋遊分破北窗眠笑撚吟髭看控弦久袖飛馳銀管手為渠塗改角弓篇將軍弓力今羊侃病渴歸來似長卿抹羽尚堪支十槊憶看銜尾餓鴟鳴粹公頗似廬山逺美酒還因我輩沽想得靜看豪飲罷一燈彌勒伴跏趺題墳庵壁四首糊口卑官似不逢解將觴詠當千鍾劣優何似隆中叟投老歸來作卧龍損益才通理洞明不應知死異知生惜無人把宣尼語説似當年尚子平鍾鳴已飯尚來遊竹好排門不待求爭席饋漿吾不計此身滄海信虛舟寂寞江湖吏隱翁平生純默養胸中即今技癢餘詩癖時昡晴霄作綵虹東莊小留四首南陂荒茀已成圍北墅田租頗應期兩地徑規槃薄地小為庵屋大為池夾溝欲插栁千株繞舍先營五畝蔬供爨禦冬須次第西歸新得務農書是書得之歸州親朋樽爼日周旋無恨歡情到酒邊底許擠排作尊客秪令撫已歎衰年接屋連墻翠密中炊香羮玉飽過從人將逋客為同社地與斜川作附庸雨中題柏氏壁二首行尋詰屈躡﨑嶇已謝鄰翁果下駒北走松楸無數里杖藜筋力尚枝梧蘇端頗慣招新客御叔何煩訝聖人未用平章舊新雨一樽聊喜對情親次韻楊宰愛竹看竹排門愛靚深青青不受雪霜侵誰知倦客幽尋去老越風波亦此心次韻楊宰思庭竹數尋脆碧裊輕隂嵗不知寒暑不侵屬厭吟風仍嘯雨盡收縣解入琴心寄郢州崔守八首陽關聲斷酒杯殘昨夢回思變暑寒七見蟾蜍作圓缺四馮鱗羽問平安嘗記停驂古郢州待晴曽是賈胡留錦囊亦有陽春句不得親題白雪樓時以雨且忽忽不曽登白雪樓楚郢繁雄亞上都莫愁風韻未應殊小園依舊深紅色曽辱遨頭載酒無碧香當日薦金船桑落宜城不直錢一自黃堂沉醉後至今追憶尚流涎是時黃堂留飲次日酒甚佳自釀云别乘修程驥騄馳書來猶肯記衰遲每思膠漆班荆地敢忘風波在莒時同黃倅舟行之官共經風波之畏雍郎髙韻似文同水墨仍參二米風解搴山川歸短幅可能陸續寄來鴻將軍競病舊能詩黃絹于今玩色絲何日酒兵鏖筆陳未應羽檄諗交綏牙板聲中斂翠眉時應歌我遣懷詞豈知薄宦飄零去無復風情似舊時送吳子隆節推之官信州五首人生窮達後愚賢宦路何妨小著鞭三釡吾今嗟弗洎奉親東下羡登仙行行幕府泛蓮初井井官曹遊刃餘當路急賢飢渴似不須銜袖子公書共把離杯栁影邊栁枝如線拂歸船枝枝似恨人輕别顰不成眠更可憐幕中婉畫得斯人郡政應從到日新銀礦金苗休刺口秪將耕稼富州民連城照乘動分珍他日詞壇著散人詩筆有神官有暇楚鱗燕翼要頻頻次程平叔韻二首戍三月二十日南徐水教陪程同年登金山繼遊西園置酒程有詩次韻故人常嘆别時長一笑眉開色便黃領略西園好風景慿君更喚郭汾陽同年折簡郭統制詩情對景可勝長酒與鵝兒鬪嫩黃忠貫主人真好事肯來訾省沈東陽郭侯即時至郭有堂名忠貫閲水教次前韻戈船干柂截江長殺氣氛昏日氣黃江畔詩翁泚椽筆射蛟無復羡樅陽程言聚散有感次前韻不須勸醉翠眉長莫問何時腰下黃賸喜相逢各強健免教聞笛賦山陽羣芳圍坐引杯長滿目深紅間淺黃寄語東君好憐客水西花外慢頽陽垂栁搖絲千尺長栁隂深處轉鸝黃把杯借聽歌聲醉絶勝酸寒尉溧陽步趂遊人歡意長誰交鶯燕強雌黃憑欄凝佇多佳麗底羡簪花醉洛陽再次韻平叔吾南道主人酒處吟詩遂成巨軸後章褒豫太過作詩謝之掉鞅詞場缺寸長端如䇿蹇趂蜚黃彌明小貸凌侯喜太白猶堪客紫陽六一作李白詩乘雲紫陽家微風不放浪紋長噞暖跳魚三尺黃秪欠髙荷護千襪醉粧濃艷媚斜陽再次韻程同年之子與豫孫㦿侍側不應詩不及之用韻二子峨冠共我長即看紫綬映銀黃不須握手論家譜更舉宣尼與伯陽用孔融事次韻贈郭侯郭侯智勇兩俱長驛騎何時詔檢黃闕看君萬旅出漁陽侯拉客歸置飲再次韻將軍恩意為誰長酒未闌殘日腳黃儻有春風四絃手真成留客醉潯陽趙通判有詩次韻二首霍闕無短似無長驚見新詩寫硬黃魚在九淵終玉食世間濡足羡浮陽趙宗室詩後出短歌對酒不能長猶勝車塵撲面黃我自關門寶崇鼎從渠晞價尚咸陽吟詩自笑用前韻文字光騰萬丈長錦官老杜豫章黃投荒忍死經人鮓討飯充腸上嶽陽南昌詩我雖窮至骨猶勝杜陵老憶昔上嶽陽一飯從人討退歸我欲學真長君定才名江夏黃考父舊嘗晞吉甫陵陽端的嗣黔陽病起二首老去難堪痼疾纒支離甘受衆人憐出門定被將迎困緊閉風窗聽雨眠舞席歌筵自闊疏麴生久送絶交書平生嗜好消磨盡留得枯棋了索居口號十首呈程殿撰白璧明璣每墮前續貂輒復聳雙肩一從歸作漳濵卧不寄詩筒恰五年歡意長隨夜漏長隆寬盡貸酒邉狂東歸秪有南窗夢夜夜掀髯錦瑟傍八月襄城暑始回水仙爭趂玉梅開當時二物知天意共報公家福鼎來芳信飛來自月宫月中桂茂劣能容素娥封殖非無意準擬公家不盡供福地常披十幅圖仙翁隱處玉為壺九華山側雙峰下還許儂分半席無郎君衮繡照鴛行詩老時須住帝鄉即見翹材闢新館預應緑野敞深堂公家昆季盡時賢叔也驊騮擬度前書諗親庭先靜退至今文采照林泉童顔緩緩閲莊靈鬢影青青表帝庭後四六年同此夜台星光映老人星故人折栁送東轅不羡當年李郭船囊錦鴟夷有供給自疑身是御風仙帝所鄉關等是家奚囊納納盡天葩西湖久待公題品莫遣波神妬九華題史髯詞卷二首方朔嵗星仍客星竊桃他日太狂生幾時又泛靈槎去平掇天孫翠織成南風未蟄浙江波倦客間愁似許多安得雙鬟如阿素紅檀聲裏釂金荷贈包道二首靈應庵呂公齋包公留飯作吟風嘯月是真常何處無何更有鄉我與吕仙俱不死靜看烏免幻炎涼何妨塵外却塵中風舞寒漪月印空洗鉢與渠同一飽未憂交臂失回公暮春泛西湖次口號韻呈程待制十首客舟日日野芳前鶗鴂鳴時始息肩無絮可漂花可藉良辰樂事屬明年湖山引興尚能長小貸詩愁放酒狂蝴蝶應憐落春後無聊時近緑樽傍重到西湖可便回前年待得水芝開慿君問取間鷗鷺親見跳珠濺客來幾飯南山佛老宫詩昌談勝每舂容不妨重就山間宿蔬筍香茶未闕供何須履道寫新圖不用悲歌缺唾壺巖壑清竒皆我有利名韁鎖向來無老來已謝著書忙但向清遊訪睡鄉寄語深師與包叟可無客枕假雲堂深醫僧包知堂道人豫與之熟行行撫事念前賢修竹祠西碧嶂前不復船歸下雙鶴空緣酒渴酌寒泉已規觴詠了餘齡徑自無何到大庭左界何人與調護酒星移近少微星矲矮欄干錦繡筵欄邉仍泊女郎船憑欄笑指元真子不是詩仙是酒仙詩到雙峰自一家紛綸仙卉雜天葩幾時共載西湖去千紙看公寫物華題濟勝七物一拄杖驚蛇却大破莓苔笻竹隨公幾往回龍化葛陂應未忍為扶衰病作陳雷二扇何人月樣剪霜綈改就新詩却自題為惜持杯折花手免教遮日步蘇堤三錢篋與人替得杖頭間日日蓮塘栁岸邉爛醉質衣吾不問歸時猶有買舟錢四筆囊毛錐老去未輕投革帶羅囊特命收準擬西湖持酒處偕翁濡首破詩愁五酒榼相從有命每傾舒不寄轅端即坐隅肯落蘇家慳婦手深藏云待不時須六釘鞋幾步山間屬雨餘徐行猶可當安輿計功髙出芒鞋上傍險衝泥得屢書七村童貌野言傖却近真客前疏略不能嗔折花替我簪紗帽看竹須渠問主人題史髯詩卷後二首平生一士萬金多更恨詩人餓澗薖羇旅忽成開笑口軟紅塵底得隂何腦脂侵眼耐昏眵詩卷猶便小字題浪信竒方須損讀即今刮膜勝金篦寄題髙賔王詩後卷韶頀充庭簉漢官鋪紓宏偉歎才難髙郎袖有如椽筆却伴秋蟲弔夜寒泛湖十絶句道終日歡意荷面跳珠小濺衣酒邉團扇已停揮濕雲收盡人間暑却度西山載雨歸浦溆樓臺逺近殊樽罍隨處小踟蹰髙郎頗勝髙常侍解把西湖敵孟諸銀筆曽煩贊此君即今墨色儼如新因君細數登龍日十九年前入幕賔豫昔掌教吳門與劉東玉提幹同官十五年矣其子收豫詩二首蓋與東玉唱和墨竹也嫩緑搖漪紅藕香雨膏煙膩午供涼西湖到眼真西子莫信溫柔别有鄉桃葉相逢但交臂李鬟何許費凝眸爾曹豈解文字飲應道吾儕輸此籌酒邉涼意雨餘生望夜重期看月明安得水仙會事發巧隨人意作隂晴是日隂涼再約望夜泛湖底許行庖旋不空小舟如織浪花中盤珍爼實隨供給亦有紅衣載短蓬尋得詩人到醉鄉銀壺玉麈倍增光小囊賦就鴛鴦錦一路荷花别樣香玉人罷浴試梅粧詩客揮毫落夜光因病覆觴今破戒為渠豪飲為君狂樓前行客競昻頭樓上齊聲唱石州衮遍實催猶未徹暑風晴月各新秋次韻趙帥二首天公一笑晚雲殘戲與璇穹貼白團試問天風搖翠袖玉肌何似玉笙寒妓臺香裏漏聲殘金步搖歌閙作團羯鼓更催銀字管等間驚破一天寒又次看字韻二首誰扶璧月上天端雪魄揚輝桂影寒照見羣仙擁仙伯嫦娥定復轉頭看明年屈指春來早定是元宵不苦寒十里珠簾火城夜客來應許醉中看帥侍有元宵約故云陳總管坐上贈寫竹妓二首徑節蒼梢筆底寒一天風雪與堅頑回思擁扇賔筵見却為嬌嬈一破顔此君寫影道機熟猶記涪翁詫子舟誰信紅衣萬鈞筆擬分此𣲖嗣湖州十五夜再次趙帥韻嘉賔飲興未闌殘却倩纎纎奉雪團一笑舉杯邀月姊為渠聊貸廣寒寒贈琴妓二首夢中曽揖蔡文姬焦尾親傳半夜衣莫向詩人彈别鵠免煩衰泪對君揮千紙爭傳戞玉詞一庭渾卧借書瓻從今有問新知識徑説江城女項斯次趙帥喜雪韻府公憂國雪神知三白呈祥不待祈舊嵗新年多樂事一時分付筆如飛次魏知元韻三首客中把酒挹江山更藉詩人為解顔自是交遊十年舊向來相得立談間魏郎日共無喧酒舊學新詩得細論可見髙情重離别又同一舸宿煙村江城半月從遊樂别去知君剩有詩相望置郵三舍便幸能時寄慰相思次薑堯章餞徐南卿韻二首薑郎未仕不求田倚賴生涯九萬箋稛載珠璣肯分我北關當有合肥船風調心期契鑰同誰教社燕辟秋鴻莫年孤陋仍漂泊可得斯人慰眼中又次銛朴翁韻四首僧床正聼曉樓鐘客棹方占上水風喧靜未須岐出處與渠心事各冥鴻聞為詩魔掩貝多辭源衮衮倒洪河遙知傳誦日千紙淇上髙唐無善歌婪酣貴宦鮫綃帳贔屭功名泊浪沙誰似朴翁隨分過曹溪水煮趙州茶幾向西湖艤畫橈氷奩儼受衆峰朝即今去鴈將清夢飛下長橋更短橋次史髯韻二首痛憶分題把酒時暑寒誰遣隙駒馳芙蓉風露梅花月又費騷人幾首詩已誤西湖鷗鷺約客舟西上更徘徊故人益嘆天涯逺懷抱何從得好開又次韻二首愁為離羣老不禁詩來深得故人心自摩病眼添沈炷滿紙晶熒玩碎金向來湖上扶攜醉醉裏清吟雜雨聲此去淮西望京國詩邉酒處若為情次韻趙帥蠟梅窗底間尋斷續香貼金誰此憩風裳漢姬懶赴昭陽燕宫額塗成却覆觴寄趙帥三首揚州燈火萬家春誰著詩翁寂寞濵舊臘新年無好況何須更問紫姑神銀鈎滿紙墮荆扉樂事如今與願違撫已可憐多病過憶公深愧食言肥先生列館似翹材慣見瓊筵為客開夜夜元宵日寒食一春儘可厠鄒枚再次韻趙帥見寄三首枝撑強趂火城春蹤迹猶煩問水濵更醉南州好紅紫凝香詩伯是花神前歡已悔東隅失後約如前敢再違連夜揚州昔年夢小梅清瘦杏花肥倐晴驟雨寒猶在約勒羣芳未盡開銷得燕堂千杖鼓旋看錦纈褁條枚題杜彥敷山茶丹艷濃粧媚晏溫誰招妃子醉時魂此花信出此君下那有詩人來叩門次趙帥韻三首眼眩如看九色霞女膚側理字棲鴉挽回春事憑詩力留住風林欲褪花遊人笑語問朝霞處處相隨攫肉鴉上冡歸來更乘興醉依栁影藉梨花詩仙催客共流霞不待髙城噪晚鴉好競春光醉良夜即今庭院已飛花次韻趙帥寒食四首瘦島寒郊秪外臣先生俊逸更清新勸耕小出仍寒食賸辦新詩報答春是年寒食勸農日佩詩囊侍貴臣向人肯作白頭新自今歌酒追隨去猶有風煙一半春得詩乃二月望散吏容陪漢鼎臣隆隆恩意為誰新重來畫戟凝香地爛醉瓊枝璧月春昨夕帥出家姬痛飲夜雨勾芒正主臣晴雲暖靄曉來新小軿徑趂遨頭去共醉郊園爛熳春次韻趙帥平山已自勝超然況復鶯花二月天管領鶯花屬仙伯不應草草賦歸田十絶句寄趙帥栁堤隂裏放船開識面人家首屢回莫訝春陽浮大宅新陪詩伯唱酬來一片飛花到客襟當時便有惜春心即今歸路慵擡眼紅影雕疏緑影深欵陪仙伯燕池亭不但新詩老眼明鼓吹激天飛鳥墮旌幢點水睡龍驚金田碧野把杯前飛騎鳴弰簉玳筵五百年來逢此樂府公今續謫仙絃豪竹哀絲薦玉觴羽衣仙袂儼分行􅋳顔一為東君笑媚白妖紅不敢芳醉中記得新翻譜土苴梁州笑石州火急歸來傳好事為渠一洗世間愁從公日日醉中歸插鬢長分最好枝舊約何如趂新約浪言燈夕勝花時子駿福星方久照漁陽竹馬省相迎他時薤水休重問市虎晨羊各用情訟户無聲日燕間驅馳風月笑談間自今玉海添新集與繼當年大小山每上平山把酒巵海鴻泉驥滿烏絲風流人物詩書帥萬字千鍾更屬誰次韻趙帥五首趙送牡丹瓊花露見招平時花酒費詩催塊坐愁城誰為開六輩妖姬十從事先生親遣斬關來前知紅藥翻階處别許金腰一朵開名在金甌花會得即看飛詔下天來一昨波光修禊事賔奩俯枕玉奩開重遊鷗鷺應偷眼定記曽陪杖屨來紅藥主人修月手渌樽許為故人開肯教客子如王式一聽驪駒却悔來南遊可待再書催芍藥酴醾陸續開看自花開到花落紅蕖時候却歸來江湖長翁集卷二十
