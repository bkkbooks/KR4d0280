body:
  text: 江湖長翁集卷四十宋陳造撰致語天申節致語神策告符介親齡於八􅐆電樞表慶衍聖夀於萬年藹佳氣之鬱䓤翕輿情而呼舞元功天運盛德日新躬攬權綱奄神器而再造堵安區域如泰山而四維武庫櫜弓靈臺偃伯垂裳三紀黃屋非帝堯之心脫屣萬機赤水訪有熊之道範圍一化粳粃百王揭日月而行寶册嚴號榮之奉偕乾坤之久玉巵介戩榖之新屬當夢日之期均錫需雲之燕既醉之備五福恍如建德之遊難老而雕三光咸罄華封之祝某等云云遐想雲璈奏未央璇輿金籙慶生商九光霞裏停仙仗萬嵗聲中奉帝觴天上劈麟供樂事人間舞鳳侈恩光小臣願效華封祝試頌靈椿夀聖皇對廳電繞虹流式紀生商之旦鴛羣鷺序均霑燕鎬之恩羃佳氣於堂皇沸歡聲於絲竹恭惟某官璇源襲慶玉壘分符亟沉榆塞之烽復最甘泉之課詩價萬選家傳賀白之文章帝閽九重屏記龔黃之姓字人近晉卿之冬日訟銷京兆之缿筒森畫戟而凝清香居惟多暇入黃扉而升紫闥其始於今適偕聫事之羣英共醉鈞天之廣樂某等云云黃堂緑影轉槐龍錦繡圍中度好風珠履相輝人峙玉金壘更勸酒如空逢辰正自千齡會勝日何妨一醉同來嵗從公話今日鈞天應簉未央宫王母致語渚虹告符萬世特遇大聖神策錫羡非天私我有邦言辭少廣之居來獻長生之籙恭惟睿聰稽古信順尚賢挺謨斷以有為武功底定闢乾坤而再造文德誕敷偃伯靈臺沉烽邊瑣脫屣萬乘心偕造物而與之遊冠德百王道長上古而不為老備聖子神孫之色養新玉巵寶册之號榮長贏紀夢日之祥中外效後天之祝翠水雖弱水之隔駟青鳳以非遙仙人為聖人而來獻碧桃而敢後肆陳善頌用贊殊休丙度丁躔占一星而有煥天覆地載綿萬祀以無疆於樂聖時可無口號曽燕瑶池到世間祝堯今復馭青鸞衆真已送駢蕃瑞萬國同瞻咫尺顔聖統有傳尊北極帝齡無盡等南山兒家幾許蟠桃熟凖擬年年薦露盤對廳嵩呼萬嵗巳欽祝於堯齡花覆千官復均歡於鎬燕歌白雲而來下款黃堂而小留恭惟某官仙府上才皇家碩德韞通儒之業蚤收甲乙之科歌樂職之詩誕布中和之政農桑千里襦袴一時綵服娛親居奉平反之笑紫泥封詔佇歸清切之班儀鸞坡鳳掖以蜚英俾鷺序鴛羣之連茹喜鈞天之分帝樂既洽清歡雖弱水之隔仙居來陳善頌可無口號用奉台顔緑輿初下玉龜山小駐黃堂相府蓮上客居多天下士主人況自地行仙九光霞裏聞談笑三素雲中度管絃來嵗日邊桃薦碧帝觴應共醉鈞天平江府天申節致語地闢天開啓重熙之景運虹流電繞逢載夙之休辰孰非建德之遊共上華封之祝健符乾運中合離明把握神機奄皇圗而再造輯寧大寶如泰山而四維道妙莫名功成不有納虞舜於大麓蓋嘗與天為徒訪蒲衣於姑山豈曰以位為樂傲睨物表真遊象先聖子神孫儼天臨於備奉玉巵寶册當嵗講於祲容屬兹夢日之期庸效後天之頌恭惟心傳精一運繼聖明行曾閔之所難若文武之共處躬撫皇業踵慶厯嘉祐之隆志養慈闈奄大安興慶之禮奉帝觴於漢柏介親夀於莊椿歡洽兩宫慶流九宇某等云云劈麟侑酒紫皇家降乙開祥寶祚賖又見仙真奉瑶檢從教日月數金沙星明丙極方呈瑞燕敞需雲共拜嘉睿算的知天與久大椿何必問南華王母致語祥開夢日喜切望雲南極星躔巳見老人之瑞西方仙窟敢安少廣之居按飈馭以小留望宸廷而獻頌聰明作后遹駿有聲載戢干戈享帝王不戰之福兼愛夷夏儷祖宗勝殘之仁動則神謀靜惟淵默赤符啓運奠神器於覆盂黃屋非心視天下如脫屣據位之貴為天子父體道之妙與造物遊修身乃普乃豐得一以正大德得名得位於萬斯年豈惟嵩嶽之三呼將見蟠桃之再熟恭惟繼堯接統法舜事親色難躬五日之朝備奉極四海之富屬長日離明之旦慶慈闈震夙之期造金殿以陳儀奉玉巵而介夀事光千古歡浹兩宫妾企慕華風雖曰隔三萬里之弱水祝延睿算可不指八千嵗之大椿矯首皇居願陳口號天仗凌晨拱未央君王親奉紫霞觴社鳴當紀乾坤闢策授端知日月長為祝堯齡辭翠水間留羲馭頓扶桑兒家不上千秋鑒自摘蟠桃夀聖皇通衢致語仙佛珤香巳上萬年之祝君臣慶會旋羞九獻之儀雖分侯服之區均拜帝觴之賜奔趨萬室誦詠一詞某官學冠時髦道窺聖閫射宸廷之䇿諸公推荀況之文登使者之車一旦展范滂之志清濁激揚御以儒術愷悌慈祥今之吏師才用具宜身獨兼於三組政聲藹著名已徹於九重倚須下芝檢於日邊即看綴仙曹於雲際屬生商之華旦為燕鎬之主人都騎如雲旋指凝香之地歡聲載路孰非誦德之民敢採公言上陳口號清微風動萬年枝瑞紀流虹誕聖時天上玉巵山比夀侯邦錦席酒如池滿城淑氣生英蕩夾道歡聲度綵旗來嵗望公天仗側尚應回首記吳兒趙守燕王漕致語煙霏夕霽已瞻漢使之星色笑春溫復近晉卿之日爰追勝踐有秩初筵答氓俗之具依翕歡謡之載路恭惟某官爽邦哲輔名世巨儒汲直素風肅具臣而知畏樂天麗句播異域以爭傳中裨宰席之嘉猷屢上計臺之最課席前賈傅佇還清切之班轡攬范滂再展按澄之志屬城畏愛百吏傾瞻今者稽玉節於修塗踵文遊之故事迂臨觴豆用慰吏民某官麟趾標竒熊轓效職昔襦今袴騰萬口之歡呼賣劍買牛勤三時之勸課屬行臺之按轡駐支郡以攽春喜同千里之民共敘二天之庇壺天動色錦席增輝藹香霧於簾旌泛光風於談麈金罍玉斚不妨舉白以更酬鼇禁鳳池行看汗青之儷美某云云二天依德幸吾州四牡徐驅得小留勝日非煙浮綺席異時盛事繼文遊春還蓓蕾生談笑香泛叵羅賸獻酬來嵗鳳池雙立玉應從丹地話秦郵鹿鳴宴致語鶚牘登名庸餞觀光之客鹿鳴侑酒式將勸駕之誠挽春意於壺天圍香風於錦席初筵有秩樂事可涯恭惟某官名世巨儒爽邦哲輔陳陳胸次富人間未見之書表表朝端罄古者格心之業帝眷股肱之郡時須心腹之臣布條教之尚新翕歌謳之載路刺史承流宣化俾里閭均躋域之仁上臣事君以人必俊造首充庭之賦惟姑蘇之名郡據浙水之上遊物阜民蕃地靈人傑文風比屋尚白樂天韋應物之餘名教百年儼范文正胡安定之舊雖再占褎然之選方競蜚作者之聲矧海潮尚過於維亭而魁宿未離於吳分佇異人之輩出副明詔之旁求諸省元杞梓國材圭璋廟器萬軸飽藏於腹笥一第視摘於頷髭志嘉會之功名傾當年之意氣穿天心而摛藻棘闈已壓於諸儒培風背以論程桂籍行題於千佛肇賢侯之饋食侈芳宴以盍簪紅袖回環淥樽泛灩德星初聚密聫使者之星愛日焉依旋指長安之日萃一時之盛事佐羣雋之壯圗正此均歡豈應惜醉某等云云黃堂賔宴霧香浮峙玉時髦得意秋莊海長風吹怒翼禹門驚浪化吞舟黃生眉宇看輝映渌漲瑶杯賸獻酬來嵗歸時君記取恩袍成行擁龍頭石湖生日致語槐籠非霧紀楚客之庚寅椿演遐年笑絳人之甲子方夏日薰風之可愛況良辰樂事之遂并有秩初筵將陳善頌某官才挺王佐德優帝師聖神倚注於謀謨夷夏想聞於風采挈提道統退之得孟氏之傳秉執國鈞晉公乃汾陽之比不待年華之老去徑收朝迹以歸來寧鳥獸之亂行幾漁樵之爭席久矣斷日邊之夢翛然作地行之仙燕坐垂車人間著小有之洞時登天鏡物外訪無何之鄉儒墨兩忘古今一吷宿疴雪靜不寬沈約之帶圍吟興風生已破後山之詩戒適周翰降神於嵩嶽正夀星映色於台符坐上團欒有脊令之接影眼中秀整森蘭玉之在庭㪺瓊液以更酬駢雲璈之競奏修齡未艾爛醉何辭豈惟嗣魯侯難老之詩抑已受金母長生之籙會逢薊子記金狄之摩挲更向麻姑話蓬萊之清淺某等云云夀筵髙敞老仙家簾影中間五色霞碧酒舊須麟作脯雕盤新薦棗如瓜玉壺縹眇非塵世金狄依稀記嵗華勝日年年欹醉帽鬢香長點吉雲花神仙傳吉雲花千嵗開一枝定海縣廳事落成致語七夕除聽政之地夏屋崇成盍同寮之簪佳辰小集載新偉觀用肅初筵知縣優趙魏老而簡朴有餘領邾莒邦而拙勤不補新收舊管苦百孔而千瘡上雨旁風幾一夕而三徙有不得已而拔貧營建豈自意全而其事迄成撫已猶驚向日抱壓焉之懼舉觴相屬今親賡勞者之歌追揆䇿之云初信此歡之難得而況牽牛織女方河畔之佳期綵舫珠樓紛樽前之雅戲受涼颸於南廡延纎月於西廂合鼓吹於兩畨伊涼迭奏粲綺羅之雙列笑語生香是為四并猶重一醉嘉二三君子肯來偕酬酢以忘勞閲五十嵗華當有想風流而嗣響兒等云云翬飛華屋酒如池賔主風流況一時千杖敲春瓊斚滑九霞搖晚舞衫僛輕颸泛座漂香逺纎月窺人轉影遲牛女多情應羡客瓜華適已罥珠絲廳事落成致語前以禱雨罷會中秋再作供簿書之日課暇擇華居敞棟宇以翬飛遂償初願甚欲舉落成之酒時方從愍旱之祠逮百榖之登場得一樽之聚首知縣老猶沉於俗吏號盍拜於散人寧躬補拙之勤不尚濟寬之猛苦官居之久弊冀廳事之一新聽里詠塗歌之情方安朴直舉銖積寸纍之計作意經營功乃即於優遊民不聞於怨讟念規模創造之日皆寮友贊佐之謀勢可支於百齡貧猶堪於一醉屬者棧羊釃酒計日佳招端如澀雨慳風妨人行樂未辭故事重舉佳辰風露中秋孰與初秋之蒸鬱里閭樂嵗復無望嵗之憂虞按小鬟之新翻訪歸妓之前事豈獨延笑談而卜夜抑將祛塵鄙以生春某等云云向晚簾櫳上玉鈎縣人應指小瀛洲龍蘭煙外調宫羽羅綺香中擁獻酬百祀規模新壯麗一時文武極風流月明鼓吹煩重賦終恐清新愧少遊房州到任交倅事筵致語斗城從仕綽有賢規樽酒邀歡尚餘春事寧四并之易得幸一笑之與同交代一代吏師諸儒宗匠蟠胸籖軸出月脅以摛華唾手桂枝近龍頭而中雋掉臂謝十洲之客題輿觀九室之春周舉風規望素傾於諸彥弱翁治行名已在於九重小稽入覲之行顧重交承之好通判詩書玩意科第起家鷁影西來山郡平分於風月龜章親授心期密奏於塤箎爰申樽爼之娛庸締金蘭之契雖新舊官之胥晤祗副簡書然先後覺之相資孰非民事某云云平時風義等肩差況此周旋别乘衙湛渌徐傾卜夜酒欹紅同插殿春花成規燦備堪從事殊渥便蕃定拜嘉爛醉長吟答佳致不妨賔主各詩家到任交權州事筵致語攝佩郡章復締後先之契備嚴燕豆洊交款曲之歡欣樂事之不違肅初筵而有秩交代吏能義槩交信諸臺里詠塗歌逺周千里頃蕃星之一晦兼郡紱以雙紆佐二著稱碑手可捨皇甫湜顯幽交感麥舟迄濟石曼卿郡付倅真建屋之瓴惠洽民果添花之錦將隨鶚牘歸覲龍顔嘉與遐邇之民同申攀戀之悃權郡不辭逺官來繼芳塵盡承參輔之規模併受中和之條教官聫必副豈越爼代庖云然軌躅善遵亦因雲灑潤之謂言勸沖霄之駕共蜚介夀之觴階藥翻紅筆判花而有兆瑶杯舉白山頽玉以何辭某等云云假印侯封付繼承教條久已洽山城政成何異徴黃霸日接寧惟拜水衡春酒入杯紅浪漲晚花薦座靚粧明良辰便合同沉醉且置陽關疊後聲待衆官致語漂天涯之風梗同仕遐陬盍公外之朋簪庸追樂事適夏日舒長之可愛况蘇天愷悌之焉依念同寮裨贊之多而從事賢勞之久式陳嘉旨庸諗悰懷通判朝奉少䇿足於儒科晚究心於吏事芹宫花縣偶不致於曠瘝倅駕郡符兹併加於疲朽蚊負山而良懼鳥假翼以能髙幸仁賢此地之會逢故官府一時之振整傾肝瀝膽逮無不盡之餘情補劓息黥用使苟安於厥職爰因多暇聊共一歡文武寮契夙夜在公靖共爾位確持至正之論能大所居之官率自吏良而政平底此塗歌而里詠秋田茨委釜食四以尚餘夏隴雲黃麥懷三而既實正用及時而行樂孰云須酒以消憂艷歌濃笑之前陳談塵吟箋之未憗風解愠而醒醉有不勝清露未晞而詠歸徑當浮白某等聖朝末藝樂部下陳上承歡顔敢獻韻語公堂錦繡映簪紳不著人間一點塵地窄尚堪紅袖舉情孚那復白頭新蔗漿玉醴壺天晚翠蓋紅巾暑月春況是山城無一事醉鄉賔主屬吾人又帝闕九關憑寸誠而昭達山城萬室歘一雨之滂流齋壇實自於同寅嵗事繼今而有望爰申燕喜庸滌憂勞眷此房陵實聫荆部民散居於巖險田僅列於下中頻年多稼未見有餘十日不雨旋已告病矧今仲夏正當耕耨以廑身未極亢陽已復怨咨之盈耳式偕寮友虔致禬禳商羊倐舞於中逵旱魃遽沈於九地油然作霈然下稼事有涯瘖而鳴痿而行人情可見眷爾俗春臺之涵泳宜自公樽酒之招擕雲野臥黃定不憂於害馬瑶觴漲渌當先酹於睡龍度涼吹於簾旌凝行雲於扇影相與色笑喜雨有志於民孰為主賔既醉並受其福某等名叨樂部躬逢玳筵敢寫歡心聿陳善頌爐熏抽蕙裊髙寒列宿低光近醮壇夜屋忽驚簷溜響曉畦旋放桔橰間政須酬酢乘多暇況間憂虞取一歡投轄孟公留客意應拌月路醉扶還喜雨燕致語一雨應祈三農胥慶謳歌洋溢時和爰底於嵗豐官府靖間吏安實由於民樂已保無奪糈之慮庸少踐飲醇之盟念官路之飄零同官曹於窮僻農功就緒終蓄積之不餘稼事或愆豈怨咨之能免有底戾氣扇為常暘醮席龍壇再三懇禱西巖南洞萬一感通賴兩儀生物之私拜三日為霖之賜尚晚秧之可蒔况早穄之全收人皆較新故之年榖當有倍蓰之獲靡愛牲靡不舉孰云自古之徒然不曰旱不為災當復大書而示後惟時寮友從事禜雩動齋素之踰旬無奔馳之虛日逮兹如願可後嘉招日轉槐隂此歡未艾月銜桂魄不醉無歸某等謬厠樂工仰承燕豆敢陳口號上奉台顔華筵楚楚為誰開和氣融融逐雨回飲處偕酬未央樂旱餘新紀不為災詩成肯放庭隂轉舞困何妨羯鼓催聽取邦人歌笑地山城幾處不春臺交割州事致語心期所契寧惟甲子之同郡計與聞載穆塤箎之奏一笑超形骸之表多儀肅樽爼之陳庸諗清歡可孤樂事某官異才名世正學傳家相門綽有於典刑仕版翕推於模楷仁風義槩粲荆玉之無瑕朝譽民庸信陽春之有腳推他日平反之手賡遐陬宣布之歌旋聞暖席之初亟聽登臺之告清風八詠真俯視於隱侯平步三公即延登於黃霸通判朝奉並辭澤國來仕楚郊素懷事賢友仁之私被借宣化承流之潤顧熊轓委重堅有過陳雷之膠雖鶴髮相輝聫猶是嶽湛之璧爰陳燕豆用肅賔歡化國之日舒長矧兹樂土君子有酒多旨徑指醉鄉桂香浮壁月之秋粧面炫氷壺之晝陪遨頭之賢守猶詫獨醒後鯨背之仙人當無此樂某等仰承玳席忝預伶官聊寫衷懷敢陳口號一時律吕韻金絲用播中和樂職詩所喜玳筵重啓日還當璧月再圎時前月十六日燕伊涼聒夜鏗千杖蘭蕙回春艷十眉明月酒醒還得句東遊夸與大堤兒十四日宴來日往襄陽宴新守致語浙水淮山吻風期之不隔隼輿泥軾同山郡之來遊已諧聫事之歡偶締合符之契佳哉樂事秩此初筵恭惟判府寺正擢秀相門蜚英仕路筆端亹亹鄙時流纎艷之文胸次陳陳儼祖武經綸之業小謝承明之直暫分刺史之符竹馬爭迎豈容暖席金鼇髙步行復升華通判朝奉儒術起家州麾二政興孫秦之後力追躡於典刑厠召杜之旁更平分於風月兼屬印章之授受可孤樽爼之勸酬笑語生春倐雲頭之閣雨笙歌聒夜溢簾額之漂香少答輿情共拌沉醉某等叨居樂籍仰奉綺筵不揆疏蕪聊陳口號相門賢裔聖門儒錦席葩羅慶合符天斂沉隂輸瑞靄月銜清影照氷壺鸞膠密應鏘金奏麟脯何妨薦玉腴聞道山城觀盛事一時歌舞溢通衢任滿交割倅事致語題輿支郡聿觀條教之新設醴芳辰庸締子孫之契亶為勝踐有肅初筵某官髙視時賢優繩祖武諸公鶚薦手已種潘縣之花萬里鵬程符尚佐漢廷之竹仁聲所暨春意交孚某官百舍效官二年撫俗塗歌里詠尚前人不擾之風吏政民庸踵古者告新之義一樽於樂四美云并妙舞清歌試新翻於北里嘉肴旨酒判聫步於醉鄉某等云云黃堂氷峙兩飛仙不遣纎塵到繡筵龍麝香中揮玉塵蕙蘭叢裏釂金船即今别乘符初合佇看丹墀璧再聫來嵗涼颸生殿閣帝觴同捧聽鈞天任滿交割郡事致語擁州麾而承乏兩綬兼紆陳燕席以告新多儀再舉茂惟勝日庸罄清歡某官輩古碩儒鍾天間氣皇朝勳業之裔綽有典刑聖世功名之躔佇光彞鼎小稽賢業俯佐郡符某官臭味不殊交承連好教條攸領寧惟風月之平分意氣所傾共看塤箎之合奏敞南風之館宇倒北海之樽罍涼溢簾旌香生談塵舉觴交命未容舞困以歌闌倒載言歸更待河傾而月墮某等云云星屏已喜一樽俱嗣啓芳筵合郡符裊梟細香生玉醴颸颸涼吹度氷壺錦紋眩旋明回雪雲影依微覔貫珠乘醉言分當卜夜火城璧月共通衢燕鄉守致語枉賢侯之駕下逮幽人泛上已之觴庸修故事允謂一時之盛不難四者之并有侈初筵增光前載某官清朝棟幹緑髮神仙聫肺腑於九重藴胸竒於千古褰帷問俗暫頒漢殿之詔條補衮致君行厠舜廷之元凱而德若不足勢忘自尊回軒略席户之卑適館篤緇衣之好肯迂千騎俯共一樽追洛水之風流繼永和之觴詠參議朝散須次儉幕燕居鄭鄉功名若將凂焉棋酒有足樂者不纍不屈仲元居夷惠之間載欣載奔陶翁竟羲黃之上况事賢之有素兹成室之云初屈二千石之嚴威為七十翁而迂步挹光風之轉蕙俯流水以秉蘭擘會稽之吟箋未妨卜夜欹庾凱之醉幘正用酬春某等叨備伶倫喜承燕衎敢陳口號聊佐清歡胡床玉塵錦囊詩賔主風流此一時玳席邀歡酬令節羽觴湛碧轉微漪綺羅圍外香風逺絃管聲中漏刻遲莫道蘭亭已陳迹勝遊端復嗣芳規上梁文懷莒堂上梁文上過秦之論起殿官曹營懷莒之堂歸編户籍蠶三眠而欲繭鶴千載以還家小寬勃磎敢謂輪奐長翁老子為儒甚晚與世無堪闕罷亞之供耕羡匏瓠之有處局栖龍具動捋虎鬚服原夫塗抹之勞䇿名科甲耐窮鬼揶揄之辱妄意事功俯仰桔橰漂零萍梗名韁利鎖悟大塊勞我以生酒會文期蓋作吏此事便廢幸收晚節歸託故棲苟祿無庸仕不偕於百雉受㕓得所賦劣綴於下梟草草創五十楹堇堇著四百指小酬左餐右粥之願亦息上雨傍風之嗟髙臥北忩辦長日搜詩之課徐行南陌試平生種樹之書夫何求哉不啻足矣可無著語用諗升梁行且落成聊兹善頌拋梁東煥霩巍譙鼓角雄千騎肯來觀水薤府公真有古人風拋梁南橫前江影曉涵涵端復與翁供藻思老來吟興尚驂驔拋梁西湖天千頃瑩玻璃亦想龍公歡喜甚明珠昨夜吐晴霓拋梁北滿眼齊州舊封域有斧無柯古到今輪囷空藴平戎䇿拋梁上依稀太乙低仙仗爐香知我正翻經不妨借與青藜杖拋梁下婦織兒耕有餘暇但令泛盎無闕供長與比鄰詠多稼伏願上梁之後享不危之安駢無禍之福詩書夀脈有跨竈之佳兒棋酒歡情無罵座之惡客容散人於盛世全樂事於暮塗定海縣廳事上梁文古縣修營務先所急輿情恱向功奏不遲免覆壓之為虞歘觀瞻之有偉知縣生涯鐡硯老境銅章撫黃童白叟之愚視如族屬用柱後惠文之事御以聖經暨閲再期大孚衆意豈止賦輸之粗辦抑惟號召之樂從念墻宇之傾摧坐貨財之窘匱積六十三年之久置莫任朴斫之勞厯二三十政之餘率苟度嵗月而去第惴惴而引日居磔磔而有聲雖云東拄以西撑曷救上漏而下濕豈容老朽復避嫌疑思蠱飭於弊端姑鼎新於廳事規模素定才煩頥指之勤材用畢臻翕見子來之助今倡興於大役餘有俟於後賢片瓦尺椽初不形於嗟怨震風凌雨當未沫於帡幪尚來者之興懷冀嗣兹而有作爰差勝日肇舉修梁敢采公言用陳善頌拋梁東蓬瀛珠闕貝為宫仙曹集處應回首定指塵勞笑此翁拋梁南山影江光映蔚藍喚渡行人逢野老應收拙政入叢談拋梁西水夾田疇一帶齊他日地毛龜拆處如今翠羽望中迷拋梁北後海風停湛平碧天驕不敢望南天萬竈煙青旗影直拋梁上楚氛盡掃瞻清曠日馭舒遲黃道明太平未信真無象拋梁下民區富樂官多暇比櫛囷倉驗屢豐連甍絃誦知皇化伏願上梁之後民情安妥縣計豐滋絃奏武城庸務本原之政人遊建德指須富庶之期俾他日華黍詩靡容専美庶將來循吏傳一無愧辭是所謂吉無不利樂不可支激犒庫上梁文郵郡要衝城隂都會積年蠱弊謾餘酤肆之虛名千柱鼎新倐駭市區之壯觀收功有自為計無窮某官悃愊無華撫綏多暇中和布政挽升平氣象之回夙夜究心盡經久公私之利歡謡載路朽蠧一新麗譙雄郡圃之西已干雲而屹立酒市壓城闉之北復不日以崇成庸浚利源以寬民力塗歌里詠不知畚築之勞勤坐賈行商咸歎規模之巨麗是為創見髙掩前聞儻繼加增葺之功則永為裕足之本豈徒醉鄉千里之地建德一時之民將龜日以落成兹虹梁之肇舉可無善頌用紀公言拋梁東日氣蔥曨碧海中聞道羣仙輕一醉得無笙鶴下蓬宫拋梁南萬井笙簫瑞色涵白塔丹霞霄漢上炯然金碧屹相參拋梁西天外重湖天與低波底睡龍應矯首為翻明月吐晴霓拋梁北路轉𨝍溝千古碧邊風不遣一塵蜚信節年年馳使客拋梁上鴈天雲路饒清曠把杯當有謫仙人昂首髙吟企仙仗拋梁下請駐香車羈寶馬未妨醉臥月明中生世清歡本無價伏願上梁之後連甍佚樂百貨阜通飲醇而相漢家尚冀曹裝之小駐飽德而器君子庶幾周頌之嗣聞嘉與民編共陶德政臨澤常住院上梁文精藍益煥祕殿鼎新抗鳳嶺以孤騫一踵升平之巨麗屹鷲峯之幻出四傾有衆之瞻依境勝左方寺標常住自天嘉儀同冥心捨宅肇基安衆之區若給孤大士隨喜布金首壯乞靈之地頃嗟寶剎倐墮劫灰纒淨界之妖氛鞠福田之茂草邇遐萬井悲唶一辭彼上人幾年服勞大檀越一力喜捨什百有千萬之積輪奐起汙埤之餘侈皇宋之椿齡祝延有在簉釋迦之麑座竭蹶以趨凡屬見聞肆同饒益迄今龜日爰上虹梁欲寫歡心可無善頌拋梁東矞雲泛日曉曈曚遙知鶴背三山客奔騖來從獻寶宫拋梁南吳山越嶠儼相攙參差影落清溪底千丈奔虬臥蔚藍拋梁西未多少廣與天齊竺乾教法宏金地端為含靈待指迷拋梁北昌期偃伯邊烽息少待氊裘渭上朝更須椽筆燕然勒拋梁上黃道非煙儼仙仗天人闖首梵筵尊天風便旋天花漾拋梁下麥浪搖搖覆平野佛慈帝力共難名試聽康衢謳詠者伏願上梁之後象教興行龜圗昌熾續佛受命正法眼藏之普傳為國焚修太平君子之假樂十齡沐慶元之化一武同建德之遊江湖長翁集卷四十
