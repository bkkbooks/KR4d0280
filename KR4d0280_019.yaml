body:
  text: 江湖長翁集卷十九宋陳造撰七言絶句次韻楊宰汲泉浸梔子花山行不識小人羔但有清寒餉瓦罃想見雪膚陪獨夜世間無比長官清次韻張守三首史君治惡子邦人快之頻嵗中田若螟螣為渠秉畀作豐年只今鼠子誅求地巷議街談一粲然平時漫詫跳梁去末勢寧逃死棄如但遣鯨鯢絶吞噬茫洋春澤盡嘉魚虐天子子是無天謫一何妨惠億千聞道蝎中猶滑涣可偕五細尚窮邊次韻張守四首守出郭回畫舫前頭碧湛空晴雲低影更溶溶橫陳景物無央數盡獻詩翁阿堵中新詩囊錦墮春窗旋炷銅爐百和香試握毛錐支徑敵獨憐赤手强扶瘡舟凌清泚轉彎環立鷺馴鷗拱挹間還憶苕溪聼鳴櫓歸來清夢定家山葱青嘉樹被平岡素艷丹葩半在亡安得芳春并好客一時難老倚𤣥霜慶元冬再到盱眙四首虎頭山下參天栁親見栽時共我長栁自摧殘人自老半生不抵熟黃粱平日朝京此問途如今一水剪坤輿客來羡殺間鷗鷺北翥南飛得自如醴筵曽作二年留靜鎮人今郭細侯望斷江南空夢到西風斜照白楊秋日行犖確靣孱顔舊慣山居意易䦨見說烟雲暝崷崒北人爭指畫圗看間居十首營隙地頗事栽種隨遇作一詩前後不同故無倫次雪雲脫壞漏朝陽風物橫前引興長紅糝紫蕤今次第遷鶯來燕費商量種桃接李不辭勤旋作花前把酒人羡殺文禽映花語飛來趂得見成春春來敢自貸衰慵正要檀欒問白紅愛竹劣留枝䇿徑灌花分破著書功仙仙弄影俯瓊瑶月地香紅若見撩清夢定為蝴蝶去杏花繁處宿良宵破曉東風尚作寒孤笻隨客已媻姍絶知蚤起非吾事要趂梨花帶露看步屧歸來未覺勞迎門喧笑問兒曹笑翁渾似魚千里小圃周圍日幾遭閉關不為賞心䦨咫尺東園到自難斟酌東君惜春色破除十九作隂寒病減還思近麴生嚼花嗅蘂對空瓶不應斗酒錢三百猶惜春衣耐獨醒桃李爭先不待催梅花轉首已青苔即今蜀種胭脂樹壓倒羣芳尚懶開寒食清明一箭過晚晴庭院緑隂多兔葵燕麥易輕脫紅藥碧桃須孰何趙園飲三首不謂東君雨後春尚多紅紫待遊人天香更有西京種來伴賔筵笑臉新收藏春色駐年華珍重王孫好事家肯挽歸驂共良夜一天風露一林花酒邊容角少年狂扶路歸來興未央羡殺雄蜂雌蛺蝶月膏烟膩宿花房客夜不寐四首久客情悰若鮮歡園林搖落菊花殘北風作意吹霜曉又報江梅一信寒陳鴻轇轕上雲衢夢欲成時每破除少睡更堪寒夜永新來熟遍少時書清樽黃卷交期絶芋火前頭老懶殘賴有平生短檠在一燈明滅伴更䦨飛騰志意老來休却聽雞聲吟掉頭催雪憶梅還得句到家準擬阿儒求題九老圖二首凉亭燠館塵埃外野鳥溪花俎豆前但愛林泉映華髮豈知勛烈載青編帝憐憂國許歸田猶得幽居俯澗瀍應笑詩人賦招隱茹芝帶索只臞仙題行山圗溪山無處著纎塵翠壁蒼漪襯月㾗可惜人間清絶地葦問漁父與平分江行四首帆飽舟輕去若梭平生忠信傲風波忽然隱几驚搖兀知是那吒石畔過舟鷁凌乘著羽翰攤錢三老喜安間江豚白􅀈欺人甚噴浪跳波帆影間逺近青山不辨看翩翾征鴈敢爭先船頭起浪風頭孰不假驂鸞自半仙帆桅飛去劃空明人倚東風兩翼生世事快人如此否日斜三百不留行到房交代招飲四首躡盡巉巗氣未蘇悔來坡下獨長吁一觀烟霧南山面從昔名坡信厚誣簷外浮嵐暖翠堆道人親眼為渠開餐錢官簿何須計直為南山亦合來勝日山堂共一樽未妨窈窕對嶙峋髻分翠影眉爭緑人與南山各可人妓圍簷額潤空青岫幌雲關夜不扄吏隱風流輸我輩可須逋客詫山靈再次韻四首山好能令肺病蘇詩來把玩更驚吁蜀人例作殘山看端喜因詩免受誣語不能工恨作堆撚髭空對翠屏開清吟賴有雕龍手繡假聨翩詔後來犖確悍頑經數驛醒然初挹碧嶙峋眼明驟與真山晤不比逃虗見似人山色隂晴逺更青誰教睥睨枕巖扄詩翁意欲移千步安得朱符祝巨靈公云山甚佳惜不更逺二三里再次交代韻四首筆力濳窺大小蘇詩傳諸老定嚱吁從今訂價連城重政使羣兒有善誣昔夸石廪祝融堆劣見人家畫軸開坐挹髙寒吾願足此行似為此山來環秀亭中命渌樽雲煙明滅映嶙峋佐州不喜分風月喜與南山作主人詩人妙思天同巧鬼守𤣥關不及扄間挹山光誦竒語斷無塵滓溷襟靈再次交代韻四首嗣皇仁覆物昭蘇臯自陳謨鯀自吁聞道諸公扶國論須君左袒訂邦誣今朝著我簿書堆領客樽罍未辦開始信南山是知己露竒呈秀斬關來漫叟當年臼作樽侑樽青嶂漫嶙峋與君屢共山前醉似覺清歡勝昔人傳聞洞府鎖髙青探著詩成數啓扄相見羣仙書玉葉更應交口歎精靈再次韻四首君家詩價自姑蘇系胄蟬聨世唶吁欲把阿元輕輩行古今俗子喜相誣世稱韋郎葛立方謂士元非韋比立說甚嚴見韻語陽秋眼底薔薇玉雪堆過從休待牡丹開送春疏酒山應笑底用奚囊日往來是日同小酌視草行看賜上樽濁醪付我酹嶙岣扶攜誰共山前醉從此無君度外人詩愁磨盡鬢邉青𤣥鑰無施閉理扄牛渚錦官祠廟古瓣香儻格在天靈復次韻四首諸李辭章推李白向來蜀道賦噫吁房陵山險猶如許石穴巴卭定不誣昔上瞿塘灩預堆盤渦如井放船開山行歡喜今非錯備見梢濆撇漩來地有錯歡喜山十里髻鬟誰綰結半天蒼翠自嶙峋教兒莫憚依山住闊領裁衣盡土人病肺還孤竹葉青房酒頗佳小園春去尚深扄春衫紅藥强相比婢子可憐無性靈襄陽二首自憐薄宦走紅塵相見山靈厭俗氛咫尺峴山無計到秪應飛雨是移文採藥仙人去不還鹿門山翠鬱孱顔霜髯尚困卑官縛自問胡顔上此山春隂二首連連麥浪搖空闊挺挺松幢舞暝寒眼底春工餘幾在更堪風雨苦摧殘園林桃杏已無餘雨挾春寒擅曉晡芍藥紅慳猶料理海棠嬌甚可枝梧祈雨而應范簿有詩次韻四首蒼黃日日冒黃塵敢意誠通主雨神曉起遽聽沾足報天心政爾念疲民瓣香親謁睡巖龍髙卧逶迤豈自公巖下望龍須一怒向來作止繫凶豐久無音信日邉來憂國誰憐愴老懷想見天顔歡喜甚鴛鴻入賀滿堯階山城粗滿望霓心老去私憂念自深更祝今宵繼疇昔併煩魯史紀為霖漢江岸二首一自陽侯戰雨師棗畦桑隴但空陂此君屹立如尊勇依舊青青似昔時沙隨秋漲漫川原沙外人家盡毁垣寄語飢羸莫深恨西人無數飽魚黿題驛舍二首客到淮鄉話楚鄉長將天末指襄陽如今漂泊君休問又過襄陽十舍彊官曹有底著迂疏秪合江湖老釣徒萍梗可能忘在莒蓴鱸秪有夢歸吳呈程帥五首平㪺陸海吸潘江羽扇雍容築受降許蔡衡湘全楚地了知邾鄶不成邦坡詩北行連許蔡南去極衡湘楚境橫天下懷王信弱王景物橫前秪費才何妨折簡喚鄒枚連朝積雨前宵雪總為催詩陸續來不將杯酒破衰顔轢月凌風取鬢班雋永要同無味味雕搜聊樂不間間客問久欲賦歸歟歸去何人為起豫平日嘔心空子墨羡公落筆便黃初一樽規度雪寒朝小輟鳴弓抗射鵰未用軍書送巾幗故人祭竈有佳招程帥寄詩見憶次韻四首擾擾飛潜易陸沉化工刺手斬然新飲光一笑知誰繼試把𤣥機舉似人清篇屬我慰平沉密密𤣥關領㑹新從此倚門麾捕影更將形似許詩人車笠何人記舊盟惟公不作白頭新渠儂欲識九華伯可但詩壇第一人子雲屬思舊深沉脫手清詩語意新天上黃陳應首肯授公此柄淑諸人六絶句呈趙帥兼簡鄭機宜二公同乙未榜南徐把酒送行行話我漂零倍愴情屈指六年才一夢更消幾夢了浮生玉筍班中第一流氷花影裏釂瓊舟來遲輸與花前客袖手看公筆不休鴈塔題名盡俊賢即今十八卧重泉合離榮瘁何須較强健相過是半仙宦路平時欲陸沉先生誨語每南金長庚配月空回首古井無波已此心蒲鞭閣束久停檛暮府人間早放衙頻喚羊何把詩筆即看姚魏用年華長日登臨憶侍郎芳時談笑客凝香須公多辦瓊花露容我時開古錦囊房陵十首似聞仙伯厭乘龍常混紅塵市井中覿面未須趄避我褰衣無計䟕尋公房人謂巧避云趄避力尋為䟕尋趄七靴反䟕音靫隂晴未敢捲簾看苦霧濛濛鼻為酸政使病餘剛制酒一杯要敵潦朝寒晨起霧久乃開土人目曰潦朝雩壇歌舞雜嗟吁下酉猶濡上酉枯誰謂朝來一拆雨歡聲已覺沸通衢瀦水溉曰酉得雨曰一拆雨竹屋髙低正復斜蔚藍影裏著人家底消山峽三分瘴爭課盧全七碗茶土人晨飲茶云勝山嵐氣又曰防三分瘴夏田少雨富來牟多雨何妨穡事秋已戒日供皮子麵更教晚稻飽霜收麵皆墋不墋者曰皮子麵稻待霜乃收曰飽霜米跨牛待得夕陽回在處諸嫲笑口開已借蠟錢輸麥稅免教緝捕闖門來弓手下鄉目以緝捕杯酒清濃肉更肥咸言趂社極歡嬉丁寧向去坐年日要似如今斂脯時年日飲食曰坐年社日曰斂脯農間閭里有逢迎白飲傍邉骨在羮老稚不妨頑過日邉頭難得是升平俗謂戲曰頑羮曰骨在刈罷秋禾未敢慵更須趂逐過殘冬城中竹筊今年貴鹽茗新來免闕供賣枯竹供㸑曰竹筊古巧反翁媪同圍老瓦盆倒篘新酒雜清渾梘南梘北皆春社且放烏犍卧晏溫村落所聚曰梘春寒六首掃雪階頭曉未乾東風作惡鼻仍酸西園㸃檢江梅後秪有櫻桃不避寒稍稍春光到眼中衝寒試與小榰笻杏花已尾櫻桃拆正要深紅間淡紅衰年心緒自低摧可是青春昧一來幾日不教書作祟為留病眼向花擡去年秫地傷秋潦春酒澆醨不可親紅樹梢頭山鳥語秪應笑我獨醒人清明寒食經旬是笑問風寒更幾餘小杏惜香春恰恰新楊弄影午疏疏平明欲斂雲復厚薄晚未休風更顛老怯春寒不宜出下帷添火擁書眠同沈守勸農十首誰似青君用嵗華遍分春色到幽遐房陵逺近山千疊到處東風到處花門橫石瀨潄潺湲兩兩人家栁映門花影灎紅山影碧客行疑到武陵原行遍西阡更北村檀欒處處緑梢雲官身未敢山間宿可得排門謁此君共扶翁媪看行軒亦有娉婷立道邉侵鬢黛眉唇淺注鉛璫勻瑩茜裙鮮沉炷茶鐺且翠微歸軒何惜小逶迤晴天璧月今宵好待得金波泛夜時紅斾朱轓得暫陪端知非為踏春來即今歸馬班如意定被山花野鳥猜林花斷續碧溪長好在冰奩照靚粧泛膩流膏知逺近未妨粉水更添香病來止酒似淵明潘嶽歸田賦已成布榖催耕如見諗提壺勸醉更多情抖擻平時簿領塵偷間來作看花人從今日作花間去已費今年一半春露粉煙香細孰何荆扉竹徑喜經過陽和若作留連計誰遣飛紅掃更多不寐二首改遍年來所著書依然幽夢隔華胥寒更何與衰翁事數到琤摐殺㸃餘追思可樂是丁年日力孳孳有食眠頭觸屏風秖燈後慈親笑勸掩陳編觀山四首豫創小亭觀山五月十八日偕客遊是日晴而雷防雨先歸三月亦為此遊晴出雨歸坐此小不快蓋懲此也二十六日滿罷而去因作此紀之築亭所委張道堅也晴春載酒小徘徊倐作衝泥冒雨回畢竟山靈嫌俗駕即今還殷阿香雷每從迫隘面孱顔劣比緣墻見髻鬟好在此亭同把酒與君全體看南山山如豪俊略方隅傲睨驕蹇未受拘為著孤亭凌縹眇至今端委正衙趨道人動作千年調京兆才餘五日留此去浮圖桑下意得無追憶費冥搜郢州守風二首驚風清旦捲黃沙薄暮蜚雲尚炮車今夜石城樓上角不妨重聽小梅花甕盎轟豗恣擊撞珮環時亦奏鏗鏘風濤欲靜猶須怒一付天吳自抑揚過吕仙洞四首神遊八極此焉歸紫府天寬石作扉倦客重來炷沉燎轉頭六十七年非天人蛻迹便天飛混迹塵凡世得知嵗歷七朝踰六百朝朝冷眼閲行尸嵌巖中有玉為壺不作嵇生守煆爐玩世肯嘗束老酒翻身時過洞庭湖塵蹤了鳥病催殘夢謁真人九轉丹已熟浮生枯骨觀更悲凡質遇天難書事二首壯年膚骨已清臞老去支離轉不如二十七年扶病過半緣耽酒半耽書苦吟添滿鏡中絲課效全輸博塞嬉改就新詩哦百過浪言兒輩不須知客枕不寐二首老羡平生睡作魔矧因多病覆金荷起慿曲几頻搔首如此迢迢良夜何嗢喔鄰雞幾番鳴琤撞江浪欲無聲擁衾寧復還家夢望殺東忩未肯明次韻郭帥梅三首客子徒煩賦憶梅怯寒未肯臘前開定知酒處頻回首有待江南信使來薄遊他日為尋梅爛賞菁村十里開冰影玲瓏想仍舊夢為莊蝶認香來後乘從公訪古梅梢含笑臉未全開不妨東閣撩詩興未分愁聽起夜來寄張守仲思十首一思交好一悲悽楚嶠吳山夢到迷怕說萬山天樣逺房陵更在萬山西詩成跬步遣長鬚江隔郵筒已自疏相望六年無一字故人何計慰窮塗相從軟語說睽離起我清談更好詩别後憂虞今痛定未須細誦悼亡辭知君喜客我擕雛徑喚郎君到坐隅二子通家仍莫逆可憐相對各縗粗衰年淡食當膏腴不為聞韶味有餘定自迎門驚骨立可須蓬語及河魚迂船徑欲一相過安德橋西之字河未苦路長寒切骨倚君一笑作春和珍蔬解佐盤餐飽妙劑真令病骨輕鍾乳茈薑皆楚産薦芹聊致野人誠衰慵潦倒知無用祿遫扁舟昧此來滿聽勝談心已足浩然欲指弊廬回我方投老嗟多難君亦頻年悼百罹樂事定知神所妬把杯追話唱酬時詩社同盟欲二年吮宫含羽飽周旋儀真又屬風騷將定喚間身續此絃寄廣教主僧二首回車半日贊公房香積酥陀不一嘗可但山行休腳力免教飢火燎枯腸麥綰銀絲稻薦珠春忩曽是飯伊蒲明朝再蠟登山屐更肯開單共飽無題潮出海門圖二首絶島平岡捲欲空兩崕相對屹穹崇即今畫手兼詩筆更與江山角長雄卷裏濤波快一披蒼山踴起雪山馳浮天沃日無窮意到我春忩病酒時再題二首天吳慿怒鼓濤瀾不作間居卷軸看夜半負山誰料得重來坐失兩髙寒濤頭蜚過不斯須秪合朝昏展此圖緬想海門才末勢終然畎澮視江湖贈淨慈主人五首肯堂師住明之端巖豫宰定海時為師出不一二云營庵鼎山他日委兒輩以家事約訪師山中為年嵗留朅來行都則受淨慈請為主人于此豫既汨沒而師亦未得歸休也因寄五絶句平時野飯與巖棲忽向皇都作住持見說禪和蜂蟻聚心間秪似瑞巖時炊珠爨桂走門徒須信髙人道不孤政使過門盡侯主也須拳棒做工夫識君方吏虎存邉已歎疲羸雪滿顛别後漂零怯人問窮山往返費三年虎存定海山名寺前寺後花如錦相見遊人撥不開好把春光供一笑從渠塵襪涴蒼苔師似蜚雲未定居我方薄宦走江湖鼎山他日過從約借問今猶記得無晝過荷葉浦二首荷葉浦邉支港多凶人出沒土人窩故人飯我非留滯月黑天隂免夜過一舟失得關生死中夜何人肆敓攘外此湖江多樂土憶常通夕聽漁榔過舟云為賊奪舟驚奔幸免約徐吕二友訪淨慈老二首先是過廣教寺牡丹盛開不我前後客主大喜魏紫千葩壓曲欄問君何似檐頭看城西更有芳菲地舊約重尋莫作難人間機巧厭相親南道吾今有主人誰與清遊聨此轡吕兄孺子最真醇再次寄肯堂韻五首住山今日得宗師妙與緇徒示總持衣鉢更緣延客盡衲衣包却鄭當時丈室雲趨彼豈徒拳拳此意忍容孤即今又舉二三語說似當年邑大夫共談詩律更談禪人指昌黎接大顛屏疊葛藤燒筆硯息隂休影了殘年眼向朱門每懶擡今朝笑口為君開别來却喜人爭席浪遣長鬚掃徑苔好在新居勝舊居右連靈隱面西湖東南勝境誰同領我亦間官一事無題潘德久侍兒扇侍兒去而復回襪塵去眼恨成堆賦客當年浪費才何似天風吹霧鬢乘鸞新自月邉回題張省幹扇前溪天闊渌泱泱溪上詩翁引興長安得南風吹小艇吟看千蓋擁紅粧題臧子儀扇買鄰千萬許兒賖老子詩成賴指瑕門枕醴泉交讓木行人不問識君家題扇集句五首寶扇重尋明月影月邉仍有女乘鸞主家隂洞細煙霧姑射仙姿不畏寒庭院深深深幾許美人綿渺在雲堂落花遊絲白日靜錦薦金爐夢正長竹裏髙亭燈燭光月移花影上西廂蔗漿金碗冰盤凍始信人間五月凉自恨尋春去較遲古來四事巧相違如今說著成離恨曽為梅花醉不歸緑槐髙栁咽新蟬綾扇喚風閶闔天見欲掃床懸麈尾簟紋如水帳如煙題扇七首桃葉渡頭魚噞春莫愁堂上燕依人玉觴欲舉心先醉痛憶當時迹未塵吳霜有信鏡先知楚雨無蹤夢自迷風榻燒香作僧過羅襟得句為誰題聞道廣寒修月手靜看如鑒忽如眉即今扇裏乘鸞女解笑嫦娥不自持東絹須題黃絹辭老來斫句不能竒定知爍石流金日記我持觴賞雪時裁就霜紈未副揮濡毫欲下更遲遲昔遊尚記蕪湖夜把酒中秋見月時峨眉山北雪極目方丈海中冰作壺我自飈輪隨所往憐渠局息寄洪爐廣寒二十五萬户跪奉素娥聽指呼落屑欲堆懸圃滿人間但愛玉輪孤再次寄肯堂韻五首夢思遊覽慰衰遲起耐隂寒不自持捉筆把杯吾技癢可堪袖手過花時是日早隂暝道人心地古為徒野鶴昻藏白月孤我亦生來世緣薄回思昏宦歎非夫技笻過我海雲邉空谷人聲喜欲顛更喜重逢各强健未須悽惋話雕年倦遊秪有囊詩錦試為髙人一笑開當日留題海山寺旋聞石刻暗莓苔精藍端未下雲居況復僧中有後湖理障禪那俱坐斷頗嘗遊戲到詩無同徐吕二子遊西湖復次前韻五首老去胡宜誓酒巵興來破戒為君持自今排日花間醉報答春光已後時林仙金骨閟丘墟松自蕭森鶴自孤靈魄在天聨傅說遺書落世仰濳夫仙祠佛舍碧山邉扶路逢人有醉顛火急向渠分此樂徐郎多病我衰年酴醾芍藥借春回似解商量陸續開安得𤣥霜著花骨不教容易染蒼苔天分天上靈河水圍作錢塘千頃湖未有風亭花月觀已誇勝境世間無次韻答璧侍者五首佛屋連延跨翠微看雲手版向曽持重遊不是尋春去冷眼漂花捲絮時獅子窟中獅子子孤羣懾怯更清孤當場不作春雷吼底用吟詩壓老夫他日山行不喚船浪花如雪北風顛而今已苦山行熱却辦鴟夷餉長年為向詩翁致命回定應禪老笑顔開盤餐要是隨宜飽略具油葱市海苔欲買青山貸寓居時臨絶頂瞰平湖巳容下榻煩重問肯念吾貧折劵無題趙景安二亭尺五二首山亭縹眇五雲連瑞靄靈河最近天當念江湖吏塵客舉頭見日獨悽然仙樂慣常醒醉夢市香不斷襲衣裾何須更羡城南杜丹地黃扉即詔除雲濤二首坐看銀山捲壞雲濤頭蜚過不逡巡世間壯觀何人領付與亭中筆有神闛沓每疑神軸動撞唐更恐日車翻慿欄待得波聲寂擘絮依然掛海門景安和章來再次韻謝設醴四首朅來取友得三賢安石仁風樂廣天七字不應呈此拙詩腸老去已枵然道裝人映醉中姝十二分行儼翠裾遙想翻階麗清禁似今羣豔簉庭除玉盤盂側玉為人插羽瑶觴不計巡想送客歸回醉眄司花來夢鬪精神拜賜清詩醒醉昏恍如帝所聽新翻君才炙輠無窮盡未敢先關月下門徐南卿友竹軒二首皺縠香羅裹瓠壺此君髙韻豈其徒蕭然相對心莫逆敢謂徐郎山澤臞嘯風含月近窗扉金鎖瓏璁鳯尾齊況復賴君相引重一時同作辟塵犀即事二首隥圍山擁碧崚嶒二載房陵冷似冰今日皇皇空載質令人翻憶在房陵形容骯髒水雲宜心意䦨殘欲語誰不作貴人炎冷面北山逋客最相知再次韻趙景安四首迂儒法士就雞連猶復拘拘詫甕天度外有人能好客一樽容我賦超然艷粉竒葩照座隅更䦨醉墨㸃襟裾詩成平處猶元白無限羈愁賴破除平時一飽每從人自庇官曹等徼巡且可放狂中酒聖冷看得意詫錢神酒濃勝得晚天寒雲氣侵帷水墨翻蘭蕙香前還判醉不須投轄鎖重門再次韻四首或勸長翁圖分長安粟徑授議幕歸故作公朝已後茹茅連幕府偷間亦所天寵辱肯為差别觀道人隨寓秪怡然作吏丁年熟李書調官晚境曳鄒裾平時外慕生災怪嘉遁爻中有祓除到眼浪岐官冷熱遇人傳得酒逡巡曼容東老俱通夢不勸趨榮勸養神頗有傳詩問子山或將贊易譽虞翻先生不乏醺酣笑問字能無欵席門苦雨次前韻四首雨腳波頭逺接連衣寒礎潤犯梅天誰憐旅食淄塵客日問珠炊與桂然墨雲篩雨密還疏欲出塗泥恐濺裾惡況橫陳費料理枯棋濁酒有驅除安排看駕趂遊人禁籞猶遲漢帝巡留取晚香天一笑倩誰寄語主林神騷窣松筠聽夜喧淙潺盆盎駭朝翻衰翁危坐追交態舊雨軒車尚到門四月望再遊西湖十首前時小舫冒氛昏重到輕橈破麴塵湖面風煙飽姿態一番到眼一番新傑屋修垣著畫圖連連勝士逸人居乘間我亦無羈束竹杖芒鞋信所如疇昔相期襆被來飯餘歸意類擠排蘋風蘿月孤清夜僅見山間結夏齊充老要宿山間以事不果留杖挑初日闖雲關忽報充師早下山煮茗談詩有賢子免教題鳯悵空還十字街頭托鉢盂鴈鵝食口待朝脯我來欲序睽違意要問揚州米價無定結諸山粥飯緣每歸留得杖頭錢穿雲更欲攜君去布水多煩為我先穿雲布水俗語堆青泛碧放船篷萬里風前鶴髮翁絶境滿前官不禁此身未省歎塗窮春光陸續委東流看到湖邉安石榴更與蘇堤鷗鷺約辦舟來賞牡丹秋俗目芙蓉秋牡丹歌呼浩渺翠霏問秪苦詩才老坐慳安得觀音毋陀手為人千紙寫湖山橫逵縱徑平如水無復衝泥防險人儻使人心盡包叟世間何向不通津是日遊靈感庵庵主包道人砌南山街略遍次韻楊宰食野蓮小嘗紺菂掉吟頭甓社湖隂風露秋仙實休誇華峰頂吮霜咽蜜亦其流次韻楊宰捕蝗宿兊巖四首歸來聞道頗休間蝗事今隨暑氣殘我欲一樽供軟腳還能衝雨過蘇端旱蝗蔽土翳雲空遙想驅馳逐轉蓬端坐賴君酬一飽老顔可諱發慙紅去為民勞走險艱停驂幾問具茨山秪今欲致賢勞謝詩債徒能準數還龍公私我雨雱浪釀酒須防有乞漿慙愧四鄰千萬室略無笑語及時暘弊家東莊近屢得雨次韻楊宰凌霄花髙花笑屬賦花人花自鮮明筆有神可惜人間兩清絶不教媚嫵對間身再次韻楊宰七首雪英間淡炯雙明水斛泓渟碧一罃小憩山村無與語熏爐茶鼎鬪僧清頗思菱角問雞頭且放蓮房擅早秋蠲渴滌煩須底物未應接綆汲溪流能書徒自想髙間煨芋何從得懶殘蕭寺隨緣茶餅供勝談誰為解憂端棗飣菘葅不闕供露蓮何啻剝千蓬迎秋更有蒼虬卵邀勒斜陽未肯紅微吟長嘯强躋攀愁斛多於庾子山我亦豐凶關夢寐秋成消息待君還驟聞行旅歎賫糧無復居人肯饋漿十襲君詩要娛老却愁痛定說常暘附麗髙隂暑裏春衰榮不預主林神胡床想踞僧垣夜却愛香隨露滴身江湖長翁集卷十九
