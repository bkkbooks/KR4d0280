body:
  text: 江湖長翁集卷一宋陳造撰楚辭古賦送龍辭三章沈燎兮桂醑笳簫嗚嗚兮逢逢其鼓緩吳歈兮蹌越舞送龍兮歸處龍之歸兮悅娭翻倒霄霏兮膠轕霧雨厯館娃兮不留過胥口兮小顧水天糢糊兮迷仰俯仙真迎兮排空蛟鼉駢羅兮而在下祥飈肅兮緑輿非煙羃兮紫府翹儂望兮何所目屯雲兮南騖心靡迤兮延佇其二旱氛兮炎浮地毛焦兮金石為流龍不來兮殷憂心憛悇兮孰謀戴儂目兮傒龍之遊龍翩然兮副求呵蟄雷兮鞭潛虬忽墨雲之崩騰坌瀵兮黮黯瞢夫昏晝摐甲馬之喧空兮砉飛練之淙澑夫豈不能噓膚寸彌六幕兮胡嗇其施於此州眷吾儂龍所私兮匪新而舊安棲飽茹兮龍之佑願龍兮千萬夀暨我子孫兮蒸嘗春秋其三雷車轞兮電焱熹孽氛靜兮旱魃摧龍之來兮慰我思翠其幢兮羽旗乘煥霩兮紛躨跜龍之去兮盍徐之蜚雨兮一且再室豫居兮榖豫飢眷他州之枵橎兮匪龍其吾曷依東阡北陌兮謳而嬉右湖左海兮夜不扉林屋之洞兮蟠翠微瓊餐兮貝宫雲璈兮玉妃奠龍居兮無愧功成兮龍則歸送龍兮陳辭溪藻芡兮山有蕨薇餞吾歸兮幾時行春辭三首白沙兮青莎徐豫車兮坡陀黮屯雲兮閣雨沸後海兮起波紛稚緑與小紅媚丰潤兮靚嘉聲禽鳥之啾唶偕人語兮相和驚雞蜚而跳犢兮儼倦憩之人家玩嵗華之俯仰兮復躞躡而此過彼何人兮駢首爭指似兮笑譁鏗有聲兮長謡疑其賡蒍于之歌其二訟諜兮紏紛榜檛兮未全間色不形兮意孚每厚顔於曩賢揖父兄兮使前尚笑語之怡然道菽粟兮卒歲審里閭之相安食三釜兮袴襦悼單枵於昔年我酒旨而肴可茹兮屬饜兮共此柈觴一行而三謝兮起且坐而喧繁歸目送而扶路兮豫亦倦踞而假僧氈其三悶官曹兮縳虎擁簿領以昏憒竊逍遙於數刻償淟汨於終歲倚僧垣晲鴻影兮滌胸塵而一快飯雲子而泛乳兮引吟興之未沫吾西道之主人兮有老禪之晤對愈雙矑之月淨兮館授豫而已再頑豫姿之麏鹿兮合巖栖而釣瀨恍泉石之入眼兮浩歸懷之自倍計三徑之可具兮顧二頃之猶在明年其餞西歸兮將家漁舟老牛背也楚辭三章送郭教授趨朝昔尚父之之國嘗寢甘而見譏懷與安其費日亦館人之或知豈以抱當世之志而常後可為之時耶有美一人兮居今而與古謀氣飄蕭兮好修邑中之晳兮獨能闖閫宎於軻邱扈芷蘅兮荃其佩櫝驪珠兮匣干將而未試雖未試吾何慊兮顧簪裳猶可隱蝸廬槃礴兮天地儼其蓋軫一世繫望兮如蒼生何君何心兮山之阿㪺甓社兮羞藻芹無為此焉婆娑其二儒之宫兮千柱耽如峩冠綺袂兮羣而趨食焉稻魚兮𨽻焉詩書我侈其成兮繹其初誨掖之孔敏兮築興之不徐僨於昔煥於今兮繄百年其有待企三賢而相攸兮遺躅未沫匪若人之良茂兮吾將奚賴芹波搖日兮槐隂轉午一塵不棲兮重廊邃宇執經前兮儀儀而訏訏君顔舒舒兮而究而語有粹其文兮有覿其古風舞雩兮步趨繩矩鄙人留眼兮夫也接前人之武人今翩鴻兮與南翔雲氣蓬瀛分覲虛皇膏馥霑被兮淮之鄉君之惠兮鄉之人不可忘其三爰有人兮媻珊逼側耕耘寒暑兮圖史儒墨吟抱膝兮山南水北佩明月兮冠切雲曵芙蓉兮敷芬氷其茹兮蕙其薰之於世曾莫諒兮蹇吾猶淮之濆塊豫揆夫初度兮磷競強而為懦髮之新兮志偕而墮非金玉之人兮孰振吾過有牽其復兮有倡其和完豫獨而息黥兮睍新功以自課一息恍三秋兮胡為去我而他之些君行兮指日邊章陳兮君席為前揖風袂之翩翻夀君兮緑樽貝宫靚深兮碧落寬陵天風兮整羽翰君無謂豫兮考槃有塵冠兮待彈問月樓賦休豫暇兮銷憂緣空闊兮躡飛浮小萬象以孤凌聊徙倚兮兹樓主人敬客玉其醴而瑶舟忽霜月之飛來傍欄角兮窺簾鈎媚客衣而不去疑即人而有求俯皓魄以可攬宜致辭而見酬挈吾所疑舉其維陬曰厥分天地則有此月乘空明鏡寥泬零沆􅒭噴玉雪知廣袤兮幾何曾珠宫而貝闕塊仙子之幽獨儼童顔而紺髮是耶非耶肇為此説藥臼丹成兮孰所嚌茹桂枝漂香兮何許根蘖玉斧兮何用修妖蟇兮胡此穴寒可禦兮何術筯可升兮似譎珠何賴兮壞成之異潮何待兮隆殺之絶方中兮俄墜適圎兮復缺奚所恨而頓虧誰所役而遽沒世同瞢此請究終始主人長笑避席而起酌酒謂客毋泰多事萬古兮明月短生兮客子彼髙閲於起滅此同囿於生死一歡乘興且用慰喜若夫南浦結恨幽閨凝淚窮簷漏屋之瑣尾孰若兹樓之尺咫微之弦暝之晦煙霏之隂曀風雨之披靡孰若晴霄之如洗偕良會於今夕嗟百年兮有幾底用計茫昧之傳聞研惝恍於非是吾肴則豐吾酒甚旨姑可置興亡於度外冥身世於一醉客曰韙哉長噱大咍迭勸更酢挹瓶注罍撫月姊於座隅啐桂影於瑶杯誦楚騷鎗吳歈信醉山之欲頽啓明上寒雞催羲馭升駢車回冒軟紅之舊塵恍市聲之隱雷定觀賦張君錫雱不利秋闈作賦見遺辭意竒壯作定觀賦答之其辭曰面頰之敷腴胸襟之恢疏談辨之傾輸子張子眇視髙蹈力雄萬夫我攬雋於南州闖風壑之於莵揆若人而當價金華蓬山信其有餘固豈山澤之臞儒也哉胡乃蘭傷玉缺媻姍躄躠黃金注而得昏美璞獻而遭刖撫蒯緱而三嘆駭霜蹄之一蹶方且寓喑嗚於雕蟲之技陶性真於杯中之物陳子曉之曰事之宜然而或不然者天之勝宜然而不得不然者人之定洞視天人之表而不吾滑焉君子之善應嚮也覷然笑今也惄然悲蓋未始得其正彼其搖搖於寵辱之樊皆於理聽之瑩乎夫聖之逐忠之剖賢也而臞盜也而夀理好乖於所期是固諉天者得以啓其口羿之射有撥其矢石之斤或掣其肘然竟非拙工之敢偶蒲捎以一跌而棄夜光以微纇而掊孰不市駿議寶者之咎以定觀之人之勝天也久矣子其尊所有勉所無贔屭文藝之數周旋道德之塗吾見夫至寶橫道隨和過之必且攘取而疾趨則夫僨於前而振於後遺之寸而收之尺顧何歉歟彼託意於酒者古人有之而或以蕩心而敗德聲其怨於文者君子許之猶未足與語超然自得之徒羌吾言之率爾子其繹之是邪非乎子張子作而謝之其貌舒舒其氣愈愈若不知得喪欣戚之何如聽雨賦步前楹瞻列星問雨而愍晴雲河斜淡淡明悲唶於邑退坐風櫺憂而倦倦而寐寐而驚進新涼響微零下簷隙喧中庭䇿䇿而丁丁琅琅而玲玲非琴非築金撞而玉琤俄焉建之瓴盆之傾懸麻澍澠雜流泉之洶駭亂甲馬之豗轟喜躍蹶起呼兒晤聽時也燥枯惔焚自夏而秋東騖西馳哀祈乞靈欵龍湫叩神扄奠斯幣而刑牲者蓋無虛日今始聆乎此聲苖悴悴而將稿悵此願之莫憑脫如願也稿者已矣悴者庶其復榮今兹之雨雖云後而尚及事坐想夫南梘北酉逺隴近平在谷滿谷在坑滿坑自今以始畎澮之淺深溪弄之縱橫淙虹兮萬斛之傾輸鏡徹兮千頃之泓渟映涼葉之朝翻㴠嫩畦之夜青苞者攢槊秀者森芒兮莫不引稚而抽萌憔戚歎吒者生意之頓回奔騖局蹐者舞踊而經營洗襁子之昔憂歘春臺之共登且得以殺吾顔之騂頳息勞慮之怦怦蓋去國積年者繫夢於鄉枌枵腹彌日者動喙於藜羮一旦升堂皇揖父兄嘗稻粱飫侯鯖兾幸禱祠而不獲者不啻酬之渠此樂之易名而況匪輔胡車匪根曷莖凡吏之安否視戚休於下究其理民則重而吏輕今者里詠塗歌含哺擊壤之餘尚不釋然也夫豈其情燭既跋僕屢更我瓶斯卧爾歌載賡厄鄰雞之既鳴後囚山賦余子為房之獄官四十閲月代者乃來而以事留留非其罪房風土甚不宜人袖二賦見投時秋髙矣有可憐者因作後囚山秋蟲二賦寬之且以自慰旅寓也柳先生蛻迹中朝落身南州即囚山而命賦寫胸次之幽憂讀者哀之至今心為之悽恍而聲為之悲啾房陵斗州窮巖絶隘裂石廩之一罅瞰千室而斯在層峰疊嶂自蜀而東亘二千里此焉未沫嘗憑髙而舒望取羣愁之一快拖頑蒼繚寒碧兮了不究其所屆騰陵勃怒崩轟闛沓植則囷縈則帶矗焉如郛鋭焉如鐓馳萬馬於曠莽翔羣龍於霏靄又似夫颶風之鏖萬艘翻濤瀾於渤澥天雲若可手攬而日月為之隔閡嗟豫與子胡此焉仕按亦簿領庭亦卒史居無以泰吾心而遊無以投吾趾時則誦柳先生之賦而知其有以也夫其猿顛鳥仆窮號懾墮真狴犴之可駭也出不易入入不可出幽僻塊處荒傖癭民悍容而獰音日接乎前幾刻木之與對也嵐昏潦朝黯掩曀晦僵人骨而酸鼻亭午未巳仡仡者病壯者廢也由漢暨唐王公貴人悖而罪劣可矜貸毋此來之昧也自我解裝歲律甫遷向行止之坎流今匣兕而針氈嗟若余子盤礴四年局不得歸欲語復茹反諸已而靡愆袖長賦而見投慨今昔而澘然痛亂山之見囚束寸步而莫前牢愁幽憤搯腸淪髓匪接槢而踣頓不紲檻而掎止何髙髙之不仁而使我至於此也蓋嘗繹子辭究諸理子之所以惻愴而自悼我之所以感動而促戚者君子有弗是也彼漢唐之逐臣例庸房之廢徙則亦干國之憲不容自已吾與子來其始誰使非以其窮塗之絶援資身之無䇿博斗升以飽飢而逭死如庸賈之走荒裔罷農之守墝塉曾不暇計去取於彼此也耶以吾校子又進退之異趨齒髮之懸殊環索吾中稿涸而空無彼子柳子跐劉躪吕豪韓與徒若韋中立吳武陵之桀然方且望塵躡影蔑齊其驅彼其一旦局蹐於嵌嶄巖阻之幽深宜其號鳴悼唶不能一朝以居豫之朱愚質之朴疏才之卑迂萬非時須而遽乃顰頞悼中悄焉慘焉以賊和而傷生夫何為乎訊歸計於蟾蜍第圓缺之六七付古今於俯仰聽寒暑之更迭雖浩劫之悠長尚激矢之漂疾吾方左右圖史深居簡出揖勝友於南山㪺春色於九室一不假犢背之書超然乎縶維繫攣之表非三花老仙孰其委悉子以吾言為何如余子謝之曰沈憂滯悶吾已失矣秋蟲賦金飈之凄清鴈空之澄凝叢悽聚悲而為萬壑之秋聲非鐵心而木腸疇能不悼其魄而動情況夫唧唧切切更應迭和自宇而戶彼何物耶如私語如怨訴如盆繭之抽緒斷而復續專中宵而悲鳴有不聞爾信能令志士之竊歎而思婦之涕零揆生世之幾時胡厯耳而女聽豫已冥蠻觸屏螟螺捐青錢市黃糯盥新篘命白墮究三齊之妙而供百榼之課彼夫雞窗之雕鎪螢囊之吾伊等夜蟲之么麼逺宜亭賦創小亭名而賦之曰遊女之翩翾望之疑仙也迫而視之或不逮前奏樂于座鏗谹膠葛心之適耳之妍也有不若張諸空曠聞之眇綿婉以清和而圓南山之信美兮吾乃挹其杪顛惟夫近故湫束於闉堞蔽虧於市鄽繄斯亭之表立峰岫隥嶺之嵐霏濃淡煙雲幻變按領其全營斯名斯庸諗時賢休暇日而一登是可以誦逺遊賦超然也志喜賦五月十一日迓代者途中作出城隂而轉首緬散解之亭岧躡疏影於康莊翳纎雲於晴霄揭石瀨之泓渟隱鱗甲之搖搖盻山凹之室廬紛語笑之耕樵山鳥哢兮嘲􅑜野芳嫮兮妖韶駢萬景之橫前一詩題之見撩我肅客而暫來胡意氣之囂囂揆歸塗之此由矧瓜期之匪遙從官牒之百舍寄十口於萍漂寧簿領之憚煩而供饋之寂寥第松楸之繫懷唶老鬢之日雕鬱還家之夙願中不火而每燋幸歲律之再更騖此心而飛超忽合符之諗期慰跂望之無聊秣吾馬兮脂舝挹阿丁而聯鑣亂清鏡於粉溪排擘絮於山椒屈吾指兮寖久兹伊夕而匪朝躍脫檻之鷙獸快辭韝之皂雕儼此樂之想像覺吟興之漂蕭歘憑軾而坐寢夢已馳於外朝淮海樓賦帥相郭公即揚州南城為淮海樓偕客落成髙郵陳造在焉命之賦其辭曰娛暇日以登覽兮若斯樓之巨麗暝簷影於空闊兮循雕欄而徙倚目定視而猶眩兮足佇立而竦􅓥棲浮靄於朱甍兮遲羲馭於平楚來禽去鴈却略跕跲而捩去兮霧霏羃奕蓊聿而在下陵逈漢而搴飛雲兮騫鵬舉之垂天眺萬井而數計兮挹峰磴之橫前吳封楚甸間列疊出而自獻兮納納未憖明霞斷煙􅀈海門之塊峙兮眇浮玉之一拳演江流之橫界兮衣帶之紆餘修蟒之蜿延曠莽恢大四向而無際兮簉袵席而瞭然我遊武昌載登南樓想元規之遺躅洎典午之清流緬懷仲宣登樓有作顧臨眺之信美終回遑而靡樂孰知夫曠千載而相望叵賢否之俄度惟汾陽公分君相憂功存宗祧身臨邊陬屹控厄之巨防躬煕代之康侯靜鎮榆塞創為兹樓將厯覽而俯省目所圍之備周深計逺圖寧為觀遊彼擁扇而障塵每解顔而借羞揮旌纛而少彌肅賔僚之濟濟匪晉公之儀曹外郎陳思之程楊應劉疇獲偕此玩面勢之隆崛瞰山川而顧指表桑麻中甍宇揭舒畫軸兮對主賔之宴喜借胡牀於末席容霜毛之客子儕氓㕓而分惠殿羣英而薦醴浩逸興之漂蕭豁幽懷而慿虛倚北戶以微睇儼桑枌之弊廬親色笑於犀麈陪觴詠於晨餔靳依劉之羈栖曾愴惻之不無訂休戚於今昔詎劣優之錙銖夫此衆君子之所以扳援遇逢之厚幸顧餘􅅹之丐豫者也羌勝集之超然寧飫宴之云計究樂事之攸寓後謫仙而鮮繼進牘命賦合辭一喙泚吾筆而長吟颯天風之搖袂波光亭賦為帥相郭公作汾王後身金阜老仙笑談功名師友簡編手神丹而活國身長城之護邊虎節所臨犢佩已捐興仆振蠱輩古所傳有亭屹立城闉右偏插深池之清泚凌蒼靄而髙騫面勢之孤危簷榮之屣連在公之設張經畫才太倉之稊米已度越於後前想旌纛之每臨宛笙鶴之雲軿賔從嫭姱笑歌嬋娟掃亡國之淫哇奏新唱之清妍泛淑景之香紅鏡靚粧於明蠲接罷亞於畦疇眩縞潔於山川春秋冬夏信非我有而我按與之周旋佳月上兮闖氷奩微風動兮媚漪漣撫物而得之應世之心池月之湛寂緯武有文風漪之自然推此用之躋世五三軼勳四七將俯拾而需旃是猶衡氣機也耶世識之規恢之後吾得之拱默之先彼不知者方以吾為億中而或者必豫其知言延緑亭賦為髙秀才作子髙子襟度翛然抱負崛竒辟俗如讐而愛客如色故築亭寄隱屹莽蒼而瞰渺瀰方竭澤而揚塵唶吾遊之不時因援毫而進牘聊想像而敶辭爾其泓渟兮鏡揭浩涆兮天垂妥寒晶之如空湛蔚藍之無涯奏蛙吹以分部凛氷崖之合圍素揚暉兮連娟紅倒影兮芳菲目謀心愜把玩四時晴雨晦明雲煙紛披江蘺芷蘅之緑縟别﨑枉渚之因依眩多景之偃蹇隱几者默焉袖手領攬而無遺固可以動楚客之清吟抗陶觴而一揮況夫挺萬蓋之傾欹覆千襪之逶迤嫣然笑粲媚靚粧與醉態或玉頰而氷肌無乃飛瓊姑射之娣姒儔侣儷香叢艷不招挽而陪隨彼翔翠碧於蘭苕點屬玉於淪漪皓鶴側頸於淖濘鶙鶘偵影於鯤鮞烏鵲窺簷而誶語意而拂袂而差池則皆怡然莫逆相晤忘機者也至其樵歌之斷續漁笛之嗢咿欸乃之無惡聲笭箵之有安棲塵外之適子其可私若乃悟直鉤之妙意飫葦間之新得鯈有至樂鷗無驚飛則又有以超然乎藝藝之表豈獨詩可瓢而酒可巵豫將為子䬣道腴而醉真醇何必要汗漫而與期惟安堂賦子鮑子為己之學經世之資投刃成風儒先吏師作為新堂歸防暮遲惟安是名命陳子賦之陳子曰世有至愈佚在已而非物士有真富貴非金紫之謂蓋是心也以道寧以物碭寧之存碭之喪孰能名仕版而志漁樵之往還身官針而思滄州之浩蕩等聲利於桁楊睨蘧廬於伯王悗然乎進為悠悠乎去歸羌卷舒之無心豈出處之異岐翳鹿門之衰翁若方伯之豫浼偕子耕而妻耨寧燠寒而飽餒曰遺安之是計終長往而不悔彼陶翁之不屈為無食而暫出賦歸來而投簮徑反關而容膝審吾身之易安顧何賴於紳笏惟子鮑子超然髙驤仁宅之為居兮匪義塗吾無行玩名理以自怡兮謹邊幅而為防鼓吹乎諷吟介甲乎其溫良因時顯晦偕道翶翔遂初可尋鷗盟不寒固優追元亮之髙躅懷寶不迷中外無擇又不屑龎翁之退藏雲脫岫以隂合水反壑而鏡清異屈子兮衆皆醉如徐公兮世無常夫何往而不安顧眷眷于斯堂惟厯聘而轍環曾仲尼之暖席當去齊而濡滯孟子庶幾於齊國矧火暵之肆虐仰嗣聖之旰食死徙蓋幾何人而焦勞兾乎生息行子學以撫時吾固知可以寧奔迸而植僵踣俾橫目之同安兮喜氣亦形於玉色是謂推巳以及物心泰而罔咈與夫蘄吾之安而土苴一世者於道孰為失得耶子鮑子心融首肯乃言惟服怡軒辭為臧子與作金碧兮丹朱瓊其堂兮金鋪瞢危機之在是曽未間於憂虞秀眉兮曼膚銜宫吐羽兮鎗金奏竽詫聚蚊兮一醉竊暫快於營營之餘吾居兮若陋而安吾中兮若局而舒陶冶兮羣書蕭散兮稿梧與俗兮風馬牛解卷兮橛株拘子臧子所以自得而適而不知者以為疏而迂也胖吾體兮道之腴遊吾心兮化之初推而大之庶幾孔氏之所謂忘憂顔子之所謂不愚蓋將挹古聖賢而造膝雖造物者亦惡得而加諸江湖長翁集卷一
