body:
  text: 江湖長翁集卷二十七宋陳造撰劄子上王參政劄子某疎謬老衰無寸長可言受相公特逹之知日夕惟念古者為知己報或以德或以事其次猶以言言則下矣然萬一或有取焉在長者不徒爾也就令無取亦少寓圖報之意某於某官所可効區區者惟言况某官與政之始仰受兩宮之託俯荅天下之望規模之在我事埶之在天下必已定於胷次而聰明之間或偶未及涓埃之善可以少禆采掇者又可不加意哉加之意所以求處事埶而定吾規模亦一助也故某率意言之不暇究理端緒惟某官擇焉今日在某官所先務莫若養重臣之望夫國無重臣如舟無利楫翺翔乎安流而無風濤之險則可以苟安既曰乘舟則凌湍波抵怒風可不有備古者為國當倉卒迫急之際安危之機反掌之間而重臣者獨能呼而来麾而去姦雄有所憚而人才有所倚頼附麗以自致其力至此然後知國不可以無重臣而重臣之望當蓄之於素而不可求之於暫當求之德義忠節之間而不專在於才平居無事天下之心繫焉一旦之所賴乃平日所繫之機也某官以髙明之資輔以正大之學危言鯁論天下傳誦凡其與同列競曲直對天子爭是非者中外畢知而又天資挺直亷隅介潔載在士民之口乆矣天下望以輔政果輔政則又曰是且為宰輔某近聞淮浙之人言朝廷不乏直臣吾何憂某謂此可以積累自修而得不可強而致所謂重臣之望端在某官矣竊願某官益推其徇國爱民之心益謹其正心律下之本動為才賢計毋為親舊門生故吏計以功名不朽自期毋以富貴安佚自狹非才不薦可薦也不進不已也事悠悠者不以寘懷有闗利害不罷行不止也使其素節上愈益信於兩宮下愈益服天下之心夫如是無事可以持守治體有事可以制成敗之機天下無意外乆矣若曰必無可虞之事則非逺圖長計任此者捨某官将何望其次則欲振整風俗風俗不媺久矣不當治其流而必求其源源所發不能無偏從其偏而治之庶乎有救天下之勢上之欲有立則下或必為矯亢苟免上之欲崇寛則下或流為欺謾僥倖有立則必振紀綱崇寛則必施恩惠夫何所議而其俗或流而不媺故不可不為之所國家臨民務寛厚捐苛細施惠發徳湛浸涵泳有加無已小人狃於見聞莫不欺罔以自利僥覬以妄為今之臨民其迹多近姑息而沒其崇寛之實寛非不媺之名而寛之弊則與過於嚴者同姑息之弊與束濕太察則一弊已乆而漸見上下知厭之矣以其寛政之為媺名不容間也言之有鍥薄之嫌士夫不敢及此積之不已其害将難乎為救今未見也一旦不幸有水旱盗賊意外之警則圖之後時矣某願今日政事發施使天下之人殺人者必死負罪者必刑貸貰者必償持而守之數年則僥倖之心漸息然後有以予之感恩必深無以予之必皆安分自盡無枉抑不辜之怨如是風俗可以漸正而治術易施不然未見其可也又新天子即位首來天下言甚盛舉也意悠悠無稽之言必且不少悠悠之言信不可用然於時政未害也容而寘之適以彰吾君與廟堂恢洪之德然謂其間皆無切時可用之言則恐厚誣天下誠願啓廸聖主採其切時可用三數人加以醲賞或補以初品之官以作敢言之氣國家海涵春育霈澤天下騃雛癡兒揖官而去者不知其幾而於抱材識而沉隱約者官數人則曰恐其濫何略彼而嚴此也然言事於今日其大槩所主在除弊不在興利在酌中通之制不在過為刻害言利者主節省而非生財之謂言兵者主自治而非奇功之謂廟堂去取兹當立為一定之計即合否為用不用可也又僧道之蠧太盛不可不抑其埶禨祥之妖有萌不可不絶其源菴寺之無名可併則併寺觀之户絕可繼而不繼所以救之目前住度牒不鬻自某官與政始能守之二三十年暗銷其徒所以救之於持乆都城内外創菴寺以養滛僧不知其幾曩李壽翁之尹京也奏乞籍之以居百官䇿之良無出於此可以寛臨安僦賃之費可以絶僧俗雜蹂之弊權貴不便䇿既不施有識追惜此在今日正可舉行亦願某官識之或侍清光言議之隙可言則言之而祈求襘禳之事經載之以寓為民之意爾不如今日動雜二氏為言而徼求福夀又為它日天堂地府計也某官無謂其事悠悠若無害其費若不甚多不足病政俗也盖闘旗而驗不得不文成五利黄龍之見偶中則玉杯之詐逆亂之謀繼之近方士服丹藥其始亦必有小小收其效者以浸入其心也使今日僧道技術妖幻之徒用之而不驗其患猶細其事萬一偶如所祈兹不幸之大者某官不可不著之心謦欬言議糾之以正以明言其無益則善矣嗚呼安得天下士夫絶口不道老佛絶意不事祈禳禍福之説中外浸假而習孰不萌奇衺之見耶小儒猶知深憂大君子不當㤗然也又兩淮之地國之北門其民皆向來蹂踐之餘而風俗純質土物有中原氣近者南北雜䖏䆮不如舊而士夫不諳土風又不識南北情偽立説以固寵取榮興為相繼淮民愈弊昨徐子寅者於淮東創為屯田其名贍歸正之人而急於多其數南北之人淵萃其中烏合不根之徒一旦得聚氣埶自合而子寅曲意庇之平民畏如豺虎官吏莫敢誰何稔嵗之時無幾而振貸不貲者無虚嵗為患至今尚熾繼而議者又請以兵屯淮西不知兵尤不可耕而蠧民尤甚今者淮民之幸天聽甚卑淮西之屯已罷吏民如疾而汗刺在肌而捐去也而淮東之害未有言之者亦願某官著之心乘間可言為上言之斷然罷去慰淮東之民或曰屯淮西者兵也罷則歸其營淮東之人罷屯則何歸此亦不難據其人所種之田捐以予之使為巳業與編户齒𨽻于諸縣一二年之稅又損其輸之半或三之二凡官之為屯田設者一切罷之然浮浪不根之徒本藉屯田之埶以主張民間一旦失埶其大無良者必且遁去然此徒去畱不足為損益其人居不能耕出不能戰但能侵陵編户蔑視縣吏取無用之人以驕子奉之又欲聨綴而止之惴惴而恐其去此何為者此在三代時正在誅鋤之數又可挽而畱恃而使之乎亦願某官寘諸心有間則言之請而罷之以為淮東幸又淮南戰守計經畫者多非其䇿是以費財而勞人取輕敵國生疑淮人敵犯淮南凡幾矣惟淮人諳其情而其有識者可與語至當之數夫不可不慮者彼衆我寡之埶不可不達者攻城野戰之計敵騎之來或聚為一或分為二而我則無所不備夫一或二而已是以常衆無所不備也不得不常寡所備者不少故修築者多彼未來吾已自弊彼來敗吾一其它巳破膽矣而吾前日城築之費不知紀極隨修隨壞及其臨事夫何可恃揚州之城亦既二十里使其受敵非數萬人不支而又創為小堡萬一敵恃衆以攻我能分兵為兩乎我能兩守敵獨不能兩圍乎此其兒戯欺君已甚可笑而𤓰洲去揚州五十里𤓰洲有城揚州之兵肯為必死計乎是蓋懲辛巳劉錡之敗而藉口洗足登舟之説夫人之處事毎懲而毎改圖則迄無定筭執古之一言輒据以為法則不勝其泛矣夫彼豈知建炎敵騎度淮未嘗以攻圍為事而我未嘗城守而較勝也彼以氣盛衝突而前我以懾怯望風而走自張韓諸將乃始知避其方進待其衰也而乘之敵始大有所忌而和好以成今而修某城創某堡役既罷之民捐無餘之財以塡無藝之壑平居無事君相之前聚米借筯眞若可聽一旦敵至彼合我分彼衆我寡彼勇我怯棄城走爾紹興而來諸將毎毎出此淮人揶揄不顧也而偃然指以為媚上固位之具何哉某獨謂敵之欲動其來之衆寡將之如何我必先知之彼或大軍侵我在我之䇿必清野必聚屯屯為二若三堅壁不戰以老其師灼然知其可乘然後乘之不然不動也彼未得志而退巳罷矣不然分屯而守如前日議者之計瞢虗實而漫戰以僥倖一勝也難矣降是小小侵軼則縁淮亦聚屯三數處吾俟之以静不爭小利徐而制之亦不難矣如某之見揚州大城和州合淝之外可且罷其營築以息人省財一旦有警隨敵大小堅脆務為聚屯堅守不可犯之計清野以待不輕逐利如此而敵人不忌猶復其進莫禦如前日某不信也傳曰耕問奴織問婢某淮人也考古驗今似亦熟悉然言於士夫未始動其聽久亦自疑其疎然屯田初置亦能䇿其後必然旣而盡如所料則又自疑所見之不皆迂繆不適用也使萬一焉料其未然或如其已然而寘不言焉則亦自惜且恥終無益於世故是以不忍自默獻其所見門下願某官試繹其説或有合焉不然亦欲䥴警其不逮也或有可取繼此猶有為門下獻者上趙丞相劄子某比䝉延之座側訪以淮民休戚利害反覆從容得詳禀其説此與周公吐握魏相延問掾史視古不愧復許以再見而歸某意有未盡者敢畢其説可否初不敢自必淮南楮幣不通窮困甚矣大抵有農無商賈豐嵗則有米麥而無貨荒歉則米麥偕貨併絶兩淮之地北鄰彊㓂東西二千餘里南北四百里國家厚墻髙墉不可一日無者是寕可坐視其困悴號怨不為之所耶前謂鐵錢不南則官劵必不北㳂江州縣且可通銅錢用或立分數許三分或五分用之此令朝行此病暮損議者曰譬如人左偏已病豈可又病右偏某謂江北鐵錢亦國家寳也何至其凶如此目今淮人所病不在用鐵錢在無官劵爾鐵錢在㳂江猶在淮南當江南楮輕錢重之時濟之以此適為民利又何病議者又曰鐵不可蓄非銅比鐵錢為用則銅錢盡藏富家某又曰常情之於錢凡有餘則蓄之矣初不繫鐵錢用否也使某居内郡餘百千則計蓄百千餘千緡則蓄千緡以備緩急以貽子孫况編民而可遏之不蓄而又防其蓄乎今銅錢日少豈以鐵錢故而藏之耶議者又曰鐵錢過江則盗鑄愈多某則曰盗鑄與否在郡縣奉禁令如何不繫鐵錢南北也法禁小弛雖不越江猶盗鑄也利病顯然而議者過計則然然某所深憂者淮民不可使怨憤困悴淮地不可不保愛顧惜此之利害某不敢深言其憂責端在廟堂救之如拯溺復仇乃可事雖明甚而議者往往居利害外故異説如此某人微言輕何能動廊廟萬一不可聽用若其次䇿則嚴已行兩總領觧錢交子二分之令㳂江諸州所發上供亦可放此外此則㳂江津要置三數務委清亷不擾官發楮劵交子與鐵錢所得交子置總所鐵錢置提轉司交子鐵錢在官目今雖無用淮南毎豐年粒米狼戾時當路往往閉糴賤市今荒歉極矣必且豐熟則以此所積鐵錢與交子增價收米貯為軍儲或為水旱備良䇿之次者庶其在此如此鐵錢稍重官劵稍多淮民少蘇矣不然束手視之無䇿也或曰今可傍蜀中例令鐵錢二作一用某謂此最不可者今日鐵錢果太重則此法或可暫行以救之今鐵錢巳輕而又輕之是以水濟水之説也而又官若民目下折閲其半民必有無償自斃如宣政間官所有或一二萬或一二十萬今坐失其半彼不償取其肯止耶而民之操官劵者猶計一千五百乃肯換一劵二為一則是鐵錢三千得官劵一千立見狼狽今而曰吾禁之以二千易一若二易一可禁而行則今日胡不禁之一易一耶民方急時即其有者擎企哀請恐不我予禁不得而施之也為法制事當察民情情所不樂不便法禁格矣古今皆然不獨今日所謂淮地戰守計戰固不可預言而守則必有定論定論在審敵情如何敵陵暴淮南凡幾矣未始攻吾城也而議者紛紛皆曰某䖏可增築某處當修培費財勞人凡幾年矣一旦有警委之無用某生長淮南聞見敵人熟矣得吾郡縣必披城置寨未甞肯安居城中吾所守之城未嘗輕攻之惟趙立之守山陽魏勝之守岣山極力而攻然彼僅㨗于楚而大敗于海者蓋兵法攻城為下䇿修樓櫓轒輼緜歴嵗月蟻附而攻殺卒三之一而不㧞孫武之所深戒敵人知之審矣然二城之必攻大不得已也立之守楚是時淮南盡為敵有敵以立故猶未敢渡江且舉其全師取一孤壘制數千烏合猶不能克何以使其下是豈容已岣山則舊亦彼有吾取而城之彼亦忿而計必取然敵師斃于楚城下不可勝計岣山之敗臭腐者累月此外未聞攻圍之舉則信乎孫子之忌不可犯而敵不可謂之無人即其不肯捨所長犯所短可以知之矣不知其情而毎自困焉城楚州城六合修天長修髙郵財已竭人已勞議者言可守之地猶紛紛未巳則是猿臂而守吾地然猶可也不知猿臂連屯之勢正取敗之道古之人以吾所不爭者形人而使之疲今取敵所不爭者汲汲以自疲可謂知乎兵法少貴合衆貴分少而不知合則荆分為三適足以為黥布餌多而不分是新之昆陽苻秦之淝水爾吾兵不為少而較之敵則不為多為吾之計萬一疆事有萌吾不可不戒者必無浪戰不可不謹者必清野必聚屯揚州合淝若和州吾聚屯所也而兵不可妄分也百人而為二則五十矣三之則又加少彼此顧望氣勢不合其敗十八兵法曰避其鋭氣擊其惰歸用兵之要無出於此聽議者之言也掉之即動遇之即戰此正敵禱祠而求之者何也野戰乃彼所長而攻守有勞逸客主之殊不寕惟是兵自戰其地目之散地者謂人有所恃皆有走心兵法所忌也苟不先計而浪戰或見小利而輕動必受挫於敵無疑向來三帥制敵可見也其始多敗實由浪戰其後頗識敵情來則清野聚屯要害兵不妄分清野則敵無所資兵不分則氣勢合敵有所忌來則小避之去或追擊之用能使勁敵厭兵請和今不祖三帥餘智信樽爼遊譚之論以定攘擾慁亂不可恃之計未見其可或者曰長淮亦吾險也可據之與敵戰或曰謝元以八千兵敗苻秦百萬臧質守孤城魏武不能拔此皆不見事勢又不知兵之大計也人見盱眙而東淮流沄沄則以為險不知其上源方冬時䇿馬可渉建炎二年金人臨淮甫三月爾已飲馬于江紹興十一年韓侯復濠州戰艦泝流而上兵與民不乏俄敵騎至夾淮攻之矢石雨下頼㳂流而退少遲則敵人車運木枝欲槎淮流已山積于道矣又少東而左岸無敵乃遂得觧而去韓侯猛将其兵壮徤非今日比浪戰尚不得逞今之兵視曩者為如何今之将有如韓侯者否此據淮而戰不可輕信之説若兵法之常道十圍五攻敵則戰少則逃爾又曰小敵之堅大敵之擒如謝元以至少之兵取勝勁敵此古今幸勝不可舉以為法臧質全盱眙亦古今幸免不可為常負數十斤而趨常人能之烏獲輕千鈞焉人之異也切脉觀色意疾證而投以藥常醫及之華佗刲割藏府除去宿􅐄投之異也兵也者國存亡繫焉愚不敢取其變者言之也臧質之守盱眙魏武倦而歸爾合淝之役李衞公以為非謝安之善乃苻堅之不善此正古今確論苻秦黷武二十年間無日不用其民又蕩然無政民夷雜蹂想其人之思亂乆矣甚矣驅怨憤之人逺絶江淮勢甚不順而朱序寄聲謂更迭而來将不可禦併兵而進可疾戰郤之則其人之不樂為用信苻堅之不善而謝元之㨗實由天幸非特衞公知之當時老於兵者亦所不敢必也不然桓冲豈瞢然於此耶胡不觀蔡謨之議庾亮乎亮北伐之計使之當苻秦未必無功不幸與石虎為對工拙異用也北伐雖正而偏師之進諸将敗北邾城不守使石虎之兵南㓂謝元當之耶其不為毛寳輩者幾希平日論兵不計兵家常法輙舉僥倖萬一者藉口過矣不然王君廓十三騎却敵二萬趙子龍退魏兵𤣥德謂一身是膽者皆可為法矣彼皆大不得已所謂出死入生轉敗為功者今使諸将一旦臨事或恐有以繼前人之武特不可為常且藉以為譚爾然則某所謂必清野必聚屯必毋浪戰城已築無庸復毁已修者不必增隨壞隨修而已苟其有人足以支敵兩淮疆事大計在此而南渡以來可法可戒亦不外此也若夫淮民撫循則在監司守令而監司守令又在廟堂示以安靖不擾之意害有所除審而後舉利有所興無汲汲於報政無切切於希賞動為不可壞之計昨趙侍郎漕淮東因民之請講行水利所謂髙郵斗門石䃮發其一二見其所用材木石礎皆蒋發運所造堅良不可動為不窮計歎慨不已謂後世何能及此退儲材石規為乆逺謀㑹以事中止則今人之奏功欲速枉費財力隨成輙壞者可戒也某淮人起於畎畆備悉淮民休戚老無望于世但欲廟堂加意淮地亟收民心以厚國之北垣某官萬一取其一得以幸淮人某所望也信不信在某無輕重而淮民幸不幸係焉然亦國家之所不容恝者干冒鈞嚴皇恐無地周樞宻劄子前缺遂舉而不當則骨肉疑間必至相窺相闘兩虎闘而未決則吾不寕保境而已河南之地亦可徐議使其舉事而無間然則吾憂甫深何則彼恐無以慰其意而使之取地於我取地於我而兩淮危向者偽齊甞出此矣資之以兵驚我邊鄙彼雖敗不恥也而我不可以屢戰彼坐視燕京或敗於我或能困我皆非係彼之休戚是足寒心故曰天使之棄疾未可知也雖然猶有可言者彼既相忌必不多其兵力兵力不能多而妄舉也将刼於民中原必且不堪而将有豪傑乘間而投隙或無謀也而多其兵力則非彼之利未必得逞於我而反噬之計或萌於此此又未可知者也就不可知之三者要之它日之利害吉凶或胎於二雛今者吾必預為不可勝之計則邊事宜急計而熟講請遂言保兩淮之大畧前之所言特以意測之爾事之然否不敢必也雖不敢必然淮南被兵乆近不可知要亦不能免保淮南無他䇿必清野必堅壁必毋浪戰凡今言守某城據某地多務分兵以相接援使敵不可入者皆非計也淮東則揚州淮西如和州合淝皆要地也為三大屯俟敵之來按兵不戰吾亦蓄鋭伺隙審於使間明其耳目俟其的然可乘與之一戰可以痛懲其侮未有必勝之機而僥倖一勝是浪戰也是彼之欲於我也或曰彼之來吾連臂守之庶幾保吾所有今且委地與之而據其裏是資㓂也某常非笑説者之謬長淮東西凡千餘里為城幾所一一守之彼常麇聚而前敗吾一而他破膽走矣吾之将校狼狽内救朝廷且以保江為憂吾兵不戰而道疲矣且連雞而守不能禦其來決矣使彼連雞守之其能禦吾之往乎黥布叛荆軍分為三将以相救也而議者知其必敗未幾敗其一而衆潰康延孝為晋䇿梁以謂其兵聚則不少散則不多劉備攻吴連營七百里而魏文知其非兵法寡者備人者也無所不備則無所不寡非特古事然也頃敵之犯淮西也如張侯柘臯之㨗其犯淮東也如韓侯大儀之戰敵騎一甄而來吾兵一甄當之使其分兵而禦之何以殺其衝惟大儀之㨗韓分觧元一軍守髙郵是日也元與敵戰甚整暇而㨗韓特以髙郵扼其粮饟爾外此不聞它守也人之言曰臧質守盱眙昌義之守義陽趙立以烏合守楚州猶二年之乆以此藉口而計分地而守夫此皆出萬死而僅生極危而僅存非可為禦戎至計而立亦終至魚肉又豈得已柰何平時議邊計不求萬全而踵僥倖或勝之陳迹恃此與強敵對乎吾兵不分足以當其衆而又不輕與之戰彼客我主勞逸勢殊而勇悍猖獗之氣將屈吾清吾野則彼蜂屯之衆非餽運無所得食將不可以支久其間必將有可乘之隙吾將良而士怒後發先至之技處女脱兎之機其必有以建大功而破敵人之膽兵法曰避其鋭氣擊其惰歸鋭不之避命之曰瞢惰歸不擊命之曰弱瞢必敗不足有為苟弱矣足以啓敵人之侮雖然此猶係主將之巧拙勇怯如何而不可預知者也所可預定其計者吾兵決不可分而已今之議者畫地借筯尺寸而守之猿臂連屬將以限其來者紛紛皆是也此説未破某恐必至誤國也計吾緣淮而列屯其敢越淮而鏖敵耶其不敢必矣彼越吾地而不與之戰則連兵何益無所伺而戰則敗多而勝少法曰諸侯自戰其地為散地謂其無必死之志有散走之心也故縁淮分屯非至計明甚辛巳金亮之來官兵控淮而守凡幾所内地屯據又幾所敵兵侵淮南者二一自淮隂一自淮西亮踰淮王權敗劉錡遽棄淮隂保江埶甚倉皇而諸處所宿之兵不能齟齬其間吾亦了無賴焉則敵兵合而衆吾兵分而寡一驗也甲申㒒撒之㓂守山陽守淮隂等處又幾所敵併力敗淮隂兵殺禆將劉寶棄山陽蒼黄為保江計諸所屯兵亦不能齟齬其間則敵兵合而衆吾兵分而寡又一驗也或者必曰吾兵聚而待敵則延敵入境使彼据其已得之地耕戰兼講與我相持為乆駐之計則柰何某亦料之熟矣彼不盡得淮南則不能有淮南亦猶吾不盡得淮北則亦不能有淮北使彼貴將重兵宿于淮上則非久計更迭而留委之禆校則吾能制之自建炎至今犯淮南凡幾彼嘗盡得之猶不能畱况不盡得而憂其遂能與我分地犬牙相持乎卽已然而圖方來為吾之計似不出此其次則莫急於撫淮民也撫之得其道將以用之也某又請言其用之者兩淮民兵之健者猶可十許萬議者悠悠未有成説夸者曰民無不可使得良將教督之可與官軍同迂者曰民可耕不可戰聚而敎以兵徒擾之爾是未有成説也言兵當計彼此敵騎馳突之兵也來如驚飊去如駴獸國家軍政紀緒條目截截可守可觀從事於兵者攻守擊刺之外不治它事如此僅與之技柰何欲驅耒耜襏襫之夫禦堂堂之陣乎若曰佐官軍之守也緩急而飛輓也得利而據扼也對壘而張聲勢也則不為無用今所謂挑丁皆強悍能辛苦者也如某之見若邊事萌芽預為清野計令兩淮之挑丁分屯山水險要處如淮東興化縣淮西之諸山可屯處餘老稚牛畜農器分泊江中諸沙不徒泊之也挑丁之外取其次丁擇諸縣之官不迂而腐者摠而制之諭以略置弓槍旗鼓立之長列屯于此為老稚之衞前此聽民之散處官無所措畫壯者顧憂其家常為走計或相併吞或急則降敵脱而渡江者所在布滿往往反為江浙民間之患夫吾國未必能用吾民而為敵用也常力何者彼以長矛利刃驅之為之負輓為之鄉道為之攻城何求不得建炎紹興之初常如此矣今其家與所資旣屯江中則壯者無向來内顧之憂告以為屯實以自衞故不難於聽從民户百萬口屯于江中亦足張吾埶而重敵人之疑昔魏文長驅臨江孫權倉卒縁江列木城而魏人懼諸沙之屯彼見其旗幟聞其鉦鼓何遽知其非官兵其不賢於木城矣乎使渡江而南者但城市之人則江浙官府易為之所又免委百萬赤子坐視虎狼之噬已或為彼之用民之資力使十存四五敵退而歸耕蚕之計自若也聞之建炎紹興之初兩淮為敵窟而沙上之民耕耘不輟一水之隔便為樂土里民户知其便令之則從而又得以按收其壯者之用若曰置不足用而不計則建炎之初敵將龍虎敗于興荘金軍殱焉亦張榮所裒棘荆鉏挺之夫金亮之斃淮東所屯之民乃能頗掠其還卒焚其糧戰船自𤓰洲至淮首尾相接四五百里不然則官軍方限江南未及北淮彼安翔而去爾復何忌北中至今能言之據已之便童子非怯反是烏獲可侮此之機㑹無時無之要在藏其用於無用也傳曰耕問奴織問婢某於文章學術未必㢏人至言淮南事則畎畆之見其言似未可全忽也江湖長翁集巻二十七
